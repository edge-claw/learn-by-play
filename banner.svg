<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1030"/>
      <stop offset="50%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0c1225"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="320" rx="12" fill="url(#bg)"/>

  <!-- 星空 -->
  <circle cx="45" cy="30" r="1" fill="#aaccff" opacity=".4"/>
  <circle cx="120" cy="65" r=".8" fill="#aaccff" opacity=".3"/>
  <circle cx="200" cy="20" r="1.2" fill="#aaccff" opacity=".5"/>
  <circle cx="310" cy="50" r=".6" fill="#aaccff" opacity=".35"/>
  <circle cx="400" cy="15" r="1" fill="#aaccff" opacity=".4"/>
  <circle cx="520" cy="40" r=".7" fill="#aaccff" opacity=".3"/>
  <circle cx="600" cy="25" r="1.1" fill="#aaccff" opacity=".45"/>
  <circle cx="700" cy="55" r=".9" fill="#aaccff" opacity=".35"/>
  <circle cx="780" cy="18" r="1" fill="#aaccff" opacity=".4"/>
  <circle cx="850" cy="45" r=".7" fill="#aaccff" opacity=".3"/>
  <circle cx="80" cy="280" r=".8" fill="#aaccff" opacity=".3"/>
  <circle cx="170" cy="300" r="1" fill="#aaccff" opacity=".35"/>
  <circle cx="350" cy="290" r=".6" fill="#aaccff" opacity=".25"/>
  <circle cx="550" cy="295" r=".9" fill="#aaccff" opacity=".3"/>
  <circle cx="720" cy="285" r="1" fill="#aaccff" opacity=".35"/>
  <circle cx="860" cy="300" r=".7" fill="#aaccff" opacity=".3"/>

  <!-- 标题 -->
  <text x="450" y="85" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="48" font-weight="800" fill="url(#title-grad)" filter="url(#glow)">Learn by Play</text>
  <text x="450" y="120" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" fill="#888">玩中学科学 — 零依赖交互式教育游戏合集</text>

  <!-- 游戏图标展示带 -->
  <!-- 计算机 -->
  <g transform="translate(65,165)" filter="url(#glow-sm)">
    <circle r="28" fill="#1a1a3a" stroke="#3b82f6" stroke-width="1.5" opacity=".8"/>
    <text y="8" text-anchor="middle" font-size="28">💻</text>
  </g>
  <!-- 区块链 -->
  <g transform="translate(145,165)" filter="url(#glow-sm)">
    <circle r="28" fill="#1a1a3a" stroke="#f7931a" stroke-width="1.5" opacity=".8"/>
    <text y="8" text-anchor="middle" font-size="28">₿</text>
  </g>
  <!-- 核物理 -->
  <g transform="translate(225,165)" filter="url(#glow-sm)">
    <circle r="28" fill="#1a1a3a" stroke="#22c55e" stroke-width="1.5" opacity=".8"/>
    <text y="8" text-anchor="middle" font-size="28">☢️</text>
  </g>
  <!-- 量子 -->
  <g transform="translate(305,165)" filter="url(#glow-sm)">
    <circle r="28" fill="#1a1a3a" stroke="#a78bfa" stroke-width="1.5" opacity=".8"/>
    <text y="8" text-anchor="middle" font-size="28">🔮</text>
  </g>
  <!-- 火箭 -->
  <g transform="translate(385,165)" filter="url(#glow-sm)">
    <circle r="28" fill="#1a1a3a" stroke="#ef4444" stroke-width="1.5" opacity=".8"/>
    <text y="8" text-anchor="middle" font-size="28">🚀</text>
  </g>
  <!-- 基因 -->
  <g transform="translate(465,165)" filter="url(#glow-sm)">
    <circle r="28" fill="#1a1a3a" stroke="#06b6d4" stroke-width="1.5" opacity=".8"/>
    <text y="8" text-anchor="middle" font-size="28">🧬</text>
  </g>
  <!-- 黑洞 -->
  <g transform="translate(545,165)" filter="url(#glow-sm)">
    <circle r="28" fill="#1a1a3a" stroke="#8b5cf6" stroke-width="1.5" opacity=".8"/>
    <text y="8" text-anchor="middle" font-size="28">🕳️</text>
  </g>
  <!-- 半导体 -->
  <g transform="translate(625,165)" filter="url(#glow-sm)">
    <circle r="28" fill="#1a1a3a" stroke="#14b8a6" stroke-width="1.5" opacity=".8"/>
    <text y="8" text-anchor="middle" font-size="28">🔬</text>
  </g>
  <!-- 电池 -->
  <g transform="translate(705,165)" filter="url(#glow-sm)">
    <circle r="28" fill="#1a1a3a" stroke="#eab308" stroke-width="1.5" opacity=".8"/>
    <text y="8" text-anchor="middle" font-size="28">🔋</text>
  </g>
  <!-- 气候 -->
  <g transform="translate(785,165)" filter="url(#glow-sm)">
    <circle r="28" fill="#1a1a3a" stroke="#10b981" stroke-width="1.5" opacity=".8"/>
    <text y="8" text-anchor="middle" font-size="28">🌍</text>
  </g>

  <!-- 连接线 -->
  <line x1="93" y1="165" x2="117" y2="165" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="173" y1="165" x2="197" y2="165" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="253" y1="165" x2="277" y2="165" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="333" y1="165" x2="357" y2="165" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="413" y1="165" x2="437" y2="165" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="493" y1="165" x2="517" y2="165" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="573" y1="165" x2="597" y2="165" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="653" y1="165" x2="677" y2="165" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="733" y1="165" x2="757" y2="165" stroke="#1a1a3a" stroke-width="1"/>

  <!-- 统计数字 -->
  <g transform="translate(210,260)">
    <text text-anchor="middle" font-family="-apple-system,sans-serif" font-size="32" font-weight="700" fill="#60a5fa">26</text>
    <text y="22" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#666">个游戏</text>
  </g>
  <g transform="translate(390,260)">
    <text text-anchor="middle" font-family="-apple-system,sans-serif" font-size="32" font-weight="700" fill="#60a5fa">170+</text>
    <text y="22" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#666">个关卡</text>
  </g>
  <g transform="translate(570,260)">
    <text text-anchor="middle" font-family="-apple-system,sans-serif" font-size="32" font-weight="700" fill="#60a5fa">7</text>
    <text y="22" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#666">大领域</text>
  </g>
  <g transform="translate(720,260)">
    <text text-anchor="middle" font-family="-apple-system,sans-serif" font-size="32" font-weight="700" fill="#60a5fa">0</text>
    <text y="22" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#666">依赖</text>
  </g>
</svg>
