body{background:var(--bg);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden;height:100vh}

.quiz-opt:hover{border-color:#22c55e;color:var(--text)}
.quiz-opt.correct{background:#0a2a1a;border-color:#22c55e;color:#4ade80}
.quiz-opt.wrong{background:#2a0a0a;border-color:#ef4444;color:#f87171}
[data-theme="light"] .quiz-opt{background:#fff}
[data-theme="light"] .quiz-opt.correct{background:#dcfce7;color:#166534}
[data-theme="light"] .quiz-opt.wrong{background:#fef2f2;color:#991b1b}
.quiz-feedback{font-size:12px;line-height:1.7;margin-top:8px;color:var(--text-sub)}
.act-btn{display:block;width:100%;padding:10px;margin-top:6px;border:none;border-radius:8px;background:#6366f1;color:#fff;font-size:15px;cursor:pointer;transition:background .2s}
.act-btn:hover{background:#4f46e5}
.bar{position:fixed;left:0;bottom:0;width:100%;height:36px;background:var(--bar-bg);border-top:1px solid var(--panel-border);display:none;z-index:10;padding:0 16px;font-size:13px;align-items:center}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}

.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#c7d2fe;border-radius:2px}

<script>

const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),panel=document.getElementById('panel'),bar=document.getElementById('bar'),ov=document.getElementById('ov');

const levelDescs=[
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>规则：</b>A-T 配对（2个氢键）/ G-C 配对（3个氢键）</div>画布上显示一条DNA单链，将正确的碱基拖到对应位置完成配对，构建双螺旋结构。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>过程：</b>RNA聚合酶沿DNA模板链 3\'→5\' 合成mRNA</div>观察RNA聚合酶如何识别启动子，沿模板链移动，将DNA信息转录为mRNA。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>密码子：</b>每3个碱基编码1个氨基酸（AUG=起始/Met）</div>拖动核糖体沿mRNA移动，观察tRNA如何识别密码子并添加氨基酸，合成蛋白质链。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>模型：</b>操纵子 = 启动子 + 操纵基因 + 结构基因</div>模拟lac操纵子：当乳糖存在时，阻遏蛋白脱落，RNA聚合酶可以转录结构基因。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>类型：</b>点突变（替换）/ 插入突变 / 缺失突变</div>观察三种突变如何改变DNA序列和蛋白质产物，理解移码突变的严重后果。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>机制：</b>DNA甲基化 → 基因沉默（不改变序列）</div>在CpG岛上添加甲基基团，观察基因表达如何被关闭，理解表观遗传的可逆性。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>法则：</b>DNA → RNA → 蛋白质（信息单向流动）</div>完成中心法则的全流程：从DNA复制到转录再到翻译，理解遗传信息的流动方向。'
];
const levelObjTexts=[
['正确配对至少4个碱基','完成全部8个碱基配对','观察双螺旋3D旋转'],
['启动RNA聚合酶','完成mRNA链合成','识别起始密码子AUG'],
['将核糖体移到起始位','翻译至少3个密码子','合成完整多肽链'],
['添加乳糖激活操纵子','观察阻遏蛋白脱落','完成结构基因转录'],
['触发点突变观察效果','触发插入突变','触发缺失突变观察移码'],
['在3个CpG位点添加甲基','观察基因沉默效果','去甲基化恢复表达'],
['完成DNA→RNA转录','完成RNA→蛋白质翻译','连接全流程']
];
const learnTexts=[
'💡 DNA双螺旋由Watson和Crick于1953年发现。两条反向平行的多核苷酸链通过碱基配对连接：腺嘌呤(A)与胸腺嘧啶(T)形成2个氢键，鸟嘌呤(G)与胞嘧啶(C)形成3个氢键。螺旋每转一圈约10个碱基对(3.4nm)，直径2nm。GC含量高的DNA更稳定(熔解温度更高)。',
'💡 转录由RNA聚合酶催化：识别启动子(TATA box)→解开DNA双链→以模板链3\'→5\'方向合成mRNA(5\'→3\')→遇到终止信号停止。真核生物mRNA还需加工：5\'加帽(7-甲基鸟苷)、3\'加polyA尾、剪接去除内含子。一个基因可通过选择性剪接产生多种mRNA。',
'💡 翻译在核糖体上进行：小亚基识别mRNA的5\'帽和起始密码子AUG，大亚基加入形成完整核糖体。tRNA的反密码子与mRNA密码子配对，将氨基酸添加到多肽链。64个密码子编码20种氨基酸+3个终止密码子(UAA/UAG/UGA)。翻译速度约15-20个氨基酸/秒。',
'💡 lac操纵子是原核基因调控的经典模型(Jacob & Monod, 1961)。无乳糖时：阻遏蛋白结合操纵基因，阻止转录。有乳糖时：异构乳糖(别构效应物)使阻遏蛋白构象改变脱落，RNA聚合酶可转录lacZ/Y/A基因。真核调控更复杂：增强子、沉默子、转录因子等多层调控。',
'💡 点突变(替换)分为：同义突变(密码子简并性，蛋白不变)、错义突变(氨基酸改变，如镰刀形贫血)、无义突变(产生终止密码子，蛋白截短)。插入/缺失若非3的倍数则导致移码突变，下游所有氨基酸改变，通常是灾难性的。突变率约10⁻⁹/碱基/复制。',
'💡 表观遗传修饰不改变DNA序列但影响基因表达。DNA甲基化：甲基转移酶在CpG二核苷酸的胞嘧啶5位加甲基基团，招募甲基化结合蛋白→组蛋白去乙酰化→染色质紧缩→基因沉默。这是可逆的：去甲基化酶(TET)可移除甲基。X染色体失活、基因组印记都依赖甲基化。',
'💡 中心法则(Crick, 1958)：遗传信息从DNA→RNA→蛋白质单向流动。DNA复制(DNA→DNA)保证遗传信息传递；转录(DNA→RNA)将信息转为可移动形式；翻译(RNA→蛋白质)将信息转为功能分子。例外：逆转录(RNA→DNA，如HIV)、RNA复制(RNA→RNA，如流感病毒)。'
];
const quizData=[
{q:'DNA双链稳定配对的规则是什么？',opts:['A与T配对，G与C配对','A与G配对，T与C配对','任意碱基都能等概率配对'],ans:0,why:'A-T形成2个氢键，G-C形成3个氢键；互补配对保证复制和转录的信息准确性。'},
{q:'转录过程中，RNA聚合酶的产物是什么？',opts:['以DNA模板合成mRNA','把蛋白质拆成氨基酸','直接复制出另一条蛋白质'],ans:0,why:'转录把DNA中的遗传信息写成RNA序列，mRNA随后可被核糖体读取。'},
{q:'翻译为什么以三个碱基为一组读取mRNA？',opts:['每个密码子由3个碱基组成，通常对应一个氨基酸或终止信号','每个碱基单独编码一个完整蛋白质','核糖体随机读取任意长度片段'],ans:0,why:'三联体密码子提供64种组合，足以编码20种氨基酸和终止信号。'},
{q:'lac操纵子中乳糖存在时会发生什么？',opts:['阻遏蛋白脱落，结构基因可以被转录','阻遏蛋白更牢固地结合DNA','乳糖直接变成RNA聚合酶'],ans:0,why:'乳糖的异构体与阻遏蛋白结合，使其构象改变并离开操纵基因。'},
{q:'为什么插入或缺失突变常比单个替换更严重？',opts:['若不是3的倍数，会造成移码并改变下游密码子','它一定不会影响蛋白质','它只改变DNA颜色'],ans:0,why:'移码会重新划分阅读框，后续氨基酸序列通常全部改变。'},
{q:'DNA甲基化属于表观遗传的原因是什么？',opts:['它改变基因表达但不改变DNA碱基序列','它把A改成T','它只发生在蛋白质上'],ans:0,why:'甲基化等修饰可影响染色质状态和转录活性，但DNA字母序列不变。'},
{q:'中心法则描述的主干信息流是什么？',opts:['DNA → RNA → 蛋白质','蛋白质 → RNA → DNA','糖类 → DNA → 脂质'],ans:0,why:'中心法则概括了遗传信息从存储分子到功能分子的主要流向。'}
];
let levelObjs=levelObjTexts.map(a=>a.map(()=>false));
const quizPassed=new Set();
let quizFeedback=null;

const BASES={A:{pair:'T',color:'#ef4444',rna:'U'},T:{pair:'A',color:'#3b82f6',rna:'A'},G:{pair:'C',color:'#22c55e',rna:'C'},C:{pair:'G',color:'#f59e0b',rna:'G'}};

function resetLevel(li){

  if(li===0){L.template=['A','T','G','C','A','G','T','C'];L.paired=new Array(8).fill(null);L.pairCount=0;L.helixAngle=0;L.showHelix=false;L.selectedBase=null;}

function handleClick(mx,my){
  if(curLevel===0){
    let bases=['A','T','G','C'];
    for(let i=0;i<4;i++){
      let bx=cx(0.1+i*0.2),by=cy(0.88);
      if(Math.abs(mx-bx)<20&&Math.abs(my-by)<20){L.selectedBase=bases[i];renderPanel();return;}
    }
    if(L.selectedBase){
      for(let i=0;i<8;i++){
        if(L.paired[i])continue;
        let px=cx(0.65),py=cy(0.1+i*0.09);
        if(Math.abs(mx-px)<25&&Math.abs(my-py)<15){
          let expected=BASES[L.template[i]].pair;
          if(L.selectedBase===expected){L.paired[i]=L.selectedBase;L.pairCount++;
            if(L.pairCount>=4)completeObj(0);if(L.pairCount>=8){completeObj(1);L.showHelix=true;completeObj(2);}
          }
          L.selectedBase=null;renderPanel();return;
        }
      }
    }
  }
  if(curLevel===5){
    L.cpgSites.forEach((s,i)=>{
      let sx=cx(s.pos),sy=cy(0.5);
      if(Math.abs(mx-sx)<20&&Math.abs(my-sy)<20){
        if(!s.methylated){s.methylated=true;L.methylCount++;
          if(L.methylCount>=3){completeObj(0);L.silenced=true;completeObj(1);}
        }else{s.methylated=false;L.methylCount--;
          if(L.methylCount===0&&L.silenced){L.restored=true;completeObj(2);}
        }
        renderPanel();
      }
    });
  }
}
function renderPanel(){

    if(L.mRNA)h+=`<p style="color:#22c55e;font-size:12px;margin-top:4px">mRNA: 5'-${L.mRNA}-3'</p>`;
  }
  if(li===2){
    h+=`<h3>操作</h3>`;

    h+=`<p style="color:var(--text-sub);font-size:12px;margin-top:4px">密码子: ${L.codonsRead} | 多肽: ${L.peptide.join('-')||'(空)'}</p>`;
  }
  if(li===3){
    h+=`<h3>操作</h3>`;
    h+=`<button class="act-btn" onclick="addLactose()" ${L.lactose?'disabled':''}>${L.lactose?'✅ 乳糖已添加':'🥛 添加乳糖'}</button>`;
    h+=`<button class="act-btn" onclick="observeRepressor()" ${!L.lactose||L.repressorObserved?'disabled':''}>👀 观察阻遏蛋白脱落</button>`;
    h+=`<button class="act-btn" onclick="transcribeOperon()" ${!L.repressorObserved||L.transcribed?'disabled':''}>📝 转录结构基因</button>`;
    h+=`<p style="color:var(--text-sub);font-size:12px;margin-top:4px">阻遏蛋白: ${L.repressorOn?'🔴 结合中':'🟢 已脱落'}</p>`;
  }
  if(li===4){
    h+=`<h3>操作</h3>`;
    h+=`<button class="act-btn" onclick="mutate('point')">🔴 点突变(替换)</button>`;
    h+=`<button class="act-btn" onclick="mutate('insert')">🟡 插入突变</button>`;
    h+=`<button class="act-btn" onclick="mutate('delete')">🔵 缺失突变</button>`;
    h+=`<p style="color:var(--text-sub);font-size:12px;margin-top:4px">原始: ${L.original} | 当前: ${L.current}</p>`;
  }
  if(li===5){
    h+=`<h3>操作</h3><p style="color:var(--text-sub);font-size:13px">点击画布上的CpG位点添加/移除甲基</p>`;
    h+=`<p style="color:var(--text-sub);font-size:12px">甲基化: ${L.methylCount}/3 | 基因: ${L.silenced?(L.restored?'✅ 已恢复':'🔴 沉默'):'🟢 活跃'}</p>`;
  }
  if(li===6){
    h+=`<h3>操作</h3>`;
    h+=`<button class="act-btn" onclick="centralStep(0)" ${L.dnaToRna?'disabled':''}>📝 DNA → RNA 转录</button>`;
    h+=`<button class="act-btn" onclick="centralStep(1)" ${!L.dnaToRna||L.rnaToProtein?'disabled':''}>🏭 RNA → 蛋白质 翻译</button>`;
    h+=`<button class="act-btn" onclick="centralStep(2)" ${!L.rnaToProtein||L.connected?'disabled':''}>🔗 连接全流程</button>`;
  }
  const goalsDone=levelObjs[li].every(v=>v);
  if(goalsDone&&!quizPassed.has(li))h+=_quizHTML(li);
  if(quizPassed.has(li)){
    h+=`<div class="learn-box">${learnTexts[li]}</div>`;
    if(li<6)h+=`<button class="act-btn" style="background:#22c55e;color:#fff;margin-top:8px" onclick="goLevel(${li+1})">下一关 →</button>`;
    if(li===6)h+=_summaryHTML();
  }

// Action handlers
window.answerQuiz=function(li,choice){if(li!==curLevel||quizPassed.has(li))return;let q=quizData[li],correct=choice===q.ans;quizFeedback={level:li,chosen:choice,correct};if(correct)quizPassed.add(li);renderPanel();renderBar();};
window.startTranscription=function(){L.started=true;completeObj(0);renderPanel();};
window.advanceTranscription=function(){
  if(L.polyPos<L.template.length){
    let base=L.template[L.polyPos];let rnaBase=BASES[base]?BASES[base].rna||(base==='A'?'U':base==='T'?'A':base==='G'?'C':'G'):'N';
    L.mRNA+=rnaBase;L.polyPos++;
    if(L.polyPos>=L.template.length){L.done=true;completeObj(1);
      if(L.mRNA.indexOf('AUG')>=0)completeObj(2);}
    renderPanel();
  }
};
window.moveRibosome=function(){
  if(L.riboPos+3<=L.mRNA.length){
    let codon=L.mRNA.substr(L.riboPos,3);let aa=CODON_TABLE[codon]||'?';
    if(aa==='STOP'){L.done=true;completeObj(2);}
    else{L.peptide.push(aa);L.codonsRead++;
      if(L.riboPos===0)completeObj(0);if(L.codonsRead>=3)completeObj(1);}
    L.riboPos+=3;renderPanel();
  }
};
window.addLactose=function(){L.lactose=true;completeObj(0);renderPanel();};
window.observeRepressor=function(){if(!L.lactose)return;L.repressorOn=false;L.repressorObserved=true;completeObj(1);renderPanel();};
window.transcribeOperon=function(){L.transcribing=true;setTimeout(()=>{L.transcribed=true;completeObj(2);renderPanel();},800);renderPanel();};
window.mutate=function(type){
  L.mutType=type;L.mutations.add(type);
  if(type==='point'){let arr=L.original.split('');let i=Math.floor(Math.random()*arr.length);let bases='ATGC'.replace(arr[i],'');arr[i]=bases[Math.floor(Math.random()*3)];L.current=arr.join('');completeObj(0);}
  if(type==='insert'){let i=Math.floor(Math.random()*L.original.length);L.current=L.original.slice(0,i)+'[X]'+L.original.slice(i);completeObj(1);}
  if(type==='delete'){let i=Math.floor(Math.random()*(L.original.length-1));L.current=L.original.slice(0,i)+'_'+L.original.slice(i+1);completeObj(2);}
  renderPanel();
};
window.centralStep=function(step){
  if(step===0){L.dnaToRna=true;L.animPhase=1;completeObj(0);}
  if(step===1){L.rnaToProtein=true;L.animPhase=2;completeObj(1);}
  if(step===2){L.connected=true;L.animPhase=3;completeObj(2);}
  renderPanel();
};

function drawBg(){
  const th=t();const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,th.bg1);g.addColorStop(0.5,th.bg2);g.addColorStop(1,th.bg3);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.strokeStyle=th.grid;ctx.lineWidth=1;
  for(let x=PL;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W,y);ctx.stroke();}
}
function drawBase(x,y,base,size,highlight){
  let color=BASES[base]?BASES[base].color:'#888';
  ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);
  ctx.fillStyle=highlight?color:color+'66';ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=highlight?3:1.5;ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`bold ${size}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(base,x,y);
}

  });
  let geneY=cy(0.7);ctx.fillStyle=L.silenced&&!L.restored?'#ef444444':'#22c55e44';
  ctx.fillRect(cx(0.2),geneY,cx(0.6),30);ctx.strokeStyle=L.silenced&&!L.restored?'#ef4444':'#22c55e';ctx.strokeRect(cx(0.2),geneY,cx(0.6),30);
  ctx.fillStyle=L.silenced&&!L.restored?'#ef4444':'#22c55e';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(L.silenced&&!L.restored?'🔴 基因沉默':'🟢 基因活跃',midX,geneY+15);
}
function drawLevel6(){
  let midX=cx(0.5),y=cy(0.3);
  let steps=[{label:'DNA',x:0.2,color:'#3b82f6',done:true},{label:'转录',x:0.4,color:'#f59e0b',done:L.dnaToRna},{label:'RNA',x:0.5,color:'#22c55e',done:L.dnaToRna},{label:'翻译',x:0.7,color:'#f59e0b',done:L.rnaToProtein},{label:'蛋白质',x:0.85,color:'#8b5cf6',done:L.rnaToProtein}];
  steps.forEach((s,i)=>{
    let sx=cx(s.x);ctx.beginPath();ctx.arc(sx,y,25,0,Math.PI*2);
    ctx.fillStyle=s.done?s.color+'66':s.color+'22';ctx.fill();ctx.strokeStyle=s.color;ctx.lineWidth=s.done?3:1;ctx.stroke();
    ctx.fillStyle=s.done?'#fff':t().textMut;ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(s.label,sx,y);
    if(i<steps.length-1){
      let nx=cx(steps[i+1].x);ctx.strokeStyle=s.done&&steps[i+1].done?'#22c55e':'#ffffff22';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(sx+28,y);ctx.lineTo(nx-28,y);ctx.stroke();
      if(s.done&&steps[i+1].done){ctx.fillStyle='#22c55e';ctx.font='16px sans-serif';ctx.fillText('→',(sx+nx)/2,y);}
    }
  });
  if(L.connected){
    ctx.fillStyle='#22c55e';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
    ctx.fillText('🎉 中心法则：DNA → RNA → 蛋白质',midX,cy(0.6));
    ctx.fillStyle=t().textSec;ctx.font='13px sans-serif';
    ctx.fillText('遗传信息单向流动（例外：逆转录病毒 RNA→DNA）',midX,cy(0.68));
  }
}
function mainLoop(){
  requestAnimationFrame(mainLoop);tick++;ctx.clearRect(0,0,W,H);drawBg();
  if(curLevel===0)drawLevel0();else if(curLevel===1)drawLevel1();else if(curLevel===2)drawLevel2();
  else if(curLevel===3)drawLevel3();else if(curLevel===4)drawLevel4();else if(curLevel===5)drawLevel5();
  else if(curLevel===6)drawLevel6();
}
requestAnimationFrame(mainLoop);
</script>
