<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纳米机器人体内任务 — 交互式教育游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}


body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;width:100vw;height:100vh}
canvas{position:absolute;top:0;left:320px;width:calc(100vw - 320px);height:calc(100vh - 36px)}
.panel{position:absolute;top:0;left:0;width:320px;height:100%;background:var(--panel-bg);border-right:1px solid var(--panel-border);overflow-y:auto;z-index:10;padding:12px;box-sizing:border-box;padding-bottom:24px}
.level-btn{display:none!important}
.level-btn.active{display:none!important}
.level-btn.done{display:none!important}
.concept-box{background:var(--concept-bg);border:1px solid var(--concept-border);border-radius:8px;padding:10px;margin:8px 0;font-size:13px;line-height:1.7;color:var(--concept-text)}
.act-btn{display:block;width:100%;padding:10px;margin:4px 0;border-radius:8px;border:1px solid var(--btn-border);background:var(--btn-bg);color:var(--btn-text);font-size:15px;cursor:pointer;text-align:center}
.act-btn:hover{background:var(--btn-hover)}.act-btn:disabled{opacity:.4;cursor:not-allowed}
.act-btn.green{border-color:var(--btn-green-border);background:var(--btn-green-bg);color:var(--btn-green-text)}
.hint-box{background:var(--hint-bg);border:1px solid var(--hint-border);border-radius:8px;padding:8px;margin:8px 0;font-size:12px;color:var(--hint-text)}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:10px;padding:12px;margin:10px 0;font-size:14px;line-height:1.8;color:var(--learn-text)}
.sv{color:var(--sv);font-weight:bold}
.title{font-size:15px;color:var(--title-color);margin:8px 0 4px;font-weight:bold}
.sub{font-size:11px;color:var(--sub-color);margin-bottom:8px}
.progress-row{display:flex;gap:4px;margin:6px 0;flex-wrap:wrap}
.obj{font-size:11px;padding:3px 8px;border-radius:10px;border:1px solid var(--concept-border);color:var(--text-muted);background:var(--concept-bg)}
.obj.done{color:#4ade80;border-color:#22c55e;background:var(--btn-green-bg)}
.sel-row{display:flex;gap:4px;margin:4px 0;flex-wrap:wrap}
.sel-btn{padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer;border:1px solid #444;background:var(--btn-bg);color:#aaa}
.sel-btn.active{border-color:#3b82f6;background:#1a1a4a;color:#60a5fa}
.sel-btn.correct{border-color:#22c55e;background:#0a2a1a;color:#4ade80}
.slider-wrap{margin:8px 0}
.slider-wrap label{font-size:11px;color:#888;display:block;margin-bottom:4px}
.slider-wrap input[type=range]{width:100%;accent-color:#3b82f6}
.slider-val{font-size:13px;color:var(--sv);font-weight:bold}
#infobar{position:absolute;bottom:0;left:0;width:100%;height:36px;background:var(--bar-bg);border-top:1px solid var(--bar-border);display:flex;align-items:center;padding:0 16px 0 332px;font-size:12px;color:#666;z-index:10}
#infobar .sep{margin:0 12px;color:#333}

.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:10px 0}
.quiz-title{font-weight:bold;color:var(--quiz-q);margin-bottom:6px}
.quiz-q{font-size:13px;color:var(--quiz-q);line-height:1.6;margin-bottom:8px}
.quiz-opt{display:block;width:100%;padding:8px;margin:5px 0;border:1px solid var(--quiz-opt-border);border-radius:6px;background:var(--quiz-opt-bg);color:var(--quiz-opt-text);cursor:pointer;text-align:left}
.quiz-opt:hover{background:var(--quiz-opt-hover)}
.quiz-feedback{font-size:12px;line-height:1.6;margin-top:6px;padding:7px;border-radius:6px}
.quiz-feedback.ok{background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-feedback.bad{background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
.overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center}
.overlay h1{font-size:42px;background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.overlay .sub{color:var(--text-sub);font-size:17px;margin-bottom:32px}
.overlay .start-btn{padding:14px 48px;font-size:18px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:transform .2s}
.overlay .start-btn:hover{transform:scale(1.05)}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.features .feat{text-align:center;color:var(--feat-text);font-size:12px;width:80px}
.features .feat .fi{font-size:26px;margin-bottom:4px}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="overlay" id="ov">
<h1>🤖 纳米机器人体内任务</h1>
<p class="sub">7 个交互关卡 — 从纳米尺度到群体协作</p>
<button class="start-btn" onclick="startGame()">开始探索</button>
<div class="features">
<div class="feat"><div class="fi">🔬</div>纳米尺度</div>
<div class="feat"><div class="fi">⚙️</div>分子马达</div>
<div class="feat"><div class="fi">🩸</div>血管巡航</div>
<div class="feat"><div class="fi">🎯</div>靶向给药</div>
<div class="feat"><div class="fi">🧠</div>血脑屏障</div>
<div class="feat"><div class="fi">🔪</div>纳米手术</div>
<div class="feat"><div class="fi">🐝</div>群体协作</div>
</div>
</div>
<div class="panel" id="panel"></div>
<canvas id="cv"></canvas>
<div id="infobar">
<span id="ib-level">关卡 1/7</span><span class="sep">|</span>
<span id="ib-title">纳米尺度</span><span class="sep">|</span>
<span id="ib-status">进行中</span>
</div>
<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function themeLabel(){return (isDark?TH.dark:TH.light).label}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}}
function startGame(){document.getElementById('ov').style.display='none';}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),panel=document.getElementById('panel');
let W,H,curLevel=0,frame=0,animId;
const completedLevels=new Set();
const levelObjs=Array.from({length:7},()=>[false,false,false]);
function resize(){cv.width=W=cv.clientWidth;cv.height=H=cv.clientHeight}
window.addEventListener('resize',resize);resize();
const OX=0;
function aw(){return W}
function ah(){return H}
function rand(a,b){return a+Math.random()*(b-a)}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by)}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
let state={},keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true});
document.addEventListener('keyup',e=>{keys[e.key]=false});
let mouseX=0,mouseY=0,mouseDown=false;
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();mouseX=(e.clientX-r.left)*(W/r.width);mouseY=(e.clientY-r.top)*(H/r.height)});
cv.addEventListener('mousedown',()=>mouseDown=true);
cv.addEventListener('mouseup',()=>mouseDown=false);
const levels=[
{name:'纳米尺度',sub:'缩小到分子世界',concept:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>尺度：</b>纳米 = 十亿分之一米（头发 80000nm → 原子 0.1nm）</div>纳米=十亿分之一米。头发~80000nm，红细胞~7000nm，细菌~1000nm，病毒~100nm，蛋白质~10nm，DNA宽2nm，原子~0.1nm。',
 objs:['放大到看见细胞/细菌','放大到看见病毒','放大到看见DNA'],
 learn:'纳米机器人工作在<span class="sv">1-100nm</span>尺度。在这个世界里，<span class="sv">布朗运动</span>（分子随机碰撞）比重力重要得多，表面力远大于体积力——完全不同的物理规则。'},
{name:'分子马达',sub:'生命的引擎',concept:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>引擎：</b>ATP 合酶 / 驱动蛋白 / 鞭毛马达</div>细胞内有天然纳米机器：ATP合酶（旋转马达，每消耗1个ATP转120°）、驱动蛋白（沿微管行走，步长8nm）、鞭毛马达（螺旋桨式旋转）。',
 objs:['ATP合酶转满一圈','驱动蛋白走10步','观察鞭毛马达运转'],
 learn:'ATP合酶直径仅<span class="sv">~10nm</span>，却是已知效率最高的马达，接近<span class="sv">100%</span>。驱动蛋白沿微管"行走"运输货物，步长精确<span class="sv">8nm</span>。人造纳米机器人的灵感很多来自这些天然分子机器。'},
{name:'血管巡航',sub:'在血流中导航',concept:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>场景：</b>血管内导航（高速血流 + 红细胞碰撞 + 免疫追踪）</div>纳米机器人在血管中面临：高速血流冲击、红细胞碰撞、白细胞免疫追踪。用方向键/鼠标控制导航。',
 objs:['在血管中移动机器人','成功躲避3个红细胞','到达目标位置'],
 learn:'<span class="sv">2020年</span>已有团队用磁控纳米机器人在活体小鼠血管中成功导航。血流速度在主动脉中可达<span class="sv">1m/s</span>，纳米机器人需要磁场/超声/化学驱动来对抗血流。'},
{name:'靶向给药',sub:'精准打击癌细胞',concept:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>策略：</b>抗体修饰纳米载体 → 精准对接癌细胞受体</div>纳米载体表面装配特异性抗体，只与癌细胞表面受体结合。正常细胞（绿色）无受体突起，癌细胞（红色）有受体突起。',
 objs:['选择正确的抗体','纳米载体对接癌细胞','释放药物消灭癌细胞'],
 learn:'mRNA疫苗用的脂质纳米颗粒（LNP）也是纳米给药技术。FDA已批准多种纳米药物（Doxil、Abraxane）。<span class="sv">靶向给药</span>让化疗从"杀敌一千自损八百"变为精准打击。'},
{name:'穿越血脑屏障',sub:'大脑的防火墙',concept:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>挑战：</b>血脑屏障（BBB）— 阻止 98% 药物进入大脑</div>血脑屏障（BBB）阻止98%药物进入大脑。调节参数：尺寸(10-500nm)、表面电荷(正/中/负)、表面修饰(PEG/转铁蛋白/载脂蛋白)。',
 objs:['尝试一次失败的穿越','找到正确参数组合','成功穿越血脑屏障'],
 learn:'成功穿越BBB的关键：尺寸<span class="sv">&lt;100nm</span> + <span class="sv">转铁蛋白</span>受体介导胞吞。<span class="sv">2024年</span>已有研究用超声+微泡暂时打开BBB，配合纳米载体递送药物到脑部。'},
{name:'纳米手术',sub:'清除血管斑块',concept:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>操作：</b>纳米刀具切割动脉斑块（黄色），避开血管壁（红色）</div>鼠标控制纳米刀具切割动脉粥样硬化斑块（黄色）。注意不要切到血管壁（红色）！观察血流量指示器的改善。',
 objs:['开始切割斑块','清除50%以上斑块','血流量恢复到80%'],
 learn:'心血管疾病是全球第一大死因。已有团队用磁控纳米机器人在<span class="sv">猪血管</span>中成功清除血栓。未来纳米手术可能让心脏搭桥手术成为历史。'},
{name:'群体协作',sub:'纳米机器人集群',concept:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>模式：</b>1000 个纳米机器人集群（趋化 → 包围 → 攻击）</div>单个纳米机器人能力有限，但1000个协作可完成复杂任务。设定行为模式：趋化→包围→攻击，观察自组织涌现。',

const quizData=[
  {q:'在纳米尺度中，哪种影响常常比重力更重要？',opts:['布朗运动和表面力','潮汐引力','肉眼可见的空气阻力'],ans:0,ok:'对。纳米世界里随机分子碰撞和表面效应占主导。',bad:'尺度越小，体积相关的重力越弱，表面和热运动越明显。'},
  {q:'ATP 合酶给人造纳米机器人设计的主要启发是什么？',opts:['分子尺度也能有高效旋转马达','所有机器都必须使用汽油','纳米机器只能静止不动'],ans:0,ok:'对。ATP 合酶是天然高效旋转纳米马达。',bad:'观察旋转结构：它展示的是分子马达如何把化学能变成运动。'},
  {q:'纳米机器人在血管巡航中必须处理什么挑战？',opts:['血流冲击、红细胞碰撞和免疫追踪','没有任何流体阻力','只能沿直线飞行'],ans:0,ok:'对。血管内导航必须对抗流动、碰撞和免疫系统。',bad:'血管不是空管道，里面有高速血流和大量细胞。'},
  {q:'靶向给药比传统化疗更理想的核心原因是什么？',opts:['把药物更集中地送到病灶，减少对正常组织伤害','让药物完全不需要载体','让癌细胞变成正常细胞'],ans:0,ok:'对。靶向载体依靠受体识别提高局部递送。',bad:'关键是“精准对接”，不是药物本身突然无副作用。'},
  {q:'穿越血脑屏障时，哪组策略更合理？',opts:['小尺寸载体加受体介导转运','越大越容易穿过','只增加负重力'],ans:0,ok:'对。小尺寸和转铁蛋白等受体介导机制能提高穿越机会。',bad:'血脑屏障很严格，大颗粒通常更难通过。'},
  {q:'纳米手术清除斑块时最重要的约束是什么？',opts:['清除目标同时避免损伤血管壁','切得越深越好','完全不管血流变化'],ans:0,ok:'对。纳米手术追求微创和精准，不能破坏血管壁。',bad:'手术目标不是“多切”，而是安全恢复血流。'},
  {q:'纳米机器人群体协作的优势来自哪里？',opts:['大量个体遵循简单规则产生集体行为','每个机器人都必须有完整大脑','只有一个机器人单独完成所有任务'],ans:0,ok:'对。群体通过趋化、包围、攻击等简单规则产生复杂协作。',bad:'重点是集群涌现，而不是单个个体变得万能。'}
];
let quizPassed=new Set(),quizFeedback={};

/* ===== PANEL ===== */
let panelDirty=true;
function markDirty(){panelDirty=true}
function isUnlocked(n){return n===0||quizPassed.has(n-1)}
function quizHTML(li){
  const q=quizData[li],fb=quizFeedback[li];
  let h='<div class="quiz-box"><div class="quiz-title">通关小测验</div>';
  h+=`<div class="quiz-q">${q.q}</div>`;
  q.opts.forEach((o,i)=>{h+=`<button class="quiz-opt" onclick="answerQuiz(${li},${i})">${o}</button>`});
  if(fb)h+=`<div class="quiz-feedback ${fb.ok?'ok':'bad'}">${fb.text}</div>`;
  h+='</div>';
  return h;
}
function answerQuiz(li,choice){
  if(li!==curLevel||quizPassed.has(li)||!levelObjs[li]||!levelObjs[li].every(v=>v))return;
  const q=quizData[li],ok=choice===q.ans;
  quizFeedback[li]={ok,text:ok?q.ok:q.bad};
  if(ok){completedLevels.add(li);quizPassed.add(li)}
  markDirty();renderPanel();
}
function renderPanel(){
  if(!panelDirty)return;panelDirty=false;
  const lv=levels[curLevel];let h='<div style="margin-bottom:8px">';
  levels.forEach((l,i)=>{let c='level-btn';if(i===curLevel)c+=' active';if(completedLevels.has(i))c+=' done';
  h+=`<span class="${c}" onclick="loadLevel(${i})">${i+1}</span>`});
  h+='</div>';
  h+=`<div class="title">${lv.name}</div><div class="sub">${lv.sub}</div>`;
  h+=`<div class="concept-box">${lv.concept}</div>`;
  h+='<div class="progress-row">';
  lv.objs.forEach((o,i)=>{h+=`<span class="obj${levelObjs[curLevel][i]?' done':''}">${levelObjs[curLevel][i]?'✅':'⬜'} ${o}</span>`});
  h+='</div>';
  h+=`<div id="actionArea"></div>`;
  const allDone=levelObjs[curLevel].every(v=>v);
  if(allDone){
    if(!quizPassed.has(curLevel))h+=quizHTML(curLevel);
    if(quizPassed.has(curLevel)){
      h+=`<div class="learn-box">💡 ${lv.learn}</div>`;
      if(curLevel<levels.length-1)h+=`<button class="act-btn green" onclick="loadLevel(${curLevel+1})">下一关 →</button>`;
      else h+=(window._summaryHTML?window._summaryHTML():'');
    }
  }
  panel.innerHTML=h;
  setupLevelUI();
  document.getElementById('ib-level').textContent=`关卡 ${curLevel+1}/7`;
  document.getElementById('ib-title').textContent=lv.name;
  document.getElementById('ib-status').textContent=quizPassed.has(curLevel)?'已通关':allDone?'待测验':'进行中';
}
function completeObj(li,oi){
  if(levelObjs[li][oi])return;levelObjs[li][oi]=true;markDirty();
}
function checkLevelDone(){
  if(levelObjs[curLevel].every(v=>v))markDirty()
}

/* ===== LEVEL LOADER ===== */
function loadLevel(n){
  if(n<0||n>=levels.length||!isUnlocked(n))return;
  if(animId){cancelAnimationFrame(animId);animId=0}
  curLevel=n;state={};keys={};mouseDown=false;panelDirty=true;
  renderPanel();
  switch(n){
    case 0:initL1();break;case 1:initL2();break;case 2:initL3();break;
    case 3:initL4();break;case 4:initL5();break;case 5:initL6();break;case 6:initL7();break;
  }
}
function setupLevelUI(){
  const area=document.getElementById('actionArea');if(!area)return;
  switch(curLevel){
    case 0:setupUI1(area);break;case 1:setupUI2(area);break;case 2:setupUI3(area);break;
    case 3:setupUI4(area);break;case 4:setupUI5(area);break;case 5:setupUI6(area);break;case 6:setupUI7(area);break;
  }
}
function drawBg(){ctx.fillStyle=t().bg1;ctx.fillRect(0,0,W,H)}

/* ===== LEVEL 1: NANO SCALE ===== */
function setupUI1(area){
  area.innerHTML=`<div class="slider-wrap"><label>缩放倍率: <span class="slider-val" id="zv">${state.zoomLabel||'1x'}</span></label>
  <input type="range" id="zsl" min="0" max="100" value="${state.zoom||0}"></div>
  <div class="hint-box">💡 拖动滑块放大，依次看到头发→细胞→细菌→病毒→蛋白质→DNA→原子</div>`;
  const sl=document.getElementById('zsl');
  sl.oninput=function(){
    state.zoom=+this.value;
    const mag=Math.pow(10,state.zoom/11);
    state.zoomLabel=mag>=1e6?(mag/1e6).toFixed(1)+'百万x':mag>=1e3?(mag/1e3).toFixed(0)+'千x':mag.toFixed(0)+'x';
    document.getElementById('zv').textContent=state.zoomLabel;
    if(state.zoom>=30)completeObj(0,0);
    if(state.zoom>=60)completeObj(0,1);
    if(state.zoom>=85){completeObj(0,2);checkLevelDone()}
  };
}
function initL1(){
  if(!state.zoom)state.zoom=0;
  const scaleItems=[
    {name:'头发',size:'80,000nm',minZ:0,maxZ:25,color:'#a0522d'},
    {name:'红细胞',size:'7,000nm',minZ:15,maxZ:40,color:'#e74c3c'},
    {name:'细菌',size:'1,000nm',minZ:30,maxZ:55,color:'#2ecc71'},
    {name:'病毒',size:'100nm',minZ:45,maxZ:70,color:'#9b59b6'},
    {name:'蛋白质',size:'10nm',minZ:60,maxZ:82,color:'#f39c12'},
    {name:'DNA',size:'2nm',minZ:75,maxZ:95,color:'#3498db'},
    {name:'原子',size:'0.1nm',minZ:88,maxZ:100,color:'#ecf0f1'}
  ];
  let t=0;
  function draw(){
    animId=requestAnimationFrame(draw);t+=0.016;drawBg();
    const cx=W/2,cy=H/2,z=state.zoom||0;
    // grid
    ctx.strokeStyle='rgba(60,60,120,0.1)';ctx.lineWidth=1;
    for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
    for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
    // scale bar
    ctx.fillStyle='rgba(100,100,200,0.2)';ctx.fillRect(10,H-40,220,30);
    ctx.fillStyle='#60a5fa';ctx.font='11px monospace';ctx.textAlign='left';
    const mag=Math.pow(10,z/11);
    ctx.fillText('放大: '+(mag>=1e6?(mag/1e6).toFixed(1)+'百万x':mag>=1e3?(mag/1e3).toFixed(0)+',000x':mag.toFixed(0)+'x'),16,H-20);
    // items
    scaleItems.forEach(item=>{
      const mid=(item.minZ+item.maxZ)/2;
      const halfRange=(item.maxZ-item.minZ)/2;
      const vis=1-Math.abs(z-mid)/halfRange;
      if(vis<=0)return;
      ctx.globalAlpha=clamp(vis,0,1);
      const r=30+20*vis;const yOff=Math.sin(t*1.2+item.minZ)*10;
      ctx.fillStyle=item.color;
      if(item.name==='头发'){
        ctx.strokeStyle=item.color;ctx.lineWidth=r*0.6;ctx.lineCap='round';ctx.beginPath();
        for(let i=0;i<8;i++){const xx=cx-100+i*28,yy=cy+yOff+Math.sin(t+i*0.8)*12;i===0?ctx.moveTo(xx,yy):ctx.lineTo(xx,yy)}ctx.stroke();
      }else if(item.name==='红细胞'){
        ctx.beginPath();ctx.ellipse(cx,cy+yOff,r*1.5,r*0.8,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(cx,cy+yOff,r*0.5,r*0.25,0,0,Math.PI*2);ctx.fill();
      }else if(item.name==='细菌'){
        ctx.beginPath();ctx.ellipse(cx,cy+yOff,r*1.3,r*0.7,0.2,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle=item.color;ctx.lineWidth=2;
        for(let i=0;i<5;i++){const a=-0.8+i*0.4;ctx.beginPath();
        ctx.moveTo(cx+Math.cos(a)*r*1.3,cy+yOff+Math.sin(a)*r*0.7);
        ctx.quadraticCurveTo(cx+Math.cos(a)*(r*1.3+25),cy+yOff+Math.sin(a)*(r*0.7+15+Math.sin(t*3+i)*5),cx+Math.cos(a)*(r*1.3+20),cy+yOff+Math.sin(a)*(r*0.7+25));ctx.stroke()}
      }else if(item.name==='病毒'){
        ctx.beginPath();ctx.arc(cx,cy+yOff,r,0,Math.PI*2);ctx.fill();
        for(let i=0;i<12;i++){const a=i*Math.PI/6+t*0.5;
        ctx.strokeStyle=item.color;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*r,cy+yOff+Math.sin(a)*r);
        ctx.lineTo(cx+Math.cos(a)*(r+14),cy+yOff+Math.sin(a)*(r+14));ctx.stroke();
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx+Math.cos(a)*(r+16),cy+yOff+Math.sin(a)*(r+16),3,0,Math.PI*2);ctx.fill()}
      }else if(item.name==='蛋白质'){
        for(let i=0;i<5;i++){const a=i*Math.PI*2/5+t*0.3;ctx.fillStyle=item.color;ctx.beginPath();
        ctx.arc(cx+Math.cos(a)*r*0.5,cy+yOff+Math.sin(a)*r*0.5,r*0.35,0,Math.PI*2);ctx.fill()}
      }else if(item.name==='DNA'){
        for(let s=0;s<2;s++){ctx.strokeStyle=s?'#e74c3c':'#3498db';ctx.lineWidth=3;ctx.beginPath();
        for(let i=-60;i<=60;i+=2){const xx=cx+i*1.8,yy=cy+yOff+Math.sin(i*0.08+t*2+s*Math.PI)*r*0.7;
        i===-60?ctx.moveTo(xx,yy):ctx.lineTo(xx,yy)}ctx.stroke()}
        for(let i=-60;i<=60;i+=14){const xx=cx+i*1.8;
        const y1=cy+yOff+Math.sin(i*0.08+t*2)*r*0.7,y2=cy+yOff+Math.sin(i*0.08+t*2+Math.PI)*r*0.7;
        ctx.strokeStyle=['#4ade80','#f1c40f','#f87171','#60a5fa'][((i+60)/14|0)%4];ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(xx,y1);ctx.lineTo(xx,y2);ctx.stroke()}
      }else{
        ctx.fillStyle='#ecf0f1';ctx.beginPath();ctx.arc(cx,cy+yOff,r*0.5,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;
        for(let i=0;i<3;i++){ctx.beginPath();ctx.ellipse(cx,cy+yOff,r*1.3,r*0.4,i*Math.PI/3+t,0,Math.PI*2);ctx.stroke()}
      }
      ctx.fillStyle=themeLabel();ctx.font='bold 13px sans-serif';ctx.textAlign='center';
      ctx.fillText(item.name+' ('+item.size+')',cx,cy+yOff+r+22);
      ctx.globalAlpha=1;
    });
    // top scale ruler
    ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(10,8,W-20,20);
    const marks=[{n:'原子',p:0.95},{n:'DNA',p:0.82},{n:'蛋白质',p:0.68},{n:'病毒',p:0.55},{n:'细菌',p:0.4},{n:'细胞',p:0.25},{n:'头发',p:0.08}];
    marks.forEach(m=>{const xx=10+(W-20)*m.p;ctx.fillStyle=z/100>=1-m.p?'#60a5fa':'#444';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText(m.n,xx,22)});
    renderPanel();
  }
  draw();
}

/* ===== LEVEL 2: MOLECULAR MOTORS ===== */
function setupUI2(area){
  let h='<div class="hint-box">💡 点击按钮给分子马达提供ATP能量</div>';
  h+=`<button class="act-btn" onclick="feedATP()">⚡ 提供ATP</button>`;
  h+=`<div class="sel-row" style="margin-top:8px">`;
  ['ATP合酶','驱动蛋白','鞭毛马达'].forEach((n,i)=>{
    h+=`<span class="sel-btn${state.motorView===i?' active':''}" onclick="switchMotor(${i})">${n}</span>`;
  });
  h+=`</div>`;
  if(state.motorView===0)h+=`<div style="font-size:11px;color:var(--text-muted);margin-top:4px">ATP合酶旋转: ${(state.atpAngle||0).toFixed(0)}° / 360°</div>`;
  if(state.motorView===1)h+=`<div style="font-size:11px;color:var(--text-muted);margin-top:4px">驱动蛋白步数: ${state.kinesinSteps||0} / 10</div>`;
  area.innerHTML=h;
}
function switchMotor(i){state.motorView=i;markDirty()}
function feedATP(){
  if(state.motorView===0){state.atpAngle=(state.atpAngle||0)+120;if(state.atpAngle>=360){completeObj(1,0);checkLevelDone()}}
  if(state.motorView===1){state.kinesinSteps=(state.kinesinSteps||0)+1;if(state.kinesinSteps>=10){completeObj(1,1);checkLevelDone()}}
  if(state.motorView===2){state.flagellaActive=true;completeObj(1,2);checkLevelDone()}
  markDirty();
}
function initL2(){
  state.motorView=0;state.atpAngle=0;state.kinesinSteps=0;state.flagellaActive=false;
  let t=0;
  function draw(){
    animId=requestAnimationFrame(draw);t+=0.016;drawBg();
    const cx=W/2,cy=H/2;
    // background: cell interior
    ctx.fillStyle='rgba(20,10,40,0.5)';ctx.beginPath();ctx.arc(cx,cy,Math.min(W,H)*0.42,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(100,60,160,0.3)';ctx.lineWidth=2;ctx.stroke();
    if(state.motorView===0){
      // ATP synthase
      const angle=(state.atpAngle||0)*Math.PI/180+Math.sin(t)*0.02;
      // base
      ctx.fillStyle='#444';ctx.fillRect(cx-40,cy+60,80,20);
      ctx.fillStyle='#666';ctx.fillRect(cx-15,cy-40,30,100);
      // rotor
      ctx.save();ctx.translate(cx,cy-10);ctx.rotate(angle);
      for(let i=0;i<3;i++){ctx.fillStyle=['#e74c3c','#3498db','#2ecc71'][i];ctx.beginPath();
      ctx.moveTo(0,0);const a=i*Math.PI*2/3;ctx.arc(0,0,50,a-0.4,a+0.4);ctx.fill()}
      ctx.restore();
      // label
      ctx.fillStyle='#60a5fa';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
      ctx.fillText('ATP合酶',cx,cy+100);
      ctx.fillStyle='#444';ctx.font='18px sans-serif';
      ctx.fillText('每消耗1个ATP旋转120°',cx,cy+118);
      ctx.fillText('直径 ~10nm',cx,cy+134);
      // ATP particles
      if(t%2<0.5){ctx.fillStyle='rgba(250,200,50,0.6)';ctx.font='16px sans-serif';
      ctx.fillText('ATP→ADP+P',cx+70,cy-20+Math.sin(t*3)*10)}
    }else if(state.motorView===1){
      // kinesin walking on microtubule
      const steps=state.kinesinSteps||0;
      // microtubule
      ctx.strokeStyle='#666';ctx.lineWidth=12;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(cx-200,cy+30);ctx.lineTo(cx+200,cy+30);ctx.stroke();
      ctx.strokeStyle='#555';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(cx-200,cy+30);ctx.lineTo(cx+200,cy+30);ctx.stroke();
      ctx.fillStyle='#444';ctx.font='17px sans-serif';ctx.textAlign='center';ctx.fillText('微管',cx,cy+55);
      // kinesin
      const kx=cx-160+steps*32;
      const legPhase=t*4;
      ctx.strokeStyle='#60a5fa';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(kx,cy+26);ctx.lineTo(kx,cy-10);ctx.lineTo(kx+8+Math.sin(legPhase)*6,cy+26);ctx.stroke();
      // cargo
      ctx.fillStyle='#f39c12';ctx.beginPath();ctx.arc(kx+4,cy-30,18,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=themeLabel();ctx.font='16px sans-serif';ctx.fillText('货物',kx+4,cy-27);
      // feet
      ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(kx,cy+26,5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(kx+8+Math.sin(legPhase)*6,cy+26,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#60a5fa';ctx.font='bold 14px sans-serif';ctx.fillText('驱动蛋白',cx,cy+80);
      ctx.fillStyle='#444';ctx.font='18px sans-serif';ctx.fillText('步长 8nm，沿微管行走',cx,cy+98);
    }else{
      // flagellar motor
      const speed=state.flagellaActive?t*8:0;
      // cell body
      ctx.fillStyle='rgba(46,204,113,0.3)';ctx.beginPath();ctx.ellipse(cx-60,cy,50,35,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#2ecc71';ctx.lineWidth=2;ctx.stroke();
      // motor base
      ctx.fillStyle='#888';ctx.fillRect(cx-14,cy-8,16,16);
      // rotor
      ctx.save();ctx.translate(cx,cy);ctx.rotate(speed);
      ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.moveTo(0,-6);ctx.lineTo(8,0);ctx.lineTo(0,6);ctx.lineTo(-8,0);ctx.fill();
      ctx.restore();
      // flagellum
      ctx.strokeStyle='#aaa';ctx.lineWidth=2;ctx.beginPath();
      for(let i=0;i<80;i++){const xx=cx+10+i*2;const yy=cy+Math.sin(i*0.15-speed)*15*(1-i/120);
      i===0?ctx.moveTo(xx,yy):ctx.lineTo(xx,yy)}ctx.stroke();
      ctx.fillStyle='#60a5fa';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
      ctx.fillText('鞭毛马达',cx,cy+70);
      ctx.fillStyle='#444';ctx.font='18px sans-serif';
      ctx.fillText('螺旋桨式旋转，转速可达1000rpm',cx,cy+88);
    }
    renderPanel();
  }
  draw();
}

/* ===== LEVEL 3: BLOOD VESSEL ===== */
function setupUI3(area){
  area.innerHTML=`<div class="hint-box">💡 方向键/WASD 或鼠标控制蓝色纳米机器人<br>躲避红细胞，逃离白细胞，到达绿色目标点</div>
  <div style="font-size:11px;color:var(--text-muted);margin-top:4px">躲避红细胞: ${state.dodged||0}/3 | 距目标: ${state.distToGoal||'--'}</div>`;
}
function initL3(){
  const bot={x:80,y:0,vx:0,vy:0};
  const rbcs=[];for(let i=0;i<12;i++)rbcs.push({x:rand(150,W-60),y:rand(40,H-40),vx:rand(-1.5,-0.5),vy:rand(-0.3,0.3),r:rand(18,28)});
  const wbc={x:W-100,y:H/2,vx:0,vy:0};
  const goal={x:W-60,y:H/2};
  bot.y=H/2;state.dodged=0;state.moved=false;state.distToGoal='--';
  let t=0,dodgeSet=new Set();
  function draw(){
    animId=requestAnimationFrame(draw);t+=0.016;drawBg();
    // blood vessel walls
    ctx.fillStyle='#3a0a0a';ctx.fillRect(0,0,W,25);ctx.fillRect(0,H-25,W,25);
    ctx.strokeStyle='#8b0000';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(0,25);ctx.lineTo(W,25);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,H-25);ctx.lineTo(W,H-25);ctx.stroke();
    // blood flow particles
    for(let i=0;i<30;i++){const px=(i*67+t*40)%W,py=30+((i*37)%1)*(H-60);
    ctx.fillStyle='rgba(200,50,50,0.15)';ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fill()}
    // bot movement
    let ax=0,ay=0;
    if(keys['ArrowLeft']||keys['a'])ax=-0.3;if(keys['ArrowRight']||keys['d'])ax=0.3;
    if(keys['ArrowUp']||keys['w'])ay=-0.3;if(keys['ArrowDown']||keys['s'])ay=0.3;
    // mouse attraction
    if(mouseDown){const dx=mouseX-bot.x,dy=mouseY-bot.y,d=Math.hypot(dx,dy);if(d>5){ax+=dx/d*0.3;ay+=dy/d*0.3}}
    ax-=0.05;// blood flow pushback
    bot.vx=(bot.vx+ax)*0.95;bot.vy=(bot.vy+ay)*0.95;
    bot.x+=bot.vx;bot.y+=bot.vy;
    bot.x=clamp(bot.x,10,W-10);bot.y=clamp(bot.y,30,H-30);
    if(Math.abs(bot.vx)>0.1||Math.abs(bot.vy)>0.1){if(!state.moved){state.moved=true;completeObj(2,0)}}
    // RBCs
    rbcs.forEach((r,i)=>{
      r.x+=r.vx;r.y+=r.vy;
      if(r.x<-40)r.x=W+40;if(r.y<30||r.y>H-30)r.vy*=-1;
      ctx.fillStyle='#c0392b';ctx.beginPath();ctx.ellipse(r.x,r.y,r.r,r.r*0.55,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(r.x,r.y,r.r*0.35,r.r*0.15,0,0,Math.PI*2);ctx.fill();
      // collision check
      const d=dist(bot.x,bot.y,r.x,r.y);
      if(d<r.r+8){
        const nx=(bot.x-r.x)/d,ny=(bot.y-r.y)/d;
        bot.x=r.x+nx*(r.r+10);bot.y=r.y+ny*(r.r+10);bot.vx+=nx*2;bot.vy+=ny*2;
        if(!dodgeSet.has(i)){dodgeSet.add(i);state.dodged=Math.min(dodgeSet.size,3);
        if(state.dodged>=3){completeObj(2,1)}}
      }
    });
    // WBC (chaser)
    const wdx=bot.x-wbc.x,wdy=bot.y-wbc.y,wd=Math.hypot(wdx,wdy);
    if(wd>0){wbc.vx+=(wdx/wd)*0.08;wbc.vy+=(wdy/wd)*0.08}
    wbc.vx*=0.97;wbc.vy*=0.97;wbc.x+=wbc.vx;wbc.y+=wbc.vy;
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.beginPath();ctx.arc(wbc.x,wbc.y,22,0,Math.PI*2);ctx.fill();
    // pseudopods
    for(let i=0;i<5;i++){const a=i*Math.PI*2/5+t*0.5;
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(wbc.x+Math.cos(a)*26,wbc.y+Math.sin(a)*26,8+Math.sin(t*3+i)*3,0,Math.PI*2);ctx.fill()}
    ctx.fillStyle='#333';ctx.font='15px sans-serif';ctx.textAlign='center';ctx.fillText('白细胞',wbc.x,wbc.y+4);
    // goal
    ctx.fillStyle='rgba(74,222,128,0.3)';ctx.beginPath();ctx.arc(goal.x,goal.y,30+Math.sin(t*3)*5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#4ade80';ctx.beginPath();ctx.arc(goal.x,goal.y,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=themeLabel();ctx.font='16px sans-serif';ctx.fillText('目标',goal.x,goal.y-18);
    // nanobot
    ctx.save();ctx.translate(bot.x,bot.y);ctx.rotate(Math.atan2(bot.vy,bot.vx));
    // glow
    const grd=ctx.createRadialGradient(0,0,0,0,0,20);grd.addColorStop(0,'rgba(96,165,250,0.4)');grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.fillRect(-20,-20,40,40);
    ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(-6,-6);ctx.lineTo(-6,6);ctx.closePath();ctx.fill();
    ctx.restore();
    // check goal
    const gd=dist(bot.x,bot.y,goal.x,goal.y);state.distToGoal=gd<200?gd.toFixed(0)+'px':'远';
    if(gd<35){completeObj(2,2);checkLevelDone()}
    renderPanel();
  }
  draw();
}

/* ===== LEVEL 4: TARGETED DRUG DELIVERY ===== */
function setupUI4(area){
  let h='<div class="hint-box">💡 选择正确的抗体装配到纳米载体，然后释放</div>';
  h+='<div style="font-size:11px;color:#aaa;margin:6px 0">选择抗体:</div><div class="sel-row">';
  ['HER2抗体','CD20抗体','PD-L1抗体'].forEach((n,i)=>{
    h+=`<span class="sel-btn${state.selectedAb===i?' active':''}" onclick="selectAb(${i})">${n}</span>`;
  });
  h+='</div>';
  if(state.selectedAb===0)h+=`<div style="font-size:10px;color:#4ade80;margin:4px 0">✓ HER2抗体 — 靶向HER2阳性癌细胞</div>`;
  if(state.selectedAb===1)h+=`<div style="font-size:10px;color:#f87171;margin:4px 0">✗ CD20抗体 — 靶向B淋巴细胞，不适用</div>`;
  if(state.selectedAb===2)h+=`<div style="font-size:10px;color:#f87171;margin:4px 0">✗ PD-L1抗体 — 免疫检查点，不适用</div>`;
  if(state.selectedAb===0&&!state.released)h+=`<button class="act-btn" onclick="releaseNano()">🚀 释放纳米载体</button>`;
  if(state.docked)h+=`<button class="act-btn green" onclick="releaseDrug()">💊 释放药物</button>`;
  area.innerHTML=h;
}
function selectAb(i){state.selectedAb=i;if(i===0)completeObj(3,0);markDirty()}
function releaseNano(){state.released=true;state.nanoX=80;state.nanoY=H/2;markDirty()}
function releaseDrug(){state.drugReleased=true;completeObj(3,2);checkLevelDone();markDirty()}
function initL4(){
  state.selectedAb=-1;state.released=false;state.docked=false;state.drugReleased=false;state.drugParticles=[];
  const normals=[];for(let i=0;i<6;i++)normals.push({x:rand(100,W-100),y:rand(60,H-60),r:25});
  const cancers=[];for(let i=0;i<4;i++)cancers.push({x:rand(W*0.5,W-80),y:rand(80,H-80),r:28,alive:true});
  state.nanoX=80;state.nanoY=H/2;
  let t=0,targetCancer=cancers[0];
  function draw(){
    animId=requestAnimationFrame(draw);t+=0.016;drawBg();
    // tissue background
    ctx.fillStyle='rgba(20,15,25,0.5)';ctx.fillRect(0,0,W,H);
    // normal cells
    normals.forEach(c=>{
      ctx.fillStyle='rgba(74,222,128,0.5)';ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#22c55e';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle='rgba(74,222,128,0.3)';ctx.beginPath();ctx.arc(c.x-5,c.y-5,8,0,Math.PI*2);ctx.fill();
    });
    // cancer cells
    cancers.forEach(c=>{
      if(!c.alive){ctx.fillStyle='rgba(100,100,100,0.2)';ctx.beginPath();ctx.arc(c.x,c.y,c.r*0.5,0,Math.PI*2);ctx.fill();return}
      ctx.fillStyle='rgba(239,68,68,0.6)';ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#ef4444';ctx.lineWidth=2;ctx.stroke();
      // receptor spikes
      for(let i=0;i<8;i++){const a=i*Math.PI/4+Math.sin(t+i)*0.1;
      ctx.strokeStyle='#f87171';ctx.lineWidth=2;ctx.beginPath();
      ctx.moveTo(c.x+Math.cos(a)*c.r,c.y+Math.sin(a)*c.r);
      ctx.lineTo(c.x+Math.cos(a)*(c.r+10),c.y+Math.sin(a)*(c.r+10));ctx.stroke();
      ctx.fillStyle='#fca5a5';ctx.beginPath();ctx.arc(c.x+Math.cos(a)*(c.r+12),c.y+Math.sin(a)*(c.r+12),3,0,Math.PI*2);ctx.fill()}
      ctx.fillStyle=themeLabel();ctx.font='15px sans-serif';ctx.textAlign='center';ctx.fillText('癌细胞',c.x,c.y+c.r+18);
    });
    // nanobot carrier
    if(state.released&&!state.docked){
      // move toward nearest alive cancer
      let nearest=null,nd=Infinity;
      cancers.forEach(c=>{if(c.alive){const d=dist(state.nanoX,state.nanoY,c.x,c.y);if(d<nd){nd=d;nearest=c}}});
      if(nearest){
        const dx=nearest.x-state.nanoX,dy=nearest.y-state.nanoY,d=Math.hypot(dx,dy);
        if(d>2){state.nanoX+=dx/d*2;state.nanoY+=dy/d*2}
        if(d<nearest.r+5){state.docked=true;targetCancer=nearest;completeObj(3,1);markDirty()}
      }
    }
    if(state.released||state.docked){
      const nx=state.docked?targetCancer.x-targetCancer.r-12:state.nanoX;
      const ny=state.docked?targetCancer.y:state.nanoY;
      // glow
      const grd=ctx.createRadialGradient(nx,ny,0,nx,ny,25);grd.addColorStop(0,'rgba(96,165,250,0.4)');grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd;ctx.fillRect(nx-25,ny-25,50,50);
      ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(nx,ny,10,0,Math.PI*2);ctx.fill();
      // antibody arms
      if(state.selectedAb===0){
        for(let i=0;i<3;i++){const a=i*Math.PI*2/3+t*0.5;
        ctx.strokeStyle='#60a5fa';ctx.lineWidth=2;ctx.beginPath();
        ctx.moveTo(nx+Math.cos(a)*10,ny+Math.sin(a)*10);
        ctx.lineTo(nx+Math.cos(a)*18,ny+Math.sin(a)*18);ctx.stroke()}
      }
      ctx.fillStyle=themeLabel();ctx.font='15px sans-serif';ctx.textAlign='center';ctx.fillText('纳米载体',nx,ny+20);
    }
    // drug particles
    if(state.drugReleased){
      if(state.drugParticles.length<40){
        for(let i=0;i<3;i++)state.drugParticles.push({x:targetCancer.x,y:targetCancer.y,vx:rand(-2,2),vy:rand(-2,2),life:1});
      }
      state.drugParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.008;
      if(p.life>0){ctx.fillStyle=`rgba(74,222,128,${p.life})`;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill()}});
      state.drugParticles=state.drugParticles.filter(p=>p.life>0);
      targetCancer.alive=false;
    }
    // labels
    ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(W-160,10,150,50);
    ctx.fillStyle='#444';ctx.font='17px sans-serif';ctx.textAlign='left';
    ctx.fillText('🟢 正常细胞（无受体）',W-155,28);
    ctx.fillText('🔴 癌细胞（有受体突起）',W-155,46);
    renderPanel();
  }
  draw();
}

/* ===== LEVEL 5: BLOOD-BRAIN BARRIER ===== */
function setupUI5(area){
  let h='<div class="hint-box">💡 调节纳米机器人参数，尝试穿越血脑屏障</div>';
  h+=`<div class="slider-wrap"><label>尺寸: <span class="slider-val">${state.bbbSize||200}nm</span></label>
  <input type="range" min="10" max="500" value="${state.bbbSize||200}" oninput="state.bbbSize=+this.value;markDirty()"></div>`;
  h+=`<div style="font-size:11px;color:#aaa;margin:4px 0">表面电荷:</div><div class="sel-row">`;
  ['正电荷','中性','负电荷'].forEach((n,i)=>{h+=`<span class="sel-btn${state.bbbCharge===i?' active':''}" onclick="state.bbbCharge=${i};markDirty()">${n}</span>`});
  h+=`</div>`;
  h+=`<div style="font-size:11px;color:#aaa;margin:4px 0">表面修饰:</div><div class="sel-row">`;
  ['PEG','转铁蛋白','载脂蛋白'].forEach((n,i)=>{h+=`<span class="sel-btn${state.bbbCoat===i?' active':''}" onclick="state.bbbCoat=${i};markDirty()">${n}</span>`});
  h+=`</div>`;
  h+=`<button class="act-btn" onclick="tryBBB()">🧪 尝试穿越</button>`;
  if(state.bbbResult)h+=`<div class="hint-box" style="color:${state.bbbResult.ok?'#4ade80':'#f87171'}">${state.bbbResult.msg}</div>`;
  area.innerHTML=h;
}
function tryBBB(){
  if(!state.bbbSize)state.bbbSize=200;
  const ok=state.bbbSize<100&&state.bbbCoat===1;
  if(!ok&&!state.bbbFailed){state.bbbFailed=true;completeObj(4,0)}
  if(ok&&!state.bbbFoundParams){state.bbbFoundParams=true;completeObj(4,1)}
  state.bbbResult={ok,msg:ok?'✅ 穿越成功！<100nm + 转铁蛋白修饰 = 受体介导胞吞':'❌ 穿越失败！'+
    (state.bbbSize>=100?'尺寸太大(需<100nm) ':'')+(state.bbbCoat!==1?'需要转铁蛋白修饰':'')};
  state.bbbAnim=ok?'success':'fail';state.bbbAnimT=0;
  if(ok){completeObj(4,2);checkLevelDone()}
  markDirty();
}
function initL5(){
  state.bbbSize=200;state.bbbCharge=1;state.bbbCoat=0;state.bbbFailed=false;state.bbbFoundParams=false;state.bbbAnim=null;state.bbbAnimT=0;
  let t=0;
  function draw(){
    animId=requestAnimationFrame(draw);t+=0.016;drawBg();
    const wallY=H*0.5;
    // brain side (top)
    ctx.fillStyle='rgba(30,20,50,0.4)';ctx.fillRect(0,0,W,wallY-30);
    ctx.fillStyle='#444';ctx.font='18px sans-serif';ctx.textAlign='center';ctx.fillText('🧠 大脑侧',W/2,30);
    // blood side (bottom)
    ctx.fillStyle='rgba(60,10,10,0.3)';ctx.fillRect(0,wallY+30,W,H-wallY-30);
    ctx.fillStyle='#888';ctx.fillText('🩸 血液侧',W/2,H-20);
    // BBB wall - tight endothelial cells
    for(let x=0;x<W;x+=50){
      ctx.fillStyle='#4a3a2a';ctx.fillRect(x,wallY-25,48,50);
      ctx.strokeStyle='#6a5a4a';ctx.lineWidth=1;ctx.strokeRect(x,wallY-25,48,50);
      // tight junction markers
      ctx.fillStyle='#f59e0b';ctx.fillRect(x+46,wallY-20,6,40);
    }
    ctx.fillStyle='#444';ctx.font='17px sans-serif';ctx.fillText('血脑屏障（紧密连接的内皮细胞）',W/2,wallY+40);
    // nanobot trying to cross
    if(state.bbbAnim){
      state.bbbAnimT+=0.016;
      const nx=W/2,startY=H*0.75;
      const progress=clamp(state.bbbAnimT*0.8,0,1);
      let ny;
      if(state.bbbAnim==='success'){
        ny=startY-(startY-H*0.2)*progress;
        // success glow
        if(progress>0.5){const grd=ctx.createRadialGradient(nx,ny,0,nx,ny,30);grd.addColorStop(0,'rgba(74,222,128,0.5)');grd.addColorStop(1,'transparent');ctx.fillStyle=grd;ctx.fillRect(nx-30,ny-30,60,60)}
      }else{
        ny=startY-(startY-wallY)*Math.min(progress*2,1);
        if(progress>0.5)ny=wallY+(progress-0.5)*60;// bounce back
        if(progress>0.5){ctx.fillStyle='rgba(239,68,68,0.3)';ctx.font='bold 16px sans-serif';ctx.fillText('✗ 被阻挡',nx,ny-30)}
      }
      // draw nanobot
      const sz=clamp((state.bbbSize||200)/20,2,15);
      const grd=ctx.createRadialGradient(nx,ny,0,nx,ny,sz+10);grd.addColorStop(0,'rgba(96,165,250,0.5)');grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd;ctx.fillRect(nx-sz-10,ny-sz-10,sz*2+20,sz*2+20);
      ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(nx,ny,sz,0,Math.PI*2);ctx.fill();
      // coating indicator
      if(state.bbbCoat===1){ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.beginPath();ctx.arc(nx,ny,sz+4,0,Math.PI*2);ctx.stroke()}
    }
    // param display
    ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(10,60,180,80);
    ctx.fillStyle='#444';ctx.font='17px sans-serif';ctx.textAlign='left';
    ctx.fillText(`尺寸: ${state.bbbSize||200}nm`,16,78);
    ctx.fillText(`电荷: ${['正','中性','负'][state.bbbCharge||1]}`,16,94);
    ctx.fillText(`修饰: ${['PEG','转铁蛋白','载脂蛋白'][state.bbbCoat||0]}`,16,110);
    ctx.fillText(`条件: <100nm + 转铁蛋白`,16,126);
    renderPanel();
  }
  draw();
}

/* ===== LEVEL 6: NANO SURGERY ===== */
function setupUI6(area){
  const pct=state.plaqueRemoved||0;const flow=state.bloodFlow||20;
  area.innerHTML=`<div class="hint-box">💡 按住鼠标在黄色斑块上拖动切割<br>注意不要切到红色血管壁！</div>
  <div style="font-size:11px;color:var(--text-muted);margin:6px 0">斑块清除: <span style="color:${pct>=50?'#4ade80':'#f87171'}">${pct.toFixed(0)}%</span></div>
  <div style="font-size:11px;color:var(--text-muted)">血流量: <span style="color:${flow>=80?'#4ade80':'#f87171'}">${flow.toFixed(0)}%</span></div>
  <div style="width:100%;height:12px;background:var(--stage-bar);border-radius:6px;margin:4px 0;overflow:hidden">
  <div style="width:${flow}%;height:100%;background:${flow>=80?'#22c55e':'#ef4444'};border-radius:6px;transition:width 0.3s"></div></div>`;
}
function initL6(){
  state.plaqueRemoved=0;state.bloodFlow=20;state.cutting=false;state.wallHits=0;
  // plaque grid
  const plaqueW=Math.floor(W*0.6),plaqueH=80;
  const plaqueX0=W*0.2,plaqueY0=H*0.55;
  const grid=[];const cols=Math.floor(plaqueW/8),rows=Math.floor(plaqueH/8);
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)grid.push({x:plaqueX0+c*8,y:plaqueY0+r*8,alive:true});
  const totalCells=grid.length;
  let t=0;
  function draw(){
    animId=requestAnimationFrame(draw);t+=0.016;drawBg();
    // blood vessel
    const wallTop=H*0.3,wallBot=H*0.7;
    ctx.fillStyle='#3a0a0a';ctx.fillRect(0,0,W,wallTop);ctx.fillRect(0,wallBot,W,H-wallBot);
    ctx.strokeStyle='#8b0000';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(0,wallTop);ctx.lineTo(W,wallTop);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,wallBot);ctx.lineTo(W,wallBot);ctx.stroke();
    // plaque
    grid.forEach(cell=>{
      if(!cell.alive)return;
      ctx.fillStyle=`rgba(200,180,60,${0.6+Math.sin(t+cell.x*0.1)*0.1})`;
      ctx.fillRect(cell.x,cell.y,7,7);
    });
    // plaque border glow
    ctx.strokeStyle='rgba(200,180,60,0.3)';ctx.lineWidth=2;
    ctx.strokeRect(plaqueX0-2,plaqueY0-2,plaqueW+4,plaqueH+4);
    // blood flow arrows
    const flowSpeed=state.bloodFlow/100;
    for(let i=0;i<15;i++){
      const fx=(i*80+t*60*flowSpeed)%W;const fy=wallTop+20+((i*37)%(wallBot-wallTop-40));
      ctx.fillStyle=`rgba(200,50,50,${0.1+flowSpeed*0.2})`;
      ctx.beginPath();ctx.moveTo(fx+8,fy);ctx.lineTo(fx-4,fy-3);ctx.lineTo(fx-4,fy+3);ctx.fill();
    }
    // cursor / nanobot tool
    if(mouseY>0){
      const grd=ctx.createRadialGradient(mouseX,mouseY,0,mouseX,mouseY,15);
      grd.addColorStop(0,'rgba(96,165,250,0.6)');grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd;ctx.fillRect(mouseX-15,mouseY-15,30,30);
      ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(mouseX,mouseY,4,0,Math.PI*2);ctx.fill();
      // cutting beam
      if(mouseDown){
        ctx.strokeStyle='rgba(96,165,250,0.6)';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(mouseX,mouseY);ctx.lineTo(mouseX+Math.cos(t*10)*8,mouseY+Math.sin(t*10)*8);ctx.stroke();
        // check wall hit
        if(mouseY<wallTop+15||mouseY>wallBot-15){
          state.wallHits++;
          ctx.fillStyle='rgba(255,0,0,0.3)';ctx.fillRect(0,0,W,H);
        }
        // cut plaque
        grid.forEach(cell=>{
          if(!cell.alive)return;
          if(Math.abs(mouseX-cell.x-4)<12&&Math.abs(mouseY-cell.y-4)<12){
            cell.alive=false;
            if(!state.cutting){state.cutting=true;completeObj(5,0)}
          }
        });
        const removed=grid.filter(c=>!c.alive).length;
        state.plaqueRemoved=(removed/totalCells)*100;
        state.bloodFlow=20+state.plaqueRemoved*0.8;
        if(state.plaqueRemoved>=50)completeObj(5,1);
        if(state.bloodFlow>=80){completeObj(5,2);checkLevelDone()}
        markDirty();
      }
    }
    // flow meter
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(W-120,wallTop+10,100,20);
    ctx.fillStyle=state.bloodFlow>=80?'#22c55e':'#ef4444';
    ctx.fillRect(W-120,wallTop+10,state.bloodFlow,20);
    ctx.fillStyle=themeLabel();ctx.font='16px sans-serif';ctx.textAlign='center';
    ctx.fillText(`血流 ${state.bloodFlow.toFixed(0)}%`,W-70,wallTop+24);
    renderPanel();
  }
  draw();
}

/* ===== LEVEL 7: SWARM ===== */
function setupUI7(area){
  let h='<div class="hint-box">💡 释放纳米机器人集群，设定行为模式攻击肿瘤</div>';
  if(!state.swarmReleased){
    h+=`<button class="act-btn" onclick="releaseSwarm()">🐜 释放1000个纳米机器人</button>`;
  }else{
    h+=`<div style="font-size:11px;color:#aaa;margin:4px 0">行为模式:</div><div class="sel-row">`;
    ['趋化','包围','攻击'].forEach((n,i)=>{
      const enabled=i===0||(i===1&&state.swarmPhase>=1)||(i===2&&state.swarmPhase>=2);
      h+=`<span class="sel-btn${state.swarmMode===i?' active':''}${!enabled?' disabled':''}" onclick="${enabled?`setSwarmMode(${i})`:'void(0)'}" style="${!enabled?'opacity:0.4;cursor:not-allowed':''}">${n}</span>`;
    });
    h+=`</div>`;
    h+=`<div style="font-size:11px;color:var(--text-muted);margin:4px 0">机器人数: ${state.bots?state.bots.length:0} | 肿瘤HP: ${Math.max(0,(state.tumorHP||100)).toFixed(0)}%</div>`;
  }
  area.innerHTML=h;
}
function releaseSwarm(){
  state.swarmReleased=true;state.swarmMode=0;state.swarmPhase=0;
  state.bots=[];
  for(let i=0;i<200;i++){
    state.bots.push({x:rand(20,100),y:rand(H*0.3,H*0.7),vx:rand(0.5,2),vy:rand(-1,1)});
  }
  completeObj(6,0);markDirty();
}
function setSwarmMode(m){state.swarmMode=m;markDirty()}
function initL7(){
  state.swarmReleased=false;state.swarmMode=0;state.swarmPhase=0;state.tumorHP=100;state.bots=[];state.drugParts7=[];
  // tumor shape (irregular polygon)
  const tcx=W*0.65,tcy=H*0.5,tr=80;
  const tumorPts=[];for(let i=0;i<12;i++){const a=i*Math.PI*2/12;tumorPts.push({x:tcx+Math.cos(a)*(tr+rand(-20,20)),y:tcy+Math.sin(a)*(tr+rand(-20,20))})}
  let t=0,surroundTimer=0;
  function pointInTumor(px,py){
    let inside=false;
    for(let i=0,j=tumorPts.length-1;i<tumorPts.length;j=i++){
      const xi=tumorPts[i].x,yi=tumorPts[i].y,xj=tumorPts[j].x,yj=tumorPts[j].y;
      if((yi>py)!==(yj>py)&&px<(xj-xi)*(py-yi)/(yj-yi)+xi)inside=!inside;
    }return inside;
  }
  function draw(){
    animId=requestAnimationFrame(draw);t+=0.016;drawBg();
    // body tissue bg
    ctx.fillStyle='rgba(20,10,30,0.3)';ctx.fillRect(0,0,W,H);
    for(let i=0;i<20;i++){ctx.fillStyle='rgba(40,20,60,0.2)';ctx.beginPath();
    ctx.arc(((i*97)%W),((i*73)%H),30+Math.sin(t+i)*5,0,Math.PI*2);ctx.fill()}
    // tumor
    const hp=state.tumorHP||100;
    if(hp>0){
      ctx.fillStyle=`rgba(180,30,30,${0.3+hp/200})`;ctx.beginPath();ctx.moveTo(tumorPts[0].x,tumorPts[0].y);
      tumorPts.forEach(p=>ctx.lineTo(p.x+Math.sin(t*2+p.x*0.1)*3,p.y+Math.cos(t*2+p.y*0.1)*3));
      ctx.closePath();ctx.fill();
      ctx.strokeStyle=`rgba(239,68,68,${0.5+hp/200})`;ctx.lineWidth=2;ctx.stroke();
      // tumor veins
      for(let i=0;i<6;i++){ctx.strokeStyle='rgba(100,20,20,0.3)';ctx.lineWidth=1;ctx.beginPath();
      ctx.moveTo(tcx,tcy);ctx.quadraticCurveTo(tcx+rand(-40,40),tcy+rand(-40,40),tumorPts[i*2].x,tumorPts[i*2].y);ctx.stroke()}
      ctx.fillStyle=themeLabel();ctx.font='17px sans-serif';ctx.textAlign='center';ctx.fillText(`肿瘤 HP:${hp.toFixed(0)}%`,tcx,tcy);
    }else{
      ctx.fillStyle='rgba(100,100,100,0.2)';ctx.beginPath();ctx.arc(tcx,tcy,30,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#4ade80';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText('✓ 已消灭',tcx,tcy+5);
    }
    // bots
    if(state.bots){
      const bots=state.bots;
      bots.forEach(b=>{
        // behavior
        if(state.swarmMode===0){// chemotaxis - move toward tumor
          const dx=tcx-b.x,dy=tcy-b.y,d=Math.hypot(dx,dy);
          if(d>5){b.vx+=(dx/d)*0.15;b.vy+=(dy/d)*0.15}
        }else if(state.swarmMode===1){// surround
          const dx=tcx-b.x,dy=tcy-b.y,d=Math.hypot(dx,dy);
          const targetD=tr+15;
          if(d>targetD+5){b.vx+=(dx/d)*0.2;b.vy+=(dy/d)*0.2}
          else if(d<targetD-5){b.vx-=(dx/d)*0.2;b.vy-=(dy/d)*0.2}
          // orbit
          b.vx+=(-dy/d)*0.1;b.vy+=(dx/d)*0.1;
        }else{// attack - move into tumor
          const dx=tcx-b.x+rand(-20,20),dy=tcy-b.y+rand(-20,20),d=Math.hypot(dx,dy);
          if(d>5){b.vx+=(dx/d)*0.25;b.vy+=(dy/d)*0.25}
        }
        // separation from neighbors
        bots.forEach(other=>{if(other===b)return;
          const sx=b.x-other.x,sy=b.y-other.y,sd=Math.hypot(sx,sy);
          if(sd<12&&sd>0){b.vx+=sx/sd*0.3;b.vy+=sy/sd*0.3}
        });
        b.vx*=0.92;b.vy*=0.92;b.x+=b.vx;b.y+=b.vy;
        b.x=clamp(b.x,5,W-5);b.y=clamp(b.y,5,H-5);
        // draw
        const grd=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,6);
        grd.addColorStop(0,'rgba(96,165,250,0.7)');grd.addColorStop(1,'transparent');
        ctx.fillStyle=grd;ctx.fillRect(b.x-6,b.y-6,12,12);
        ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(b.x,b.y,2,0,Math.PI*2);ctx.fill();
      });
      // check surround
      if(state.swarmMode===1&&state.swarmPhase<2){
        let nearCount=0;
        bots.forEach(b=>{const d=dist(b.x,b.y,tcx,tcy);if(d<tr+30&&d>tr-10)nearCount++});
        if(nearCount>bots.length*0.5){surroundTimer+=0.016;
        if(surroundTimer>1.5){state.swarmPhase=2;completeObj(6,1);markDirty()}}
      }
      // attack damage
      if(state.swarmMode===2&&hp>0){
        let inTumor=0;
        bots.forEach(b=>{if(pointInTumor(b.x,b.y))inTumor++});
        if(inTumor>10)state.tumorHP=Math.max(0,(state.tumorHP||100)-0.15);
        // drug particles
        if(Math.random()<0.1&&inTumor>5){
          state.drugParts7.push({x:tcx+rand(-40,40),y:tcy+rand(-40,40),life:1});
        }
        if(state.tumorHP<=0){completeObj(6,2);checkLevelDone()}
        markDirty();
      }
    }
    // drug particles
    if(state.drugParts7){
      state.drugParts7.forEach(p=>{p.life-=0.01;
      if(p.life>0){ctx.fillStyle=`rgba(74,222,128,${p.life*0.6})`;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill()}});
      state.drugParts7=state.drugParts7.filter(p=>p.life>0);
    }
    // add more bots over time
    if(state.swarmReleased&&state.bots.length<1000&&t%0.05<0.02){
      state.bots.push({x:rand(10,60),y:rand(H*0.3,H*0.7),vx:rand(1,3),vy:rand(-1,1)});
    }
    // auto advance swarm phase
    if(state.swarmReleased&&state.swarmPhase===0){
      let nearCount=0;state.bots.forEach(b=>{if(dist(b.x,b.y,tcx,tcy)<tr*2)nearCount++});
      if(nearCount>state.bots.length*0.6){state.swarmPhase=1;markDirty()}
    }
    renderPanel();
  }
  draw();
}

/* ===== START ===== */
loadLevel(0);
function goLevel(i){loadLevel(i)}

// === 总分总认知结构增强 ===
// 延迟重新渲染确保增强生效
(function(){
  // 自动检测关卡名称
  function _getNames(){
    if(typeof levelNames!=='undefined')return levelNames.slice();
    if(typeof LN!=='undefined')return LN.slice();
    if(typeof levels!=='undefined'&&Array.isArray(levels))return levels.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    if(typeof LEVELS!=='undefined'&&Array.isArray(LEVELS))return LEVELS.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    return [];
  }
  function _getTotal(){return _getNames().length||7;}
  function _getCur(){
    if(typeof currentLevel!=='undefined')return currentLevel;
    if(typeof curLevel!=='undefined')return curLevel;
    if(typeof curLv!=='undefined')return curLv;
    return 0;
  }
  function _getObjs(){
    if(typeof levelObjs!=='undefined')return levelObjs;
    return null;
  }
  function _isDone(i){
    if(typeof quizPassed!=='undefined')return quizPassed.has(i);
    var o=_getObjs();
    if(o&&o[i])return o[i].every(function(v){return v;});
    if(typeof completedLevels!=='undefined')return completedLevels.has(i);
    return false;
  }
  function _countDone(){
    var o=_getObjs(),d=0,t=0;
    if(o){for(var i=0;i<o.length;i++)for(var j=0;j<o[i].length;j++){t++;if(o[i][j])d++;}}
    else if(typeof completedLevels!=='undefined'){d=completedLevels.size;t=_getTotal();}
    return{done:d,total:t};
  }

  // 1. 开头路线图
  window._buildRoadmap=function(){
    var c=document.getElementById('roadmap-container');
    if(!c)return;
    var names=_getNames();
    if(!names.length)return;
    var h='<div class="roadmap"><div class="roadmap-title">\u{1F4CD} \u5B66\u4E60\u8DEF\u7EBF\u56FE</div>';
    for(var i=0;i<names.length;i++){
      h+='<div class="roadmap-item"><div class="roadmap-num">'+(i+1)+'</div><span>'+names[i]+'</span></div>';
    }
    h+='</div>';
    c.innerHTML=h;
  };
  try{window._buildRoadmap();}catch(e){}

  // 2. 阶段导航
  window._stageNavHTML=function(){
    var names=_getNames(),total=names.length;
    if(!total)return '';
    var cur=_getCur(),s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):0;
    var h='<div class="stage-nav"><div class="sn-bar">';
    for(var i=0;i<total;i++){
      var unlocked=i===0||(typeof quizPassed!=='undefined'&&quizPassed.has(i-1));
      var cls=_isDone(i)?'done':i===cur?'cur':unlocked?'':'locked';
      var click=unlocked?'typeof goLevel===\'function\'&&goLevel('+i+')':'';
      h+='<div class="sn-d '+cls+'" onclick="'+click+'"></div>';
    }
    h+='</div>';
    h+='<div class="sn-info">\u{1F4CD} \u7B2C'+(cur+1)+'/'+total+'\u5173 | \u8FDB\u5EA6 '+pct+'%</div>';
    if(typeof quizPassed!=='undefined')h+='<div class="sn-hint">'+quizPassed.size+'/'+total+' 已通关，完成目标后答对测验才解锁下一关</div>';

    h+='</div>';
    return h;
  };

  // 3. 通关总结
  window._summaryHTML=function(){
    var names=_getNames(),total=names.length;
    var s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):100;
    var h='<div class="summary-box">';
    h+='<div class="summary-title">\u{1F3C6} \u606D\u559C\u901A\u5173\uFF01</div>';
    h+='<div class="summary-sub">\u4F60\u5DF2\u5B8C\u6210\u5168\u90E8 '+total+' \u4E2A\u5173\u5361\u7684\u5B66\u4E60</div>';
    h+='<div class="summary-stats">';
    h+='<div class="summary-stat"><div class="num">'+total+'</div><div class="label">\u5173\u5361\u5B8C\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+s.done+'</div><div class="label">\u76EE\u6807\u8FBE\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+pct+'%</div><div class="label">\u77E5\u8BC6\u638C\u63E1</div></div>';
    h+='</div>';
    h+='<div class="summary-keys"><div style="font-weight:bold;color:#4f46e5;margin-bottom:6px">\u{1F4DA} \u5173\u952E\u77E5\u8BC6\u56DE\u987E</div>';
    for(var i=0;i<total;i++){h+='<div>\u2705 '+names[i]+'</div>';}
    h+='</div></div>';
    return h;
  };

  // 4. 增强 renderPanel - monkey-patch
  if(typeof window.renderPanel==='function'){
    var _origRP=window.renderPanel;
    window.renderPanel=function(){
      _origRP.apply(this,arguments);
      // 在 panel 顶部插入阶段导航
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
  // 也处理全局 renderPanel
  if(typeof renderPanel==='function'&&!window._rpPatched){
    window._rpPatched=true;
    var _origRP2=renderPanel;
    renderPanel=function(){
      _origRP2.apply(this,arguments);
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
})();
try{renderPanel();}catch(e){}

</script>
