<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蛋白质折叠 - 交互式教育游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}


body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
canvas{display:block;position:absolute;top:0;left:320px}
.panel{position:absolute;top:0;left:0;width:320px;height:100%;background:var(--panel-bg);border-right:1px solid var(--panel-border);overflow-y:auto;z-index:10;padding:12px;box-sizing:border-box;padding-bottom:24px}
.level-btn{display:none!important}
.level-btn.active{display:none!important}
.level-btn.done{display:none!important}
.concept-box{background:var(--concept-bg);border:1px solid var(--concept-border);border-radius:8px;padding:10px;margin:8px 0;font-size:13px;line-height:1.7;color:var(--concept-text)}
.act-btn{display:block;width:100%;padding:10px;margin:4px 0;border-radius:8px;border:1px solid var(--btn-border);background:var(--btn-bg);color:var(--btn-text);font-size:15px;cursor:pointer;text-align:center}
.act-btn:hover{background:var(--btn-hover)}.act-btn:disabled{opacity:.4;cursor:not-allowed}
.act-btn.green{border-color:var(--btn-green-border);background:var(--btn-green-bg);color:var(--btn-green-text)}
.hint-box{background:var(--hint-bg);border:1px solid var(--hint-border);border-radius:8px;padding:8px;margin:8px 0;font-size:12px;color:var(--hint-text)}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:10px;padding:12px;margin:10px 0;font-size:14px;line-height:1.8;color:var(--learn-text)}
.slider-wrap{margin:8px 0}.slider-wrap label{font-size:11px;color:#888}
.slider-wrap input[type=range]{width:100%;margin-top:4px}.sv{color:var(--sv);font-weight:bold}
#infoBar{position:absolute;bottom:0;left:320px;right:0;height:36px;background:var(--bar-bg);border-top:1px solid var(--panel-border);display:flex;align-items:center;padding:0 16px;font-size:12px;color:#888;z-index:10}
.panel h3{color:var(--title-color);font-size:16px;margin:8px 0 4px}
.panel h4{color:#93c5fd;font-size:14px;margin:6px 0 2px}
.obj-item{font-size:12px;margin:2px 0;color:#a0a0c0}
.obj-item.done{color:#4ade80}
.aa-btn{display:inline-block;width:36px;height:36px;border-radius:50%;margin:2px;cursor:pointer;border:2px solid #333;font-size:9px;text-align:center;line-height:36px;font-weight:bold}
.seq-input{width:100%;padding:8px;margin:4px 0;border-radius:6px;border:1px solid #333;background:var(--concept-bg);color:#c0c0d0;font-family:monospace;font-size:12px}

.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
.overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center}
.overlay h1{font-size:42px;background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.overlay .sub{color:var(--text-sub);font-size:17px;margin-bottom:32px}
.overlay .start-btn{padding:14px 48px;font-size:18px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:transform .2s}
.overlay .start-btn:hover{transform:scale(1.05)}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.features .feat{text-align:center;color:var(--feat-text);font-size:12px;width:80px}
.features .feat .fi{font-size:26px;margin-bottom:4px}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="overlay" id="ov">
<h1>🧪 蛋白质折叠</h1>
<p class="sub">7 个交互关卡 — 从氨基酸到 AlphaFold</p>
<button class="start-btn" onclick="startGame()">开始探索</button>
<div class="features">
<div class="feat"><div class="fi">🔤</div>氨基酸</div>
<div class="feat"><div class="fi">🌀</div>二级结构</div>
<div class="feat"><div class="fi">💧</div>疏水坍缩</div>
<div class="feat"><div class="fi">⛰️</div>能量景观</div>
<div class="feat"><div class="fi">🛡️</div>分子伴侣</div>
<div class="feat"><div class="fi">☠️</div>朊病毒</div>
<div class="feat"><div class="fi">🤖</div>AlphaFold</div>
</div>
</div>
<div class="panel" id="panel"></div>
<canvas id="cv"></canvas>
<div id="infoBar">蛋白质折叠交互式教育游戏 | 共7关</div>
<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}}
function startGame(){document.getElementById('ov').style.display='none';}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const panel=document.getElementById('panel'),infoBar=document.getElementById('infoBar');
let W,H,curLevel=0,animId,time=0;
const completedLevels=new Set();
const AA_DATA=[
{name:'甘氨酸',code:'G',type:'hydrophilic',color:'#60a5fa'},
{name:'丙氨酸',code:'A',type:'hydrophobic',color:'#f97316'},
{name:'缬氨酸',code:'V',type:'hydrophobic',color:'#f97316'},
{name:'亮氨酸',code:'L',type:'hydrophobic',color:'#f97316'},
{name:'异亮氨酸',code:'I',type:'hydrophobic',color:'#f97316'},
{name:'脯氨酸',code:'P',type:'hydrophobic',color:'#f97316'},
{name:'苯丙氨酸',code:'F',type:'hydrophobic',color:'#f97316'},
{name:'色氨酸',code:'W',type:'hydrophobic',color:'#f97316'},
{name:'甲硫氨酸',code:'M',type:'hydrophobic',color:'#f97316'},
{name:'丝氨酸',code:'S',type:'hydrophilic',color:'#60a5fa'},
{name:'苏氨酸',code:'T',type:'hydrophilic',color:'#60a5fa'},
{name:'半胱氨酸',code:'C',type:'hydrophilic',color:'#60a5fa'},
{name:'酪氨酸',code:'Y',type:'hydrophilic',color:'#60a5fa'},
{name:'天冬酰胺',code:'N',type:'hydrophilic',color:'#60a5fa'},
{name:'谷氨酰胺',code:'Q',type:'hydrophilic',color:'#60a5fa'},
{name:'天冬氨酸',code:'D',type:'negative',color:'#ef4444'},
{name:'谷氨酸',code:'E',type:'negative',color:'#ef4444'},
{name:'赖氨酸',code:'K',type:'positive',color:'#22c55e'},
{name:'精氨酸',code:'R',type:'positive',color:'#22c55e'},
{name:'组氨酸',code:'H',type:'positive',color:'#22c55e'}
];
const levels=[
{name:'氨基酸 — 生命的字母表',concept:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>分子：</b>20种氨基酸（疏水/亲水/带电）</div>蛋白质由20种氨基酸组成。疏水氨基酸（橙色）倾向藏在蛋白质内部，亲水氨基酸（蓝色）喜欢待在表面与水接触，带电氨基酸（红/绿）形成盐桥稳定结构。',
 objs:['拖拽5个氨基酸到链上','包含至少1个疏水残基','包含至少1个带电残基'],
 learn:'人体约有2万种蛋白质，每种由几十到几千个氨基酸按特定顺序排列。氨基酸序列决定了蛋白质的三维结构和功能。'},
{name:'二级结构 — 氢键的力量',concept:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>结构：</b>α-螺旋（弹簧状）+ β-折叠（锯齿状）</div>蛋白质骨架上的N-H和C=O之间形成氢键，驱动局部折叠。规律的氢键模式产生α-螺旋（弹簧状）和β-折叠（锯齿状）两种经典二级结构。',
 objs:['形成α-螺旋','形成β-折叠','观察完整二级结构'],
 learn:'α-螺旋每圈3.6个残基，螺距0.54nm。β-折叠由多条链平行排列，氢键在链间形成。头发的角蛋白主要是α-螺旋，蜘蛛丝主要是β-折叠。'},
{name:'疏水坍缩 — 折叠的驱动力',concept:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>驱动力：</b>疏水残基逃离水环境 → 蛋白质坍缩折叠</div>疏水效应是蛋白质折叠最主要的驱动力。疏水残基为了逃离水环境而聚集到蛋白质内部，就像油滴在水中自发聚集一样，驱动蛋白质从展开链坍缩成紧凑球状。',
 objs:['开始疏水坍缩','疏水核心形成','蛋白质折叠完成'],
 learn:'疏水效应的本质是熵驱动：水分子围绕疏水基团形成有序"笼"结构（熵减少），疏水基团聚集后释放这些水分子，增加系统总熵。'},
{name:'能量景观 — 折叠漏斗',concept:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>模型：</b>漏斗状能量景观（高能展开态 → 低能天然态）</div>蛋白质折叠可以用能量景观来理解：一个漏斗状的能量面，蛋白质从高能量的展开态（漏斗边缘）沿多条路径滚向最低能量的天然态（漏斗底部）。',
 objs:['从3个不同起点释放小球','所有路径到达最低点','理解折叠漏斗理论'],
 learn:'Levinthal悖论：一个100残基的蛋白质如果随机搜索所有构象，需要10^80年。但实际折叠只需毫秒到秒级——因为能量景观是漏斗形的，不需要遍历所有构象。'},
{name:'分子伴侣 — 折叠助手',concept:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>工具：</b>GroEL/GroES 分子伴侣（折叠笼 + ATP）</div>有些蛋白质无法自行正确折叠，需要分子伴侣帮助。GroEL/GroES是最著名的分子伴侣：桶状的GroEL捕获错误折叠的蛋白质，盖上GroES帽子，在隔离环境中重新折叠。',
 objs:['捕获错误折叠蛋白','GroES封盖隔离','释放正确折叠蛋白'],
 learn:'GroEL/GroES被称为"分子折叠笼"，每个循环消耗7个ATP。细胞中约10-15%的蛋白质需要分子伴侣辅助折叠。热休克蛋白（HSP）也是重要的分子伴侣。'},
{name:'错误折叠 — 朊病毒传播',concept:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>病因：</b>朊病毒（Prion）— 错误折叠的传染性蛋白质</div>朊病毒（Prion）是一种错误折叠的蛋白质，它能像传染病一样将正常蛋白质"传染"为错误构象。这种链式反应导致蛋白质聚集，引发疯牛病、阿尔茨海默病等神经退行性疾病。',
 objs:['观察朊病毒接触正常蛋白','触发构象转变','链式传播形成聚集体'],
 learn:'朊病毒的发现者Stanley Prusiner因此获得1997年诺贝尔奖。阿尔茨海默病中的β-淀粉样蛋白和帕金森病中的α-突触核蛋白也有类似的错误折叠传播机制。'},
{name:'AlphaFold — AI预测结构',concept:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>技术：</b>AlphaFold2 — 氨基酸序列 → 3D 结构预测</div>DeepMind的AlphaFold2在2020年CASP14竞赛中以革命性精度预测蛋白质三维结构，解决了困扰生物学50年的蛋白质折叠问题。它从氨基酸序列直接预测原子级精度的3D结构。',
 objs:['输入氨基酸序列','AI分析完成','生成3D结构预测'],

function resetLevelState(){
 switch(curLevel){
  case 0:lState={chain:[],objDone:[false,false,false],selectedAA:null};break;
  case 1:lState={phase:0,helixAnim:0,sheetAnim:0,hbonds:[],showHelix:false,showSheet:false,objDone:[false,false,false]};break;
  case 2:lState={phase:0,collapseT:0,residues:[],waterMols:[],objDone:[false,false,false]};initHydrophobic();break;
  case 3:lState={balls:[],paths:[],startCount:0,arrived:0,objDone:[false,false,false]};break;
  case 4:lState={phase:0,captureT:0,foldT:0,releaseT:0,misfolded:true,objDone:[false,false,false]};break;
  case 5:lState={prions:[{x:0.3,y:0.5,bad:true}],normals:[],convertQueue:[],phase:0,spreadCount:0,objDone:[false,false,false]};initPrions();break;
  case 6:lState={seq:'',phase:0,scanT:0,predictT:0,buildT:0,rotAngle:0,objDone:[false,false,false]};break;
 }
}
function initHydrophobic(){
 lState.residues=[];
 const types=['hydrophobic','hydrophilic','hydrophobic','hydrophilic','negative','hydrophobic','positive','hydrophilic','hydrophobic','hydrophobic','hydrophilic','positive','hydrophobic','hydrophilic','hydrophobic'];
 for(let i=0;i<types.length;i++){
  lState.residues.push({x:0.1+i*0.055,y:0.5,type:types[i],tx:0,ty:0,ox:0.1+i*0.055,oy:0.5});
 }
 lState.waterMols=[];
 for(let i=0;i<60;i++)lState.waterMols.push({x:Math.random(),y:Math.random(),vx:(Math.random()-0.5)*0.001,vy:(Math.random()-0.5)*0.001});
}
function initPrions(){
 lState.normals=[];
 for(let i=0;i<12;i++){
  lState.normals.push({x:0.3+Math.random()*0.5,y:0.2+Math.random()*0.6,bad:false,converting:false,convertT:0});
 }
}

// Level 0 actions
function addAAToChain(idx){
 if(lState.chain.length>=5)return;
 lState.chain.push(AA_DATA[idx]);
 const c=lState.chain;
 if(c.length>=5&&!lState.objDone[0]){lState.objDone[0]=true;}
 if(c.some(a=>a.type==='hydrophobic')&&!lState.objDone[1]){lState.objDone[1]=true;}
 if(c.some(a=>a.type==='positive'||a.type==='negative')&&!lState.objDone[2]){lState.objDone[2]=true;}
 panelDirty=true;
}
// Level 1 actions
function startHelix(){lState.phase=1;lState.showHelix=true;lState.helixAnim=0;lState.objDone[0]=true;panelDirty=true;}
function startSheet(){lState.phase=2;lState.showSheet=true;lState.sheetAnim=0;lState.objDone[1]=true;panelDirty=true;}
// Level 2 actions
function startCollapse(){lState.phase=1;lState.objDone[0]=true;panelDirty=true;
 const cx=0.5,cy=0.5;
 lState.residues.forEach(r=>{
  if(r.type==='hydrophobic'){
   const a=Math.random()*Math.PI*2,d=0.05+Math.random()*0.06;
   r.tx=cx+Math.cos(a)*d;r.ty=cy+Math.sin(a)*d;
  }else{
   const a=Math.random()*Math.PI*2,d=0.15+Math.random()*0.05;
   r.tx=cx+Math.cos(a)*d;r.ty=cy+Math.sin(a)*d;
  }
 });
}
// Level 3 actions - click on canvas handled in mouse handler
// Level 4 actions
function startCapture(){lState.phase=1;lState.captureT=0;lState.objDone[0]=true;panelDirty=true;}
function startRelease(){lState.phase=3;lState.releaseT=0;panelDirty=true;}
// Level 5 actions
function startPrionSpread(){lState.phase=1;lState.objDone[0]=true;panelDirty=true;}
// Level 6 actions
function pickSeq(seq,name){lState.seq=seq;lState.seqName=name;panelDirty=true;}
function startAlphaFold(){
 const s=lState.seq.trim();
 if(s.length<5){alert('请输入至少5个氨基酸（单字母代码）');return;}
 lState.phase=1;lState.scanT=0;lState.predictT=0;lState.buildT=0;lState.objDone[0]=true;panelDirty=true;
}
// Mouse handling
cv.addEventListener('mousemove',e=>{mouseX=e.offsetX;mouseY=e.offsetY;});
cv.addEventListener('click',e=>{
 const mx=e.offsetX/W,my=e.offsetY/H;
 if(curLevel===3&&lState.startCount<3){
  // Click on funnel edge to release ball
  const funnelTop=0.15,funnelW=0.8;
  if(my<funnelTop+0.15&&my>funnelTop-0.05){
   lState.balls.push({x:mx,y:funnelTop,vx:0,vy:0,path:[{x:mx,y:funnelTop}],arrived:false,color:['#f97316','#60a5fa','#a855f7'][lState.startCount]});
   lState.startCount++;
   lState.objDone[0]=true;
   panelDirty=true;
  }
 }
});
// Update logic
function update(){
 time+=0.016;
 switch(curLevel){
 case 1:
  if(lState.showHelix&&lState.helixAnim<1)lState.helixAnim=Math.min(1,lState.helixAnim+0.01);
  if(lState.showSheet&&lState.sheetAnim<1){
   lState.sheetAnim=Math.min(1,lState.sheetAnim+0.01);
   if(lState.sheetAnim>=1&&!lState.objDone[2]){lState.objDone[2]=true;panelDirty=true;}
  }
  break;
 case 2:
  if(lState.phase===1){
   lState.collapseT=Math.min(1,lState.collapseT+0.005);
   lState.residues.forEach(r=>{
    r.x+=(r.tx-r.x)*0.02;r.y+=(r.ty-r.y)*0.02;
   });
   if(lState.collapseT>0.5&&!lState.objDone[1]){lState.objDone[1]=true;panelDirty=true;}
   if(lState.collapseT>=1&&!lState.objDone[2]){lState.objDone[2]=true;lState.phase=2;panelDirty=true;}
  }
  lState.waterMols.forEach(w=>{
   w.x+=w.vx;w.y+=w.vy;
   w.vx+=(Math.random()-0.5)*0.0005;w.vy+=(Math.random()-0.5)*0.0005;
   if(w.x<0||w.x>1)w.vx*=-1;if(w.y<0||w.y>1)w.vy*=-1;
  });
  break;
 case 3:
  lState.balls.forEach(b=>{
   if(b.arrived)return;
   const targetX=0.5,targetY=0.82;
   const dx=targetX-b.x,dy=targetY-b.y;
   const dist=Math.sqrt(dx*dx+dy*dy);
   if(dist<0.06){
    b.arrived=true;b.x=targetX;b.y=targetY;
    lState.arrived++;
    if(lState.arrived>=1&&!lState.objDone[1]){lState.objDone[1]=true;panelDirty=true;}
    if(lState.arrived>=3&&!lState.objDone[2]){lState.objDone[2]=true;panelDirty=true;}
    return;
   }
   // Funnel physics: strong gravity + center attraction
   b.vy+=0.001;
   b.vx+=(dx)*0.002;
   b.vy+=(dy)*0.001;
   // Less random near bottom
   const noise=Math.max(0.00005,0.0003*(1-(b.y-0.15)/0.67));
   b.vx+=(Math.random()-0.5)*noise;
   b.vx*=0.96;b.vy*=0.96;
   b.x+=b.vx;b.y+=b.vy;
   // Constrain to funnel shape
   const funnelProgress=(b.y-0.15)/0.67;
   const halfW=0.4*(1-funnelProgress*0.85);
   if(b.x<0.5-halfW)b.x=0.5-halfW;
   if(b.x>0.5+halfW)b.x=0.5+halfW;
   b.path.push({x:b.x,y:b.y});
  });
  break;
 case 4:
  if(lState.phase===1){
   lState.captureT=Math.min(1,lState.captureT+0.008);
   if(lState.captureT>=1){lState.phase=2;lState.foldT=0;lState.objDone[1]=true;panelDirty=true;}
  }
  if(lState.phase===2){lState.foldT=Math.min(1,lState.foldT+0.005);}
  if(lState.phase===3){
   lState.releaseT=Math.min(1,lState.releaseT+0.008);
   if(lState.releaseT>=1){lState.phase=4;lState.misfolded=false;lState.objDone[2]=true;panelDirty=true;}
  }
  break;
 case 5:
  if(lState.phase>=1){
   let anyConverting=false;
   lState.normals.forEach(n=>{
    if(n.bad||n.converting)return;
    // Check proximity to any bad prion
    const badOnes=[...lState.normals.filter(p=>p.bad),{x:lState.prions[0].x,y:lState.prions[0].y}];
    for(const b of badOnes){
     const dx=n.x-b.x,dy=n.y-b.y;
     if(Math.sqrt(dx*dx+dy*dy)<0.08){n.converting=true;n.convertT=0;break;}
    }
   });
   lState.normals.forEach(n=>{
    if(!n.converting||n.bad)return;
    anyConverting=true;
    n.convertT+=0.01;
    if(n.convertT>=1){
     n.bad=true;n.converting=false;
     lState.spreadCount++;
     if(lState.spreadCount>=1&&!lState.objDone[1]){lState.objDone[1]=true;panelDirty=true;}
     if(lState.spreadCount>=5&&!lState.objDone[2]){lState.objDone[2]=true;panelDirty=true;}
    }
   });
   // Move prion toward nearest normal
   if(lState.phase===1){
    const p=lState.prions[0];
    const nearest=lState.normals.filter(n=>!n.bad).sort((a,b)=>Math.hypot(a.x-p.x,a.y-p.y)-Math.hypot(b.x-p.x,b.y-p.y))[0];
    if(nearest){
     const dx=nearest.x-p.x,dy=nearest.y-p.y,d=Math.sqrt(dx*dx+dy*dy);
     if(d>0.01){p.x+=dx/d*0.001;p.y+=dy/d*0.001;}
    }
   }
  }
  break;
 case 6:
  if(lState.phase===1){
   lState.scanT=Math.min(1,lState.scanT+0.008);
   if(lState.scanT>=1){lState.phase=2;lState.objDone[1]=true;panelDirty=true;}
  }
  if(lState.phase===2){
   lState.predictT=Math.min(1,lState.predictT+0.006);
   if(lState.predictT>=1){lState.phase=3;lState.buildT=0;}
  }
  if(lState.phase===3){
   lState.buildT=Math.min(1,lState.buildT+0.005);
   if(lState.buildT>=1){lState.phase=4;lState.objDone[2]=true;panelDirty=true;}
  }
  if(lState.phase>=3)lState.rotAngle+=0.01;
  break;
 }
}
// Drawing helpers
function drawBall(x,y,r,color,label){
 ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
 const g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
 g.addColorStop(0,color+'cc');g.addColorStop(1,color+'44');
 ctx.fillStyle=g;ctx.fill();ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
 if(label){ctx.fillStyle=t().label;ctx.font=`bold ${Math.max(10,r*0.8)}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,x,y);}
}
function drawDashedLine(x1,y1,x2,y2,color){
 ctx.beginPath();ctx.setLineDash([4,4]);ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=color;ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
}
// Main draw
function draw(){
 ctx.fillStyle=t().bg1;ctx.fillRect(0,0,W,H);
 switch(curLevel){
 case 0:drawLevel0();break;
 case 1:drawLevel1();break;
 case 2:drawLevel2();break;
 case 3:drawLevel3();break;
 case 4:drawLevel4();break;
 case 5:drawLevel5();break;
 case 6:drawLevel6();break;
 }
}
function drawLevel0(){
 // Draw chain backbone
 const cx=W*0.5,cy=H*0.4,spacing=50;
 const startX=cx-(lState.chain.length-1)*spacing/2;
 // Title
 ctx.fillStyle='#444';ctx.font='20px sans-serif';ctx.textAlign='center';
 ctx.fillText('肽链构建区',cx,40);
 // Backbone line
 if(lState.chain.length>1){
  ctx.beginPath();ctx.moveTo(startX,cy);
  for(let i=1;i<lState.chain.length;i++)ctx.lineTo(startX+i*spacing,cy);
  ctx.strokeStyle='#ffffff44';ctx.lineWidth=3;ctx.stroke();
 }
 // Draw amino acids on chain
 lState.chain.forEach((aa,i)=>{
  drawBall(startX+i*spacing,cy,22,aa.color,aa.code);
  ctx.fillStyle='#444';ctx.font='16px sans-serif';ctx.textAlign='center';
  ctx.fillText(aa.name,startX+i*spacing,cy+38);
 });
 // Legend
 const ly=H-80;
 ctx.fillStyle='#444';ctx.font='18px sans-serif';ctx.textAlign='left';
 ctx.fillText('图例：',20,ly);
 drawBall(80,ly-4,8,'#f97316','');ctx.fillStyle='#f97316';ctx.fillText('疏水',95,ly);
 drawBall(150,ly-4,8,'#60a5fa','');ctx.fillStyle='#60a5fa';ctx.fillText('亲水',165,ly);
 drawBall(220,ly-4,8,'#ef4444','');ctx.fillStyle='#ef4444';ctx.fillText('负电',235,ly);
 drawBall(290,ly-4,8,'#22c55e','');ctx.fillStyle='#22c55e';ctx.fillText('正电',305,ly);
 // Empty slots
 for(let i=lState.chain.length;i<5;i++){
  ctx.beginPath();ctx.arc(startX+i*spacing,cy,22,0,Math.PI*2);
  ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#333';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText('空位',startX+i*spacing,cy+4);
 }
}
function drawLevel1(){
 const cx=W*0.5,cy=H*0.5;
 // Draw backbone
 ctx.fillStyle='#444';ctx.font='20px sans-serif';ctx.textAlign='center';
 ctx.fillText('蛋白质二级结构',cx,30);
 // Alpha helix on left
 const hx=W*0.28,hy=cy;
 ctx.fillStyle='#60a5fa44';ctx.font='19px sans-serif';ctx.textAlign='center';
 ctx.fillText('α-螺旋',hx,hy-160);
 if(lState.showHelix){
  const t=lState.helixAnim;
  const nTurns=4,pts=Math.floor(t*60);
  ctx.beginPath();
  for(let i=0;i<=pts;i++){
   const angle=i*0.2;
   const px=hx+Math.cos(angle)*40;
   const py=hy-120+i*4;
   if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.strokeStyle='#ffffff';ctx.lineWidth=2.5;ctx.stroke();
  // Draw residue balls on helix
  for(let i=0;i<pts;i+=5){
   const angle=i*0.2;

    var pct=s.total>0?Math.round(s.done/s.total*100):0;
    var h='<div class="stage-nav"><div class="sn-bar">';
    for(var i=0;i<total;i++){
      var cls=_isDone(i)?'done':i===cur?'cur':'';
      h+='<div class="sn-d '+cls+'" onclick="typeof goLevel===\'function\'&&goLevel('+i+')"></div>';
    }
    h+='</div>';
    h+='<div class="sn-info">\u{1F4CD} \u7B2C'+(cur+1)+'/'+total+'\u5173 | \u8FDB\u5EA6 '+pct+'%</div>';

    h+='</div>';
    return h;
  };

  // 3. 通关总结
  window._summaryHTML=function(){
    var names=_getNames(),total=names.length;
    var s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):100;
    var h='<div class="summary-box">';
    h+='<div class="summary-title">\u{1F3C6} \u606D\u559C\u901A\u5173\uFF01</div>';
    h+='<div class="summary-sub">\u4F60\u5DF2\u5B8C\u6210\u5168\u90E8 '+total+' \u4E2A\u5173\u5361\u7684\u5B66\u4E60</div>';
    h+='<div class="summary-stats">';
    h+='<div class="summary-stat"><div class="num">'+total+'</div><div class="label">\u5173\u5361\u5B8C\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+s.done+'</div><div class="label">\u76EE\u6807\u8FBE\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+pct+'%</div><div class="label">\u77E5\u8BC6\u638C\u63E1</div></div>';
    h+='</div>';
    h+='<div class="summary-keys"><div style="font-weight:bold;color:#4f46e5;margin-bottom:6px">\u{1F4DA} \u5173\u952E\u77E5\u8BC6\u56DE\u987E</div>';
    for(var i=0;i<total;i++){h+='<div>\u2705 '+names[i]+'</div>';}
    h+='</div></div>';
    return h;
  };

  // 4. 增强 renderPanel - monkey-patch
  if(typeof window.renderPanel==='function'){
    var _origRP=window.renderPanel;
    window.renderPanel=function(){
      _origRP.apply(this,arguments);
      // 在 panel 顶部插入阶段导航
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
  // 也处理全局 renderPanel
  if(typeof renderPanel==='function'&&!window._rpPatched){
    window._rpPatched=true;
    var _origRP2=renderPanel;
    renderPanel=function(){
      _origRP2.apply(this,arguments);
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
})();
try{renderPanel();}catch(e){}

</script>
</body>
</html>
