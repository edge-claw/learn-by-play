<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>比特币原理探险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}


body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro',sans-serif;overflow:hidden;height:100vh}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:var(--overlay-bg);display:flex;align-items:center;justify-content:center;z-index:50}
.overlay.hidden{display:none}
.start-box{text-align:center;max-width:560px}
.start-box h1{font-size:38px;margin-bottom:6px;letter-spacing:2px}
.start-box h1 .gold{color:#f7931a}
.start-box .sub{font-size:17px;color:var(--sub-color);margin-bottom:28px}
.start-btn{background:linear-gradient(135deg,#f7931a,#ffb347);color:#fff;border:none;padding:14px 52px;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;transition:transform .2s}
.start-btn:hover{transform:scale(1.05)}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:#aaa;font-size:12px;width:80px}
.feat .fi{font-size:26px;margin-bottom:4px}

/* 左面板 */
#lp{position:absolute;top:0;left:0;width:320px;height:100%;background:rgba(10,10,24,.97);border-right:1px solid var(--panel-border);z-index:20;display:none;flex-direction:column;overflow:hidden}
#lp .lp-head{padding:12px 16px;border-bottom:1px solid #1a1a3a;display:flex;align-items:center;justify-content:space-between}
#lp .lp-title{font-size:14px;font-weight:700;color:#f7931a}
#lp .lp-step{font-size:11px;color:#888}
#lp-body{flex:1;overflow-y:auto;padding:0}

.mission{margin:12px;padding:14px;background:#141428;border:1px solid #2a2a5a;border-radius:10px}
.mission .m-level{font-size:11px;color:#f7931a;font-weight:600;letter-spacing:1px}
.mission .m-title{font-size:17px;font-weight:700;margin:4px 0;color:#eee}
.mission .m-desc{font-size:13px;color:#999;line-height:1.6}
.mission .m-concept{margin-top:10px;padding:8px 10px;background:#0e0e20;border-radius:6px;font-size:12px;color:#6a8aff;line-height:1.6}
.mission .m-concept b{color:#8ab4ff}
.goal-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px}
.goal-row .g-icon{font-size:15px}
.goal-row .g-text{color:#ccc;flex:1}
.hint-b{margin:0 12px;padding:10px 14px;background:#1a1a38;border-left:3px solid #f7931a;border-radius:0 8px 8px 0;font-size:12px;color:#ffcc80;line-height:1.5}
.act-section{margin:12px}
.act-section .as-label{font-size:12px;color:#888;margin-bottom:8px;font-weight:600}
.act-btn{width:100%;padding:12px;background:linear-gradient(135deg,#f7931a,#ffb347);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:all .2s}
.act-btn:hover{filter:brightness(1.1)}
.act-btn:disabled{background:#333;color:#666;cursor:not-allowed;filter:none}
.act-btn.green{background:linear-gradient(135deg,#2aaa5a,#3cc76a)}
.act-btn.red{background:linear-gradient(135deg,#e8443a,#ff6b6b)}
.act-btn.blue{background:linear-gradient(135deg,#3a7aff,#5a9aff)}

/* 右侧信息 */
#info-bar{position:absolute;top:48px;right:12px;background:var(--bar-bg);border:1px solid #1a1a3a;border-radius:10px;padding:12px 16px;z-index:20;min-width:200px;display:none;font-size:12px}
#info-bar .ib-title{font-size:11px;color:#f7931a;font-weight:600;margin-bottom:6px}
.ib-row{display:flex;justify-content:space-between;padding:3px 0}
.ib-row .ib-k{color:#888}
.ib-row .ib-v{font-weight:600;font-variant-numeric:tabular-nums}

/* 交易日志 */
#tx-log{position:absolute;bottom:12px;right:12px;background:var(--panel-bg);border:1px solid #1a1a3a;border-radius:10px;padding:10px 14px;z-index:20;width:280px;max-height:200px;overflow-y:auto;display:none;font-size:11px}
#tx-log .tl-title{font-size:11px;color:#f7931a;font-weight:600;margin-bottom:4px}
.tx-entry{padding:3px 0;border-bottom:1px solid #1a1a3a15;color:#aaa}
.tx-entry .tx-hash{color:#6a8aff;font-family:monospace;font-size:10px}

/* 挖矿动画 */
#mine-box{position:absolute;bottom:12px;left:340px;background:var(--panel-bg);border:1px solid #f7931a55;border-radius:10px;padding:14px 18px;z-index:20;display:none;min-width:360px}
#mine-box .mb-title{font-size:13px;color:#f7931a;font-weight:600;margin-bottom:8px}
#mine-box .mb-target{font-size:12px;color:#888;margin-bottom:4px}
#mine-tries{font-family:monospace;font-size:11px;color:#666;max-height:100px;overflow-y:auto;line-height:1.6}
#mine-tries .try-fail{color:#ff4444}
#mine-tries .try-pass{color:#2aaa5a;font-weight:700}
#mine-progress{height:4px;background:var(--stage-bar);border-radius:2px;margin-top:8px}
#mine-progress-fill{height:100%;background:#f7931a;border-radius:2px;transition:width .3s}

/* 结果弹窗 */
.result-box{text-align:center;max-width:420px;background:var(--result-bg);border:1px solid var(--result-border);border-radius:16px;padding:28px 36px}
.result-box .rb-icon{font-size:48px;margin-bottom:10px}
.result-box .rb-title{font-size:22px;font-weight:700;margin-bottom:8px}
.result-box .rb-desc{font-size:13px;color:#999;line-height:1.6;margin-bottom:16px}
.result-box .rb-learn{text-align:left;background:#0e0e20;border-radius:8px;padding:12px 14px;font-size:12px;color:#8ab4ff;line-height:1.7;margin-bottom:16px}
.result-box .rb-learn b{color:#f7931a}
.result-box button{padding:10px 28px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin:0 6px}
.result-box .btn-next{background:#f7931a;color:#fff}
.result-box .btn-retry{background:var(--stage-bar);color:var(--text-sub)}

/* 测验 */
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:8px 12px}
.quiz-q{font-size:13px;color:var(--quiz-q);margin-bottom:8px;font-weight:600}
.quiz-opt{font-size:12px;color:#a0c0a0;padding:6px 8px;margin:3px 0;border-radius:6px;cursor:pointer;border:1px solid #1a3a1a;transition:all .2s}
.quiz-opt:hover{background:var(--quiz-opt-hover);border-color:var(--quiz-border)}
.quiz-opt.correct{background:var(--quiz-correct-bg);border-color:var(--quiz-correct-text);color:#4ade80;pointer-events:none}
.quiz-opt.wrong{background:var(--quiz-wrong-bg);border-color:var(--quiz-wrong-text);color:var(--quiz-wrong-text)}
.quiz-opt.disabled{pointer-events:none;opacity:.5}

/* 双花交易标记 */
.tx-double{color:#ff6b6b !important;border-color:#ff4444 !important;background:#1a0a0a !important}
.tx-double .g-text{color:#ff6b6b !important}

/* 粒子层 */
#particle-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}

.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#f7931a;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{margin-top:4px;color:var(--stage-hint);font-size:12px;line-height:1.45}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<canvas id="canvas"></canvas>
<canvas id="particle-canvas"></canvas>

<div class="overlay" id="startScreen">
<div class="start-box">
  <h1>₿ <span class="gold">比特币</span>原理探险</h1>
  <div class="sub">6 个关卡，亲手体验区块链核心技术</div>
<button class="start-btn" onclick="startGame()">开始探险</button>
  <div class="features">
    <div class="feat"><div class="fi">💰</div>交易</div>
    <div class="feat"><div class="fi">📦</div>区块</div>
    <div class="feat"><div class="fi">⛏️</div>挖矿</div>
    <div class="feat"><div class="fi">🔗</div>区块链</div>
    <div class="feat"><div class="fi">🌐</div>共识</div>
    <div class="feat"><div class="fi">🛡️</div>防篡改</div>
  </div>
</div>
</div>

<div class="overlay hidden" id="resultModal"><div class="result-box" id="resultBox"></div></div>

<div id="lp">
  <div class="lp-head"><span class="lp-title" id="lpTitle">第 1 关</span><span class="lp-step" id="lpStep">1/6</span></div>
  <div id="lp-body"></div>
</div>
<div id="info-bar"></div>
<div id="tx-log"><div class="tl-title">📜 交易记录</div><div id="tx-list"></div></div>
<div id="mine-box">
  <div class="mb-title">⛏️ 挖矿中...</div>
  <div class="mb-target" id="mineTarget"></div>
  <div id="mine-tries"></div>
  <div id="mine-progress"><div id="mine-progress-fill" style="width:0%"></div></div>
</div>

<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}}

// ============ 音效系统 (Web Audio API) ============
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playSound(type){
  try{initAudio()}catch(e){return}
  const o=audioCtx.createOscillator();const g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  const t=audioCtx.currentTime;
  if(type==='click'){o.frequency.value=800;g.gain.value=0.1;o.start(t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.stop(t+0.1)}
  else if(type==='success'){o.frequency.value=523;g.gain.value=0.15;o.start(t);o.frequency.setValueAtTime(659,t+0.1);o.frequency.setValueAtTime(784,t+0.2);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.stop(t+0.4)}
  else if(type==='fail'){o.frequency.value=300;g.gain.value=0.15;o.start(t);o.frequency.setValueAtTime(200,t+0.15);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.stop(t+0.3)}
  else if(type==='boom'){const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.3,audioCtx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*5);const s=audioCtx.createBufferSource();s.buffer=buf;const g2=audioCtx.createGain();g2.gain.value=0.2;s.connect(g2);g2.connect(audioCtx.destination);s.start()}
}

// ============ 粒子庆祝系统 ============
const pCanvas=document.getElementById('particle-canvas');
const pCtx=pCanvas.getContext('2d');
let particles=[];
function spawnParticles(cx,cy,count){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*4;
    particles.push({x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-2,life:1,color:`hsl(${40+Math.random()*20},100%,${50+Math.random()*30}%)`,size:2+Math.random()*3});
  }
}
function updateParticles(dt){
  const dpr=devicePixelRatio||1;
  pCanvas.width=window.innerWidth*dpr;pCanvas.height=window.innerHeight*dpr;
  pCtx.setTransform(dpr,0,0,dpr,0,0);
  pCtx.clearRect(0,0,window.innerWidth,window.innerHeight);
  for(let p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=dt*1.2;
    if(p.life>0){pCtx.globalAlpha=p.life;pCtx.fillStyle=p.color;pCtx.beginPath();pCtx.arc(p.x,p.y,p.size,0,Math.PI*2);pCtx.fill()}
  }
  pCtx.globalAlpha=1;
  particles=particles.filter(p=>p.life>0);
}

// ============ 关卡切换淡入 ============
let fadeAlpha=1;
let fadeTarget=1;

// ============ 屏幕震动 ============
let shakeAmount=0;
function triggerShake(amount){shakeAmount=amount}

// ============ 测验系统 ============
const QUIZZES=[
  {q:'比特币网络中，一笔交易需要发送给谁？',opts:['A. 银行','B. 所有节点','C. 收款人'],ans:1},
  {q:'区块中除了交易记录，还包含什么？',opts:['A. 矿工照片','B. 时间戳和前一区块哈希','C. 银行账号'],ans:1},
  {q:'挖矿本质上是在做什么？',opts:['A. 挖地下的币','B. 猜一个让哈希满足条件的数字','C. 破解密码'],ans:1},
  {q:'为什么篡改区块链很难？',opts:['A. 有密码保护','B. 修改一个区块会导致后续所有区块哈希失效','C. 数据加密了'],ans:1},
  {q:'当区块链出现分叉时，网络遵循什么规则？',opts:['A. 先到先得','B. 最长链规则','C. 投票决定'],ans:1},
  {q:'防止双花攻击的关键是什么？',opts:['A. 等待多个确认','B. 加密交易','C. 限制转账金额'],ans:0},
];
let quizPassedSet=new Set();
let completedLevels=new Set();
let quizCooldown=false;

function checkQuiz(levelIdx,chosen){
  if(quizCooldown)return;
  const quiz=QUIZZES[levelIdx];
  const opts=document.querySelectorAll(`#quiz-${levelIdx} .quiz-opt`);
  if(chosen===quiz.ans){
    opts[chosen].classList.add('correct');
    quizPassedSet.add(levelIdx);
    completedLevels.add(levelIdx);
    playSound('success');
    spawnParticles(160, 300, 30);
    setTimeout(()=>{ renderLevel(); }, 800);
  }else{
    opts[chosen].classList.add('wrong');
    opts[quiz.ans].classList.add('correct');
    playSound('fail');
    quizCooldown=true;
    setTimeout(()=>{
      opts[chosen].classList.remove('wrong');
      opts[quiz.ans].classList.remove('correct');
      quizCooldown=false;
    },1500);
  }
}

// ============ 工具函数 ============
function sha256Simple(str) {
  // 简化哈希：不是真 SHA256，但视觉效果一样
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 0x01000193); }
  const hex = (v) => ((v>>>0).toString(16)).padStart(8,'0');
  let h2 = h ^ (h >>> 16); h2 = Math.imul(h2, 0x45d9f3b); h2 ^= h2 >>> 16;
  let h3 = h2 ^ (h >>> 8); h3 = Math.imul(h3, 0x119de1f3);
  let h4 = h3 ^ h; h4 = Math.imul(h4, 0x16a6b885);
  return hex(h) + hex(h2) + hex(h3) + hex(h4) + hex(h^h4) + hex(h2^h3) + hex(h3^h4) + hex(h^h2);
}

function shortHash(s) { return sha256Simple(s).slice(0,16); }

// ============ 网络可视化 ============
function initNetwork() {
  nodes = [];
  edges = [];
  const cx = CW * 0.58, cy = CH * 0.45;
  const r = Math.min(CW, CH) * 0.28;
  const n = 8;
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    const jx = (Math.random() - 0.5) * r * 0.3;
    const jy = (Math.random() - 0.5) * r * 0.3;
    nodes.push({
      x: cx + Math.cos(angle) * r + jx,
      y: cy + Math.sin(angle) * r + jy,
      name: PEOPLE[i],
      isYou: i === 0,
      received: false,
      color: i === 0 ? '#f7931a' : '#3a7aff',
      pulse: 0,
    });
  }
  // 随机连接
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      if (Math.random() < 0.45 || j === i + 1 || (i === 0 && j === n - 1)) {
        edges.push({ a: i, b: j });
      }
    }
  }
}

function broadcast(fromIdx, color, msg) {
  const visited = new Set([fromIdx]);
  nodes[fromIdx].received = true;
  nodes[fromIdx].pulse = 1;
  const queue = [{ node: fromIdx, delay: 0 }];
  while (queue.length) {
    const cur = queue.shift();
    for (let e of edges) {
      let neighbor = -1;
      if (e.a === cur.node && !visited.has(e.b)) neighbor = e.b;
      if (e.b === cur.node && !visited.has(e.a)) neighbor = e.a;
      if (neighbor >= 0) {
        visited.add(neighbor);
        const d = cur.delay + 600 + Math.random() * 400;
        setTimeout(() => {
          nodes[neighbor].received = true;
          nodes[neighbor].pulse = 1;
          broadcasts.push({ from: nodes[cur.node], to: nodes[neighbor], progress: 0, color, msg });
        }, d);
        queue.push({ node: neighbor, delay: d });
      }
    }
  }
  return visited.size;
}

// ============ 渲染 ============
function resize() {
  const dpr = devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  CW = window.innerWidth; CH = window.innerHeight;
}

function draw() {
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, CW, CH);
  if (gameState !== 'playing') return;

  // 边
  for (let e of edges) {
    const a = nodes[e.a], b = nodes[e.b];
    ctx.strokeStyle = '#1a1a3a';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }

  // 广播动画
  for (let br of broadcasts) {
    const p = br.progress;
    const x = br.from.x + (br.to.x - br.from.x) * p;
    const y = br.from.y + (br.to.y - br.from.y) * p;
    ctx.fillStyle = br.color;
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = br.color + '30';
    ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI * 2); ctx.fill();
  }

  // 节点
  for (let nd of nodes) {
    // 脉冲
    if (nd.pulse > 0) {
      ctx.strokeStyle = nd.color + Math.floor(nd.pulse * 100).toString(16).padStart(2, '0');
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(nd.x, nd.y, 20 + (1 - nd.pulse) * 15, 0, Math.PI * 2); ctx.stroke();
    }
    // 节点圆
    const grad = ctx.createRadialGradient(nd.x, nd.y, 0, nd.x, nd.y, 16);
    grad.addColorStop(0, nd.color + 'cc');
    grad.addColorStop(1, nd.color + '44');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(nd.x, nd.y, 16, 0, Math.PI * 2); ctx.fill();
    // 你
    if (nd.isYou) {
      ctx.strokeStyle = '#f7931a';
      ctx.lineWidth = 2;
      ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.arc(nd.x, nd.y, 22, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
    }
    // 名字
    ctx.fillStyle = '#ccc';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(nd.isYou ? `${nd.name}(你)` : nd.name, nd.x, nd.y + 30);
    // 收到标记
    if (nd.received) {
      ctx.fillStyle = '#2aaa5a';
      ctx.font = '10px sans-serif';
      ctx.fillText('✓', nd.x + 18, nd.y - 14);
    }
  }

  // 区块链可视化
  if (blockchain.length > 0 || levelState.chain) {
    drawBlockchain();
  }
}

function drawBlockchain() {
  const chain = levelState.chain || blockchain;
  if (!chain || chain.length === 0) return;
  const startX = 380, startY = CH - 80;
  const bw = 100, bh = 50, gap = 30;

  ctx.fillStyle = '#ffffff08';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('区块链', startX, startY - bh - 10);

  for (let i = 0; i < chain.length; i++) {
    const bx = startX + i * (bw + gap);
    const by = startY - bh;
    const blk = chain[i];
    const broken = blk.broken || blk.tampered;

    // 连接箭头
    if (i > 0) {
      ctx.strokeStyle = broken ? '#ff444488' : '#f7931a55';
      ctx.lineWidth = 2;
      ctx.setLineDash(broken ? [4, 3] : []);
      ctx.beginPath();
      ctx.moveTo(bx - gap + 4, by + bh / 2);
      ctx.lineTo(bx - 4, by + bh / 2);
      ctx.stroke();
      ctx.setLineDash([]);
      // 箭头
      ctx.fillStyle = broken ? '#ff4444' : '#f7931a';
      ctx.beginPath();
      ctx.moveTo(bx - 4, by + bh / 2 - 5);
      ctx.lineTo(bx + 4, by + bh / 2);
      ctx.lineTo(bx - 4, by + bh / 2 + 5);
      ctx.fill();
    }

    // 区块
    ctx.fillStyle = broken ? '#2a0a0a' : '#141428';
    ctx.strokeStyle = broken ? '#ff4444' : blk.tampered ? '#ff6b6b' : '#f7931a55';
    ctx.lineWidth = broken ? 2 : 1;
    roundRect(ctx, bx, by, bw, bh, 6);
    ctx.fill();
    roundRect(ctx, bx, by, bw, bh, 6);
    ctx.stroke();

    ctx.fillStyle = broken ? '#ff6b6b' : '#eee';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`Block #${blk.id || i + 1}`, bx + bw / 2, by + 18);
    ctx.fillStyle = broken ? '#ff444488' : '#88888888';
    ctx.font = '9px monospace';
    ctx.fillText((blk.hash || '').slice(0, 10) + '...', bx + bw / 2, by + 34);

    if (broken) {
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 16px sans-serif';
      ctx.fillText('✗', bx + bw - 10, by + 14);
    }
  }

  // 分叉可视化
  if (levelState.forkChain) {
    const forkY = startY - bh - 60;
    const forkStartX = startX + (levelState.forkPoint || 2) * (bw + gap);
    ctx.fillStyle = '#ff444420';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('分叉（矿工B）' + (levelState.abandoned ? ' — 已抛弃' : ''), forkStartX, forkY - 8);

    for (let i = 0; i < levelState.forkChain.length; i++) {
      const bx = forkStartX + i * (bw + gap);
      const by = forkY;
      const blk = levelState.forkChain[i];
      const abandoned = levelState.abandoned;

      ctx.globalAlpha = abandoned ? 0.3 : 1;
      ctx.fillStyle = '#1a0a0a';
      ctx.strokeStyle = abandoned ? '#ff444444' : '#ff6b6b';
      ctx.lineWidth = 1;
      roundRect(ctx, bx, by, bw, bh, 6);
      ctx.fill();
      roundRect(ctx, bx, by, bw, bh, 6);
      ctx.stroke();

      ctx.fillStyle = abandoned ? '#ff444466' : '#ff6b6b';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(blk.label || `Fork #${i + 1}`, bx + bw / 2, by + 18);
      ctx.fillStyle = '#88888866';
      ctx.font = '9px monospace';
      ctx.fillText(blk.hash?.slice(0, 10) || 'abcdef1234', bx + bw / 2, by + 34);

      if (abandoned) {
        ctx.fillStyle = '#ff444488';
        ctx.font = '20px sans-serif';
        ctx.fillText('✗', bx + bw / 2, by + bh + 16);
      }
      ctx.globalAlpha = 1;

      // 连接线
      if (i === 0) {
        const fromX = forkStartX - gap / 2;
        const fromY = startY - bh / 2;
        ctx.strokeStyle = abandoned ? '#ff444433' : '#ff6b6b55';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(fromX, fromY);
        ctx.lineTo(fromX, by + bh / 2);
        ctx.lineTo(bx, by + bh / 2);
        ctx.stroke();
      } else {
        ctx.strokeStyle = abandoned ? '#ff444433' : '#ff6b6b55';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(bx - gap + 4, by + bh / 2);
        ctx.lineTo(bx - 4, by + bh / 2);
        ctx.stroke();
      }
    }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ============ 游戏逻辑 ============
function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('lp').style.display = 'flex';
  document.getElementById('info-bar').style.display = 'block';
  document.getElementById('tx-log').style.display = 'block';
  gameState = 'playing';
  playSound('success');
  fadeAlpha = 0; fadeTarget = 1;
  blockchain = [
    { id: 1, hash: sha256Simple('genesis'), prevHash: '0'.repeat(16), data: 'Genesis Block' },
  ];
  initNetwork();
  loadLevel(0);
}

function loadLevel(idx) {
  currentLevel = idx;
  const lv = LEVELS[idx];
  levelState = lv.init();
  miningActive = false;
  if (mineInterval) { clearInterval(mineInterval); mineInterval = null; }
  document.getElementById('mine-box').style.display = 'none';

  // 重置节点
  for (let nd of nodes) { nd.received = false; nd.pulse = 0; }
  broadcasts = [];

  document.getElementById('lpTitle').textContent = `${lv.icon} ${lv.title}`;
  document.getElementById('lpStep').textContent = `${lv.id} / ${LEVELS.length}`;
  renderLevel();
  updateInfoBar();
}

function renderLevel() {
  const lv = LEVELS[currentLevel];
  const el = document.getElementById('lp-body');
  const isLast = currentLevel >= LEVELS.length - 1;
  const qi = currentLevel;
  const quiz = QUIZZES[qi];
  const isReview = quizPassedSet.has(qi);
  const allDone = isReview || lv.goals.every(g => g.check(levelState));

  let h = renderStageNav();

  h += `
    <div class="mission">
      <div class="m-level">第 ${lv.id} 关</div>
      <div class="m-title">${lv.title}</div>
      <div class="m-desc">${lv.desc}</div>
      <div class="m-concept">${lv.concept.replace(/\n/g,'<br>')}</div>
      <div style="margin-top:10px">`;
  for (let g of lv.goals) {
    const pass = isReview || g.check(levelState);
    h += `<div class="goal-row"><span class="g-icon">${pass?'✅':'⬜'}</span><span class="g-text">${g.label}</span></div>`;
  }
  h += `</div></div>`;
  h += `<div class="hint-b">${lv.hint}</div>`;
  h += `<div class="act-section"><div class="as-label">🎮 操作</div>${lv.actions(levelState)}</div>`;

  // Inline quiz section
  if (allDone && quizPassedSet.has(qi)) {
    // Quiz passed: show summary + next button
    h += `<div class="quiz-box" style="margin:12px"><div style="color:var(--quiz-correct-text);font-weight:600;font-size:13px">✅ 测验已通过</div></div>`;
    h += `<div style="background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:8px;padding:10px 12px;margin:8px 12px;font-size:12px;color:var(--learn-text);line-height:1.7">${lv.learn}</div>`;
    if (isLast) {
      h += window._summaryHTML ? window._summaryHTML() : '';
      h += `<div class="act-section"><button class="act-btn" onclick="location.reload()">🔄 重新探险</button></div>`;
    } else {
      h += `<div class="act-section"><button class="act-btn green" onclick="nextLevel()">下一关 →</button></div>`;
    }
  } else if (allDone && !quizPassedSet.has(qi)) {
    // All goals done, show learn text + quiz inline
    h += `<div style="background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:8px;padding:10px 12px;margin:8px 12px;font-size:12px;color:var(--learn-text);line-height:1.7">${lv.learn}</div>`;
    h += `<div class="quiz-box" id="quiz-${qi}" style="margin:8px 12px">
      <div class="quiz-q">📝 小测验：${quiz.q}</div>
      ${quiz.opts.map((o,i)=>`<div class="quiz-opt" onclick="checkQuiz(${qi},${i})">${o}</div>`).join('')}
    </div>`;
  }

  el.innerHTML = h;
}

function canGoLevel(idx) {
  return idx >= 0 && idx < LEVELS.length && (idx === 0 || completedLevels.has(idx) || completedLevels.has(idx - 1));
}

function goLevel(idx) {
  if (!canGoLevel(idx)) return;
  fadeAlpha = 0; fadeTarget = 1;
  loadLevel(idx);
}

function renderStageNav() {
  const pct = Math.round(completedLevels.size / LEVELS.length * 100);
  let h = '<div class="stage-nav"><div class="sn-bar">';
  for (let i = 0; i < LEVELS.length; i++) {
    const cls = completedLevels.has(i) ? 'done' : (i === currentLevel ? 'cur' : (canGoLevel(i) ? '' : 'locked'));
    h += `<div class="sn-d ${cls}" onclick="goLevel(${i})"></div>`;
  }
  h += '</div>';
  h += `<div class="sn-info">📍 第${currentLevel + 1}/${LEVELS.length}关 | 进度 ${pct}%</div>`;
  h += `<div class="sn-hint">${completedLevels.size}/${LEVELS.length} 已通关，完成目标后答对测验才解锁下一关</div>`;
  h += '</div>';
  return h;
}

function updateInfoBar() {
  const lv = LEVELS[currentLevel];
  document.getElementById('info-bar').innerHTML = `
    <div class="ib-title">📡 网络状态</div>
    <div class="ib-row"><span class="ib-k">节点数</span><span class="ib-v">${nodes.length}</span></div>
    <div class="ib-row"><span class="ib-k">区块高度</span><span class="ib-v">${blockchain.length}</span></div>
    <div class="ib-row"><span class="ib-k">待处理交易</span><span class="ib-v">${pendingTxs.length}</span></div>
    <div class="ib-row"><span class="ib-k">当前关卡</span><span class="ib-v">${lv.id}/${LEVELS.length}</span></div>
  `;
}

function addTxLog(msg) {
  txLog.unshift(msg);
  if (txLog.length > 20) txLog.pop();
  const el = document.getElementById('tx-list');
  el.innerHTML = txLog.map(t => `<div class="tx-entry">${t}</div>`).join('');
}

// ============ 关卡动作 ============
function doAction(action, param) {
  const lv = LEVELS[currentLevel];

  if (action === 'sendTx') {
    levelState.txSent = 1;
    playSound('click');
    addTxLog(`💰 Alice → Bob 0.5 BTC <div class="tx-hash">${shortHash('alicebob'+Date.now())}</div>`);
    broadcast(0, '#f7931a', 'tx');
    setTimeout(() => {
      levelState.allReceived = nodes.every(n => n.received);
      renderLevel();
    }, 5000);
    renderLevel();
  }

  else if (action === 'toggleTx') {
    const picks = levelState.picks || [];
    const idx = picks.indexOf(param);
    if (idx >= 0) picks.splice(idx, 1); else picks.push(param);
    levelState.picks = picks;
    levelState.selectedTxs = picks.length;
    // 检测是否选中了双花交易
    const hasDouble = picks.includes(levelState.doubleIdx) && picks.includes(0);
    levelState.doubleIncluded = hasDouble;
    // 如果曾经选中又取消了双花交易，标记为已识别
    if (!picks.includes(levelState.doubleIdx) && levelState.selectedTxs > 0) {
      levelState.doubleRejected = true;
    }
    if (hasDouble) playSound('fail');
    else playSound('click');
    renderLevel();
  }

  else if (action === 'packBlock') {
    const picks = levelState.picks || [];
    // 阻止包含双花交易
    if (levelState.doubleIncluded) {
      playSound('fail');
      renderLevel();
      return;
    }
    levelState.doubleRejected = true; // 成功打包意味着排除了双花
    const txs = picks.map(i => levelState.availableTxs[i]);
    const prevHash = blockchain[blockchain.length - 1].hash;
    const timestamp = Date.now();
    const timeStr = new Date(timestamp).toLocaleString('zh-CN');
    const data = txs.map(t => `${t.from}→${t.to}:${t.amount}`).join(';');
    const hash = sha256Simple(prevHash + data + timestamp);
    const block = { id: blockchain.length + 1, hash, prevHash, data, txs, timestamp: timeStr };
    blockchain.push(block);
    levelState.blockPacked = true;
    levelState.packedBlock = block;
    playSound('success');
    for (let t of txs) addTxLog(`📦 打包: ${t.from}→${t.to} ${t.amount} BTC`);
    addTxLog(`🕐 时间戳: ${timeStr}`);
    addTxLog(`🔗 前一区块哈希: ${prevHash.slice(0,16)}...`);
    broadcast(0, '#2aaa5a', 'block');
    renderLevel();
    updateInfoBar();
  }

  else if (action === 'startMine') {
    levelState.miningStarted = true;
    levelState.attempts = 0;
    playSound('click');
    triggerShake(3);
    const mineBox = document.getElementById('mine-box');
    mineBox.style.display = 'block';
    document.getElementById('mineTarget').textContent = '目标: 哈希以 000 开头';
    document.getElementById('mine-tries').innerHTML = '';
    const prevHash = blockchain[blockchain.length - 1].hash;
    const blockData = `Block${blockchain.length + 1}_tx_data_${Date.now()}`;

    // 预计算一个有效 nonce，保证一定能挖到
    let validNonce = null;
    for (let n = 0; n < 999999; n++) {
      if (sha256Simple(prevHash + blockData + n).startsWith('000')) { validNonce = n; break; }
    }
    // 决定在第几次展示时"挖到"（15~30次之间，体验恰好）
    const showAt = 15 + Math.floor(Math.random() * 16);

    mineInterval = setInterval(() => {
      if (levelState.mined) { clearInterval(mineInterval); return; }
      const triesEl = document.getElementById('mine-tries');
      // 每个 interval 批量展示 3 条，加速滚动感
      const batchSize = 3;
      for (let b = 0; b < batchSize; b++) {
        if (levelState.mined) break;
        levelState.attempts++;
        const isLast = levelState.attempts >= showAt;
        const nonce = isLast ? validNonce : Math.floor(Math.random() * 999999);
        const hash = sha256Simple(prevHash + blockData + nonce);
        const found = hash.startsWith('000');

        triesEl.innerHTML += `<div class="${found?'try-pass':'try-fail'}">nonce=${nonce} → ${hash.slice(0,20)}... ${found?'✅ 找到了！':'❌'}</div>`;

        if (found) { levelState.mined = true; levelState.nonce = nonce; levelState.minedHash = hash; break; }
      }
      triesEl.scrollTop = triesEl.scrollHeight;
      document.getElementById('mine-progress-fill').style.width = Math.min(100, levelState.attempts / showAt * 100) + '%';

      if (levelState.mined) {
        levelState.hash = levelState.minedHash;
        levelState.blockData = blockData;
        clearInterval(mineInterval);
        playSound('boom');
        triggerShake(6);
        spawnParticles(CW/2, CH/2, 30);
        renderLevel();
      }
    }, 120);
    renderLevel();
  }

  else if (action === 'addToChain') {
    const prevHash = blockchain[blockchain.length - 1].hash;
    blockchain.push({ id: blockchain.length + 1, hash: levelState.hash, prevHash, data: levelState.blockData, nonce: levelState.nonce });
    levelState.onChain = true;
    playSound('success');
    addTxLog(`⛏️ 挖到区块 #${blockchain.length}！nonce=${levelState.nonce}`);
    broadcast(0, '#f7931a', 'newblock');
    document.getElementById('mine-box').style.display = 'none';
    renderLevel();
    updateInfoBar();
  }

  else if (action === 'viewChain') {
    levelState.viewedChain = true;
    playSound('click');
    renderLevel();
  }

  else if (action === 'tamper') {
    levelState.tampered = true;
    levelState.sawBreak = true;
    playSound('fail');
    triggerShake(10);
    // 篡改 block #2
    const chain = levelState.chain;
    chain[1].data = 'TAMPERED_Eve→Eve_100BTC';
    chain[1].tampered = true;
    const newHash = sha256Simple(chain[1].prevHash + chain[1].data + chain[1].nonce);
    chain[1].hash = newHash;
    // 后续全部断裂
    let broken = 0;
    for (let i = 2; i < chain.length; i++) {
      chain[i].broken = true;
      broken++;
    }
    levelState.brokenCount = broken;
    renderLevel();
  }

  else if (action === 'forkChain') {
    levelState.forked = true;
    playSound('boom');
    levelState.forkPoint = blockchain.length - 1;
    levelState.forkChain = [
      { label: "B's Block", hash: sha256Simple('fork_b_' + Date.now()) },
    ];
    // 主链也加一个新块（矿工A的）
    const prevHash = blockchain[blockchain.length - 1].hash;
    blockchain.push({ id: blockchain.length + 1, hash: sha256Simple('fork_a_' + Date.now()), prevHash, data: 'MinerA_block' });
    addTxLog('⚠️ 分叉出现！矿工 A 和 B 同时挖到区块');
    renderLevel();
    updateInfoBar();
  }

  else if (action === 'resolveChain') {
    // 矿工A再挖一个
    const prevHash = blockchain[blockchain.length - 1].hash;
    blockchain.push({ id: blockchain.length + 1, hash: sha256Simple('resolve_' + Date.now()), prevHash, data: 'MinerA_block2' });
    levelState.resolved = true;
    levelState.abandoned = true;
    playSound('success');
    addTxLog('✅ 矿工 A 的链更长了！矿工 B 的分叉被抛弃');
    broadcast(0, '#2aaa5a', 'consensus');
    renderLevel();
    updateInfoBar();
  }

  else if (action === 'doubleSpend') {
    levelState.doubleSpent = true;
    addTxLog('😈 Eve 尝试双花: Eve→Alice 1BTC 已确认，现在企图 Eve→Bob 1BTC');
    broadcast(0, '#ff6b6b', 'doubletx');
    playSound('click');
    renderLevel();
  }

  else if (action === 'boostHash') {
    levelState.eveHashRate = Math.min(90, (levelState.eveHashRate || 10) + 10);
    playSound('click');
    addTxLog(`💰 Eve 购买矿机，算力提升到 ${levelState.eveHashRate}%`);
    renderLevel();
  }

  else if (action === 'tryMine51') {
    levelState.triedMining = true;
    playSound('boom');
    triggerShake(8);
    addTxLog(`⛏️ Eve 用 ${levelState.eveHashRate}% 算力尝试重新挖链...`);
    renderLevel();
    setTimeout(() => {
      if (levelState.eveHashRate > 50) {
        levelState.attackSuccess = true;
        addTxLog('⚠️ 51% 攻击理论上成功（但现实中几乎不可能）');
        playSound('boom');
      } else {
        addTxLog(`❌ 攻击失败！${levelState.eveHashRate}% 算力不够，无法超越主链`);
        playSound('fail');
      }
      levelState.rejected = true;
      renderLevel();
    }, 2500);
  }
}

function checkLevel() {
  const lv = LEVELS[currentLevel];
  const allPass = lv.goals.every(g => g.check(levelState));
  if (!allPass) return;
  playSound('success');
  spawnParticles(CW/2, CH/2, 60);
  renderLevel();
  // Scroll panel to bottom to show quiz
  const body = document.getElementById('lp-body');
  if (body) setTimeout(() => { body.scrollTop = body.scrollHeight; }, 100);
}

function nextLevel() {
  if (!canGoLevel(currentLevel + 1)) return;
  fadeAlpha = 0; fadeTarget = 1;
  loadLevel(currentLevel + 1);
}
function retryLevel() {
  loadLevel(currentLevel);
}

// ============ 主循环 ============
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  if (!lastTime) { lastTime = ts; return; }
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  time += dt;

  // 更新广播
  for (let br of broadcasts) br.progress += dt * 1.5;
  broadcasts = broadcasts.filter(b => b.progress < 1);

  // 节点脉冲衰减
  for (let nd of nodes) { if (nd.pulse > 0) nd.pulse -= dt * 0.8; }

  // 淡入效果
  if (fadeAlpha < fadeTarget) { fadeAlpha = Math.min(fadeTarget, fadeAlpha + dt * 2.5); }

  // 震动衰减
  if (shakeAmount > 0) shakeAmount *= 0.9;
  if (shakeAmount < 0.1) shakeAmount = 0;

  resize();

  // 应用震动和淡入
  if (shakeAmount > 0) {
    const sx = (Math.random()-0.5)*shakeAmount*2;
    const sy = (Math.random()-0.5)*shakeAmount*2;
    ctx.save();
    ctx.translate(sx, sy);
  }
  ctx.globalAlpha = fadeAlpha;
  draw();
  ctx.globalAlpha = 1;
  if (shakeAmount > 0) ctx.restore();

  // 粒子
  updateParticles(dt);
}
requestAnimationFrame(loop);

// === 总分总认知结构增强 ===
// 延迟重新渲染确保增强生效
(function(){
  // 自动检测关卡名称
  function _getNames(){
    if(typeof levelNames!=='undefined')return levelNames.slice();
    if(typeof LN!=='undefined')return LN.slice();
    if(typeof levels!=='undefined'&&Array.isArray(levels))return levels.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    if(typeof LEVELS!=='undefined'&&Array.isArray(LEVELS))return LEVELS.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    return [];
  }
  function _getTotal(){return _getNames().length||7;}
  function _getCur(){
    if(typeof currentLevel!=='undefined')return currentLevel;
    if(typeof curLevel!=='undefined')return curLevel;
    if(typeof curLv!=='undefined')return curLv;
    return 0;
  }
  function _getObjs(){
    if(typeof levelObjs!=='undefined')return levelObjs;
    return null;
  }
  function _isDone(i){
    var o=_getObjs();
    if(o&&o[i])return o[i].every(function(v){return v;});
    if(typeof completedLevels!=='undefined')return completedLevels.has(i);
    return false;
  }
  function _countDone(){
    var o=_getObjs(),d=0,t=0;
    if(o){for(var i=0;i<o.length;i++)for(var j=0;j<o[i].length;j++){t++;if(o[i][j])d++;}}
    else if(typeof completedLevels!=='undefined'){d=completedLevels.size;t=_getTotal();}
    return{done:d,total:t};
  }


  // 2. 阶段导航
  window._stageNavHTML=function(){
    var names=_getNames(),total=names.length;
    if(!total)return '';
    var cur=_getCur(),s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):0;
    var h='<div class="stage-nav"><div class="sn-bar">';
    for(var i=0;i<total;i++){
      var cls=_isDone(i)?'done':i===cur?'cur':'';
      h+='<div class="sn-d '+cls+'" onclick="typeof goLevel===\'function\'&&goLevel('+i+')"></div>';
    }
    h+='</div>';
    h+='<div class="sn-info">\u{1F4CD} \u7B2C'+(cur+1)+'/'+total+'\u5173 | \u8FDB\u5EA6 '+pct+'%</div>';

    h+='</div>';
    return h;
  };

  // 3. 通关总结
  window._summaryHTML=function(){
    var names=_getNames(),total=names.length;
    var s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):100;
    var h='<div class="summary-box">';
    h+='<div class="summary-title">\u{1F3C6} \u606D\u559C\u901A\u5173\uFF01</div>';
    h+='<div class="summary-sub">\u4F60\u5DF2\u5B8C\u6210\u5168\u90E8 '+total+' \u4E2A\u5173\u5361\u7684\u5B66\u4E60</div>';
    h+='<div class="summary-stats">';
    h+='<div class="summary-stat"><div class="num">'+total+'</div><div class="label">\u5173\u5361\u5B8C\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+s.done+'</div><div class="label">\u76EE\u6807\u8FBE\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+pct+'%</div><div class="label">\u77E5\u8BC6\u638C\u63E1</div></div>';
    h+='</div>';
    h+='<div class="summary-keys"><div style="font-weight:bold;color:#4f46e5;margin-bottom:6px">\u{1F4DA} \u5173\u952E\u77E5\u8BC6\u56DE\u987E</div>';
    for(var i=0;i<total;i++){h+='<div>\u2705 '+names[i]+'</div>';}
    h+='</div></div>';
    return h;
  };

  // 4. 增强 renderPanel - monkey-patch
  if(typeof window.renderPanel==='function'){
    var _origRP=window.renderPanel;
    window.renderPanel=function(){
      _origRP.apply(this,arguments);
      // 在 panel 顶部插入阶段导航
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
  // 也处理全局 renderPanel
  if(typeof renderPanel==='function'&&!window._rpPatched){
    window._rpPatched=true;
    var _origRP2=renderPanel;
    renderPanel=function(){
      _origRP2.apply(this,arguments);
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
})();
try{renderPanel();}catch(e){}
