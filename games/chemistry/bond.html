<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>化学键与分子形状 — 边玩边学</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-bg:#111;--quiz-opt-border:#1a3a1a;--quiz-opt-text:#a0c0a0;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;--quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
}
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-bg:#fff;--quiz-opt-border:#d1d5db;--quiz-opt-text:#334155;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;--quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;height:100vh;width:100vw}
#overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#overlay h1{font-size:36px;color:#8b5cf6;text-shadow:0 0 30px rgba(139,92,246,0.5);margin-bottom:8px}
#overlay h2{font-size:18px;color:#a78bfa;margin-bottom:30px;font-weight:normal}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:var(--feat-text);font-size:12px;width:80px;padding:8px;background:var(--feat-bg);border:1px solid var(--feat-border);border-radius:8px}
.feat .fi{font-size:26px;margin-bottom:4px}
.start-btn{padding:14px 48px;font-size:20px;background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:all .3s;box-shadow:0 0 20px rgba(139,92,246,0.3)}
.start-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(139,92,246,0.5)}
#wrap{display:none;width:100vw;height:100vh;position:relative}
#panel{position:absolute;left:0;top:0;width:320px;height:calc(100% - 36px);background:var(--panel-bg);border-right:1px solid var(--panel-border);overflow-y:auto;padding:16px;z-index:10;display:none}
#panel h3{color:#8b5cf6;font-size:16px;margin-bottom:8px}
#panel .obj{display:flex;align-items:center;gap:6px;margin:4px 0;font-size:14px;color:var(--text-muted)}
#panel .obj.done{color:#4ade80}
#panel .obj::before{content:'○';color:var(--text-sub);font-size:14px}
#panel .obj.done::before{content:'●';color:#4ade80}
.act-btn{display:block;width:100%;padding:10px;margin:4px 0;background:rgba(139,92,246,0.15);color:#a78bfa;border:1px solid rgba(139,92,246,0.3);border-radius:6px;cursor:pointer;font-size:15px;transition:all .2s;text-align:center}
.act-btn:hover{background:rgba(139,92,246,0.3)}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:8px;padding:10px;margin-top:10px;font-size:14px;line-height:1.8;color:var(--learn-text)}
.learn-box b{color:#a78bfa}
.hint-box{background:var(--concept-bg);border:1px solid var(--concept-border);border-left:3px solid #8b5cf6;border-radius:8px;padding:9px 10px;margin:8px 0;font-size:13px;line-height:1.7;color:var(--concept-text)}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:10px 0}
.quiz-title{font-weight:bold;color:var(--quiz-q);margin-bottom:6px}
.quiz-q{font-size:13px;color:var(--quiz-q);line-height:1.6;margin-bottom:8px}
.quiz-opt{display:block;width:100%;padding:8px;margin:5px 0;border:1px solid var(--quiz-opt-border);border-radius:6px;background:var(--quiz-opt-bg);color:var(--quiz-opt-text);cursor:pointer;text-align:left}
.quiz-opt:hover{background:var(--quiz-opt-hover)}
.quiz-opt.correct{border-color:#22c55e;background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-opt.wrong{border-color:#ef4444;background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
.quiz-feedback{font-size:12px;line-height:1.6;margin-top:6px;padding:7px;border-radius:6px}
.quiz-feedback.ok{background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-feedback.bad{background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
#bar{position:absolute;left:0;bottom:0;width:100%;height:36px;background:var(--bar-bg);border-top:1px solid var(--bar-border);display:none;align-items:center;padding:0 12px;gap:8px;z-index:10}
#bar .prog{margin-left:auto;font-size:12px;color:var(--text-muted)}
canvas{position:absolute;left:320px;top:0;background:var(--bg);touch-action:none}
.desc{font-size:12px;color:var(--text-muted);line-height:1.6;margin:8px 0}
.sub{font-size:13px;color:var(--sub-color);margin:6px 0 4px;font-weight:600}
input[type=range].ctl{width:100%;accent-color:#8b5cf6;margin:4px 0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div id="overlay">
<h1>⚛️ 化学键与分子形状</h1>
<h2>从电子转移到晶体结构，7 关探索化学键的奥秘</h2>
<button class="start-btn" onclick="startGame()">开始探索 🔬</button>
<div class="features">
<div class="feat"><div class="fi">⚡</div>离子键</div>
<div class="feat"><div class="fi">🤝</div>共价键</div>
<div class="feat"><div class="fi">🌊</div>金属键</div>
<div class="feat"><div class="fi">📐</div>VSEPR</div>
<div class="feat"><div class="fi">🧲</div>极性</div>
<div class="feat"><div class="fi">💧</div>氢键</div>
<div class="feat"><div class="fi">💎</div>晶体</div>
</div>
</div>
<div id="wrap">
<div id="panel"></div>
<canvas id="cv"></canvas>
<div id="bar"></div>
</div>
<script>
let isDark=true;
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';renderPanel();draw();}
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),panel=document.getElementById('panel'),bar=document.getElementById('bar'),overlay=document.getElementById('overlay'),wrap=document.getElementById('wrap');
let W,H,curLevel=0,time=0,animating=false,unlocked=[true,false,false,false,false,false,false];
let levelObjs=[[false,false,false],[false,false,false],[false,false,false],[false,false,false],[false,false,false],[false,false,false],[false,false,false]];
let mouseX=0,mouseY=0,dragging=null;

const LEVEL_NAMES=['离子键','共价键','金属键','VSEPR模型','极性与非极性','氢键与分子间力','晶体结构'];
const LEVEL_ICONS=['⚡','🤝','🌊','📐','🧲','💧','💎'];
const quizData=[
  {q:'离子键形成的直接原因是什么？',opts:['电子转移形成正负离子后相互吸引','两个原子共享完全相同的电子云','所有电子都变成自由电子海'],ans:0,ok:'对。离子键的核心是电子转移和静电引力。',bad:'离子键不是共享电子，也不是电子海；重点是正负离子之间的库仑吸引。',why:'金属原子失电子形成阳离子，非金属原子得电子形成阴离子，随后正负电荷之间的静电吸引把晶体结合起来。'},
  {q:'H₂ 分子中的共价键本质是什么？',opts:['氢原子各自失去一个电子','两个氢原子共用一对电子','氢原子之间只有范德华力'],ans:1,ok:'对。共用电子对被两个原子核共同吸引。',bad:'共价键的关键词是“共享电子对”。',why:'两个氢原子各贡献一个电子，形成一对被两个原子核共同吸引的电子对，这比单纯分子间作用力强得多。'},
  {q:'金属具有良好导电性的主要原因是什么？',opts:['金属原子完全不带电','金属键都有固定方向','自由电子可以在金属晶格中移动'],ans:2,ok:'对。电子海中的自由电子能传递电荷。',bad:'金属键通常无方向性，导电性来自自由电子。',why:'金属原子的价电子离域成电子海，外加电场下这些自由电子能定向移动，所以金属能导电。'},
  {q:'VSEPR 理论预测分子形状时依据什么？',opts:['原子质量越大越靠中心','价层电子对尽量相互远离','分子颜色决定键角'],ans:1,ok:'对。电子对互斥会决定空间构型和键角。',bad:'VSEPR 关注价层电子对排斥，不看颜色或质量排序。',why:'中心原子周围的键合电子对和孤对电子都会相互排斥，它们会选择尽量远离的空间排布，从而决定分子形状。'},
  {q:'CO₂ 是非极性分子的主要原因是什么？',opts:['C=O 键完全没有极性','CO₂ 不含电子','两个 C=O 键偶极矩方向相反并相互抵消'],ans:2,ok:'对。CO₂ 的线性对称结构让键偶极矩抵消。',bad:'C=O 键本身有极性，但分子整体因对称而非极性。',why:'分子极性不只看单个键，还要看几何结构；CO₂ 线性对称，两个相反方向的键偶极矩相加为零。'},
  {q:'氢键通常比范德华力怎样？',opts:['更弱，只能存在于金属中','更强，且需要 H 与 F/O/N 等强电负性原子相关','完全等同于共价键'],ans:1,ok:'对。氢键是较强的分子间作用力，但仍弱于典型共价键。',bad:'氢键不是金属键，也不是普通共价键；它是特殊分子间作用力。',why:'当 H 与 F/O/N 等强电负性原子相连时，H 带较强部分正电荷，能与另一分子的孤对电子形成方向性较强的吸引。'},
  {q:'晶体类型差异主要由什么决定？',opts:['样品外表颜色','是否能被肉眼看到','微粒种类和微粒间作用力'],ans:2,ok:'对。离子、原子、分子、金属晶体的微粒和作用力不同。',bad:'晶体性质来自微观结构和作用力，不是外观颜色。',why:'离子晶体、原子晶体、分子晶体和金属晶体的组成微粒不同，作用力也不同，所以熔点、硬度和导电性会明显不同。'}
];
let quizPassed=new Set(),quizFeedback={};

// === Level 0: Ionic bond - electron transfer ===
let l0Na={x:0,y:0,electrons:[]},l0Cl={x:0,y:0,electrons:[]},l0transferred=0,l0dragE=null,l0bondExplained=false;

// === Level 1: Covalent bond - electron sharing ===
let l1atoms=[],l1shared=0,l1dragE=null;

// === Level 2: Metallic bond - electron sea ===
let l2freeE=[],l2metalAtoms=[],l2released=0,l2seaReviewed=false;

// === Level 3: VSEPR - molecular shape ===
let l3shape=0,l3angleAdj=109.5;
const VSEPR_SHAPES=[
  {name:'直线形',formula:'BeCl₂',pairs:2,angle:180,desc:'2个键合电子对，无孤对电子'},
  {name:'平面三角形',formula:'BF₃',pairs:3,angle:120,desc:'3个键合电子对，无孤对电子'},
  {name:'正四面体',formula:'CH₄',pairs:4,angle:109.5,desc:'4个键合电子对，无孤对电子'},
  {name:'三角锥形',formula:'NH₃',pairs:4,angle:107,desc:'3个键合+1个孤对电子对'},
  {name:'V形(角形)',formula:'H₂O',pairs:4,angle:104.5,desc:'2个键合+2个孤对电子对'}
];
function initialVseprAngle(i){
  const s=VSEPR_SHAPES[i];
  if(!s)return 109.5;
  const offset=s.angle>170?-8:8;
  return Math.max(90,Math.min(180,s.angle+offset));
}
function vseprAtomLabels(formula){
  const labels={
    'BeCl₂':['Be','Cl'],
    'BF₃':['B','F'],
    'CH₄':['C','H'],
    'NH₃':['N','H'],
    'H₂O':['O','H']
  };
  const pair=labels[formula]||['X','X'];
  return {center:pair[0],outer:pair[1]};
}

// === Level 4: Polarity ===
let l4mol=0,l4polarityConfirmed=false;
const POLAR_MOLS=[
  {name:'HCl',polar:true,desc:'氯的电负性(3.16)远大于氢(2.20)，电子偏向氯',mu:'1.08 D',color:'#ef4444'},
  {name:'CO₂',polar:false,desc:'两个C=O极性键方向相反，偶极矩抵消',mu:'0 D',color:'#3b82f6'},
  {name:'H₂O',polar:true,desc:'V形结构，两个O-H键偶极矩不能抵消',mu:'1.85 D',color:'#22c55e'},
  {name:'CCl₄',polar:false,desc:'正四面体对称，4个C-Cl键偶极矩完全抵消',mu:'0 D',color:'#f59e0b'},
  {name:'NH₃',polar:true,desc:'三角锥形，3个N-H键偶极矩不能完全抵消',mu:'1.47 D',color:'#8b5cf6'}
];
let l4viewed=new Set();

// === Level 5: Hydrogen bonds ===
let l5mode=null,l5waterMols=[],l5viewed=new Set(),l5compareBlocked=false,l5comparisonConfirmed=false;

// === Level 6: Crystal structures ===
let l6type=0,l6rotX=0.3,l6rotY=0.5,l6structureConfirmed=false;
const CRYSTAL_TYPES=[
  {name:'离子晶体',example:'NaCl',desc:'正负离子交替排列，库仑力结合',mp:'高(801°C)',color1:'#ef4444',color2:'#3b82f6'},
  {name:'原子晶体',example:'金刚石',desc:'原子间共价键连接成网状，极其坚硬',mp:'极高(3550°C)',color1:'#888',color2:'#aaa'},
  {name:'分子晶体',example:'冰',desc:'分子间以分子间力结合，熔点低',mp:'低(0°C)',color1:'#60a5fa',color2:'#93c5fd'},
  {name:'金属晶体',example:'铜',desc:'金属阳离子+自由电子海，导电导热',mp:'中高(1085°C)',color1:'#f59e0b',color2:'#fbbf24'}
];
const CRYSTAL_PROPERTIES=[
  '性质线索：离子晶体熔点高、硬而脆，固态通常不导电，熔融或水溶后可导电。',
  '性质线索：原子晶体靠共价网络支撑，硬度和熔点极高，通常不易溶解。',
  '性质线索：分子晶体由分子间力维系，熔点低、质地较软，受氢键等弱相互作用影响明显。',
  '性质线索：金属晶体有自由电子海，因此导电导热好，并具有延展性。'
];

function resize(){W=innerWidth-320;H=innerHeight-36;cv.width=W;cv.height=H;cv.style.width=W+'px';cv.style.height=H+'px';}
window.addEventListener('resize',()=>{resize();draw();});

function resetProgress(){
  curLevel=0;
  unlocked=[true,false,false,false,false,false,false];
  levelObjs=Array.from({length:LEVEL_NAMES.length},()=>[false,false,false]);
  quizPassed.clear();quizFeedback={};
  dragging=null;l0dragE=null;l1dragE=null;isDraggingCanvas=false;
}

function startGame(){
  resetProgress();
  overlay.style.display='none';wrap.style.display='block';panel.style.display='block';bar.style.display='flex';
  resize();goLevel(0);
  if(!animating){animating=true;animate();}
}
function restartFromSummary(){
  resetProgress();
  overlay.style.display='none';wrap.style.display='block';panel.style.display='block';bar.style.display='flex';
  resize();goLevel(0);
  return true;
}
function goLevel(n){
  n=Number(n);
  if(!Number.isInteger(n)||n<0||n>6||!isUnlocked(n))return;
  curLevel=n;
  if(!quizPassed.has(n))delete quizFeedback[n];
  unlocked[n]=true;dragging=null;l0dragE=null;l1dragE=null;initLevel(n);renderPanel();draw();
}
function checkObj(li,oi,silent=false){
  li=Number(li);oi=Number(oi);
  if(!Number.isInteger(li)||!Number.isInteger(oi)||li!==curLevel||li<0||li>6||oi<0||oi>=3||!levelObjs[li]||levelObjs[li][oi])return false;
  levelObjs[li][oi]=true;if(!silent)renderPanel();return true;
}
function isUnlocked(n){
  n=Number(n);
  return Number.isInteger(n)&&n>=0&&n<=6&&(n===0||quizPassed.has(n-1));
}

function initLevel(n){
  const cx=W/2,cy=H/2;
  switch(n){
    case 0:{

function quizHTML(li){

function setAngleFromInput(input){
  if(curLevel!==3)return false;
  const raw=input&&input.value!==undefined?input.value:input;
  const n=Number(raw);
  if(!Number.isFinite(n))return false;
  l3manualAngleTried=true;

function answerQuiz(li,choice){
  li=Number(li);choice=Number(choice);
  if(!Number.isInteger(li)||!Number.isInteger(choice))return false;
  if(li<0||li>=LEVEL_NAMES.length)return false;
  if(li!==curLevel||quizPassed.has(li)||!levelObjs[li]||!levelObjs[li].every(Boolean))return false;
  const q=quizData[li];
  if(!q||choice<0||choice>=q.opts.length)return false;
  if(li>0&&!quizPassed.has(li-1))return false;
  const ok=choice===q.ans;
  quizFeedback[li]={ok,choice,text:(ok?q.ok:q.bad)+(q.why?' '+q.why:'')};
  if(ok){
    quizPassed.add(li);
    if(li<6)unlocked[li+1]=true;
  }
  renderPanel();
  return ok;
}

  h+=`<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>核心概念：</b>氢键是一种特殊的分子间作用力，比普通分子间力强得多</div>`;

  h+=`<div class="obj ${levelObjs[5][0]?'done':''}">查看范德华力模式</div>`;
  h+=`<div class="obj ${levelObjs[5][1]?'done':''}">查看氢键模式</div>`;
  h+=`<div class="obj ${levelObjs[5][2]?'done':''}">比较两种作用力</div>`;
  const modes=['范德华力','氢键','对比模式'];
  for(let i=0;i<3;i++){
    const locked=i===2&&!canCompareForces();
    const sel=i===l5mode?'background:rgba(139,92,246,0.3);':locked?'opacity:.55;':'';
    h+=`<button class="act-btn" style="${sel}" onclick="setHBond(${i})">${modes[i]}${locked?'（先看前两种）':''}</button>`;
  }
  h+=`<div class="hint-box" id="forceHint">${forceHintText()}</div>`;
  if(l5mode===null)h+=`<p class="desc">先选择一种作用力模式，再切换到另一种模式进行对比。</p>`;
  else if(l5mode===0)h+=`<div class="learn-box"><b>范德华力</b><br>• 存在于所有分子之间<br>• 包括取向力、诱导力、色散力<br>• 强度: 0.5~5 kJ/mol<br>• 分子量越大，范德华力越强</div>`;
  else if(l5mode===1)h+=`<div class="learn-box"><b>氢键</b><br>• X-H···Y (X,Y = F,O,N)<br>• 强度: 10~40 kJ/mol<br>• 水的反常高沸点(100°C)就是氢键的功劳<br>• DNA双螺旋也靠氢键维持</div>`;
  else if(levelObjs[5][0]&&levelObjs[5][1]){
    h+=`<div class="learn-box"><b>作用力对比</b><br>化学键(共价键): 150~800 kJ/mol<br>氢键: 10~40 kJ/mol<br>范德华力: 0.5~5 kJ/mol<br><br>氢键虽比化学键弱，但比范德华力强5~10倍，对物质性质影响巨大。</div>`;
    if(!levelObjs[5][2])h+=`<button class="act-btn" onclick="confirmForceComparison()">确认：氢键比范德华力更强且更有方向性</button>`;
  }
  else h+=`<p class="desc">对比需要先看过范德华力和氢键。</p>`;
  return h;
}
function forceHintText(){
  if(l5compareBlocked)return '对比模式需要先分别看过范德华力和氢键：先建立“弱而普遍”和“更强且有方向性”的参照，再比较能量数量级。';
  if(l5mode===null)return '先任选一种模式观察线条：橙色虚线表示普遍但较弱的范德华力，蓝色虚线表示条件更严格、方向性更强的氢键。';
  if(l5mode===0)return '范德华力来自瞬时偶极和诱导偶极，所有分子之间都可能有；它通常较弱，所以容易被温度扰动打散。';
  if(l5mode===1)return '氢键通常需要 H 与 F/O/N 等强电负性原子相连，并指向另一个带孤对电子的原子；方向性让它比普通范德华力强。';
  if(canCompareForces())return '对比强度时抓住数量级：氢键约 10~40 kJ/mol，范德华力约 0.5~5 kJ/mol，所以水分子间作用显著影响沸点。';
  return '对比模式需要先分别看过范德华力和氢键；先建立弱相互作用和强方向性相互作用的参照，再完成比较。';
}
function canCompareForces(){return l5viewed.has(0)&&l5viewed.has(1)}
function setHBond(i){
  i=Number(i);
  if(curLevel!==5||!Number.isInteger(i)||i<0||i>2)return false;
  if(i===2&&!canCompareForces()){l5compareBlocked=true;renderPanel();draw();return false}
  l5compareBlocked=false;
  l5mode=i;l5viewed.add(i);
  if(i===0)checkObj(5,0,true);
  if(i===1)checkObj(5,1,true);
  renderPanel();draw();
  return true;
}
function confirmForceComparison(){
  if(curLevel!==5||l5mode!==2||!canCompareForces())return false;
  l5comparisonConfirmed=true;
  checkObj(5,2,true);
  renderPanel();draw();
  return true;
}

function renderP6(){
  let h=`<h3>晶体结构</h3>`;

  h+=`<p class="desc">画布上展示四种晶体的微观结构。切换类型观察不同晶体的排列方式，拖动画布旋转3D视角。</p>`;
  h+=`<div class="obj ${levelObjs[6][0]?'done':''}">查看至少2种晶体</div>`;
  h+=`<div class="obj ${levelObjs[6][1]?'done':''}">旋转观察3D结构</div>`;
  h+=`<div class="obj ${levelObjs[6][2]?'done':''}">确认四类晶体的结构-性质关系</div>`;
  h+=`<p class="sub">已记录 ${l6viewed.size}/${CRYSTAL_TYPES.length} 种晶体，点击按钮才会计入观察</p>`;
  h+=`<div class="hint-box">${levelObjs[6][1]?'已旋转视角：注意同一种晶体在不同方向上仍保持规则重复排列。':'点完晶体类型后，还需要在画布上拖动一次来观察三维晶格的空间重复。'}</div>`;
  for(let i=0;i<CRYSTAL_TYPES.length;i++){
    const c=CRYSTAL_TYPES[i],sel=i===l6type?'background:rgba(139,92,246,0.3);':'';
    h+=`<button class="act-btn" style="${sel}" onclick="setCrystal(${i})">${c.name} (${c.example})</button>`;
  }
  const c=CRYSTAL_TYPES[l6type];
  h+=`<div class="learn-box"><b>${c.name} — ${c.example}</b><br>${c.desc}<br>熔点: ${c.mp}<br>${CRYSTAL_PROPERTIES[l6type]}</div>`;
  if(l6viewed.size>=CRYSTAL_TYPES.length&&!levelObjs[6][1]){
    h+=`<div class="hint-box">已经看完四类晶体。再拖动画布旋转一次，把微粒排列从平面按钮选择转成空间结构观察。</div>`;
  }else if(l6viewed.size>=CRYSTAL_TYPES.length&&!levelObjs[6][2]){
    h+=`<div class="learn-box"><b>结构到性质</b><br>离子晶体靠静电引力，原子晶体靠共价网络，分子晶体靠分子间力，金属晶体靠自由电子海。微粒种类和作用力越强，通常熔点、硬度和导电方式就越不同。</div>`;
    h+=`<button class="act-btn" onclick="confirmCrystalStructure()">确认：微粒种类和作用力决定晶体性质</button>`;

    h+=`<div class="learn-box"><b>已确认</b><br>四类晶体的差异来自微粒种类与微粒间作用力，而不是外表颜色或晶体大小。</div>`;
  }

}
let l6viewed=new Set();
function setCrystal(i){
  i=Number(i);
  if(curLevel!==6||!Number.isInteger(i)||i<0||i>=CRYSTAL_TYPES.length)return false;
  l6type=i;l6viewed.add(i);
  if(l6viewed.size>=2)checkObj(6,0,true);
  renderPanel();draw();
  return true;
}
function confirmCrystalStructure(){
  if(curLevel!==6||l6viewed.size<CRYSTAL_TYPES.length||!levelObjs[6][1])return false;

  checkObj(6,2,true);

// === DRAW FUNCTIONS ===
function draw(){
  ctx.clearRect(0,0,W,H);
  switch(curLevel){case 0:drawL0();break;case 1:drawL1();break;case 2:drawL2();break;case 3:drawL3();break;case 4:drawL4();break;case 5:drawL5();break;case 6:drawL6();break;}
}

function drawAtom(x,y,r,color,label,charge){
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  const g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
  g.addColorStop(0,color+'cc');g.addColorStop(1,color+'66');
  ctx.fillStyle=g;ctx.fill();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#fff';ctx.font=`bold ${r*0.7}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,x,y);
  if(charge){ctx.font='bold 14px sans-serif';ctx.fillStyle=charge.includes('+')?'#ef4444':'#3b82f6';ctx.fillText(charge,x+r+8,y-r+4);}
}
function drawElectron(x,y,color){
  ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fillStyle=color||'#fbbf24';ctx.fill();
  ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.strokeStyle=(color||'#fbbf24')+'66';ctx.lineWidth=2;ctx.stroke();
}

// Level 0: Ionic bond
function drawL0(){
  const cx=W/2,cy=H/2;
  // Draw atoms
  if(l0transferred>0){
    drawAtom(l0Na.x,l0Na.y,32,'#f59e0b','Na','⁺');
    drawAtom(l0Cl.x,l0Cl.y,36,'#22c55e','Cl','⁻');
    // Draw ionic bond (dashed line)
    ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(l0Na.x+35,l0Na.y);ctx.lineTo(l0Cl.x-39,l0Cl.y);
    ctx.strokeStyle='#a78bfa';ctx.lineWidth=3;ctx.stroke();ctx.setLineDash([]);
    // Electrostatic field lines
    for(let i=0;i<8;i++){const a=Math.PI*2*i/8,r1=45,r2=48;
      ctx.beginPath();ctx.moveTo(l0Na.x+r1*Math.cos(a),l0Na.y+r1*Math.sin(a));
      ctx.strokeStyle='rgba(239,68,68,0.2)';ctx.lineWidth=1;ctx.stroke();
    }
  } else {
    drawAtom(l0Na.x,l0Na.y,32,'#f59e0b','Na','');
    drawAtom(l0Cl.x,l0Cl.y,36,'#22c55e','Cl','');
  }
  // Draw Na electrons
  l0Na.electrons.forEach(e=>drawElectron(e.x,e.y,'#fbbf24'));
  // Draw Cl electrons
  l0Cl.electrons.forEach(e=>drawElectron(e.x,e.y,'#4ade80'));
  // Labels
  ctx.fillStyle=isDark?'#888':'#666';ctx.font='13px sans-serif';ctx.textAlign='center';
  ctx.fillText(l0transferred>0?'Na⁺ (失去1个电子)':'Na (1个外层电子)',l0Na.x,l0Na.y+55);
  ctx.fillText(l0transferred>0?'Cl⁻ (得到1个电子)':'Cl (7个外层电子)',l0Cl.x,l0Cl.y+60);
  if(l0transferred>0){ctx.fillStyle='#a78bfa';ctx.font='bold 16px sans-serif';ctx.fillText('离子键：静电引力',cx,cy+100);}
  else{ctx.fillStyle='#f59e0b';ctx.font='14px sans-serif';ctx.fillText('← 拖动黄色电子到氯原子上 →',cx,cy+100);}
}

// Level 1: Covalent bond
function drawL1(){
  const cx=W/2,cy=H/2;
  l1atoms.forEach(a=>{drawAtom(a.x,a.y,a.r,a.color,a.el,'');});
  // Draw sharing zone
  ctx.beginPath();ctx.ellipse(cx,cy,40,30,0,0,Math.PI*2);
  ctx.fillStyle=l1shared>=2?'rgba(139,92,246,0.15)':'rgba(139,92,246,0.08)';ctx.fill();
  ctx.strokeStyle='rgba(139,92,246,0.4)';ctx.setLineDash([4,4]);ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle=isDark?'#666':'#999';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText('共享区域',cx,cy+45);
  // Draw electrons
  l1atoms.forEach(a=>{a.electrons.forEach(e=>drawElectron(e.x,e.y,'#60a5fa'));});
  if(l1shared>=2){
    ctx.beginPath();ctx.moveTo(l1atoms[0].x+28,cy);ctx.lineTo(l1atoms[1].x-28,cy);
    ctx.strokeStyle='#a78bfa';ctx.lineWidth=4;ctx.stroke();
    ctx.fillStyle='#a78bfa';ctx.font='bold 16px sans-serif';ctx.fillText('H—H 共价键',cx,cy-60);
    ctx.font='13px sans-serif';ctx.fillText('共用电子对被两个原子核共同吸引',cx,cy+80);
  } else {ctx.fillStyle='#60a5fa';ctx.font='14px sans-serif';ctx.fillText('← 拖动蓝色电子到共享区域 →',cx,cy+80);}
}

// Level 2: Metallic bond
function drawL2(){
  const cx=W/2,cy=H/2;
  l2metalAtoms.forEach(a=>{
    const hasE=a.electrons.some(e=>!e.released);
    drawAtom(a.x,a.y,22,hasE?'#f59e0b':'#ef4444',hasE?'M':'M⁺','');
  });
  l2metalAtoms.forEach(a=>{a.electrons.forEach(e=>{if(!e.released)drawElectron(e.x,e.y,'#fbbf24');});});
  // Free electrons (electron sea)
  l2freeE.forEach(e=>{
    e.x+=e.vx;e.y+=e.vy;
    if(e.x<20||e.x>W-20)e.vx*=-1;if(e.y<20||e.y>H-20)e.vy*=-1;
    drawElectron(e.x,e.y,'#60a5fa');
  });
  if(l2released>=8){
    ctx.fillStyle='rgba(96,165,250,0.06)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#a78bfa';ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.fillText('电子海模型',cx,40);
    ctx.font='13px sans-serif';ctx.fillText('自由电子在金属阳离子间自由流动',cx,65);
  } else {ctx.fillStyle=isDark?'#888':'#666';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('点击金属原子释放电子',cx,H-30);}
}

// Level 3: VSEPR
function drawL3(){
  const cx=W/2,cy=H/2,s=VSEPR_SHAPES[l3shape];
  const R=100,angleRad=l3angleAdj*Math.PI/180;
  const labels=vseprAtomLabels(s.formula);
  ctx.fillStyle='#a78bfa';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText(s.formula+' — '+s.name,cx,40);
  // Draw central atom
  drawAtom(cx,cy,28,'#8b5cf6',labels.center,'');
  // Draw bonds based on shape
  const positions=[];
  if(s.pairs===2){positions.push({a:0},{a:Math.PI});}
  else if(s.pairs===3){for(let i=0;i<3;i++)positions.push({a:i*angleRad+Math.PI/2*3});}
  else{
    if(s.formula==='CH₄'){for(let i=0;i<4;i++)positions.push({a:-Math.PI/2+i*angleRad});}
    else if(s.formula==='NH₃'){for(let i=0;i<3;i++)positions.push({a:-Math.PI/3+i*angleRad});positions.push({a:-Math.PI/2,lone:true});}
    else{positions.push({a:-angleRad/2});positions.push({a:angleRad/2});positions.push({a:-Math.PI/2,lone:true});positions.push({a:Math.PI/2+0.3,lone:true});}
  }
  // Simplified: draw bonds evenly
  const bondCount=s.formula==='H₂O'?2:s.formula==='NH₃'?3:s.pairs;
  const loneCount=s.formula==='H₂O'?2:s.formula==='NH₃'?1:0;
  const startA=-Math.PI/2;
  for(let i=0;i<bondCount;i++){
    const a=startA+i*angleRad/(bondCount>1?bondCount-1:1)-(bondCount>1?angleRad/2:0);
    const ex=cx+R*Math.cos(a),ey=cy+R*Math.sin(a);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(ex,ey);ctx.strokeStyle='#a78bfa';ctx.lineWidth=3;ctx.stroke();
    drawAtom(ex,ey,18,'#3b82f6',labels.outer,'');
  }
  for(let i=0;i<loneCount;i++){
    const a=startA+Math.PI+i*0.6-loneCount*0.3+0.3;
    const ex=cx+60*Math.cos(a),ey=cy+60*Math.sin(a);
    ctx.beginPath();ctx.ellipse(ex,ey,12,8,a,0,Math.PI*2);ctx.fillStyle='rgba(239,68,68,0.3)';ctx.fill();
    ctx.strokeStyle='#ef4444';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#ef4444';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('孤对',ex,ey+20);
  }
  // Angle arc
  if(bondCount>=2){
    ctx.beginPath();ctx.arc(cx,cy,40,startA-angleRad/2,startA+angleRad/2);
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#f59e0b';ctx.font='bold 14px sans-serif';ctx.fillText(l3angleAdj.toFixed(1)+'°',cx,cy-50);
  }
}

// Level 4: Polarity
function drawL4(){
  const cx=W/2,cy=H/2,m=POLAR_MOLS[l4mol];
  ctx.fillStyle=m.color;ctx.font='bold 24px sans-serif';ctx.textAlign='center';ctx.fillText(m.name,cx,50);
  if(m.name==='HCl'){
    drawAtom(cx-60,cy,24,'#3b82f6','H','');drawAtom(cx+60,cy,28,'#22c55e','Cl','');
    ctx.beginPath();ctx.moveTo(cx-36,cy);ctx.lineTo(cx+32,cy);ctx.strokeStyle='#a78bfa';ctx.lineWidth=3;ctx.stroke();
    // Dipole arrow
    drawArrow(cx-60,cy+50,cx+60,cy+50,'#ef4444');
    ctx.fillStyle='#ef4444';ctx.font='12px sans-serif';ctx.fillText('δ⁺',cx-60,cy-35);ctx.fillStyle='#3b82f6';ctx.fillText('δ⁻',cx+60,cy-40);
  } else if(m.name==='CO₂'){
    drawAtom(cx,cy,26,'#333','C','');drawAtom(cx-80,cy,24,'#ef4444','O','');drawAtom(cx+80,cy,24,'#ef4444','O','');
    ctx.beginPath();ctx.moveTo(cx-26,cy);ctx.lineTo(cx-56,cy);ctx.moveTo(cx+26,cy);ctx.lineTo(cx+56,cy);ctx.strokeStyle='#a78bfa';ctx.lineWidth=4;ctx.stroke();
    drawArrow(cx-40,cy+40,cx-80,cy+40,'#ef4444');drawArrow(cx+40,cy+40,cx+80,cy+40,'#ef4444');
    ctx.fillStyle='#22c55e';ctx.font='bold 14px sans-serif';ctx.fillText('偶极矩抵消 → 非极性',cx,cy+80);
  } else if(m.name==='H₂O'){
    drawAtom(cx,cy,26,'#ef4444','O','');
    const a1=-Math.PI/2-52.25*Math.PI/180,a2=-Math.PI/2+52.25*Math.PI/180;
    drawAtom(cx+70*Math.cos(a1),cy+70*Math.sin(a1),20,'#3b82f6','H','');
    drawAtom(cx+70*Math.cos(a2),cy+70*Math.sin(a2),20,'#3b82f6','H','');
    ctx.beginPath();ctx.moveTo(cx+28*Math.cos(a1),cy+28*Math.sin(a1));ctx.lineTo(cx+50*Math.cos(a1),cy+50*Math.sin(a1));
    ctx.moveTo(cx+28*Math.cos(a2),cy+28*Math.sin(a2));ctx.lineTo(cx+50*Math.cos(a2),cy+50*Math.sin(a2));
    ctx.strokeStyle='#a78bfa';ctx.lineWidth=3;ctx.stroke();
    drawArrow(cx,cy+60,cx,cy+100,'#ef4444');
    ctx.fillStyle='#ef4444';ctx.font='bold 14px sans-serif';ctx.fillText('合偶极矩 ↓',cx,cy+120);
  } else if(m.name==='CCl₄'){
    drawAtom(cx,cy,26,'#333','C','');
    for(let i=0;i<4;i++){const a=-Math.PI/2+i*Math.PI/2;drawAtom(cx+70*Math.cos(a),cy+70*Math.sin(a),22,'#22c55e','Cl','');
      ctx.beginPath();ctx.moveTo(cx+28*Math.cos(a),cy+28*Math.sin(a));ctx.lineTo(cx+48*Math.cos(a),cy+48*Math.sin(a));ctx.strokeStyle='#a78bfa';ctx.lineWidth=3;ctx.stroke();
    }
    ctx.fillStyle='#22c55e';ctx.font='bold 14px sans-serif';ctx.fillText('正四面体对称 → 非极性',cx,cy+110);
  } else {
    drawAtom(cx,cy,26,'#8b5cf6','N','');
    for(let i=0;i<3;i++){const a=-Math.PI/2+i*2*Math.PI/3*0.6-0.3;
      drawAtom(cx+70*Math.cos(a),cy+70*Math.sin(a),20,'#3b82f6','H','');
      ctx.beginPath();ctx.moveTo(cx+28*Math.cos(a),cy+28*Math.sin(a));ctx.lineTo(cx+50*Math.cos(a),cy+50*Math.sin(a));ctx.strokeStyle='#a78bfa';ctx.lineWidth=3;ctx.stroke();
    }
    drawArrow(cx,cy+60,cx,cy+100,'#ef4444');
    ctx.fillStyle='#ef4444';ctx.font='bold 14px sans-serif';ctx.fillText('三角锥形 → 极性',cx,cy+120);
  }
  ctx.fillStyle=isDark?'#888':'#666';ctx.font='13px sans-serif';ctx.fillText('偶极矩: '+m.mu,cx,H-30);
}
function drawArrow(x1,y1,x2,y2,color){
  const a=Math.atan2(y2-y1,x2-x1),hl=10;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-hl*Math.cos(a-0.4),y2-hl*Math.sin(a-0.4));ctx.lineTo(x2-hl*Math.cos(a+0.4),y2-hl*Math.sin(a+0.4));ctx.closePath();ctx.fillStyle=color;ctx.fill();
}

// Level 5: Hydrogen bonds
function drawL5(){
  const cx=W/2,cy=H/2;
  ctx.fillStyle='#a78bfa';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
  ctx.fillText(l5mode===0?'范德华力':l5mode===1?'氢键':l5mode===2?'作用力对比':'选择作用力模式',cx,35);
  l5waterMols.forEach((m,i)=>{
    // Draw water molecule
    const ox=m.x,oy=m.y;
    drawAtom(ox,oy,16,'#ef4444','O','');
    const h1x=ox-22,h1y=oy+18,h2x=ox+22,h2y=oy+18;
    drawAtom(h1x,h1y,10,'#3b82f6','H','');drawAtom(h2x,h2y,10,'#3b82f6','H','');
    ctx.beginPath();ctx.moveTo(ox-10,oy+8);ctx.lineTo(h1x+6,h1y-6);ctx.moveTo(ox+10,oy+8);ctx.lineTo(h2x-6,h2y-6);
    ctx.strokeStyle='#a78bfa';ctx.lineWidth=2;ctx.stroke();
  });
  // Draw intermolecular forces
  if(l5mode===0||l5mode===2){
    for(let i=0;i<l5waterMols.length;i++)for(let j=i+1;j<l5waterMols.length;j++){
      const a=l5waterMols[i],b=l5waterMols[j],d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<180){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle='rgba(249,115,22,0.3)';ctx.setLineDash([2,4]);ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);}
    }
    if(l5mode===0){ctx.fillStyle='#f97316';ctx.font='13px sans-serif';ctx.fillText('橙色虚线 = 范德华力（弱）',cx,H-30);}
  }
  if(l5mode===1||l5mode===2){
    for(let i=0;i<l5waterMols.length;i++)for(let j=i+1;j<l5waterMols.length;j++){
      const a=l5waterMols[i],b=l5waterMols[j],d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<160){
        ctx.beginPath();ctx.moveTo(a.x,a.y+18);ctx.lineTo(b.x,b.y);
        ctx.strokeStyle='rgba(96,165,250,0.6)';ctx.setLineDash([6,3]);ctx.lineWidth=2.5;ctx.stroke();ctx.setLineDash([]);
      }
    }
    if(l5mode===1){ctx.fillStyle='#60a5fa';ctx.font='13px sans-serif';ctx.fillText('蓝色虚线 = 氢键（较强）',cx,H-30);}
  }
  if(l5mode===2){ctx.fillStyle='#a78bfa';ctx.font='13px sans-serif';ctx.fillText('蓝色=氢键(强) vs 橙色=范德华力(弱)',cx,H-30);}
}

// Level 6: Crystal structures
function drawL6(){
  const cx=W/2,cy=H/2,c=CRYSTAL_TYPES[l6type];
  ctx.fillStyle=c.color1;ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText(c.name+' — '+c.example,cx,35);
  const cosX=Math.cos(l6rotX),sinX=Math.sin(l6rotX),cosY=Math.cos(l6rotY),sinY=Math.sin(l6rotY);
  function proj(x,y,z){
    const y2=y*cosX-z*sinX,z2=y*sinX+z*cosX,x2=x*cosY+z2*sinY;
    return{px:cx+x2*1.2,py:cy+y2*1.2,depth:z2};
  }
  const nodes=[],edges=[];const S=50;
  if(l6type===0){// NaCl
    for(let i=0;i<3;i++)for(let j=0;j<3;j++)for(let k=0;k<3;k++){
      const x=(i-1)*S,y=(j-1)*S,z=(k-1)*S,isNa=(i+j+k)%2===0;
      const idx=nodes.length;
      nodes.push({x,y,z,color:isNa?c.color1:c.color2,r:isNa?12:14,label:isNa?'Na⁺':'Cl⁻'});
      if(i>0)edges.push([idx,idx-9]);
      if(j>0)edges.push([idx,idx-3]);
      if(k>0)edges.push([idx,idx-1]);
    }
  } else if(l6type===1){// Diamond
    const pts=[[0,0,0],[S,S,0],[S,0,S],[0,S,S],[S/2,S/2,S/2]];
    pts.forEach(p=>nodes.push({x:p[0]-S/2,y:p[1]-S/2,z:p[2]-S/2,color:c.color1,r:10,label:'C'}));
    edges.push([0,1],[0,2],[0,3],[4,1],[4,2],[4,3]);
  } else if(l6type===2){// Ice
    for(let i=0;i<4;i++){const a=i*Math.PI/2,r=S;
      nodes.push({x:r*Math.cos(a),y:r*Math.sin(a),z:0,color:c.color1,r:14,label:'O'});
      nodes.push({x:r*0.6*Math.cos(a+0.3),y:r*0.6*Math.sin(a+0.3),z:15,color:c.color2,r:8,label:'H'});
    }
    for(let i=0;i<4;i++){edges.push([i*2,(i*2+2)%8]);}
  } else {// Metal
    for(let i=0;i<3;i++)for(let j=0;j<3;j++){
      nodes.push({x:(i-1)*S,y:(j-1)*S,z:0,color:c.color1,r:14,label:'M⁺'});
      if(i<2)edges.push([i*3+j,(i+1)*3+j]);if(j<2)edges.push([i*3+j,i*3+j+1]);
    }
  }
  // Sort by depth and draw
  const projected=nodes.map((n,i)=>{const p=proj(n.x,n.y,n.z);return{...n,...p,idx:i};}).sort((a,b)=>a.depth-b.depth);
  // Draw edges
  edges.forEach(e=>{
    if(e[0]!=null&&e[1]!=null&&e[0]<nodes.length&&e[1]<nodes.length){
      const a=proj(nodes[e[0]].x,nodes[e[0]].y,nodes[e[0]].z),b=proj(nodes[e[1]].x,nodes[e[1]].y,nodes[e[1]].z);
      ctx.beginPath();ctx.moveTo(a.px,a.py);ctx.lineTo(b.px,b.py);ctx.strokeStyle=isDark?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.stroke();
    }
  });
  projected.forEach(n=>{
    const alpha=0.5+0.5*(n.depth+80)/160;
    ctx.globalAlpha=Math.max(0.3,Math.min(1,alpha));
    drawAtom(n.px,n.py,n.r,n.color,'','');
    ctx.globalAlpha=1;
  });
  ctx.fillStyle=isDark?'#666':'#999';ctx.font='12px sans-serif';ctx.fillText('拖动画布旋转3D视角',cx,H-20);
}

// === EVENT HANDLERS ===
let isDraggingCanvas=false,lastMX=0,lastMY=0;
function pointerPos(e){
  const rect=cv.getBoundingClientRect();
  return {x:e.clientX-rect.left,y:e.clientY-rect.top};
}
function startPointer(e){
  const p=pointerPos(e);
  mouseX=p.x;mouseY=p.y;
  if(curLevel===0){
    // Check if clicking on Na electron
    for(const el of l0Na.electrons){
      if(Math.hypot(mouseX-el.x,mouseY-el.y)<15){
        e.preventDefault();l0dragE=el;
        if(cv.setPointerCapture&&e.pointerId!=null)cv.setPointerCapture(e.pointerId);
        return;
      }
    }
  } else if(curLevel===1){
    for(const a of l1atoms){
      for(const el of a.electrons){
        if(!el.shared&&Math.hypot(mouseX-el.x,mouseY-el.y)<15){
          e.preventDefault();l1dragE=el;
          if(cv.setPointerCapture&&e.pointerId!=null)cv.setPointerCapture(e.pointerId);
          return;
        }
      }
    }
  } else if(curLevel===2){
    // Click to release electron
    for(const a of l2metalAtoms){
      if(Math.hypot(mouseX-a.x,mouseY-a.y)<30){
        const e=a.electrons.find(e=>!e.released);
        if(e){e.released=true;l2released++;
          l2freeE.push({x:e.x,y:e.y,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2});
          if(l2released>=4)checkObj(2,0,true);if(l2released>=8)checkObj(2,1,true);
          renderPanel();draw();
        }
        return;
      }
    }
  } else if(curLevel===6){
    e.preventDefault();isDraggingCanvas=true;lastMX=mouseX;lastMY=mouseY;
    if(cv.setPointerCapture&&e.pointerId!=null)cv.setPointerCapture(e.pointerId);
  }
}
function movePointer(e){
  const p=pointerPos(e);
  mouseX=p.x;mouseY=p.y;
  if(curLevel===0&&l0dragE){e.preventDefault();l0dragE.x=mouseX;l0dragE.y=mouseY;draw();}
  else if(curLevel===1&&l1dragE){e.preventDefault();l1dragE.x=mouseX;l1dragE.y=mouseY;draw();}
  else if(curLevel===6&&isDraggingCanvas){
    e.preventDefault();
    l6rotY+=(mouseX-lastMX)*0.01;l6rotX+=(mouseY-lastMY)*0.01;lastMX=mouseX;lastMY=mouseY;
    if(checkObj(6,1,true))renderPanel();draw();
  }
}
function endPointer(e){
  if(curLevel===0&&l0dragE){
    // Check if dropped on Cl
    if(Math.hypot(l0dragE.x-l0Cl.x,l0dragE.y-l0Cl.y)<50){
      l0transferred=1;l0Na.electrons=[];
      l0Cl.electrons.push({x:l0Cl.x+50,y:l0Cl.y,id:99,from:'Na'});
      checkObj(0,0,true);checkObj(0,1,true);
      renderPanel();
    } else {// Reset position
      const a=0;l0dragE.x=l0Na.x+50*Math.cos(a);l0dragE.y=l0Na.y+50*Math.sin(a);
    }
    l0dragE=null;draw();
  } else if(curLevel===1&&l1dragE){
    const cx=W/2,cy=H/2;
    if(Math.hypot(l1dragE.x-cx,l1dragE.y-cy)<40){
      l1shared++;l1dragE.shared=true;l1dragE.x=cx+(l1shared===1?-10:10);l1dragE.y=cy;
      if(l1shared>=1)checkObj(1,0,true);if(l1shared>=2){checkObj(1,1,true);checkObj(1,2,true);}
      renderPanel();
    } else {// Reset
      const atom=l1atoms.find(a=>a.electrons.includes(l1dragE));
      if(atom){l1dragE.x=atom.x+(atom===l1atoms[0]?40:-40);l1dragE.y=atom.y;}
    }
    l1dragE=null;draw();
  }
  if(cv.releasePointerCapture&&e&&e.pointerId!=null)try{cv.releasePointerCapture(e.pointerId)}catch(err){}
  isDraggingCanvas=false;
}
cv.addEventListener('pointerdown',startPointer);
cv.addEventListener('pointermove',movePointer);
cv.addEventListener('pointerup',endPointer);
cv.addEventListener('pointercancel',endPointer);

function animate(){time+=0.016;if(curLevel===2&&l2freeE.length>0)draw();requestAnimationFrame(animate);}

resize();
</script>
