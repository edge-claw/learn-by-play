<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>有机化学探险 — 边玩边学</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
}
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;height:100vh;width:100vw}
#overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#overlay h1{font-size:36px;color:#22c55e;text-shadow:0 0 30px rgba(34,197,94,0.5);margin-bottom:8px}
#overlay h2{font-size:18px;color:#4ade80;margin-bottom:30px;font-weight:normal}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:var(--feat-text);font-size:12px;width:80px;padding:8px;background:var(--feat-bg);border:1px solid var(--feat-border);border-radius:8px}
.feat .fi{font-size:26px;margin-bottom:4px}
.start-btn{padding:14px 48px;font-size:20px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:all .3s;box-shadow:0 0 20px rgba(34,197,94,0.3)}
.start-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(34,197,94,0.5)}
#wrap{display:none;width:100vw;height:100vh;position:relative}
#panel{position:absolute;left:0;top:0;width:320px;height:calc(100% - 36px);background:var(--panel-bg);border-right:1px solid var(--panel-border);overflow-y:auto;padding:16px;z-index:10;display:none}
#panel h3{color:#22c55e;font-size:16px;margin-bottom:8px}
#panel .obj{display:flex;align-items:center;gap:6px;margin:4px 0;font-size:14px;color:var(--text-muted)}
#panel .obj.done{color:#4ade80}
#panel .obj::before{content:'○';color:var(--text-sub);font-size:14px}
#panel .obj.done::before{content:'●';color:#4ade80}
.act-btn{display:block;width:100%;padding:10px;margin:4px 0;background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3);border-radius:6px;cursor:pointer;font-size:15px;transition:all .2s;text-align:center}
.act-btn:hover{background:rgba(34,197,94,0.3)}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:8px;padding:10px;margin-top:10px;font-size:14px;line-height:1.8;color:var(--learn-text)}
.learn-box b{color:#4ade80}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:10px 0}
.quiz-title{font-weight:bold;color:var(--quiz-q);margin-bottom:6px}
.quiz-q{font-size:13px;color:var(--quiz-q);line-height:1.6;margin-bottom:8px}
.quiz-opt{display:block;width:100%;padding:8px;margin:5px 0;border:1px solid var(--quiz-opt-border);border-radius:6px;background:var(--quiz-opt-bg);color:var(--quiz-opt-text);cursor:pointer;text-align:left}
.quiz-opt:hover{background:var(--quiz-opt-hover)}
.quiz-feedback{font-size:12px;line-height:1.6;margin-top:6px;padding:7px;border-radius:6px}
.quiz-feedback.ok{background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-feedback.bad{background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
#bar{position:absolute;left:0;bottom:0;width:100%;height:36px;background:var(--bar-bg);border-top:1px solid var(--bar-border);display:none;align-items:center;padding:0 12px;gap:8px;z-index:10}
#bar .prog{margin-left:auto;font-size:12px;color:var(--text-muted)}
canvas{position:absolute;left:320px;top:0;background:var(--bg)}
.desc{font-size:12px;color:var(--text-muted);line-height:1.6;margin:8px 0}
.sub{font-size:13px;color:var(--sub-color);margin:6px 0 4px;font-weight:600}
input[type=range].ctl{width:100%;accent-color:#22c55e;margin:4px 0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div id="overlay">
<h1>🧪 有机化学探险</h1>
<h2>从碳的四键到聚合反应，7 关探索有机世界</h2>
<button class="start-btn" onclick="startGame()">开始探索 🔬</button>
<div class="features">
<div class="feat"><div class="fi">⬡</div>碳的四键</div>
<div class="feat"><div class="fi">🔤</div>烷烃命名</div>
<div class="feat"><div class="fi">🎯</div>官能团</div>
<div class="feat"><div class="fi">🔀</div>同分异构</div>
<div class="feat"><div class="fi">⭕</div>苯环芳香</div>
<div class="feat"><div class="fi">🔗</div>聚合反应</div>
<div class="feat"><div class="fi">⚗️</div>反应机理</div>
</div>
</div>
<div id="wrap">
<div id="panel"></div>
<canvas id="cv"></canvas>
<div id="bar"></div>
</div>
<script>
let isDark=true;
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';renderPanel();}
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),panel=document.getElementById('panel'),bar=document.getElementById('bar'),overlay=document.getElementById('overlay'),wrap=document.getElementById('wrap');
let W,H,curLevel=0,time=0,unlocked=[true,false,false,false,false,false,false];
let levelObjs=[[false,false,false],[false,false,false],[false,false,false],[false,false,false],[false,false,false],[false,false,false],[false,false,false]];
let mouseX=0,mouseY=0,dragging=null;

// === Level data ===
const LEVEL_NAMES=['碳的四键','烷烃命名','官能团识别','同分异构体','苯环与芳香性','聚合反应','有机反应机理'];
const LEVEL_ICONS=['⬡','🔤','🎯','🔀','⭕','🔗','⚗️'];
const quizData=[
  {q:'碳原子能成为有机化学骨架的关键原因是什么？',opts:['通常可形成 4 个共价键','只能形成 1 个离子键','不能与其他碳原子成键'],ans:0,ok:'对。碳的四价和 C-C 成键能力让它能搭建稳定而多样的分子骨架。',bad:'关键是碳的四价共价成键能力，以及它能与碳、氢、氧、氮等形成稳定键。'},
  {q:'直链烷烃的通式是什么？',opts:['CₙH₂ₙ₊₂','CₙH₂ₙ','CₙHₙ'],ans:0,ok:'对。饱和链状烷烃只有单键，通式为 CₙH₂ₙ₊₂。',bad:'烯烃常见通式才是 CₙH₂ₙ，烷烃是 CₙH₂ₙ₊₂。'},
  {q:'官能团在有机分子中主要决定什么？',opts:['典型化学性质','原子核种类','所有分子的颜色'],ans:0,ok:'对。官能团决定醇、羧酸、胺、醛、酮、酯等类别的典型反应性。',bad:'官能团不是装饰，它是判断有机物性质和反应类型的核心线索。'},
  {q:'同分异构体的定义是什么？',opts:['分子式相同但结构不同','结构完全相同但名字不同','元素种类不同但质量相同'],ans:0,ok:'对。同一分子式可以对应直链、支链或不同官能团结构。',bad:'同分异构强调“同分子式、不同结构”，不是简单改名。'},
  {q:'苯环特殊稳定性的来源是什么？',opts:['6 个 π 电子离域形成芳香性','6 个 C-C 键都完全断裂','苯环中没有电子'],ans:0,ok:'对。苯的 π 电子离域让 6 个 C-C 键等价并获得芳香稳定性。',bad:'苯不是普通单双键静态交替，关键是离域 π 电子云。'},
  {q:'聚合反应的本质是什么？',opts:['小分子单体连接成长链高分子','大分子只分解成气体','原子核发生裂变'],ans:0,ok:'对。加聚或缩聚会把许多单体连接为聚合物。',bad:'聚合关注化学键连接形成高分子，不涉及原子核变化。'},
  {q:'反应机理主要解释什么？',opts:['键如何断裂、形成以及中间体如何变化','只解释产物的颜色','只记录烧杯大小'],ans:0,ok:'对。机理把宏观反应拆成自由基、加成、消除等微观步骤。',bad:'机理的价值在于解释每一步电子和化学键的变化。'}
];
let quizPassed=new Set(),quizFeedback={};

// Level 0: Carbon bonds - drag atoms to form bonds
let l0atoms=[],l0bonds=[],l0bondCount=0;
// Level 1: Alkane naming
let l1chain=1,l1answer='',l1correct=false;
const ALKANE_NAMES=['甲烷','乙烷','丙烷','丁烷','戊烷','己烷','庚烷','辛烷','壬烷','癸烷'];
const ALKANE_FORMULAS=['CH₄','C₂H₆','C₃H₈','C₄H₁₀','C₅H₁₂','C₆H₁₄','C₇H₁₆','C₈H₁₈','C₉H₂₀','C₁₀H₂₂'];
// Level 2: Functional groups
let l2group=0,l2identified=new Set();
const FUNC_GROUPS=[
  {name:'羟基 -OH',type:'醇',formula:'R-OH',color:'#3b82f6',desc:'氧原子连接氢原子和碳链，是醇类的标志'},
  {name:'羧基 -COOH',type:'羧酸',formula:'R-COOH',color:'#ef4444',desc:'碳原子双键连氧、单键连羟基，具有酸性'},
  {name:'氨基 -NH₂',type:'胺',formula:'R-NH₂',color:'#8b5cf6',desc:'氮原子连接两个氢和碳链，具有碱性'},
  {name:'醛基 -CHO',type:'醛',formula:'R-CHO',color:'#f59e0b',desc:'碳原子双键连氧、单键连氢，可被氧化'},
  {name:'酮基 >C=O',type:'酮',formula:'R-CO-R\'',color:'#ec4899',desc:'碳原子双键连氧，两侧连碳链'},
  {name:'酯基 -COO-',type:'酯',formula:'R-COO-R\'',color:'#14b8a6',desc:'羧酸与醇脱水缩合的产物'}
];
// Level 3: Isomers
let l3formula=0,l3found=new Set();
const ISOMER_DATA=[
  {formula:'C₄H₁₀',name:'丁烷',isomers:['正丁烷 (直链)','异丁烷 (支链)']},
  {formula:'C₅H₁₂',name:'戊烷',isomers:['正戊烷','异戊烷','新戊烷']},
  {formula:'C₃H₆O',name:'丙酮/丙醛',isomers:['丙酮 (酮)','丙醛 (醛)','烯丙醇 (醇)']}
];
// Level 4: Benzene
let l4mode=0,l4kekuleCycle=0;
// Level 5: Polymerization
let l5monomer=0,l5chainLen=1;
const POLYMERS=[
  {monomer:'乙烯 CH₂=CH₂',polymer:'聚乙烯 (PE)',type:'加聚',use:'塑料袋、薄膜'},
  {monomer:'氯乙烯 CH₂=CHCl',polymer:'聚氯乙烯 (PVC)',type:'加聚',use:'管材、电线皮'},
  {monomer:'苯乙烯 C₆H₅CH=CH₂',polymer:'聚苯乙烯 (PS)',type:'加聚',use:'泡沫、餐具'}
];
// Level 6: Reaction mechanisms
let l6rxn=0,l6step=0;
const REACTIONS=[
  {name:'取代反应',desc:'甲烷与氯气在光照下发生取代',steps:['Cl₂ 光解产生 Cl·','Cl· 攻击 CH₄ 夺取 H','CH₃· + Cl₂ → CH₃Cl + Cl·','链终止: 自由基结合']},
  {name:'加成反应',desc:'乙烯与溴的加成',steps:['Br₂ 靠近 C=C 双键','π 键断裂，Br⁺ 进攻','碳正离子中间体形成','Br⁻ 从背面进攻，产物生成']},
  {name:'消除反应',desc:'乙醇脱水生成乙烯',steps:['H₂SO₄ 质子化 -OH','水分子离去','相邻 C-H 键断裂','π 键形成，生成乙烯']}
];

function resize(){W=innerWidth-320;H=innerHeight-36;cv.width=W;cv.height=H;cv.style.width=W+'px';cv.style.height=H+'px';}
window.addEventListener('resize',()=>{resize();draw();});

function startGame(){overlay.style.display='none';wrap.style.display='block';panel.style.display='block';bar.style.display='flex';resize();goLevel(0);animate();}

function goLevel(n){if(n<0||n>6||!isUnlocked(n))return;curLevel=n;unlocked[n]=true;dragging=null;initLevel(n);renderPanel();draw();}

function checkObj(li,oi){if(!levelObjs[li][oi]){levelObjs[li][oi]=true;renderPanel();}}
function isUnlocked(n){return n===0||quizPassed.has(n-1)}

function initLevel(n){
  switch(n){
    case 0: initL0();break;
    case 1: l1chain=1;l1answer='';l1correct=false;break;
    case 2: l2group=0;break;
    case 3: l3formula=0;l3found.clear();break;
    case 4: l4mode=0;l4kekuleCycle=0;break;
    case 5: l5monomer=0;l5chainLen=1;break;
    case 6: l6rxn=0;l6step=0;break;
  }
}

// Level 0: Carbon 4 bonds
function initL0(){
  const cx=W/2,cy=H/2;
  l0atoms=[{x:cx,y:cy,el:'C',color:'#333',r:28}];
  l0bonds=[];l0bondCount=0;
  const angles=[0,Math.PI/2,Math.PI,Math.PI*1.5];
  for(let i=0;i<4;i++){
    l0atoms.push({x:cx+120*Math.cos(angles[i]),y:cy+120*Math.sin(angles[i]),el:'H',color:'#3b82f6',r:20});
  }
}

function renderStageNav(){
  let h='<div class="stage-nav"><div class="sn-bar">';
  LEVEL_NAMES.forEach((_,i)=>{
    const unlocked=isUnlocked(i),cls=quizPassed.has(i)?'done':i===curLevel?'cur':unlocked?'':'locked';
    const click=unlocked?`goLevel(${i})`:'';
    h+=`<div class="sn-d ${cls}" onclick="${click}" title="${unlocked?LEVEL_NAMES[i]:'答对上一关测验后解锁'}"></div>`;
  });
  h+=`</div><div class="sn-info">${LEVEL_ICONS[curLevel]} ${curLevel+1}/${LEVEL_NAMES.length} ${LEVEL_NAMES[curLevel]}</div><div class="sn-hint">${quizPassed.size}/${LEVEL_NAMES.length} 已通关，完成目标后答对测验才解锁下一关</div></div>`;
  return h;
}

function quizHTML(li){
  const q=quizData[li],fb=quizFeedback[li];
  let h='<div class="quiz-box"><div class="quiz-title">通关小测验</div>';
  h+=`<div class="quiz-q">${q.q}</div>`;
  q.opts.forEach((opt,i)=>{h+=`<button class="quiz-opt" onclick="answerQuiz(${li},${i})">${opt}</button>`;});
  if(fb)h+=`<div class="quiz-feedback ${fb.ok?'ok':'bad'}">${fb.text}</div>`;
  h+='</div>';
  return h;
}
function answerQuiz(li,choice){
  if(li!==curLevel||quizPassed.has(li))return;
  const q=quizData[li],ok=choice===q.ans;
  quizFeedback[li]={ok,text:ok?q.ok:q.bad};
  if(ok){
    quizPassed.add(li);
    if(li<6)unlocked[li+1]=true;
  }
  renderPanel();
}
window.answerQuiz=answerQuiz;

function renderPanel(){
  let h=renderStageNav();
  switch(curLevel){
    case 0:h+=renderP0();break;case 1:h+=renderP1();break;case 2:h+=renderP2();break;
    case 3:h+=renderP3();break;case 4:h+=renderP4();break;case 5:h+=renderP5();break;case 6:h+=renderP6();break;
  }
  if(levelObjs[curLevel].every(v=>v)){
    if(!quizPassed.has(curLevel))h+=quizHTML(curLevel);
    if(quizPassed.has(curLevel)&&curLevel<6)h+=`<button class="act-btn" style="background:#22c55e;color:#fff;margin-top:8px" onclick="goLevel(${curLevel+1})">下一关 →</button>`;
    if(quizPassed.has(curLevel)&&curLevel===6)h+=summaryHTML();
  }
  panel.innerHTML=h;
  const done=levelObjs[curLevel].filter(Boolean).length;

// === Drawing ===
function drawBg(){
  const th=isDark;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,th?'#0a0a2e':'#e8edf5');g.addColorStop(1,th?'#0a0a1a':'#e0e7f0');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=th?'rgba(34,197,94,0.06)':'rgba(34,197,94,0.04)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawAtom(x,y,r,color,label,glow){
  if(glow){ctx.shadowColor=color;ctx.shadowBlur=15;}
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  const g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,0,x,y,r);
  g.addColorStop(0,color);g.addColorStop(1,shadeColor(color,-40));
  ctx.fillStyle=g;ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font=`bold ${r*0.8}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,x,y);
}

function shadeColor(c,pct){
  let r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+pct));g=Math.max(0,Math.min(255,g+pct));b=Math.max(0,Math.min(255,b+pct));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function drawBond(x1,y1,x2,y2,type){
  ctx.strokeStyle=isDark?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.5)';ctx.lineWidth=3;
  if(type==='single'){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
  else if(type==='double'){
    const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy),nx=-dy/len*3,ny=dx/len*3;
    ctx.beginPath();ctx.moveTo(x1+nx,y1+ny);ctx.lineTo(x2+nx,y2+ny);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x1-nx,y1-ny);ctx.lineTo(x2-nx,y2-ny);ctx.stroke();
  }
}

function drawL0(){
  const cx=W/2,cy=H/2;
  // Draw bonds
  l0bonds.forEach(b=>{
    drawBond(l0atoms[b[0]].x,l0atoms[b[0]].y,l0atoms[b[1]].x,l0atoms[b[1]].y,'single');
  });
  // Draw atoms
  l0atoms.forEach((a,i)=>{
    drawAtom(a.x,a.y,a.r,a.el==='C'?(isDark?'#555':'#333'):'#3b82f6',a.el,i===0);
  });
  // Hint
  if(l0bondCount<4){
    ctx.fillStyle=isDark?'rgba(255,255,255,0.3)':'rgba(0,0,0,0.3)';ctx.font='14px sans-serif';ctx.textAlign='center';
    ctx.fillText('拖动 H 原子靠近 C 原子形成键',W/2,H-40);
  }
  if(l0bondCount>=4){
    ctx.fillStyle='#22c55e';ctx.font='16px sans-serif';ctx.textAlign='center';
    ctx.fillText('甲烷 CH₄ — 正四面体构型 (键角 109.5°)',W/2,50);
    // Draw angle arcs
    const c=l0atoms[0];
    for(let i=1;i<l0atoms.length-1;i++){
      for(let j=i+1;j<l0atoms.length;j++){
        const a1=Math.atan2(l0atoms[i].y-c.y,l0atoms[i].x-c.x);
        const a2=Math.atan2(l0atoms[j].y-c.y,l0atoms[j].x-c.x);
        ctx.strokeStyle='rgba(34,197,94,0.2)';ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(c.x,c.y,40,Math.min(a1,a2),Math.max(a1,a2));ctx.stroke();
      }
    }
  }
}

function drawL1(){
  const cx=W/2,cy=H/2,spacing=50;
  const startX=cx-(l1chain-1)*spacing/2;
  // Draw chain
  for(let i=0;i<l1chain;i++){
    const x=startX+i*spacing;
    if(i<l1chain-1){drawBond(x,cy,x+spacing,cy,'single');}
    // H atoms above and below
    drawBond(x,cy,x,cy-35,'single');
    drawBond(x,cy,x,cy+35,'single');
    drawAtom(x,cy-35,12,'#3b82f6','H',false);
    drawAtom(x,cy+35,12,'#3b82f6','H',false);
    // Terminal H
    if(i===0){drawBond(x,cy,x-35,cy,'single');drawAtom(x-35,cy,12,'#3b82f6','H',false);}
    if(i===l1chain-1){drawBond(x,cy,x+35,cy,'single');drawAtom(x+35,cy,12,'#3b82f6','H',false);}
    drawAtom(x,cy,16,isDark?'#555':'#333','C',false);
  }
  ctx.fillStyle=isDark?'#4ade80':'#16a34a';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
  ctx.fillText(`${ALKANE_NAMES[l1chain-1]} ${ALKANE_FORMULAS[l1chain-1]}`,cx,60);
}

function drawL2(){
  const cx=W/2,cy=H/2,g=FUNC_GROUPS[l2group];
  // Draw R group
  drawAtom(cx-80,cy,24,isDark?'#555':'#333','R',false);
  drawBond(cx-80,cy,cx-30,cy,'single');
  // Draw functional group based on type
  switch(l2group){
    case 0: // -OH
      drawAtom(cx-30,cy,20,'#ef4444','O',true);
      drawBond(cx-30,cy,cx+20,cy,'single');
      drawAtom(cx+20,cy,16,'#3b82f6','H',false);
      break;
    case 1: // -COOH
      drawAtom(cx-30,cy,20,isDark?'#555':'#333','C',false);
      drawBond(cx-30,cy,cx-30,cy-40,'double');
      drawAtom(cx-30,cy-40,16,'#ef4444','O',true);
      drawBond(cx-30,cy,cx+20,cy,'single');
      drawAtom(cx+20,cy,16,'#ef4444','O',false);
      drawBond(cx+20,cy,cx+60,cy,'single');
      drawAtom(cx+60,cy,14,'#3b82f6','H',false);
      break;
    case 2: // -NH2
      drawAtom(cx-30,cy,20,'#8b5cf6','N',true);
      drawBond(cx-30,cy,cx+10,cy-25,'single');
      drawAtom(cx+10,cy-25,14,'#3b82f6','H',false);
      drawBond(cx-30,cy,cx+10,cy+25,'single');
      drawAtom(cx+10,cy+25,14,'#3b82f6','H',false);
      break;
    case 3: // -CHO
      drawAtom(cx-30,cy,20,isDark?'#555':'#333','C',false);
      drawBond(cx-30,cy,cx-30,cy-40,'double');
      drawAtom(cx-30,cy-40,16,'#ef4444','O',true);
      drawBond(cx-30,cy,cx+20,cy,'single');
      drawAtom(cx+20,cy,14,'#3b82f6','H',false);
      break;
    case 4: // >C=O
      drawAtom(cx,cy,20,isDark?'#555':'#333','C',false);
      drawBond(cx,cy,cx,cy-40,'double');
      drawAtom(cx,cy-40,16,'#ef4444','O',true);
      drawBond(cx,cy,cx+50,cy,'single');
      drawAtom(cx+50,cy,20,isDark?'#555':'#333','R\'',false);
      break;
    case 5: // -COO-
      drawAtom(cx-30,cy,20,isDark?'#555':'#333','C',false);
      drawBond(cx-30,cy,cx-30,cy-40,'double');
      drawAtom(cx-30,cy-40,16,'#ef4444','O',true);
      drawBond(cx-30,cy,cx+20,cy,'single');
      drawAtom(cx+20,cy,16,'#ef4444','O',false);
      drawBond(cx+20,cy,cx+70,cy,'single');
      drawAtom(cx+70,cy,20,isDark?'#555':'#333','R\'',false);
      break;
  }
  ctx.fillStyle=g.color;ctx.font='bold 18px sans-serif';ctx.textAlign='center';
  ctx.fillText(g.name,cx,60);
}

function drawL3(){
  const cx=W/2,cy=H/2,d=ISOMER_DATA[l3formula];
  ctx.fillStyle=isDark?'#4ade80':'#16a34a';ctx.font='bold 20px sans-serif';ctx.textAlign='center';
  ctx.fillText(`${d.formula} 的同分异构体`,cx,50);
  const n=d.isomers.length;
  d.isomers.forEach((iso,i)=>{
    const y=cy-60+(i*80),x=cx;
    ctx.fillStyle=isDark?'rgba(34,197,94,0.1)':'rgba(34,197,94,0.05)';
    ctx.beginPath();ctx.roundRect(x-140,y-25,280,50,8);ctx.fill();
    ctx.strokeStyle='rgba(34,197,94,0.3)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=isDark?'#eee':'#333';ctx.font='16px sans-serif';ctx.textAlign='center';
    ctx.fillText(iso,x,y+5);
  });
}

function drawL4(){
  const cx=W/2,cy=H/2,r=80;
  // Draw benzene ring
  const pts=[];
  for(let i=0;i<6;i++){
    const a=-Math.PI/2+i*Math.PI/3;
    pts.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)});
  }
  // Bonds
  for(let i=0;i<6;i++){
    const j=(i+1)%6;
    ctx.strokeStyle=isDark?'rgba(255,255,255,0.7)':'rgba(0,0,0,0.6)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();
    if(l4mode===0){
      // Kekule: alternating double bonds
      if(i%2===(Math.floor(time*2)%2)){
        const dx=pts[j].x-pts[i].x,dy=pts[j].y-pts[i].y;
        const nx=(pts[i].x+pts[j].x)/2-cx,ny=(pts[i].y+pts[j].y)/2-cy;
        const nl=Math.sqrt(nx*nx+ny*ny);
        const ox=-nx/nl*8,oy=-ny/nl*8;
        ctx.strokeStyle='rgba(34,197,94,0.5)';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(pts[i].x+ox*0.7,pts[i].y+oy*0.7);ctx.lineTo(pts[j].x+ox*0.7,pts[j].y+oy*0.7);ctx.stroke();
      }
    }
  }
  if(l4mode===1){
    // Delocalized pi cloud
    ctx.strokeStyle='rgba(34,197,94,0.4)';ctx.lineWidth=2;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.arc(cx,cy,r*0.6,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    // Electron cloud glow
    const grad=ctx.createRadialGradient(cx,cy,r*0.3,cx,cy,r*0.8);
    grad.addColorStop(0,'rgba(34,197,94,0.15)');grad.addColorStop(1,'rgba(34,197,94,0)');
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(cx,cy,r*0.8,0,Math.PI*2);ctx.fill();
  }
  if(l4mode===2){
    // Huckel rule visualization
    ctx.fillStyle='rgba(34,197,94,0.1)';ctx.beginPath();ctx.arc(cx,cy,r+20,0,Math.PI*2);ctx.fill();
    // Show electron count
    for(let i=0;i<6;i++){
      const a=-Math.PI/2+i*Math.PI/3,ex=cx+(r+30)*Math.cos(a),ey=cy+(r+30)*Math.sin(a);
      ctx.fillStyle='#22c55e';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
      ctx.fillText('π',ex,ey);
    }
    ctx.fillStyle=isDark?'#4ade80':'#16a34a';ctx.font='bold 16px sans-serif';
    ctx.fillText('6 = 4(1)+2  ✓ 芳香性',cx,cy+r+60);
  }
  // Carbon atoms
  pts.forEach(p=>{drawAtom(p.x,p.y,14,isDark?'#555':'#333','C',false);});
  // H atoms
  pts.forEach((p,i)=>{
    const a=-Math.PI/2+i*Math.PI/3;
    const hx=cx+(r+35)*Math.cos(a),hy=cy+(r+35)*Math.sin(a);
    drawBond(p.x,p.y,hx,hy,'single');
    drawAtom(hx,hy,10,'#3b82f6','H',false);
  });
}

function drawL5(){
  const cx=W/2,cy=H/2,p=POLYMERS[l5monomer];
  const unitW=40,startX=cx-(l5chainLen*unitW)/2;
  ctx.fillStyle=isDark?'#4ade80':'#16a34a';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
  ctx.fillText(p.polymer,cx,50);
  // Draw polymer chain
  const colors=['#3b82f6','#22c55e','#f59e0b'];
  for(let i=0;i<l5chainLen;i++){
    const x=startX+i*unitW+unitW/2;
    if(i<l5chainLen-1){
      ctx.strokeStyle=isDark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.3)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(x+12,cy);ctx.lineTo(x+unitW-12,cy);ctx.stroke();
    }
    drawAtom(x,cy,12,colors[l5monomer],'',false);
    // Monomer label
    if(i<3||i===l5chainLen-1){
      ctx.fillStyle=isDark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.3)';ctx.font='10px sans-serif';
      ctx.fillText(i===l5chainLen-1&&l5chainLen>3?'n':'',x,cy+25);
    }
  }
  // Brackets for polymer notation
  if(l5chainLen>=3){
    ctx.strokeStyle=isDark?'rgba(255,255,255,0.5)':'rgba(0,0,0,0.4)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(startX-5,cy-25);ctx.lineTo(startX-10,cy-25);ctx.lineTo(startX-10,cy+25);ctx.lineTo(startX-5,cy+25);ctx.stroke();
    const endX=startX+l5chainLen*unitW;
    ctx.beginPath();ctx.moveTo(endX+5,cy-25);ctx.lineTo(endX+10,cy-25);ctx.lineTo(endX+10,cy+25);ctx.lineTo(endX+5,cy+25);ctx.stroke();
    ctx.fillStyle=isDark?'#eee':'#333';ctx.font='14px sans-serif';ctx.fillText('n',endX+20,cy+5);
  }
}

function drawL6(){
  const cx=W/2,cy=H/2,r=REACTIONS[l6rxn];
  ctx.fillStyle=isDark?'#4ade80':'#16a34a';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
  ctx.fillText(r.name,cx,50);
  // Draw step visualization
  const stepY=cy-40;
  r.steps.forEach((s,i)=>{
    const y=stepY+i*60;
    const active=i===l6step;
    const done=i<l6step;
    ctx.fillStyle=active?'rgba(34,197,94,0.15)':done?'rgba(34,197,94,0.05)':'rgba(255,255,255,0.02)';
    ctx.beginPath();ctx.roundRect(cx-180,y-18,360,36,8);ctx.fill();
    ctx.strokeStyle=active?'#22c55e':done?'rgba(34,197,94,0.3)':'rgba(255,255,255,0.1)';
    ctx.lineWidth=active?2:1;ctx.stroke();
    // Step number
    ctx.fillStyle=done?'#22c55e':active?'#4ade80':(isDark?'#666':'#aaa');
    ctx.font='bold 14px sans-serif';ctx.textAlign='center';
    ctx.fillText(done?'✓':`${i+1}`,cx-160,y+5);
    // Step text
    ctx.fillStyle=active?(isDark?'#eee':'#333'):(isDark?'#888':'#999');
    ctx.font=`${active?'bold ':''}13px sans-serif`;ctx.textAlign='left';
    ctx.fillText(s,cx-140,y+5);
  });
  // Arrow animation for current step
  if(l6step<r.steps.length){
    const arrowY=stepY+l6step*60;
    const pulse=Math.sin(time*4)*3;
    ctx.fillStyle='#22c55e';ctx.beginPath();
    ctx.moveTo(cx-185+pulse,arrowY);ctx.lineTo(cx-195+pulse,arrowY-6);ctx.lineTo(cx-195+pulse,arrowY+6);ctx.closePath();ctx.fill();
  }
}

function draw(){
  drawBg();
  switch(curLevel){
    case 0:drawL0();break;case 1:drawL1();break;case 2:drawL2();break;
    case 3:drawL3();break;case 4:drawL4();break;case 5:drawL5();break;case 6:drawL6();break;
  }
}

function animate(){
  requestAnimationFrame(animate);
  time+=0.016;
  draw();
}

// === Mouse interaction ===
cv.addEventListener('mousedown',e=>{
  if(curLevel!==0)return;
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width),my=(e.clientY-rect.top)*(H/rect.height);
  for(let i=1;i<l0atoms.length;i++){
    const a=l0atoms[i],dx=mx-a.x,dy=my-a.y;
    if(dx*dx+dy*dy<a.r*a.r*2){dragging=i;break;}
  }
});
cv.addEventListener('mousemove',e=>{
  if(dragging===null)return;
  const rect=cv.getBoundingClientRect();
  l0atoms[dragging].x=(e.clientX-rect.left)*(W/rect.width);
  l0atoms[dragging].y=(e.clientY-rect.top)*(H/rect.height);
});
cv.addEventListener('mouseup',()=>{
  if(dragging!==null&&curLevel===0){
    const a=l0atoms[dragging],c=l0atoms[0];
    const dx=a.x-c.x,dy=a.y-c.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<60){
      // Snap to bond position
      const existing=l0bonds.filter(b=>b[0]===0||b[1]===0).length;
      if(!l0bonds.some(b=>b[1]===dragging)){
        const angle=-Math.PI/2+existing*(2*Math.PI/4)+Math.PI/6;
        a.x=c.x+55*Math.cos(angle);a.y=c.y+55*Math.sin(angle);
        l0bonds.push([0,dragging]);
        l0bondCount=l0bonds.length;
        if(l0bondCount>=2)checkObj(0,0);
        if(l0bondCount>=4){checkObj(0,1);checkObj(0,2);}
        renderPanel();
      }
    }
  }
  dragging=null;
});
// Touch support
cv.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];cv.dispatchEvent(new MouseEvent('mousedown',{clientX:t.clientX,clientY:t.clientY}));},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];cv.dispatchEvent(new MouseEvent('mousemove',{clientX:t.clientX,clientY:t.clientY}));},{passive:false});
cv.addEventListener('touchend',e=>{cv.dispatchEvent(new MouseEvent('mouseup'));});
</script>
