<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{

  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;

  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;

  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;

  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;

body{background:var(--bg);color:var(--text);font-family:'Microsoft YaHei','PingFang SC',sans-serif;overflow:hidden;height:100vh;width:100vw}
.overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.overlay h1{font-size:42px;color:#f97316;margin-bottom:12px;text-shadow:0 0 30px rgba(249,115,22,0.5)}
.overlay p{color:#aaa;font-size:16px;margin-bottom:30px;max-width:500px;text-align:center;line-height:1.7}
.overlay .start-btn{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;padding:14px 48px;font-size:20px;border-radius:30px;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s}
.overlay .start-btn:hover{transform:scale(1.05);box-shadow:0 0 25px rgba(249,115,22,0.5)}
.main{display:flex;height:calc(100vh - 36px);width:100vw}
.panel{width:320px;min-width:320px;background:var(--panel-bg);border-right:1px solid #222;padding:16px;overflow-y:auto;display:none;font-size:15px;line-height:1.7;padding-bottom:24px}
.panel h2{color:var(--title-color);font-size:18px;margin-bottom:8px;border-bottom:1px solid #333;padding-bottom:6px}
.panel h3{color:var(--title-color);font-size:16px;margin:10px 0 4px}
.panel .obj{padding:3px 0;font-size:14px}
.panel .obj.done{color:#4ade80}
.panel .obj.todo{color:#888}
.panel .learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:8px;padding:10px;margin-top:10px;font-size:14px;line-height:1.8;color:var(--learn-text)}
.hint-box{background:var(--hint-bg);border:1px solid var(--hint-border);border-radius:8px;padding:9px 10px;margin-top:8px;font-size:12px;line-height:1.7;color:var(--hint-text)}
.hint-box strong{color:#fb923c}
.act-btn{display:block;width:100%;padding:10px;margin-top:6px;border:none;border-radius:6px;cursor:pointer;font-size:15px;background:#f97316;color:#fff;transition:background 0.2s}
.act-btn:hover{background:#ea580c}
.canvas-wrap{flex:1;position:relative;background:var(--bg)}
.canvas-wrap canvas{display:block;width:100%;height:100%;touch-action:none}
.bar{height:36px;background:var(--bar-bg);border-top:1px solid var(--panel-border);display:none;align-items:center;justify-content:center;gap:6px;padding:0 16px}
.bar button{background:var(--bg);color:#ccc;border:1px solid #333;padding:4px 14px;border-radius:4px;cursor:pointer;font-size:12px;transition:all 0.2s}
.bar button:hover{background:#2a2a3e}
.bar button.active{background:#f97316;color:#fff;border-color:#f97316}
.slider-row{display:flex;align-items:center;gap:6px;margin:4px 0;font-variant-numeric:tabular-nums}
.slider-row label{font-size:11px;color:#aaa;min-width:50px}
.slider-row input[type=range]{flex:1;accent-color:#f97316}
.slider-row span{font-size:11px;color:#fb923c;min-width:40px;text-align:right}

.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:10px 0}
.quiz-title{font-weight:bold;color:var(--quiz-q);margin-bottom:6px}
.quiz-q{font-size:13px;color:var(--quiz-q);line-height:1.6;margin-bottom:8px}
.quiz-opt{display:block;width:100%;padding:8px;margin:5px 0;border:1px solid var(--quiz-opt-border);border-radius:6px;background:var(--quiz-opt-bg);color:var(--quiz-opt-text);cursor:pointer;text-align:left}
.quiz-opt:hover{background:var(--quiz-opt-hover)}
.quiz-opt.correct{border-color:#22c55e;background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-opt.wrong{border-color:#ef4444;background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
.quiz-feedback{font-size:12px;line-height:1.6;margin-top:6px;padding:7px;border-radius:6px}
.quiz-feedback.ok{background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-feedback.bad{background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:#aaa;font-size:12px;width:80px}
.feat .fi{font-size:26px;margin-bottom:4px}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="overlay" id="overlay">
<h1>⚗️ 化学反应与动力学 探险</h1>
<p>从配平方程式到电化学，7个关卡带你探索化学反应的奥秘。拖动原子、调节温度、观察电子转移，在互动中理解化学世界的规律。</p>
<button class="start-btn" onclick="startGame()">开始探索 🔬</button>
<div class="features">
<div class="feat"><div class="fi">⚖️</div>方程式配平</div>
<div class="feat"><div class="fi">🔀</div>反应类型</div>
<div class="feat"><div class="fi">⏱️</div>反应速率</div>
<div class="feat"><div class="fi">⚗️</div>化学平衡</div>
<div class="feat"><div class="fi">🔋</div>氧化还原</div>
<div class="feat"><div class="fi">🧪</div>酸碱反应</div>
<div class="feat"><div class="fi">⚡</div>电化学</div>
</div>
</div>
<div class="main">
<div class="panel" id="panel"></div>
<div class="canvas-wrap"><canvas id="cv"></canvas></div>
</div>
<div class="bar" id="bar"></div>
<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}try{if(typeof drawLevel==='function')drawLevel()}catch(e){}}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),panel=document.getElementById('panel'),bar=document.getElementById('bar'),overlay=document.getElementById('overlay');
let W,H,curLevel=0,animId,time=0,animating=false,mouse={x:0,y:0,down:false,drag:null};
let levelObjs=Array.from({length:7},()=>[false,false,false]);
const levelNames=['化学方程式配平','反应类型','反应速率','化学平衡','氧化还原','酸碱反应','电化学'];
const quizData=[
  {q:'配平方程式时最重要的约束是什么？',opts:['反应前后每种原子数目相等','只让分子总数相等','把箭头两边颜色调一致'],ans:0,ok:'对。配平体现质量守恒，反应前后原子种类和数目必须相同。',bad:'配平不是凑分子个数，而是保证每种元素的原子数守恒。',why:'配平方程式只改变化学计量数，不能改变物质本身；每种元素的原子数必须在反应前后守恒。'},
  {q:'化合反应的基本特征是什么？',opts:['一种物质分解成多种物质','多种物质生成一种物质','两种化合物只交换离子'],ans:1,ok:'对。化合反应通常可概括为“多变一”。',bad:'“一变多”是分解反应，“交换成分”通常是复分解反应。',why:'化合反应的结构特征是多个反应物组合成一个主要产物；与“一变多”的分解反应方向相反。'},
  {q:'催化剂为什么能加快反应？',opts:['永久消耗所有反应物','改变元素种类','降低反应活化能'],ans:2,ok:'对。催化剂提供较低活化能路径，反应更容易发生。',bad:'催化剂改变反应路径，不会把元素种类改掉。',why:'催化剂提供新的反应路径，降低达到过渡态所需能量，因此单位时间内更多粒子能有效碰撞。'},
  {q:'Le Chatelier 原理说明平衡会怎样移动？',opts:['永远只向产物方向移动','向减弱外界改变的方向移动','完全不受温度压强影响'],ans:1,ok:'对。平衡移动会部分抵消温度、压强、浓度改变。',bad:'平衡移动方向取决于外界改变，不是固定向右。',why:'平衡体系受到浓度、温度或压强扰动后，会向能削弱该扰动的方向移动，直到建立新平衡。'},
  {q:'氧化还原反应的本质是什么？',opts:['只产生沉淀','只改变溶液体积','电子转移'],ans:2,ok:'对。失电子是氧化，得电子是还原。',bad:'沉淀可能伴随反应，但氧化还原的本质是电子得失。',why:'判断氧化还原要看电子流向和氧化数变化：失电子者被氧化，得电子者被还原。'},
  {q:'酸碱滴定的等当点表示什么？',opts:['溶液一定变成强酸','酸和碱按化学计量恰好反应','滴定管中液体刚好滴完'],ans:1,ok:'对。等当点对应酸碱恰好完全中和，pH 往往出现突跃。',bad:'等当点看反应物计量关系，不是滴定管是否滴完。',why:'等当点由反应方程式的计量比决定，此时酸提供的 H⁺ 与碱提供的 OH⁻ 恰好完全反应。'},
  {q:'原电池和电解池的能量转化方向分别是什么？',opts:['都只能把电能转热能','都不涉及电子流动','原电池化学能转电能，电解池电能转化学能'],ans:2,ok:'对。原电池自发供电，电解池由外加电源驱动非自发反应。',bad:'两者都涉及电子转移，但能量转化方向相反。',why:'原电池利用自发氧化还原输出电流；电解池则用外加电流推动本不自发的化学变化。'}
];
let quizPassed=new Set(),quizFeedback={};
const COLORS={bg:'#0a0a1a',primary:'#f97316',accent:'#fb923c',green:'#4ade80',blue:'#38bdf8',red:'#ef4444',purple:'#a78bfa',cyan:'#22d3ee',white:'#e0e0e0',dim:'#555'};
const ATOM_COLORS={H:'#e0e0e0',O:'#ef4444',N:'#38bdf8',C:'#555',Fe:'#b0b0b0',Cu:'#f97316',Zn:'#a0a0a0',S:'#fbbf24',Cl:'#4ade80',Na:'#a78bfa',Ca:'#ddd',Ag:'#ccc',K:'#c084fc',Mn:'#d946ef',Cr:'#22d3ee'};
const ATOM_RADIUS={H:14,O:18,N:17,C:18,Fe:22,Cu:22,Zn:22,S:20,Cl:20,Na:20,Ca:22,Ag:22,K:20,Mn:22,Cr:22};

function resize(){cv.width=cv.parentElement.clientWidth;cv.height=cv.parentElement.clientHeight;W=cv.width;H=cv.height;}
window.addEventListener('resize',resize);

// === Level state vars ===
let lv1={atoms:[],targets:[],equation:'',balanced:false,placed:0,showConserv:false};
let lv2={mode:0,particles:[],phase:0,timer:0,reacted:false,demos:[
  {name:'化合反应',eq:'2H₂ + O₂ → 2H₂O',desc:'两种或多种物质生成一种新物质'},
  {name:'分解反应',eq:'2H₂O → 2H₂ + O₂',desc:'一种物质分解为两种或多种物质'},
  {name:'置换反应',eq:'Zn + CuSO₄ → ZnSO₄ + Cu',desc:'一种单质与化合物反应，生成另一种单质和化合物'},
  {name:'复分解反应',eq:'NaCl + AgNO₃ → AgCl↓ + NaNO₃',desc:'两种化合物互相交换成分'}
]};
let lv2Completed=new Set();
let lv3={temp:25,conc:1.0,catalyst:false,rateData:[],time:0,running:false,maxPoints:200,reacted:false,baselineRate:null,catalystRate:null,comparisonDone:false,concentratedRun:false};
let lv4={temp:400,pressure:1,concA:0.5,concB:0.5,eqPos:0.5,history:[],shifted:false,conditions:[],confirmed:false};
let lv5={electrons:[],phase:0,oxNum:{},showTransfer:false,timer:0};
let lv6={pH:7,volume:0,drops:0,curveData:[],titrating:false,indicator:'酚酞',eqConfirmed:false};
let lv7={mode:'galvanic',electrons:[],ions:[],voltage:0,timer:0,running:false};

function resetProgress(){
  curLevel=0;time=0;mouse={x:0,y:0,down:false,drag:null};
  levelObjs=Array.from({length:levelNames.length},()=>[false,false,false]);
  quizPassed.clear();quizFeedback={};
  lv2Completed.clear();
  initLv1();initLv2();initLv3();initLv4();initLv5();initLv6();initLv7();
}

function startGame(){
  resetProgress();
  overlay.style.display='none';
  panel.style.display='block';
  bar.style.display='flex';
  resize();
  initLevel(0);
  if(!animating){animating=true;loop();}
}
function restartFromSummary(){
  resetProgress();
  overlay.style.display='none';
  panel.style.display='block';
  bar.style.display='flex';
  resize();
  initLevel(0);
  return true;
}
function toInt(v,min,max){
  const n=Number(v);
  return Number.isInteger(n)&&n>=min&&n<=max?n:null;
}
function toIndex(v,max){return toInt(v,0,max-1);}
function clampNumber(value,fallback,min,max){
  const n=Number(value),fb=Number(fallback);
  const base=Number.isFinite(n)?n:(Number.isFinite(fb)?fb:min);
  return Math.min(max,Math.max(min,base));
}
function setInputValue(input,value){
  if(input&&input.value!==undefined)input.value=String(value);
}
function goLevel(n){
  const idx=toIndex(n,levelNames.length);
  if(idx===null||!isUnlocked(idx))return;
  if(!quizPassed.has(idx))delete quizFeedback[idx];
  initLevel(idx);
}
function loop(){animId=requestAnimationFrame(loop);time+=1/60;ctx.clearRect(0,0,W,H);drawLevel();renderBar();}

function renderBar(){
  const levelPassed=quizPassed.has(curLevel);
  const done=levelPassed?3:levelObjs[curLevel].filter(Boolean).length;
  const status=levelPassed?'已通关':levelObjs[curLevel].every(Boolean)?'待测验':'进行中';
  bar.innerHTML='<span style="color:var(--text-muted)">⚗️ '+levelNames[curLevel]+'</span><span style="margin-left:auto;color:var(--text-muted);font-size:12px">目标 '+done+'/3 · '+status+' · 通关 '+quizPassed.size+'/'+levelNames.length+'</span>';
}

function objCheck(li,idx,silent=false){
  const level=toIndex(li,levelNames.length),obj=toIndex(idx,3);
  if(level===null||obj===null||level!==curLevel||!levelObjs[level]||levelObjs[level][obj])return false;
  levelObjs[level][obj]=true;
  if(!silent){renderPanel();renderBar();}
  return true;
}
function isUnlocked(n){
  const idx=toIndex(n,levelNames.length);
  return idx!==null&&(idx===0||quizPassed.has(idx-1));
}

function drawAtom(x,y,symbol,r,glow){
  r=r||ATOM_RADIUS[symbol]||18;
  let c=ATOM_COLORS[symbol]||'#888';
  if(glow){ctx.shadowColor=c;ctx.shadowBlur=15;}
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  let g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
  g.addColorStop(0,'#fff');g.addColorStop(0.3,c);g.addColorStop(1,shadeColor(c,-40));
  ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle='#000';ctx.font=`bold ${r*0.8}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(symbol,x,y);
}
function drawBond(x1,y1,x2,y2,type){
  ctx.strokeStyle='rgba(200,200,200,0.6)';ctx.lineWidth=type===2?2:3;
  if(type===2){let dx=y2-y1,dy=x1-x2,len=Math.sqrt(dx*dx+dy*dy)||1;dx=dx/len*3;dy=dy/len*3;
    ctx.beginPath();ctx.moveTo(x1+dx,y1+dy);ctx.lineTo(x2+dx,y2+dy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x1-dx,y1-dy);ctx.lineTo(x2-dx,y2-dy);ctx.stroke();
  }else{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
}
function shadeColor(c,p){let n=parseInt(c.slice(1),16),r=Math.max(0,Math.min(255,(n>>16)+p)),g=Math.max(0,Math.min(255,((n>>8)&0xff)+p)),b=Math.max(0,Math.min(255,(n&0xff)+p));return'#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');}
function drawText(txt,x,y,size,color,align){ctx.fillStyle=color||COLORS.white;ctx.font=`${size||14}px sans-serif`;ctx.textAlign=align||'center';ctx.textBaseline='middle';ctx.fillText(txt,x,y);}
function drawArrow(x1,y1,x2,y2,color,w){
  ctx.strokeStyle=color||COLORS.accent;ctx.lineWidth=w||2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  let a=Math.atan2(y2-y1,x2-x1),s=10;
  ctx.fillStyle=color||COLORS.accent;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-s*Math.cos(a-0.4),y2-s*Math.sin(a-0.4));ctx.lineTo(x2-s*Math.cos(a+0.4),y2-s*Math.sin(a+0.4));ctx.fill();
}
function drawGraph(ox,oy,gw,gh,data,maxY,color,xlabel,ylabel,labels){
  ctx.strokeStyle='#333';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox,oy-gh);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+gw,oy);ctx.stroke();
  drawText(xlabel||'',ox+gw/2,oy+20,11,COLORS.dim);
  ctx.save();ctx.translate(ox-25,oy-gh/2);ctx.rotate(-Math.PI/2);drawText(ylabel||'',0,0,11,COLORS.dim);ctx.restore();
  if(data.length<2)return;
  ctx.strokeStyle=color||COLORS.primary;ctx.lineWidth=2;ctx.beginPath();
  for(let i=0;i<data.length;i++){let x=ox+i/(data.length-1)*gw,y=oy-data[i]/maxY*gh;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.stroke();
  if(labels){for(let i=0;i<labels.length;i++){let x=ox+i/(labels.length-1)*gw;drawText(labels[i],x,oy+12,9,COLORS.dim);}}
}

function initLevel(n){
  curLevel=n;time=0;
  if(n===0)initLv1();else if(n===1)initLv2();else if(n===2)initLv3();
  else if(n===3)initLv4();else if(n===4)initLv5();else if(n===5)initLv6();else if(n===6)initLv7();
  renderPanel();
  renderBar();
}
function drawLevel(){
  if(curLevel===0)drawLv1();else if(curLevel===1)drawLv2();else if(curLevel===2)drawLv3();
  else if(curLevel===3)drawLv4();else if(curLevel===4)drawLv5();else if(curLevel===5)drawLv6();else if(curLevel===6)drawLv7();
}

// ========== LEVEL 1: 化学方程式配平 ==========
function initLv1(){
  lv1={atoms:[],targets:[],equation:'H₂ + O₂ → H₂O',balanced:false,placed:0,showConserv:false};
  // 左侧原子池要覆盖反应物侧和产物侧所有槽位，才能真正完成拖放配平。
  let pool=[{s:'H',n:8},{s:'O',n:4}];
  let ax=80,ay=60;
  pool.forEach((p,pi)=>{for(let i=0;i<p.n;i++){
    lv1.atoms.push({symbol:p.s,x:ax+i*45,y:ay+pi*50,ox:ax+i*45,oy:ay+pi*50,placed:false,targetIdx:-1});
  }});
  // 右侧目标槽: 反应物 2H₂(4H) + O₂(2O) → 产物 2H₂O(4H+2O)
  let tx=W*0.25,ty=H*0.55;
  // 反应物侧
  lv1.targets.push({x:tx,y:ty,label:'H₂',need:'H',count:0,max:2,side:'r'});
  lv1.targets.push({x:tx+70,y:ty,label:'H₂',need:'H',count:0,max:2,side:'r'});
  lv1.targets.push({x:tx+170,y:ty,label:'O₂',need:'O',count:0,max:2,side:'r'});
  // 产物侧
  lv1.targets.push({x:tx+320,y:ty,label:'H₂O',need:'H',count:0,max:2,side:'p'});
  lv1.targets.push({x:tx+390,y:ty,label:'H₂O',need:'O',count:0,max:1,side:'p'});
  lv1.targets.push({x:tx+460,y:ty,label:'H₂O',need:'H',count:0,max:2,side:'p'});
  lv1.targets.push({x:tx+530,y:ty,label:'H₂O',need:'O',count:0,max:1,side:'p'});
}
function nextLv1Target(){
  return lv1.targets.find(t=>t.count<t.max)||null;
}
function updateLv1Balance(){
  const allFull=lv1.targets.every(t=>t.count>=t.max);
  if(allFull&&!lv1.balanced){
    lv1.balanced=true;lv1.showConserv=true;
    objCheck(0,0,true);objCheck(0,1,true);objCheck(0,2,true);
    return true;
  }
  return false;
}
function placeNextLv1Atom(){
  if(curLevel!==0||lv1.balanced)return false;
  const target=nextLv1Target();
  if(!target)return false;
  const atom=lv1.atoms.find(a=>!a.placed&&a.symbol===target.need);
  if(!atom)return false;
  target.count++;
  atom.placed=true;
  atom.targetIdx=lv1.targets.indexOf(target);
  atom.x=target.x+(target.count-1)*15-10;
  atom.y=target.y;
  lv1.placed++;
  if(target.side==='r')objCheck(0,0,true);
  else objCheck(0,1,true);
  updateLv1Balance();
  renderPanel();renderBar();drawLevel();
  return true;
}
function drawLv1(){
  drawText('拖动原子到分子槽中，配平方程式',W/2,30,16,COLORS.accent);
  drawText('2H₂  +  O₂  →  2H₂O',W/2,65,22,COLORS.primary);
  // 原子池标题
  drawText('原子池',80,100,13,COLORS.dim);
  // 目标槽
  let tx=W*0.25,ty=H*0.55;
  drawText('反应物',tx+100,ty-50,14,COLORS.blue);
  drawArrow(tx+230,ty,tx+280,ty,COLORS.accent,3);
  drawText('产物',tx+420,ty-50,14,COLORS.green);
  lv1.targets.forEach((t,i)=>{
    ctx.strokeStyle=t.count>=t.max?COLORS.green:'#444';ctx.lineWidth=2;
    ctx.strokeRect(t.x-25,t.y-25,50,50);
    drawText(t.label,t.x,t.y+38,11,COLORS.dim);
    drawText(`${t.need}:${t.count}/${t.max}`,t.x,t.y-35,10,t.count>=t.max?COLORS.green:'#666');
  });
  // 原子
  lv1.atoms.forEach(a=>{
    if(!a.placed)drawAtom(a.x,a.y,a.symbol,null,true);
  });
  // 质量守恒可视化
  if(lv1.showConserv){
    let cy=H*0.8;
    drawText('✓ 质量守恒：反应前后原子种类和数目不变',W/2,cy,15,COLORS.green);
    drawText('反应物: 4H + 2O = 6个原子',W/2-120,cy+25,12,COLORS.blue);
    drawText('产物: 4H + 2O = 6个原子',W/2+120,cy+25,12,COLORS.green);
  }
  // 检查配平
  if(updateLv1Balance()){renderPanel();renderBar();}
}

// ========== LEVEL 2: 反应类型 ==========
function initLv2(){
  lv2.mode=0;lv2.phase=0;lv2.timer=0;lv2.reacted=false;
  lv2Completed.clear();
  lv2.particles=[];
  setupLv2Particles();
}
function setupLv2Particles(){
  lv2.particles=[];lv2.phase=0;lv2.timer=0;lv2.reacted=false;
  let cx=W/2,cy=H/2;
  if(lv2.mode===0){// 化合: 2H₂ + O₂ → 2H₂O
    lv2.particles.push({x:cx-120,y:cy-30,vx:1.2,vy:0.3,symbol:'H₂',color:COLORS.white,r:20});
    lv2.particles.push({x:cx-120,y:cy+30,vx:1.0,vy:-0.2,symbol:'H₂',color:COLORS.white,r:20});
    lv2.particles.push({x:cx+120,y:cy,vx:-1.1,vy:0.1,symbol:'O₂',color:COLORS.red,r:24});
  }else if(lv2.mode===1){// 分解: 2H₂O → 2H₂ + O₂
    lv2.particles.push({x:cx-40,y:cy,vx:0.5,vy:0.3,symbol:'H₂O',color:COLORS.blue,r:22});
    lv2.particles.push({x:cx+40,y:cy,vx:-0.5,vy:-0.3,symbol:'H₂O',color:COLORS.blue,r:22});
  }else if(lv2.mode===2){// 置换: Zn + CuSO₄ → ZnSO₄ + Cu
    lv2.particles.push({x:cx-100,y:cy,vx:1.5,vy:0,symbol:'Zn',color:'#a0a0a0',r:22});
    lv2.particles.push({x:cx+100,y:cy,vx:-0.5,vy:0,symbol:'CuSO₄',color:COLORS.primary,r:28});
  }else{// 复分解: NaCl + AgNO₃ → AgCl↓ + NaNO₃
    lv2.particles.push({x:cx-100,y:cy,vx:1.2,vy:0,symbol:'NaCl',color:COLORS.purple,r:24});
    lv2.particles.push({x:cx+100,y:cy,vx:-1.2,vy:0,symbol:'AgNO₃',color:'#ccc',r:24});
  }
}
function markLv2DemoDone(mode=lv2.mode){
  const idx=toIndex(mode,lv2.demos.length);
  if(idx===null)return;
  lv2Completed.add(idx);
  if(lv2Completed.size>=2)objCheck(1,0,true);
  if(lv2Completed.has(2))objCheck(1,1,true);
  if(lv2Completed.has(3))objCheck(1,2,true);
  renderPanel();renderBar();
}
function setLv2Mode(i){
  const idx=toIndex(i,lv2.demos.length);
  if(idx===null)return;
  lv2.mode=idx;setupLv2Particles();renderPanel();renderBar();
}
function drawLv2(){
  let d=lv2.demos[lv2.mode];
  drawText(d.name,W/2,30,20,COLORS.primary);
  drawText(d.eq,W/2,60,16,COLORS.accent);
  drawText(d.desc,W/2,85,13,COLORS.dim);
  lv2.timer+=1/60;
  // 移动粒子
  lv2.particles.forEach(p=>{
    if(!lv2.reacted){p.x+=p.vx;p.y+=p.vy;}
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    let g=ctx.createRadialGradient(p.x-p.r*0.3,p.y-p.r*0.3,2,p.x,p.y,p.r);
    g.addColorStop(0,'#fff');g.addColorStop(0.5,p.color);g.addColorStop(1,shadeColor(p.color,-30));
    ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();
    drawText(p.symbol,p.x,p.y,p.r*0.6,'#000');
  });
  // 碰撞检测
  if(!lv2.reacted&&lv2.particles.length>=2){
    let a=lv2.particles[0],b=lv2.particles[1];
    let dx=a.x-b.x,dy=a.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<a.r+b.r+5){
      lv2.reacted=true;
      const reactedMode=lv2.mode;
      // 生成产物
      setTimeout(()=>{
        const showProducts=lv2.mode===reactedMode;
        if(showProducts)lv2.particles=[];
        let cx=W/2,cy=H/2;
        if(reactedMode===0){
          if(showProducts){
            lv2.particles.push({x:cx-50,y:cy,vx:-0.5,vy:0.3,symbol:'H₂O',color:COLORS.blue,r:22});
            lv2.particles.push({x:cx+50,y:cy,vx:0.5,vy:-0.3,symbol:'H₂O',color:COLORS.blue,r:22});
          }
        }else if(reactedMode===1){
          if(showProducts){
            lv2.particles.push({x:cx-80,y:cy-20,vx:-1,vy:-0.5,symbol:'H₂',color:COLORS.white,r:18});
            lv2.particles.push({x:cx-80,y:cy+20,vx:-0.8,vy:0.5,symbol:'H₂',color:COLORS.white,r:18});
            lv2.particles.push({x:cx+80,y:cy,vx:1,vy:0,symbol:'O₂',color:COLORS.red,r:22});
          }
        }else if(reactedMode===2){
          if(showProducts){
            lv2.particles.push({x:cx-60,y:cy,vx:-0.8,vy:0.3,symbol:'ZnSO₄',color:COLORS.blue,r:26});
            lv2.particles.push({x:cx+60,y:cy,vx:0.8,vy:-0.3,symbol:'Cu',color:COLORS.primary,r:20});
          }
        }else{
          if(showProducts){
            lv2.particles.push({x:cx-60,y:cy,vx:-0.3,vy:1.5,symbol:'AgCl↓',color:'#ddd',r:24});
            lv2.particles.push({x:cx+60,y:cy,vx:0.5,vy:-0.3,symbol:'NaNO₃',color:COLORS.cyan,r:24});
          }
        }
        markLv2DemoDone(reactedMode);
      },500);
      // 闪光效果
      ctx.fillStyle='rgba(249,115,22,0.3)';ctx.beginPath();ctx.arc((a.x+b.x)/2,(a.y+b.y)/2,60,0,Math.PI*2);ctx.fill();
    }
  }
  if(lv2.reacted){drawText('✓ 反应完成！',W/2,H-60,16,COLORS.green);}
}

// ========== LEVEL 3: 反应速率 ==========
function initLv3(){
  lv3={temp:25,conc:1.0,catalyst:false,rateData:[],time:0,running:false,maxPoints:200,reacted:false,heatedRun:false,concentratedRun:false,baselineRate:null,catalystRate:null,comparisonDone:false};
}
function lv3RateFactors(){
  return {
    base:0.01,
    temp:Math.exp((lv3.temp-25)/30),
    conc:lv3.conc,
    catalyst:lv3.catalyst?3:1
  };
}
function calcRate(){
  const f=lv3RateFactors();
  return f.base*f.temp*f.conc*f.catalyst;
}
function lv3RateFactorText(){
  const f=lv3RateFactors();
  return `基础${f.base.toFixed(2)} × 温度${f.temp.toFixed(2)} × 浓度${f.conc.toFixed(1)} × 催化剂${f.catalyst.toFixed(0)}`;
}
function lv3CatalystCompareText(){
  if(lv3.baselineRate===null)return '先在无催化剂条件下点击“开始反应”，记录基准速率。';
  if(lv3.catalystRate===null)return `基准速率 ${lv3.baselineRate.toFixed(4)}。现在添加催化剂并再次开始反应，比较速率是否提高。`;
  const ratio=lv3.catalystRate/lv3.baselineRate;
  return `基准 ${lv3.baselineRate.toFixed(4)} → 催化 ${lv3.catalystRate.toFixed(4)}，约提升 ${ratio.toFixed(1)} 倍。催化剂目标需要这个对比结论。`;
}
function updateLv3RateText(){
  const el=document.getElementById('lv3RateVal');
  if(el)el.textContent=`速率=${calcRate().toFixed(4)} mol/(L·s)`;
  const detail=document.getElementById('lv3RateFactors');
  if(detail)detail.textContent=lv3RateFactorText();
  const compare=document.getElementById('lv3CatalystCompare');
  if(compare)compare.textContent=lv3CatalystCompareText();
}
function setLv3Temp(el){
  lv3.temp=clampNumber(el&&el.value,lv3.temp,0,100);
  setInputValue(el,lv3.temp);
  const out=document.getElementById('lv3TempVal');
  if(out)out.textContent=lv3.temp+'°C';
  updateLv3RateText();
}
function setLv3Conc(el){
  const slider=clampNumber(el&&el.value,lv3.conc*10,1,30);
  lv3.conc=slider/10;
  setInputValue(el,slider);
  const out=document.getElementById('lv3ConcVal');
  if(out)out.textContent=lv3.conc.toFixed(1);
  updateLv3RateText();
}
function toggleLv3Catalyst(){
  lv3.catalyst=!lv3.catalyst;
  renderPanel();
  renderBar();
}
function startLv3Reaction(){
  lv3.running=true;
  lv3.rateData=[];
  const rate=calcRate();
  if(lv3.temp>=55){
    lv3.heatedRun=true;
    objCheck(2,0,true);
  }
  if(lv3.conc>=2){
    lv3.concentratedRun=true;
    objCheck(2,1,true);
  }
  if(lv3.catalyst){
    lv3.catalystRate=rate;
    if(lv3.baselineRate!==null&&lv3.catalystRate>lv3.baselineRate*1.5){
      lv3.comparisonDone=true;
      objCheck(2,2,true);
    }
  }else{
    lv3.baselineRate=rate;
  }
  renderPanel();
  renderBar();
}
function drawLv3(){
  drawText('调整条件，观察反应速率变化',W/2,25,16,COLORS.accent);
  if(lv3.running){
    lv3.time+=1/60;
    let rate=calcRate();
    let val=Math.min(1,lv3.rateData.length>0?lv3.rateData[lv3.rateData.length-1]+rate*0.02:rate*0.02);
    if(lv3.rateData.length<lv3.maxPoints)lv3.rateData.push(val);
    if(val>0.95)lv3.running=false;
  }
  // 绘制粒子动画
  let rate=calcRate();
  let cx=W/2,cy=H*0.35;
  for(let i=0;i<20;i++){
    let angle=time*rate*50+i*Math.PI*2/20;
    let r=40+Math.sin(time*2+i)*15;
    let px=cx+Math.cos(angle)*r*2,py=cy+Math.sin(angle)*r;
    let speed=rate*5;
    let alpha=Math.min(1,0.3+speed*0.5);
    ctx.globalAlpha=alpha;
    drawAtom(px,py,i%3===0?'O':i%3===1?'H':'N',8+speed*3);
    ctx.globalAlpha=1;
  }
  // 速率曲线
  let gx=W*0.15,gy=H*0.85,gw=W*0.7,gh=H*0.3;
  drawGraph(gx,gy,gw,gh,lv3.rateData,1,COLORS.primary,'时间','反应进度');
  // 速率值
  drawText(`当前速率: ${rate.toFixed(4)} mol/(L·s)`,W/2,H*0.5,14,COLORS.accent);
  drawText(`温度: ${lv3.temp}°C | 浓度: ${lv3.conc.toFixed(1)} mol/L | 催化剂: ${lv3.catalyst?'有':'无'}`,W/2,H*0.5+22,12,COLORS.dim);
}

// ========== LEVEL 4: 化学平衡 ==========
function initLv4(){
  lv4={temp:400,pressure:1,concA:0.5,concB:0.5,eqPos:0.5,history:[0.5],shifted:false,conditions:[],confirmed:false};
}
function drawLv4(){
  drawText('Le Chatelier 原理：改变条件，观察平衡移动',W/2,25,16,COLORS.accent);
  drawText('N₂ + 3H₂ ⇌ 2NH₃  (正反应放热)',W/2,55,18,COLORS.primary);
  // 平衡位置可视化 - 天平
  let cx=W/2,cy=H*0.4;
  let tilt=(lv4.eqPos-0.5)*30;// 倾斜角度
  ctx.save();ctx.translate(cx,cy);ctx.rotate(tilt*Math.PI/180);
  // 天平杆
  ctx.strokeStyle=COLORS.accent;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-120,0);ctx.lineTo(120,0);ctx.stroke();
  // 左盘 - 反应物
  ctx.fillStyle='rgba(56,189,248,0.3)';ctx.beginPath();ctx.arc(-100,20,35,0,Math.PI*2);ctx.fill();
  drawText('N₂+H₂',-100,20,12,COLORS.blue);
  // 右盘 - 产物
  ctx.fillStyle='rgba(74,222,128,0.3)';ctx.beginPath();ctx.arc(100,20,35,0,Math.PI*2);ctx.fill();
  drawText('NH₃',100,20,12,COLORS.green);
  ctx.restore();
  // 支点

function equilibriumHintHTML(){
  const last=lv4.conditions[lv4.conditions.length-1];
  const hints={
    tempUp:['升高温度','正反应放热，升温相当于加入“热”，平衡左移以吸收热量。'],
    tempDown:['降低温度','系统会补偿热量减少，平衡右移并放出更多热。'],
    pressUp:['增大压强','气体总物质的量从 4 变 2，加压后平衡右移以减小压强。'],
    pressDown:['减小压强','降压后系统偏向气体分子更多的一侧，平衡左移。'],
    addN2:['加入 N₂','增加反应物浓度后，平衡右移来消耗多余的 N₂。'],
    addNH3:['加入 NH₃','增加产物浓度后，平衡左移来消耗多余的 NH₃。']
  };
  if(!last||!hints[last]){
    return '<div class="hint-box" id="equilibriumHint"><strong>提示：</strong>先改变温度、压强或浓度，再观察天平和平衡条如何移动。</div>';
  }
  const h=hints[last];
  return `<div class="hint-box" id="equilibriumHint"><strong>${h[0]}：</strong>${h[1]}这就是 Le Chatelier 原理：平衡会向减弱外界改变的方向移动。</div>`;
}
function equilibriumMovedBothWays(){
  let left=false,right=false;
  for(let i=1;i<lv4.history.length;i++){
    if(lv4.history[i]<lv4.history[i-1])left=true;
    if(lv4.history[i]>lv4.history[i-1])right=true;
  }
  return left&&right;
}
function canConfirmEquilibriumPattern(){
  return curLevel===3&&lv4.conditions.length>=5&&new Set(lv4.conditions).size>=3&&equilibriumMovedBothWays();
}
function equilibriumConfirmHintHTML(){
  if(levelObjs[3][2]){
    return '<div class="hint-box"><strong>已确认：</strong>升温、降压或加产物会让平衡左移；降温、加压或加反应物会让平衡右移，本质都是减弱外界扰动。</div>';
  }
  if(canConfirmEquilibriumPattern()){
    return '<button class="act-btn" onclick="confirmEquilibriumPattern()">确认规律：平衡总向减弱外界改变的方向移动</button>';
  }
  return `<div class="hint-box"><strong>归纳条件：</strong>还需要累计 5 次调节、至少 3 种不同操作，并观察过左移和右移两个方向。当前 ${lv4.conditions.length}/5 次、${new Set(lv4.conditions).size}/3 种，${equilibriumMovedBothWays()?'已看到双向移动':'还需看到相反方向移动'}。</div>`;
}
function confirmEquilibriumPattern(){
  if(!canConfirmEquilibriumPattern())return false;
  lv4.confirmed=true;
  objCheck(3,2,true);
  renderPanel();
  renderBar();
  return true;
}
function shiftEquilibrium(action){
  let old=lv4.eqPos;
  if(action==='tempUp'){lv4.temp+=100;lv4.eqPos=Math.max(0.1,lv4.eqPos-0.15);}// 升温，平衡左移（放热反应）
  else if(action==='tempDown'){lv4.temp=Math.max(200,lv4.temp-100);lv4.eqPos=Math.min(0.9,lv4.eqPos+0.15);}
  else if(action==='pressUp'){lv4.pressure+=1;lv4.eqPos=Math.min(0.9,lv4.eqPos+0.12);}// 加压，平衡右移（体积减小方向）
  else if(action==='pressDown'){lv4.pressure=Math.max(1,lv4.pressure-1);lv4.eqPos=Math.max(0.1,lv4.eqPos-0.12);}
  else if(action==='addN2'){lv4.eqPos=Math.min(0.9,lv4.eqPos+0.1);}// 加反应物，平衡右移
  else if(action==='addNH3'){lv4.eqPos=Math.max(0.1,lv4.eqPos-0.1);}// 加产物，平衡左移
  lv4.history.push(lv4.eqPos);
  lv4.conditions.push(action);
  if(lv4.eqPos!==old)lv4.shifted=true;
  const uniqueActions=new Set(lv4.conditions).size;
  if(lv4.conditions.length>=1)objCheck(3,0,true);
  if(uniqueActions>=3)objCheck(3,1,true);
  renderPanel();
  renderBar();
}

function calcLv6PH(drops){
  if(drops<=0)return 1;
  if(drops<9)return 1+drops*0.18;
  if(drops===9)return 4.2;
  if(drops===10)return 7;
  if(drops===11)return 10.2;
  return Math.min(13,10.2+(drops-11)*0.35);
}
function lv6StageText(){
  if(lv6.eqPoint&&!lv6.eqConfirmed)return '已到达等当点：酸和碱按计量比恰好中和，请先确认这个判断再继续完成曲线。';
  if(lv6.eqPoint)return '已确认等当点：酸碱已按计量比中和，继续滴加会变成碱过量。';
  if(lv6.drops>=8)return '接近等当点：少量 NaOH 会让 pH 快速跃升。';
  return '酸过量阶段：pH 缓慢上升，溶液仍明显呈酸性。';
}
function applyDrop(){
  lv6.drops++;lv6.totalDrops++;
  lv6.pH=calcLv6PH(lv6.drops);
  if(Math.abs(lv6.pH-7)<0.15)lv6.eqPoint=true;
  lv6.curveData.push(lv6.pH);
  if(lv6.drops>=3)objCheck(5,0,true);
  if(lv6.drops>=15)objCheck(5,2,true);
}
function confirmLv6Equivalence(){
  if(curLevel!==5||!lv6.eqPoint)return false;
  lv6.eqConfirmed=true;
  objCheck(5,1,true);

  renderBar();
  return true;
}

  addDrops(1);

function addDrops(count){
  const total=toInt(count,1,20);
  if(total===null)return;
  for(let i=0;i<total;i++)applyDrop();
  renderPanel();
  renderBar();
}

  }

// Lightweight DOM patcher: preserves focused range inputs during panel updates
function _patchPanel(el,html){
  var ae=document.activeElement;
  if(!ae||ae.type!=='range'||!el.contains(ae)){el.innerHTML=html;return;}
  var tmp=document.createElement('div');tmp.innerHTML=html;
  _diffNodes(el,tmp);
}
function _diffNodes(o,n){
  var oc=Array.from(o.childNodes),nc=Array.from(n.childNodes);
  var i=0;
  while(i<oc.length&&i<nc.length){
    var a=oc[i],b=nc[i];
    if(a.nodeType!==b.nodeType||a.nodeName!==b.nodeName){o.replaceChild(b.cloneNode(true),a);i++;continue;}
    if(a.nodeType===3){if(a.textContent!==b.textContent)a.textContent=b.textContent;i++;continue;}
    if(a.nodeType===1){
      if(a.tagName==='INPUT'&&a.type==='range'&&a===document.activeElement){i++;continue;}
      for(var j=0;j<b.attributes.length;j++){var at=b.attributes[j];if(a.getAttribute(at.name)!==at.value)a.setAttribute(at.name,at.value);}
      _diffNodes(a,b);
    }
    i++;
  }
  while(oc.length>nc.length)o.removeChild(o.lastChild);
  for(;i<nc.length;i++)o.appendChild(nc[i].cloneNode(true));
}

function answerQuiz(li,choice){
  li=Number(li);choice=Number(choice);
  if(!Number.isInteger(li)||!Number.isInteger(choice))return false;
  if(li<0||li>=levelNames.length)return false;
  if(li!==curLevel||quizPassed.has(li)||!levelObjs[li]||!levelObjs[li].every(Boolean))return false;

// ========== POINTER EVENTS (Level 1 drag) ==========
function pointerPos(e){
  let rect=cv.getBoundingClientRect();
  return {
    x:(e.clientX-rect.left)*(cv.width/rect.width),
    y:(e.clientY-rect.top)*(cv.height/rect.height)
  };
}
function startPointer(e){
  let p=pointerPos(e);
  mouse.down=true;mouse.x=p.x;mouse.y=p.y;
  if(curLevel===0){
    for(let i=lv1.atoms.length-1;i>=0;i--){
      let a=lv1.atoms[i];
      if(!a.placed&&Math.hypot(a.x-p.x,a.y-p.y)<(ATOM_RADIUS[a.symbol]||18)+5){
        mouse.drag=i;
        if(e.preventDefault)e.preventDefault();
        if(cv.setPointerCapture&&e.pointerId!==undefined)cv.setPointerCapture(e.pointerId);
        break;
      }
    }
  }
}
function movePointer(e){
  let p=pointerPos(e);
  mouse.x=p.x;mouse.y=p.y;
  if(mouse.drag!==null&&curLevel===0){
    lv1.atoms[mouse.drag].x=mouse.x;
    lv1.atoms[mouse.drag].y=mouse.y;
    if(e.preventDefault)e.preventDefault();
  }
}
function endPointer(e){
  if(mouse.drag!==null&&curLevel===0){
    let a=lv1.atoms[mouse.drag];
    let placed=false;
    for(let t of lv1.targets){
      if(t.need===a.symbol&&t.count<t.max&&Math.hypot(a.x-t.x,a.y-t.y)<40){
        t.count++;a.placed=true;a.x=t.x+(t.count-1)*15-10;a.y=t.y;placed=true;
        if(t.side==='r')objCheck(0,0);else objCheck(0,1);
        break;
      }
    }
    if(!placed){a.x=a.ox;a.y=a.oy;}
    renderPanel();
  }
  if(e&&cv.releasePointerCapture&&e.pointerId!==undefined)cv.releasePointerCapture(e.pointerId);
  mouse.down=false;mouse.drag=null;
}
cv.addEventListener('pointerdown',startPointer);
cv.addEventListener('pointermove',movePointer);
cv.addEventListener('pointerup',endPointer);
cv.addEventListener('pointercancel',endPointer);
