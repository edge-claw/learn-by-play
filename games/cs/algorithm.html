<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数据结构与算法 探险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}


body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;height:100vh}
canvas{display:block}
.overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.overlay h1{font-size:42px;color:#8b5cf6;margin-bottom:8px;text-shadow:0 0 30px rgba(139,92,246,0.5)}
.overlay .sub{font-size:18px;color:var(--sub-color);margin-bottom:32px}
.overlay .desc{max-width:520px;text-align:center;color:var(--text-muted);font-size:14px;line-height:1.8;margin-bottom:36px}
.overlay .start-btn{padding:14px 48px;font-size:18px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:all .3s}
.overlay .start-btn:hover{transform:scale(1.05);box-shadow:0 0 24px rgba(139,92,246,0.5)}
.panel{position:fixed;left:0;top:0;bottom:36px;width:320px;background:var(--panel-bg);border-right:1px solid rgba(139,92,246,0.2);overflow-y:auto;z-index:10;display:none;padding:16px;padding-bottom:24px}
.panel h2{font-size:18px;color:var(--title-color);margin-bottom:8px}
.panel h3{font-size:16px;color:var(--title-color);margin:12px 0 6px}
.panel p,.panel li{font-size:13px;color:var(--text-muted);line-height:1.6}
.panel ul{padding-left:18px}
.obj-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:13px}
.obj-item .dot{width:16px;height:16px;border-radius:50%;border:2px solid #475569;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.obj-item .dot.done{border-color:#22c55e;background:#22c55e;color:#fff}
.act-btn{display:block;width:100%;padding:10px;margin:4px 0;font-size:15px;border:1px solid rgba(139,92,246,0.3);background:rgba(139,92,246,0.1);color:#c4b5fd;border-radius:6px;cursor:pointer;transition:all .2s;text-align:center}
.act-btn:hover{background:rgba(139,92,246,0.25);border-color:#8b5cf6}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:8px;padding:10px;margin-top:10px}
.learn-box h4{color:#4ade80;font-size:13px;margin-bottom:6px}
.learn-box p{font-size:12px;color:#86efac;line-height:1.6}
.bar{position:fixed;left:0;right:0;bottom:0;height:36px;background:var(--bar-bg);border-top:1px solid rgba(139,92,246,0.2);display:none;z-index:10;padding:0 16px;align-items:center;justify-content:space-between;font-size:13px}
.bar-left,.bar-right{display:flex;align-items:center;gap:8px}
.bar-btn{padding:4px 12px;font-size:12px;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);color:#c4b5fd;border-radius:4px;cursor:pointer}
.bar-btn:hover{background:rgba(139,92,246,0.3)}
.bar-dots{display:flex;gap:4px}
.bar-dot{width:8px;height:8px;border-radius:50%;background:#334155;cursor:pointer;transition:all .2s}
.bar-dot.active{background:#8b5cf6;box-shadow:0 0 6px rgba(139,92,246,0.5)}
.bar-dot.done{background:#22c55e}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:#c7d2fe;border-radius:2px}

.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:10px 0}
.quiz-title{font-weight:bold;color:var(--quiz-q);margin-bottom:6px}
.quiz-q{font-size:13px;color:var(--quiz-q);line-height:1.6;margin-bottom:8px}
.quiz-opt{display:block;width:100%;padding:8px;margin:5px 0;border:1px solid var(--quiz-opt-border);border-radius:6px;background:var(--quiz-opt-bg);color:var(--quiz-opt-text);cursor:pointer;text-align:left}
.quiz-opt:hover{background:var(--quiz-opt-hover)}
.quiz-feedback{font-size:12px;line-height:1.6;margin-top:6px;padding:7px;border-radius:6px}
.quiz-feedback.ok{background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-feedback.bad{background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:#aaa;font-size:12px;width:80px}
.feat .fi{font-size:26px;margin-bottom:4px}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="overlay" id="overlay">
  <h1>🧮 数据结构与算法 探险</h1>
  <div class="sub">Data Structures & Algorithms Adventure</div>
  <div class="desc">
    从数组到堆，7 个关卡带你深入理解核心数据结构与经典算法。<br>
    每一关都有交互式可视化动画，亲手操作、直观感受算法之美。
  </div>
<button class="start-btn" onclick="startGame()">开始探索 →</button>
<div class="features">
<div class="feat"><div class="fi">📦</div>数组与链表</div>
<div class="feat"><div class="fi">📚</div>栈与队列</div>
<div class="feat"><div class="fi">🔄</div>排序算法</div>
<div class="feat"><div class="fi">🌳</div>二叉树</div>
<div class="feat"><div class="fi">⚖️</div>BST与平衡</div>
<div class="feat"><div class="fi">🗂️</div>哈希表</div>
<div class="feat"><div class="fi">⛰️</div>堆与优先队列</div>
</div>
</div>
<div class="panel" id="panel"></div>
<canvas id="cv"></canvas>
<div class="bar" id="bar"></div>
<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const panel=document.getElementById('panel'),bar=document.getElementById('bar'),overlay=document.getElementById('overlay');
let W,H,curLevel=0,animId=null,animQueue=[],animRunning=false;
let levelObjs=Array.from({length:7},()=>[false,false,false]);
// ===== 关卡数据 =====
const levels=[
  {name:'数组与链表',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>数据结构：</b>数组（连续内存） vs 链表（指针链接）</div>理解线性数据结构的基本操作与性能差异',objs:['在数组中插入3个元素','在链表中插入3个元素','删除操作各执行1次']},
  {name:'栈与队列',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>数据结构：</b>栈（后进先出 LIFO） / 队列（先进先出 FIFO）</div>掌握后进先出与先进先出的核心思想',objs:['完成入栈出栈各3次','完成括号匹配检测','完成BFS队列演示']},
  {name:'排序算法',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>算法：</b>冒泡排序 / 快速排序 / 归并排序</div>对比经典排序算法的执行过程与效率',objs:['运行冒泡排序','运行快速排序','运行归并排序']},
  {name:'二叉树',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>数据结构：</b>二叉树 — 前序 / 中序 / 后序遍历</div>理解树的结构与三种遍历方式',objs:['构建一棵二叉树','完成前序遍历','完成中序遍历']},
  {name:'BST与平衡',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>数据结构：</b>二叉搜索树（BST） — AVL 自平衡旋转</div>理解二叉搜索树的性质与AVL旋转',objs:['插入5个节点构建BST','执行BST查找','触发AVL旋转']},
  {name:'哈希表',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>数据结构：</b>哈希表 — 哈希函数 + 冲突解决</div>理解哈希映射与冲突解决策略',objs:['插入3个键值对','观察一次哈希冲突','切换冲突解决方式']},
  {name:'堆与优先队列',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>数据结构：</b>最小堆 — 上浮 / 下沉 / 堆排序</div>理解堆的性质与堆排序过程',objs:['构建一个最小堆','执行堆排序','观察上浮下沉动画']}
];
const quizData=[
  {q:'数组和链表最核心的取舍是什么？',opts:['数组随机访问快，链表插入删除更灵活','两者内存布局完全一样','链表一定能 O(1) 随机访问'],ans:0,ok:'对。数组连续存储支持快速下标访问，链表靠指针链接更适合局部插删。',bad:'关键区别在内存布局：数组连续，链表分散并靠指针连接。'},
  {q:'栈和队列分别遵循什么访问规则？',opts:['栈 LIFO，队列 FIFO','栈 FIFO，队列 LIFO','两者都随机访问'],ans:0,ok:'对。栈后进先出，队列先进先出。',bad:'括号匹配常用栈，BFS 常用队列，规则不同。'},
  {q:'快速排序平均时间复杂度通常是多少？',opts:['O(n log n)','O(1)','O(n³)'],ans:0,ok:'对。快速排序平均 O(n log n)，但最坏可退化。',bad:'排序需要比较和划分，通常不可能对任意输入 O(1)。'},
  {q:'二叉搜索树的中序遍历会得到什么结果？',opts:['有序序列','层序随机序列','只输出根节点'],ans:0,ok:'对。BST 左 < 根 < 右，所以中序遍历有序。',bad:'中序遍历是左、根、右，正好对应 BST 的有序关系。'},
  {q:'AVL 树旋转的目的是什么？',opts:['保持树高平衡，避免退化','让所有节点值变大','删除所有叶子节点'],ans:0,ok:'对。旋转能恢复平衡，让查找保持 O(log n)。',bad:'旋转改变局部结构，不改变中序有序性。'},
  {q:'哈希表冲突指什么？',opts:['不同 key 映射到同一个槽位','数组越界必然发生','key 不能计算哈希值'],ans:0,ok:'对。链地址法或开放寻址法都在处理这种槽位冲突。',bad:'冲突是多个 key 命中同一个 bucket，不是哈希表不能工作。'},
  {q:'最小堆的性质是什么？',opts:['父节点不大于子节点','根节点一定最大','所有叶子必须相等'],ans:0,ok:'对。最小堆根节点是全局最小值。',bad:'最小堆要求父节点 <= 子节点，不要求左右子树完全有序。'}
];
let quizPassed=new Set(),quizFeedback={};

// ===== 关卡状态 =====
let arrData=[],llData=[],arrOps=0,llOps=0,arrDel=false,llDel=false;
let stackData=[],queueData=[],stackOps=0,bracketDone=false,bfsDone=false;
let sortArr=[],sortAlgo='bubble',sortSteps=[],sortStep=0,sortRunning=false,sortDone={bubble:false,quick:false,merge:false};
let treeNodes=[],treeTraversal=[],treeHighlight=-1,treeBuildDone=false,treePreDone=false,treeInDone=false;
let bstRoot=null,bstNodes=[],bstInserted=0,bstSearchDone=false,avlRotated=false;
let hashTable=[],hashMethod='chain',hashInserted=0,hashCollision=false,hashSwitched=false;
let heapArr=[],heapBuilt=false,heapSorted=false,heapAnimSeen=false,heapSortSteps=[],heapSortStep=0;

// ===== 动画系统 =====
let anims=[];
function addAnim(obj){anims.push({...obj,t:0})}
function updateAnims(dt){
  for(let i=anims.length-1;i>=0;i--){
    anims[i].t+=dt;
    if(anims[i].t>=anims[i].dur)anims.splice(i,1);
  }
}

// ===== 工具函数 =====
function resize(){W=cv.width=window.innerWidth-320;H=cv.height=window.innerHeight-36;cv.style.position='fixed';cv.style.left='320px';cv.style.top='0'}
function lerp(a,b,t){return a+(b-a)*Math.min(1,Math.max(0,t))}
function easeOut(t){return 1-Math.pow(1-t,3)}
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=randInt(0,i);[a[i],a[j]]=[a[j],a[i]]}return a}

// ===== 绘图工具 =====
function drawRoundRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill()}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke()}
}
function drawArrow(x1,y1,x2,y2,color){
  ctx.strokeStyle=color||'#8b5cf6';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  let a=Math.atan2(y2-y1,x2-x1),s=10;
  ctx.fillStyle=color||'#8b5cf6';ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-s*Math.cos(a-0.4),y2-s*Math.sin(a-0.4));ctx.lineTo(x2-s*Math.cos(a+0.4),y2-s*Math.sin(a+0.4));ctx.fill();
}
function drawNode(x,y,r,val,color,highlight){
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=highlight?'#f59e0b':(color||'rgba(139,92,246,0.3)');ctx.fill();
  ctx.strokeStyle=highlight?'#fbbf24':(color?'#fff':'#8b5cf6');ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=t().label;ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(val,x,y);
}

}

// ===== 关卡1: 栈与队列 =====
let bracketStr='',bracketSteps=[],bracketStep=0,bracketRunning=false;
let bfsGraph={},bfsQueue=[],bfsVisited=[],bfsSteps=[],bfsStep=0,bfsRunning=false;
function initStackQueue(){
  stackData=[];queueData=[];stackOps=0;bracketDone=false;bfsDone=false;
  bracketStr='';bracketSteps=[];bracketStep=0;bracketRunning=false;
  bfsGraph={};bfsQueue=[];bfsVisited=[];bfsSteps=[];bfsStep=0;bfsRunning=false;anims=[];
}
function stackPush(){
  if(stackData.length>=8)return;
  stackData.push(randInt(1,99));stackOps++;
  addAnim({type:'stack-push',dur:0.4});
  if(stackOps>=3&&stackData.length<stackOps)checkObj(1,0);renderPanel();
}
function stackPop(){
  if(stackData.length===0)return;
  stackData.pop();stackOps++;
  addAnim({type:'stack-pop',dur:0.3});
  if(stackOps>=6)checkObj(1,0);renderPanel();
}
function runBracketMatch(){
  if(bracketRunning)return;
  bracketStr='({[()]})';bracketSteps=[];bracketStep=0;bracketRunning=true;
  let stk=[];
  const match={'(':')','[':']','{':'}'};
  for(let i=0;i<bracketStr.length;i++){
    let c=bracketStr[i];
    if('({['.includes(c)){stk.push({ch:c,idx:i});bracketSteps.push({action:'push',ch:c,idx:i,stack:[...stk]})}
    else{let top=stk.pop();bracketSteps.push({action:'pop',ch:c,idx:i,matchIdx:top?top.idx:-1,stack:[...stk]})}
  }
  bracketSteps.push({action:'done',result:stk.length===0});
  stepBracket();
}
function stepBracket(){
  if(bracketStep>=bracketSteps.length){bracketRunning=false;bracketDone=true;checkObj(1,1);renderPanel();return}
  bracketStep++;setTimeout(stepBracket,500);
}
function runBFS(){
  if(bfsRunning)return;
  bfsGraph={A:['B','C'],B:['D','E'],C:['F'],D:[],E:[],F:[]};
  bfsQueue=['A'];bfsVisited=[];bfsSteps=[{queue:['A'],visited:[]}];bfsStep=0;bfsRunning=true;
  let q=['A'],vis=new Set(['A']);
  while(q.length){
    let node=q.shift();vis.add(node);
    let step={queue:[...q],visited:[...vis],current:node};
    for(let nb of(bfsGraph[node]||[])){if(!vis.has(nb)){vis.add(nb);q.push(nb);}}
    step.queueAfter=[...q];bfsSteps.push(step);
  }
  bfsSteps.push({done:true});stepBFS();
}
function stepBFS(){
  if(bfsStep>=bfsSteps.length){bfsRunning=false;bfsDone=true;checkObj(1,2);renderPanel();return}
  bfsStep++;setTimeout(stepBFS,700);
}
function drawStackQueue(){
  // 栈
  let sx=W*0.25,sy=60;
  ctx.fillStyle='#a78bfa';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText('栈 (Stack) — LIFO',sx,sy);
  let bw=60,bh=32;sy+=20;
  for(let i=stackData.length-1;i>=0;i--){
    let y=sy+(stackData.length-1-i)*36;
    drawRoundRect(sx-bw/2,y,bw,bh,4,'rgba(139,92,246,0.2)','#8b5cf6');
    ctx.fillStyle='#334155';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(stackData[i],sx,y+bh/2);
    if(i===stackData.length-1){ctx.fillStyle='#4ade80';ctx.font='17px sans-serif';ctx.fillText('← TOP',sx+bw/2+30,y+bh/2)}
  }
  // 括号匹配
  let bx=W*0.25,by=sy+320;
  ctx.fillStyle='#a78bfa';ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.fillText('括号匹配',bx,by);
  if(bracketStr){
    by+=24;
    for(let i=0;i<bracketStr.length;i++){
      let step=bracketSteps[Math.min(bracketStep,bracketSteps.length-1)];
      let highlight=step&&(step.idx===i||step.matchIdx===i);
      ctx.fillStyle=highlight?'#f59e0b':'#94a3b8';ctx.font='bold 20px monospace';
      ctx.fillText(bracketStr[i],bx-bracketStr.length*12/2+i*24,by);
    }
    if(bracketStep>0&&bracketStep<=bracketSteps.length){
      let s=bracketSteps[bracketStep-1];
      if(s.action==='done'){
        ctx.fillStyle=s.result?'#4ade80':'#ef4444';ctx.font='20px sans-serif';
        ctx.fillText(s.result?'✓ 括号匹配成功！':'✗ 括号不匹配',bx,by+30);
      }
    }
  }
  // BFS
  let gx=W*0.7,gy=80;
  ctx.fillStyle='#a78bfa';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText('BFS 队列演示',gx,gy);
  if(Object.keys(bfsGraph).length>0){
    let pos={A:[gx,gy+60],B:[gx-80,gy+130],C:[gx+80,gy+130],D:[gx-120,gy+200],E:[gx-40,gy+200],F:[gx+80,gy+200]};
    // edges
    for(let n in bfsGraph)for(let nb of bfsGraph[n]){
      if(pos[n]&&pos[nb])drawArrow(pos[n][0],pos[n][1],pos[nb][0],pos[nb][1],'#334155');
    }
    let curStep=bfsSteps[Math.min(bfsStep,bfsSteps.length-1)]||{};
    for(let n in pos){
      let visited=curStep.visited&&(curStep.visited instanceof Set?curStep.visited.has(n):curStep.visited.includes(n));
      let isCurrent=curStep.current===n;
      drawNode(pos[n][0],pos[n][1],20,n,visited?'rgba(34,197,94,0.3)':undefined,isCurrent);
    }
    // queue display
    if(curStep.queueAfter){
      ctx.fillStyle='#475569';ctx.font='18px sans-serif';ctx.textAlign='center';
      ctx.fillText('队列: ['+curStep.queueAfter.join(', ')+']',gx,gy+250);
    }
  }
}
// ===== 关卡2: 排序算法 =====
let sortCompares=0,sortSwaps=0,sortHighlight=[-1,-1],sortSorted=[];
function initSort(){
  sortArr=shuffle(Array.from({length:16},(_,i)=>i*6+10));
  sortSteps=[];sortStep=0;sortRunning=false;sortCompares=0;sortSwaps=0;
  sortDone={bubble:false,quick:false,merge:false};sortHighlight=[-1,-1];sortSorted=[];anims=[];
}
function runSort(algo){
  if(sortRunning)return;
  sortArr=shuffle(Array.from({length:16},(_,i)=>i*6+10));
  sortAlgo=algo;sortSteps=[];sortStep=0;sortCompares=0;sortSwaps=0;sortSorted=[];
  let a=[...sortArr];
  if(algo==='bubble')genBubbleSteps(a);
  else if(algo==='quick'){genQuickSteps(a,0,a.length-1)}
  else if(algo==='merge'){genMergeSteps(a,0,a.length-1)}
  sortSteps.push({arr:[...a],hi:[-1,-1],done:true});
  sortRunning=true;stepSort();
}
function genBubbleSteps(a){
  for(let i=0;i<a.length;i++)for(let j=0;j<a.length-i-1;j++){
    sortSteps.push({arr:[...a],hi:[j,j+1],cmp:true});
    if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];sortSteps.push({arr:[...a],hi:[j,j+1],swap:true})}
  }
}
function genQuickSteps(a,lo,hi){
  if(lo>=hi)return;
  let pivot=a[hi],i=lo;
  for(let j=lo;j<hi;j++){
    sortSteps.push({arr:[...a],hi:[j,hi],cmp:true});
    if(a[j]<pivot){[a[i],a[j]]=[a[j],a[i]];sortSteps.push({arr:[...a],hi:[i,j],swap:true});i++}
  }
  [a[i],a[hi]]=[a[hi],a[i]];sortSteps.push({arr:[...a],hi:[i,hi],swap:true});
  genQuickSteps(a,lo,i-1);genQuickSteps(a,i+1,hi);
}
function genMergeSteps(a,lo,hi){
  if(lo>=hi)return;
  let mid=Math.floor((lo+hi)/2);
  genMergeSteps(a,lo,mid);genMergeSteps(a,mid+1,hi);
  let left=a.slice(lo,mid+1),right=a.slice(mid+1,hi+1),i=0,j=0,k=lo;
  while(i<left.length&&j<right.length){
    sortSteps.push({arr:[...a],hi:[lo+i,mid+1+j],cmp:true});
    if(left[i]<=right[j])a[k++]=left[i++];else a[k++]=right[j++];
    sortSteps.push({arr:[...a],hi:[k-1,-1],swap:true});
  }
  while(i<left.length){a[k++]=left[i++];sortSteps.push({arr:[...a],hi:[k-1,-1],swap:true})}
  while(j<right.length){a[k++]=right[j++];sortSteps.push({arr:[...a],hi:[k-1,-1],swap:true})}
}
function stepSort(){
  if(sortStep>=sortSteps.length){
    sortRunning=false;sortDone[sortAlgo]=true;
    if(sortDone.bubble)checkObj(2,0);if(sortDone.quick)checkObj(2,1);if(sortDone.merge)checkObj(2,2);
    renderPanel();return;
  }
  let s=sortSteps[sortStep];sortArr=[...s.arr];sortHighlight=s.hi||[-1,-1];
  if(s.cmp)sortCompares++;if(s.swap)sortSwaps++;
  sortStep++;
  let speed=sortSteps.length>200?15:sortSteps.length>100?25:40;
  setTimeout(stepSort,speed);
}

let treeAnimStep=0,treeAnimRunning=false,treeTraversalResult=[];
function initBinaryTree(){
  treeNodes=[];treeTraversal=[];treeHighlight=-1;treeBuildDone=false;treePreDone=false;treeInDone=false;
  treeAnimStep=0;treeAnimRunning=false;treeTraversalResult=[];anims=[];
}
function buildTree(){
  if(treeBuildDone)return;
  // 构建完全二叉树 [1..7]
  treeNodes=[null,{v:1},{v:2},{v:3},{v:4},{v:5},{v:6},{v:7}];
  treeBuildDone=true;checkObj(3,0);renderPanel();
}
function getTreePos(idx){
  if(idx<1||idx>7)return null;
  let depth=Math.floor(Math.log2(idx)),posInLevel=idx-Math.pow(2,depth);
  let totalInLevel=Math.pow(2,depth);
  let x=W*(posInLevel+0.5)/totalInLevel,y=60+depth*80;
  return{x,y};
}
function traverseTree(order){
  if(!treeBuildDone||treeAnimRunning)return;
  treeTraversal=[];treeTraversalResult=[];treeAnimStep=0;treeAnimRunning=true;
  function pre(i){if(i>7||!treeNodes[i])return;treeTraversal.push(i);pre(i*2);pre(i*2+1)}
  function ino(i){if(i>7||!treeNodes[i])return;ino(i*2);treeTraversal.push(i);ino(i*2+1)}
  function post(i){if(i>7||!treeNodes[i])return;post(i*2);post(i*2+1);treeTraversal.push(i)}
  if(order==='pre')pre(1);else if(order==='in')ino(1);else post(1);
  stepTreeTraversal(order);
}
function stepTreeTraversal(order){
  if(treeAnimStep>=treeTraversal.length){
    treeAnimRunning=false;treeHighlight=-1;
    if(order==='pre'){treePreDone=true;checkObj(3,1)}

    renderPanel();return;
  }
  treeHighlight=treeTraversal[treeAnimStep];
  treeTraversalResult.push(treeNodes[treeHighlight].v);
  treeAnimStep++;setTimeout(()=>stepTreeTraversal(order),500);
}

  for(let i=1;i<=7;i++){

    if(i*2+1<=7&&treeNodes[i*2+1]){let c=getTreePos(i*2+1);ctx.strokeStyle='#334155';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(c.x,c.y);ctx.stroke()}

// ===== 关卡4: BST与AVL =====
function BSTNode(v){this.v=v;this.left=null;this.right=null;this.h=1}
function bstHeight(n){return n?n.h:0}
function bstUpdateH(n){if(n)n.h=1+Math.max(bstHeight(n.left),bstHeight(n.right))}
function bstBF(n){return n?bstHeight(n.left)-bstHeight(n.right):0}
function rotateRight(y){let x=y.left,t=x.right;x.right=y;y.left=t;bstUpdateH(y);bstUpdateH(x);return x}
function rotateLeft(x){let y=x.right,t=y.left;y.left=x;x.right=t;bstUpdateH(x);bstUpdateH(y);return y}
function avlInsertNode(node,v){
  if(!node)return new BSTNode(v);
  if(v<node.v)node.left=avlInsertNode(node.left,v);
  else if(v>node.v)node.right=avlInsertNode(node.right,v);
  else return node;
  bstUpdateH(node);let bf=bstBF(node);
  if(bf>1&&v<node.left.v){avlRotated=true;return rotateRight(node)}
  if(bf<-1&&v>node.right.v){avlRotated=true;return rotateLeft(node)}
  if(bf>1&&v>node.left.v){avlRotated=true;node.left=rotateLeft(node.left);return rotateRight(node)}
  if(bf<-1&&v<node.right.v){avlRotated=true;node.right=rotateRight(node.right);return rotateLeft(node)}
  return node;
}
let bstSearchTarget=-1,bstSearchPath=[],bstSearchStep=0,bstSearchRunning=false;
function initBST(){
  bstRoot=null;bstNodes=[];bstInserted=0;bstSearchDone=false;avlRotated=false;
  bstSearchTarget=-1;bstSearchPath=[];bstSearchStep=0;bstSearchRunning=false;anims=[];
}
function bstInsertSimple(node,v){
  if(!node)return new BSTNode(v);
  if(v<node.v)node.left=bstInsertSimple(node.left,v);
  else if(v>node.v)node.right=bstInsertSimple(node.right,v);
  return node;
}
function bstInsert(){
  let v=randInt(10,90);
  bstRoot=bstInsertSimple(bstRoot,v);bstInserted++;
  bstNodes=[];flattenBST(bstRoot,bstNodes);
  if(bstInserted>=5)checkObj(4,0);renderPanel();
}
function flattenBST(node,arr,depth=0,pos=0.5,lo=0,hi=1){
  if(!node)return;
  arr.push({v:node.v,depth,pos,x:0,y:0});
  flattenBST(node.left,arr,depth+1,(lo+pos)/2,lo,pos);
  flattenBST(node.right,arr,depth+1,(pos+hi)/2,pos,hi);
}
function bstSearch(){
  if(!bstRoot||bstSearchRunning)return;
  bstSearchTarget=bstNodes[randInt(0,bstNodes.length-1)].v;
  bstSearchPath=[];bstSearchStep=0;bstSearchRunning=true;
  let node=bstRoot;
  while(node){
    bstSearchPath.push(node.v);
    if(bstSearchTarget===node.v)break;
    else if(bstSearchTarget<node.v)node=node.left;
    else node=node.right;
  }
  stepBSTSearch();
}
function stepBSTSearch(){
  if(bstSearchStep>=bstSearchPath.length){
    bstSearchRunning=false;bstSearchDone=true;checkObj(4,1);renderPanel();return;
  }
  bstSearchStep++;setTimeout(stepBSTSearch,500);
}
function avlInsert(){
  // 插入会导致不平衡的序列
  bstRoot=null;avlRotated=false;
  let vals=[30,20,10]; // 会触发右旋
  for(let v of vals)bstRoot=avlInsertNode(bstRoot,v);
  bstNodes=[];flattenBST(bstRoot,bstNodes);
  if(avlRotated){checkObj(4,2);addAnim({type:'avl-rotate',dur:1})}
  renderPanel();
}
function drawBSTVis(){
  ctx.fillStyle='#a78bfa';ctx.font='bold 20px sans-serif';ctx.textAlign='center';ctx.fillText('二叉搜索树 / AVL',W/2,36);
  if(bstNodes.length===0){ctx.fillStyle='#475569';ctx.font='20px sans-serif';ctx.fillText('点击"插入随机节点"开始',W/2,H/2);return}
  // 计算位置

  // edges

    if(!node)return;

    if(node.left){let cx=(lo+pos)/2*W,cy=70+(depth+1)*70;ctx.strokeStyle='#334155';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(cx,cy);ctx.stroke();drawEdges(node.left,depth+1,(lo+pos)/2,lo,pos)}
    if(node.right){let cx=(pos+hi)/2*W,cy=70+(depth+1)*70;ctx.strokeStyle='#334155';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(cx,cy);ctx.stroke();drawEdges(node.right,depth+1,(pos+hi)/2,pos,hi)}

let hashKeys=['apple','banana','cherry','date','elderberry','fig','grape','honey'];
let hashKeyIdx=0,hashAnimHighlight=-1;
function initHashTable(){
  hashTable=Array.from({length:8},()=>[]);hashMethod='chain';hashInserted=0;hashCollision=false;hashSwitched=false;hashKeyIdx=0;hashAnimHighlight=-1;anims=[];

function hashFn(key){let h=0;for(let c of key)h=(h*31+c.charCodeAt(0))%8;return h}
function hashInsert(){
  if(hashKeyIdx>=hashKeys.length)return;
  let key=hashKeys[hashKeyIdx++],idx=hashFn(key);

}
function switchHashMethod(){

// ===== 关卡6: 堆与优先队列 =====
let heapAnimSteps=[],heapAnimStep=0,heapAnimRunning=false,heapHighlight=[-1,-1];
function initHeap(){
  heapArr=[];heapBuilt=false;heapSorted=false;heapAnimSeen=false;
  heapSortSteps=[];heapSortStep=0;heapAnimSteps=[];heapAnimStep=0;heapAnimRunning=false;heapHighlight=[-1,-1];anims=[];
}
function heapParent(i){return Math.floor((i-1)/2)}
function heapLeft(i){return 2*i+1}
function heapRight(i){return 2*i+2}
function heapBuild(){
  if(heapBuilt)return;
  heapArr=shuffle([15,8,23,4,42,16,7,11,27,3]);
  heapAnimSteps=[];
  // build min-heap via sift-down
  let a=[...heapArr];
  for(let i=Math.floor(a.length/2)-1;i>=0;i--)heapSiftDown(a,i,a.length);
  heapArr=[...a];heapBuilt=true;heapAnimSeen=true;
  checkObj(6,0);checkObj(6,2);renderPanel();
}
function heapSiftDown(a,i,n){
  let smallest=i,l=2*i+1,r=2*i+2;
  if(l<n&&a[l]<a[smallest])smallest=l;
  if(r<n&&a[r]<a[smallest])smallest=r;
  if(smallest!==i){
    heapAnimSteps.push({arr:[...a],hi:[i,smallest],action:'swap'});
    [a[i],a[smallest]]=[a[smallest],a[i]];
    heapSiftDown(a,smallest,n);
  }
}
function heapSiftUp(a,i){
  while(i>0){
    let p=heapParent(i);
    if(a[i]<a[p]){
      heapAnimSteps.push({arr:[...a],hi:[i,p],action:'swap'});
      [a[i],a[p]]=[a[p],a[i]];i=p;
    }else break;
  }
}
function heapSortRun(){
  if(!heapBuilt||heapAnimRunning)return;
  heapSortSteps=[];heapSortStep=0;heapAnimRunning=true;
  let a=[...heapArr];
  for(let i=a.length-1;i>0;i--){
    [a[0],a[i]]=[a[i],a[0]];
    heapSortSteps.push({arr:[...a],hi:[0,i],sorted:a.length-i});
    // sift down
    let j=0,n=i;
    while(true){
      let s=j,l=2*j+1,r=2*j+2;
      if(l<n&&a[l]<a[s])s=l;if(r<n&&a[r]<a[s])s=r;
      if(s===j)break;
      [a[j],a[s]]=[a[s],a[j]];
      heapSortSteps.push({arr:[...a],hi:[j,s],sorted:a.length-i});
      j=s;
    }
  }
  heapSortSteps.push({arr:[...a],hi:[-1,-1],sorted:a.length,done:true});
  stepHeapSort();
}
function stepHeapSort(){
  if(heapSortStep>=heapSortSteps.length){
    heapAnimRunning=false;heapSorted=true;checkObj(6,1);renderPanel();return;
  }
  let s=heapSortSteps[heapSortStep];heapArr=[...s.arr];heapHighlight=s.hi;
  heapSortStep++;setTimeout(stepHeapSort,120);
}
function heapPushDemo(){
  if(!heapBuilt||heapAnimRunning)return;
  let v=randInt(1,50);heapArr.push(v);
  heapAnimSteps=[];heapAnimRunning=true;
  let a=[...heapArr];
  heapSiftUp(a,a.length-1);
  heapArr=[...a];
  heapAnimSeen=true;checkObj(6,2);
  // animate steps
  let step=0;
  function animStep(){
    if(step>=heapAnimSteps.length){heapAnimRunning=false;heapHighlight=[-1,-1];renderPanel();return}
    let s=heapAnimSteps[step];heapArr=[...s.arr];heapHighlight=s.hi;
    step++;setTimeout(animStep,400);
  }
  animStep();
}
function drawHeapVis(){
  ctx.fillStyle='#a78bfa';ctx.font='bold 20px sans-serif';ctx.textAlign='center';ctx.fillText('堆与优先队列（最小堆）',W/2,36);
  if(heapArr.length===0){ctx.fillStyle='#475569';ctx.font='20px sans-serif';ctx.fillText('点击"构建最小堆"开始',W/2,H/2);return}
  // 树形显示

  }

    ctx.fillStyle='#334155';ctx.font='12px monospace';ctx.textAlign='center';ctx.textBaseline='middle';

    var h='<div class="summary-box">';
    h+='<div class="summary-title">\u{1F3C6} \u606D\u559C\u901A\u5173\uFF01</div>';
    h+='<div class="summary-sub">\u4F60\u5DF2\u5B8C\u6210\u5168\u90E8 '+total+' \u4E2A\u5173\u5361\u7684\u5B66\u4E60</div>';
    h+='<div class="summary-stats">';
    h+='<div class="summary-stat"><div class="num">'+total+'</div><div class="label">\u5173\u5361\u5B8C\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+s.done+'</div><div class="label">\u76EE\u6807\u8FBE\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+pct+'%</div><div class="label">\u77E5\u8BC6\u638C\u63E1</div></div>';
    h+='</div>';
    h+='<div class="summary-keys"><div style="font-weight:bold;color:#4f46e5;margin-bottom:6px">\u{1F4DA} \u5173\u952E\u77E5\u8BC6\u56DE\u987E</div>';
    for(var i=0;i<total;i++){h+='<div>\u2705 '+names[i]+'</div>';}
    h+='</div></div>';
    return h;
  };

  // 4. 增强 renderPanel - monkey-patch
  if(typeof window.renderPanel==='function'){
    var _origRP=window.renderPanel;
    window.renderPanel=function(){
      _origRP.apply(this,arguments);
      // 在 panel 顶部插入阶段导航
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
  // 也处理全局 renderPanel
  if(typeof renderPanel==='function'&&!window._rpPatched){
    window._rpPatched=true;
    var _origRP2=renderPanel;
    renderPanel=function(){
      _origRP2.apply(this,arguments);
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
})();
try{renderPanel();}catch(e){}

</script>
</body>
