<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计算机组成原理 探险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}


body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh}
canvas{position:absolute;top:0;left:320px;width:calc(100vw - 320px);height:calc(100vh - 36px)}
.panel{position:absolute;top:0;left:0;width:320px;height:calc(100vh - 36px);background:var(--panel-bg);border-right:1px solid var(--panel-border);overflow-y:auto;z-index:10;padding:12px;padding-bottom:24px}
.bar{position:absolute;bottom:0;left:0;width:100%;height:36px;background:var(--bar-bg);border-top:1px solid var(--panel-border);display:flex;align-items:center;padding:0 16px;font-size:13px;color:#666;z-index:10}
.bar .cur{color:var(--sv);font-weight:600;margin-left:8px}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--overlay-bg);display:flex;align-items:center;justify-content:center;z-index:50}
.overlay.hidden{display:none}
.start-box{text-align:center;max-width:540px}
.start-box h1{font-size:38px;color:var(--sv);margin-bottom:8px;letter-spacing:2px}
.start-box .subtitle{font-size:15px;color:#888;margin-bottom:28px}
.start-btn{background:linear-gradient(135deg,#3b82f6,#60a5fa);color:#fff;border:none;padding:14px 52px;border-radius:10px;font-size:18px;font-weight:600;cursor:pointer;transition:transform .2s}
.start-btn:hover{transform:scale(1.05)}
.features{display:flex;gap:16px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:#aaa;font-size:12px;width:64px}
.feat .fi{font-size:26px;margin-bottom:4px}
.level-btn{display:none!important}
.level-btn:hover{border-color:#3b82f6;color:#c0c0d0}
.level-btn.active{display:none!important}
.level-btn.done{display:none!important}
.concept-box{margin:10px 0;padding:10px;background:var(--concept-bg);border-left:3px solid #3b82f6;border-radius:0 6px 6px 0;font-size:12px;line-height:1.6;color:var(--concept-text)}
.act-btn{display:inline-block;padding:6px 14px;margin:3px;background:var(--concept-bg);border:1px solid #2a2a5a;border-radius:6px;color:#c0c0d0;font-size:15px;cursor:pointer;transition:all .2s}
.act-btn:hover{border-color:#3b82f6;background:#0d1a3a}
.act-btn.sel{border-color:#3b82f6;background:#1a2a5a;color:#60a5fa}
.hint-box{margin:8px 0;padding:8px 10px;background:var(--hint-bg);border-radius:6px;font-size:11px;color:var(--hint-text);line-height:1.5}
.learn-box{margin:8px 0;padding:10px;background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:6px;font-size:14px;color:var(--learn-text);line-height:1.8}
.learn-box .sv{color:var(--sv);font-weight:600}
.obj-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px}
.obj-row .oi{font-size:14px}
.obj-row .ot{flex:1;color:#aaa}
.obj-row.done .ot{color:#4ade80;text-decoration:line-through}
.sec-title{font-size:13px;font-weight:600;color:var(--sv);margin:10px 0 6px;border-bottom:1px solid #1a1a3a;padding-bottom:4px}
.toggle-row{display:flex;align-items:center;gap:8px;margin:4px 0}
.toggle-row label{font-size:12px;color:#aaa;flex:1}
.toggle-btn{width:36px;height:20px;background:#333;border-radius:10px;cursor:pointer;position:relative;transition:background .2s;border:none}
.toggle-btn.on{background:#3b82f6}
.toggle-btn::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .2s}
.toggle-btn.on::after{left:18px}
select.ctrl-sel{background:#1e1e38;border:1px solid #2a2a5a;color:#c0c0d0;padding:4px 8px;border-radius:4px;font-size:12px;width:100%}
input.ctrl-inp{background:#1e1e38;border:1px solid #2a2a5a;color:#c0c0d0;padding:4px 8px;border-radius:4px;font-size:12px;width:60px;text-align:center}
.prog-bar{height:4px;background:var(--stage-bar);border-radius:2px;margin:6px 0}
.prog-fill{height:100%;background:#3b82f6;border-radius:2px;transition:width .3s}

.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:10px 0}
.quiz-title{font-weight:bold;color:var(--quiz-q);margin-bottom:6px}
.quiz-q{font-size:13px;color:var(--quiz-q);line-height:1.6;margin-bottom:8px}
.quiz-opt{display:block;width:100%;padding:8px;margin:5px 0;border:1px solid var(--quiz-opt-border);border-radius:6px;background:var(--quiz-opt-bg);color:var(--quiz-opt-text);cursor:pointer;text-align:left}
.quiz-opt:hover{background:var(--quiz-opt-hover)}
.quiz-feedback{font-size:12px;line-height:1.6;margin-top:6px;padding:7px;border-radius:6px}
.quiz-feedback.ok{background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-feedback.bad{background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="overlay" id="startScreen">
<div class="start-box">
<h1>🖥️ 计算机组成原理 探险</h1>
<div class="subtitle">7 个关卡，从逻辑门到完整 CPU</div>
<button class="start-btn" onclick="startGame()">开始探索</button>
<div class="features">
<div class="feat"><div class="fi">🔲</div>逻辑门</div>
<div class="feat"><div class="fi">➕</div>加法器</div>
<div class="feat"><div class="fi">💾</div>存储器</div>
<div class="feat"><div class="fi">⚙️</div>ALU</div>
<div class="feat"><div class="fi">🔀</div>数据通路</div>
<div class="feat"><div class="fi">🎛️</div>控制器</div>
<div class="feat"><div class="fi">🖥️</div>CPU</div>
</div>
</div>
</div>
<div class="panel" id="panel" style="display:none"></div>
<canvas id="cv"></canvas>
<div class="bar" id="bar">关卡：<span class="cur" id="barInfo">-</span></div>
<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),panel=document.getElementById('panel'),bar=document.getElementById('barInfo');
let W,H,curLevel=0,time=0,animId;
const BLUE='#3b82f6',LBLUE='#60a5fa',DARK='#0a0a1a',DIM='#1a1a3a';

function resize(){cv.width=W=cv.offsetWidth*devicePixelRatio;cv.height=H=cv.offsetHeight*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio)}
window.onresize=resize;

// ===== Level definitions =====
const levels=[
{name:'逻辑门',icon:'🔲',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>核心组件：</b>AND / OR / NOT / XOR 基本逻辑门</div>验证真值表，用 NAND 构建其他门',
 objs:['验证 AND 门','验证 OR 门','用 NAND 构建 NOT'],
 learn:'逻辑门是数字电路的基石。<span class="sv">AND</span> 门在所有输入为 1 时输出 1；<span class="sv">OR</span> 门在任一输入为 1 时输出 1；<span class="sv">NOT</span> 门反转输入。所有复杂电路都由这些基本门组合而成。'},
{name:'加法器',icon:'➕',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>核心组件：</b>半加器 → 全加器 → 行波进位加法器</div>理解进位传播与 4 位加法',
 objs:['理解半加器','观察进位传播','完成 4 位加法'],
 learn:'<span class="sv">半加器</span>用 XOR 求和、AND 求进位。<span class="sv">全加器</span>额外接收低位进位。4 个全加器串联构成<span class="sv">行波进位加法器</span>，进位从最低位逐级传播到最高位。'},
{name:'存储器',icon:'💾',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>核心组件：</b>SR 锁存器 → D 触发器 → 寄存器</div>理解 1 位存储到多位寄存器的演进',
 objs:['理解锁存原理','写入数据','读取验证'],
 learn:'<span class="sv">SR 锁存器</span>通过交叉反馈实现 1 位存储。<span class="sv">D 触发器</span>在时钟边沿采样输入。多个触发器并联构成<span class="sv">寄存器</span>，是 CPU 内部最快的存储单元。'},
{name:'ALU',icon:'⚙️',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>核心组件：</b>ALU — 加减法 / 逻辑运算 / 标志位</div>CPU 的运算核心',
 objs:['执行加法','执行逻辑与','观察溢出标志'],
 learn:'<span class="sv">ALU</span> 是 CPU 的运算核心。它根据操作码执行加减法和逻辑运算，同时产生<span class="sv">标志位</span>：零标志(Z)、进位(C)、溢出(V)，供后续指令判断使用。'},
{name:'数据通路',icon:'🔀',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>核心组件：</b>寄存器文件 + ALU + 多路选择器 + 总线</div>数据的读取→运算→写回循环',
 objs:['配置读寄存器','执行 ALU 运算','写回结果'],
 learn:'<span class="sv">数据通路</span>连接寄存器文件、ALU 和存储器。<span class="sv">多路选择器</span>根据控制信号选择数据来源。数据沿总线流动，完成读取→运算→写回的循环。'},
{name:'控制器',icon:'🎛️',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>核心组件：</b>控制器 — 指令解码 + 控制信号生成</div>驱动数据通路的指挥中心',
 objs:['解码 R 型指令','解码 Load 指令','观察控制信号'],
 learn:'<span class="sv">控制器</span>读取指令的操作码字段，生成一组控制信号驱动数据通路。<span class="sv">R 型指令</span>操作寄存器间运算，<span class="sv">Load 指令</span>从内存读数据到寄存器。'},
{name:'完整 CPU',icon:'🖥️',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>核心组件：</b>5 级流水线 — IF→ID→EX→MEM→WB</div>取指→解码→执行→访存→写回',
 objs:['执行完整指令周期','观察流水线并行','识别数据冒险'],
 learn:'现代 CPU 采用<span class="sv">5 级流水线</span>：IF(取指)→ID(解码)→EX(执行)→MEM(访存)→WB(写回)。流水线让多条指令重叠执行，但<span class="sv">数据冒险</span>需要转发或暂停来解决。'}
];

const quizData=[
  {q:'数字电路中逻辑门的作用是什么？',opts:['根据输入位产生布尔输出','存储大量文件','把交流电直接变成图像'],ans:0,ok:'对。逻辑门实现布尔运算，是组合逻辑的基础。',bad:'逻辑门处理 0/1 信号，核心是布尔运算。'},
  {q:'全加器相比半加器多处理什么输入？',opts:['低位进位 Cin','显示器颜色','内存地址总线宽度'],ans:0,ok:'对。全加器处理 A、B 和 Cin，输出 Sum 与 Cout。',bad:'半加器只有两个输入，全加器多了来自低位的进位。'},
  {q:'D 触发器通常在什么时候保存输入？',opts:['时钟边沿','任意随机时刻','电源关闭后'],ans:0,ok:'对。触发器按时钟边沿采样，是寄存器的基础。',bad:'寄存器依赖时钟同步，不是随机保存。'},
  {q:'ALU 在 CPU 中主要负责什么？',opts:['算术和逻辑运算','长期保存全部程序','控制散热风扇'],ans:0,ok:'对。ALU 执行加减和 AND/OR/XOR 等运算，并产生标志位。',bad:'ALU 是运算单元，不是主存或外设控制器。'},
  {q:'数据通路中的多路选择器作用是什么？',opts:['根据控制信号选择数据来源','提升屏幕亮度','永久删除寄存器'],ans:0,ok:'对。MUX 决定 ALU、寄存器、内存之间的数据来源。',bad:'数据通路靠控制信号选择数据流，不是靠手动连接。'},
  {q:'控制器解码指令后会生成什么？',opts:['控制信号','网页样式表','随机噪声'],ans:0,ok:'对。控制信号驱动寄存器、ALU、内存和多路选择器协同工作。',bad:'控制器的职责是解释指令并产生控制信号。'},
  {q:'五级流水线的正确顺序是什么？',opts:['IF→ID→EX→MEM→WB','WB→MEM→EX→ID→IF','ALU→RAM→GPU→NIC→Disk'],ans:0,ok:'对。取指、解码、执行、访存、写回构成经典五级流水。',bad:'经典 CPU 流水线从取指开始，到写回结束。'}
];

if(!levelObjs[li][oi]){levelObjs[li][oi]=true;renderPanel()}

bar.innerHTML='<span style="color:var(--text-muted)">'+levels[i].icon+' '+levels[i].name+'</span>';

// ===== Game logic =====
function calcGate(t,a,b){
  if(t===0)return a&b;if(t===1)return a|b;if(t===2)return 1-a;if(t===3)return a^b;if(t===4)return 1-(a&b);return 0;
}
function checkGateObj(){
  if(gateType===0&&gateA===1&&gateB===1)completeObj(0,0);
  if(gateType===1&&(gateA===1||gateB===1))completeObj(0,1);
  if(gateType===4)completeObj(0,2); // NAND as NOT builder
}
function checkAddObj(){
  completeObj(1,0); // understood half adder by interacting
  let va=addA[3]*8+addA[2]*4+addA[1]*2+addA[0];
  let vb=addB[3]*8+addB[2]*4+addB[1]*2+addB[0];
  if(va+vb>15)completeObj(1,1); // carry propagation
  if(va>0&&vb>0)completeObj(1,2);
}
function doMemWrite(){
  memCells[memAddr]=memVal&255;
  memClk=1;
  completeObj(2,0); // latch principle
  completeObj(2,1); // wrote data
  renderPanel();
}
function checkMemObj(){
  if(memMode===1&&memCells[memAddr]>0)completeObj(2,2);
}
function calcAlu(){
  let v=0,z=0,c=0,ov=0;
  if(aluOp===0){v=aluA+aluB;c=v>255?1:0;v&=255;ov=(aluA<128&&aluB<128&&v>=128)?1:0}
  else if(aluOp===1){v=aluA-aluB;c=v<0?1:0;v&=255}
  else if(aluOp===2){v=aluA&aluB}
  else if(aluOp===3){v=aluA|aluB}
  else{v=aluA^aluB}
  z=v===0?1:0;
  return{val:v,z,c,v:ov};
}
function checkAluObj(){
  if(aluOp===0)completeObj(3,0);
  if(aluOp===2)completeObj(3,1);
  let r=calcAlu();if(r.v||r.c)completeObj(3,2);
}
function calcDpAlu(){
  let a=dpRegs[dpSrcA],b=dpRegs[dpSrcB];
  if(dpOp===0)return a+b;if(dpOp===1)return a-b;if(dpOp===2)return a&b;return a|b;
}
function execDatapath(){
  completeObj(4,0);completeObj(4,1);
  if(dpWE){
    let r=calcDpAlu();
    dpRegs[dpSrcA]=r&255;
    completeObj(4,2);
  }
  renderPanel();
}
function checkCtrlObj(){
  if(ctrlInstr===0)completeObj(5,0);
  if(ctrlInstr===1)completeObj(5,1);
  if(ctrlInstr>=0)completeObj(5,2);
}
function cpuReset(){
  cpuPC=0;cpuStep=0;cpuPipe=[[],[],[],[],[]];
  cpuRegs=[0,10,3,0,0,0,0,0];cpuMem=[0,0,0,5,0,0,0,0];
  renderPanel();
}
function cpuStepExec(){
  if(cpuPC<cpuProg.length){
    let ins=cpuProg[cpuPC];
    // Simple execute
    if(ins.op==='ADD')cpuRegs[ins.rd]=cpuRegs[ins.rs1]+cpuRegs[ins.rs2];
    else if(ins.op==='SUB')cpuRegs[ins.rd]=cpuRegs[ins.rs1]-cpuRegs[ins.rs2];
    else if(ins.op==='LOAD')cpuRegs[ins.rd]=cpuMem[(cpuRegs[ins.rs1]+ins.imm)&7];
    // Pipeline visualization
    for(let s=4;s>0;s--)cpuPipe[s]=cpuPipe[s-1];
    cpuPipe[0]=[cpuPC,ins.text];
    cpuPC++;cpuStep++;
    completeObj(6,0);
    if(cpuStep>=2)completeObj(6,1);
    // Data hazard: R2 written then read
    if(cpuStep>=2)completeObj(6,2);
  }
  renderPanel();
}

// ===== Canvas drawing =====
function cw(){return cv.offsetWidth}
function ch(){return cv.offsetHeight}

function loop(){
  time+=0.016;
  draw();
  animId=requestAnimationFrame(loop);
}

function draw(){
  const w=cw(),h=ch();
  ctx.clearRect(0,0,w,h);
  ctx.save();
  switch(curLevel){
    case 0:drawGates(w,h);break;
    case 1:drawAdder(w,h);break;
    case 2:drawMemory(w,h);break;
    case 3:drawALU(w,h);break;
    case 4:drawDatapath(w,h);break;
    case 5:drawControl(w,h);break;
    case 6:drawCPU(w,h);break;
  }
  ctx.restore();
}

// Helper drawing functions
function drawBox(x,y,w,h,label,color,filled){
  ctx.strokeStyle=color;ctx.lineWidth=2;
  ctx.fillStyle=filled||'rgba(10,10,30,0.8)';
  ctx.beginPath();ctx.roundRect(x,y,w,h,6);ctx.fill();ctx.stroke();
  if(label){ctx.fillStyle=color;ctx.font='bold 13px system-ui';ctx.textAlign='center';ctx.fillText(label,x+w/2,y+h/2+5)}
}
function drawWire(x1,y1,x2,y2,active){
  ctx.strokeStyle=active?'#4ade80':'#333';ctx.lineWidth=active?2.5:1.5;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  if(active){
    let p=(time*2)%1,px=x1+(x2-x1)*p,py=y1+(y2-y1)*p;
    ctx.fillStyle='#4ade80';ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();
  }
}
function drawWireH(x1,y1,xm,x2,y2,active){
  ctx.strokeStyle=active?'#4ade80':'#333';ctx.lineWidth=active?2.5:1.5;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(xm,y1);ctx.lineTo(xm,y2);ctx.lineTo(x2,y2);ctx.stroke();
  if(active){
    let totalLen=Math.abs(xm-x1)+Math.abs(y2-y1)+Math.abs(x2-xm);
    let p=(time*80)%totalLen;
    let px,py;
    if(p<Math.abs(xm-x1)){px=x1+(xm>x1?1:-1)*p;py=y1}
    else{p-=Math.abs(xm-x1);if(p<Math.abs(y2-y1)){px=xm;py=y1+(y2>y1?1:-1)*p}
    else{p-=Math.abs(y2-y1);px=xm+(x2>xm?1:-1)*p;py=y2}}
    ctx.fillStyle='#4ade80';ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();
  }
}
function drawLabel(x,y,text,color,size){
  ctx.fillStyle=color||'#888';ctx.font=(size||12)+'px system-ui';ctx.textAlign='center';ctx.fillText(text,x,y);
}
function drawBit(x,y,val,r){
  r=r||16;
  ctx.fillStyle=val?'#4ade80':'#333';ctx.strokeStyle=val?'#4ade80':'#555';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle=val?'#000':'#888';ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.fillText(val,x,y+4);
}

// ===== Level 0: Logic Gates =====
function drawGates(w,h){
  let cx=w/2,cy=h/2;
  let gw=120,gh=80;
  // Gate body
  let names=['AND','OR','NOT','XOR','NAND'];
  let gx=cx-gw/2,gy=cy-gh/2;
  drawBox(gx,gy,gw,gh,names[gateType],LBLUE);
  // Draw gate symbol
  ctx.save();ctx.translate(cx,cy);
  ctx.strokeStyle=LBLUE;ctx.lineWidth=2;
  if(gateType===0||gateType===4){// AND/NAND
    ctx.beginPath();ctx.moveTo(-30,-25);ctx.lineTo(-30,25);ctx.lineTo(0,25);ctx.arc(0,0,25,Math.PI/2,-Math.PI/2,true);ctx.closePath();ctx.stroke();
    if(gateType===4){ctx.beginPath();ctx.arc(28,0,4,0,Math.PI*2);ctx.stroke()}
  }else if(gateType===1){// OR
    ctx.beginPath();ctx.moveTo(-30,-25);ctx.quadraticCurveTo(-10,0,-30,25);ctx.quadraticCurveTo(10,25,30,0);ctx.quadraticCurveTo(10,-25,-30,-25);ctx.stroke();
  }else if(gateType===2){// NOT
    ctx.beginPath();ctx.moveTo(-25,-20);ctx.lineTo(-25,20);ctx.lineTo(20,0);ctx.closePath();ctx.stroke();
    ctx.beginPath();ctx.arc(24,0,4,0,Math.PI*2);ctx.stroke();
  }else if(gateType===3){// XOR
    ctx.beginPath();ctx.moveTo(-30,-25);ctx.quadraticCurveTo(-10,0,-30,25);ctx.quadraticCurveTo(10,25,30,0);ctx.quadraticCurveTo(10,-25,-30,-25);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-36,-25);ctx.quadraticCurveTo(-16,0,-36,25);ctx.stroke();
  }
  ctx.restore();
  // Input wires
  let inY1=cy-15,inY2=cy+15;
  if(gateType===2)inY2=cy; // NOT has 1 input
  drawBit(gx-60,inY1,gateA);
  drawWire(gx-44,inY1,gx,inY1,gateA);
  if(gateType!==2){drawBit(gx-60,inY2,gateB);drawWire(gx-44,inY2,gx,inY2,gateB)}
  // Output
  let out=calcGate(gateType,gateA,gateB);
  drawWire(gx+gw,cy,gx+gw+40,cy,out);
  drawBit(gx+gw+60,cy,out);
  // Truth table
  let tx=cx+160,ty=cy-80;
  ctx.fillStyle='#444';ctx.font='bold 12px monospace';ctx.textAlign='left';
  if(gateType===2){
    ctx.fillText('A | Y',tx,ty);
    ctx.fillText('-----',tx,ty+16);
    for(let a=0;a<2;a++){
      let y=calcGate(2,a,0);
      ctx.fillStyle=(a===gateA)?LBLUE:'#555';
      ctx.fillText(`${a} | ${y}`,tx,ty+32+a*16);
    }
  }else{
    ctx.fillStyle='#888';ctx.fillText('A B | Y',tx,ty);
    ctx.fillText('--------',tx,ty+16);
    for(let a=0;a<2;a++)for(let b=0;b<2;b++){
      let y=calcGate(gateType,a,b);
      ctx.fillStyle=(a===gateA&&b===gateB)?LBLUE:'#555';
      ctx.fillText(`${a} ${b} | ${y}`,tx,ty+32+(a*2+b)*16);
    }
  }
  drawLabel(cx,gy-30,`${names[gateType]} 门`,LBLUE,16);
}

// ===== Level 1: Adder =====
function drawAdder(w,h){
  let startX=w/2-200,baseY=h/2;
  drawLabel(w/2,baseY-130,'4 位行波进位加法器',LBLUE,16);
  let carry=0;
  let carries=[0];
  for(let i=0;i<4;i++){
    let s=addA[i]^addB[i]^carry;
    let c=(addA[i]&addB[i])|(addA[i]&carry)|(addB[i]&carry);
    carries.push(c);
    carry=c;
  }
  carry=0;
  for(let i=0;i<4;i++){
    let bx=startX+i*100,by=baseY-30;
    // Full adder box
    drawBox(bx,by,80,60,`FA${i}`,LBLUE);
    drawLabel(bx+40,by-8,`全加器 ${i}`,LBLUE,11);
    // Input A
    drawBit(bx+20,by-40,addA[i],10);
    drawWire(bx+20,by-30,bx+20,by,addA[i]);
    drawLabel(bx+20,by-54,`A${i}`,addA[i]?'#4ade80':'#666',10);
    // Input B
    drawBit(bx+60,by-40,addB[i],10);
    drawWire(bx+60,by-30,bx+60,by,addB[i]);
    drawLabel(bx+60,by-54,`B${i}`,addB[i]?'#4ade80':'#666',10);
    // Carry in
    let cin=carries[i];
    if(i>0){
      drawWire(bx-20,by+30,bx,by+30,cin);
    }else{
      drawBit(bx-30,by+30,0,8);
      drawWire(bx-22,by+30,bx,by+30,false);
      drawLabel(bx-30,by+46,'Cin',`#666`,9);
    }
    // Sum output
    let s=addA[i]^addB[i]^cin;
    drawWire(bx+40,by+60,bx+40,by+90,s);
    drawBit(bx+40,by+100,s,10);
    drawLabel(bx+40,by+118,`S${i}`,s?'#4ade80':'#666',10);
    // Carry out
    let cout=carries[i+1];
    if(i<3){
      drawWire(bx+80,by+30,bx+100,by+30,cout);
    }else{
      drawWire(bx+80,by+30,bx+100,by+30,cout);
      drawBit(bx+110,by+30,cout,10);
      drawLabel(bx+110,by+46,'Cout',cout?'#4ade80':'#666',9);
    }
    carry=cout;
  }
  // Animated carry propagation
  if(addAnim>0){
    addAnim+=0.02;
    let p=Math.min(addAnim,1);
    let ax=startX+p*400;
    ctx.fillStyle='rgba(59,130,246,0.3)';ctx.fillRect(startX,baseY-30,ax-startX,60);
    if(addAnim>1.5)addAnim=0;
  }
}

}

// ===== Level 6: Full CPU Pipeline =====
function drawCPU(w,h){
  let cx=w/2,cy=h/2;
  drawLabel(cx,cy-180,'5 级流水线 CPU',LBLUE,16);
  let stages=['IF\n取指','ID\n解码','EX\n执行','MEM\n访存','WB\n写回'];
  let stageColors=['#3b82f6','#a855f7','#f59e0b','#22c55e','#ef4444'];
  let sw=100,sh=120,gap=16;
  let totalW=stages.length*(sw+gap)-gap;
  let sx=cx-totalW/2,sy=cy-60;
  // Draw pipeline stages
  stages.forEach((s,i)=>{
    let x=sx+i*(sw+gap),y=sy;
    let hasInstr=cpuPipe[i]&&cpuPipe[i].length>0;
    ctx.fillStyle=hasInstr?stageColors[i]+'30':'rgba(20,20,40,0.8)';
    ctx.strokeStyle=hasInstr?stageColors[i]:DIM;ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(x,y,sw,sh,8);ctx.fill();ctx.stroke();
    // Stage name
    let lines=s.split('\n');
    ctx.fillStyle=hasInstr?stageColors[i]:'#555';ctx.font='bold 14px system-ui';ctx.textAlign='center';
    ctx.fillText(lines[0],x+sw/2,y+24);
    ctx.font='11px system-ui';ctx.fillText(lines[1],x+sw/2,y+40);
    // Instruction in stage
    if(hasInstr){
      ctx.fillStyle=t().label;ctx.font='10px monospace';ctx.textAlign='center';
      let txt=cpuPipe[i][1];
      if(txt.length>12)txt=txt.substring(0,12)+'…';
      ctx.fillText(txt,x+sw/2,y+70);
      ctx.fillStyle=stageColors[i];ctx.font='9px system-ui';
      ctx.fillText(`PC=${cpuPipe[i][0]}`,x+sw/2,y+86);
      // Animated processing indicator
      let pulse=Math.sin(time*4+i)*0.4+0.6;
      ctx.fillStyle=stageColors[i]+Math.floor(pulse*40).toString(16).padStart(2,'0');
      ctx.beginPath();ctx.roundRect(x+4,y+sh-20,sw-8,14,4);ctx.fill();
      ctx.fillStyle=stageColors[i];ctx.font='8px system-ui';
      ctx.fillText('处理中...',x+sw/2,y+sh-9);
    }
    // Arrow between stages
    if(i<4){
      let ax=x+sw+2,ay=y+sh/2;
      ctx.fillStyle=hasInstr?'#60a5fa':'#333';
      ctx.beginPath();ctx.moveTo(ax,ay-6);ctx.lineTo(ax+gap-4,ay);ctx.lineTo(ax,ay+6);ctx.fill();
    }
  });
  // Data hazard indicator
  if(cpuStep>=2){
    let hx=sx+2*(sw+gap),hy=sy+sh+20;
    ctx.fillStyle='rgba(239,68,68,0.15)';ctx.fillRect(sx+(sw+gap),sy-4,sw*2+gap,sh+8);
    ctx.strokeStyle='#ef4444';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.strokeRect(sx+(sw+gap),sy-4,sw*2+gap,sh+8);ctx.setLineDash([]);
    drawLabel(sx+2*(sw+gap)+sw/2,hy+14,'⚠ 数据冒险: 需要转发','#ef4444',11);
    // Forwarding path
    ctx.strokeStyle='#ef4444';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(sx+3*(sw+gap)+sw/2,sy+sh);
    ctx.quadraticCurveTo(sx+2.5*(sw+gap),sy+sh+40,sx+2*(sw+gap)+sw/2,sy+sh);
    ctx.stroke();ctx.setLineDash([]);
    let fp=(time*2)%1;
    let fpx=sx+3*(sw+gap)+sw/2+(sx+2*(sw+gap)+sw/2-sx-3*(sw+gap)-sw/2)*fp;
    let fpy=sy+sh+Math.sin(fp*Math.PI)*40;
    ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(fpx,fpy,4,0,Math.PI*2);ctx.fill();
  }
  // Pipeline timeline at bottom
  let ty=sy+sh+60;
  drawLabel(cx,ty-6,'流水线时序图','#888',11);
  ctx.strokeStyle='#333';ctx.lineWidth=1;
  for(let t=0;t<6;t++){
    let x=sx+t*(sw+gap)/1.2;
    ctx.beginPath();ctx.moveTo(x,ty);ctx.lineTo(x,ty+cpuProg.length*18+10);ctx.stroke();
    drawLabel(x,ty-2,`T${t}`,'#555',9);
  }
  cpuProg.forEach((ins,i)=>{
    let y=ty+6+i*18;
    ctx.fillStyle='#444';ctx.font='9px monospace';ctx.textAlign='right';
    ctx.fillText(ins.text,sx-8,y+10);
    for(let s=0;s<5;s++){
      let t=i+s;
      if(t<6){
        let x=sx+t*(sw+gap)/1.2;
        let active=i<cpuStep;
        ctx.fillStyle=active?stageColors[s]+'60':'#1a1a3a';
        ctx.fillRect(x+2,y,((sw+gap)/1.2)-4,14);
        ctx.fillStyle=active?stageColors[s]:'#444';ctx.font='8px system-ui';ctx.textAlign='center';
        ctx.fillText(stages[s].split('\n')[0],x+(sw+gap)/2.4,y+10);
      }
    }
  });
  // Instruction memory
  let imx=sx-10,imy=sy-50;
  drawBox(imx,imy,totalW+20,30,'指令存储器 (PC='+cpuPC+')','#3b82f6');
}

// ===== Init =====
resize();


// === 总分总认知结构增强 ===
// 延迟重新渲染确保增强生效
(function(){
  // 自动检测关卡名称
  function _getNames(){
    if(typeof levelNames!=='undefined')return levelNames.slice();
    if(typeof LN!=='undefined')return LN.slice();
    if(typeof levels!=='undefined'&&Array.isArray(levels))return levels.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    if(typeof LEVELS!=='undefined'&&Array.isArray(LEVELS))return LEVELS.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    return [];
  }
  function _getTotal(){return _getNames().length||7;}
  function _getCur(){
    if(typeof currentLevel!=='undefined')return currentLevel;
    if(typeof curLevel!=='undefined')return curLevel;
    if(typeof curLv!=='undefined')return curLv;
    return 0;
  }
  function _getObjs(){
    if(typeof levelObjs!=='undefined')return levelObjs;
    return null;
  }
  function _isDone(i){
    if(typeof quizPassed!=='undefined')return quizPassed.has(i);
    var o=_getObjs();
    if(o&&o[i])return o[i].every(function(v){return v;});
    if(typeof completedLevels!=='undefined')return completedLevels.has(i);
    return false;
  }
  function _countDone(){
    var o=_getObjs(),d=0,t=0;
    if(o){for(var i=0;i<o.length;i++)for(var j=0;j<o[i].length;j++){t++;if(o[i][j])d++;}}
    else if(typeof completedLevels!=='undefined'){d=completedLevels.size;t=_getTotal();}
    return{done:d,total:t};
  }


  // 2. 阶段导航
  window._stageNavHTML=function(){
    var names=_getNames(),total=names.length;
    if(!total)return '';
    var cur=_getCur(),s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):0;
    var h='<div class="stage-nav"><div class="sn-bar">';
    for(var i=0;i<total;i++){
      var unlocked=typeof isUnlocked==='function'?isUnlocked(i):true;
      var cls=_isDone(i)?'done':i===cur?'cur':unlocked?'':'locked';
      var click=unlocked?"typeof goLevel==='function'&&goLevel("+i+")":'';
      h+='<div class="sn-d '+cls+'" onclick="'+click+'"></div>';
    }
    h+='</div>';
    h+='<div class="sn-info">\u{1F4CD} \u7B2C'+(cur+1)+'/'+total+'\u5173 | \u8FDB\u5EA6 '+pct+'%</div>';
    if(typeof quizPassed!=='undefined')h+='<div class="sn-hint">'+quizPassed.size+'/'+total+' \u5DF2\u901A\u5173\uFF0C\u5B8C\u6210\u76EE\u6807\u540E\u7B54\u5BF9\u6D4B\u9A8C\u624D\u89E3\u9501\u4E0B\u4E00\u5173</div>';

    h+='</div>';
    return h;
  };

  // 3. 通关总结
  window._summaryHTML=function(){
    var names=_getNames(),total=names.length;
    var s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):100;
    var h='<div class="summary-box">';
    h+='<div class="summary-title">\u{1F3C6} \u606D\u559C\u901A\u5173\uFF01</div>';
    h+='<div class="summary-sub">\u4F60\u5DF2\u5B8C\u6210\u5168\u90E8 '+total+' \u4E2A\u5173\u5361\u7684\u5B66\u4E60</div>';
    h+='<div class="summary-stats">';
    h+='<div class="summary-stat"><div class="num">'+total+'</div><div class="label">\u5173\u5361\u5B8C\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+s.done+'</div><div class="label">\u76EE\u6807\u8FBE\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+pct+'%</div><div class="label">\u77E5\u8BC6\u638C\u63E1</div></div>';
    h+='</div>';
    h+='<div class="summary-keys"><div style="font-weight:bold;color:#4f46e5;margin-bottom:6px">\u{1F4DA} \u5173\u952E\u77E5\u8BC6\u56DE\u987E</div>';
    for(var i=0;i<total;i++){h+='<div>\u2705 '+names[i]+'</div>';}
    h+='</div></div>';
    return h;
  };

  // 4. 增强 renderPanel - monkey-patch
  if(typeof window.renderPanel==='function'){
    var _origRP=window.renderPanel;
    window.renderPanel=function(){
      _origRP.apply(this,arguments);
      // 在 panel 顶部插入阶段导航
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
  // 也处理全局 renderPanel
  if(typeof renderPanel==='function'&&!window._rpPatched){
    window._rpPatched=true;
    var _origRP2=renderPanel;
    renderPanel=function(){
      _origRP2.apply(this,arguments);
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
})();
try{renderPanel();}catch(e){}

</script>
