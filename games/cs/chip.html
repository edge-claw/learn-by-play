<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>芯片内部 - RK3588 架构可视化</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}


body { background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
#toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(12,12,28,0.95); border-bottom: 1px solid #1a1a3a; z-index: 10; flex-wrap: wrap; }
#toolbar button { background: #1a1a3a; color: #aaa; border: 1px solid #2a2a5a; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
#toolbar button:hover { background: #2a2a5a; color: #fff; }
#toolbar button.active { background: #c8943e; color: #fff; border-color: #e0a848; }
.sep { width: 1px; height: 24px; background: #2a2a5a; margin: 0 4px; }
#toolbar .title { font-size: 15px; font-weight: 600; color: #c8943e; letter-spacing: 1px; margin-right: 8px; }
#canvas { flex: 1; display: block; cursor: default; }
#panel { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: rgba(12,12,28,0.95); border-top: 1px solid #1a1a3a; font-size: 13px; min-height: 44px; }
#panel .info { color: #888; }
#panel .highlight { color: #c8943e; }
#tooltip { position: absolute; display: none; background:var(--panel-bg); border: 1px solid #c8943e; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #ccc; pointer-events: none; z-index: 100; max-width: 320px; line-height: 1.6; }
#tooltip .tt-title { color: #c8943e; font-size: 15px; font-weight: 600; margin-bottom: 6px; }
#tooltip .tt-spec { color: #6a8aff; }

.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:#4f46e5;margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--text-sub);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--btn-bg);color:#4f46e5;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--concept-bg);border:1px solid #c7d2fe;border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:#6366f1;font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{color:var(--text-muted);font-size:12px;margin-top:3px}
#learningPanel{position:fixed;left:12px;top:58px;width:320px;max-height:calc(100vh - 128px);overflow:auto;background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:8px;padding:12px;z-index:20;box-shadow:0 12px 32px rgba(0,0,0,.25)}
.lesson-title{font-size:16px;font-weight:700;color:var(--title-color);margin:8px 0 4px}
.lesson-sub{font-size:12px;color:var(--text-sub);line-height:1.6;margin-bottom:8px}
.lesson-goal{border:1px solid var(--concept-border);background:var(--concept-bg);border-radius:8px;padding:9px 10px;font-size:13px;line-height:1.7;color:var(--concept-text);margin:8px 0}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:8px;padding:10px;margin:10px 0;font-size:13px;line-height:1.7;color:var(--learn-text)}
.hint-box{background:var(--hint-bg);border:1px solid var(--hint-border);border-radius:8px;padding:9px 10px;margin:8px 0;font-size:12px;line-height:1.6;color:var(--hint-text)}
.act-btn{display:block;width:100%;padding:9px 10px;margin:6px 0;border-radius:8px;border:1px solid var(--btn-border);background:var(--btn-bg);color:var(--btn-text);font-size:13px;cursor:pointer;text-align:center}
.act-btn:hover{background:var(--btn-hover)}
.act-btn.green{border-color:var(--btn-green-border);background:var(--btn-green-bg);color:var(--btn-green-text)}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:10px 0}
.quiz-title{font-size:13px;font-weight:700;color:var(--quiz-q);margin-bottom:6px}
.quiz-q{font-size:13px;line-height:1.6;color:var(--concept-text);margin-bottom:8px}
.quiz-option{display:block;width:100%;padding:8px 10px;margin:6px 0;border-radius:8px;border:1px solid var(--quiz-opt-border);background:var(--quiz-opt-bg);color:var(--quiz-opt-text);font-size:13px;text-align:left;cursor:pointer}
.quiz-option:hover{background:var(--quiz-opt-hover)}
.quiz-feedback{font-size:12px;line-height:1.6;margin-top:8px;color:var(--quiz-wrong-text)}
.quiz-feedback.ok{color:var(--quiz-correct-text)}
.summary-box{background:linear-gradient(135deg,#f0f4ff,#faf5ff);border:2px solid #c7d2fe;border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:#4f46e5;margin-bottom:6px}
.summary-sub{color:var(--text-muted);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--text-muted)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:rgba(99,102,241,0.06);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
.overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center}
.overlay h1{font-size:42px;background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.overlay .sub{color:var(--text-sub);font-size:17px;margin-bottom:32px}
.overlay .start-btn{padding:14px 48px;font-size:18px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:transform .2s}
.overlay .start-btn:hover{transform:scale(1.05)}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.features .feat{text-align:center;color:var(--feat-text);font-size:12px;width:80px}
.features .feat .fi{font-size:26px;margin-bottom:4px}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="overlay" id="ov">
<h1>🔲 芯片内部 — RK3588</h1>
<p class="sub">SoC 架构可视化 — 探索芯片内部数据流</p>
<button class="start-btn" onclick="startGame()">开始探索</button>
<div class="features">
<div class="feat"><div class="fi">🧠</div>AI推理</div>
<div class="feat"><div class="fi">🎬</div>视频解码</div>
<div class="feat"><div class="fi">🎨</div>GPU渲染</div>
<div class="feat"><div class="fi">🌊</div>压力测试</div>
<div class="feat"><div class="fi">🌡️</div>热力图</div>
<div class="feat"><div class="fi">🔍</div>模块详情</div>
</div>
</div>
<div id="toolbar">
  <span class="title">◈ RK3588 SoC 内部</span>
  <div class="sep"></div>
  <button id="btnTask1" onclick="sendTask('inference')">🧠 发起推理任务</button>
  <button id="btnTask2" onclick="sendTask('video')">🎬 视频解码任务</button>
  <button id="btnTask3" onclick="sendTask('render')">🎨 GPU 渲染任务</button>
  <button id="btnTask4" onclick="sendTask('flood')">🌊 压力测试</button>
  <div class="sep"></div>
  <button id="btnPause" onclick="togglePause()">⏸ 暂停</button>
  <button id="btnSpeed" onclick="cycleSpeed()">1x</button>
  <div class="sep"></div>
  <button id="btnHeat" onclick="toggleHeat()" class="">🌡 热力图</button>
</div>
<canvas id="canvas"></canvas>
<div id="learningPanel"></div>
<div id="panel">
  <span class="info">点击模块查看详情 · 点击按钮发起任务 · 观察数据流在总线上流动</span>
  <span class="highlight" id="taskInfo"></span>
  <span class="info" style="margin-left:auto" id="stats"></span>
</div>
<div id="tooltip"></div>
<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}}
function startGame(){document.getElementById('ov').style.display='none';renderPanel();}

// ===== 全局状态 =====
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, scale;
let paused = false;
let timeScale = 1;
let showHeat = false;
let selectedModule = null;
let hoveredModule = null;
let cam = { x: 0, y: 0, zoom: 1 };
let time = 0;
let particles = [];
let taskCount = 0;
const observedTasks = new Set();
const comboTasks = new Set();
let heatSeen = false;
let curLevel = 0;
const completedLevels = new Set();
const quizPassed = new Set();
const quizFeedback = {};

const levels = [
  { title: 'SoC 总览', sub: '识别 CPU、GPU、NPU、VPU、DDR 与外设', goal: '点击任意芯片模块，阅读模块职责与规格。', learn: 'SoC 把 CPU、GPU、NPU、视频编解码、ISP、内存控制器和外设控制器集成到同一芯片上。片上互联总线负责把这些模块连接成完整系统。' },
  { title: 'AI 推理数据流', sub: 'DDR → NPU → DDR', goal: '发起一次 AI 推理任务，观察 tensor 和 result 粒子在 DDR 与三颗 NPU 核心之间移动。', learn: 'NPU 负责矩阵乘、卷积等 AI 推理密集计算。数据通常从 DDR 读入 NPU，计算后再把结果写回 DDR，三核心并行能提高吞吐量。' },
  { title: '视频流水线', sub: 'VPU 解码、编码与内存往返', goal: '发起一次视频解码任务，观察码流、原始帧和编码结果的流向。', learn: 'VPU 用硬件专用单元处理视频编解码，比 CPU 软解更省电。视频帧会频繁经过 DDR，因此内存带宽直接影响 4K/8K 多媒体能力。' },
  { title: 'GPU 渲染路径', sub: '顶点数据、帧缓冲与显示输出', goal: '发起一次 GPU 渲染任务，观察 GPU、DDR 和 HDMI 的协作。', learn: 'GPU 读取顶点/纹理数据生成帧缓冲，帧缓冲写入 DDR 后再交给显示控制器输出。图形性能既依赖 GPU 核心，也依赖内存带宽。' },
  { title: 'NoC 与内存带宽', sub: '多模块并发访问 DDR', goal: '发起一次压力测试，观察多条路径同时占用总线和 DDR。', learn: 'NoC 片上网络负责仲裁多模块并发请求。AI、视频、GPU 同时工作时，DDR 和互联带宽往往成为系统瓶颈。' },
  { title: '功耗与热设计', sub: '负载越高，热量越集中', goal: '打开热力图，观察高负载模块颜色变化。', learn: '芯片功耗会转化为热。热点通常出现在高负载计算单元和内存控制器附近，散热设计会限制持续性能释放。' },
  { title: '系统级调度', sub: '专用硬件协同完成复杂任务', goal: '组合发起 AI、视频和渲染任务，比较专用模块分工。', learn: '现代 SoC 的效率来自异构计算：CPU 负责控制流，NPU/GPU/VPU/ISP 负责专用工作负载，软件调度要让数据少搬运、模块少等待。' }
];

const quizData = [
  {
    q: 'SoC 相比单独 CPU 芯片，核心优势是什么？',
    opts: ['把多种专用硬件和互联集成在一颗芯片上', '只能运行一个任务', '不需要内存控制器'],
    ans: 0,
    ok: '正确。SoC 的价值在于集成异构模块和片上互联。',
    bad: '再看模块布局：CPU、GPU、NPU、VPU、DDR 控制器都在同一芯片内协作。'
  },
  {
    q: 'AI 推理任务为什么会经过 DDR 和 NPU？',
    opts: ['模型数据从 DDR 读入 NPU，计算结果再写回内存', 'NPU 只负责显示输出', 'DDR 会替代 NPU 做卷积'],
    ans: 0,
    ok: '正确。NPU 是计算单元，DDR 是数据存储与交换中心。',
    bad: '观察 tensor 和 result 粒子：数据先到 NPU，结果再回 DDR。'
  },
  {
    q: '视频解码使用 VPU 的主要原因是什么？',
    opts: ['专用硬件处理视频更高效、更省电', 'VPU 是网络接口', '视频解码必须由 GPU 完成'],
    ans: 0,
    ok: '正确。VPU 用固定功能硬件处理编解码，适合高分辨率视频。',
    bad: '看视频任务路径：码流进入 VPU，处理后再经过内存。'
  },
  {
    q: 'GPU 渲染后，帧缓冲通常会去哪里？',
    opts: ['写入 DDR，再交给显示输出链路', '直接写进 NPU 核心', '只保存在 PCIe 控制器里'],
    ans: 0,
    ok: '正确。帧缓冲经过内存再被显示控制器取走输出。',
    bad: '观察 render 任务：GPU 结果会回到 DDR，然后走向 HDMI。'
  },
  {
    q: '压力测试中 DDR 负载升高说明什么？',
    opts: ['多个模块同时搬运数据，内存带宽成为共享资源', 'DDR 正在替代所有计算模块', '总线完全不参与数据传输'],
    ans: 0,
    ok: '正确。多模块并发时，DDR 与 NoC 是关键共享瓶颈。',
    bad: '看 flood 任务：很多粒子会从 DDR 发往多个模块。'
  },
  {
    q: '热力图最适合帮助理解什么？',
    opts: ['负载与发热热点的关系', '芯片封装颜色偏好', 'HTML 主题切换逻辑'],
    ans: 0,
    ok: '正确。高负载模块通常在热力图中更“热”。',
    bad: '打开热力图后比较不同模块颜色，颜色变化反映当前负载。'
  },

function isUnlocked(idx) {
  return idx === 0 || completedLevels.has(idx - 1);
}

function goLevel(idx) {
  if (!isUnlocked(idx)) return;
  curLevel = idx;
  renderPanel();
}

function markGoal(kind) {
  if (kind === 'module' && curLevel === 0) renderPanel();
  if (kind === 'inference' && curLevel === 1) renderPanel();
  if (kind === 'video' && curLevel === 2) renderPanel();
  if (kind === 'render' && curLevel === 3) renderPanel();
  if (kind === 'flood' && curLevel === 4) renderPanel();
  if (kind === 'heat' && curLevel === 5) renderPanel();
  if (kind === 'combo' && curLevel === 6) renderPanel();
}

function levelGoalDone(idx) {
  if (idx === 0) return !!selectedModule;
  if (idx === 1) return observedTasks.has('inference');
  if (idx === 2) return observedTasks.has('video');
  if (idx === 3) return observedTasks.has('render');
  if (idx === 4) return observedTasks.has('flood');
  if (idx === 5) return heatSeen;
  return comboTasks.has('inference') && comboTasks.has('video') && comboTasks.has('render');
}

  let h = '<div class="stage-nav"><div class="sn-bar">';
  for (let i = 0; i < levels.length; i++) {

    if (i === curLevel) cls += ' cur';
    if (!isUnlocked(i)) cls += ' locked';
    h += `<div class="${cls}" onclick="goLevel(${i})"></div>`;
  }
  h += `</div><div class="sn-info">第 ${curLevel + 1}/${levels.length} 关：${levels[curLevel].title}</div>`;

// ===== 数据粒子 =====
class DataParticle {
  constructor(path, color, speed, label) {
    this.path = path; // [{x,y}, ...]
    this.color = color;
    this.speed = speed;
    this.label = label || '';
    this.progress = 0; // 0~1
    this.alive = true;
    this.size = 4 + Math.random() * 3;
    this.trail = [];
  }
  update(dt) {
    this.progress += this.speed * dt;
    if (this.progress >= 1) this.alive = false;
    const pos = this.getPos();
    this.trail.push({ x: pos.x, y: pos.y, a: 1 });
    if (this.trail.length > 15) this.trail.shift();
    for (let t of this.trail) t.a *= 0.88;
  }
  getPos() {
    const totalLen = this.pathLength();
    const targetDist = this.progress * totalLen;
    let traveled = 0;
    for (let i = 1; i < this.path.length; i++) {
      const dx = this.path[i].x - this.path[i-1].x;
      const dy = this.path[i].y - this.path[i-1].y;
      const segLen = Math.sqrt(dx*dx + dy*dy);
      if (traveled + segLen >= targetDist) {
        const t = (targetDist - traveled) / segLen;
        return { x: this.path[i-1].x + dx * t, y: this.path[i-1].y + dy * t };
      }
      traveled += segLen;
    }
    return this.path[this.path.length - 1];
  }
  pathLength() {
    let len = 0;
    for (let i = 1; i < this.path.length; i++) {
      const dx = this.path[i].x - this.path[i-1].x;
      const dy = this.path[i].y - this.path[i-1].y;
      len += Math.sqrt(dx*dx + dy*dy);
    }
    return len;
  }
}

function sendTask(type) {
  const taskPaths = getTaskPaths(type);
  const names = { inference: '🧠 AI 推理', video: '🎬 视频解码', render: '🎨 GPU 渲染', flood: '🌊 压力测试' };
  taskCount++;
  observedTasks.add(type);
  if (curLevel === 6 && (type === 'inference' || type === 'video' || type === 'render')) comboTasks.add(type);
  document.getElementById('taskInfo').textContent = `${names[type]} #${taskCount} 已发起`;

  // 增加模块负载
  if (type === 'inference') {
    modules.find(m => m.id === 'npu_0').load = Math.min(1, modules.find(m => m.id === 'npu_0').load + 0.6);
    modules.find(m => m.id === 'npu_1').load = Math.min(1, modules.find(m => m.id === 'npu_1').load + 0.6);
    modules.find(m => m.id === 'npu_2').load = Math.min(1, modules.find(m => m.id === 'npu_2').load + 0.6);
    modules.find(m => m.id === 'ddr').load = Math.min(1, modules.find(m => m.id === 'ddr').load + 0.3);
  } else if (type === 'video') {
    modules.find(m => m.id === 'vpu_dec').load = Math.min(1, modules.find(m => m.id === 'vpu_dec').load + 0.7);
    modules.find(m => m.id === 'vpu_enc').load = Math.min(1, modules.find(m => m.id === 'vpu_enc').load + 0.5);
    modules.find(m => m.id === 'ddr').load = Math.min(1, modules.find(m => m.id === 'ddr').load + 0.4);
  } else if (type === 'render') {
    modules.find(m => m.id === 'gpu').load = Math.min(1, modules.find(m => m.id === 'gpu').load + 0.8);
    modules.find(m => m.id === 'ddr').load = Math.min(1, modules.find(m => m.id === 'ddr').load + 0.3);
  } else if (type === 'flood') {
    for (let m of modules) m.load = Math.min(1, m.load + 0.3 + Math.random() * 0.4);
  }

  for (let tp of taskPaths) {
    const delay = tp.delay || 0;
    setTimeout(() => {
      particles.push(new DataParticle(tp.path, tp.color, tp.speed, tp.label));
    }, delay / timeScale);
  }
  markGoal(type);
  markGoal('combo');
}

// ===== 渲染 =====
function resize() {
  const rect = canvas.getBoundingClientRect();
  const dpr = devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  W = rect.width;
  H = rect.height;
  scale = Math.min(W / 860, H / 680);
}

function drawChipBackground() {
  // 硅基底
  ctx.fillStyle = '#0c0c1a';
  ctx.fillRect(0, 0, W, H);
  // 芯片边框
  const cx = (W - 820 * scale) / 2, cy = (H - 650 * scale) / 2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  // 芯片封装外框
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 4]);
  ctx.strokeRect(20, 30, 800, 600);
  ctx.setLineDash([]);

  // 引脚（四边）
  ctx.fillStyle = '#c8943e40';
  for (let i = 0; i < 20; i++) {
    ctx.fillRect(40 + i * 38, 18, 16, 12); // 上
    ctx.fillRect(40 + i * 38, 630, 16, 12); // 下
  }
  for (let i = 0; i < 14; i++) {
    ctx.fillRect(8, 50 + i * 42, 12, 20); // 左
    ctx.fillRect(820, 50 + i * 42, 12, 20); // 右
  }

  // 总线
  for (let bus of buses) {
    ctx.strokeStyle = bus.color;
    ctx.lineWidth = bus.width;
    ctx.beginPath();
    ctx.moveTo(bus.from.x, bus.from.y);
    ctx.lineTo(bus.to.x, bus.to.y);
    ctx.stroke();
    // 总线名称
    if (bus.name) {
      ctx.fillStyle = bus.color + '80';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      const mx = (bus.from.x + bus.to.x) / 2;
      const my = (bus.from.y + bus.to.y) / 2;
      if (bus.from.y === bus.to.y) {
        ctx.fillText(bus.name, mx, my - 8);
      } else {
        ctx.save();
        ctx.translate(mx - 10, my);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText(bus.name, 0, 0);
        ctx.restore();
      }
    }
    // 总线脉冲动画
    if (bus.from.y === bus.to.y && bus.width >= 4) {
      const pulseX = bus.from.x + ((time * 80) % (bus.to.x - bus.from.x));
      ctx.fillStyle = bus.color + '60';
      ctx.beginPath();
      ctx.arc(pulseX, bus.from.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 模块
  for (let m of modules) {
    const isHovered = m === hoveredModule;
    const isSelected = m === selectedModule;

    // 热力图模式
    if (showHeat) {
      const heatVal = m.load;
      const r = Math.floor(heatVal * 255);
      const b = Math.floor((1 - heatVal) * 100);
      ctx.fillStyle = `rgba(${r}, ${Math.floor(heatVal * 80)}, ${b}, 0.6)`;
      ctx.fillRect(m.x - 4, m.y - 4, m.w + 8, m.h + 8);
    }

    // 模块背景
    const grad = ctx.createLinearGradient(m.x, m.y, m.x, m.y + m.h);
    const alpha = isHovered ? 'cc' : '88';
    grad.addColorStop(0, m.color + alpha);
    grad.addColorStop(1, m.color + '44');
    ctx.fillStyle = grad;
    // 圆角矩形
    roundRect(ctx, m.x, m.y, m.w, m.h, 6);
    ctx.fill();

    // 边框
    ctx.strokeStyle = isSelected ? '#fff' : (isHovered ? m.color : m.color + '80');
    ctx.lineWidth = isSelected ? 2 : 1;
    if (isSelected) {
      ctx.setLineDash([4, 3]);
    }
    roundRect(ctx, m.x, m.y, m.w, m.h, 6);
    ctx.stroke();
    ctx.setLineDash([]);

    // 负载指示条
    if (m.load > 0) {
      const barH = 3;
      const barY = m.y + m.h - barH - 4;
      const barW = (m.w - 10);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(m.x + 5, barY, barW, barH);
      const loadColor = m.load > 0.8 ? '#ff4444' : m.load > 0.5 ? '#ffaa00' : '#44ff44';
      ctx.fillStyle = loadColor;
      ctx.fillRect(m.x + 5, barY, barW * m.load, barH);
    }

    // 模块名称
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.min(13, m.w / 8)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(m.name, m.x + m.w / 2, m.y + m.h / 2 - 2);
    // 子标题
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${Math.min(10, m.w / 10)}px sans-serif`;
    ctx.fillText(m.sub, m.x + m.w / 2, m.y + m.h / 2 + 12);

    // 活跃时发光
    if (m.load > 0.3) {
      ctx.shadowColor = m.color;
      ctx.shadowBlur = 10 * m.load;
      roundRect(ctx, m.x, m.y, m.w, m.h, 6);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  // 数据粒子
  for (let p of particles) {
    const pos = p.getPos();
    // 尾迹
    for (let t of p.trail) {
      ctx.fillStyle = p.color + Math.floor(t.a * 80).toString(16).padStart(2, '0');
      ctx.beginPath();
      ctx.arc(t.x, t.y, p.size * 0.5 * t.a, 0, Math.PI * 2);
      ctx.fill();
    }
    // 主体
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    // 光晕
    ctx.fillStyle = p.color + '30';
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size * 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // 芯片型号标注
  ctx.fillStyle = '#c8943e30';
  ctx.font = 'bold 28px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('RK3588', 790, 625);
  ctx.font = '12px sans-serif';
  ctx.fillText('Rockchip · 8nm · 22.1B transistors', 790, 642);

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ===== 鼠标交互 =====
function screenToChip(sx, sy) {
  const cx = (W - 820 * scale) / 2;
  const cy = (H - 650 * scale) / 2;
  return { x: (sx - cx) / scale, y: (sy - cy) / scale };
}

function moduleAt(cx, cy) {
  for (let m of modules) {
    if (cx >= m.x && cx <= m.x + m.w && cy >= m.y && cy <= m.y + m.h) return m;
  }
  return null;
}

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const c = screenToChip(sx, sy);
  const m = moduleAt(c.x, c.y);
  hoveredModule = m;
  canvas.style.cursor = m ? 'pointer' : 'default';

  const tooltip = document.getElementById('tooltip');
  if (m) {
    tooltip.style.display = 'block';
    tooltip.innerHTML = `<div class="tt-title">${m.name}</div>${m.info.replace(/\n/g, '<br>')}
      <br><span class="tt-spec">负载: ${(m.load * 100).toFixed(0)}%</span>`;
    let tx = e.clientX + 16, ty = e.clientY + 16;
    if (tx + 320 > window.innerWidth) tx = e.clientX - 330;
    if (ty + 200 > window.innerHeight) ty = e.clientY - 200;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const c = screenToChip(e.clientX - rect.left, e.clientY - rect.top);
  const m = moduleAt(c.x, c.y);
  selectedModule = m;
  if (m) {
    document.getElementById('taskInfo').textContent = `选中: ${m.name} (${m.sub})`;
    markGoal('module');
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredModule = null;
  document.getElementById('tooltip').style.display = 'none';
});

// ===== UI 控制 =====
function togglePause() {
  paused = !paused;
  document.getElementById('btnPause').textContent = paused ? '▶ 播放' : '⏸ 暂停';
  document.getElementById('btnPause').classList.toggle('active', paused);
}

function cycleSpeed() {
  const speeds = [1, 2, 4, 0.5];
  const idx = speeds.indexOf(timeScale);
  timeScale = speeds[(idx + 1) % speeds.length];
  document.getElementById('btnSpeed').textContent = timeScale + 'x';
}

function toggleHeat() {
  showHeat = !showHeat;
  if (showHeat) {
    heatSeen = true;
    markGoal('heat');
  }
  document.getElementById('btnHeat').classList.toggle('active', showHeat);
}

// ===== 主循环 =====
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  if (!lastTime) { lastTime = ts; return; }
  const rawDt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (!paused) {
    const dt = rawDt * timeScale;
    time += dt;

    // 更新粒子
    for (let p of particles) p.update(dt);
    particles = particles.filter(p => p.alive);

    // 负载自然衰减
    for (let m of modules) {
      m.load = Math.max(m.id === 'ddr' ? 0.15 : 0.05, m.load - dt * 0.08);
      m.heat = m.load * 0.8;
    }

    // 统计
    document.getElementById('stats').textContent =
      `粒子: ${particles.length} · 任务: ${taskCount}`;
  }

  resize();
  drawChipBackground();
}

requestAnimationFrame(loop);

try{renderPanel();}catch(e){}

</script>
