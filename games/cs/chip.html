body { background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
#toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(12,12,28,0.95); border-bottom: 1px solid #1a1a3a; z-index: 10; flex-wrap: wrap; }
#toolbar button { background: #1a1a3a; color: #aaa; border: 1px solid #2a2a5a; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
#toolbar button:hover { background: #2a2a5a; color: #fff; }
#toolbar button.active { background: #c8943e; color: #fff; border-color: #e0a848; }
.sep { width: 1px; height: 24px; background: #2a2a5a; margin: 0 4px; }
#toolbar .title { font-size: 15px; font-weight: 600; color: #c8943e; letter-spacing: 1px; margin-right: 8px; }
#canvas { flex: 1; display: block; cursor: default; }
#panel { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: rgba(12,12,28,0.95); border-top: 1px solid #1a1a3a; font-size: 13px; min-height: 44px; }
#panel .info { color: #888; }
#panel .highlight { color: #c8943e; }
#tooltip { position: absolute; display: none; background:var(--panel-bg); border: 1px solid #c8943e; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #ccc; pointer-events: none; z-index: 100; max-width: 320px; line-height: 1.6; }
#tooltip .tt-title { color: #c8943e; font-size: 15px; font-weight: 600; margin-bottom: 6px; }
#tooltip .tt-spec { color: #6a8aff; }

.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:#4f46e5;margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--text-sub);line-height:1.6}

.stage-nav{background:var(--concept-bg);border:1px solid #c7d2fe;border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-info{color:#6366f1;font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{color:var(--text-muted);font-size:12px;margin-top:3px}
.summary-box{background:linear-gradient(135deg,#f0f4ff,#faf5ff);border:2px solid #c7d2fe;border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:#4f46e5;margin-bottom:6px}
.summary-sub{color:var(--text-muted);font-size:13px;margin-bottom:12px}

.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}

.features .feat{text-align:center;color:var(--feat-text);font-size:12px;width:80px}
.features .feat .fi{font-size:26px;margin-bottom:4px}

// ===== 数据粒子 =====
class DataParticle {
  constructor(path, color, speed, label) {
    this.path = path; // [{x,y}, ...]
    this.color = color;
    this.speed = speed;
    this.label = label || '';
    this.progress = 0; // 0~1
    this.alive = true;
    this.size = 4 + Math.random() * 3;
    this.trail = [];
  }
  update(dt) {
    this.progress += this.speed * dt;
    if (this.progress >= 1) this.alive = false;
    const pos = this.getPos();
    this.trail.push({ x: pos.x, y: pos.y, a: 1 });
    if (this.trail.length > 15) this.trail.shift();
    for (let t of this.trail) t.a *= 0.88;
  }
  getPos() {
    const totalLen = this.pathLength();
    const targetDist = this.progress * totalLen;
    let traveled = 0;
    for (let i = 1; i < this.path.length; i++) {
      const dx = this.path[i].x - this.path[i-1].x;
      const dy = this.path[i].y - this.path[i-1].y;
      const segLen = Math.sqrt(dx*dx + dy*dy);
      if (traveled + segLen >= targetDist) {
        const t = (targetDist - traveled) / segLen;
        return { x: this.path[i-1].x + dx * t, y: this.path[i-1].y + dy * t };
      }
      traveled += segLen;
    }
    return this.path[this.path.length - 1];
  }
  pathLength() {
    let len = 0;
    for (let i = 1; i < this.path.length; i++) {
      const dx = this.path[i].x - this.path[i-1].x;
      const dy = this.path[i].y - this.path[i-1].y;
      len += Math.sqrt(dx*dx + dy*dy);
    }
    return len;
  }
}

// ===== 任务路径定义 =====
function getTaskPaths(type) {
  const paths = [];
  const jitter = () => (Math.random() - 0.5) * 10;
  if (type === 'inference') {
    // DDR → 主总线 → NPU0/1/2 → 主总线 → DDR
    for (let i = 0; i < 3; i++) {
      const npuX = [145, 295, 445][i];
      // 数据送入 NPU
      paths.push({
        path: [
          { x: 675, y: 390 }, { x: 675, y: 370 }, { x: 700, y: 370 },
          { x: 700, y: 185 }, { x: npuX, y: 185 }, { x: npuX, y: 220 }
        ],
        color: '#ff6b6b', speed: 0.3 + Math.random() * 0.15, label: 'tensor'
      });
      // 结果返回
      paths.push({

        ],
        color: '#ffd93d', speed: 0.25 + Math.random() * 0.1, label: 'result', delay: 800
      });

  } else if (type === 'video') {
    // DDR → VPU 解码 → VPU 编码 → DDR
    paths.push({

        { x: 675, y: 390 }, { x: 675, y: 370 }, { x: 155, y: 370 }, { x: 155, y: 390 }
      ],
      color: '#ff922b', speed: 0.35, label: 'h265_stream'
    });
    paths.push({

        { x: 155, y: 480 }, { x: 155, y: 500 }, { x: 325, y: 500 }, { x: 325, y: 480 }
      ],
      color: '#20c997', speed: 0.3, label: 'raw_frame', delay: 600
    });
    paths.push({

        { x: 325, y: 390 }, { x: 325, y: 370 }, { x: 675, y: 370 }, { x: 675, y: 390 }
      ],
      color: '#ffd93d', speed: 0.28, label: 'encoded', delay: 1200
    });
  } else if (type === 'render') {
    // DDR → GPU → DDR → HDMI
    paths.push({
      path: [
        { x: 675, y: 390 }, { x: 675, y: 370 }, { x: 700, y: 370 },
        { x: 700, y: 185 }, { x: 655, y: 185 }, { x: 655, y: 220 }

    });
    paths.push({
      path: [
        { x: 655, y: 330 }, { x: 655, y: 370 }, { x: 675, y: 370 }, { x: 675, y: 390 }
      ],
      color: '#4d96ff', speed: 0.3, label: 'framebuf', delay: 700
    });
    paths.push({
      path: [
        { x: 675, y: 390 }, { x: 675, y: 370 }, { x: 400, y: 370 },
        { x: 400, y: 520 }, { x: 420, y: 520 }, { x: 420, y: 540 }
      ],
      color: '#cc5de8', speed: 0.25, label: 'display', delay: 1400
    });
  } else if (type === 'flood') {
    // 全部模块同时忙
    const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#20c997'];
    for (let i = 0; i < 20; i++) {
      const fromX = 675, fromY = 390;
      const targets = [145, 295, 445, 655, 155, 325, 485];
      const targetX = targets[Math.floor(Math.random() * targets.length)];
      const busY = Math.random() > 0.5 ? 185 : 370;
      const endY = busY === 185 ? 220 : 390;
      paths.push({
        path: [
          { x: fromX, y: fromY }, { x: fromX, y: 370 },
          { x: busY === 185 ? 700 : targetX, y: 370 },
          ...(busY === 185 ? [{ x: 700, y: 185 }, { x: targetX, y: 185 }] : []),
          { x: targetX, y: endY }
        ],
        color: colors[Math.floor(Math.random() * colors.length)],
        speed: 0.15 + Math.random() * 0.3,
        label: '',
        delay: Math.random() * 2000
      });
    }
  }
  return paths;
}

// ===== 发起任务 =====
function sendTask(type) {
  const taskPaths = getTaskPaths(type);
  const names = { inference: '🧠 AI 推理', video: '🎬 视频解码', render: '🎨 GPU 渲染', flood: '🌊 压力测试' };
  taskCount++;
  document.getElementById('taskInfo').textContent = `${names[type]} #${taskCount} 已发起`;

  // 增加模块负载
  if (type === 'inference') {
    modules.find(m => m.id === 'npu_0').load = Math.min(1, modules.find(m => m.id === 'npu_0').load + 0.6);
    modules.find(m => m.id === 'npu_1').load = Math.min(1, modules.find(m => m.id === 'npu_1').load + 0.6);
    modules.find(m => m.id === 'npu_2').load = Math.min(1, modules.find(m => m.id === 'npu_2').load + 0.6);
    modules.find(m => m.id === 'ddr').load = Math.min(1, modules.find(m => m.id === 'ddr').load + 0.3);
  } else if (type === 'video') {
    modules.find(m => m.id === 'vpu_dec').load = Math.min(1, modules.find(m => m.id === 'vpu_dec').load + 0.7);
    modules.find(m => m.id === 'vpu_enc').load = Math.min(1, modules.find(m => m.id === 'vpu_enc').load + 0.5);
    modules.find(m => m.id === 'ddr').load = Math.min(1, modules.find(m => m.id === 'ddr').load + 0.4);
  } else if (type === 'render') {
    modules.find(m => m.id === 'gpu').load = Math.min(1, modules.find(m => m.id === 'gpu').load + 0.8);
    modules.find(m => m.id === 'ddr').load = Math.min(1, modules.find(m => m.id === 'ddr').load + 0.3);
  } else if (type === 'flood') {
    for (let m of modules) m.load = Math.min(1, m.load + 0.3 + Math.random() * 0.4);
  }

  for (let tp of taskPaths) {
    const delay = tp.delay || 0;
    setTimeout(() => {
      particles.push(new DataParticle(tp.path, tp.color, tp.speed, tp.label));
    }, delay / timeScale);
  }
}

// ===== 渲染 =====
function resize() {
  const rect = canvas.getBoundingClientRect();
  const dpr = devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  W = rect.width;
  H = rect.height;
  scale = Math.min(W / 860, H / 680);
}

function drawChipBackground() {
  // 硅基底
  ctx.fillStyle = '#0c0c1a';
  ctx.fillRect(0, 0, W, H);
  // 芯片边框
  const cx = (W - 820 * scale) / 2, cy = (H - 650 * scale) / 2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  // 芯片封装外框
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 4]);
  ctx.strokeRect(20, 30, 800, 600);
  ctx.setLineDash([]);

  // 引脚（四边）
  ctx.fillStyle = '#c8943e40';
  for (let i = 0; i < 20; i++) {
    ctx.fillRect(40 + i * 38, 18, 16, 12); // 上
    ctx.fillRect(40 + i * 38, 630, 16, 12); // 下
  }
  for (let i = 0; i < 14; i++) {
    ctx.fillRect(8, 50 + i * 42, 12, 20); // 左
    ctx.fillRect(820, 50 + i * 42, 12, 20); // 右
  }

  // 总线
  for (let bus of buses) {
    ctx.strokeStyle = bus.color;
    ctx.lineWidth = bus.width;
    ctx.beginPath();
    ctx.moveTo(bus.from.x, bus.from.y);
    ctx.lineTo(bus.to.x, bus.to.y);
    ctx.stroke();
    // 总线名称
    if (bus.name) {
      ctx.fillStyle = bus.color + '80';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      const mx = (bus.from.x + bus.to.x) / 2;
      const my = (bus.from.y + bus.to.y) / 2;
      if (bus.from.y === bus.to.y) {
        ctx.fillText(bus.name, mx, my - 8);
      } else {
        ctx.save();
        ctx.translate(mx - 10, my);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText(bus.name, 0, 0);
        ctx.restore();
      }
    }
    // 总线脉冲动画
    if (bus.from.y === bus.to.y && bus.width >= 4) {
      const pulseX = bus.from.x + ((time * 80) % (bus.to.x - bus.from.x));
      ctx.fillStyle = bus.color + '60';
      ctx.beginPath();
      ctx.arc(pulseX, bus.from.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 模块
  for (let m of modules) {
    const isHovered = m === hoveredModule;
    const isSelected = m === selectedModule;

    // 热力图模式
    if (showHeat) {
      const heatVal = m.load;
      const r = Math.floor(heatVal * 255);
      const b = Math.floor((1 - heatVal) * 100);
      ctx.fillStyle = `rgba(${r}, ${Math.floor(heatVal * 80)}, ${b}, 0.6)`;
      ctx.fillRect(m.x - 4, m.y - 4, m.w + 8, m.h + 8);
    }

    // 模块背景
    const grad = ctx.createLinearGradient(m.x, m.y, m.x, m.y + m.h);
    const alpha = isHovered ? 'cc' : '88';
    grad.addColorStop(0, m.color + alpha);
    grad.addColorStop(1, m.color + '44');
    ctx.fillStyle = grad;
    // 圆角矩形
    roundRect(ctx, m.x, m.y, m.w, m.h, 6);
    ctx.fill();

    // 边框
    ctx.strokeStyle = isSelected ? '#fff' : (isHovered ? m.color : m.color + '80');
    ctx.lineWidth = isSelected ? 2 : 1;
    if (isSelected) {
      ctx.setLineDash([4, 3]);
    }
    roundRect(ctx, m.x, m.y, m.w, m.h, 6);
    ctx.stroke();
    ctx.setLineDash([]);

    // 负载指示条
    if (m.load > 0) {
      const barH = 3;
      const barY = m.y + m.h - barH - 4;
      const barW = (m.w - 10);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(m.x + 5, barY, barW, barH);
      const loadColor = m.load > 0.8 ? '#ff4444' : m.load > 0.5 ? '#ffaa00' : '#44ff44';
      ctx.fillStyle = loadColor;
      ctx.fillRect(m.x + 5, barY, barW * m.load, barH);
    }

    // 模块名称
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.min(13, m.w / 8)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(m.name, m.x + m.w / 2, m.y + m.h / 2 - 2);
    // 子标题
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${Math.min(10, m.w / 10)}px sans-serif`;
    ctx.fillText(m.sub, m.x + m.w / 2, m.y + m.h / 2 + 12);

    // 活跃时发光
    if (m.load > 0.3) {
      ctx.shadowColor = m.color;
      ctx.shadowBlur = 10 * m.load;
      roundRect(ctx, m.x, m.y, m.w, m.h, 6);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  // 数据粒子
  for (let p of particles) {
    const pos = p.getPos();
    // 尾迹
    for (let t of p.trail) {
      ctx.fillStyle = p.color + Math.floor(t.a * 80).toString(16).padStart(2, '0');
      ctx.beginPath();
      ctx.arc(t.x, t.y, p.size * 0.5 * t.a, 0, Math.PI * 2);
      ctx.fill();
    }
    // 主体
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    // 光晕
    ctx.fillStyle = p.color + '30';
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size * 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // 芯片型号标注
  ctx.fillStyle = '#c8943e30';
  ctx.font = 'bold 28px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('RK3588', 790, 625);
  ctx.font = '12px sans-serif';
  ctx.fillText('Rockchip · 8nm · 22.1B transistors', 790, 642);

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ===== 鼠标交互 =====
function screenToChip(sx, sy) {
  const cx = (W - 820 * scale) / 2;
  const cy = (H - 650 * scale) / 2;
  return { x: (sx - cx) / scale, y: (sy - cy) / scale };
}

function moduleAt(cx, cy) {
  for (let m of modules) {
    if (cx >= m.x && cx <= m.x + m.w && cy >= m.y && cy <= m.y + m.h) return m;
  }
  return null;
}

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const c = screenToChip(sx, sy);
  const m = moduleAt(c.x, c.y);
  hoveredModule = m;
  canvas.style.cursor = m ? 'pointer' : 'default';

  const tooltip = document.getElementById('tooltip');
  if (m) {
    tooltip.style.display = 'block';
    tooltip.innerHTML = `<div class="tt-title">${m.name}</div>${m.info.replace(/\n/g, '<br>')}
      <br><span class="tt-spec">负载: ${(m.load * 100).toFixed(0)}%</span>`;
    let tx = e.clientX + 16, ty = e.clientY + 16;
    if (tx + 320 > window.innerWidth) tx = e.clientX - 330;
    if (ty + 200 > window.innerHeight) ty = e.clientY - 200;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const c = screenToChip(e.clientX - rect.left, e.clientY - rect.top);
  const m = moduleAt(c.x, c.y);
  selectedModule = m;
  if (m) {
    document.getElementById('taskInfo').textContent = `选中: ${m.name} (${m.sub})`;
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredModule = null;
  document.getElementById('tooltip').style.display = 'none';
});

// ===== UI 控制 =====
function togglePause() {
  paused = !paused;
  document.getElementById('btnPause').textContent = paused ? '▶ 播放' : '⏸ 暂停';
  document.getElementById('btnPause').classList.toggle('active', paused);
}

function cycleSpeed() {
  const speeds = [1, 2, 4, 0.5];
  const idx = speeds.indexOf(timeScale);
  timeScale = speeds[(idx + 1) % speeds.length];
  document.getElementById('btnSpeed').textContent = timeScale + 'x';
}

function toggleHeat() {
  showHeat = !showHeat;
  document.getElementById('btnHeat').classList.toggle('active', showHeat);
}

// ===== 主循环 =====
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  if (!lastTime) { lastTime = ts; return; }
  const rawDt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (!paused) {
    const dt = rawDt * timeScale;
    time += dt;

    // 更新粒子
    for (let p of particles) p.update(dt);
    particles = particles.filter(p => p.alive);

    // 负载自然衰减
    for (let m of modules) {
      m.load = Math.max(m.id === 'ddr' ? 0.15 : 0.05, m.load - dt * 0.08);
      m.heat = m.load * 0.8;
    }

    // 统计
    document.getElementById('stats').textContent =
      `粒子: ${particles.length} · 任务: ${taskCount}`;
  }

  resize();
  drawChipBackground();
}

requestAnimationFrame(loop);

// === 总分总认知结构增强 ===
// 延迟重新渲染确保增强生效
(function(){
  // 自动检测关卡名称
  function _getNames(){
    if(typeof levelNames!=='undefined')return levelNames.slice();
    if(typeof LN!=='undefined')return LN.slice();
    if(typeof levels!=='undefined'&&Array.isArray(levels))return levels.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    if(typeof LEVELS!=='undefined'&&Array.isArray(LEVELS))return LEVELS.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    return [];
  }
  function _getTotal(){return _getNames().length||7;}
  function _getCur(){
    if(typeof currentLevel!=='undefined')return currentLevel;
    if(typeof curLevel!=='undefined')return curLevel;
    if(typeof curLv!=='undefined')return curLv;
    return 0;
  }
  function _getObjs(){
    if(typeof levelObjs!=='undefined')return levelObjs;
    return null;
  }
  function _isDone(i){
    var o=_getObjs();
    if(o&&o[i])return o[i].every(function(v){return v;});
    if(typeof completedLevels!=='undefined')return completedLevels.has(i);
    return false;
  }
  function _countDone(){
    var o=_getObjs(),d=0,t=0;
    if(o){for(var i=0;i<o.length;i++)for(var j=0;j<o[i].length;j++){t++;if(o[i][j])d++;}}
    else if(typeof completedLevels!=='undefined'){d=completedLevels.size;t=_getTotal();}
    return{done:d,total:t};
  }

  // 1. 开头路线图
  window._buildRoadmap=function(){
    var c=document.getElementById('roadmap-container');
    if(!c)return;
    var names=_getNames();
    if(!names.length)return;
    var h='<div class="roadmap"><div class="roadmap-title">\u{1F4CD} \u5B66\u4E60\u8DEF\u7EBF\u56FE</div>';
    for(var i=0;i<names.length;i++){
      h+='<div class="roadmap-item"><div class="roadmap-num">'+(i+1)+'</div><span>'+names[i]+'</span></div>';
    }
    h+='</div>';
    c.innerHTML=h;
  };
  try{window._buildRoadmap();}catch(e){}

  // 2. 阶段导航
  window._stageNavHTML=function(){
    var names=_getNames(),total=names.length;
    if(!total)return '';
    var cur=_getCur(),s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):0;
    var h='<div class="stage-nav"><div class="sn-bar">';
    for(var i=0;i<total;i++){
      var cls=_isDone(i)?'done':i===cur?'cur':'';
      h+='<div class="sn-d '+cls+'" onclick="typeof goLevel===\'function\'&&goLevel('+i+')"></div>';
    }
    h+='</div>';
    h+='<div class="sn-info">\u{1F4CD} \u7B2C'+(cur+1)+'/'+total+'\u5173 | \u8FDB\u5EA6 '+pct+'%</div>';

    h+='</div>';
    return h;
  };

  // 3. 通关总结
  window._summaryHTML=function(){
    var names=_getNames(),total=names.length;
    var s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):100;
    var h='<div class="summary-box">';
    h+='<div class="summary-title">\u{1F3C6} \u606D\u559C\u901A\u5173\uFF01</div>';
    h+='<div class="summary-sub">\u4F60\u5DF2\u5B8C\u6210\u5168\u90E8 '+total+' \u4E2A\u5173\u5361\u7684\u5B66\u4E60</div>';
    h+='<div class="summary-stats">';
    h+='<div class="summary-stat"><div class="num">'+total+'</div><div class="label">\u5173\u5361\u5B8C\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+s.done+'</div><div class="label">\u76EE\u6807\u8FBE\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+pct+'%</div><div class="label">\u77E5\u8BC6\u638C\u63E1</div></div>';
    h+='</div>';
    h+='<div class="summary-keys"><div style="font-weight:bold;color:#4f46e5;margin-bottom:6px">\u{1F4DA} \u5173\u952E\u77E5\u8BC6\u56DE\u987E</div>';
    for(var i=0;i<total;i++){h+='<div>\u2705 '+names[i]+'</div>';}
    h+='</div></div>';
    return h;
  };

  // 4. 增强 renderPanel - monkey-patch
  if(typeof window.renderPanel==='function'){
    var _origRP=window.renderPanel;
    window.renderPanel=function(){
      _origRP.apply(this,arguments);
      // 在 panel 顶部插入阶段导航
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
  // 也处理全局 renderPanel
  if(typeof renderPanel==='function'&&!window._rpPatched){
    window._rpPatched=true;
    var _origRP2=renderPanel;
    renderPanel=function(){
      _origRP2.apply(this,arguments);
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
})();
try{renderPanel();}catch(e){}

</script>
