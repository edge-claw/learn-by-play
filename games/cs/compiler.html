<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编译原理探险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}


body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro',sans-serif;overflow:hidden;height:100vh}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:var(--overlay-bg);display:flex;align-items:center;justify-content:center;z-index:50}
.overlay.hidden{display:none}
.start-box{text-align:center;max-width:560px}
.start-box h1{font-size:38px;margin-bottom:6px;letter-spacing:2px}
.start-box h1 .gold{color:#00ff88}
.start-box .sub{font-size:17px;color:var(--sub-color);margin-bottom:28px}
.start-btn{background:linear-gradient(135deg,#00ff88,#00cc66);color:#0a0a1a;border:none;padding:14px 52px;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;transition:transform .2s}
.start-btn:hover{transform:scale(1.05)}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:#aaa;font-size:12px;width:80px}
.feat .fi{font-size:26px;margin-bottom:4px}
#lp{position:absolute;top:0;left:0;width:320px;height:calc(100% - 36px);background:var(--panel-bg);border-right:1px solid var(--panel-border);z-index:20;display:none;flex-direction:column;overflow:hidden}
#lp .lp-head{padding:12px 16px;border-bottom:1px solid #1a1a3a;display:flex;align-items:center;justify-content:space-between}
#lp .lp-title{font-size:14px;font-weight:700;color:#00ff88}
#lp .lp-step{font-size:11px;color:#888}
#lp-body{flex:1;overflow-y:auto;padding:0}
.mission{margin:12px;padding:14px;background:#141428;border:1px solid #2a2a5a;border-radius:10px}
.mission .m-level{font-size:11px;color:#00ff88;font-weight:600;letter-spacing:1px}
.mission .m-title{font-size:17px;font-weight:700;margin:4px 0;color:#eee}
.mission .m-desc{font-size:13px;color:#999;line-height:1.6}
.mission .m-concept{margin-top:10px;padding:8px 10px;background:#0e0e20;border-radius:6px;font-size:12px;color:#6a8aff;line-height:1.6}
.mission .m-concept b{color:#8ab4ff}
.hint-b{margin:0 12px;padding:10px 14px;background:#1a1a38;border-left:3px solid #00ff88;border-radius:0 8px 8px 0;font-size:12px;color:#80ffbb;line-height:1.5;margin-bottom:8px}
.act-section{margin:12px}
.act-section .as-label{font-size:12px;color:#888;margin-bottom:8px;font-weight:600}
.act-btn{width:100%;padding:12px;background:linear-gradient(135deg,#00ff88,#00cc66);color:#0a0a1a;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:all .2s}
.act-btn:hover{filter:brightness(1.1)}
.act-btn:disabled{background:#333;color:#666;cursor:not-allowed;filter:none}
.act-btn.blue{background:linear-gradient(135deg,#3a7aff,#5a9aff);color:#fff}
.act-btn.red{background:linear-gradient(135deg,#e8443a,#ff6b6b);color:#fff}
.act-btn.purple{background:linear-gradient(135deg,#9a5aff,#b47aff);color:#fff}
.act-btn.gold{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#0a0a1a}
.obj-list{margin:8px 12px;padding:10px;background:#141428;border:1px solid #2a2a5a;border-radius:8px}
.obj-item{font-size:12px;color:#999;padding:3px 0;display:flex;align-items:center;gap:6px}
.obj-item.done{color:#00ff88}
.obj-item .oi{width:14px;height:14px;border:1px solid #444;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:10px}
.obj-item.done .oi{background:#00ff88;border-color:#00ff88;color:#0a0a1a}
.token-btn{display:inline-block;padding:4px 10px;margin:3px;border-radius:5px;font-size:13px;font-family:'Courier New',monospace;cursor:pointer;border:1px solid #333;transition:all .2s}
.token-btn:hover{filter:brightness(1.2)}
.token-btn.selected{box-shadow:0 0 8px rgba(0,255,136,.5)}
.token-type-btn{padding:6px 12px;margin:3px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #444;background:var(--btn-bg);color:#ccc;transition:all .2s}
.token-type-btn:hover{border-color:#00ff88}
.token-type-btn.active{border-color:#00ff88;color:#00ff88;background:#0e2a1a}
.tree-node-btn{padding:6px 14px;margin:3px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid #444;background:var(--btn-bg);color:#ccc;font-family:'Courier New',monospace;transition:all .2s}
.tree-node-btn:hover{border-color:#ffd700;color:#ffd700}
.tree-node-btn.placed{background:#2a2a5a;border-color:#00ff88;color:#00ff88}
.error-line{padding:6px 10px;margin:4px 0;background:var(--concept-bg);border-radius:6px;font-size:12px;font-family:'Courier New',monospace;color:#ccc;cursor:pointer;border:2px solid transparent;transition:all .2s}
.error-line:hover{border-color:#ff6b6b}
.error-line.marked{border-color:#ff6b6b;background:#2a1a1a;color:#ff6b6b}
.error-line.correct{border-color:#00ff88;background:#1a2a1a;color:#00ff88}
.ir-line{padding:5px 8px;margin:3px 0;background:var(--concept-bg);border-radius:5px;font-size:11px;font-family:'Courier New',monospace;color:#ccc;cursor:pointer;border:1px solid transparent}
.ir-line:hover{border-color:#5a9aff}
.ir-line.selected{border-color:#5a9aff;background:var(--concept-bg)}
.ir-line.optimized{border-color:#00ff88;background:#0e2a1a;color:#00ff88}
.ir-line.removed{text-decoration:line-through;color:#666;background:#1a1010}
.reg-slot{display:inline-block;padding:4px 10px;margin:2px;border-radius:5px;font-size:12px;font-family:'Courier New',monospace;background:var(--concept-bg);border:1px solid #333;color:#888;min-width:60px;text-align:center}
.reg-slot.active{border-color:#ffd700;color:#ffd700;background:#2a2a1a}
.learn-box{margin:8px 12px;padding:10px;background:var(--learn-bg);border-radius:8px;font-size:14px;color:var(--learn-text);line-height:1.8}
.learn-box b,.learn-box .sv{color:var(--sv);font-weight:700}
.result-box{text-align:center;max-width:460px;background:var(--result-bg);border:1px solid var(--result-border);border-radius:16px;padding:28px 36px}
.result-box .rb-icon{font-size:48px;margin-bottom:10px}
.result-box .rb-title{font-size:22px;font-weight:700;margin-bottom:8px}
.result-box .rb-desc{font-size:13px;color:#999;line-height:1.6;margin-bottom:16px}
.result-box .rb-learn{text-align:left;background:#0e0e20;border-radius:8px;padding:12px 14px;font-size:12px;color:#8ab4ff;line-height:1.7;margin-bottom:16px}
.result-box .rb-learn b{color:#00ff88}
.result-box button{padding:10px 28px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin:0 6px}
.result-box .btn-next{background:#00ff88;color:#0a0a1a}
.result-box .btn-retry{background:var(--stage-bar);color:var(--text-sub)}
#bar{position:absolute;bottom:0;left:0;width:100%;height:36px;background:var(--bar-bg);border-top:1px solid var(--panel-border);z-index:20;display:none;align-items:center;padding:0 16px;font-size:12px;color:#888}
#bar .bar-level{color:#00ff88;font-weight:700;margin-right:12px}

#roadmap-container{display:none}
.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<canvas id="canvas"></canvas>
<div class="overlay" id="startScreen">
<div class="start-box">
  <h1>🔧 <span class="gold">编译原理</span> 探险</h1>
  <div class="sub">7 个关卡，从源代码到机器码的奇妙旅程</div>
  <div id="roadmap-container"></div>
<button class="start-btn" onclick="startGame()">开始探索</button>
  <div class="features">
    <div class="feat"><div class="fi">📝</div>词法分析</div>
    <div class="feat"><div class="fi">🌳</div>语法分析</div>
    <div class="feat"><div class="fi">🔍</div>语义分析</div>
    <div class="feat"><div class="fi">📋</div>中间代码</div>
    <div class="feat"><div class="fi">⚡</div>代码优化</div>
    <div class="feat"><div class="fi">🖥️</div>目标代码</div>
    <div class="feat"><div class="fi">🔗</div>完整流水线</div>
  </div>
</div>
</div>
<div class="overlay hidden" id="resultModal"><div class="result-box" id="resultBox"></div></div>
<div id="lp">
  <div class="lp-head"><span class="lp-title" id="lpTitle">第 1 关</span><span class="lp-step" id="lpStep">1/7</span></div>
  <div id="lp-body"></div>
</div>
<div id="bar"><span class="bar-level" id="barLevel"></span><span id="barInfo"></span></div>
<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}}

const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let CW,CH,time=0,gameState='start',currentLevel=0,levelState={},completedLevels=new Set(),particles=[];
const ACCENT='#00ff88',GOLD='#ffd700',BLUE='#5a9aff',PURPLE='#b47aff',RED='#ff4444';
const PANEL_W=320;

function resize(){CW=canvas.width=window.innerWidth;CH=canvas.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

function spawnParticles(x,y,color,n=12){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:1,color,r:Math.random()*3+1})}
function updateParticles(){particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=.02;return p.life>0})}
function drawParticles(){particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1}

// Level objectives tracking
const levelObjs=Array.from({length:7},()=>[false,false,false]);
function completeObj(li,oi){if(!levelObjs[li][oi]){levelObjs[li][oi]=true;updateObjDisplay();spawnParticles(160,200,ACCENT,20);if(levelObjs[li].every(v=>v))setTimeout(()=>showResult(li),600)}}
function updateObjDisplay(){const el=document.getElementById('objList');if(!el)return;const items=el.querySelectorAll('.obj-item');items.forEach((it,i)=>{if(levelObjs[currentLevel][i])it.classList.add('done')})}

// Level definitions
const levels=[
{title:'词法分析',sub:'Lexical Analysis',icon:'📝',
 desc:'源代码 → Token 流。扫描器逐字符读取源代码，识别关键字、标识符、数字、运算符等词法单元。',
 concept:'<b>词法分析器（Lexer）</b>是编译器的第一个阶段。它将字符流分割成有意义的<b>Token</b>序列。每个 Token 有类型（关键字、标识符、数字、运算符）和值。',
 objs:['识别所有关键字和标识符','正确分类数字和运算符','完成全部 Token 分类']},
{title:'语法分析',sub:'Parsing',icon:'🌳',
 desc:'Token 流 → 语法树（AST）。解析器根据语法规则，将 Token 序列组织成树形结构。',
 concept:'<b>语法分析器（Parser）</b>根据<b>上下文无关文法</b>构建抽象语法树。运算符优先级决定了树的结构：乘法比加法优先级高，所以 3+4*2 中 4*2 先结合。',
 objs:['理解运算符优先级','正确构建 AST 节点','完成语法树构建']},
{title:'语义分析',sub:'Semantic Analysis',icon:'🔍',
 desc:'类型检查、作用域解析、符号表管理。确保程序在语义上是正确的。',
 concept:'<b>语义分析</b>检查程序的含义是否正确。包括<b>类型检查</b>（int 不能和 string 相加）、<b>作用域解析</b>（变量是否已声明）、<b>符号表</b>记录所有标识符信息。',
 objs:['找出类型错误','识别未声明变量','发现所有语义错误']},
{title:'中间代码生成',sub:'IR Generation',icon:'📋',
 desc:'AST → 三地址码。将高级语言的树形结构转换为线性的中间表示。',
 concept:'<b>三地址码</b>是一种中间表示，每条指令最多包含三个操作数。形如 <b>t1 = a + b</b>。它比源代码更接近机器码，但仍然与具体硬件无关。',
 objs:['理解三地址码格式','正确生成临时变量','完成 IR 生成']},
{title:'代码优化',sub:'Optimization',icon:'⚡',
 desc:'常量折叠、死代码消除、公共子表达式消除。让程序运行更快。',
 concept:'<b>编译器优化</b>在不改变程序语义的前提下提升性能。<b>常量折叠</b>：编译期计算常量表达式。<b>死代码消除</b>：删除不可达代码。<b>公共子表达式消除</b>：避免重复计算。',
 objs:['应用常量折叠','消除死代码','识别公共子表达式']},
{title:'目标代码生成',sub:'Code Generation',icon:'🖥️',
 desc:'中间代码 → 汇编指令。进行寄存器分配，生成目标机器的指令。',

// ===== UI helpers =====
function $(id){return document.getElementById(id)}

function startGame(){$('startScreen').classList.add('hidden');loadLevel(0)}
function loadLevel(idx){
  currentLevel=idx;gameState='play';levelState={};
  levelObjs[idx]=[false,false,false];
  $('lpTitle').textContent=levels[idx].icon+' '+levels[idx].title;
  $('lpStep').textContent=(idx+1)+'/7';

function buildPanel(idx){
  const L=levels[idx];
  let h='';
  if(typeof window._stageNavHTML==='function')h+=window._stageNavHTML();
  h+='<div class="mission"><div class="m-level">关卡 '+(idx+1)+'</div>';
  h+='<div class="m-title">'+L.title+'</div>';
  h+='<div class="m-desc">'+L.desc+'</div>';
  h+='<div class="m-concept">'+L.concept+'</div></div>';
  h+='<div class="obj-list" id="objList">';
  L.objs.forEach((o,i)=>{h+='<div class="obj-item" id="obj'+i+'"><span class="oi">'+(levelObjs[idx][i]?'✓':'')+'</span>'+o+'</div>'});
  h+='</div>';
  h+='<div id="controls"></div>';
  $('lp-body').innerHTML=h;
  buildControls(idx);
}

function buildControls(idx){
  const c=$('controls');
  if(idx===0)buildLexerControls(c);
  else if(idx===1)buildParserControls(c);
  else if(idx===2)buildSemanticControls(c);
  else if(idx===3)buildIRControls(c);
  else if(idx===4)buildOptControls(c);
  else if(idx===5)buildCodegenControls(c);
  else if(idx===6)buildPipelineControls(c);
}

// ========== LEVEL 1: LEXER ==========
const lexCode='int x = 42 + y;';
const lexTokens=[
  {text:'int',type:'keyword',color:'#5a9aff'},
  {text:'x',type:'identifier',color:'#00ff88'},
  {text:'=',type:'operator',color:'#ff6b6b'},
  {text:'42',type:'number',color:'#ffd700'},
  {text:'+',type:'operator',color:'#ff6b6b'},
  {text:'y',type:'identifier',color:'#00ff88'},
  {text:';',type:'punctuation',color:'#b47aff'}
];
const typeColors={keyword:'#5a9aff',identifier:'#00ff88',number:'#ffd700',operator:'#ff6b6b',punctuation:'#b47aff'};
const typeNames={keyword:'关键字',identifier:'标识符',number:'数字',operator:'运算符',punctuation:'标点'};

function buildLexerControls(c){
  levelState.selectedToken=null;levelState.classified=new Array(lexTokens.length).fill(null);
  levelState.scanX=0;levelState.scannedTokens=[];
  let h='<div class="hint-b">点击下方的 Token，然后选择它的类型进行分类</div>';
  h+='<div class="act-section"><div class="as-label">源代码 Token</div><div id="tokenList">';
  lexTokens.forEach((t,i)=>{h+='<span class="token-btn" style="background:'+t.color+'22;color:'+t.color+';border-color:'+t.color+'44" onclick="selectToken('+i+')" id="tk'+i+'">'+t.text+'</span>'});
  h+='</div></div>';
  h+='<div class="act-section"><div class="as-label">Token 类型</div><div id="typeList">';
  Object.keys(typeNames).forEach(k=>{h+='<span class="token-type-btn" onclick="classifyToken(\''+k+'\')" id="tt_'+k+'">'+typeNames[k]+'</span>'});
  h+='</div></div>';
  h+='<div class="act-section"><button class="act-btn" onclick="startLexScan()">▶ 启动扫描器</button></div>';
  c.innerHTML=h;
}
function selectToken(i){
  levelState.selectedToken=i;
  document.querySelectorAll('.token-btn').forEach(e=>e.classList.remove('selected'));
  $('tk'+i).classList.add('selected');
}
function classifyToken(type){
  const i=levelState.selectedToken;if(i===null)return;
  levelState.classified[i]=type;
  const t=lexTokens[i];
  $('tk'+i).style.borderColor=typeColors[type];
  $('tk'+i).style.boxShadow='0 0 8px '+typeColors[type]+'44';
  if(type===t.type){
    $('tk'+i).style.background=typeColors[type]+'44';
    spawnParticles(160,300,typeColors[type],8);
  }else{
    $('tk'+i).style.background='#ff000033';
  }
  // Check objectives
  const kw=lexTokens.filter((t,j)=>['keyword','identifier'].includes(t.type)&&levelState.classified[j]===t.type);
  if(kw.length>=3)completeObj(0,0);
  const no=lexTokens.filter((t,j)=>['number','operator','punctuation'].includes(t.type)&&levelState.classified[j]===t.type);
  if(no.length>=3)completeObj(0,1);
  if(lexTokens.every((t,j)=>levelState.classified[j]===t.type))completeObj(0,2);
}
function startLexScan(){levelState.scanning=true;levelState.scanX=0;levelState.scannedTokens=[]}

// ========== LEVEL 2: PARSER ==========
// Expression: 3 + 4 * 2 -> AST
const parseTokens=['3','+','4','*','2'];
const correctAST={op:'+',left:{val:'3'},right:{op:'*',left:{val:'4'},right:{val:'2'}}};

function buildParserControls(c){
  levelState.treeNodes=[];levelState.buildStep=0;levelState.astBuilt=false;
  let h='<div class="hint-b">表达式: <b>3 + 4 * 2</b><br>按正确顺序构建语法树（注意运算符优先级：* 先于 +）</div>';
  h+='<div class="act-section"><div class="as-label">步骤 1: 选择优先级最高的运算</div>';
  h+='<div id="parseStep">';
  h+='<span class="tree-node-btn" onclick="pickParseOp(\'*\')">4 * 2 (先算乘法)</span>';
  h+='<span class="tree-node-btn" onclick="pickParseOp(\'+\')">3 + 4 (先算加法)</span>';
  h+='</div></div>';
  h+='<div class="act-section" id="parseStep2" style="display:none"></div>';
  h+='<div class="act-section" id="parseStep3" style="display:none"></div>';
  c.innerHTML=h;
}
function pickParseOp(op){
  if(levelState.buildStep!==0)return;
  if(op==='*'){
    levelState.buildStep=1;levelState.treeNodes.push({op:'*',l:'4',r:'2'});
    completeObj(1,0);spawnParticles(160,250,GOLD,10);
    $('parseStep').innerHTML='<span class="tree-node-btn placed">✓ 4 * 2 → 节点 [*]</span>';
    $('parseStep2').style.display='block';
    $('parseStep2').innerHTML='<div class="as-label">步骤 2: 构建根节点</div><span class="tree-node-btn" onclick="buildRoot()">3 + [*] (加法为根)</span>';
  }else{
    $('parseStep').innerHTML='<div style="color:#ff6b6b;font-size:12px;padding:8px">❌ 乘法优先级更高，应该先处理 4*2</div><span class="tree-node-btn" onclick="pickParseOp(\'*\')">4 * 2 (先算乘法)</span><span class="tree-node-btn" onclick="pickParseOp(\'+\')">3 + 4 (先算加法)</span>';
  }
}
function buildRoot(){
  if(levelState.buildStep!==1)return;
  levelState.buildStep=2;levelState.treeNodes.push({op:'+',l:'3',r:'[*]'});
  completeObj(1,1);spawnParticles(160,300,ACCENT,10);
  $('parseStep2').innerHTML='<span class="tree-node-btn placed">✓ 3 + [*] → 根节点 [+]</span>';
  $('parseStep3').style.display='block';
  $('parseStep3').innerHTML='<div class="as-label">步骤 3: 确认 AST</div><button class="act-btn" onclick="confirmAST()">✓ 确认语法树</button>';
  levelState.astBuilt=true;
}
function confirmAST(){completeObj(1,2);spawnParticles(160,350,ACCENT,15)}

// ========== LEVEL 3: SEMANTIC ANALYSIS ==========
const semCode=[
  {line:'int a = 10;',hasError:false},
  {line:'string b = "hello";',hasError:false},
  {line:'int c = a + b;',hasError:true,errMsg:'类型错误: int + string'},
  {line:'int d = x + 1;',hasError:true,errMsg:'未声明变量: x'},
  {line:'float e = a / 3;',hasError:false},
  {line:'int f = a + d;',hasError:true,errMsg:'使用了错误变量 d（依赖未声明的 x）'}
];

function buildSemanticControls(c){
  levelState.marked=new Set();levelState.correctMarks=0;
  let h='<div class="hint-b">点击有语义错误的代码行将其标记。找出所有类型错误和未声明变量。</div>';
  h+='<div class="act-section"><div class="as-label">代码检查</div>';
  semCode.forEach((s,i)=>{h+='<div class="error-line" id="sem'+i+'" onclick="toggleSemError('+i+')"><span style="color:var(--text-muted);margin-right:8px">'+(i+1)+'</span>'+s.line+'</div>'});
  h+='</div>';
  h+='<div class="act-section"><button class="act-btn blue" onclick="checkSemErrors()">🔍 检查结果</button></div>';
  h+='<div id="semResult" style="margin:8px 12px;font-size:12px"></div>';
  c.innerHTML=h;
}
function toggleSemError(i){
  const el=$('sem'+i);
  if(levelState.marked.has(i)){levelState.marked.delete(i);el.classList.remove('marked')}
  else{levelState.marked.add(i);el.classList.add('marked')}
}
function checkSemErrors(){
  let correct=0,total=semCode.filter(s=>s.hasError).length;
  semCode.forEach((s,i)=>{
    const el=$('sem'+i);
    if(s.hasError&&levelState.marked.has(i)){el.classList.add('correct');el.classList.remove('marked');correct++}
    else if(!s.hasError&&levelState.marked.has(i)){el.style.borderColor='#ff4444';el.style.background='#2a1010'}
  });
  let msg='';
  if(correct>=1)completeObj(2,0);
  if(correct>=2)completeObj(2,1);
  if(correct>=total){completeObj(2,2);msg='<span style="color:#00ff88">✓ 找到全部 '+total+' 个错误！</span>'}
  else msg='<span style="color:#ffd700">找到 '+correct+'/'+total+' 个错误，继续检查</span>';
  $('semResult').innerHTML=msg;
  // Show error messages
  semCode.forEach((s,i)=>{if(s.hasError&&levelState.marked.has(i)){const el=$('sem'+i);el.title=s.errMsg}});
}

// ========== LEVEL 5: OPTIMIZATION ==========
const optCode=[
  {line:'t1 = 3 * 4',opt:'constfold',result:'t1 = 12',desc:'常量折叠: 3*4=12'},
  {line:'t2 = a + b',opt:null,result:null,desc:null},
  {line:'t3 = a + b',opt:'cse',result:'t3 = t2',desc:'公共子表达式: 与 t2 相同'},
  {line:'t4 = t1 + t2',opt:null,result:null,desc:null},
  {line:'if false goto L1',opt:'dead',result:'(删除)',desc:'死代码: 条件永假'},
  {line:'t5 = t4 + 1',opt:'dead',result:'(删除)',desc:'死代码: L1 块内不可达'},
  {line:'L1:',opt:'dead',result:'(删除)',desc:'死代码: 标签不可达'},
  {line:'return t4',opt:null,result:null,desc:null}
];

function buildOptControls(c){
  levelState.optimized=new Set();levelState.optTypes={};
  let h='<div class="hint-b">识别可优化的代码行，点击选择优化类型。<br>优化类型：常量折叠 / 死代码消除 / 公共子表达式消除</div>';
  h+='<div class="act-section"><div class="as-label">中间代码</div>';
  optCode.forEach((o,i)=>{h+='<div class="ir-line" id="opt'+i+'" onclick="selectOpt('+i+')">'+o.line+'</div>'});
  h+='</div>';
  h+='<div class="act-section" id="optActions" style="display:none"><div class="as-label">选择优化类型</div>';
  h+='<button class="act-btn gold" onclick="applyOpt(\'constfold\')" style="font-size:13px;padding:8px">常量折叠</button>';
  h+='<button class="act-btn red" onclick="applyOpt(\'dead\')" style="font-size:13px;padding:8px">死代码消除</button>';
  h+='<button class="act-btn blue" onclick="applyOpt(\'cse\')" style="font-size:13px;padding:8px">公共子表达式消除</button>';
  h+='</div>';
  h+='<div id="optResult" style="margin:8px 12px;font-size:12px"></div>';
  c.innerHTML=h;
}
function selectOpt(i){
  levelState.selectedOpt=i;
  document.querySelectorAll('.ir-line').forEach(e=>e.classList.remove('selected'));
  $('opt'+i).classList.add('selected');
  $('optActions').style.display='block';
}
function applyOpt(type){
  const i=levelState.selectedOpt;if(i===undefined)return;
  const o=optCode[i];
  if(o.opt===type){
    levelState.optimized.add(i);levelState.optTypes[i]=type;
    const el=$('opt'+i);
    if(type==='dead'){el.classList.add('removed');el.innerHTML='<s>'+o.line+'</s> <span style="color:#ff6b6b">← '+o.desc+'</span>'}
    else{el.classList.add('optimized');el.innerHTML=o.result+' <span style="color:#00ff88">← '+o.desc+'</span>'}
    spawnParticles(160,250,type==='constfold'?GOLD:type==='dead'?RED:BLUE,10);
    // Check objectives
    const types=Object.values(levelState.optTypes);
    if(types.includes('constfold'))completeObj(4,0);
    if(types.filter(t=>t==='dead').length>=2)completeObj(4,1);
    if(types.includes('cse'))completeObj(4,2);
  }else if(o.opt===null){
    $('optResult').innerHTML='<span style="color:#ff6b6b">这行不需要优化</span>';
  }else{
    $('optResult').innerHTML='<span style="color:#ffd700">优化类型不对，再想想</span>';
  }
}

// ========== LEVEL 6: CODE GENERATION ==========
const cgIR=['t1 = a + b','t2 = c * 2','t3 = t1 - t2','return t3'];
const cgRegs=['R0','R1','R2','R3'];
const cgExpectedAsm=[
  {ir:'t1 = a + b',asm:['LOAD R0, a','LOAD R1, b','ADD R0, R0, R1'],regs:{R0:'t1'}},
  {ir:'t2 = c * 2',asm:['LOAD R1, c','MUL R1, R1, #2'],regs:{R1:'t2'}},
  {ir:'t3 = t1 - t2',asm:['SUB R2, R0, R1'],regs:{R2:'t3'}},

];

function buildCodegenControls(c){

function showCGChoices(step){
  const choices=[
    [['LOAD R0, a / LOAD R1, b / ADD R0, R0, R1',true],['ADD R0, a, b',false],['MOV a, R0 / MOV b, R1',false]],
    [['LOAD R1, c / MUL R1, R1, #2',true],['MUL R1, c, 2',false],['LOAD R2, c / ADD R2, R2, R2',false]],
    [['SUB R2, R0, R1',true],['SUB R0, R0, R1',false],['LOAD R2, t1 / SUB R2, R2, R1',false]],
    [['MOV R0, R2 / RET',true],['RET R2',false],['STORE t3, R2 / RET',false]]
  ];
  let h='';
  choices[step].forEach((ch,i)=>{
    h+='<div class="ir-line" onclick="pickCG('+step+','+i+','+ch[1]+')">'+ch[0].replace(/\//g,'<br>')+'</div>';
  });
  $('cgChoices').innerHTML=h;
}
function pickCG(step,idx,correct){
  if(step!==levelState.cgStep)return;
  if(correct){
    levelState.cgStep++;
    const exp=cgExpectedAsm[step];
    // Update register display
    Object.entries(exp.regs).forEach(([r,v])=>{
      levelState.regState[r]=v;
      const el=$('reg_'+r);el.textContent=r+': '+v;el.classList.add('active');
    });
    levelState.asmLines.push(...exp.asm);
    spawnParticles(160,300,GOLD,10);
    // Update generated asm display
    let gh='<div class="as-label">已生成汇编</div>';
    levelState.asmLines.forEach(a=>{gh+='<div class="ir-line optimized" style="font-size:11px">'+a+'</div>'});
    $('cgGenerated').innerHTML=gh;
    if(step===0)completeObj(5,0);
    if(step===1)completeObj(5,1);
    if(step<3){
      $('cgCurrentIR').textContent=cgIR[step+1];
      showCGChoices(step+1);
    }else{
      completeObj(5,2);
      $('cgChoices').innerHTML='<div style="color:#00ff88;font-size:13px;padding:8px">✓ 所有指令已生成！</div>';
    }
  }else{
    $('cgChoices').innerHTML+='<div style="color:#ff6b6b;font-size:11px;padding:4px">❌ 指令不正确，注意寄存器分配</div>';
    showCGChoices(step);
  }
}

const pipeStages=['源代码','词法分析','语法分析','语义分析','中间代码','优化','目标代码'];
const pipeCode='int sum = a + b * 2;';
const pipeOutputs=[
  'int sum = a + b * 2;',
  '[KW:int] [ID:sum] [OP:=] [ID:a] [OP:+] [ID:b] [OP:*] [NUM:2] [PUNC:;]',
  'AST: Assign(sum, Add(a, Mul(b, 2)))',
  '✓ 类型检查通过: int = int + int*int',
  't1 = b * 2\nt2 = a + t1\nsum = t2',
  't1 = b << 1  // *2 → 左移优化\nt2 = a + t1\nsum = t2',
  'LOAD R0, b\nSHL R0, R0, #1\nLOAD R1, a\nADD R0, R1, R0\nSTORE sum, R0'
];
const quizQ={q:'编译器的哪个阶段负责检查 "int + string" 这样的类型错误？',
  opts:['词法分析','语法分析','语义分析','代码优化'],ans:2};

function buildPipelineControls(c){
  levelState.pipeStage=0;levelState.pipeRunning=false;levelState.quizAnswered=false;

}
function startPipeline(){
  levelState.pipeRunning=true;levelState.pipeStage=0;
  completeObj(6,0);
  advancePipe();
}
function advancePipe(){
  if(levelState.pipeStage>=pipeStages.length){
    levelState.pipeRunning=false;
    completeObj(6,1);
    showPipeQuiz();return;
  }
  const s=levelState.pipeStage;
  let h='';
  for(let i=0;i<=s;i++){
    const stageColor=['#888','#5a9aff','#00ff88','#ff6b6b','#ffd700','#b47aff','#ff8800'][i];
    h+='<div style="margin:6px 0"><div style="font-size:11px;color:'+stageColor+';font-weight:700">'+pipeStages[i]+'</div>';

  }

function showPipeQuiz(){

  h+='<div style="font-size:13px;color:#eee;margin:8px 12px;line-height:1.6">'+quizQ.q+'</div>';
  quizQ.opts.forEach((o,i)=>{

  });

}
function answerQuiz(i){
  if(levelState.quizAnswered)return;

    $('quiz'+i).classList.add('optimized');
    $('quiz'+i).innerHTML+=' ✓ 正确！';

// ========== CANVAS RENDERING ==========
const ox=()=>PANEL_W+20; // canvas offset x
const cw=()=>CW-PANEL_W-40; // canvas usable width
const cy=()=>CH/2; // canvas center y

function drawBg(){
  ctx.fillStyle=t().bg1;ctx.fillRect(0,0,CW,CH);
  // Grid
  ctx.strokeStyle='#111122';ctx.lineWidth=1;
  for(let x=PANEL_W;x<CW;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke()}
  for(let y=0;y<CH;y+=40){ctx.beginPath();ctx.moveTo(PANEL_W,y);ctx.lineTo(CW,y);ctx.stroke()}
}

function drawLevel0(){
  // Lexer visualization
  const baseX=ox()+40,baseY=80;
  ctx.font='bold 16px monospace';ctx.fillStyle='#888';ctx.fillText('源代码:',baseX,baseY);
  // Draw source code characters
  const charW=18;
  ctx.font='18px monospace';
  let cx2=baseX;
  for(let i=0;i<lexCode.length;i++){
    const ch=lexCode[i];
    ctx.fillStyle='#555';ctx.fillText(ch,cx2,baseY+40);
    cx2+=charW;
  }
  // Scanner beam
  if(levelState.scanning){
    levelState.scanX+=1.5;
    const beamX=baseX+levelState.scanX;
    if(beamX<baseX+lexCode.length*charW){
      ctx.strokeStyle=ACCENT;ctx.lineWidth=2;ctx.globalAlpha=.6;
      ctx.beginPath();ctx.moveTo(beamX,baseY+20);ctx.lineTo(beamX,baseY+50);ctx.stroke();
      ctx.globalAlpha=1;
      // Glow
      const grd=ctx.createRadialGradient(beamX,baseY+35,0,beamX,baseY+35,30);
      grd.addColorStop(0,'rgba(0,255,136,.3)');grd.addColorStop(1,'rgba(0,255,136,0)');
      ctx.fillStyle=grd;ctx.fillRect(beamX-30,baseY+5,60,60);
    }
    // Check which tokens are scanned
    let pos=0;
    lexTokens.forEach((t,i)=>{
      const tStart=lexCode.indexOf(t.text,pos);
      const tEnd=tStart+t.text.length;
      if(beamX>baseX+tEnd*charW&&!levelState.scannedTokens.includes(i)){
        levelState.scannedTokens.push(i);
        spawnParticles(baseX+tStart*charW+t.text.length*charW/2,baseY+100+i*36,t.color,6);
      }
      pos=tEnd;
    });
  }
  // Draw scanned tokens
  let ty=baseY+100;
  levelState.scannedTokens.forEach(i=>{
    const t=lexTokens[i];
    const tw=ctx.measureText(t.text).width+20;
    ctx.fillStyle=t.color+'33';ctx.strokeStyle=t.color;ctx.lineWidth=1;
    roundRect(ctx,baseX+10,ty-14,tw,28,6);ctx.fill();ctx.stroke();
    ctx.fillStyle=t.color;ctx.font='14px monospace';ctx.fillText(t.text,baseX+20,ty+4);
    ctx.fillStyle='#444';ctx.font='16px sans-serif';ctx.fillText(typeNames[t.type],baseX+tw+20,ty+4);
    ty+=36;
  });
  // Token type legend
  const legendY=CH-180;
  ctx.font='bold 12px sans-serif';ctx.fillStyle='#666';ctx.fillText('Token 类型图例:',baseX,legendY);
  let lx=baseX;
  Object.entries(typeNames).forEach(([k,v])=>{
    ctx.fillStyle=typeColors[k];ctx.fillRect(lx,legendY+12,12,12);
    ctx.fillStyle='#444';ctx.font='17px sans-serif';ctx.fillText(v,lx+16,legendY+22);
    lx+=80;
  });
}

    ctx.fillStyle=active?colors[i]+'22':'#141428';
    roundRect(ctx,sx-stageW/2+5,sy,stageW-10,80,8);ctx.fill();
    ctx.strokeStyle=active?colors[i]:' #2a2a5a';ctx.lineWidth=current?2:1;
    roundRect(ctx,sx-stageW/2+5,sy,stageW-10,80,8);ctx.stroke();
    // Glow for current
    if(current){
      const grd=ctx.createRadialGradient(sx,sy+40,0,sx,sy+40,50);
      grd.addColorStop(0,colors[i]+'33');grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd;ctx.fillRect(sx-50,sy-10,100,100);
    }
    ctx.font='26px sans-serif';ctx.fillText(icons[i],sx,sy+30);
    ctx.font='bold 10px sans-serif';ctx.fillStyle=active?colors[i]:'#666';
    ctx.fillText(s,sx,sy+55);
    ctx.fillStyle=active?ACCENT:'#333';ctx.font='18px sans-serif';
    ctx.fillText(active?'✓':'○',sx,sy+72);
    // Arrow
    if(i<6){
      ctx.strokeStyle=active?colors[i]+'88':'#333';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(sx+stageW/2-5,sy+40);ctx.lineTo(sx+stageW/2+5,sy+40);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx+stageW/2+2,sy+36);ctx.lineTo(sx+stageW/2+8,sy+40);ctx.lineTo(sx+stageW/2+2,sy+44);ctx.stroke();
    }
  });
  // Data flow animation
  if(levelState.pipeRunning&&currentStage>0&&currentStage<=7){
    const fromX=baseX+(currentStage-1)*stageW+stageW/2;
    const toX=baseX+Math.min(currentStage,6)*stageW+stageW/2;
    const progress=(time*2)%1;
    const px=fromX+(toX-fromX)*progress;
    ctx.fillStyle=colors[Math.min(currentStage,6)];
    ctx.beginPath();ctx.arc(px,baseY+90,4,0,Math.PI*2);ctx.fill();
  }
  // Show current stage output below
  if(currentStage>0){
    const outY=baseY+170;
    ctx.font='bold 13px sans-serif';ctx.fillStyle=colors[currentStage-1];
    ctx.fillText(pipeStages[currentStage-1]+' 输出:',baseX+cw()/2,outY);
    ctx.font='12px monospace';ctx.fillStyle='#ccc';
    const lines=pipeOutputs[currentStage-1].split('\n');
    lines.forEach((l,i)=>{ctx.fillText(l,baseX+cw()/2,outY+22+i*18)});
  }
  ctx.textAlign='left';
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ========== MAIN DRAW LOOP ==========
function drawStartBg(){
  ctx.fillStyle=t().bg1;ctx.fillRect(0,0,CW,CH);
  // Floating code particles
  ctx.font='14px monospace';ctx.globalAlpha=.15;
  const words=['int','float','if','else','return','while','for','void','class','struct','=','+','*','{','}','(',')'];
  for(let i=0;i<30;i++){
    const w=words[i%words.length];
    const x=((i*137+time*20)%CW);
    const y=((i*97+time*10)%(CH));
    ctx.fillStyle=i%3===0?ACCENT:i%3===1?GOLD:BLUE;
    ctx.fillText(w,x,y);
  }
  ctx.globalAlpha=1;
}

function draw(){
  time+=0.016;
  if(gameState==='start'){drawStartBg();updateParticles();drawParticles()}
  else if(gameState==='play'){
    drawBg();
    if(currentLevel===0)drawLevel0();
    else if(currentLevel===1)drawLevel1();
    else if(currentLevel===2)drawLevel2();
    else if(currentLevel===3)drawLevel3();
    else if(currentLevel===4)drawLevel4();
    else if(currentLevel===5)drawLevel5();
    else if(currentLevel===6)drawLevel6();
    updateParticles();drawParticles();
  }
  requestAnimationFrame(draw);
}
draw();

function goLevel(i){if(typeof currentLevel!=="undefined")currentLevel=i;if(typeof curLevel!=="undefined")curLevel=i;if(typeof initLevel==="function")initLevel(i);if(typeof renderPanel==="function")renderPanel();}
// === 总分总认知结构增强 ===
// 延迟重新渲染确保增强生效
(function(){
  // 自动检测关卡名称
  function _getNames(){
    if(typeof levelNames!=='undefined')return levelNames.slice();
    if(typeof LN!=='undefined')return LN.slice();
    if(typeof levels!=='undefined'&&Array.isArray(levels))return levels.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    if(typeof LEVELS!=='undefined'&&Array.isArray(LEVELS))return LEVELS.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    return [];
  }
  function _getTotal(){return _getNames().length||7;}
  function _getCur(){
    if(typeof currentLevel!=='undefined')return currentLevel;
    if(typeof curLevel!=='undefined')return curLevel;
    if(typeof curLv!=='undefined')return curLv;
    return 0;
  }
  function _getObjs(){
    if(typeof levelObjs!=='undefined')return levelObjs;
    return null;
  }
  function _isDone(i){
    var o=_getObjs();
    if(o&&o[i])return o[i].every(function(v){return v;});
    if(typeof completedLevels!=='undefined')return completedLevels.has(i);
    return false;
  }
  function _countDone(){
    var o=_getObjs(),d=0,t=0;
    if(o){for(var i=0;i<o.length;i++)for(var j=0;j<o[i].length;j++){t++;if(o[i][j])d++;}}
    else if(typeof completedLevels!=='undefined'){d=completedLevels.size;t=_getTotal();}
    return{done:d,total:t};
  }

  // 1. 开头路线图
  window._buildRoadmap=function(){
    var c=document.getElementById('roadmap-container');
    if(!c)return;
    var names=_getNames();
    if(!names.length)return;
    var h='<div class="roadmap"><div class="roadmap-title">\u{1F4CD} \u5B66\u4E60\u8DEF\u7EBF\u56FE</div>';
    for(var i=0;i<names.length;i++){
      h+='<div class="roadmap-item"><div class="roadmap-num">'+(i+1)+'</div><span>'+names[i]+'</span></div>';
    }
    h+='</div>';
    c.innerHTML=h;
  };
  try{window._buildRoadmap();}catch(e){}

  // 2. 阶段导航
  window._stageNavHTML=function(){
    var names=_getNames(),total=names.length;
    if(!total)return '';
    var cur=_getCur(),s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):0;
    var h='<div class="stage-nav"><div class="sn-bar">';
    for(var i=0;i<total;i++){
      var cls=_isDone(i)?'done':i===cur?'cur':'';
      h+='<div class="sn-d '+cls+'" onclick="typeof goLevel===\'function\'&&goLevel('+i+')"></div>';
    }
    h+='</div>';
    h+='<div class="sn-info">\u{1F4CD} \u7B2C '+(cur+1)+'/'+total+' \u5173\uFF1A'+(names[cur]||'')+' | \u8FDB\u5EA6 '+pct+'%</div>';
    if(cur<total){
      h+='<div class="sn-hint">\u{1F4A1} \u672C\u5173\u4F60\u5C06\u5B66\u4E60\uFF1A'+(names[cur]||'')+'</div>';
    }
    h+='</div>';
    return h;
  };

  // 3. 通关总结
  window._summaryHTML=function(){
    var names=_getNames(),total=names.length;
    var s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):100;
    var h='<div class="summary-box">';
    h+='<div class="summary-title">\u{1F3C6} \u606D\u559C\u901A\u5173\uFF01</div>';
    h+='<div class="summary-sub">\u4F60\u5DF2\u5B8C\u6210\u5168\u90E8 '+total+' \u4E2A\u5173\u5361\u7684\u5B66\u4E60</div>';
    h+='<div class="summary-stats">';
    h+='<div class="summary-stat"><div class="num">'+total+'</div><div class="label">\u5173\u5361\u5B8C\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+s.done+'</div><div class="label">\u76EE\u6807\u8FBE\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+pct+'%</div><div class="label">\u77E5\u8BC6\u638C\u63E1</div></div>';
    h+='</div>';
    h+='<div class="summary-keys"><div style="font-weight:bold;color:#4f46e5;margin-bottom:6px">\u{1F4DA} \u5173\u952E\u77E5\u8BC6\u56DE\u987E</div>';
    for(var i=0;i<total;i++){h+='<div>\u2705 '+names[i]+'</div>';}
    h+='</div></div>';
    return h;
  };

  // 4. 增强 renderPanel - monkey-patch
  if(typeof window.renderPanel==='function'){
    var _origRP=window.renderPanel;
    window.renderPanel=function(){
      _origRP.apply(this,arguments);
      // 在 panel 顶部插入阶段导航
      var p=document.getElementById('panel')||document.getElementById('lp-body')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
  // 也处理全局 renderPanel
  if(typeof renderPanel==='function'&&!window._rpPatched){
    window._rpPatched=true;
    var _origRP2=renderPanel;
    renderPanel=function(){
      _origRP2.apply(this,arguments);
      var p=document.getElementById('panel')||document.getElementById('lp-body')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
})();
try{renderPanel();}catch(e){}

</script>
