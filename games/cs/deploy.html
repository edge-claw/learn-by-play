<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>边缘 AI 部署模拟器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}


body { background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro', sans-serif; overflow: hidden; height: 100vh; display: flex; }

/* 左侧面板 - 模型仓库 */
#sidebar { width: 260px; background: rgba(12,12,28,0.98); border-right: 1px solid #1a1a3a; display: flex; flex-direction: column; z-index: 10; }
#sidebar .panel-title { padding: 12px 16px; font-size: 14px; font-weight: 600; color: #c8943e; border-bottom: 1px solid #1a1a3a; letter-spacing: 1px; }
#model-list { flex: 1; overflow-y: auto; padding: 8px; }
.model-card { background: #141428; border: 1px solid #2a2a4a; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; cursor: grab; transition: all 0.2s; user-select: none; }
.model-card:hover { border-color: #c8943e; background: #1a1a38; }
.model-card.dragging { opacity: 0.4; }
.model-card.deployed { border-color: #2aaa5a; background: #0a1a0a; }
.model-card .mc-name { font-size: 14px; font-weight: 600; color: #eee; }
.model-card .mc-type { font-size: 11px; color: #888; margin-top: 2px; }
.model-card .mc-stats { display: flex; gap: 8px; margin-top: 6px; font-size: 11px; }
.model-card .mc-stats span { color: #6a8aff; }
.model-card .mc-bar { height: 3px; background: #1a1a3a; border-radius: 2px; margin-top: 6px; }
.model-card .mc-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

/* 右侧面板 - 监控 */
#monitor { width: 280px; background: rgba(12,12,28,0.98); border-left: 1px solid #1a1a3a; display: flex; flex-direction: column; z-index: 10; }
#monitor .panel-title { padding: 12px 16px; font-size: 14px; font-weight: 600; color: #c8943e; border-bottom: 1px solid #1a1a3a; }
#monitor-content { flex: 1; overflow-y: auto; padding: 12px; }
.mon-section { margin-bottom: 16px; }
.mon-section .mon-label { font-size: 12px; color: #888; margin-bottom: 6px; }
.mon-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 13px; }
.mon-row .mon-key { color: #aaa; }
.mon-row .mon-val { color: #fff; font-weight: 500; font-variant-numeric: tabular-nums; }
.mon-row .mon-val.good { color: #2aaa5a; }
.mon-row .mon-val.warn { color: #ffaa00; }
.mon-row .mon-val.bad { color: #ff4444; }
.mon-bar { height: 6px; background: #1a1a3a; border-radius: 3px; margin: 4px 0; }
.mon-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.mon-divider { height: 1px; background: #1a1a3a; margin: 12px 0; }

/* 量化面板 */
#quant-panel { display: none; background: #0a0a1e; border: 1px solid #2a2a5a; border-radius: 8px; padding: 12px; margin-top: 8px; }
#quant-panel .qp-title { font-size: 13px; color: #c8943e; font-weight: 600; margin-bottom: 8px; }
.quant-option { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; color: #ccc; transition: all 0.2s; margin-bottom: 4px; }
.quant-option:hover { background: #1a1a3a; }
.quant-option.selected { background: #2a2a5a; color: #fff; border: 1px solid #c8943e; }
.quant-option .qo-dot { width: 10px; height: 10px; border-radius: 50%; }

/* 推理预览 */
#preview-area { border-top: 1px solid #1a1a3a; padding: 8px; }
#preview-canvas { width: 100%; height: 160px; background: #050510; border-radius: 6px; border: 1px solid #1a1a3a; }

/* 中间主区域 */
#main { flex: 1; display: flex; flex-direction: column; position: relative; }
#top-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(12,12,28,0.95); border-bottom: 1px solid #1a1a3a; }
#top-bar button { background: #1a1a3a; color: #aaa; border: 1px solid #2a2a5a; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
#top-bar button:hover { background: #2a2a5a; color: #fff; }
#top-bar button.active { background: #c8943e; color: #fff; border-color: #e0a848; }
#top-bar .tb-title { font-size: 14px; font-weight: 600; color: #c8943e; margin-right: 8px; }
#top-bar .tb-device { font-size: 12px; color: #6a8aff; margin-left: auto; }
#canvas-wrap { flex: 1; position: relative; }
#canvas { width: 100%; height: 100%; display: block; }
#drop-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: rgba(200,148,62,0.15); font-size: 20px; pointer-events: none; text-align: center; line-height: 1.8; }
#bottom-bar { display: flex; align-items: center; gap: 12px; padding: 6px 12px; background: rgba(12,12,28,0.95); border-top: 1px solid #1a1a3a; font-size: 12px; color: #666; }
#bottom-bar .highlight { color: #c8943e; }

/* 设备选择弹窗 */
.device-selector { display: none; position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(10,10,30,0.98); border: 1px solid #c8943e; border-radius: 10px; padding: 16px; z-index: 50; min-width: 500px; }
.device-selector .ds-title { font-size: 15px; color: #c8943e; font-weight: 600; margin-bottom: 12px; }
.device-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.device-card { background: #141428; border: 1px solid #2a2a5a; border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.2s; text-align: center; }
.device-card:hover { border-color: #c8943e; background: #1a1a38; }
.device-card.selected { border-color: #2aaa5a; background: #0a1a10; }
.device-card .dc-icon { font-size: 28px; margin-bottom: 6px; }
.device-card .dc-name { font-size: 13px; font-weight: 600; color: #eee; }
.device-card .dc-spec { font-size: 11px; color: #888; margin-top: 4px; line-height: 1.4; }

/* 成就/得分 */
#score-bar { position: absolute; top: 8px; right: 8px; background: rgba(10,10,30,0.9); border: 1px solid #2a2a5a; border-radius: 8px; padding: 8px 14px; font-size: 13px; z-index: 20; }
#score-bar .score-label { color: #888; font-size: 11px; }
#score-bar .score-val { color: #c8943e; font-size: 20px; font-weight: 700; }

/* tooltip */
#tooltip { position: absolute; display: none; background:var(--panel-bg); border: 1px solid #c8943e; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #ccc; pointer-events: none; z-index: 100; max-width: 280px; line-height: 1.5; }

.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:#4f46e5;margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--text-sub);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--btn-bg);color:#4f46e5;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--concept-bg);border:1px solid #c7d2fe;border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-info{color:#6366f1;font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{color:var(--text-muted);font-size:12px;margin-top:3px}
.summary-box{background:linear-gradient(135deg,#f0f4ff,#faf5ff);border:2px solid #c7d2fe;border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:#4f46e5;margin-bottom:6px}
.summary-sub{color:var(--text-muted);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--text-muted)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:rgba(99,102,241,0.06);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
.overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center}
.overlay h1{font-size:42px;background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.overlay .sub{color:var(--text-sub);font-size:17px;margin-bottom:32px}
.overlay .start-btn{padding:14px 48px;font-size:18px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:transform .2s}
.overlay .start-btn:hover{transform:scale(1.05)}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.features .feat{text-align:center;color:var(--feat-text);font-size:12px;width:80px}
.features .feat .fi{font-size:26px;margin-bottom:4px}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="overlay" id="ov">
<h1>🚀 边缘 AI 部署模拟器</h1>
<p class="sub">拖拽模型到设备 — 体验 AI 边缘部署全流程</p>
<button class="start-btn" onclick="startGame()">开始探索</button>
<div class="features">
<div class="feat"><div class="fi">📦</div>模型仓库</div>
<div class="feat"><div class="fi">📟</div>设备选择</div>
<div class="feat"><div class="fi">⚡</div>量化优化</div>
<div class="feat"><div class="fi">🔥</div>推理测试</div>
<div class="feat"><div class="fi">📊</div>性能监控</div>
<div class="feat"><div class="fi">🌡️</div>热力分析</div>
</div>
</div>
<!-- 左侧：模型仓库 -->
<div id="sidebar">
  <div class="panel-title">📦 模型仓库</div>
  <div id="model-list"></div>
</div>

<!-- 中间：芯片可视化 -->
<div id="main">
  <div id="top-bar">
    <span class="tb-title">◈ 边缘 AI 部署模拟器</span>
    <button onclick="toggleDeviceSelector()">🔧 切换设备</button>
    <button onclick="resetAll()">🔄 重置</button>
    <button id="btnPause" onclick="togglePause()">⏸</button>
    <button id="btnHeat" onclick="toggleHeat()">🌡</button>
    <span class="tb-device" id="deviceLabel">📟 RK3588 · 8nm · 6 TOPS NPU</span>
  </div>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="drop-hint">拖拽左侧模型到芯片上部署<br>或点击模型后点击「部署」</div>
    <div id="score-bar">
      <div class="score-label">部署得分</div>
      <div class="score-val" id="scoreVal">0</div>
    </div>
    <div class="device-selector" id="deviceSelector">
      <div class="ds-title">选择边缘设备</div>
      <div class="device-grid" id="deviceGrid"></div>
    </div>
  </div>
  <div id="bottom-bar">
    <span id="statusText">就绪 — 选择模型开始部署</span>
    <span class="highlight" id="perfText" style="margin-left:auto"></span>
  </div>
</div>

<!-- 右侧：监控面板 -->
<div id="monitor">
  <div class="panel-title">📊 实时监控</div>
  <div id="monitor-content">
    <div class="mon-section">
      <div class="mon-label">⚡ 性能指标</div>
      <div class="mon-row"><span class="mon-key">FPS</span><span class="mon-val" id="monFps">—</span></div>
      <div class="mon-row"><span class="mon-key">延迟</span><span class="mon-val" id="monLatency">—</span></div>
      <div class="mon-row"><span class="mon-key">吞吐</span><span class="mon-val" id="monThroughput">—</span></div>
    </div>
    <div class="mon-divider"></div>
    <div class="mon-section">
      <div class="mon-label">🖥 硬件状态</div>
      <div class="mon-row"><span class="mon-key">NPU 负载</span><span class="mon-val" id="monNpu">0%</span></div>
      <div class="mon-bar"><div class="mon-bar-fill" id="monNpuBar" style="width:0%;background:#e8443a"></div></div>
      <div class="mon-row"><span class="mon-key">CPU 负载</span><span class="mon-val" id="monCpu">0%</span></div>
      <div class="mon-bar"><div class="mon-bar-fill" id="monCpuBar" style="width:0%;background:#3a7aff"></div></div>
      <div class="mon-row"><span class="mon-key">内存</span><span class="mon-val" id="monMem">0 / 8 GB</span></div>
      <div class="mon-bar"><div class="mon-bar-fill" id="monMemBar" style="width:0%;background:#5a9a9a"></div></div>
      <div class="mon-row"><span class="mon-key">温度</span><span class="mon-val" id="monTemp">35°C</span></div>
      <div class="mon-row"><span class="mon-key">功耗</span><span class="mon-val" id="monPower">2.1 W</span></div>
    </div>
    <div class="mon-divider"></div>
    <div class="mon-section">
      <div class="mon-label">🧠 模型信息</div>
      <div id="monModelInfo" style="font-size:12px;color:var(--text-muted);">未部署模型</div>
    </div>
    <div id="quant-panel">
      <div class="qp-title">⚙️ 量化选项</div>
      <div id="quant-options"></div>
    </div>
    <div class="mon-divider"></div>
    <div class="mon-section">
      <div class="mon-label">🏆 部署历史</div>
      <div id="history-list" style="font-size:12px;color:var(--text-muted);">暂无记录</div>
    </div>
  </div>
  <div id="preview-area">
    <canvas id="preview-canvas"></canvas>
  </div>
</div>

<div id="tooltip"></div>

<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}}
function startGame(){document.getElementById('ov').style.display='none';}

// ===== 设备定义 =====
const DEVICES = [
  { id: 'rk3588', name: 'RK3588', icon: '📟', spec: '8nm · A76×4 + A55×4', npu: 6, npuCores: 3, npuLabel: '6 TOPS', gpu: 'Mali-G610', mem: 8, tdp: 10, color: '#e8443a',
    modules: [
      { id: 'a76', name: 'A76×4', sub: 'CPU 大核', x: 80, y: 60, w: 200, h: 70, color: '#3a7aff' },
      { id: 'a55', name: 'A55×4', sub: 'CPU 小核', x: 300, y: 60, w: 140, h: 70, color: '#2a5aaa' },
      { id: 'npu0', name: 'NPU 0', sub: '2 TOPS', x: 80, y: 180, w: 120, h: 100, color: '#e8443a' },

// 预估 FPS（简化模拟）
function estimateFps(model, quant, device) {
  // 基于 FLOPS 和设备算力的简化估算
  const baseMap = {
    'rk3588': { fp32: 2, fp16: 5, int8: 18 },  // NPU 加速
    'jetson': { fp32: 3, fp16: 8, int8: 6 },    // CUDA
    'rpi5':   { fp32: 0.8, fp16: 0.8, int8: 1.2 }, // CPU only
  };
  const base = baseMap[device.id]?.[quant] || 1;
  const complexity = model.flops || 10;
  let fps = base * (30 / complexity);
  // 小模型更快
  if (model.size < 10) fps *= 1.5;
  if (model.size > 100) fps *= 0.5;
  // 内存不够会严重拖慢
  const qData = model.quant[quant];
  if (qData.size / 1000 > device.mem * 0.7) fps *= 0.2;
  return Math.max(0.1, Math.min(120, fps));
}

// ===== 模型操作 =====
function selectModel(model) {
  // 显示量化选项
  const qp = document.getElementById('quant-panel');
  qp.style.display = 'block';
  const qoDiv = document.getElementById('quant-options');
  qoDiv.innerHTML = '';
  const quantTypes = [
    { key: 'fp32', label: 'FP32 (原始)', color: '#ff6b6b', desc: '最高精度，最大体积' },
    { key: 'fp16', label: 'FP16 (半精度)', color: '#ffd93d', desc: '精度微降，体积减半' },
    { key: 'int8', label: 'INT8 (量化)', color: '#2aaa5a', desc: '体积最小，NPU 加速' },
  ];
  for (let q of quantTypes) {
    const qData = model.quant[q.key];
    const fps = estimateFps(model, q.key, currentDevice);
    const opt = document.createElement('div');
    opt.className = 'quant-option' + (q.key === currentQuant ? ' selected' : '');
    opt.innerHTML = `
      <div class="qo-dot" style="background:${q.color}"></div>
      <div>
        <div>${q.label}</div>
        <div style="font-size:10px;color:var(--text-muted)">${qData.size}MB · ${model.accLabel} ${qData.acc} · ~${fps.toFixed(1)} FPS</div>
      </div>
    `;
    opt.onclick = (e) => { e.stopPropagation(); currentQuant = q.key; selectModel(model); };
    qoDiv.appendChild(opt);
  }
  // 部署按钮
  const btn = document.createElement('button');
  btn.style.cssText = 'width:100%;margin-top:10px;padding:8px;background:#c8943e;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;';
  btn.textContent = `🚀 部署 ${model.name} (${currentQuant.toUpperCase()})`;
  btn.onclick = (e) => { e.stopPropagation(); deployModel(model); };
  qoDiv.appendChild(btn);

  document.getElementById('monModelInfo').innerHTML = `
    <div style="color:#eee;font-weight:600">${model.icon} ${model.name}</div>
    <div>类型: ${model.type}</div>
    <div>参数: ${model.params}</div>
    <div>精度: ${model.accLabel} ${model.accuracy}</div>
    <div>FLOPS: ${model.flops} G</div>
  `;
}

function deployModel(model) {
  const qData = model.quant[currentQuant];
  // 检查内存
  if (qData.size / 1000 > currentDevice.mem * 0.9) {
    document.getElementById('statusText').textContent = `❌ 内存不足！${model.name} (${currentQuant}) 需要 ${qData.size}MB，设备仅 ${currentDevice.mem}GB`;
    shakeScore();
    return;
  }
  deployedModel = model;
  inferRunning = true;
  const fps = estimateFps(model, currentQuant, currentDevice);
  simFps = fps;
  simLatency = 1000 / fps;

  // 更新硬件状态
  const intensity = Math.min(1, model.flops / 50);
  if (currentDevice.id === 'rk3588') {
    hwState.npuLoad = currentQuant === 'int8' ? Math.min(0.95, intensity * 1.2) : intensity * 0.3;
    hwState.cpuLoad = currentQuant === 'fp32' ? Math.min(0.95, intensity * 0.8) : 0.15;
  } else if (currentDevice.id === 'jetson') {
    hwState.npuLoad = Math.min(0.95, intensity * 0.9); // GPU as NPU
    hwState.cpuLoad = 0.2;
  } else {
    hwState.npuLoad = 0;
    hwState.cpuLoad = Math.min(0.98, intensity * 1.2); // CPU only
  }
  hwState.memUsed = 0.8 + qData.size / 1000;
  hwState.temp = 35 + hwState.npuLoad * 30 + hwState.cpuLoad * 20;
  hwState.power = 2.1 + hwState.npuLoad * currentDevice.tdp * 0.6 + hwState.cpuLoad * currentDevice.tdp * 0.3;

  // 计算得分
  const fpsScore = Math.min(50, fps * 1.5);
  const effScore = fps / hwState.power * 5;
  const accScore = qData.acc / model.accuracy * 30;
  const newScore = Math.round(fpsScore + effScore + accScore);
  score += newScore;
  document.getElementById('scoreVal').textContent = score;

  // 记录历史
  history.push({ model: model.name, quant: currentQuant, device: currentDevice.name, fps: fps.toFixed(1), score: newScore });
  updateHistory();

  // 生成粒子
  spawnDeployParticles();

  document.getElementById('statusText').textContent = `✅ ${model.name} (${currentQuant.toUpperCase()}) 已部署到 ${currentDevice.name} — ${fps.toFixed(1)} FPS`;
  document.getElementById('drop-hint').style.display = 'none';
  buildModelList();
}

function spawnDeployParticles() {
  const dev = currentDevice;
  // 找 NPU/GPU 模块位置
  const target = dev.modules.find(m => m.id.startsWith('npu') || m.id === 'gpu') || dev.modules[0];
  const ddr = dev.modules.find(m => m.id === 'ddr') || dev.modules[dev.modules.length - 1];
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      particles.push(new DataParticle(
        [{ x: ddr.x + ddr.w/2, y: ddr.y + ddr.h/2 }, { x: (ddr.x+target.x)/2, y: 150 }, { x: target.x + target.w/2, y: target.y + target.h/2 }],
        ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8'][i%6],
        0.4 + Math.random() * 0.3
      ));
    }, i * 120);
  }
}

// ===== 数据粒子 =====
class DataParticle {
  constructor(path, color, speed) {
    this.path = path;
    this.color = color;
    this.speed = speed;
    this.progress = 0;
    this.alive = true;
    this.size = 3 + Math.random() * 3;
    this.trail = [];
  }
  update(dt) {
    this.progress += this.speed * dt;
    if (this.progress >= 1) this.alive = false;
    const pos = this.getPos();
    this.trail.push({ x: pos.x, y: pos.y, a: 1 });
    if (this.trail.length > 12) this.trail.shift();
    for (let t of this.trail) t.a *= 0.85;
  }
  getPos() {
    const n = this.path.length - 1;
    const t = Math.min(this.progress, 0.999);
    const seg = Math.floor(t * n);
    const local = (t * n) - seg;
    const a = this.path[seg], b = this.path[Math.min(seg+1, n)];
    return { x: a.x + (b.x - a.x) * local, y: a.y + (b.y - a.y) * local };
  }
}

function drawPreview(dt) {
  const rect = previewCanvas.getBoundingClientRect();
  const dpr = devicePixelRatio || 1;
  previewCanvas.width = rect.width * dpr;
  previewCanvas.height = rect.height * dpr;
  previewCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const pw = rect.width, ph = rect.height;

  // 背景 - 模拟街景
  previewCtx.fillStyle = '#1a1a2e';
  previewCtx.fillRect(0, 0, pw, ph);
  // 天空
  const skyGrad = previewCtx.createLinearGradient(0, 0, 0, ph * 0.4);
  skyGrad.addColorStop(0, '#0a0a20');
  skyGrad.addColorStop(1, '#1a1a30');
  previewCtx.fillStyle = skyGrad;
  previewCtx.fillRect(0, 0, pw, ph * 0.4);
  // 地面
  previewCtx.fillStyle = '#2a2a3e';
  previewCtx.fillRect(0, ph * 0.7, pw, ph * 0.3);
  // 道路线
  previewCtx.strokeStyle = '#3a3a4e';
  previewCtx.setLineDash([10, 15]);
  previewCtx.beginPath();
  previewCtx.moveTo(0, ph * 0.65);
  previewCtx.lineTo(pw, ph * 0.65);
  previewCtx.stroke();
  previewCtx.setLineDash([]);

  if (!inferRunning) {
    previewCtx.fillStyle = '#666';
    previewCtx.font = '14px sans-serif';
    previewCtx.textAlign = 'center';
    previewCtx.fillText('部署模型后开始推理预览', pw/2, ph/2);
    return;
  }

  previewTime += dt;
  // 更新物体位置
  for (let obj of PREVIEW_OBJECTS) {
    obj.x += obj.vx * dt;
    if (obj.x > 1.1) obj.x = -0.15;
    if (obj.x < -0.2) obj.x = 1.1;
  }

  // 绘制检测结果
  const showDetection = simFps > 1;
  if (showDetection) {
    for (let obj of PREVIEW_OBJECTS) {
      const ox = obj.x * pw, oy = obj.y * ph;
      const ow = obj.w * pw, oh = obj.h * ph;

      // 简化物体形状
      previewCtx.fillStyle = obj.color + '40';
      previewCtx.fillRect(ox, oy, ow, oh);

      // 检测框
      previewCtx.strokeStyle = obj.color;
      previewCtx.lineWidth = 2;
      previewCtx.strokeRect(ox, oy, ow, oh);

      // 标签
      const labelW = previewCtx.measureText(obj.label).width + 8;
      previewCtx.fillStyle = obj.color;
      previewCtx.fillRect(ox, oy - 16, labelW, 16);
      previewCtx.fillStyle = '#fff';
      previewCtx.font = '10px sans-serif';
      previewCtx.textAlign = 'left';
      previewCtx.fillText(obj.label, ox + 4, oy - 4);
    }
  }

  // FPS 水印
  previewCtx.fillStyle = 'rgba(0,0,0,0.6)';
  previewCtx.fillRect(4, 4, 80, 20);
  previewCtx.fillStyle = simFps > 20 ? '#2aaa5a' : simFps > 10 ? '#ffaa00' : '#ff4444';
  previewCtx.font = 'bold 12px monospace';
  previewCtx.textAlign = 'left';
  previewCtx.fillText(`${simFps.toFixed(1)} FPS`, 8, 18);
}

// ===== 芯片渲染 =====
function resize() {
  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const dpr = devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  CW = rect.width;
  CH = rect.height;
  chipScale = Math.min(CW / 740, CH / 480);
}

function drawChip() {
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, CW, CH);

  const ox = (CW - 700 * chipScale) / 2;
  const oy = (CH - 440 * chipScale) / 2;
  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(chipScale, chipScale);

  // 芯片边框
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 3]);
  ctx.strokeRect(30, 20, 640, 400);
  ctx.setLineDash([]);

  // 引脚
  ctx.fillStyle = '#c8943e30';
  for (let i = 0; i < 16; i++) {
    ctx.fillRect(45 + i * 38, 10, 14, 10);
    ctx.fillRect(45 + i * 38, 420, 14, 10);
  }
  for (let i = 0; i < 9; i++) {
    ctx.fillRect(18, 40 + i * 42, 12, 18);
    ctx.fillRect(670, 40 + i * 42, 12, 18);
  }

  const dev = currentDevice;

  // 总线
  for (let bus of dev.buses) {
    ctx.strokeStyle = bus.color;
    ctx.lineWidth = bus.w;
    ctx.beginPath();
    ctx.moveTo(bus.from.x, bus.from.y);
    ctx.lineTo(bus.to.x, bus.to.y);
    ctx.stroke();
    if (bus.label) {
      ctx.fillStyle = bus.color + '80';
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(bus.label, (bus.from.x + bus.to.x) / 2, bus.from.y - 6);
    }
    // 脉冲
    if (bus.from.y === bus.to.y && bus.w >= 4 && inferRunning) {
      const px = bus.from.x + ((time * 100) % (bus.to.x - bus.from.x));
      ctx.fillStyle = bus.color + '80';
      ctx.beginPath();
      ctx.arc(px, bus.from.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 模块
  for (let m of dev.modules) {
    let load = 0;
    if (inferRunning) {
      if (m.id.startsWith('npu')) load = hwState.npuLoad;
      else if (m.id === 'gpu' && currentDevice.id === 'jetson') load = hwState.npuLoad;
      else if (m.id.startsWith('a7') || m.id.startsWith('a5')) load = hwState.cpuLoad;
      else if (m.id === 'ddr') load = hwState.memUsed / currentDevice.mem;
      else load = 0.1;
    }

    // 热力图
    if (showHeat && load > 0) {
      const r = Math.floor(load * 255);
      ctx.fillStyle = `rgba(${r},${Math.floor(load*40)},${Math.floor((1-load)*60)},0.5)`;
      ctx.fillRect(m.x - 3, m.y - 3, m.w + 6, m.h + 6);
    }

    // 模块背景
    const grad = ctx.createLinearGradient(m.x, m.y, m.x, m.y + m.h);
    grad.addColorStop(0, m.color + (inferRunning ? 'aa' : '66'));
    grad.addColorStop(1, m.color + '33');
    ctx.fillStyle = grad;
    roundRect(ctx, m.x, m.y, m.w, m.h, 5);
    ctx.fill();

    // 边框
    ctx.strokeStyle = m.color + '88';
    ctx.lineWidth = 1;
    roundRect(ctx, m.x, m.y, m.w, m.h, 5);
    ctx.stroke();

    // 活跃发光
    if (load > 0.4) {
      ctx.shadowColor = m.color;
      ctx.shadowBlur = 8 * load;
      roundRect(ctx, m.x, m.y, m.w, m.h, 5);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // 负载条
    if (load > 0) {
      const bw = m.w - 8, bh = 3;
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(m.x + 4, m.y + m.h - 8, bw, bh);
      ctx.fillStyle = load > 0.8 ? '#ff4444' : load > 0.5 ? '#ffaa00' : '#44ff44';
      ctx.fillRect(m.x + 4, m.y + m.h - 8, bw * load, bh);
    }

    // 文字
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.min(13, m.w / 7)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(m.name, m.x + m.w / 2, m.y + m.h / 2 - 4);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${Math.min(10, m.w / 9)}px sans-serif`;
    ctx.fillText(m.sub, m.x + m.w / 2, m.y + m.h / 2 + 10);
  }

  // 数据粒子
  for (let p of particles) {
    const pos = p.getPos();
    for (let t of p.trail) {
      ctx.fillStyle = p.color + Math.floor(t.a * 60).toString(16).padStart(2, '0');
      ctx.beginPath();
      ctx.arc(t.x, t.y, p.size * 0.4 * t.a, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = p.color + '25';
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size * 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // 芯片型号
  ctx.fillStyle = '#c8943e25';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(currentDevice.name, 650, 410);

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ===== UI 控制 =====
function togglePause() {
  paused = !paused;
  document.getElementById('btnPause').textContent = paused ? '▶' : '⏸';
}

function toggleHeat() {
  showHeat = !showHeat;
  document.getElementById('btnHeat').classList.toggle('active', showHeat);
}

function toggleDeviceSelector() {
  const sel = document.getElementById('deviceSelector');
  sel.style.display = sel.style.display === 'none' ? 'block' : 'none';
}

function switchDevice(dev) {
  currentDevice = dev;
  deployedModel = null;
  inferRunning = false;
  hwState = { npuLoad: 0, cpuLoad: 0.05, memUsed: 0.8, temp: 35, power: 2.1 };
  simFps = 0;
  particles = [];
  updateDeviceLabel();
  buildDeviceGrid();
  buildModelList();
  document.getElementById('statusText').textContent = `已切换到 ${dev.name}`;
  document.getElementById('drop-hint').style.display = '';
  document.getElementById('deviceSelector').style.display = 'none';
  document.getElementById('quant-panel').style.display = 'none';
  document.getElementById('monModelInfo').innerHTML = '未部署模型';
}

function updateDeviceLabel() {
  document.getElementById('deviceLabel').textContent =
    `📟 ${currentDevice.name} · ${currentDevice.npuLabel} · 内存 ${currentDevice.mem}GB`;
}

function resetAll() {
  deployedModel = null;
  inferRunning = false;
  hwState = { npuLoad: 0, cpuLoad: 0.05, memUsed: 0.8, temp: 35, power: 2.1 };
  simFps = 0;
  particles = [];
  score = 0;
  history = [];
  document.getElementById('scoreVal').textContent = '0';
  document.getElementById('statusText').textContent = '就绪 — 选择模型开始部署';
  document.getElementById('drop-hint').style.display = '';
  document.getElementById('quant-panel').style.display = 'none';
  document.getElementById('monModelInfo').innerHTML = '未部署模型';
  updateHistory();
  buildModelList();
}

function updateMonitor() {
  const fpsEl = document.getElementById('monFps');
  const latEl = document.getElementById('monLatency');
  const thrEl = document.getElementById('monThroughput');
  if (inferRunning) {
    const jitter = (Math.random() - 0.5) * simFps * 0.1;
    const dispFps = Math.max(0, simFps + jitter);
    fpsEl.textContent = dispFps.toFixed(1);
    fpsEl.className = 'mon-val ' + (dispFps > 20 ? 'good' : dispFps > 10 ? 'warn' : 'bad');
    latEl.textContent = (1000 / dispFps).toFixed(1) + ' ms';
    latEl.className = 'mon-val ' + (dispFps > 20 ? 'good' : dispFps > 10 ? 'warn' : 'bad');
    thrEl.textContent = (dispFps * 0.8).toFixed(1) + ' img/s';
  } else {
    fpsEl.textContent = latEl.textContent = thrEl.textContent = '—';
    fpsEl.className = latEl.className = thrEl.className = 'mon-val';
  }
  document.getElementById('monNpu').textContent = (hwState.npuLoad * 100).toFixed(0) + '%';
  document.getElementById('monNpuBar').style.width = (hwState.npuLoad * 100) + '%';
  document.getElementById('monNpuBar').style.background = hwState.npuLoad > 0.8 ? '#ff4444' : '#e8443a';
  document.getElementById('monCpu').textContent = (hwState.cpuLoad * 100).toFixed(0) + '%';
  document.getElementById('monCpuBar').style.width = (hwState.cpuLoad * 100) + '%';
  document.getElementById('monMem').textContent = hwState.memUsed.toFixed(1) + ' / ' + currentDevice.mem + ' GB';
  document.getElementById('monMemBar').style.width = (hwState.memUsed / currentDevice.mem * 100) + '%';
  const tempEl = document.getElementById('monTemp');
  tempEl.textContent = hwState.temp.toFixed(0) + '°C';
  tempEl.className = 'mon-val ' + (hwState.temp > 75 ? 'bad' : hwState.temp > 55 ? 'warn' : 'good');
  document.getElementById('monPower').textContent = hwState.power.toFixed(1) + ' W';
  document.getElementById('perfText').textContent = inferRunning ?
    `效率: ${(simFps / hwState.power).toFixed(2)} FPS/W` : '';
}

function updateHistory() {
  const el = document.getElementById('history-list');
  if (history.length === 0) { el.innerHTML = '暂无记录'; return; }
  el.innerHTML = history.slice(-5).reverse().map(h =>
    `<div style="padding:3px 0;border-bottom:1px solid #1a1a3a">
      ${h.model} · ${h.quant} · ${h.device}<br>
      <span style="color:#6a8aff">${h.fps} FPS</span> · <span style="color:#c8943e">+${h.score}分</span>
    </div>`
  ).join('');
}

function shakeScore() {
  const el = document.getElementById('score-bar');
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'shake 0.3s ease';
}

// ===== 持续推理粒子 =====
let inferParticleTimer = 0;
function spawnInferParticles(dt) {
  if (!inferRunning) return;
  inferParticleTimer += dt;
  const interval = 1.5 / Math.max(1, simFps / 10);
  if (inferParticleTimer >= interval) {
    inferParticleTimer = 0;
    const dev = currentDevice;
    const ddr = dev.modules.find(m => m.id === 'ddr');
    const npuMods = dev.modules.filter(m => m.id.startsWith('npu'));
    const gpuMod = dev.modules.find(m => m.id === 'gpu');
    const target = npuMods.length > 0 && currentQuant === 'int8' ? npuMods[Math.floor(Math.random() * npuMods.length)] : (gpuMod || dev.modules[0]);
    if (ddr && target) {
      const busY = dev.buses[0]?.from.y || 150;
      particles.push(new DataParticle(
        [
          { x: ddr.x + ddr.w/2, y: ddr.y + ddr.h/2 },
          { x: ddr.x + ddr.w/2, y: busY },
          { x: target.x + target.w/2, y: busY },
          { x: target.x + target.w/2, y: target.y + target.h/2 }
        ],
        ['#ff6b6b','#ffd93d','#4d96ff','#20c997','#ff922b'][Math.floor(Math.random()*5)],
        0.5 + Math.random() * 0.5
      ));
    }
  }
}

// ===== 主循环 =====
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  if (!lastTime) { lastTime = ts; return; }
  const rawDt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  if (!paused) {
    const dt = rawDt;
    time += dt;
    for (let p of particles) p.update(dt);
    particles = particles.filter(p => p.alive);
    spawnInferParticles(dt);
    // 温度波动
    if (inferRunning) {
      hwState.temp += (Math.random() - 0.5) * 0.3;
      hwState.power += (Math.random() - 0.5) * 0.05;
    }
  }
  resize();
  drawChip();
  updateMonitor();
  drawPreview(paused ? 0 : rawDt);
}

init();

// === 总分总认知结构增强 ===
// 延迟重新渲染确保增强生效
(function(){
  // 自动检测关卡名称
  function _getNames(){
    if(typeof levelNames!=='undefined')return levelNames.slice();
    if(typeof LN!=='undefined')return LN.slice();
    if(typeof levels!=='undefined'&&Array.isArray(levels))return levels.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    if(typeof LEVELS!=='undefined'&&Array.isArray(LEVELS))return LEVELS.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    return [];
  }
  function _getTotal(){return _getNames().length||7;}
  function _getCur(){
    if(typeof currentLevel!=='undefined')return currentLevel;
    if(typeof curLevel!=='undefined')return curLevel;
    if(typeof curLv!=='undefined')return curLv;
    return 0;
  }
  function _getObjs(){
    if(typeof levelObjs!=='undefined')return levelObjs;
    return null;
  }
  function _isDone(i){
    var o=_getObjs();
    if(o&&o[i])return o[i].every(function(v){return v;});
    if(typeof completedLevels!=='undefined')return completedLevels.has(i);
    return false;
  }
  function _countDone(){
    var o=_getObjs(),d=0,t=0;
    if(o){for(var i=0;i<o.length;i++)for(var j=0;j<o[i].length;j++){t++;if(o[i][j])d++;}}
    else if(typeof completedLevels!=='undefined'){d=completedLevels.size;t=_getTotal();}
    return{done:d,total:t};
  }

  // 1. 开头路线图
  window._buildRoadmap=function(){
    var c=document.getElementById('roadmap-container');
    if(!c)return;
    var names=_getNames();
    if(!names.length)return;
    var h='<div class="roadmap"><div class="roadmap-title">\u{1F4CD} \u5B66\u4E60\u8DEF\u7EBF\u56FE</div>';
    for(var i=0;i<names.length;i++){
      h+='<div class="roadmap-item"><div class="roadmap-num">'+(i+1)+'</div><span>'+names[i]+'</span></div>';
    }
    h+='</div>';
    c.innerHTML=h;
  };
  try{window._buildRoadmap();}catch(e){}

  // 2. 阶段导航
  window._stageNavHTML=function(){
    var names=_getNames(),total=names.length;
    if(!total)return '';
    var cur=_getCur(),s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):0;
    var h='<div class="stage-nav"><div class="sn-bar">';
    for(var i=0;i<total;i++){
      var cls=_isDone(i)?'done':i===cur?'cur':'';
      h+='<div class="sn-d '+cls+'" onclick="typeof goLevel===\'function\'&&goLevel('+i+')"></div>';
    }
    h+='</div>';
    h+='<div class="sn-info">\u{1F4CD} \u7B2C'+(cur+1)+'/'+total+'\u5173 | \u8FDB\u5EA6 '+pct+'%</div>';

    h+='</div>';
    return h;
  };

  // 3. 通关总结
  window._summaryHTML=function(){
    var names=_getNames(),total=names.length;
    var s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):100;
    var h='<div class="summary-box">';
    h+='<div class="summary-title">\u{1F3C6} \u606D\u559C\u901A\u5173\uFF01</div>';
    h+='<div class="summary-sub">\u4F60\u5DF2\u5B8C\u6210\u5168\u90E8 '+total+' \u4E2A\u5173\u5361\u7684\u5B66\u4E60</div>';
    h+='<div class="summary-stats">';
    h+='<div class="summary-stat"><div class="num">'+total+'</div><div class="label">\u5173\u5361\u5B8C\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+s.done+'</div><div class="label">\u76EE\u6807\u8FBE\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+pct+'%</div><div class="label">\u77E5\u8BC6\u638C\u63E1</div></div>';
    h+='</div>';
    h+='<div class="summary-keys"><div style="font-weight:bold;color:#4f46e5;margin-bottom:6px">\u{1F4DA} \u5173\u952E\u77E5\u8BC6\u56DE\u987E</div>';
    for(var i=0;i<total;i++){h+='<div>\u2705 '+names[i]+'</div>';}
    h+='</div></div>';
    return h;
  };

  // 4. 增强 renderPanel - monkey-patch
  if(typeof window.renderPanel==='function'){
    var _origRP=window.renderPanel;
    window.renderPanel=function(){
      _origRP.apply(this,arguments);
      // 在 panel 顶部插入阶段导航
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
  // 也处理全局 renderPanel
  if(typeof renderPanel==='function'&&!window._rpPatched){
    window._rpPatched=true;
    var _origRP2=renderPanel;
    renderPanel=function(){
      _origRP2.apply(this,arguments);
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
})();
try{renderPanel();}catch(e){}

</script>
