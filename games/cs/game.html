<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>边缘 AI 部署挑战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080810; color: #fff; font-family: -apple-system, 'SF Pro', sans-serif; overflow: hidden; height: 100vh; }

/* 全屏画布 */
#canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

/* 遮罩层 */
.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 50; }
.overlay.hidden { display: none; }

/* 开始界面 */
#startScreen .start-box { text-align: center; max-width: 520px; }
#startScreen .start-box h1 { font-size: 36px; color: #c8943e; margin-bottom: 8px; letter-spacing: 2px; }
#startScreen .start-box .subtitle { font-size: 16px; color: #888; margin-bottom: 30px; }
#startScreen .start-box .start-btn { background: linear-gradient(135deg, #c8943e, #e0a848); color: #fff; border: none; padding: 14px 48px; border-radius: 10px; font-size: 18px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
#startScreen .start-box .start-btn:hover { transform: scale(1.05); }
#startScreen .start-box .features { display: flex; gap: 20px; margin-top: 30px; justify-content: center; }
#startScreen .start-box .feat { text-align: center; color: #aaa; font-size: 13px; }
#startScreen .start-box .feat .feat-icon { font-size: 28px; margin-bottom: 6px; }

/* 关卡面板 */
#levelPanel { position: absolute; top: 0; left: 0; width: 320px; height: 100%; background: rgba(10,10,24,0.97); border-right: 1px solid #1a1a3a; z-index: 20; display: flex; flex-direction: column; transition: transform 0.3s; }
#levelPanel.collapsed { transform: translateX(-280px); }
#levelPanel .lp-header { padding: 14px 16px; border-bottom: 1px solid #1a1a3a; display: flex; align-items: center; justify-content: space-between; }
#levelPanel .lp-title { font-size: 15px; font-weight: 600; color: #c8943e; }
#levelPanel .lp-toggle { background: none; border: 1px solid #2a2a5a; color: #888; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px; }

/* 任务卡 */
.mission-card { margin: 12px; padding: 14px; background: #141428; border: 1px solid #2a2a5a; border-radius: 10px; }
.mission-card .mc-level { font-size: 11px; color: #c8943e; font-weight: 600; letter-spacing: 1px; }
.mission-card .mc-title { font-size: 17px; font-weight: 700; color: #eee; margin: 6px 0; }
.mission-card .mc-desc { font-size: 13px; color: #999; line-height: 1.5; }
.mission-card .mc-goals { margin-top: 10px; }
.mission-card .goal-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
.goal-row .goal-icon { font-size: 16px; }
.goal-row .goal-text { color: #ccc; flex: 1; }
.goal-row .goal-val { font-weight: 600; font-variant-numeric: tabular-nums; min-width: 60px; text-align: right; }
.goal-row .goal-val.pass { color: #2aaa5a; }
.goal-row .goal-val.fail { color: #ff4444; }
.goal-row .goal-val.pending { color: #666; }

/* 提示气泡 */
.hint-bubble { margin: 0 12px; padding: 10px 14px; background: #1a1a38; border-left: 3px solid #4d96ff; border-radius: 0 8px 8px 0; font-size: 12px; color: #8ab4ff; line-height: 1.5; }

/* 操作区 */
.action-section { margin: 12px; }
.action-section .as-label { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 600; }

/* 选择卡片 */
.choice-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #141428; border: 1px solid #2a2a5a; border-radius: 8px; cursor: pointer; transition: all 0.2s; margin-bottom: 6px; }
.choice-card:hover { border-color: #c8943e; background: #1a1a38; }
.choice-card.selected { border-color: #c8943e; background: #1e1a10; }
.choice-card.locked { opacity: 0.4; cursor: not-allowed; }
.choice-card .cc-icon { font-size: 22px; }
.choice-card .cc-info { flex: 1; }
.choice-card .cc-name { font-size: 13px; font-weight: 600; color: #eee; }
.choice-card .cc-detail { font-size: 11px; color: #888; }
.choice-card .cc-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }

/* 部署按钮 */
.deploy-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #c8943e, #e0a848); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: all 0.2s; }
.deploy-btn:hover { filter: brightness(1.1); }
.deploy-btn:disabled { background: #333; color: #666; cursor: not-allowed; filter: none; }

/* 右侧监控 */
#monitorBar { position: absolute; top: 12px; right: 12px; background: rgba(10,10,24,0.95); border: 1px solid #1a1a3a; border-radius: 10px; padding: 12px 16px; z-index: 20; min-width: 180px; }
.mb-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
.mb-row .mb-key { color: #888; }
.mb-row .mb-val { font-weight: 600; font-variant-numeric: tabular-nums; }
.mb-bar { height: 4px; background: #1a1a3a; border-radius: 2px; margin: 2px 0 6px; }
.mb-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

/* 预览窗 */
#previewWin { position: absolute; bottom: 12px; right: 12px; background: rgba(10,10,24,0.95); border: 1px solid #1a1a3a; border-radius: 10px; overflow: hidden; z-index: 20; }
#previewWin .pw-header { padding: 6px 12px; font-size: 11px; color: #888; border-bottom: 1px solid #1a1a3a; }
#previewCanvas { width: 260px; height: 160px; display: block; }

/* 成功/失败弹窗 */
#resultModal .result-box { text-align: center; max-width: 400px; background: rgba(10,10,24,0.98); border: 1px solid #2a2a5a; border-radius: 16px; padding: 30px 40px; }
.result-box .rb-icon { font-size: 48px; margin-bottom: 12px; }
.result-box .rb-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.result-box .rb-desc { font-size: 14px; color: #999; margin-bottom: 16px; line-height: 1.5; }
.result-box .rb-stats { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; }
.result-box .rb-stat { text-align: center; }
.result-box .rb-stat .rs-val { font-size: 22px; font-weight: 700; color: #c8943e; }
.result-box .rb-stat .rs-label { font-size: 11px; color: #888; }
.result-box button { padding: 10px 30px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin: 0 6px; }
.result-box .btn-next { background: #c8943e; color: #fff; }
.result-box .btn-retry { background: #2a2a5a; color: #ccc; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<!-- 开始界面 -->
<div class="overlay" id="startScreen">
  <div class="start-box">
    <h1>◈ 边缘 AI 部署挑战</h1>
    <div class="subtitle">在真实芯片上部署 AI 模型，挑战性能极限</div>
    <button class="start-btn" onclick="startGame()">开始挑战</button>
    <div class="features">
      <div class="feat"><div class="feat-icon">🧠</div>选择模型</div>
      <div class="feat"><div class="feat-icon">⚡</div>量化优化</div>
      <div class="feat"><div class="feat-icon">📟</div>芯片部署</div>
      <div class="feat"><div class="feat-icon">🏆</div>通关挑战</div>
    </div>
  </div>
</div>

<!-- 结果弹窗 -->
<div class="overlay hidden" id="resultModal">
  <div class="result-box" id="resultBox"></div>
</div>

<!-- 左侧任务面板 -->
<div id="levelPanel" style="display:none">
  <div class="lp-header">
    <span class="lp-title" id="lpTitle">第 1 关</span>
    <button class="lp-toggle" onclick="togglePanel()" id="panelToggle">◀</button>
  </div>
  <div id="levelContent" style="flex:1;overflow-y:auto"></div>
</div>

<!-- 右侧监控 -->
<div id="monitorBar" style="display:none">
  <div style="font-size:11px;color:#c8943e;font-weight:600;margin-bottom:6px">📊 实时监控</div>
  <div class="mb-row"><span class="mb-key">FPS</span><span class="mb-val" id="mFps">—</span></div>
  <div class="mb-bar"><div class="mb-bar-fill" id="mFpsBar" style="width:0%;background:#2aaa5a"></div></div>
  <div class="mb-row"><span class="mb-key">延迟</span><span class="mb-val" id="mLat">—</span></div>
  <div class="mb-row"><span class="mb-key">NPU</span><span class="mb-val" id="mNpu">0%</span></div>
  <div class="mb-bar"><div class="mb-bar-fill" id="mNpuBar" style="width:0%;background:#e8443a"></div></div>
  <div class="mb-row"><span class="mb-key">CPU</span><span class="mb-val" id="mCpu">0%</span></div>
  <div class="mb-bar"><div class="mb-bar-fill" id="mCpuBar" style="width:0%;background:#3a7aff"></div></div>
  <div class="mb-row"><span class="mb-key">温度</span><span class="mb-val" id="mTemp">35°C</span></div>
  <div class="mb-row"><span class="mb-key">功耗</span><span class="mb-val" id="mPower">2W</span></div>
</div>

<!-- 推理预览 -->
<div id="previewWin" style="display:none">
  <div class="pw-header">🎥 推理预览</div>
  <canvas id="previewCanvas"></canvas>
</div>

<script>
// ========== 关卡定义 ==========
const LEVELS = [
  {
    id: 1, title: '初次部署', desc: '把一个 AI 模型部署到芯片上，让它跑起来。',
    device: 'rk3588',
    hint: '💡 从左边选一个小模型（比如 YOLOv8-Nano），然后选 INT8 量化，点击部署。INT8 可以被 NPU 加速！',
    goals: [
      { key: 'fps', label: 'FPS ≥ 10', icon: '⚡', check: (s) => s.fps >= 10 },
      { key: 'deployed', label: '成功部署模型', icon: '✅', check: (s) => s.deployed },
    ],
    unlockModels: ['yolov8n', 'mobilenet'],
    unlockQuants: ['fp32', 'int8'],
    successMsg: '恭喜！你成功在 NPU 上跑通了第一个模型。INT8 量化让模型体积缩小 3 倍，同时 NPU 可以全速加速。',
    stars: (s) => s.fps >= 30 ? 3 : s.fps >= 20 ? 2 : 1,
  },
  {
    id: 2, title: '精度与速度', desc: '在保持高精度的同时，让检测速度达到实时（≥25 FPS）。',
    device: 'rk3588',
    hint: '💡 不同量化方式影响精度和速度。FP32 最精确但最慢，INT8 最快但精度会下降。找到平衡点！',
    goals: [
      { key: 'fps', label: 'FPS ≥ 25', icon: '⚡', check: (s) => s.fps >= 25 },
      { key: 'acc', label: '精度 ≥ 35 mAP', icon: '🎯', check: (s) => s.accuracy >= 35 },
    ],
    unlockModels: ['yolov8n', 'yolov8s', 'mobilenet'],
    unlockQuants: ['fp32', 'fp16', 'int8'],
    successMsg: 'INT8 量化虽然损失了一点精度，但 NPU 的脉动阵列架构对 INT8 运算做了专门优化，速度提升数倍。',
    stars: (s) => s.fps >= 40 && s.accuracy >= 40 ? 3 : s.fps >= 30 ? 2 : 1,
  },
  {
    id: 3, title: '功耗预算', desc: '客户要求：部署到电池供电的巡检机器人上，功耗必须控制在 6W 以内。',
    device: 'rk3588',
    hint: '💡 大模型算力需求高 → 功耗高。试试轻量级模型 + INT8，NPU 比 CPU 更省电。',
    goals: [
      { key: 'fps', label: 'FPS ≥ 15', icon: '⚡', check: (s) => s.fps >= 15 },
      { key: 'power', label: '功耗 ≤ 6W', icon: '🔋', check: (s) => s.power <= 6 },
      { key: 'acc', label: '精度 ≥ 30 mAP', icon: '🎯', check: (s) => s.accuracy >= 30 },
    ],
    unlockModels: ['yolov8n', 'yolov8s', 'yolov8m', 'mobilenet'],
    unlockQuants: ['fp32', 'fp16', 'int8'],
    successMsg: '边缘部署的核心挑战就是在性能、精度、功耗三者之间找到最优平衡。轻量模型 + INT8 是最常见的方案。',
    stars: (s) => s.power <= 4.5 && s.fps >= 25 ? 3 : s.power <= 5.5 ? 2 : 1,
  },
  {
    id: 4, title: '换个设备试试', desc: '同一个模型，从 RK3588（有 NPU）换到树莓派 5（无 NPU），看看差距有多大。',
    device: 'rpi5',
    hint: '💡 树莓派没有 NPU，所有推理只能靠 CPU。INT8 量化的加速效果会大打折扣。这就是为什么专用 AI 芯片很重要。',
    goals: [
      { key: 'deployed', label: '在树莓派上部署', icon: '🍓', check: (s) => s.deployed },
      { key: 'fps', label: 'FPS ≥ 3', icon: '⚡', check: (s) => s.fps >= 3 },
    ],
    unlockModels: ['yolov8n', 'mobilenet', 'yolov8s'],
    unlockQuants: ['fp32', 'fp16', 'int8'],
    successMsg: '没有 NPU 的设备，同样的模型 FPS 可能只有 RK3588 的 1/10。这就是边缘 AI 芯片存在的意义——专用硬件加速。',
    stars: (s) => s.fps >= 8 ? 3 : s.fps >= 5 ? 2 : 1,
  },
  {
    id: 5, title: '极限挑战', desc: 'Jetson Nano：只有 4GB 内存、128 个 CUDA 核心。在这台低功耗设备上实现实时 AI 推理（FPS ≥ 10）。自由选择模型和量化策略！',
    device: 'jetson',
    hint: '💡 Jetson 没有 NPU，靠 CUDA 核心推理。FP16 是 NVIDIA GPU 的甜点精度，加速效果最好。选轻量模型 + FP16 试试！',
    goals: [
      { key: 'fps', label: 'FPS ≥ 10', icon: '⚡', check: (s) => s.fps >= 10 },
      { key: 'power', label: '功耗 ≤ 8W', icon: '🔋', check: (s) => s.power <= 8 },
      { key: 'deployed', label: '成功部署', icon: '✅', check: (s) => s.deployed },
    ],
    unlockModels: ['yolov8n', 'yolov8s', 'mobilenet', 'resnet50', 'deeplabv3'],
    unlockQuants: ['fp32', 'fp16', 'int8'],
    successMsg: '🎉 你完成了所有关卡！现在你理解了边缘 AI 部署的核心：模型选择 → 量化策略 → 硬件适配 → 性能约束平衡。不同芯片（NPU vs GPU vs CPU）适合不同的量化精度，没有万能方案。',
    stars: (s) => s.fps >= 30 ? 3 : s.fps >= 20 ? 2 : 1,
  },
];

// ========== 设备 & 模型 ==========
const DEVICES = {
  rk3588: { name: 'RK3588', icon: '📟', npu: 6, mem: 8, tdp: 10, color: '#e8443a',
    modules: [
      { id:'a76', name:'A76×4', sub:'大核 2.4G', x:80, y:60, w:180, h:65, color:'#3a7aff' },
      { id:'a55', name:'A55×4', sub:'小核 1.8G', x:280, y:60, w:120, h:65, color:'#2a5aaa' },
      { id:'npu0', name:'NPU 0', sub:'2T INT8', x:80, y:175, w:110, h:90, color:'#e8443a' },
      { id:'npu1', name:'NPU 1', sub:'2T INT8', x:210, y:175, w:110, h:90, color:'#e8443a' },
      { id:'npu2', name:'NPU 2', sub:'2T INT8', x:340, y:175, w:110, h:90, color:'#e8443a' },
      { id:'gpu', name:'Mali-G610', sub:'GPU', x:480, y:175, w:130, h:90, color:'#2aaa5a' },
      { id:'ddr', name:'LPDDR5', sub:'8GB', x:430, y:60, w:130, h:65, color:'#5a9a9a' },
      { id:'io', name:'外设', sub:'PCIe/USB', x:80, y:320, w:530, h:50, color:'#3a3a5a' },
    ],
    buses: [
      { from:{x:80,y:145}, to:{x:570,y:145}, w:4, color:'#c8943e', label:'AXI 主总线' },
      { from:{x:80,y:300}, to:{x:570,y:300}, w:3, color:'#5a9a9a50' },
      { from:{x:135,y:145}, to:{x:135,y:175}, w:2, color:'#e8443a50' },
      { from:{x:265,y:145}, to:{x:265,y:175}, w:2, color:'#e8443a50' },
      { from:{x:395,y:145}, to:{x:395,y:175}, w:2, color:'#e8443a50' },
      { from:{x:545,y:145}, to:{x:545,y:175}, w:2, color:'#2aaa5a50' },
      { from:{x:495,y:125}, to:{x:495,y:145}, w:2, color:'#5a9a9a50' },
    ]
  },
  jetson: { name: 'Jetson Nano', icon: '🟢', npu: 0.47, mem: 4, tdp: 10, color: '#76b900',
    modules: [
      { id:'a57', name:'A57×4', sub:'CPU 1.4G', x:80, y:60, w:180, h:80, color:'#3a7aff' },
      { id:'gpu', name:'Maxwell', sub:'128 CUDA', x:300, y:60, w:200, h:140, color:'#76b900' },
      { id:'ddr', name:'LPDDR4', sub:'4GB', x:80, y:200, w:180, h:60, color:'#5a9a9a' },
      { id:'io', name:'CSI/USB/GPIO', sub:'外设', x:80, y:310, w:420, h:50, color:'#3a3a5a' },
    ],
    buses: [
      { from:{x:80,y:160}, to:{x:510,y:160}, w:4, color:'#c8943e', label:'系统总线' },
      { from:{x:80,y:290}, to:{x:510,y:290}, w:3, color:'#5a9a9a50' },
      { from:{x:400,y:160}, to:{x:400,y:60}, w:2, color:'#76b90050' },
    ]
  },
  rpi5: { name: 'Raspberry Pi 5', icon: '🍓', npu: 0, mem: 8, tdp: 12, color: '#c51a4a',
    modules: [
      { id:'a76', name:'A76×4', sub:'CPU 2.4G', x:80, y:60, w:220, h:100, color:'#3a7aff' },
      { id:'gpu', name:'VideoCore', sub:'GPU(弱)', x:340, y:60, w:160, h:100, color:'#2aaa5a' },
      { id:'ddr', name:'LPDDR4X', sub:'8GB', x:80, y:220, w:180, h:60, color:'#5a9a9a' },
      { id:'io', name:'PCIe/USB/ETH', sub:'外设', x:300, y:220, w:200, h:60, color:'#3a3a5a' },
    ],
    buses: [
      { from:{x:80,y:180}, to:{x:510,y:180}, w:4, color:'#c8943e', label:'系统总线' },
    ]
  },
};

const MODELS = {
  yolov8n: { name:'YOLOv8-Nano', icon:'🎯', type:'目标检测', params:'3.2M', flops:8.7,
    quant: { fp32:{size:6.3,acc:37.3}, fp16:{size:3.2,acc:37.1}, int8:{size:1.8,acc:36.2} } },
  yolov8s: { name:'YOLOv8-Small', icon:'🎯', type:'目标检测', params:'11.2M', flops:28.6,
    quant: { fp32:{size:22.5,acc:44.9}, fp16:{size:11.3,acc:44.7}, int8:{size:6.2,acc:43.8} } },
  yolov8m: { name:'YOLOv8-Medium', icon:'🎯', type:'目标检测', params:'25.9M', flops:78.9,
    quant: { fp32:{size:52,acc:50.2}, fp16:{size:26,acc:50.0}, int8:{size:14,acc:48.9} } },
  mobilenet: { name:'MobileNet-V3', icon:'🏷️', type:'图像分类', params:'5.4M', flops:0.22,
    quant: { fp32:{size:22,acc:75.2}, fp16:{size:11,acc:75.0}, int8:{size:5.8,acc:73.8} } },
  resnet50: { name:'ResNet-50', icon:'🏷️', type:'图像分类', params:'25.6M', flops:4.1,
    quant: { fp32:{size:97.8,acc:76.1}, fp16:{size:48.9,acc:76.0}, int8:{size:25.2,acc:74.8} } },
  deeplabv3: { name:'DeepLabV3+', icon:'🖼️', type:'语义分割', params:'40.4M', flops:83,
    quant: { fp32:{size:162,acc:78.5}, fp16:{size:81,acc:78.3}, int8:{size:42,acc:76.1} } },
};

function estimateFps(modelId, quant, devId) {
  const m = MODELS[modelId], d = DEVICES[devId];
  const base = { rk3588:{fp32:2,fp16:5,int8:18}, jetson:{fp32:3,fp16:8,int8:6}, rpi5:{fp32:0.8,fp16:0.8,int8:1.2} };
  let fps = (base[devId]?.[quant]||1) * (30 / (m.flops||10));
  if (m.quant[quant].size < 10) fps *= 1.3;
  if (m.quant[quant].size > 100) fps *= 0.5;
  if (m.quant[quant].size / 1000 > d.mem * 0.7) fps *= 0.15;
  return Math.max(0.1, Math.min(120, fps));
}

function estimatePower(modelId, quant, devId) {
  const m = MODELS[modelId], d = DEVICES[devId];
  const intensity = Math.min(1, m.flops / 50);
  let p = 2;
  if (devId === 'rk3588') p += (quant === 'int8' ? intensity * 4 : intensity * 6);
  else if (devId === 'jetson') p += intensity * 5;
  else p += intensity * 7;
  return Math.min(d.tdp, p + Math.random() * 0.5);
}

// ========== 游戏状态 ==========
let gameState = 'start'; // start, playing, result
let currentLevel = 0;
let selectedModel = null;
let selectedQuant = null;
let deployed = false;
let deployAnim = 0;
let simFps = 0, simPower = 0, simAcc = 0;
let particles = [];
let time = 0;
let hwLoad = { npu: 0, cpu: 0, mem: 0.1 };

// ========== Canvas ==========
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const prevCanvas = document.getElementById('previewCanvas');
const prevCtx = prevCanvas.getContext('2d');
let CW, CH;

// ========== 开始游戏 ==========
function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('levelPanel').style.display = 'flex';
  document.getElementById('monitorBar').style.display = 'block';
  document.getElementById('previewWin').style.display = 'block';
  gameState = 'playing';
  currentLevel = 0;
  loadLevel(0);
}

function loadLevel(idx) {
  currentLevel = idx;
  const lv = LEVELS[idx];
  selectedModel = null;
  selectedQuant = null;
  deployed = false;
  deployAnim = 0;
  simFps = 0; simPower = 0; simAcc = 0;
  particles = [];
  hwLoad = { npu: 0, cpu: 0.05, mem: 0.1 };

  document.getElementById('lpTitle').textContent = `第 ${lv.id} 关 / ${LEVELS.length}`;
  renderLevelContent();
}

function renderLevelContent() {
  const lv = LEVELS[currentLevel];
  const dev = DEVICES[lv.device];
  const el = document.getElementById('levelContent');

  let html = `
    <div class="mission-card">
      <div class="mc-level">关卡 ${lv.id} · ${dev.icon} ${dev.name}</div>
      <div class="mc-title">${lv.title}</div>
      <div class="mc-desc">${lv.desc}</div>
      <div class="mc-goals">`;

  for (let g of lv.goals) {
    const state = deployed ? g.check(getState()) : null;
    const cls = state === null ? 'pending' : state ? 'pass' : 'fail';
    const icon = state === null ? '⬜' : state ? '✅' : '❌';
    html += `<div class="goal-row"><span class="goal-icon">${icon}</span><span class="goal-text">${g.label}</span></div>`;
  }
  html += `</div></div>`;
  html += `<div class="hint-bubble">${lv.hint}</div>`;

  // 模型选择
  html += `<div class="action-section"><div class="as-label">1️⃣ 选择模型</div>`;
  for (let mid of lv.unlockModels) {
    const m = MODELS[mid];
    const sel = selectedModel === mid;
    html += `<div class="choice-card${sel?' selected':''}" onclick="pickModel('${mid}')">
      <div class="cc-icon">${m.icon}</div>
      <div class="cc-info"><div class="cc-name">${m.name}</div><div class="cc-detail">${m.type} · ${m.params} · ${m.flops}G FLOPS</div></div>
    </div>`;
  }
  html += `</div>`;

  // 量化选择
  if (selectedModel) {
    const m = MODELS[selectedModel];
    const quantLabels = { fp32: 'FP32 原始精度', fp16: 'FP16 半精度', int8: 'INT8 量化' };
    const quantColors = { fp32: '#ff6b6b', fp16: '#ffd93d', int8: '#2aaa5a' };
    const quantTags = { fp32: '最大 · 最慢', fp16: '折中', int8: '最小 · 最快' };

    html += `<div class="action-section"><div class="as-label">2️⃣ 选择量化精度</div>`;
    for (let q of lv.unlockQuants) {
      const qd = m.quant[q];
      const fps = estimateFps(selectedModel, q, lv.device);
      const sel = selectedQuant === q;
      html += `<div class="choice-card${sel?' selected':''}" onclick="pickQuant('${q}')">
        <div class="cc-icon" style="width:12px;height:12px;border-radius:50%;background:${quantColors[q]}"></div>
        <div class="cc-info"><div class="cc-name">${quantLabels[q]}</div>
        <div class="cc-detail">${qd.size}MB · 精度 ${qd.acc} · ~${fps.toFixed(1)} FPS</div></div>
        <div class="cc-tag" style="background:${quantColors[q]}22;color:${quantColors[q]}">${quantTags[q]}</div>
      </div>`;
    }
    html += `</div>`;
  }

  // 部署按钮
  if (selectedModel && selectedQuant) {
    const m = MODELS[selectedModel];
    html += `<div class="action-section">
      <button class="deploy-btn" onclick="doDeploy()" ${deployed?'disabled':''}>
        ${deployed ? '✅ 已部署' : `🚀 部署 ${m.name} (${selectedQuant.toUpperCase()})`}
      </button>
    </div>`;
  }

  // 已部署：显示结果和验证按钮
  if (deployed) {
    const allPass = lv.goals.every(g => g.check(getState()));
    html += `<div class="action-section" style="margin-top:8px">
      <button class="deploy-btn" style="background:${allPass?'#2aaa5a':'#ff4444'}" onclick="checkResult()">
        ${allPass ? '🎉 验证通过！查看结果' : '🔄 未达标，重新选择'}
      </button>
    </div>`;
  }

  el.innerHTML = html;
}

function pickModel(id) { selectedModel = id; selectedQuant = null; deployed = false; deployAnim = 0; simFps=0; particles=[]; hwLoad={npu:0,cpu:0.05,mem:0.1}; renderLevelContent(); }
function pickQuant(q) { selectedQuant = q; deployed = false; deployAnim = 0; simFps=0; particles=[]; hwLoad={npu:0,cpu:0.05,mem:0.1}; renderLevelContent(); }

function getState() {
  return { fps: simFps, power: simPower, accuracy: simAcc, deployed };
}

function doDeploy() {
  if (!selectedModel || !selectedQuant) return;
  const lv = LEVELS[currentLevel];
  const m = MODELS[selectedModel];
  const qd = m.quant[selectedQuant];
  const dev = DEVICES[lv.device];

  // 内存检查
  if (qd.size / 1000 > dev.mem * 0.9) {
    alert(`❌ 内存不足！模型需要 ${qd.size}MB，设备只有 ${dev.mem}GB`);
    return;
  }

  deployed = true;
  deployAnim = 1;
  simFps = estimateFps(selectedModel, selectedQuant, lv.device);
  simPower = estimatePower(selectedModel, selectedQuant, lv.device);
  simAcc = qd.acc;

  // 硬件负载
  const intensity = Math.min(1, m.flops / 50);
  if (lv.device === 'rk3588' && selectedQuant === 'int8') {
    hwLoad.npu = Math.min(0.95, intensity * 1.2);
    hwLoad.cpu = 0.15;
  } else if (lv.device === 'jetson') {
    hwLoad.npu = Math.min(0.95, intensity * 0.9);
    hwLoad.cpu = 0.2;
  } else {
    hwLoad.npu = 0;
    hwLoad.cpu = Math.min(0.95, intensity * 1.2);
  }
  hwLoad.mem = 0.1 + qd.size / 1000 / dev.mem;

  // 粒子效果
  spawnDeployParticles(dev);
  renderLevelContent();
}

function spawnDeployParticles(dev) {
  const ddr = dev.modules.find(m => m.id === 'ddr');
  const target = dev.modules.find(m => m.id.startsWith('npu')) || dev.modules.find(m => m.id === 'gpu') || dev.modules[0];
  if (!ddr || !target) return;
  const busY = dev.buses[0]?.from.y || 150;
  for (let i = 0; i < 10; i++) {
    setTimeout(() => {
      particles.push({
        path: [
          {x:ddr.x+ddr.w/2, y:ddr.y+ddr.h/2},
          {x:ddr.x+ddr.w/2, y:busY},
          {x:target.x+target.w/2, y:busY},
          {x:target.x+target.w/2, y:target.y+target.h/2}
        ],
        color: ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8'][i%6],
        speed: 0.4 + Math.random()*0.3,
        progress: 0, alive: true, size: 3+Math.random()*3,
        trail: []
      });
    }, i * 100);
  }
}

function checkResult() {
  const lv = LEVELS[currentLevel];
  const allPass = lv.goals.every(g => g.check(getState()));
  if (!allPass) {
    // 重置让用户重选
    deployed = false; deployAnim = 0; simFps = 0; particles = [];
    hwLoad = { npu:0, cpu:0.05, mem:0.1 };
    renderLevelContent();
    return;
  }
  // 成功！
  const stars = lv.stars(getState());
  showResult(stars, lv);
}

function showResult(stars, lv) {
  gameState = 'result';
  const starStr = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
  const isLast = currentLevel >= LEVELS.length - 1;
  document.getElementById('resultBox').innerHTML = `
    <div class="rb-icon">${isLast ? '🏆' : '🎉'}</div>
    <div class="rb-title">${isLast ? '恭喜通关！' : `第 ${lv.id} 关完成！`}</div>
    <div style="font-size:24px;margin-bottom:12px">${starStr}</div>
    <div class="rb-desc">${lv.successMsg}</div>
    <div class="rb-stats">
      <div class="rb-stat"><div class="rs-val">${simFps.toFixed(1)}</div><div class="rs-label">FPS</div></div>
      <div class="rb-stat"><div class="rs-val">${simPower.toFixed(1)}W</div><div class="rs-label">功耗</div></div>
      <div class="rb-stat"><div class="rs-val">${simAcc.toFixed(1)}</div><div class="rs-label">精度</div></div>
    </div>
    ${isLast
      ? '<button class="btn-retry" onclick="restartGame()">重新挑战</button>'
      : '<button class="btn-next" onclick="nextLevel()">下一关 →</button><button class="btn-retry" onclick="retryLevel()">重试</button>'
    }
  `;
  document.getElementById('resultModal').classList.remove('hidden');
}

function nextLevel() {
  document.getElementById('resultModal').classList.add('hidden');
  gameState = 'playing';
  loadLevel(currentLevel + 1);
}

function retryLevel() {
  document.getElementById('resultModal').classList.add('hidden');
  gameState = 'playing';
  loadLevel(currentLevel);
}

function restartGame() {
  document.getElementById('resultModal').classList.add('hidden');
  gameState = 'playing';
  loadLevel(0);
}

function togglePanel() {
  document.getElementById('levelPanel').classList.toggle('collapsed');
  document.getElementById('panelToggle').textContent =
    document.getElementById('levelPanel').classList.contains('collapsed') ? '▶' : '◀';
}

// ========== 渲染 ==========
function resize() {
  const dpr = devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  CW = window.innerWidth; CH = window.innerHeight;
}

function drawChip() {
  if (gameState !== 'playing') return;
  const lv = LEVELS[currentLevel];
  const dev = DEVICES[lv.device];
  const chipW = 620, chipH = 420;
  const areaX = 320, areaW = CW - 320 - 200;
  const scale = Math.min(areaW / (chipW + 40), (CH - 40) / (chipH + 40));
  const ox = areaX + (areaW - chipW * scale) / 2;
  const oy = (CH - chipH * scale) / 2;

  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, CW, CH);

  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(scale, scale);

  // 封装边框
  ctx.strokeStyle = '#1a1a3a';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 3]);
  ctx.strokeRect(30, 20, chipW - 60, chipH - 40);
  ctx.setLineDash([]);

  // 引脚
  ctx.fillStyle = '#c8943e20';
  for (let i = 0; i < 14; i++) { ctx.fillRect(45+i*36, 10, 12, 10); ctx.fillRect(45+i*36, chipH-20, 12, 10); }
  for (let i = 0; i < 8; i++) { ctx.fillRect(18, 35+i*44, 12, 16); ctx.fillRect(chipW-30, 35+i*44, 12, 16); }

  // 总线
  for (let b of dev.buses) {
    ctx.strokeStyle = b.color; ctx.lineWidth = b.w;
    ctx.beginPath(); ctx.moveTo(b.from.x, b.from.y); ctx.lineTo(b.to.x, b.to.y); ctx.stroke();
    if (b.label) {
      ctx.fillStyle = b.color + '60'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(b.label, (b.from.x+b.to.x)/2, b.from.y - 6);
    }
    if (b.from.y === b.to.y && b.w >= 3 && deployed) {
      const px = b.from.x + ((time*100)%(b.to.x-b.from.x));
      ctx.fillStyle = b.color+'60';
      ctx.beginPath(); ctx.arc(px, b.from.y, 2.5, 0, Math.PI*2); ctx.fill();
    }
  }

  // 模块
  for (let m of dev.modules) {
    let load = 0;
    if (deployed) {
      if (m.id.startsWith('npu')) load = hwLoad.npu;
      else if (m.id === 'gpu' && lv.device === 'jetson') load = hwLoad.npu;
      else if (m.id.startsWith('a')) load = hwLoad.cpu;
      else if (m.id === 'ddr') load = hwLoad.mem;
      else load = 0.05;
    }
    const grad = ctx.createLinearGradient(m.x, m.y, m.x, m.y+m.h);
    grad.addColorStop(0, m.color + (deployed?'aa':'55'));
    grad.addColorStop(1, m.color + '22');
    ctx.fillStyle = grad;
    rr(ctx, m.x, m.y, m.w, m.h, 5); ctx.fill();
    ctx.strokeStyle = m.color + '66'; ctx.lineWidth = 1;
    rr(ctx, m.x, m.y, m.w, m.h, 5); ctx.stroke();

    if (load > 0.4) {
      ctx.shadowColor = m.color; ctx.shadowBlur = 8*load;
      rr(ctx, m.x, m.y, m.w, m.h, 5); ctx.stroke();
      ctx.shadowBlur = 0;
    }
    if (load > 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(m.x+4, m.y+m.h-7, m.w-8, 3);
      ctx.fillStyle = load>0.8?'#ff4444':load>0.5?'#ffaa00':'#44ff44';
      ctx.fillRect(m.x+4, m.y+m.h-7, (m.w-8)*load, 3);
    }
    ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.min(13,m.w/7)}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText(m.name, m.x+m.w/2, m.y+m.h/2-4);
    ctx.fillStyle = '#ffffff60'; ctx.font = `${Math.min(10,m.w/9)}px sans-serif`;
    ctx.fillText(m.sub, m.x+m.w/2, m.y+m.h/2+10);
  }

  // 粒子
  for (let p of particles) {
    const pos = getParticlePos(p);
    for (let t of p.trail) {
      ctx.fillStyle = p.color + Math.floor(t.a*50).toString(16).padStart(2,'0');
      ctx.beginPath(); ctx.arc(t.x, t.y, p.size*0.4*t.a, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(pos.x, pos.y, p.size, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = p.color + '20';
    ctx.beginPath(); ctx.arc(pos.x, pos.y, p.size*2.5, 0, Math.PI*2); ctx.fill();
  }

  // 芯片型号水印
  ctx.fillStyle = '#c8943e18'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(dev.name, chipW-50, chipH-30);

  ctx.restore();
}

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function getParticlePos(p) {
  const path = p.path, n = path.length-1;
  const t = Math.min(p.progress, 0.999);
  const seg = Math.floor(t*n), local = t*n - seg;
  const a = path[seg], b = path[Math.min(seg+1,n)];
  return { x: a.x+(b.x-a.x)*local, y: a.y+(b.y-a.y)*local };
}

// 推理预览
const OBJS = [
  { x:0.15, y:0.4, w:0.08, h:0.25, vx:0.02, color:'#ff6b6b', label:'行人 92%' },
  { x:0.6, y:0.55, w:0.18, h:0.12, vx:-0.03, color:'#4d96ff', label:'汽车 97%' },
  { x:0.8, y:0.35, w:0.07, h:0.22, vx:-0.01, color:'#ff6b6b', label:'行人 88%' },
  { x:0.35, y:0.5, w:0.1, h:0.1, vx:0.015, color:'#2aaa5a', label:'自行车 85%' },
];

function drawPreview(dt) {
  const rect = prevCanvas.getBoundingClientRect();
  const dpr = devicePixelRatio||1;
  prevCanvas.width = rect.width*dpr; prevCanvas.height = rect.height*dpr;
  prevCtx.setTransform(dpr,0,0,dpr,0,0);
  const pw = rect.width, ph = rect.height;
  prevCtx.fillStyle = '#0a0a18'; prevCtx.fillRect(0,0,pw,ph);
  prevCtx.fillStyle = '#1a1a30'; prevCtx.fillRect(0,ph*0.7,pw,ph*0.3);
  prevCtx.strokeStyle = '#2a2a3e'; prevCtx.setLineDash([8,12]);
  prevCtx.beginPath(); prevCtx.moveTo(0,ph*0.65); prevCtx.lineTo(pw,ph*0.65); prevCtx.stroke();
  prevCtx.setLineDash([]);

  if (!deployed) {
    prevCtx.fillStyle = '#444'; prevCtx.font = '12px sans-serif'; prevCtx.textAlign = 'center';
    prevCtx.fillText('部署模型后显示推理结果', pw/2, ph/2);
    return;
  }
  for (let o of OBJS) {
    o.x += o.vx*dt; if(o.x>1.1)o.x=-0.15; if(o.x<-0.2)o.x=1.1;
    const ox=o.x*pw, oy=o.y*ph, ow=o.w*pw, oh=o.h*ph;
    prevCtx.strokeStyle = o.color; prevCtx.lineWidth = 1.5;
    prevCtx.strokeRect(ox,oy,ow,oh);
    prevCtx.fillStyle = o.color; prevCtx.fillRect(ox,oy-12,prevCtx.measureText(o.label).width+6,12);
    prevCtx.fillStyle = '#fff'; prevCtx.font = '9px sans-serif'; prevCtx.textAlign = 'left';
    prevCtx.fillText(o.label, ox+3, oy-2);
  }
  prevCtx.fillStyle = 'rgba(0,0,0,0.5)'; prevCtx.fillRect(3,3,60,14);
  prevCtx.fillStyle = simFps>20?'#2aaa5a':simFps>10?'#ffaa00':'#ff4444';
  prevCtx.font = 'bold 10px monospace'; prevCtx.textAlign = 'left';
  prevCtx.fillText(`${simFps.toFixed(1)} FPS`, 6, 13);
}

function updateMonitor() {
  if (!deployed) {
    ['mFps','mLat'].forEach(id => document.getElementById(id).textContent = '—');
    ['mNpu','mCpu'].forEach(id => document.getElementById(id).textContent = '0%');
    ['mNpuBar','mCpuBar'].forEach(id => document.getElementById(id).style.width = '0%');
    document.getElementById('mTemp').textContent = '35°C';
    document.getElementById('mPower').textContent = '2W';
    return;
  }
  const jit = (Math.random()-0.5)*simFps*0.08;
  const df = Math.max(0, simFps+jit);
  document.getElementById('mFps').textContent = df.toFixed(1);
  document.getElementById('mFps').style.color = df>20?'#2aaa5a':df>10?'#ffaa00':'#ff4444';
  document.getElementById('mFpsBar').style.width = Math.min(100,df/60*100)+'%';
  document.getElementById('mLat').textContent = (1000/df).toFixed(0)+' ms';
  document.getElementById('mNpu').textContent = (hwLoad.npu*100).toFixed(0)+'%';
  document.getElementById('mNpuBar').style.width = (hwLoad.npu*100)+'%';
  document.getElementById('mCpu').textContent = (hwLoad.cpu*100).toFixed(0)+'%';
  document.getElementById('mCpuBar').style.width = (hwLoad.cpu*100)+'%';
  const temp = 35 + hwLoad.npu*30 + hwLoad.cpu*20 + (Math.random()-0.5)*2;
  document.getElementById('mTemp').textContent = temp.toFixed(0)+'°C';
  document.getElementById('mTemp').style.color = temp>70?'#ff4444':temp>55?'#ffaa00':'#2aaa5a';
  document.getElementById('mPower').textContent = simPower.toFixed(1)+'W';
}

// 持续推理粒子
let inferTimer = 0;
function spawnInferParticle(dt) {
  if (!deployed) return;
  inferTimer += dt;
  const interval = 1.2 / Math.max(1, simFps/10);
  if (inferTimer < interval) return;
  inferTimer = 0;
  const lv = LEVELS[currentLevel];
  const dev = DEVICES[lv.device];
  const ddr = dev.modules.find(m => m.id==='ddr');
  const npus = dev.modules.filter(m => m.id.startsWith('npu'));
  const gpu = dev.modules.find(m => m.id==='gpu');
  const tgt = (npus.length>0 && selectedQuant==='int8') ? npus[Math.floor(Math.random()*npus.length)] : (gpu || dev.modules[0]);
  if (!ddr || !tgt) return;
  const busY = dev.buses[0]?.from.y || 150;
  particles.push({
    path: [{x:ddr.x+ddr.w/2,y:ddr.y+ddr.h/2},{x:ddr.x+ddr.w/2,y:busY},{x:tgt.x+tgt.w/2,y:busY},{x:tgt.x+tgt.w/2,y:tgt.y+tgt.h/2}],
    color: ['#ff6b6b','#ffd93d','#4d96ff','#20c997','#ff922b'][Math.floor(Math.random()*5)],
    speed: 0.5+Math.random()*0.4, progress: 0, alive: true, size: 2+Math.random()*3, trail: []
  });
}

// ========== 主循环 ==========
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  if (!lastTime) { lastTime = ts; return; }
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;
  time += dt;

  // 粒子更新
  for (let p of particles) {
    p.progress += p.speed * dt;
    if (p.progress >= 1) p.alive = false;
    const pos = getParticlePos(p);
    p.trail.push({x:pos.x, y:pos.y, a:1});
    if (p.trail.length > 10) p.trail.shift();
    for (let t of p.trail) t.a *= 0.85;
  }
  particles = particles.filter(p => p.alive);
  spawnInferParticle(dt);

  resize();
  drawChip();
  updateMonitor();
  drawPreview(dt);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
