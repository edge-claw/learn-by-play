<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>操作系统原理 探险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#c0c0d0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh}
canvas{position:absolute;top:0;left:320px;width:calc(100vw - 320px);height:calc(100vh - 36px)}
.panel{position:absolute;top:0;left:0;width:320px;height:calc(100vh - 36px);background:rgba(10,10,30,0.95);border-right:1px solid #1a1a3a;overflow-y:auto;z-index:10;padding:12px;display:none}
.panel h3{color:#a78bfa;font-size:15px;margin:8px 0 6px}
.panel p,.panel li{font-size:12px;line-height:1.6;color:#999}
.panel ul{padding-left:16px;margin-bottom:8px}
.bar{position:absolute;bottom:0;left:0;width:100%;height:36px;background:#0d0d24;border-top:1px solid #1a1a3a;display:flex;align-items:center;padding:0 16px;font-size:13px;color:#666;z-index:20;display:none}
.bar .level-btns{display:flex;gap:4px;margin-left:auto}
.level-btn{background:#1a1a3a;border:1px solid #2a2a5a;color:#888;padding:2px 10px;border-radius:4px;cursor:pointer;font-size:12px}
.level-btn:hover,.level-btn.active{background:#8b5cf6;color:#fff;border-color:#a78bfa}
.concept-box{background:#111128;border:1px solid #2a2a4a;border-radius:8px;padding:10px;margin:8px 0;font-size:12px;line-height:1.6}
.concept-box b{color:#a78bfa}
.act-btn{background:linear-gradient(135deg,#8b5cf6,#a78bfa);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;margin:4px 2px;transition:transform .15s}
.act-btn:hover{transform:scale(1.04)}
.act-btn.sm{padding:5px 10px;font-size:11px}
.act-btn.outline{background:none;border:1px solid #8b5cf6;color:#a78bfa}
.act-btn.outline:hover{background:#8b5cf620}
.hint-box{background:#1a1a38;border-left:3px solid #8b5cf6;border-radius:0 8px 8px 0;padding:8px 10px;margin:8px 0;font-size:11px;color:#8ab4ff;line-height:1.5}
.learn-box{background:#0f2a1a;border:1px solid #1a4a2a;border-radius:8px;padding:10px;margin:8px 0;font-size:12px;color:#6dca88;line-height:1.6;display:none}
.learn-box .sv{color:#a78bfa;font-weight:700}
.obj-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px}
.obj-row .dot{width:14px;height:14px;border-radius:50%;border:2px solid #444;display:flex;align-items:center;justify-content:center;font-size:9px}
.obj-row .dot.done{border-color:#2aaa5a;background:#2aaa5a;color:#fff}
.obj-row .dot.done::after{content:'✓'}
.obj-row span{color:#aaa}
select,.num-input{background:#1a1a3a;border:1px solid #2a2a5a;color:#c0c0d0;padding:4px 8px;border-radius:4px;font-size:12px;margin:2px}
.num-input{width:60px}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:50}
.overlay.hidden{display:none}
.start-box{text-align:center;max-width:520px}
.start-box h1{font-size:36px;color:#a78bfa;margin-bottom:8px;letter-spacing:2px}
.start-box .subtitle{font-size:15px;color:#888;margin-bottom:28px}
.start-box .features{display:flex;flex-wrap:wrap;gap:16px;margin:24px 0;justify-content:center}
.start-box .feat{text-align:center;color:#aaa;font-size:12px;width:80px}
.start-box .feat .fi{font-size:26px;margin-bottom:4px}
.start-btn{background:linear-gradient(135deg,#8b5cf6,#a78bfa);color:#fff;border:none;padding:14px 48px;border-radius:10px;font-size:18px;font-weight:600;cursor:pointer;transition:transform .2s}
.start-btn:hover{transform:scale(1.05)}
.ctrl-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin:4px 0}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px}
.tag.r{background:#ff444430;color:#ff6666}.tag.g{background:#2aaa5a30;color:#6dca88}.tag.b{background:#4d96ff30;color:#8ab4ff}.tag.y{background:#f0a03030;color:#f0c060}.tag.p{background:#8b5cf630;color:#a78bfa}
</style>
</head>
<body>
<div class="overlay" id="startScreen">
<div class="start-box">
<h1>⚙️ 操作系统原理 探险</h1>
<p class="subtitle">7 个关卡，从进程管理到文件系统</p>
<div class="features">
<div class="feat"><div class="fi">🔄</div>进程管理</div>
<div class="feat"><div class="fi">📊</div>CPU调度</div>
<div class="feat"><div class="fi">🧠</div>内存管理</div>
<div class="feat"><div class="fi">📄</div>页面置换</div>
<div class="feat"><div class="fi">🔒</div>同步死锁</div>
<div class="feat"><div class="fi">📁</div>文件系统</div>
<div class="feat"><div class="fi">💿</div>磁盘调度</div>
</div>
<button class="start-btn" onclick="startGame()">开始探索</button>
</div>
</div>
<canvas id="cv"></canvas>
<div class="panel" id="panel"></div>
<div class="bar" id="bar"><span id="barText"></span><div class="level-btns" id="levelBtns"></div></div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),panel=document.getElementById('panel'),bar=document.getElementById('bar'),barText=document.getElementById('barText'),levelBtns=document.getElementById('levelBtns');
let W,H,curLevel=-1,animId,mouse={x:0,y:0};
const COLORS={bg:'#0a0a1a',purple:'#a78bfa',dpurple:'#8b5cf6',green:'#2aaa5a',red:'#ff4444',blue:'#4d96ff',yellow:'#f0c060',grid:'#1a1a3a',text:'#c0c0d0',dim:'#666'};
function resize(){cv.width=W=cv.offsetWidth;cv.height=H=cv.offsetHeight}
window.addEventListener('resize',resize);
// Level objectives: 7 levels x 3 objectives each
const levelObjs=Array.from({length:7},()=>[false,false,false]);
const levelNames=['进程管理','CPU 调度','内存管理','页面置换','同步与死锁','文件系统','磁盘调度'];
const levelIcons=['🔄','📊','🧠','📄','🔒','📁','💿'];
function completeObj(li,oi){if(!levelObjs[li][oi]){levelObjs[li][oi]=true;renderPanel();checkAllDone(li)}}
function checkAllDone(li){if(levelObjs[li].every(v=>v)){document.querySelectorAll('.learn-box').forEach(e=>e.style.display='block')}}
function startGame(){document.getElementById('startScreen').classList.add('hidden');panel.style.display='block';bar.style.display='flex';buildLevelBtns();goLevel(0)}
function buildLevelBtns(){levelBtns.innerHTML='';for(let i=0;i<7;i++){const b=document.createElement('button');b.className='level-btn';b.textContent=(i+1);b.onclick=()=>goLevel(i);levelBtns.appendChild(b)}}
function goLevel(i){curLevel=i;document.querySelectorAll('.level-btn').forEach((b,j)=>b.classList.toggle('active',j===i));barText.textContent=`关卡 ${i+1}/7: ${levelIcons[i]} ${levelNames[i]}`;initLevel(i);renderPanel()}
function objHTML(li){return levelObjs[li].map((v,i)=>`<div class="obj-row"><div class="dot${v?' done':''}"></div><span>${objTexts[li][i]}</span></div>`).join('')}
const objTexts=[
['创建一个进程','触发状态转换到等待','观察上下文切换'],
['运行 FCFS 调度','运行 Round Robin','比较平均等待时间'],
['完成虚拟地址转换','触发缺页中断','观察 TLB 命中'],
['运行 FIFO 置换','运行 LRU 置换','比较缺页率'],
['触发死锁','识别死锁条件','用策略避免死锁'],
['创建文件','理解 inode 结构','观察索引分配'],
['运行 FCFS 磁盘调度','运行 SCAN 调度','比较总寻道距离']
];
// ===== LEVEL 1: Process Management =====
let procs=[],procIdCnt=0,ctxSwitchCount=0,selectedProc=null;
const PSTATES=['新建','就绪','运行','等待','终止'];
const PCOLORS=['#4d96ff','#f0c060','#2aaa5a','#ff6666','#666'];
function initL1(){procs=[];procIdCnt=0;ctxSwitchCount=0;selectedProc=null}
function createProc(){const p={id:++procIdCnt,state:0,x:0,y:0,tx:0,ty:0,age:0,burst:Math.floor(Math.random()*5)+3};procs.push(p);setTimeout(()=>{p.state=1;renderPanel()},600);completeObj(0,0);renderPanel()}
function runProc(){const r=procs.find(p=>p.state===2);if(r){r.state=1;ctxSwitchCount++;completeObj(0,2)}const p=procs.find(p=>p.state===1);if(p){p.state=2;renderPanel()}}
function blockProc(){const p=procs.find(p=>p.state===2);if(p){p.state=3;completeObj(0,1);setTimeout(()=>{p.state=1;renderPanel()},2000);renderPanel()}}
function termProc(){const p=procs.find(p=>p.state===2);if(p){p.state=4;renderPanel()}}
function drawL1(){ctx.clearRect(0,0,W,H);const stateX=[W*0.1,W*0.35,W*0.6,W*0.6,W*0.85];const stateY=[H*0.15,H*0.15,H*0.15,H*0.55,H*0.55];
// Draw state boxes
for(let i=0;i<5;i++){ctx.strokeStyle=PCOLORS[i];ctx.lineWidth=2;ctx.strokeRect(stateX[i]-50,stateY[i]-20,100,40);ctx.fillStyle=PCOLORS[i];ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText(PSTATES[i],stateX[i],stateY[i]+5)}
// Draw arrows
ctx.strokeStyle='#333';ctx.lineWidth=1.5;const arrows=[[0,1],[1,2],[2,3],[3,1],[2,4]];
arrows.forEach(([a,b])=>{const ax=stateX[a]+50,ay=stateY[a],bx=stateX[b]-50,by=stateY[b];ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();const ang=Math.atan2(by-ay,bx-ax);ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx-8*Math.cos(ang-0.4),by-8*Math.sin(ang-0.4));ctx.lineTo(bx-8*Math.cos(ang+0.4),by-8*Math.sin(ang+0.4));ctx.fill()});
// Draw processes
procs.forEach((p,i)=>{const si=p.state;const cnt=procs.filter((q,j)=>j<=i&&q.state===si).length-1;p.tx=stateX[si]-30+cnt*35;p.ty=stateY[si]+35;p.x+=(p.tx-p.x)*0.1;p.y+=(p.ty-p.y)*0.1;
ctx.fillStyle=PCOLORS[si]+'80';ctx.fillRect(p.x,p.y,30,24);ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText('P'+p.id,p.x+15,p.y+16)});
// Info
ctx.fillStyle='#555';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.fillText(`进程数: ${procs.length}  上下文切换: ${ctxSwitchCount}`,10,H-20)}
// ===== LEVEL 2: CPU Scheduling =====
let schedAlgo='FCFS',schedProcs=[],schedResult=[],schedRunning=false,schedTime=0,schedCompared=false;
function initL2(){schedProcs=[{name:'P1',arrive:0,burst:6},{name:'P2',arrive:1,burst:4},{name:'P3',arrive:2,burst:2},{name:'P4',arrive:3,burst:3}];schedResult=[];schedRunning=false;schedTime=0;schedCompared=false}
function addSchedProc(){const n=schedProcs.length+1;schedProcs.push({name:'P'+n,arrive:Math.floor(Math.random()*4),burst:Math.floor(Math.random()*6)+1});renderPanel()}
function runSchedule(){const ps=schedProcs.map(p=>({...p,remain:p.burst,start:-1,end:-1,wait:0}));schedResult=[];let t=0,q=[],done=[];
if(schedAlgo==='FCFS'){ps.sort((a,b)=>a.arrive-b.arrive);ps.forEach(p=>{if(t<p.arrive)t=p.arrive;p.start=t;p.end=t+p.burst;for(let i=0;i<p.burst;i++)schedResult.push({t:t+i,proc:p.name});t=p.end;p.wait=p.start-p.arrive});completeObj(1,0)}
else if(schedAlgo==='SJF'){let rem=[...ps];t=0;while(rem.length){let avail=rem.filter(p=>p.arrive<=t);if(!avail.length){t++;schedResult.push({t:t-1,proc:'idle'});continue}avail.sort((a,b)=>a.burst-b.burst);let p=avail[0];p.start=t;p.end=t+p.burst;p.wait=p.start-p.arrive;for(let i=0;i<p.burst;i++)schedResult.push({t:t+i,proc:p.name});t=p.end;rem=rem.filter(q=>q!==p)}}
else if(schedAlgo==='RR'){let rem=ps.filter(()=>true),tq=2;t=0;let rq=[];while(rem.length||rq.length){let newArr=rem.filter(p=>p.arrive<=t);newArr.sort((a,b)=>a.arrive-b.arrive);rq.push(...newArr);rem=rem.filter(p=>p.arrive>t);if(!rq.length){t++;schedResult.push({t:t-1,proc:'idle'});continue}let p=rq.shift();if(p.start<0)p.start=t;let run=Math.min(tq,p.remain);for(let i=0;i<run;i++)schedResult.push({t:t+i,proc:p.name});t+=run;p.remain-=run;let newArr2=rem.filter(p=>p.arrive<=t);newArr2.sort((a,b)=>a.arrive-b.arrive);rq.push(...newArr2);rem=rem.filter(p=>p.arrive>t);if(p.remain>0)rq.push(p);else{p.end=t;p.wait=p.end-p.arrive-p.burst}}completeObj(1,1)}
schedRunning=true;schedTime=0;renderPanel()}
function drawL2(){ctx.clearRect(0,0,W,H);if(!schedResult.length){ctx.fillStyle='#444';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText('选择调度算法并点击"运行调度"',W/2,H/2);return}
const bw=Math.min(40,W/(schedResult.length+2)),bh=30,ox=40,oy=60;
const colors={'P1':'#4d96ff','P2':'#f0c060','P3':'#2aaa5a','P4':'#ff6666','P5':'#a78bfa','P6':'#ff8844','idle':'#333'};
const maxT=Math.min(schedTime,schedResult.length);
for(let i=0;i<maxT;i++){const r=schedResult[i];ctx.fillStyle=colors[r.proc]||'#888';ctx.fillRect(ox+i*bw,oy,bw-2,bh);ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText(r.proc,ox+i*bw+bw/2,oy+bh/2+4)}
// Time axis
ctx.fillStyle='#555';ctx.font='10px sans-serif';for(let i=0;i<=schedResult.length;i++){ctx.textAlign='center';ctx.fillText(i,ox+i*bw,oy+bh+14)}
// Process info table
const ps=schedProcs;let ty=oy+bh+40;ctx.fillStyle='#888';ctx.font='bold 12px sans-serif';ctx.textAlign='left';ctx.fillText('进程  到达  执行  等待  周转',ox,ty);ty+=18;
let totalWait=0,cnt=0;ps.forEach(p=>{const wait=schedResult.length>0?Math.max(0,(schedResult.findIndex(r=>r.proc===p.name))-p.arrive):0;const turn=wait+p.burst;totalWait+=wait;cnt++;ctx.fillStyle=colors[p.name]||'#aaa';ctx.fillText(`${p.name}    ${p.arrive}     ${p.burst}     ${wait}     ${turn}`,ox,ty);ty+=16});
if(maxT>=schedResult.length){ctx.fillStyle='#a78bfa';ctx.fillText(`平均等待: ${(totalWait/cnt).toFixed(1)}`,ox,ty+10)}
if(schedTime<schedResult.length)schedTime++;else schedRunning=false}
// ===== LEVEL 3: Memory Management =====
let pageTable=[],tlb=[],memFrames=[],vaddrInput=0,lastTranslation=null,tlbHits=0,pageFaults=0;
const PAGE_SIZE=4096,NUM_PAGES=16,NUM_FRAMES=8;
function initL3(){pageTable=Array.from({length:NUM_PAGES},(_,i)=>({valid:Math.random()>0.3,frame:Math.floor(Math.random()*NUM_FRAMES)}));
// ensure some invalid
pageTable[5].valid=false;pageTable[11].valid=false;pageTable[14].valid=false;
tlb=[];memFrames=Array.from({length:NUM_FRAMES},(_,i)=>({page:-1}));pageTable.forEach((e,i)=>{if(e.valid)memFrames[e.frame]={page:i}});
vaddrInput=0;lastTranslation=null;tlbHits=0;pageFaults=0}
function translateAddr(){const vaddr=vaddrInput;const pageNum=Math.floor(vaddr/PAGE_SIZE);const offset=vaddr%PAGE_SIZE;
if(pageNum>=NUM_PAGES){lastTranslation={error:'页号越界'};renderPanel();return}
// Check TLB
const tlbEntry=tlb.find(e=>e.page===pageNum);if(tlbEntry){tlbHits++;completeObj(2,2);lastTranslation={vaddr,pageNum,offset,frame:tlbEntry.frame,paddr:tlbEntry.frame*PAGE_SIZE+offset,src:'TLB命中'};completeObj(2,0);renderPanel();return}
// Check page table
const pte=pageTable[pageNum];if(!pte.valid){pageFaults++;completeObj(2,1);const f=memFrames.findIndex(f=>f.page===-1);if(f>=0){pte.valid=true;pte.frame=f;memFrames[f]={page:pageNum}}else{const victim=Math.floor(Math.random()*NUM_FRAMES);const oldPage=memFrames[victim].page;if(oldPage>=0)pageTable[oldPage].valid=false;pte.valid=true;pte.frame=victim;memFrames[victim]={page:pageNum}}
lastTranslation={vaddr,pageNum,offset,frame:pte.frame,paddr:pte.frame*PAGE_SIZE+offset,src:'缺页中断→已加载'}}
else{lastTranslation={vaddr,pageNum,offset,frame:pte.frame,paddr:pte.frame*PAGE_SIZE+offset,src:'页表命中'};completeObj(2,0)}
// Update TLB (FIFO, max 4)
tlb.push({page:pageNum,frame:pte.frame});if(tlb.length>4)tlb.shift();renderPanel()}
function drawL3(){ctx.clearRect(0,0,W,H);const vx=30,vy=30,fw=50,fh=28;
// Virtual address space
ctx.fillStyle='#a78bfa';ctx.font='bold 13px sans-serif';ctx.textAlign='left';ctx.fillText('虚拟页表',vx,vy);
for(let i=0;i<NUM_PAGES;i++){const y=vy+14+i*fh;ctx.fillStyle=pageTable[i].valid?'#1a3a2a':'#3a1a1a';ctx.fillRect(vx,y,fw*2.5,fh-2);ctx.strokeStyle='#333';ctx.strokeRect(vx,y,fw*2.5,fh-2);ctx.fillStyle=pageTable[i].valid?'#6dca88':'#ff6666';ctx.font='10px sans-serif';ctx.fillText(`页${i} → ${pageTable[i].valid?'帧'+pageTable[i].frame:'无效'}`,vx+4,y+18)}
// Physical memory
const px=vx+fw*3+40;ctx.fillStyle='#4d96ff';ctx.font='bold 13px sans-serif';ctx.fillText('物理内存帧',px,vy);
for(let i=0;i<NUM_FRAMES;i++){const y=vy+14+i*fh*2;ctx.fillStyle=memFrames[i].page>=0?'#1a2a3a':'#1a1a2a';ctx.fillRect(px,y,fw*2,fh*2-2);ctx.strokeStyle='#333';ctx.strokeRect(px,y,fw*2,fh*2-2);ctx.fillStyle='#8ab4ff';ctx.font='11px sans-serif';ctx.fillText(`帧${i}: ${memFrames[i].page>=0?'页'+memFrames[i].page:'空'}`,px+4,y+20)}
// TLB
const tx=px+fw*2+60;ctx.fillStyle='#f0c060';ctx.font='bold 13px sans-serif';ctx.fillText('TLB 缓存',tx,vy);
tlb.forEach((e,i)=>{const y=vy+14+i*fh;ctx.fillStyle='#2a2a1a';ctx.fillRect(tx,y,fw*2,fh-2);ctx.strokeStyle='#444';ctx.strokeRect(tx,y,fw*2,fh-2);ctx.fillStyle='#f0c060';ctx.font='10px sans-serif';ctx.fillText(`页${e.page}→帧${e.frame}`,tx+4,y+18)});
// Translation result
if(lastTranslation){const ry=H-80;ctx.fillStyle='#222';ctx.fillRect(30,ry,W-60,60);ctx.strokeStyle='#a78bfa';ctx.strokeRect(30,ry,W-60,60);ctx.fillStyle='#c0c0d0';ctx.font='13px sans-serif';ctx.textAlign='left';
if(lastTranslation.error){ctx.fillText(`错误: ${lastTranslation.error}`,40,ry+30)}
else{ctx.fillText(`虚拟地址 ${lastTranslation.vaddr} → 页${lastTranslation.pageNum}+偏移${lastTranslation.offset} → 物理地址 ${lastTranslation.paddr}  [${lastTranslation.src}]`,40,ry+25);ctx.fillStyle='#888';ctx.fillText(`TLB命中: ${tlbHits}  缺页中断: ${pageFaults}`,40,ry+45)}}}
// ===== LEVEL 4: Page Replacement =====
let prAlgo='FIFO',prSeq=[],prFrameCount=3,prResult=[],prFaults=0,prStep=0,prRunning=false,prHistory={};
function initL4(){prSeq=[7,0,1,2,0,3,0,4,2,3,0,3,2,1,2,0,1,7,0,1];prFrameCount=3;prResult=[];prFaults=0;prStep=0;prRunning=false;prHistory={}}
function runPageReplace(){prResult=[];prFaults=0;prStep=0;
let frames=[];const steps=[];
if(prAlgo==='FIFO'){let ptr=0;prSeq.forEach(pg=>{const hit=frames.includes(pg);if(!hit){if(frames.length<prFrameCount)frames.push(pg);else{frames[ptr%prFrameCount]=pg;ptr++}prFaults++}steps.push({page:pg,frames:[...frames],fault:!hit})});completeObj(3,0)}
else if(prAlgo==='LRU'){let recent=[];prSeq.forEach(pg=>{const hit=frames.includes(pg);if(hit){recent=recent.filter(p=>p!==pg);recent.push(pg)}else{if(frames.length<prFrameCount){frames.push(pg)}else{const lru=recent.shift();const idx=frames.indexOf(lru);frames[idx]=pg}recent.push(pg);prFaults++}steps.push({page:pg,frames:[...frames],fault:!hit})});completeObj(3,1)}
else if(prAlgo==='OPT'){prSeq.forEach((pg,si)=>{const hit=frames.includes(pg);if(!hit){if(frames.length<prFrameCount){frames.push(pg)}else{let farthest=-1,victim=0;frames.forEach((f,fi)=>{const next=prSeq.slice(si+1).indexOf(f);const dist=next===-1?Infinity:next;if(dist>farthest){farthest=dist;victim=fi}});frames[victim]=pg}prFaults++}steps.push({page:pg,frames:[...frames],fault:!hit})})}
prResult=steps;prHistory[prAlgo]=prFaults;prRunning=true;
if(Object.keys(prHistory).length>=2)completeObj(3,2);renderPanel()}
function drawL4(){ctx.clearRect(0,0,W,H);if(!prResult.length){ctx.fillStyle='#444';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText('选择页面置换算法并运行',W/2,H/2);return}
const bw=Math.min(36,(W-80)/prResult.length),ox=40,oy=50;const maxStep=Math.min(prStep,prResult.length);
// Header: page sequence
ctx.fillStyle='#888';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText('访问序列',ox-20,oy-10);

else if(p.state==='eating'){forks[left].taken=false;forks[left].by=-1;forks[right].taken=false;forks[right].by=-1;p.leftFork=false;p.rightFork=false;p.state='thinking';p.timer=30+Math.random()*40;

let diskReqs=[],diskAlgo='FCFS',diskHead=50,diskResult=[],diskStep=0,diskRunning=false,diskHistory={},DISK_MAX=200;
function initL7(){diskReqs=[98,183,37,122,14,124,65,67];diskHead=50;diskResult=[];diskStep=0;diskRunning=false;diskHistory={}}

function runDiskSched(){const reqs=[...diskReqs];let head=diskHead,order=[head],total=0;
if(diskAlgo==='FCFS'){reqs.forEach(r=>{total+=Math.abs(r-head);head=r;order.push(r)});completeObj(6,0)}
else if(diskAlgo==='SSTF'){let rem=[...reqs];while(rem.length){rem.sort((a,b)=>Math.abs(a-head)-Math.abs(b-head));const next=rem.shift();total+=Math.abs(next-head);head=next;order.push(next)}}
else if(diskAlgo==='SCAN'){let rem=[...reqs];rem.sort((a,b)=>a-b);const left=rem.filter(r=>r<head).reverse(),right=rem.filter(r=>r>=head);
right.forEach(r=>{total+=Math.abs(r-head);head=r;order.push(r)});if(head<DISK_MAX-1){total+=Math.abs(DISK_MAX-1-head);head=DISK_MAX-1;order.push(DISK_MAX-1)}
left.forEach(r=>{total+=Math.abs(r-head);head=r;order.push(r)});completeObj(6,1)}
diskResult=order;diskHistory[diskAlgo]=total;diskStep=1;diskRunning=true;

function initLevel(i){if(animId)cancelAnimationFrame(animId);resize();
if(i===0)initL1();else if(i===1)initL2();else if(i===2)initL3();else if(i===3)initL4();else if(i===4)initL5();else if(i===5)initL6();else if(i===6)initL7();
animate()}
function animate(){animId=requestAnimationFrame(animate);
if(curLevel===0)drawL1();
else if(curLevel===1)drawL2();
else if(curLevel===2)drawL3();
else if(curLevel===3)drawL4();
else if(curLevel===4){stepPhils();drawL5()}
else if(curLevel===5)drawL6();
else if(curLevel===6)drawL7()}
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();mouse.x=(e.clientX-r.left)*(cv.width/r.width);mouse.y=(e.clientY-r.top)*(cv.height/r.height)});
resize();
</script>
