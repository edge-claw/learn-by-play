<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>⚡ 并行计算探险 — 边玩边学</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh}
canvas{position:absolute;top:0;left:320px;width:calc(100vw - 320px);height:calc(100vh - 36px)}
.panel{position:absolute;top:0;left:0;width:320px;height:calc(100vh - 36px);background:var(--panel-bg);border-right:1px solid var(--panel-border);overflow-y:auto;z-index:10;padding:12px;padding-bottom:24px}
.bar{position:absolute;bottom:0;left:0;width:100%;height:36px;background:var(--bar-bg);border-top:1px solid var(--panel-border);display:flex;align-items:center;padding:0 16px;font-size:13px;color:#666;z-index:10}
.bar .cur{color:var(--sv);font-weight:600;margin-left:8px}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--overlay-bg);display:flex;align-items:center;justify-content:center;z-index:50}
.overlay.hidden{display:none}
.start-box{text-align:center;max-width:540px}
.start-box h1{font-size:38px;color:var(--sv);margin-bottom:8px;letter-spacing:2px}
.start-box .subtitle{font-size:15px;color:#888;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,#3b82f6,#60a5fa);color:#fff;border:none;padding:14px 52px;border-radius:10px;font-size:18px;font-weight:600;cursor:pointer;transition:transform .2s}
.start-btn:hover{transform:scale(1.05)}
.features{display:flex;gap:16px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:var(--feat-text);font-size:12px;width:64px}
.feat .fi{font-size:26px;margin-bottom:4px}
.concept-box{margin:10px 0;padding:10px;background:var(--concept-bg);border-left:3px solid #3b82f6;border-radius:0 6px 6px 0;font-size:12px;line-height:1.6;color:var(--concept-text)}
.act-btn{display:inline-block;padding:6px 14px;margin:3px;background:var(--concept-bg);border:1px solid #2a2a5a;border-radius:6px;color:#c0c0d0;font-size:15px;cursor:pointer;transition:all .2s}
.act-btn:hover{border-color:#3b82f6;background:#0d1a3a}
.act-btn.sel{border-color:#3b82f6;background:#1a2a5a;color:#60a5fa}
.hint-box{margin:8px 0;padding:8px 10px;background:var(--hint-bg);border-radius:6px;font-size:11px;color:var(--hint-text);line-height:1.5}
.learn-box{margin:8px 0;padding:10px;background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:6px;font-size:14px;color:var(--learn-text);line-height:1.8}
.learn-box .sv{color:var(--sv);font-weight:600}
.obj-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px}
.obj-row .oi{font-size:14px}
.obj-row .ot{flex:1;color:#aaa}
.obj-row.done .ot{color:#4ade80;text-decoration:line-through}
.sec-title{font-size:13px;font-weight:600;color:var(--sv);margin:10px 0 6px;border-bottom:1px solid #1a1a3a;padding-bottom:4px}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:8px 0}
.quiz-q{font-size:13px;color:var(--quiz-q);margin-bottom:8px;font-weight:600}
.quiz-opt{font-size:13px;color:var(--quiz-opt-text);padding:8px 10px;margin:4px 0;border-radius:6px;cursor:pointer;border:1px solid var(--quiz-opt-border);background:var(--quiz-opt-bg)}
.quiz-opt:hover{background:var(--quiz-opt-hover);border-color:#22c55e}
.quiz-opt.correct{background:var(--quiz-correct-bg);border-color:#22c55e;color:var(--quiz-correct-text)}
.quiz-opt.wrong{background:var(--quiz-wrong-bg);border-color:#ef4444;color:var(--quiz-wrong-text)}
.quiz-feedback{font-size:12px;line-height:1.6;margin-top:6px;padding:7px;border-radius:6px}
.quiz-feedback.ok{background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-feedback.bad{background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
.prog-bar{height:4px;background:var(--stage-bar);border-radius:2px;margin:6px 0}
.prog-fill{height:100%;background:#3b82f6;border-radius:2px;transition:width .3s}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
input[type=range]{width:100%;accent-color:#3b82f6}
.slider-label{font-size:12px;color:var(--text-sub);display:flex;justify-content:space-between;margin:2px 0}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="overlay" id="startScreen">
<div class="start-box">
<h1>⚡ 并行计算探险</h1>
<div class="subtitle">7 个关卡，从串行到异构并行</div>
<div class="desc" style="font-size:13px;color:var(--text-sub);line-height:1.8;margin-bottom:16px;padding:12px;background:var(--concept-bg);border:1px solid var(--concept-border);border-radius:8px">拖动任务到核心、调节线程数、观察加速比变化。<br>从单核串行出发，逐步掌握线程同步、并行模式、GPU 计算和异构调度。</div>
<button class="start-btn" onclick="startGame()">开始探索</button>
<div class="features">
<div class="feat"><div class="fi">🔄</div>串行vs并行</div>
<div class="feat"><div class="fi">🧵</div>线程进程</div>
<div class="feat"><div class="fi">🔒</div>同步原语</div>
<div class="feat"><div class="fi">🔀</div>并行模式</div>
<div class="feat"><div class="fi">🎮</div>GPU并行</div>
<div class="feat"><div class="fi">📊</div>Amdahl</div>
<div class="feat"><div class="fi">🤖</div>异构计算</div>
</div>
</div>
</div>
<div class="panel" id="panel" style="display:none"></div>
<canvas id="cv"></canvas>
<div class="bar" id="bar">关卡：<span class="cur" id="barInfo">-</span></div>
<script>
// === Theme ===
let isDark=true;
const TH={
  dark:{bg:'#0a0a2e',bg2:'#0d0d1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',core:'#1a1a4a',coreBorder:'#3b82f6',coreActive:'#2a3a6a',taskColor:'#60a5fa',taskDone:'#22c55e',taskWait:'#f59e0b',line:'#2a2a5a',showStars:true},
  light:{bg:'#e8edf5',bg2:'#f0f2f5',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',core:'#e0e7ff',coreBorder:'#6366f1',coreActive:'#c7d2fe',taskColor:'#4338ca',taskDone:'#059669',taskWait:'#d97706',line:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{renderPanel()}catch(e){}}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),panel=document.getElementById('panel'),barInfo=document.getElementById('barInfo');
let W,H,curLevel=0,time=0,animId,gameStarted=false;
const TOTAL=7;

function resize(){cv.width=W=cv.offsetWidth*devicePixelRatio;cv.height=H=cv.offsetHeight*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio)}
window.onresize=resize;

// === Levels ===
const levels=[
{name:'串行 vs 并行',icon:'🔄',desc:'画布上有 8 个任务方块和多个处理核心。<br>拖动滑块增加核心数，观察任务如何分配到不同核心并行执行。',objs:['观察串行执行','启用 2 核并行','达到 4 核加速'],
 quiz:{q:'4 个独立任务用 4 核并行，理论加速比是？',opts:['2x','4x','8x','16x'],ans:1},
 learn:'<span class="sv">并行计算</span>将任务分配到多个核心同时执行。<span class="sv">加速比</span> = 串行时间 / 并行时间。理想情况下 N 核可获得 N 倍加速，但实际受通信开销和负载均衡影响。'},
{name:'线程与进程',icon:'🧵',desc:'画布展示进程和线程的内存模型。<br>创建线程观察共享内存，触发竞态条件理解数据竞争。',objs:['创建子线程','观察共享内存','触发竞态条件'],
 quiz:{q:'线程与进程的关键区别是？',opts:['线程不能并行','线程共享进程的内存空间','线程比进程慢','线程不需要 CPU'],ans:1},
 learn:'<span class="sv">进程</span>拥有独立的内存空间，<span class="sv">线程</span>共享所属进程的内存。共享内存带来高效通信，但也引入<span class="sv">竞态条件</span>——多线程同时读写同一变量导致结果不确定。'},
{name:'同步原语',icon:'🔒',desc:'两个线程同时操作共享计数器，结果混乱。<br>选择合适的同步原语（互斥锁/信号量/自旋锁）保护临界区。',objs:['用互斥锁保护','用信号量限流','比较自旋锁开销'],
 quiz:{q:'互斥锁和自旋锁的主要区别是？',opts:['互斥锁更快','自旋锁等待时不让出 CPU','它们完全相同','自旋锁不能保护临界区'],ans:1},
 learn:'<span class="sv">互斥锁</span>(Mutex)让等待线程休眠，适合长临界区。<span class="sv">自旋锁</span>让线程忙等，适合极短临界区。<span class="sv">信号量</span>允许 N 个线程同时进入，是互斥锁的泛化。'},
{name:'并行模式',icon:'🔀',desc:'画布展示 4 种经典并行模式的数据流。<br>为不同任务选择最佳并行模式，观察执行效率差异。',objs:['体验流水线模式','执行 MapReduce','运行生产者-消费者'],
 quiz:{q:'MapReduce 的核心思想是？',opts:['所有数据串行处理','先分散计算再汇总结果','只用一个线程','数据不需要分割'],ans:1},
 learn:'<span class="sv">流水线</span>将任务分阶段，每阶段并行处理不同数据。<span class="sv">MapReduce</span> 先将数据分片并行处理(Map)，再汇总结果(Reduce)。<span class="sv">生产者-消费者</span>通过缓冲队列解耦生产和消费速率。'},
{name:'GPU 并行',icon:'🎮',desc:'画布对比 CPU（少量强核心）和 GPU（大量弱核心）的架构。<br>调节线程束大小，观察 SIMT 执行模型和共享内存层次。',objs:['理解 SIMT 模型','观察 Warp 执行','利用共享内存'],
 quiz:{q:'GPU 的 Warp（线程束）通常包含多少线程？',opts:['8','16','32','64'],ans:2},
 learn:'GPU 采用 <span class="sv">SIMT</span>（单指令多线程）模型，一个 <span class="sv">Warp</span>（32 线程）执行相同指令。GPU 内存层次：寄存器 → <span class="sv">共享内存</span>（同 Block 线程共享）→ 全局内存。分支发散会导致 Warp 内线程串行化。'},
{name:'Amdahl 定律',icon:'📊',desc:'画布显示 Amdahl 定律的加速比曲线。<br>调节串行比例和核心数，观察加速比上限如何被串行部分锁死。',objs:['观察串行瓶颈','找到加速比上限','验证 Gustafson 定律'],
 quiz:{q:'程序有 25% 必须串行，无限核心的理论加速比上限是？',opts:['2x','4x','8x','无穷大'],ans:1},
 learn:'<span class="sv">Amdahl 定律</span>：加速比 = 1/(S + (1-S)/N)，S 为串行比例，N 为核心数。即使 N→∞，加速比上限为 1/S。<span class="sv">Gustafson 定律</span>换个角度：增加核心时可以处理更大的问题，加速比 = N - S×(N-1)。'},
{name:'异构计算',icon:'🤖',desc:'画布上有 CPU、GPU、NPU 三种处理器。<br>将不同类型的任务拖到最合适的处理器，优化整体吞吐量。',objs:['分配控制任务到 CPU','分配矩阵任务到 GPU','分配推理任务到 NPU'],
 quiz:{q:'异构计算的核心优势是？',opts:['只用 GPU 就够了','不同处理器擅长不同任务类型','减少处理器数量','不需要任务调度'],ans:1},
 learn:'<span class="sv">异构计算</span>让不同处理器各司其职：<span class="sv">CPU</span> 擅长复杂控制流和串行逻辑，<span class="sv">GPU</span> 擅长大规模数据并行（矩阵运算），<span class="sv">NPU</span> 专为神经网络推理优化。任务调度和负载均衡是异构系统的关键挑战。'}
];

let levelObjs=levels.map(l=>l.objs.map(()=>false));
let levelDone=levels.map(()=>false);
let quizAnswered=levels.map(()=>false);
let quizFeedback={};
let showLearn=levels.map(()=>false);

// === Level state ===
let L={};

function completeObj(i){
  if(!levelObjs[curLevel][i]){levelObjs[curLevel][i]=true;renderPanel()}
}
function allObjsDone(){return levelObjs[curLevel].every(v=>v)}

// === Start ===
function startGame(){
  document.getElementById('startScreen').classList.add('hidden');
  panel.style.display='block';
  gameStarted=true;
  resize();
  initLevel(0);
  renderPanel();
  loop();
}

function goLevel(i){
  if(i<0||i>=TOTAL||!isUnlocked(i))return;
  curLevel=i;
  initLevel(i);
  renderPanel();
}

function isUnlocked(i){return i===0||levelDone[i-1]}

// === initLevel ===
function initLevel(idx){
  time=0;
  L={};
  switch(idx){
    case 0:// Serial vs Parallel
      L.cores=1;L.tasks=[];L.taskCount=8;L.serialTime=0;L.parallelTime=0;L.running=false;L.done=false;L.phase=0;
      for(let i=0;i<L.taskCount;i++)L.tasks.push({id:i,cost:30+Math.random()*40|0,progress:0,core:-1,done:false,color:['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#22c55e','#06b6d4','#ef4444','#a855f7'][i]});
      L.serialTime=L.tasks.reduce((s,t)=>s+t.cost,0);
      break;
    case 1:// Threads & Processes
      L.threads=[];L.sharedMem=0;L.targetVal=100;L.raceTriggered=false;L.threadCount=1;L.showRace=false;L.increments=[];
      L.processA={mem:[10,20,30],name:'进程 A'};L.processB={mem:[40,50,60],name:'进程 B'};
      break;
    case 2:// Sync primitives
      L.counter=0;L.target=100;L.lockType='none';L.t1Val=0;L.t2Val=0;L.running=false;L.history=[];L.conflicts=0;L.spinWaste=0;L.semLimit=2;L.semCurrent=0;
      break;
    case 3:// Parallel patterns
      L.pattern='pipeline';L.pipeStages=4;L.pipeData=[];L.mrData=[];L.mrPhase='idle';L.pcBuffer=[];L.pcProduced=0;L.pcConsumed=0;L.pcMax=8;L.running=false;L.elapsed=0;
      break;
    case 4:// GPU
      L.cpuCores=4;L.gpuCores=32;L.warpSize=32;L.showWarp=false;L.sharedMemUsed=false;L.dataSize=256;L.cpuTime=0;L.gpuTime=0;L.running=false;L.phase=0;L.warpThreads=[];
      for(let i=0;i<32;i++)L.warpThreads.push({active:true,branch:i%4===0?'B':'A',progress:0});
      break;
    case 5:// Amdahl
      L.serialFrac=0.5;L.numCores=1;L.gustafson=false;L.problemScale=1;
      break;
    case 6:// Heterogeneous
      L.tasks=[
        {name:'控制逻辑',type:'control',icon:'⚙️',assigned:'',best:'cpu',time:{cpu:10,gpu:80,npu:60}},
        {name:'矩阵乘法',type:'matrix',icon:'🔢',assigned:'',best:'gpu',time:{cpu:100,gpu:5,npu:20}},
        {name:'AI 推理',type:'inference',icon:'🧠',assigned:'',best:'npu',time:{cpu:80,gpu:15,npu:3}},
        {name:'数据排序',type:'sort',icon:'📊',assigned:'',best:'cpu',time:{cpu:15,gpu:40,npu:50}},
        {name:'图像卷积',type:'conv',icon:'🖼️',assigned:'',best:'gpu',time:{cpu:90,gpu:4,npu:8}},
        {name:'决策树',type:'tree',icon:'🌳',assigned:'',best:'npu',time:{cpu:60,gpu:30,npu:5}}
      ];
      L.processors=['cpu','gpu','npu'];L.running=false;L.totalTime=0;L.optimalTime=0;
      L.optimalTime=Math.max(...L.tasks.map(tk=>tk.time[tk.best]));
      break;
  }
  barInfo.textContent=`${levels[idx].icon} ${idx+1}/${TOTAL} ${levels[idx].name}`;
}

// === Level actions ===
function runSerial(){
  if(L.running)return;L.running=true;L.done=false;L.phase=0;
  L.tasks.forEach(t=>{t.progress=0;t.done=false;t.core=-1});
  let idx=0,elapsed=0;
  function step(){
    if(idx>=L.tasks.length){L.done=true;L.running=false;L.parallelTime=elapsed;completeObj(0);renderPanel();return}
    L.tasks[idx].core=0;L.tasks[idx].progress+=2;elapsed++;
    if(L.tasks[idx].progress>=L.tasks[idx].cost){L.tasks[idx].done=true;L.tasks[idx].core=-1;idx++}
    requestAnimationFrame(step);
  }
  step();
}

function runParallel(){
  if(L.running)return;L.running=true;L.done=false;
  L.tasks.forEach(t=>{t.progress=0;t.done=false;t.core=-1});
  let queued=[...L.tasks],elapsed=0,coreWork=new Array(L.cores).fill(null);
  function step(){
    let allDone=L.tasks.every(t=>t.done);
    if(allDone){L.done=true;L.running=false;L.parallelTime=elapsed;
      if(L.cores>=2)completeObj(1);if(L.cores>=4)completeObj(2);renderPanel();return}
    elapsed++;
    for(let c=0;c<L.cores;c++){
      if(!coreWork[c]&&queued.length>0){coreWork[c]=queued.shift();coreWork[c].core=c}
      if(coreWork[c]){coreWork[c].progress+=2;if(coreWork[c].progress>=coreWork[c].cost){coreWork[c].done=true;coreWork[c].core=-1;coreWork[c]=null}}
    }
    requestAnimationFrame(step);
  }
  step();
}

function createThread(){
  if(L.threadCount>=4)return;
  L.threadCount++;
  L.threads.push({id:L.threadCount,localVal:0});
  completeObj(0);renderPanel();
}

function runSharedMem(){
  L.sharedMem=0;L.increments=[];
  let count=0,target=20;
  function step(){
    if(count>=target){completeObj(1);renderPanel();return}
    let tid=count%L.threadCount;
    L.sharedMem++;count++;
    L.increments.push({tid,val:L.sharedMem,time:count});
    if(L.increments.length>20)L.increments.shift();
    renderPanel();
    setTimeout(step,80);
  }
  step();
}

function triggerRace(){
  L.sharedMem=0;L.raceTriggered=true;L.showRace=true;L.increments=[];
  let ops=[];
  for(let i=0;i<20;i++)ops.push({tid:i%2,read:0,write:0});
  let val=0,idx=0;
  function step(){
    if(idx>=ops.length){completeObj(2);renderPanel();return}
    let op=ops[idx];
    if(Math.random()>0.5){op.read=val;op.write=op.read+1;val=op.write}
    else{let stale=val;op.read=stale;val++;op.write=stale+1;val=op.write}
    L.sharedMem=val;
    L.increments.push({tid:op.tid,val:val,expected:idx+1,actual:val,conflict:val!==idx+1});
    if(L.increments.length>20)L.increments.shift();
    idx++;renderPanel();
    setTimeout(step,100);
  }
  step();
}

function setLock(type){
  L.lockType=type;L.counter=0;L.t1Val=0;L.t2Val=0;L.history=[];L.conflicts=0;L.spinWaste=0;L.running=true;
  let ops=50,idx=0;
  function step(){
    if(idx>=ops){L.running=false;
      if(type==='mutex')completeObj(0);
      if(type==='semaphore')completeObj(1);
      if(type==='spinlock')completeObj(2);
      renderPanel();return}
    let tid=idx%2;
    if(type==='none'){
      let read=L.counter;if(Math.random()>0.3){L.counter=read+1}else{L.conflicts++;L.counter=read+1}
    }else if(type==='mutex'||type==='spinlock'){
      L.counter++;if(type==='spinlock')L.spinWaste+=Math.random()*2|0;
    }else if(type==='semaphore'){
      if(L.semCurrent<L.semLimit){L.semCurrent++;L.counter++;L.semCurrent--}
    }
    L.history.push({tid,val:L.counter,type});
    if(L.history.length>30)L.history.shift();
    if(tid===0)L.t1Val++;else L.t2Val++;
    idx++;renderPanel();
    setTimeout(step,40);
  }
  step();
}

function runPattern(pat){
  L.pattern=pat;L.running=true;L.elapsed=0;
  if(pat==='pipeline'){
    L.pipeData=[];
    for(let i=0;i<8;i++)L.pipeData.push({id:i,stage:-1,done:false,color:['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#22c55e','#06b6d4','#ef4444','#a855f7'][i]});
    let tick=0;
    function step(){
      tick++;L.elapsed=tick;
      for(let i=L.pipeData.length-1;i>=0;i--){
        let d=L.pipeData[i];
        if(d.done)continue;
        if(d.stage<0&&tick>i){d.stage=0;continue}
        if(d.stage>=0&&d.stage<L.pipeStages-1){let canAdv=!L.pipeData.some((o,j)=>j!==i&&o.stage===d.stage+1&&!o.done);if(canAdv)d.stage++}
        else if(d.stage>=L.pipeStages-1)d.done=true;
      }
      renderPanel();
      if(L.pipeData.every(d=>d.done)){L.running=false;completeObj(0);renderPanel();return}
      setTimeout(step,200);
    }
    step();
  }else if(pat==='mapreduce'){
    L.mrData=[];L.mrPhase='map';
    for(let i=0;i<8;i++)L.mrData.push({id:i,val:10+Math.random()*90|0,mapped:false,reduced:false});
    let tick=0;
    function step(){
      tick++;L.elapsed=tick;
      if(L.mrPhase==='map'){
        let next=L.mrData.find(d=>!d.mapped);
        if(next){next.mapped=true;next.mapResult=next.val*2}
        else L.mrPhase='reduce';
      }else if(L.mrPhase==='reduce'){
        let notReduced=L.mrData.filter(d=>!d.reduced);
        if(notReduced.length>1){notReduced[0].reduced=true;notReduced[1].reduced=true;
          L.mrData.push({id:L.mrData.length,val:notReduced[0].mapResult+notReduced[1].mapResult,mapped:true,reduced:false,mapResult:notReduced[0].mapResult+notReduced[1].mapResult,isMerge:true})}
        else{L.mrPhase='done';L.running=false;completeObj(1);renderPanel();return}
      }
      renderPanel();
      setTimeout(step,250);
    }
    step();
  }else if(pat==='producer-consumer'){
    L.pcBuffer=[];L.pcProduced=0;L.pcConsumed=0;L.running=true;
    let tick=0;
    function step(){
      tick++;L.elapsed=tick;
      if(tick%2===0&&L.pcBuffer.length<L.pcMax){L.pcProduced++;L.pcBuffer.push({id:L.pcProduced,color:'#3b82f6'})}
      if(tick%3===0&&L.pcBuffer.length>0){L.pcConsumed++;L.pcBuffer.shift()}
      renderPanel();
      if(L.pcConsumed>=12){L.running=false;completeObj(2);renderPanel();return}
      setTimeout(step,200);
    }
    step();
  }
}

function runGPUDemo(){
  L.running=true;L.cpuTime=0;L.gpuTime=0;
  let cpuOps=L.dataSize,gpuOps=L.dataSize,cpuDone=0,gpuDone=0;
  function step(){
    cpuDone+=L.cpuCores;gpuDone+=L.gpuCores;
    L.cpuTime++;if(gpuDone<gpuOps)L.gpuTime++;
    if(cpuDone>=cpuOps&&gpuDone>=gpuOps){
      L.running=false;completeObj(0);renderPanel();return}
    renderPanel();setTimeout(step,50);
  }
  step();
}

function showWarpDemo(){
  L.showWarp=true;L.phase=1;
  let tick=0;
  function step(){
    tick++;
    L.warpThreads.forEach(wt=>{
      if(wt.branch==='A')wt.progress=Math.min(100,wt.progress+5);
      else wt.progress=Math.min(100,wt.progress+(tick>10?5:0));
    });
    renderPanel();
    if(L.warpThreads.every(wt=>wt.progress>=100)){completeObj(1);renderPanel();return}
    setTimeout(step,60);
  }
  step();
}

function useSharedMem(){
  L.sharedMemUsed=true;completeObj(2);renderPanel();
}

function assignTask(taskIdx,proc){
  if(curLevel!==6)return;
  L.tasks[taskIdx].assigned=proc;
  let cpuDone=L.tasks.filter(t=>t.assigned==='cpu').length>0;
  let gpuDone=L.tasks.filter(t=>t.assigned==='gpu').length>0;
  let npuDone=L.tasks.filter(t=>t.assigned==='npu').length>0;
  if(cpuDone&&L.tasks.some(t=>t.assigned==='cpu'&&t.best==='cpu'))completeObj(0);
  if(gpuDone&&L.tasks.some(t=>t.assigned==='gpu'&&t.best==='gpu'))completeObj(1);
  if(npuDone&&L.tasks.some(t=>t.assigned==='npu'&&t.best==='npu'))completeObj(2);
  // calc total time
  let cpuT=0,gpuT=0,npuT=0;
  L.tasks.forEach(tk=>{
    if(tk.assigned==='cpu')cpuT+=tk.time.cpu;
    else if(tk.assigned==='gpu')gpuT+=tk.time.gpu;
    else if(tk.assigned==='npu')npuT+=tk.time.npu;
  });
  L.totalTime=Math.max(cpuT,gpuT,npuT);
  renderPanel();
}
function setInlineText(id,text){let el=document.getElementById(id);if(el)el.textContent=text}
function formatAmdahl(){
  let S=L.serialFrac,N=L.numCores;
  let amdahl=1/(S+(1-S)/N);
  let limit=1/S;
  let gustafsonS=N-S*(N-1);
  return {S,N,amdahl,limit,gustafsonS};
}
function dragCoreCount(el){
  L.cores=+el.value;
  setInlineText('coreCountVal',L.cores);
  drawLevel(curLevel);
}
function dragAmdahlSerial(el){
  L.serialFrac=+el.value/100;
  let f=formatAmdahl();
  setInlineText('serialFracVal',(f.S*100).toFixed(0)+'%');
  setInlineText('amdahlSpeedVal',f.amdahl.toFixed(2)+'x');
  setInlineText('amdahlLimitVal',f.limit.toFixed(2)+'x');
  setInlineText('gustafsonVal',f.gustafsonS.toFixed(2)+'x');
  drawLevel(curLevel);
}
function dragAmdahlCores(el){
  L.numCores=+el.value;

}

      h+=`<button class="act-btn" onclick="runGPUDemo()">▶ CPU vs GPU</button>`;
      h+=`<button class="act-btn" onclick="showWarpDemo()">🔀 Warp 演示</button>`;
      h+=`<button class="act-btn" onclick="useSharedMem()">💾 共享内存</button>`;
      h+=`</div>`;
      if(L.cpuTime>0){
        h+=`<div class="concept-box">CPU 耗时: <span style="color:#ef4444">${L.cpuTime}</span> | GPU 耗时: <span style="color:#22c55e">${L.gpuTime}</span><br>加速比: <span style="color:var(--sv);font-weight:700">${(L.cpuTime/Math.max(1,L.gpuTime)).toFixed(1)}x</span></div>`;
      }
      if(L.showWarp){
        h+=`<div class="hint-box">⚠️ 分支发散：Warp 内线程走不同分支时，必须串行执行两个分支路径</div>`;
      }
      if(L.sharedMemUsed){
        h+=`<div class="concept-box">内存层次：寄存器(~1ns) → <span style="color:#22c55e">共享内存(~5ns)</span> → 全局内存(~500ns)<br>同 Block 线程通过共享内存协作，避免全局内存瓶颈</div>`;
      }
      break;
    case 5:{
      let {S,N,amdahl,limit,gustafsonS}=formatAmdahl();
      h+=`<div class="slider-label"><span>串行比例 S</span><span id="serialFracVal" style="color:#ef4444;font-weight:600">${(S*100).toFixed(0)}%</span></div>`;
      h+=`<input type="range" min="1" max="90" value="${S*100|0}" oninput="dragAmdahlSerial(this)" onchange="this.blur();renderPanel()">`;
      h+=`<div class="slider-label"><span>核心数 N</span><span id="amdahlCoreVal" style="color:var(--sv);font-weight:600">${N}</span></div>`;
      h+=`<input type="range" min="1" max="64" value="${N}" oninput="dragAmdahlCores(this)" onchange="this.blur();renderPanel()">`;
      h+=`<div class="concept-box">`;
      h+=`Amdahl 加速比: <span id="amdahlSpeedVal" style="color:var(--sv);font-size:16px;font-weight:700">${amdahl.toFixed(2)}x</span><br>`;
      h+=`理论上限 (N→∞): <span id="amdahlLimitVal" style="color:#ef4444;font-weight:700">${limit.toFixed(2)}x</span><br>`;
      h+=`Gustafson 加速比: <span id="gustafsonVal" style="color:#22c55e;font-weight:700">${gustafsonS.toFixed(2)}x</span>`;
      h+=`</div>`;
      if(N>=2&&S>=0.1)completeObj(0);
      if(S>=0.2&&N>=16)completeObj(1);
      if(N>=32)completeObj(2);
      break;
    }
    case 6:
      L.tasks.forEach((tk,i)=>{
        h+=`<div style="display:flex;align-items:center;gap:6px;margin:4px 0;padding:6px;background:var(--concept-bg);border-radius:6px">`;
        h+=`<span style="font-size:16px">${tk.icon}</span>`;
        h+=`<span style="flex:1;font-size:12px;color:var(--text)">${tk.name}</span>`;
        ['cpu','gpu','npu'].forEach(p=>{
          let sel=tk.assigned===p;
          let best=tk.best===p;
          let color=sel?(best?'#22c55e':'#f59e0b'):'var(--text-sub)';
          h+=`<button onclick="assignTask(${i},'${p}')" style="padding:2px 8px;border-radius:4px;border:1px solid ${sel?color:'var(--panel-border)'};background:${sel?'var(--btn-bg)':'transparent'};color:${color};font-size:11px;cursor:pointer">${p.toUpperCase()}<br><span style="font-size:10px">${tk.time[p]}ms</span></button>`;
        });
        h+=`</div>`;
      });
      if(L.tasks.every(tk=>tk.assigned)){
        let allBest=L.tasks.every(tk=>tk.assigned===tk.best);
        h+=`<div class="concept-box">总耗时: <span style="color:${allBest?'#22c55e':'#f59e0b'};font-weight:700">${L.totalTime}ms</span>${allBest?' ✅ 最优分配!':' (尝试更优分配)'}</div>`;
      }
      break;
  }
  return h;
}

function answerQuiz(i){
  let q=levels[curLevel].quiz;
  let opts=document.querySelectorAll('.quiz-opt');
  opts.forEach((el,j)=>{
    if(j===q.ans)el.classList.add('correct');
    else if(j===i&&j!==q.ans)el.classList.add('wrong');
    el.style.pointerEvents='none';
  });
  let ok=i===q.ans;
  quizFeedback[curLevel]={ok,text:ok?'答对了。继续查看知识点并进入下一关。':'再想想：先完成目标，再确认这个并行概念的关键取舍。'};
  if(ok){quizAnswered[curLevel]=true;levelDone[curLevel]=true;showLearn[curLevel]=true;setTimeout(()=>renderPanel(),600)}
  else setTimeout(()=>renderPanel(),600);
}

function finishLevel(){
  levelDone[curLevel]=true;
  showLearn[curLevel]=true;
  if(curLevel<TOTAL-1){curLevel++;initLevel(curLevel)}
  renderPanel();
}

// === Drawing ===
let stars=[];for(let i=0;i<80;i++)stars.push({x:Math.random(),y:Math.random(),s:Math.random()*1.5+0.5,b:Math.random()});

function drawBg(){
  let th=t();
  let cw=cv.offsetWidth,ch=cv.offsetHeight;
  ctx.fillStyle=th.bg;ctx.fillRect(0,0,cw,ch);
  if(th.showStars){
    stars.forEach(s=>{
      let alpha=0.3+0.3*Math.sin(time*0.02+s.b*10);
      ctx.fillStyle=`rgba(255,255,255,${alpha})`;
      ctx.beginPath();ctx.arc(s.x*cw,s.y*ch,s.s,0,Math.PI*2);ctx.fill();
    });
  }
  // grid
  ctx.strokeStyle=th.grid;ctx.lineWidth=0.5;
  for(let x=0;x<cw;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,ch);ctx.stroke()}
  for(let y=0;y<ch;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cw,y);ctx.stroke()}
}

function drawLevel(idx){
  let th=t(),cw=cv.offsetWidth,ch=cv.offsetHeight,cx=cw/2,cy=ch/2;
  switch(idx){
    case 0: drawLevel0(th,cw,ch);break;
    case 1: drawLevel1(th,cw,ch);break;
    case 2: drawLevel2(th,cw,ch);break;
    case 3: drawLevel3(th,cw,ch);break;
    case 4: drawLevel4(th,cw,ch);break;
    case 5: drawLevel5(th,cw,ch);break;
    case 6: drawLevel6(th,cw,ch);break;
  }
}

function drawCore(x,y,w,h,active,label,th){
  ctx.fillStyle=active?th.coreActive:th.core;
  ctx.strokeStyle=active?'#22c55e':th.coreBorder;
  ctx.lineWidth=2;
  roundRect(x,y,w,h,6);ctx.fill();ctx.stroke();
  ctx.fillStyle=th.text;ctx.font='bold 11px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,x+w/2,y+h/2);
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawLevel0(th,cw,ch){
  let coreW=80,coreH=50,gap=20,startY=40;
  // draw cores
  for(let c=0;c<L.cores;c++){
    let x=cw/2-((L.cores*coreW+(L.cores-1)*gap)/2)+c*(coreW+gap);
    let active=L.tasks.some(t=>t.core===c&&!t.done);
    drawCore(x,startY,coreW,coreH,active,`核心 ${c}`,th);
  }
  // draw tasks
  let taskW=60,taskH=30,taskGap=8,taskStartY=startY+coreH+60;
  let rowW=L.taskCount*(taskW+taskGap);
  for(let i=0;i<L.taskCount;i++){
    let tk=L.tasks[i];
    let x=cw/2-rowW/2+i*(taskW+taskGap);
    let y=taskStartY;
    ctx.fillStyle=tk.done?th.taskDone:tk.core>=0?tk.color:'#444';
    roundRect(x,y,taskW,taskH,4);ctx.fill();
    // progress bar
    let prog=tk.progress/tk.cost;
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(x+2,y+taskH-6,taskW-4,4);
    ctx.fillStyle=tk.done?'#22c55e':'#60a5fa';ctx.fillRect(x+2,y+taskH-6,(taskW-4)*Math.min(1,prog),4);
    ctx.fillStyle='#fff';ctx.font='10px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(`T${i}`,x+taskW/2,y+taskH/2-2);
    // connection line to core
    if(tk.core>=0){
      let coreX=cw/2-((L.cores*coreW+(L.cores-1)*gap)/2)+tk.core*(coreW+gap)+coreW/2;
      ctx.strokeStyle=tk.color;ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(x+taskW/2,y);ctx.lineTo(coreX,startY+coreH);ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  // speedup chart
  if(L.done){
    let chartX=40,chartY=ch-160,chartW=cw-80,chartH=100;
    ctx.fillStyle='rgba(0,0,0,0.3)';roundRect(chartX,chartY,chartW,chartH,8);ctx.fill();
    ctx.fillStyle=th.text;ctx.font='bold 12px system-ui';ctx.textAlign='center';
    ctx.fillText('加速比可视化',chartX+chartW/2,chartY+16);
    let barW=chartW*0.35,barH=50;
    // serial bar
    ctx.fillStyle='#ef4444';ctx.fillRect(chartX+chartW*0.15,chartY+30,barW,barH/2);
    ctx.fillStyle='#fff';ctx.font='11px system-ui';ctx.textAlign='center';
    ctx.fillText(`串行: ${L.serialTime}`,chartX+chartW*0.15+barW/2,chartY+30+barH/4);
    // parallel bar
    let pRatio=L.parallelTime/L.serialTime;
    ctx.fillStyle='#22c55e';ctx.fillRect(chartX+chartW*0.55,chartY+30,barW*pRatio,barH/2);
    ctx.fillText(`并行: ${L.parallelTime}`,chartX+chartW*0.55+barW*pRatio/2,chartY+30+barH/4);
  }
}

function drawLevel1(th,cw,ch){
  let boxW=200,boxH=160,gap=40;
  // Process A
  let ax=cw/2-boxW-gap/2,ay=40;
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.fillStyle='rgba(59,130,246,0.1)';
  roundRect(ax,ay,boxW,boxH,8);ctx.fill();ctx.stroke();
  ctx.fillStyle='#3b82f6';ctx.font='bold 13px system-ui';ctx.textAlign='center';
  ctx.fillText(L.processA.name,ax+boxW/2,ay+20);
  ctx.font='11px system-ui';ctx.fillStyle=th.text;
  ctx.fillText('独立内存空间',ax+boxW/2,ay+45);
  L.processA.mem.forEach((v,i)=>{
    ctx.fillStyle='rgba(59,130,246,0.2)';ctx.fillRect(ax+20,ay+60+i*28,boxW-40,22);
    ctx.fillStyle=th.text;ctx.font='11px monospace';ctx.textAlign='left';
    ctx.fillText(`addr[${i}] = ${v}`,ax+30,ay+75+i*28);
  });
  // Process B
  let bx=cw/2+gap/2;
  ctx.strokeStyle='#8b5cf6';ctx.fillStyle='rgba(139,92,246,0.1)';
  roundRect(bx,ay,boxW,boxH,8);ctx.fill();ctx.stroke();
  ctx.fillStyle='#8b5cf6';ctx.font='bold 13px system-ui';ctx.textAlign='center';
  ctx.fillText(L.processB.name,bx+boxW/2,ay+20);
  ctx.font='11px system-ui';ctx.fillStyle=th.text;
  ctx.fillText('独立内存空间',bx+boxW/2,ay+45);
  L.processB.mem.forEach((v,i)=>{
    ctx.fillStyle='rgba(139,92,246,0.2)';ctx.fillRect(bx+20,ay+60+i*28,boxW-40,22);
    ctx.fillStyle=th.text;ctx.font='11px monospace';ctx.textAlign='left';
    ctx.fillText(`addr[${i}] = ${v}`,bx+30,ay+75+i*28);
  });
  // Shared memory area
  let sy=ay+boxH+40,sw=boxW*2+gap,sh=80;
  ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.fillStyle='rgba(245,158,11,0.1)';
  roundRect(ax,sy,sw,sh,8);ctx.fill();ctx.stroke();
  ctx.fillStyle='#f59e0b';ctx.font='bold 13px system-ui';ctx.textAlign='center';
  ctx.fillText('共享内存区域',ax+sw/2,sy+20);
  ctx.font='16px monospace';ctx.fillStyle=th.text;
  ctx.fillText(`shared_var = ${L.sharedMem}`,ax+sw/2,sy+50);
  // Threads
  let ty=sy+sh+30,tw=60,tgap=20;
  let totalW=L.threadCount*(tw+tgap);
  for(let i=0;i<L.threadCount;i++){
    let tx=cw/2-totalW/2+i*(tw+tgap);
    ctx.fillStyle=i===0?'rgba(59,130,246,0.3)':'rgba(139,92,246,0.3)';
    ctx.strokeStyle=i===0?'#3b82f6':'#8b5cf6';ctx.lineWidth=1.5;
    roundRect(tx,ty,tw,30,4);ctx.fill();ctx.stroke();
    ctx.fillStyle=th.text;ctx.font='11px system-ui';ctx.textAlign='center';
    ctx.fillText(`T${i}`,tx+tw/2,ty+18);
    // line to shared mem
    ctx.strokeStyle=i===0?'#3b82f6':'#8b5cf6';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(tx+tw/2,ty);ctx.lineTo(ax+sw/2,sy+sh);ctx.stroke();
    ctx.setLineDash([]);
  }
  if(L.showRace){
    ctx.fillStyle='#ef4444';ctx.font='bold 14px system-ui';ctx.textAlign='center';
    ctx.fillText('⚠️ 竞态条件！多线程同时修改共享变量',cw/2,ty+60);
  }
}

function drawLevel2(th,cw,ch){
  let cx=cw/2,cy=ch/2;
  // Critical section visualization
  let csW=200,csH=120;
  ctx.strokeStyle='#ef4444';ctx.lineWidth=2;ctx.fillStyle='rgba(239,68,68,0.08)';
  roundRect(cx-csW/2,60,csW,csH,8);ctx.fill();ctx.stroke();
  ctx.fillStyle='#ef4444';ctx.font='bold 12px system-ui';ctx.textAlign='center';
  ctx.fillText('临界区',cx,80);
  ctx.fillStyle=th.text;ctx.font='14px monospace';
  ctx.fillText(`counter = ${L.counter}`,cx,110);
  ctx.font='11px system-ui';ctx.fillStyle=th.textSec;
  ctx.fillText(`T1: ${L.t1Val} ops | T2: ${L.t2Val} ops`,cx,140);
  // Lock visualization
  let lockY=60+csH+30;
  if(L.lockType!=='none'){
    let lockColor=L.lockType==='mutex'?'#3b82f6':L.lockType==='semaphore'?'#22c55e':'#f59e0b';
    ctx.strokeStyle=lockColor;ctx.lineWidth=2;ctx.fillStyle=lockColor+'20';
    roundRect(cx-80,lockY,160,50,8);ctx.fill();ctx.stroke();
    ctx.fillStyle=lockColor;ctx.font='bold 12px system-ui';ctx.textAlign='center';
    let lockName=L.lockType==='mutex'?'🔒 Mutex':L.lockType==='semaphore'?'🚦 Semaphore':'🔄 Spinlock';
    ctx.fillText(lockName,cx,lockY+20);
    ctx.font='11px system-ui';ctx.fillStyle=th.text;
    if(L.lockType==='semaphore')ctx.fillText(`permits: ${L.semLimit}`,cx,lockY+38);
    else if(L.lockType==='spinlock')ctx.fillText(`spin waste: ${L.spinWaste}`,cx,lockY+38);
    else ctx.fillText('独占访问',cx,lockY+38);
  }
  // Thread bars
  let barY=lockY+80,barW=cw-80;
  ctx.fillStyle=th.text;ctx.font='bold 11px system-ui';ctx.textAlign='left';
  ctx.fillText('线程执行时间线',40,barY);
  if(L.history.length>0){
    let segW=barW/30;
    L.history.forEach((e,i)=>{
      let x=40+i*segW,y=barY+15+e.tid*25;
      ctx.fillStyle=e.tid===0?'#3b82f6':'#8b5cf6';
      ctx.fillRect(x,y,segW-1,18);
    });
    ctx.fillStyle='#3b82f6';ctx.font='10px system-ui';ctx.fillText('T0',20,barY+28);
    ctx.fillStyle='#8b5cf6';ctx.fillText('T1',20,barY+53);
  }
}

function drawLevel3(th,cw,ch){
  if(L.pattern==='pipeline'&&L.pipeData.length>0){
    let stageW=120,stageH=40,gap=30,startX=40,startY=50;
    // Stage labels
    let stageNames=['读取','解析','处理','输出'];
    for(let s=0;s<L.pipeStages;s++){
      let x=startX+s*(stageW+gap);
      ctx.fillStyle='rgba(59,130,246,0.15)';ctx.strokeStyle='#3b82f6';ctx.lineWidth=1;
      roundRect(x,startY,stageW,ch-120,6);ctx.fill();ctx.stroke();
      ctx.fillStyle='#3b82f6';ctx.font='bold 12px system-ui';ctx.textAlign='center';
      ctx.fillText(`阶段 ${s}: ${stageNames[s]}`,x+stageW/2,startY+20);
      if(s<L.pipeStages-1){ctx.fillStyle=th.textMut;ctx.font='16px system-ui';ctx.fillText('→',x+stageW+gap/2,startY+ch/2-60)}
    }
    // Data items in stages
    L.pipeData.forEach(d=>{
      if(d.stage<0||d.done)return;
      let x=startX+d.stage*(stageW+gap)+10;
      let y=startY+40+d.id*35;
      ctx.fillStyle=d.color;roundRect(x,y,stageW-20,28,4);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='11px system-ui';ctx.textAlign='center';
      ctx.fillText(`数据 ${d.id}`,x+(stageW-20)/2,y+17);
    });
    // Done items
    let doneCount=L.pipeData.filter(d=>d.done).length;
    if(doneCount>0){
      ctx.fillStyle='#22c55e';ctx.font='bold 13px system-ui';ctx.textAlign='center';
      ctx.fillText(`✅ 已完成: ${doneCount}/${L.pipeData.length}`,cw/2,ch-40);
    }
  }else if(L.pattern==='mapreduce'&&L.mrData.length>0){
    let cx=cw/2,mapY=60,reduceY=ch/2;
    ctx.fillStyle=th.text;ctx.font='bold 14px system-ui';ctx.textAlign='center';
    ctx.fillText('Map 阶段',cx,mapY);
    let origData=L.mrData.filter(d=>!d.isMerge);
    origData.forEach((d,i)=>{
      let x=40+i*(cw-80)/8;
      ctx.fillStyle=d.mapped?'#22c55e':'#3b82f6';
      roundRect(x,mapY+15,60,30,4);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='10px system-ui';ctx.textAlign='center';
      ctx.fillText(`${d.val}→${d.mapResult||'?'}`,x+30,mapY+33);
    });
    if(L.mrPhase==='reduce'||L.mrPhase==='done'){
      ctx.fillStyle=th.text;ctx.font='bold 14px system-ui';ctx.textAlign='center';
      ctx.fillText('Reduce 阶段',cx,reduceY);
      ctx.fillStyle='#f59e0b';ctx.font='12px system-ui';
      ctx.fillText('合并结果...',cx,reduceY+25);
    }
  }else if(L.pattern==='producer-consumer'){
    let bufX=cw/2-120,bufY=80,bufW=240,bufH=200;
    ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.fillStyle='rgba(59,130,246,0.05)';
    roundRect(bufX,bufY,bufW,bufH,8);ctx.fill();ctx.stroke();
    ctx.fillStyle='#3b82f6';ctx.font='bold 12px system-ui';ctx.textAlign='center';
    ctx.fillText(`缓冲队列 (${L.pcBuffer.length}/${L.pcMax})`,bufX+bufW/2,bufY+20);
    // Buffer items
    L.pcBuffer.forEach((item,i)=>{
      let x=bufX+15+i%4*55,y=bufY+35+Math.floor(i/4)*35;
      ctx.fillStyle='#3b82f6';roundRect(x,y,50,28,4);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='10px system-ui';ctx.textAlign='center';
      ctx.fillText(`#${item.id}`,x+25,y+17);
    });
    // Producer arrow
    ctx.fillStyle='#22c55e';ctx.font='bold 12px system-ui';ctx.textAlign='center';
    ctx.fillText(`📥 生产者 → (${L.pcProduced})`,bufX+bufW/2,bufY-15);
    // Consumer arrow
    ctx.fillText(`📤 消费者 ← (${L.pcConsumed})`,bufX+bufW/2,bufY+bufH+25);
  }
}

function drawLevel4(th,cw,ch){
  // CPU vs GPU architecture
  let cpuX=40,gpuX=cw/2+20,topY=40,boxH=ch-100;
  // CPU
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.fillStyle='rgba(59,130,246,0.05)';
  roundRect(cpuX,topY,cw/2-60,boxH,8);ctx.fill();ctx.stroke();
  ctx.fillStyle='#3b82f6';ctx.font='bold 14px system-ui';ctx.textAlign='center';
  ctx.fillText(`CPU (${L.cpuCores} 核心)`,cpuX+(cw/2-60)/2,topY+25);
  ctx.font='11px system-ui';ctx.fillStyle=th.textSec;
  ctx.fillText('少量强核心，复杂控制流',cpuX+(cw/2-60)/2,topY+45);
  for(let i=0;i<L.cpuCores;i++){
    let row=Math.floor(i/2),col=i%2;
    let x=cpuX+30+col*100,y=topY+65+row*55;
    drawCore(x,y,80,40,false,`Core ${i}`,th);
  }
  // GPU
  ctx.strokeStyle='#22c55e';ctx.fillStyle='rgba(34,197,94,0.05)';
  roundRect(gpuX,topY,cw/2-60,boxH,8);ctx.fill();ctx.stroke();
  ctx.fillStyle='#22c55e';ctx.font='bold 14px system-ui';ctx.textAlign='center';
  ctx.fillText(`GPU (${L.gpuCores} 核心)`,gpuX+(cw/2-60)/2,topY+25);
  ctx.font='11px system-ui';ctx.fillStyle=th.textSec;
  ctx.fillText('大量弱核心，数据并行',gpuX+(cw/2-60)/2,topY+45);
  let cols=8,coreSize=20,coreGap=4;
  for(let i=0;i<L.gpuCores;i++){
    let row=Math.floor(i/cols),col=i%cols;
    let x=gpuX+20+col*(coreSize+coreGap),y=topY+65+row*(coreSize+coreGap);
    ctx.fillStyle=L.showWarp&&L.warpThreads[i]?
      (L.warpThreads[i].progress>=100?'#22c55e':L.warpThreads[i].branch==='B'?'#ef4444':'#3b82f6'):'#1a3a2a';
    ctx.fillRect(x,y,coreSize,coreSize);
  }
  // Warp visualization
  if(L.showWarp){
    let wy=topY+boxH-80;
    ctx.fillStyle='#f59e0b';ctx.font='bold 12px system-ui';ctx.textAlign='center';
    ctx.fillText('Warp (32 线程) — 分支发散演示',cw/2,wy);
    ctx.font='10px system-ui';ctx.fillStyle=th.textSec;
    ctx.fillText('蓝色=分支A(先执行) | 红色=分支B(后执行)',cw/2,wy+18);
  }
}

function drawLevel5(th,cw,ch){
  let S=L.serialFrac,N=L.numCores;
  let chartX=40,chartY=40,chartW=cw-80,chartH=ch-100;
  // Axes
  ctx.strokeStyle=th.line;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(chartX,chartY);ctx.lineTo(chartX,chartY+chartH);ctx.lineTo(chartX+chartW,chartY+chartH);ctx.stroke();
  ctx.fillStyle=th.text;ctx.font='11px system-ui';ctx.textAlign='center';
  ctx.fillText('核心数 N',chartX+chartW/2,chartY+chartH+20);
  ctx.save();ctx.translate(chartX-25,chartY+chartH/2);ctx.rotate(-Math.PI/2);ctx.fillText('加速比',0,0);ctx.restore();
  // Amdahl curve
  let limit=1/S;
  let maxY=Math.min(limit*1.2,70);
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.beginPath();
  for(let n=1;n<=64;n++){
    let speedup=1/(S+(1-S)/n);
    let px=chartX+(n/64)*chartW;
    let py=chartY+chartH-(speedup/maxY)*chartH;
    if(n===1)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();
  // Limit line
  let limitY=chartY+chartH-(limit/maxY)*chartH;
  ctx.strokeStyle='#ef4444';ctx.lineWidth=1;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(chartX,limitY);ctx.lineTo(chartX+chartW,limitY);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#ef4444';ctx.font='11px system-ui';ctx.textAlign='right';
  ctx.fillText(`上限 = ${limit.toFixed(2)}x`,chartX+chartW,limitY-6);
  // Current point
  let curSpeedup=1/(S+(1-S)/N);
  let cpx=chartX+(N/64)*chartW;
  let cpy=chartY+chartH-(curSpeedup/maxY)*chartH;
  ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(cpx,cpy,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=th.text;ctx.font='bold 12px system-ui';ctx.textAlign='left';
  ctx.fillText(`${curSpeedup.toFixed(2)}x (N=${N})`,cpx+10,cpy-5);
  // Gustafson curve
  ctx.strokeStyle='#22c55e';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.beginPath();
  for(let n=1;n<=64;n++){
    let gs=n-S*(n-1);
    let px=chartX+(n/64)*chartW;
    let py=chartY+chartH-(gs/maxY)*chartH;
    if(py<chartY)py=chartY;
    if(n===1)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();ctx.setLineDash([]);
  // Legend
  let legY=chartY+20;
  ctx.fillStyle='#3b82f6';ctx.fillRect(chartX+chartW-180,legY,12,12);
  ctx.fillStyle=th.text;ctx.font='11px system-ui';ctx.textAlign='left';ctx.fillText('Amdahl',chartX+chartW-164,legY+10);
  ctx.fillStyle='#22c55e';ctx.fillRect(chartX+chartW-100,legY,12,12);
  ctx.fillStyle=th.text;ctx.fillText('Gustafson',chartX+chartW-84,legY+10);
  // Serial portion bar
  let barY=chartY+chartH+35,barH=16;
  ctx.fillStyle='#ef4444';ctx.fillRect(chartX,barY,chartW*S,barH);
  ctx.fillStyle='#22c55e';ctx.fillRect(chartX+chartW*S,barY,chartW*(1-S),barH);
  ctx.fillStyle='#fff';ctx.font='10px system-ui';ctx.textAlign='center';
  if(S>0.1)ctx.fillText(`串行 ${(S*100).toFixed(0)}%`,chartX+chartW*S/2,barY+12);
  if(1-S>0.1)ctx.fillText(`并行 ${((1-S)*100).toFixed(0)}%`,chartX+chartW*S+chartW*(1-S)/2,barY+12);
}

function drawLevel6(th,cw,ch){
  let procW=140,procH=ch-80,gap=30;
  let totalW=3*(procW+gap)-gap;
  let startX=(cw-totalW)/2;
  let procs=[
    {name:'CPU',color:'#3b82f6',desc:'控制流 & 串行'},
    {name:'GPU',color:'#22c55e',desc:'数据并行'},
    {name:'NPU',color:'#a855f7',desc:'AI 推理'}
  ];
  procs.forEach((p,i)=>{
    let x=startX+i*(procW+gap),y=40;
    ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.fillStyle=p.color+'15';
    roundRect(x,y,procW,procH,8);ctx.fill();ctx.stroke();
    ctx.fillStyle=p.color;ctx.font='bold 14px system-ui';ctx.textAlign='center';
    ctx.fillText(p.name,x+procW/2,y+25);
    ctx.font='11px system-ui';ctx.fillStyle=th.textSec;
    ctx.fillText(p.desc,x+procW/2,y+45);
    // Tasks assigned to this processor
    let assigned=L.tasks.filter(tk=>tk.assigned===p.name.toLowerCase());
    assigned.forEach((tk,j)=>{
      let ty=y+65+j*45;
      let best=tk.best===p.name.toLowerCase();
      ctx.fillStyle=best?p.color+'40':'#f59e0b30';
      ctx.strokeStyle=best?p.color:'#f59e0b';ctx.lineWidth=1;
      roundRect(x+10,ty,procW-20,35,4);ctx.fill();ctx.stroke();
      ctx.fillStyle=th.text;ctx.font='12px system-ui';ctx.textAlign='center';
      ctx.fillText(`${tk.icon} ${tk.name}`,x+procW/2,ty+15);
      ctx.font='10px system-ui';ctx.fillStyle=best?'#22c55e':'#f59e0b';
      ctx.fillText(`${tk.time[p.name.toLowerCase()]}ms${best?' ✓':''}`,x+procW/2,ty+28);
    });
  });
}

// === Animation loop ===
function loop(){
  if(!gameStarted)return;
  time++;
  let cw=cv.offsetWidth,ch=cv.offsetHeight;
  ctx.save();
  ctx.clearRect(0,0,cw,ch);
  drawBg();
  drawLevel(curLevel);
  ctx.restore();
  animId=requestAnimationFrame(loop);
}

// === Click handler ===
cv.addEventListener('click',function(e){
  let rect=cv.getBoundingClientRect();
  let x=(e.clientX-rect.left),y=(e.clientY-rect.top);
  handleClick(x,y);
});

function handleClick(x,y){
  // Level-specific click handling can be added here
}

// === Init ===
resize();
</script>
