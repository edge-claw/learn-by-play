<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生态系统探险 — 边玩边学</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;--slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --sel-bg:#1a1a4a;--sel-border:#444;--sel-text:#aaa;--sel-active-bg:#1a1a4a;--sel-active-border:#3b82f6;--sel-active-text:#60a5fa;
  --sel-correct-bg:#0a2a1a;--sel-correct-border:#22c55e;--sel-correct-text:#4ade80;
  --sel-wrong-bg:#2a0a0a;--sel-wrong-border:#ef4444;--sel-wrong-text:#f87171;
}
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);--slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --sel-bg:#eef2ff;--sel-border:#c7d2fe;--sel-text:#64748b;--sel-active-bg:#e0e7ff;--sel-active-border:#6366f1;--sel-active-text:#4338ca;
  --sel-correct-bg:#ecfdf5;--sel-correct-border:#6ee7b7;--sel-correct-text:#059669;
  --sel-wrong-bg:#fef2f2;--sel-wrong-border:#fca5a5;--sel-wrong-text:#dc2626;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;overflow:hidden;height:100vh}
canvas{position:absolute;top:0;left:320px;width:calc(100vw - 320px);height:calc(100vh - 36px)}
.panel{position:absolute;top:0;left:0;width:320px;height:calc(100vh - 36px);background:var(--panel-bg);border-right:1px solid var(--panel-border);overflow-y:auto;z-index:10;padding:12px;display:none;padding-bottom:24px}
.panel h2{font-size:15px;color:var(--title-color);margin:8px 0 4px;font-weight:bold}
.concept-box{background:var(--concept-bg);border:1px solid var(--concept-border);border-radius:8px;padding:10px;margin:8px 0;font-size:13px;line-height:1.7;color:var(--concept-text)}
.act-btn{display:block;width:100%;padding:10px;margin:4px 0;border-radius:8px;border:1px solid var(--btn-border);background:var(--btn-bg);color:var(--btn-text);font-size:14px;cursor:pointer;text-align:center}
.act-btn:hover{background:var(--btn-hover)}.act-btn:disabled{opacity:.4;cursor:not-allowed}
.act-btn.green{border-color:var(--btn-green-border);background:var(--btn-green-bg);color:var(--btn-green-text)}
.hint-box{background:var(--hint-bg);border:1px solid var(--hint-border);border-radius:8px;padding:8px;margin:8px 0;font-size:12px;color:var(--hint-text)}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:10px;padding:12px;margin:10px 0;font-size:13px;line-height:1.8;color:var(--learn-text)}
.sv{color:var(--sv);font-weight:bold}.desc{font-size:13px;color:var(--text-sub);line-height:1.6;margin:6px 0}
.slider-wrap{margin:8px 0}.slider-wrap label{font-size:11px;color:var(--slider-label);display:block;margin-bottom:4px}
.slider-wrap input[type=range]{width:100%;accent-color:#3b82f6}.slider-val{font-size:13px;color:var(--sv);font-weight:bold}
.sel-row{display:flex;gap:4px;margin:4px 0;flex-wrap:wrap}
.sel-btn{padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer;border:1px solid var(--sel-border);background:var(--sel-bg);color:var(--sel-text)}
.sel-btn.active{border-color:var(--sel-active-border);background:var(--sel-active-bg);color:var(--sel-active-text)}
.sel-btn.correct{border-color:var(--sel-correct-border);background:var(--sel-correct-bg);color:var(--sel-correct-text)}
.sel-btn.wrong{border-color:var(--sel-wrong-border);background:var(--sel-wrong-bg);color:var(--sel-wrong-text)}
.goal-item{font-size:12px;color:var(--goal-text);margin:2px 0}.goal-item.done{color:var(--goal-done);text-decoration:line-through}
#infobar{position:absolute;bottom:0;left:0;width:100%;height:36px;background:var(--bar-bg);border-top:1px solid var(--bar-border);display:flex;align-items:center;padding:0 16px 0 332px;font-size:12px;color:#666;z-index:10}
#infobar .sep{margin:0 12px;color:#333}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:var(--overlay-bg);display:flex;align-items:center;justify-content:center;z-index:50}
.overlay.hidden{display:none}
.start-box{text-align:center;max-width:560px}
.start-box h1{font-size:38px;margin-bottom:6px;letter-spacing:2px}
.start-box h1 .hl{color:#22c55e}
.start-box .sub{font-size:17px;color:var(--sub-color);margin-bottom:28px}
.start-btn{background:linear-gradient(135deg,#22c55e,#4ade80);color:#fff;border:none;padding:14px 52px;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;transition:transform .2s}
.start-btn:hover{transform:scale(1.05)}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:#aaa;font-size:12px;width:80px}
.feat .fi{font-size:26px;margin-bottom:4px}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}.sn-d.cur{background:#6366f1;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.quiz-box{background:var(--concept-bg);border:1px solid var(--btn-green-border);border-radius:8px;padding:10px;margin:10px 0}
.quiz-title{font-size:13px;font-weight:700;color:var(--btn-green-text);margin-bottom:6px}
.quiz-q{font-size:13px;color:var(--goal-text);line-height:1.6;margin-bottom:8px}
.quiz-opt{display:block;width:100%;padding:8px 10px;margin:5px 0;border:1px solid var(--sel-border);border-radius:6px;background:var(--sel-bg);color:var(--sel-text);font-size:13px;text-align:left;cursor:pointer}
.quiz-opt:hover{border-color:var(--sel-active-border);color:var(--sel-active-text)}
.quiz-feedback{font-size:12px;line-height:1.6;margin-top:7px;padding:7px;border-radius:6px}
.quiz-feedback.ok{background:var(--sel-correct-bg);color:var(--sel-correct-text)}
.quiz-feedback.bad{background:var(--sel-wrong-bg);color:var(--sel-wrong-text)}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
.desc-hl{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:6px;padding:6px 8px;margin:4px 0}
.species-btn{display:inline-block;padding:4px 8px;margin:2px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--sel-border);background:var(--sel-bg);color:var(--sel-text);transition:all .2s}
.species-btn:hover{border-color:var(--sel-active-border)}
.species-btn.present{border-color:#22c55e;background:var(--sel-correct-bg);color:var(--sel-correct-text)}
.species-btn.extinct{border-color:#ef4444;background:var(--sel-wrong-bg);color:var(--sel-wrong-text);text-decoration:line-through}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="panel" id="panel"></div>
<canvas id="cv"></canvas>
<div id="infobar"><span id="ib-level">关卡 1/7</span><span class="sep">|</span><span id="ib-title">食物链</span><span class="sep">|</span><span id="ib-status">进行中</span></div>
<div class="overlay" id="startScreen">
<div class="start-box">
  <h1>🌿 <span class="hl">生态系统</span>探险</h1>
  <div class="sub">7 个关卡，探索生命之间的奇妙联系</div>
  <button class="start-btn" onclick="startGame()">开始探索</button>
  <div class="features">
    <div class="feat"><div class="fi">🔗</div>食物链</div>
    <div class="feat"><div class="fi">🔺</div>能量金字塔</div>
    <div class="feat"><div class="fi">♻️</div>碳循环</div>
    <div class="feat"><div class="fi">⚗️</div>氮循环</div>
    <div class="feat"><div class="fi">📈</div>种群增长</div>
    <div class="feat"><div class="fi">🦋</div>生物多样性</div>
    <div class="feat"><div class="fi">⚖️</div>生态平衡</div>
  </div>
</div>
</div>
<script>
let isDark=true;
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';renderPanel()}
function t(){return isDark?{bg:'#0a0a2e',grid:'rgba(99,102,241,0.06)',text:'#fff',sub:'rgba(255,255,255,0.6)'}:{bg:'#e8edf5',grid:'rgba(99,102,241,0.04)',text:'#1e293b',sub:'rgba(30,41,59,0.6)'}}
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let CW,CH;function resize(){const r=cv.getBoundingClientRect();CW=cv.width=r.width;CH=cv.height=r.height}
resize();window.addEventListener('resize',()=>{resize();draw()});
let audioCtx;function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(tp){initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);if(tp==='ok'){o.frequency.value=523;g.gain.value=0.12;o.start();o.frequency.setValueAtTime(659,audioCtx.currentTime+0.1);o.frequency.setValueAtTime(784,audioCtx.currentTime+0.2);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);o.stop(audioCtx.currentTime+0.4)}else if(tp==='no'){o.frequency.value=300;g.gain.value=0.12;o.start();o.frequency.setValueAtTime(200,audioCtx.currentTime+0.15);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);o.stop(audioCtx.currentTime+0.3)}else{o.frequency.value=800;g.gain.value=0.08;o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);o.stop(audioCtx.currentTime+0.1)}}

const LEVELS=[{name:'食物链与食物网',icon:'🔗'},{name:'能量金字塔',icon:'🔺'},{name:'碳循环',icon:'♻️'},{name:'氮循环',icon:'⚗️'},{name:'种群增长',icon:'📈'},{name:'生物多样性',icon:'🦋'},{name:'生态平衡',icon:'⚖️'}];
const QUIZ=[
  {q:'食物网比单条食物链更稳定，主要原因是什么？',opts:['能量路径更多，某个物种波动时还有替代联系','所有物种都只吃一种食物','顶级捕食者越多越稳定','生产者不参与食物网'],ans:0},
  {q:'为什么顶级捕食者通常数量很少？',opts:['每级营养级只传递约10%能量','它们不需要能量','生产者会直接变成捕食者','能量会在高营养级增加'],ans:0},
  {q:'化石燃料燃烧会怎样影响碳循环？',opts:['把地质封存的碳快速释放到大气','永久移除大气CO₂','让光合作用停止','只增加海洋盐度'],ans:0},
  {q:'过量施肥导致水体富营养化，关键原因是什么？',opts:['氮随径流进入水体，促进藻类过度生长','氮会让水温瞬间降低','反硝化完全停止空气流动','植物不能吸收任何氮'],ans:0},
  {q:'逻辑斯蒂增长模型中的 K 表示什么？',opts:['环境容纳量','种群初始值','捕食者数量','随机死亡率'],ans:0},
  {q:'移除关键物种可能造成级联效应，是因为？',opts:['依赖它的物种会失去食物或生态功能','所有物种互不相关','灭绝只影响单个个体','多样性越低越稳定'],ans:0},
  {q:'生态系统从崩溃恢复到稳定，通常需要什么组合？',opts:['降低压力并增加保护力度','继续过度捕猎','减少栖息地面积','放任入侵物种扩张'],ans:0}
];
let cur=0,gameState='title',S={},done=new Array(7).fill(false);
let quizPassed=new Set(),quizFeedback={};

/* Species database */
const SPECIES={
  grass:{name:'草',icon:'🌿',level:0,color:'#22c55e',energy:10000},
  tree:{name:'树',icon:'🌳',level:0,color:'#15803d',energy:15000},
  rabbit:{name:'兔',icon:'🐰',level:1,color:'#f59e0b',energy:1000},
  deer:{name:'鹿',icon:'🦌',level:1,color:'#d97706',energy:1200},
  mouse:{name:'鼠',icon:'🐭',level:1,color:'#a3a3a3',energy:500},
  snake:{name:'蛇',icon:'🐍',level:2,color:'#7c3aed',energy:100},
  fox:{name:'狐',icon:'🦊',level:2,color:'#ea580c',energy:120},
  hawk:{name:'鹰',icon:'🦅',level:2,color:'#6366f1',energy:80},
  wolf:{name:'狼',icon:'🐺',level:3,color:'#dc2626',energy:15},
  lion:{name:'狮',icon:'🦁',level:3,color:'#b45309',energy:10}
};
const FOOD_WEB={grass:['rabbit','deer','mouse'],tree:['deer'],rabbit:['fox','hawk','wolf'],deer:['wolf','lion'],mouse:['snake','hawk','fox'],snake:['hawk'],fox:['wolf'],hawk:[],wolf:[],lion:[]};

function initLevel(i){
  S={phase:0,obj:[false,false,false],anim:0};
  switch(i){
    case 0:S.chain=[];S.webSpecies=new Set(['grass','tree']);S.showWeb=false;S.chainBuilt=false;S.webComplete=false;break;
    case 1:S.producers=10000;S.primary=1000;S.secondary=100;S.tertiary=10;S.transferRate=10;S.showRule=false;break;
    case 2:S.atmosphere=400;S.ocean=200;S.biomass=100;S.fossil=500;S.photosynthesis=50;S.respiration=30;S.burning=0;break;
    case 3:S.atmosN=78;S.soilN=20;S.plantN=10;S.fixation=5;S.denitrify=3;S.fertilizer=0;S.runoff=0;break;
    case 4:S.pop=10;S.K=500;S.r=0.1;S.time=0;S.history=[];S.running=false;S.overshoot=false;break;
    case 5:S.species=new Set(['grass','tree','rabbit','deer','mouse','snake','fox','hawk','wolf','lion']);S.removed=new Set();S.biodiversity=100;S.cascadeMsg='';break;
    case 6:S.hunting=0;S.habitat=100;S.invasive=0;S.conservation=0;S.balance=50;S.ecosystem='stable';break;
  }
}
function renderStageNav(){
  let h='<div class="stage-nav"><div class="sn-bar">';
  LEVELS.forEach((_,i)=>{
    const unlocked=i===0||quizPassed.has(i-1);
    const c=quizPassed.has(i)?'done':i===cur?'cur':unlocked?'':'locked';
    h+=`<div class="sn-d ${c}" onclick="${unlocked?`goLevel(${i})`:''}"></div>`;
  });
  h+=`</div><div class="sn-info">第 ${cur+1}/7 关 — ${LEVELS[cur].name}</div><div class="sn-hint">${quizPassed.size}/7 已通关，完成目标后答对测验才解锁下一关</div></div>`;return h;
}
function renderQuiz(){
  const q=QUIZ[cur],fb=quizFeedback[cur];
  let h=`<div class="quiz-box"><div class="quiz-title">通关小测验</div><div class="quiz-q">${q.q}</div>`;
  q.opts.forEach((opt,i)=>{h+=`<button class="quiz-opt" onclick="checkQuiz(${cur},${i})">${opt}</button>`});
  if(fb)h+=`<div class="quiz-feedback ${fb.ok?'ok':'bad'}">${fb.text}</div>`;
  h+='</div>';
  return h;
}
let _panelBusy=false;
function renderPanel(){
  if(_panelBusy)return;_panelBusy=true;
  const p=document.getElementById('panel');let h=renderStageNav();
  h+=`<h2>${LEVELS[cur].icon} ${LEVELS[cur].name}</h2>`;
  h+=renderLevelPanel(cur);
  if(done[cur]&&!quizPassed.has(cur))h+=renderQuiz();
  if(quizPassed.has(cur)&&cur<6)h+=`<button class="act-btn green" onclick="goLevel(${cur+1})">下一关 →</button>`;
  if(quizPassed.size===7){
    h+=`<div class="summary-box"><div class="summary-title">🎉 全部通关！</div><div class="summary-sub">你已掌握生态系统的核心知识</div>`;
    h+=`<div class="summary-keys"><div>🔗 食物链连接生产者→消费者→顶级捕食者</div><div>🔺 每级营养级只传递约10%的能量</div><div>♻️ 碳在大气、海洋、生物和化石燃料间循环</div><div>⚗️ 氮循环依赖固氮菌和反硝化细菌</div><div>📈 种群增长受环境容纳量K限制</div><div>🦋 物种消失会引发级联效应</div><div>⚖️ 生态平衡需要人类主动保护</div></div></div>`;
  }
  p.innerHTML=h;_panelBusy=false;
}
function sliderDrag(){updateSliderLabels();checkObj();draw()}
function updateSliderLabels(){
  switch(cur){
    case 1:{
      const ts=document.getElementById('sl-transfer');
      if(ts){S.transferRate=+ts.value;document.getElementById('vl-transfer').textContent=S.transferRate+'%'}
      S.primary=S.producers*S.transferRate/100;S.secondary=S.primary*S.transferRate/100;S.tertiary=S.secondary*S.transferRate/100;
    }break;
    case 2:{
      const ps=document.getElementById('sl-photo'),rs=document.getElementById('sl-resp'),bs=document.getElementById('sl-burn');
      if(ps){S.photosynthesis=+ps.value;document.getElementById('vl-photo').textContent=S.photosynthesis}
      if(rs){S.respiration=+rs.value;document.getElementById('vl-resp').textContent=S.respiration}

function checkQuiz(levelIdx,picked){

function checkObj(){

function drawFoodWeb(c){
  const levelY=[CH*0.8,CH*0.55,CH*0.35,CH*0.15];
  const levelNames=['生产者','初级消费者','次级消费者','顶级捕食者'];
  // level labels
  ctx.font='11px system-ui';ctx.fillStyle=c.sub;ctx.textAlign='left';
  levelNames.forEach((n,i)=>{ctx.fillText(n,10,levelY[i]+5)});
  // draw species nodes
  const positions={};
  const byLevel=[[],[],[],[]];
  const activeSpecies=S.showWeb?S.webSpecies:new Set(S.chain);
  Object.entries(SPECIES).forEach(([k,v])=>{byLevel[v.level].push(k)});
  byLevel.forEach((lvl,li)=>{
    const count=lvl.length;lvl.forEach((sp,si)=>{
      const x=CW*0.15+si*(CW*0.7/(Math.max(1,count-1)||1));const y=levelY[li];
      positions[sp]={x,y};
      const active=activeSpecies.has(sp);
      ctx.beginPath();ctx.arc(x,y,active?22:16,0,Math.PI*2);
      ctx.fillStyle=active?SPECIES[sp].color+'44':'rgba(100,100,100,0.2)';ctx.fill();
      ctx.strokeStyle=active?SPECIES[sp].color:'#444';ctx.lineWidth=active?2:1;ctx.stroke();
      ctx.font=`${active?20:14}px system-ui`;ctx.textAlign='center';ctx.fillStyle=c.text;
      ctx.fillText(SPECIES[sp].icon,x,y+6);
      ctx.font='10px system-ui';ctx.fillStyle=active?SPECIES[sp].color:c.sub;ctx.fillText(SPECIES[sp].name,x,y+22);
    });
  });
  // draw connections
  if(S.chain.length>1){
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=3;ctx.setLineDash([]);
    for(let i=0;i<S.chain.length-1;i++){
      const a=positions[S.chain[i]],b=positions[S.chain[i+1]];
      if(a&&b){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
        // arrow
        const angle=Math.atan2(b.y-a.y,b.x-a.x);const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
        ctx.beginPath();ctx.moveTo(mx+Math.cos(angle)*8,my+Math.sin(angle)*8);ctx.lineTo(mx+Math.cos(angle+2.5)*8,my+Math.sin(angle+2.5)*8);ctx.lineTo(mx+Math.cos(angle-2.5)*8,my+Math.sin(angle-2.5)*8);ctx.fill();
      }
    }
  }
  // food web connections
  if(S.webSpecies.size>1){
    ctx.strokeStyle='rgba(99,102,241,0.3)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    S.webSpecies.forEach(sp=>{
      if(FOOD_WEB[sp]){FOOD_WEB[sp].forEach(pred=>{
        if(S.webSpecies.has(pred)&&positions[sp]&&positions[pred]){ctx.beginPath();ctx.moveTo(positions[sp].x,positions[sp].y);ctx.lineTo(positions[pred].x,positions[pred].y);ctx.stroke()}
      })}
    });ctx.setLineDash([]);
  }
}
function drawEnergyPyramid(c){
  const cx=CW/2,baseY=CH*0.8,topY=CH*0.1;
  const levels=[{name:'生产者',val:S.producers,color:'#22c55e',icon:'🌿'},{name:'初级消费者',val:S.primary,color:'#f59e0b',icon:'🐰'},{name:'次级消费者',val:S.secondary,color:'#7c3aed',icon:'🦊'},{name:'顶级捕食者',val:S.tertiary,color:'#dc2626',icon:'🐺'}];
  const totalH=baseY-topY;const layerH=totalH/4;
  levels.forEach((lv,i)=>{
    const y=baseY-i*layerH;const w=CW*0.7*(1-i*0.2);
    ctx.fillStyle=lv.color+'88';ctx.beginPath();
    ctx.moveTo(cx-w/2,y);ctx.lineTo(cx+w/2,y);ctx.lineTo(cx+w/2*(1-0.2),y-layerH);ctx.lineTo(cx-w/2*(1-0.2),y-layerH);ctx.closePath();ctx.fill();
    ctx.strokeStyle=lv.color;ctx.lineWidth=2;ctx.stroke();
    ctx.font='14px system-ui';ctx.fillStyle=c.text;ctx.textAlign='center';
    ctx.fillText(`${lv.icon} ${lv.name}: ${lv.val.toFixed(lv.val<1?2:0)} kcal`,cx,y-layerH/2+5);
  });
  // transfer arrows
  ctx.font='12px system-ui';ctx.fillStyle='#f59e0b';
  for(let i=0;i<3;i++){
    const y=baseY-(i+0.5)*layerH;
    ctx.fillText(`↑ ${S.transferRate}%`,cx+CW*0.3,y);
    ctx.fillStyle='#ef4444';ctx.fillText(`→ ${100-S.transferRate}% 散失`,cx+CW*0.3,y+16);ctx.fillStyle='#f59e0b';
  }
}
function drawCarbonCycle(c){
  const pools=[
    {name:'大气 CO₂',val:S.atmosphere,x:CW*0.5,y:CH*0.12,r:50,color:'#94a3b8',unit:'ppm'},
    {name:'生物量',val:S.biomass,x:CW*0.25,y:CH*0.55,r:40,color:'#22c55e',unit:''},
    {name:'海洋',val:S.ocean,x:CW*0.75,y:CH*0.55,r:45,color:'#3b82f6',unit:''},
    {name:'化石燃料',val:S.fossil,x:CW*0.5,y:CH*0.85,r:35,color:'#78716c',unit:''}
  ];
  // draw pools
  pools.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    g.addColorStop(0,p.color+'66');g.addColorStop(1,p.color+'22');ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.stroke();
    ctx.font='13px system-ui';ctx.fillStyle=c.text;ctx.textAlign='center';
    ctx.fillText(p.name,p.x,p.y-5);ctx.font='11px system-ui';ctx.fillStyle=p.color;
    ctx.fillText(p.val.toFixed(0)+(p.unit?' '+p.unit:''),p.x,p.y+12);
  });
  // arrows: photosynthesis (atmo→bio), respiration (bio→atmo), burning (fossil→atmo)
  function drawArrow(x1,y1,x2,y2,color,label,val){
    ctx.strokeStyle=color;ctx.lineWidth=1+val/30;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    const mx=(x1+x2)/2,my=(y1+y2)/2;ctx.font='10px system-ui';ctx.fillStyle=color;ctx.textAlign='center';ctx.fillText(label,mx+15,my);
  }
  drawArrow(CW*0.5,CH*0.17,CW*0.25,CH*0.5,'#22c55e','光合',S.photosynthesis);
  drawArrow(CW*0.25,CH*0.5,CW*0.5,CH*0.17,'#f59e0b','呼吸',S.respiration);
  drawArrow(CW*0.5,CH*0.82,CW*0.5,CH*0.17,'#ef4444','燃烧',S.burning);
  drawArrow(CW*0.55,CH*0.15,CW*0.75,CH*0.5,'#3b82f6','溶解',10);
  // CO2 warning
  if(S.atmosphere>500){ctx.font='16px system-ui';ctx.fillStyle='#ef4444';ctx.textAlign='center';ctx.fillText('⚠️ CO₂ 浓度过高！',CW*0.5,CH*0.35)}
}
function drawNitrogenCycle(c){
  const pools=[
    {name:'大气 N₂ (78%)',x:CW*0.5,y:CH*0.1,r:45,color:'#6366f1'},
    {name:'土壤氮',x:CW*0.3,y:CH*0.5,r:40,color:'#a16207',val:S.soilN},
    {name:'植物氮',x:CW*0.7,y:CH*0.5,r:35,color:'#22c55e',val:S.plantN},
    {name:'水体',x:CW*0.5,y:CH*0.85,r:30,color:'#3b82f6',val:S.runoff}
  ];
  pools.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color+'33';ctx.fill();ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.stroke();
    ctx.font='12px system-ui';ctx.fillStyle=c.text;ctx.textAlign='center';ctx.fillText(p.name,p.x,p.y-5);
    if(p.val!==undefined){ctx.font='11px system-ui';ctx.fillStyle=p.color;ctx.fillText(p.val.toFixed(0),p.x,p.y+12)}
  });
  // process arrows
  function arrow(x1,y1,x2,y2,col,lbl){ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.font='10px system-ui';ctx.fillStyle=col;ctx.textAlign='center';ctx.fillText(lbl,(x1+x2)/2-20,(y1+y2)/2)}
  arrow(CW*0.45,CH*0.15,CW*0.3,CH*0.45,'#a16207',`固氮 ${S.fixation}`);
  arrow(CW*0.3,CH*0.45,CW*0.45,CH*0.15,'#6366f1',`反硝化 ${S.denitrify}`);
  arrow(CW*0.35,CH*0.5,CW*0.65,CH*0.5,'#22c55e','吸收');
  arrow(CW*0.35,CH*0.55,CW*0.5,CH*0.82,'#3b82f6',`流失 ${S.runoff.toFixed(0)}`);
  // fertilizer
  if(S.fertilizer>0){ctx.font='12px system-ui';ctx.fillStyle='#f59e0b';ctx.textAlign='center';ctx.fillText(`🧪 化肥 +${S.fertilizer}`,CW*0.15,CH*0.4)}
  if(S.runoff>20){ctx.font='14px system-ui';ctx.fillStyle='#ef4444';ctx.textAlign='center';ctx.fillText('⚠️ 富营养化风险！',CW*0.5,CH*0.75)}
}
function drawPopulation(c){
  const padL=60,padR=30,padT=40,padB=50;
  const gw=CW-padL-padR,gh=CH-padT-padB;
  // axes
  ctx.strokeStyle=c.sub;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(padL,padT);ctx.lineTo(padL,padT+gh);ctx.lineTo(padL+gw,padT+gh);ctx.stroke();
  // K line
  const maxPop=Math.max(S.K*1.3,S.pop*1.1,100);
  const ky=padT+gh-(S.K/maxPop)*gh;
  ctx.setLineDash([5,5]);ctx.strokeStyle='#ef4444';ctx.beginPath();ctx.moveTo(padL,ky);ctx.lineTo(padL+gw,ky);ctx.stroke();ctx.setLineDash([]);
  ctx.font='11px system-ui';ctx.fillStyle='#ef4444';ctx.textAlign='left';ctx.fillText(`K = ${S.K}`,padL+gw+5,ky+4);
  // axis labels
  ctx.font='11px system-ui';ctx.fillStyle=c.sub;ctx.textAlign='center';ctx.fillText('时间',padL+gw/2,padT+gh+35);
  ctx.save();ctx.translate(15,padT+gh/2);ctx.rotate(-Math.PI/2);ctx.fillText('种群数量',0,0);ctx.restore();
  // plot history
  if(S.history.length>1){
    ctx.strokeStyle='#22c55e';ctx.lineWidth=2;ctx.beginPath();
    const maxT=Math.max(S.history.length,100);
    S.history.forEach((v,i)=>{
      const x=padL+(i/maxT)*gw;const y=padT+gh-(v/maxPop)*gh;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });ctx.stroke();
    // current point
    const lastX=padL+((S.history.length-1)/maxT)*gw;
    const lastY=padT+gh-(S.history[S.history.length-1]/maxPop)*gh;
    ctx.beginPath();ctx.arc(lastX,lastY,5,0,Math.PI*2);ctx.fillStyle='#22c55e';ctx.fill();
  }
  // formula
  ctx.font='14px system-ui';ctx.fillStyle=c.text;ctx.textAlign='center';
  ctx.fillText(`N = ${S.pop.toFixed(0)}  |  r = ${S.r.toFixed(2)}  |  K = ${S.K}`,CW/2,25);
  if(S.overshoot){ctx.fillStyle='#f59e0b';ctx.fillText('📈 种群超调！',CW/2,CH-15)}
}
function drawBiodiversity(c){
  const species=Object.entries(SPECIES);
  const cols=5,rows=2;
  const cellW=CW/(cols+1),cellH=CH/(rows+1);
  species.forEach(([k,v],idx)=>{
    const col=idx%cols,row=Math.floor(idx/cols);
    const x=(col+0.5)*cellW+cellW*0.3,y=(row+0.5)*cellH+cellH*0.2;
    const alive=S.species.has(k);
    // habitat circle
    ctx.beginPath();ctx.arc(x,y,cellW*0.3,0,Math.PI*2);
    if(alive){
      const g=ctx.createRadialGradient(x,y,0,x,y,cellW*0.3);
      g.addColorStop(0,v.color+'44');g.addColorStop(1,v.color+'11');ctx.fillStyle=g;
    }else{ctx.fillStyle='rgba(100,100,100,0.1)'}
    ctx.fill();ctx.strokeStyle=alive?v.color:'#444';ctx.lineWidth=alive?2:1;ctx.stroke();
    // icon
    ctx.font=`${alive?36:24}px system-ui`;ctx.textAlign='center';ctx.globalAlpha=alive?1:0.3;
    ctx.fillText(v.icon,x,y+10);ctx.globalAlpha=1;
    // name
    ctx.font='12px system-ui';ctx.fillStyle=alive?c.text:'#666';ctx.fillText(v.name,x,y+cellW*0.3+15);
    // level label
    const lvlNames=['生产者','初级消费者','次级消费者','顶级捕食者'];
    ctx.font='9px system-ui';ctx.fillStyle=alive?v.color:'#555';ctx.fillText(lvlNames[v.level],x,y+cellW*0.3+28);
    // X mark if extinct
    if(!alive){ctx.strokeStyle='#ef4444';ctx.lineWidth=3;const s=15;ctx.beginPath();ctx.moveTo(x-s,y-s);ctx.lineTo(x+s,y+s);ctx.moveTo(x+s,y-s);ctx.lineTo(x-s,y+s);ctx.stroke()}
  });
  // biodiversity bar
  const bw=CW*0.6,bx=CW*0.2,by=CH-40;
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(bx,by,bw,15);
  const bColor=S.biodiversity>60?'#22c55e':S.biodiversity>30?'#f59e0b':'#ef4444';
  ctx.fillStyle=bColor;ctx.fillRect(bx,by,bw*S.biodiversity/100,15);
  ctx.font='12px system-ui';ctx.fillStyle=c.text;ctx.textAlign='center';ctx.fillText(`生物多样性 ${S.biodiversity.toFixed(0)}%`,CW/2,by-8);
  // connections between alive species
  const positions={};
  species.forEach(([k],idx)=>{const col=idx%cols,row=Math.floor(idx/cols);positions[k]={x:(col+0.5)*cellW+cellW*0.3,y:(row+0.5)*cellH+cellH*0.2}});
  ctx.strokeStyle='rgba(99,102,241,0.15)';ctx.lineWidth=1;
  Object.entries(FOOD_WEB).forEach(([prey,preds])=>{
    if(!S.species.has(prey))return;
    preds.forEach(pred=>{if(!S.species.has(pred))return;const a=positions[prey],b=positions[pred];if(a&&b){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}});
  });
}
function drawBalance(c){
  const groundY=CH*0.6;
  // sky
  const skyG=ctx.createLinearGradient(0,0,0,groundY);
  const skyHealth=S.balance/100;
  skyG.addColorStop(0,isDark?`rgba(10,${Math.floor(16+skyHealth*30)},${Math.floor(30+skyHealth*20)},1)`:`rgba(${Math.floor(135+skyHealth*50)},${Math.floor(206+skyHealth*30)},${Math.floor(235+skyHealth*20)},1)`);
  skyG.addColorStop(1,isDark?'#1a2050':'#B0E0E6');ctx.fillStyle=skyG;ctx.fillRect(0,0,CW,groundY);
  // ground
  const greenness=S.habitat/100;
  ctx.fillStyle=isDark?`rgb(${Math.floor(20+greenness*20)},${Math.floor(40+greenness*60)},${Math.floor(10+greenness*20)})`:`rgb(${Math.floor(100+greenness*40)},${Math.floor(140+greenness*60)},${Math.floor(80+greenness*20)})`;
  ctx.fillRect(0,groundY,CW,CH-groundY);
  // trees based on habitat
  const treeCount=Math.floor(S.habitat/8);
  for(let i=0;i<treeCount;i++){
    const tx=20+i*(CW-40)/Math.max(1,treeCount);const ty=groundY-5;
    ctx.fillStyle='#22c55e';ctx.beginPath();ctx.arc(tx,ty-25,12+Math.sin(S.anim+i)*2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#8B4513';ctx.fillRect(tx-3,ty-13,6,18);
  }
  // animals based on balance
  const animalCount=Math.floor(S.balance/15);
  const animals=['🐰','🦌','🦊','🐺','🦅'];
  for(let i=0;i<animalCount;i++){
    const ax=CW*0.1+i*(CW*0.8/Math.max(1,animalCount));
    ctx.font='20px system-ui';ctx.textAlign='center';ctx.fillText(animals[i%animals.length],ax+Math.sin(S.anim*2+i*1.5)*10,groundY-50+Math.cos(S.anim+i)*5);
  }
  // invasive species
  if(S.invasive>30){const invCount=Math.floor(S.invasive/15);for(let i=0;i<invCount;i++){ctx.font='18px system-ui';ctx.fillText('🐀',CW*0.2+i*40+Math.sin(S.anim*3+i)*5,groundY-10)}}
  // hunting effects
  if(S.hunting>40){for(let i=0;i<S.hunting/20;i++){ctx.font='14px system-ui';ctx.fillText('💥',CW*0.3+i*60,groundY-70+Math.random()*20)}}
  // conservation
  if(S.conservation>40){ctx.strokeStyle='rgba(34,197,94,0.3)';ctx.lineWidth=3;ctx.setLineDash([10,5]);ctx.strokeRect(CW*0.05,groundY*0.3,CW*0.9,groundY*0.65);ctx.setLineDash([]);ctx.font='12px system-ui';ctx.fillStyle='#22c55e';ctx.textAlign='center';ctx.fillText('🛡️ 保护区',CW/2,groundY*0.28)}
  // balance meter
  const mw=CW*0.5,mx=CW*0.25,my=25;
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(mx,my,mw,14);
  const bColor=S.ecosystem==='stable'?'#22c55e':S.ecosystem==='stressed'?'#f59e0b':'#ef4444';
  ctx.fillStyle=bColor;ctx.fillRect(mx,my,mw*S.balance/100,14);
  ctx.font='13px system-ui';ctx.fillStyle=c.text;ctx.textAlign='center';
  ctx.fillText(`生态平衡 ${S.balance.toFixed(0)}% — ${S.ecosystem==='stable'?'稳定':S.ecosystem==='stressed'?'受压':'崩溃'}`,CW/2,my+30);
}

function goLevel(i){if(i>LEVELS.length-1||i<0)return;if(i>0&&!quizPassed.has(i-1))return;cur=i;initLevel(i);gameState='play';document.getElementById('panel').style.display='block';document.getElementById('ib-level').textContent=`关卡 ${i+1}/7`;document.getElementById('ib-title').textContent=LEVELS[i].name;document.getElementById('ib-status').textContent=quizPassed.has(i)?'已完成':done[i]?'待测验':'进行中';renderPanel();draw()}
function resetProgress(){done=new Array(7).fill(false);quizPassed=new Set();quizFeedback={}}
function startGame(){document.getElementById('startScreen').classList.add('hidden');resetProgress();goLevel(0)}
function handleClick(x,y){}
cv.addEventListener('click',e=>{if(gameState!=='play')return;const r=cv.getBoundingClientRect();handleClick(e.clientX-r.left,e.clientY-r.top)});

let lastTime=0;
function gameLoop(ts){
  const dt=(ts-lastTime)/1000;lastTime=ts;
  if(gameState==='play'){
    // population simulation
    if(cur===4&&S.running){
      const dN=S.r*S.pop*(1-S.pop/S.K);S.pop=Math.max(1,S.pop+dN);S.time++;S.history.push(S.pop);
      if(S.pop>S.K*1.05)S.overshoot=true;
      if(S.time%10===0)renderPanel();
    }
    updateSliderLabels();checkObj();draw();
  }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
