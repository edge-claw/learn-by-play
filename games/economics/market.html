<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>市场经济探险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;height:100vh;width:100vw}
.overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center}
.overlay h1{font-size:42px;color:#10b981;margin-bottom:8px;text-shadow:0 0 30px rgba(16,185,129,0.4)}
.overlay .sub{font-size:18px;color:var(--sub-color);margin-bottom:32px}
.overlay .desc{max-width:520px;color:var(--text-muted);font-size:14px;line-height:1.8;margin-bottom:36px}
.overlay .start-btn{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;padding:14px 48px;font-size:18px;border-radius:12px;cursor:pointer;transition:all .3s}
.overlay .start-btn:hover{transform:scale(1.05);box-shadow:0 0 24px rgba(16,185,129,0.5)}
.panel{position:fixed;left:0;top:0;bottom:36px;width:320px;background:var(--panel-bg);border-right:1px solid rgba(16,185,129,0.2);overflow-y:auto;padding:16px;display:none;z-index:10;padding-bottom:24px}
.panel h2{color:var(--title-color);font-size:18px;margin-bottom:6px}
.panel .level-title{color:#6ee7b7;font-size:13px;margin-bottom:12px}
.panel .desc-text{color:var(--text-muted);font-size:13px;line-height:1.7;margin-bottom:14px}
.panel .obj-list{list-style:none;margin-bottom:14px}
.panel .obj-list li{font-size:13px;padding:4px 0;color:var(--goal-text)}
.panel .obj-list li.done{color:var(--goal-done)}
.panel .obj-list li::before{content:'○ ';color:var(--text-sub)}
.panel .obj-list li.done::before{content:'● ';color:#4ade80}
.act-btn{display:block;width:100%;padding:10px;margin-top:6px;border:1px solid rgba(16,185,129,0.4);background:rgba(16,185,129,0.1);color:#6ee7b7;border-radius:8px;cursor:pointer;font-size:15px;transition:all .2s}
.act-btn:hover{background:rgba(16,185,129,0.25)}
.hint-box{background:var(--hint-bg);border:1px solid var(--hint-border);border-radius:8px;padding:8px;margin-top:8px;font-size:12px;line-height:1.6;color:var(--hint-text)}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:8px;padding:10px;margin-top:10px;font-size:14px;color:var(--learn-text);line-height:1.8}
.learn-box b{color:#4ade80}
canvas{position:fixed;left:320px;top:0;background:var(--bg)}
.bar{position:fixed;left:0;bottom:0;right:0;height:36px;background:var(--bar-bg);border-top:1px solid rgba(16,185,129,0.2);display:none;z-index:10;padding:0 16px;align-items:center;font-size:13px}
.bar-inner{display:flex;align-items:center;height:100%;gap:8px}
.slider-row{display:flex;align-items:center;gap:8px;margin:6px 0;font-variant-numeric:tabular-nums}
.slider-row label{font-size:12px;color:var(--text-muted);min-width:60px}
.slider-row input[type=range]{flex:1;accent-color:#10b981}
.slider-row .val{font-size:12px;color:#6ee7b7;min-width:36px;text-align:right}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:#aaa;font-size:12px;width:80px}
.feat .fi{font-size:26px;margin-bottom:4px}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:8px 0}
.quiz-title{font-size:13px;font-weight:700;color:var(--quiz-q);margin-bottom:6px}
.quiz-q{font-size:13px;color:var(--quiz-q);margin-bottom:8px;font-weight:600}
.quiz-opt{display:block;width:100%;font-size:13px;color:var(--quiz-opt-text);padding:8px 10px;margin:4px 0;border-radius:6px;cursor:pointer;border:1px solid var(--quiz-opt-border);background:var(--quiz-opt-bg);text-align:left}
.quiz-opt:hover{background:var(--quiz-opt-hover)}
.quiz-opt.correct{background:var(--quiz-correct-bg);border-color:#22c55e;color:var(--quiz-correct-text)}
.quiz-opt.wrong{background:var(--quiz-wrong-bg);border-color:#ef4444;color:var(--quiz-wrong-text)}
.quiz-feedback{font-size:12px;line-height:1.6;margin-top:7px;padding:7px;border-radius:6px}
.quiz-feedback.ok{background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-feedback.bad{background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="overlay" id="overlay">
<h1>📈 市场经济探险</h1>
<div class="sub">Market Economics Adventure</div>
<div class="desc">
从供需曲线到市场失灵，7个关卡带你探索市场经济的核心机制。<br>
拖动曲线、调节税率、设置价格管制，亲手感受看不见的手。
</div>
<button class="start-btn" onclick="startGame()">开始探索 →</button>
<div class="features">
<div class="feat"><div class="fi">📊</div>供给需求</div>
<div class="feat"><div class="fi">📐</div>价格弹性</div>
<div class="feat"><div class="fi">💰</div>消费者剩余</div>
<div class="feat"><div class="fi">⚖️</div>价格管制</div>
<div class="feat"><div class="fi">🏛️</div>税收效应</div>
<div class="feat"><div class="fi">🏭</div>垄断竞争</div>
<div class="feat"><div class="fi">🌍</div>外部性</div>
</div>
</div>
<div class="panel" id="panel"></div>
<canvas id="cv"></canvas>
<div class="bar" id="bar"><div class="bar-inner" id="barInner"></div></div>
<script>
// === Theme ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',axis:'#888',curve1:'#3b82f6',curve2:'#ef4444',fill1:'rgba(59,130,246,0.2)',fill2:'rgba(239,68,68,0.2)',eq:'#22c55e',surplus1:'rgba(59,130,246,0.25)',surplus2:'rgba(239,68,68,0.25)',deadweight:'rgba(245,158,11,0.3)',tax:'rgba(168,85,247,0.3)'},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',axis:'#666',curve1:'#2563eb',curve2:'#dc2626',fill1:'rgba(37,99,235,0.15)',fill2:'rgba(220,38,38,0.15)',eq:'#16a34a',surplus1:'rgba(37,99,235,0.2)',surplus2:'rgba(220,38,38,0.2)',deadweight:'rgba(245,158,11,0.25)',tax:'rgba(168,85,247,0.25)'}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{renderPanel();draw()}catch(e){}}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const panel=document.getElementById('panel'),bar=document.getElementById('bar'),barInner=document.getElementById('barInner');
let W,H,curLevel=0;
let levelObjs=Array.from({length:7},()=>[false,false,false]);
const quizPassed=new Set();
let quizFeedback={};
let LD={};

function resize(){W=window.innerWidth-320;H=window.innerHeight-36;cv.width=W;cv.height=H;cv.style.width=W+'px';cv.style.height=H+'px';if(Object.keys(LD).length)draw()}
window.addEventListener('resize',resize);

function startGame(){document.getElementById('overlay').style.display='none';panel.style.display='block';bar.style.display='flex';levelObjs=Array.from({length:7},()=>[false,false,false]);quizPassed.clear();quizFeedback={};resize();goLevel(0)}
function isUnlocked(n){
  n=Number(n);
  return Number.isInteger(n)&&n>=0&&n<7&&(n===0||quizPassed.has(n-1));
}
function goLevel(n){
  n=Number(n);
  if(!Number.isInteger(n)||n<0||n>=7)return;
  if(!isUnlocked(n))return;
  curLevel=n;initLevel(n);renderBar();renderPanel();draw();
}
function completeObj(li,oi,silent=false){
  li=Number(li);oi=Number(oi);
  if(!Number.isInteger(li)||!Number.isInteger(oi)||li!==curLevel||li<0||li>=7||oi<0||oi>=3||!levelObjs[li]||levelObjs[li][oi])return false;
  levelObjs[li][oi]=true;if(!silent){renderPanel();renderBar()}return true;
}
function allDone(li){
  li=Number(li);
  return Number.isInteger(li)&&li>=0&&li<7&&levelObjs[li]&&levelObjs[li].every(Boolean);
}
function setText(id,text){const el=document.getElementById(id);if(el)el.textContent=text}
function setHTML(id,html){const el=document.getElementById(id);if(el)el.innerHTML=html}
function clampNumber(value,fallback,min,max){
  const n=Number(value),fb=Number(fallback);
  const base=Number.isFinite(n)?n:(Number.isFinite(fb)?fb:min);
  return Math.min(max,Math.max(min,base));
}
function readRangeValue(id,fallback){
  const el=document.getElementById(id);if(!el)return fallback;
  const min=Number(el.min),max=Number(el.max),step=Number(el.step);
  const val=clampNumber(el.value,fallback,Number.isFinite(min)?min:-Infinity,Number.isFinite(max)?max:Infinity);
  el.value=String(val);
  const span=el.parentElement&&el.parentElement.querySelector?el.parentElement.querySelector('.val'):null;
  if(span)span.textContent=val.toFixed(Number.isFinite(step)&&step<1?1:0);
  return val;
}

// === Audio ===
let audioCtx;
function initAudio(){
  const AudioCtor=window.AudioContext||window.webkitAudioContext;
  if(!AudioCtor)return null;
  try{if(!audioCtx)audioCtx=new AudioCtor();return audioCtx}catch(e){return null}
}
function playSound(type){
  const ac=initAudio();if(!ac)return false;
  try{
    const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
    if(type==='click'){o.frequency.value=800;g.gain.value=0.1;o.start();g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);o.stop(ac.currentTime+0.1)}
    else if(type==='success'){o.frequency.value=523;g.gain.value=0.15;o.start();o.frequency.setValueAtTime(659,ac.currentTime+0.1);o.frequency.setValueAtTime(784,ac.currentTime+0.2);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.4);o.stop(ac.currentTime+0.4)}
    return true;
  }catch(e){return false}
}

// === Level Info ===
const levelInfo=[
  {title:'供给与需求',sub:'曲线交叉决定价格',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>核心：</b>需求曲线向右下倾斜，供给曲线向右上倾斜，交点 = 均衡</div>画布上有<span style="color:#3b82f6">蓝色需求曲线</span>和<span style="color:#ef4444">红色供给曲线</span>。拖动滑块改变曲线斜率和截距，让两条曲线交叉找到均衡点。',objs:['调整需求曲线观察价格变化','调整供给曲线观察数量变化','让均衡价格落在 40-60 之间'],learn:'<b>供给与需求</b>是市场经济的基石。需求定律：价格↑ → 需求量↓；供给定律：价格↑ → 供给量↑。两条曲线的交点决定了市场均衡价格和数量。'},
  {title:'价格弹性',sub:'需求对价格的敏感度',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>公式：</b>Ed = (%ΔQ) / (%ΔP)</div>调整需求曲线的斜率，观察弹性值如何变化。陡峭 = 缺乏弹性（必需品），平坦 = 富有弹性（奢侈品）。',objs:['创建弹性需求（|Ed| > 1）','创建非弹性需求（|Ed| < 1）','观察单位弹性（|Ed| ≈ 1）'],learn:'<b>价格弹性</b>衡量需求量对价格变化的敏感程度。|Ed|>1 富有弹性（奢侈品），|Ed|<1 缺乏弹性（必需品如食盐），|Ed|=1 单位弹性。弹性决定了涨价是增收还是减收。'},
  {title:'消费者与生产者剩余',sub:'交易创造的价值',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>概念：</b>消费者剩余 = 愿付价格 − 实际价格<br>生产者剩余 = 实际价格 − 最低接受价格</div>观察<span style="color:#3b82f6">蓝色区域</span>（消费者剩余）和<span style="color:#ef4444">红色区域</span>（生产者剩余），调整曲线看总剩余如何变化。',objs:['识别消费者剩余区域','识别生产者剩余区域','调整曲线并确认总社会剩余最大化'],learn:'<b>消费者剩余</b>是买家愿意支付的最高价与实际价格之差的总和。<b>生产者剩余</b>是实际价格与卖家最低接受价之差的总和。自由市场均衡使总剩余最大化。'},
  {title:'价格管制',sub:'天花板价与地板价',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>管制：</b>价格上限（天花板）→ 短缺<br>价格下限（地板）→ 过剩</div>拖动<span style="color:#f59e0b">橙色虚线</span>设置价格上限或下限，观察市场出现短缺或过剩。',objs:['设置价格上限造成短缺','设置价格下限造成过剩','观察无谓损失区域'],learn:'<b>价格上限</b>（如房租管制）低于均衡价时造成短缺。<b>价格下限</b>（如最低工资）高于均衡价时造成过剩。两者都会产生无谓损失，降低市场效率。'},

// === Level State Init ===
function initLevel(idx){
  idx=Number(idx);
  if(!Number.isInteger(idx)||idx<0||idx>=7)return;
  if(!quizPassed.has(idx))delete quizFeedback[idx];
  LD={};
  switch(idx){
    case 0: LD={dIntercept:130,dSlope:-0.8,sIntercept:10,sSlope:0.7,adjD:false,adjS:false};break;
    case 1: LD={slope:-0.5,intercept:100,qBase:50,pChange:20,elasticityTouched:false,elasticityLog:{elastic:false,inelastic:false,unit:false},elasticityFeedback:''};break;
    case 2: LD={dInt:90,dSl:-1,sInt:30,sSl:0.8,showCS:false,showPS:false,surplusAdjusted:false,surplusConfirmed:false};break;
    case 3: LD={dInt:120,dSl:-1,sInt:10,sSl:0.8,ceiling:0,floor:0,ceilingOn:false,floorOn:false,usedCeiling:false,usedFloor:false,dwlConfirmed:false};break;
    case 4: LD={dInt:120,dSl:-1,sInt:10,sSl:0.8,taxRate:0,peakConfirmed:false};break;
    case 5: LD={mode:'perfect',mcSlope:0.8,mcInt:10,dInt:120,dSl:-1,sawPerfect:false,sawMonopoly:false,comparisonConfirmed:false};break;
    case 6: LD={extType:'negative',extSize:15,pigouvian:0,dInt:100,dSl:-0.8,sInt:20,sSl:0.7,externalityAdjusted:false,externalityLog:{negative:false,positive:false},externalityFeedback:'',policyConfirmed:false};break;
  }
}

// === Equilibrium helpers ===
function eqPoint(dInt,dSl,sInt,sSl){let q=(dInt-sInt)/(sSl-dSl);let p=dInt+dSl*q;return{q:Math.max(0,q),p:Math.max(0,p)}}
function demandP(q,dInt,dSl){return dInt+dSl*q}
function supplyP(q,sInt,sSl){return sInt+sSl*q}
function elasticityLabel(ed){
  const a=Math.abs(ed);
  if(Math.abs(a-1)<0.15)return '(接近单位弹性)';
  return a>1?'(富有弹性)':'(缺乏弹性)';
}
function elasticityHintHTML(ed){
  const a=Math.abs(ed);
  if(!Number.isFinite(a)||a===0)return '先调整需求曲线斜率或基准数量，比较 A 到 B 时价格变化带来的需求量变化。';
  if(a>1.15)return `当前 |Ed|=${a.toFixed(2)}，需求量对价格很敏感。把需求曲线调陡一些，或把基准数量调大，观察 |Ed| 如何靠近 1。`;
  if(a<0.85)return `当前 |Ed|=${a.toFixed(2)}，需求量对价格不太敏感。把需求曲线调平一些，或把基准数量调小，观察 |Ed| 如何靠近 1。`;
  return `当前 |Ed|=${a.toFixed(2)}，已经接近单位弹性：价格变化的百分比和数量变化的百分比大致相当。`;
}
function calcElasticity(){
  let q1=LD.qBase,q2=LD.qBase+LD.pChange;
  let p1=LD.intercept+LD.slope*q1,p2=LD.intercept+LD.slope*q2;
  let pctQ=(q2-q1)/q1*100,pctP=p1!==0?(p2-p1)/p1*100:0;
  return pctP!==0?pctQ/pctP:0;
}
function updateElasticityGoals(){
  LD.elasticityTouched=true;
  LD.elasticity=calcElasticity();
  return false;
}
function applyElasticityPreset(kind){
  if(curLevel!==1)return false;
  if(kind==='elastic'){LD.slope=-0.5;LD.intercept=100;LD.qBase=50;}
  else if(kind==='inelastic'){LD.slope=-1.5;LD.intercept=100;LD.qBase=50;}
  else if(kind==='unit'){LD.slope=-1;LD.intercept=100;LD.qBase=50;}
  else return false;
  LD.elasticity=calcElasticity();
  LD.elasticityTouched=false;
  LD.elasticityFeedback='示例已载入。请至少拖动一次参数，再记录当前弹性类型。';
  renderPanel();renderBar();draw();
  return true;
}
function recordElasticity(kind){
  if(curLevel!==1||!['elastic','inelastic','unit'].includes(kind))return false;
  const a=Math.abs(calcElasticity());
  let ok=false;
  if(kind==='elastic')ok=a>1;
  if(kind==='inelastic')ok=a<1&&a>0;
  if(kind==='unit')ok=Math.abs(a-1)<0.15;
  if(!LD.elasticityTouched){
    LD.elasticityFeedback='先拖动斜率、截距或基准数量，观察读数变化后再记录。';
    renderPanel();draw();
    return false;
  }
  if(!ok){
    const labels={elastic:'富有弹性 |Ed|>1',inelastic:'缺乏弹性 |Ed|<1',unit:'单位弹性 |Ed|≈1'};
    LD.elasticityFeedback=`当前 |Ed|=${a.toFixed(2)}，还不是${labels[kind]}。`;
    renderPanel();draw();
    return false;
  }
  if(!LD.elasticityLog)LD.elasticityLog={elastic:false,inelastic:false,unit:false};
  LD.elasticityLog[kind]=true;
  const idx={elastic:0,inelastic:1,unit:2}[kind];
  const labels={elastic:'富有弹性',inelastic:'缺乏弹性',unit:'单位弹性'};
  LD.elasticityFeedback=`✅ 已记录${labels[kind]}状态：|Ed|=${a.toFixed(2)}。`;
  completeObj(1,idx,true);
  renderPanel();renderBar();draw();
  return true;
}

// === Slider helper ===
function sliderHTML(id,label,min,max,step,val,color){
  return `<div class="slider-row"><label>${label}</label><input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}" oninput="sliderDrag('${id}')" onchange="this.blur();renderPanel()"><span class="val" style="color:${color||'#6ee7b7'}">${val}</span></div>`;
}
function controlLevel(id){
  const map={
    sl_dInt:0,sl_dSl:0,sl_sInt:0,sl_sSl:0,
    sl_slope:1,sl_int:1,sl_qBase:1,
    sl_dInt2:2,sl_sInt2:2,
    ck_ceil:3,sl_ceil:3,ck_floor:3,sl_floor:3,
    sl_tax:4,sl_mode:5,
    sl_extType:6,sl_extSize:6,sl_pigou:6
  };
  return Object.prototype.hasOwnProperty.call(map,id)?map[id]:null;
}
function isCurrentControl(id){
  const li=controlLevel(id);
  return li===null||li===curLevel;
}
function sliderDrag(id){
  if(!isCurrentControl(id))return false;
  const el=document.getElementById(id);if(!el)return false;
  const before=levelObjs[curLevel]?levelObjs[curLevel].join(''):'';
  readSliders(id);draw();
  const after=levelObjs[curLevel]?levelObjs[curLevel].join(''):'';
  if(before!==after){renderPanel();renderBar()}
  return true;
}
function readSliders(sourceId){
  if(sourceId&&!isCurrentControl(sourceId))return false;
  let changed=false;
  switch(curLevel){
    case 0:{
      LD.dIntercept=readRangeValue('sl_dInt',LD.dIntercept);
      LD.sIntercept=readRangeValue('sl_sInt',LD.sIntercept);
      LD.dSlope=-readRangeValue('sl_dSl',Math.abs(LD.dSlope));
      LD.sSlope=readRangeValue('sl_sSl',LD.sSlope);
      if((sourceId==='sl_dInt'||sourceId==='sl_dSl')&&!LD.adjD){LD.adjD=true;changed=completeObj(0,0,true)||changed}
      if((sourceId==='sl_sInt'||sourceId==='sl_sSl')&&!LD.adjS){LD.adjS=true;changed=completeObj(0,1,true)||changed}
      let eq=eqPoint(LD.dIntercept,LD.dSlope,LD.sIntercept,LD.sSlope);
      if(eq.p>=40&&eq.p<=60)changed=completeObj(0,2,true)||changed;
      updateMarketMetricPanel();
    }break;
    case 1:{
      LD.slope=-readRangeValue('sl_slope',Math.abs(LD.slope));
      LD.intercept=readRangeValue('sl_int',LD.intercept);
      LD.qBase=readRangeValue('sl_qBase',LD.qBase);
      changed=updateElasticityGoals()||changed;
      updateElasticityMetricPanel();
    }break;
    case 2:{
      LD.dInt=readRangeValue('sl_dInt2',LD.dInt);
      LD.sInt=readRangeValue('sl_sInt2',LD.sInt);
      if(sourceId==='sl_dInt2'||sourceId==='sl_sInt2')LD.surplusAdjusted=true;
      let eq=eqPoint(LD.dInt,LD.dSl,LD.sInt,LD.sSl);
      let cs=0.5*eq.q*(LD.dInt-eq.p),ps=0.5*eq.q*(eq.p-LD.sInt);
      if((cs+ps)<=2000&&!quizPassed.has(2)&&levelObjs[2][2]){
        levelObjs[2][2]=false;LD.surplusConfirmed=false;changed=true;
      }
      updateSurplusMetricPanel();
    }break;
    case 3:{
      const c=document.getElementById('sl_ceil'),f=document.getElementById('sl_floor');
      LD.ceilingOn=document.getElementById('ck_ceil')?.checked||false;
      LD.floorOn=document.getElementById('ck_floor')?.checked||false;
      if(c)LD.ceiling=readRangeValue('sl_ceil',LD.ceiling||40);
      if(f)LD.floor=readRangeValue('sl_floor',LD.floor||70);
      if(LD.ceilingOn&&!c&&!LD.ceiling)LD.ceiling=40;
      if(LD.floorOn&&!f&&!LD.floor)LD.floor=70;
      let eq=eqPoint(LD.dInt,LD.dSl,LD.sInt,LD.sSl);
      if((sourceId==='ck_ceil'||sourceId==='sl_ceil')&&LD.ceilingOn&&LD.ceiling<eq.p){LD.usedCeiling=true;changed=completeObj(3,0,true)||changed}
      if((sourceId==='ck_floor'||sourceId==='sl_floor')&&LD.floorOn&&LD.floor>eq.p){LD.usedFloor=true;changed=completeObj(3,1,true)||changed}
      updatePriceControlPanel();
    }break;
    case 4:{
      LD.taxRate=readRangeValue('sl_tax',LD.taxRate);
      if(LD.taxRate>0&&LD.taxRate<=10)changed=completeObj(4,0,true)||changed;
      if(LD.taxRate>20)changed=completeObj(4,1,true)||changed;
      // Laffer: revenue = tax * q_after_tax
      let eq0=eqPoint(LD.dInt,LD.dSl,LD.sInt,LD.sSl);
      let eqT=eqPoint(LD.dInt,LD.dSl,LD.sInt+LD.taxRate,LD.sSl);
      if(LD.taxRate>0){
        let rev=LD.taxRate*eqT.q;
        // check if near max
        let maxRev=0,bestT=0;
        for(let tt=1;tt<=60;tt++){let e2=eqPoint(LD.dInt,LD.dSl,LD.sInt+tt,LD.sSl);let r2=tt*e2.q;if(r2>maxRev){maxRev=r2;bestT=tt}}
        if(Math.abs(LD.taxRate-bestT)>3&&!quizPassed.has(4)){
          LD.peakConfirmed=false;
          if(levelObjs[4][2]){levelObjs[4][2]=false;changed=true}
        }
      }
      updateTaxMetricPanel();
    }break;
    case 5:{
      const md=document.getElementById('sl_mode');
      if(md)LD.mode=md.value==='0'?'perfect':'monopoly';
      if(sourceId==='sl_mode')changed=observeMarketStructure(true)||changed;
    }break;
    case 6:{
      const et=document.getElementById('sl_extType'),es=document.getElementById('sl_extSize'),pg=document.getElementById('sl_pigou');
      if(et)LD.extType=et.value==='0'?'negative':'positive';
      if(es)LD.extSize=readRangeValue('sl_extSize',LD.extSize);
      if(pg)LD.pigouvian=readRangeValue('sl_pigou',LD.pigouvian);
      if(sourceId==='sl_extType'||sourceId==='sl_extSize'){
        LD.externalityAdjusted=true;
        LD.policyConfirmed=false;
        if(levelObjs[6][2]&&!quizPassed.has(6)){levelObjs[6][2]=false;changed=true}
        LD.externalityFeedback='观察市场均衡与社会最优的距离后，点击记录当前类型。';
      }
      if(sourceId==='sl_pigou'){
        LD.policyConfirmed=false;
        if(levelObjs[6][2]&&!quizPassed.has(6)){levelObjs[6][2]=false;changed=true}
      }
      changed=updateExternalityObjectives(sourceId==='sl_pigou')||changed;
    }break;
  }
  return changed;
}

function taxMetrics(){
  let eq0=eqPoint(LD.dInt,LD.dSl,LD.sInt,LD.sSl);
  let eqT=eqPoint(LD.dInt,LD.dSl,LD.sInt+LD.taxRate,LD.sSl);
  return {revenue:LD.taxRate*eqT.q,deadweight:0.5*LD.taxRate*(eq0.q-eqT.q)};
}
function bestTaxRate(){
  let maxRev=0,bestT=0;
  for(let tt=1;tt<=60;tt++){
    let e=eqPoint(LD.dInt,LD.dSl,LD.sInt+tt,LD.sSl),r=tt*e.q;
    if(r>maxRev){maxRev=r;bestT=tt}
  }
  return bestT;
}
function taxHintHTML(){
  const m=taxMetrics(),bestT=bestTaxRate(),gap=Math.abs(LD.taxRate-bestT);
  if(LD.taxRate===0)return '<div class="hint-box">无税时交易量最高，但政府没有税收收入；开始加税后，收入会先上升。</div>';
  if(gap<=3)return `<div class="hint-box">当前税率接近收入峰值（约 ${bestT}）。继续加税会明显扩大无谓损失，并可能让税收收入下降。</div>`;
  if(LD.taxRate<bestT)return `<div class="hint-box">税率还低于收入峰值（约 ${bestT}）。收入 ${m.revenue.toFixed(0)} 正在积累，但无谓损失 ${m.deadweight.toFixed(0)} 也已经出现。</div>`;
  return `<div class="hint-box">税率已高于收入峰值（约 ${bestT}）。交易量被压缩，额外加税主要转化为无谓损失。</div>`;
}
function priceControlHintHTML(){
  const eq=eqPoint(LD.dInt,LD.dSl,LD.sInt,LD.sSl);
  if(LD.ceilingOn&&LD.ceiling<eq.p){
    const qd=(LD.ceiling-LD.dInt)/LD.dSl,qs=(LD.ceiling-LD.sInt)/LD.sSl;
    const dwl=0.5*Math.max(0,eq.q-qs)*(eq.p-supplyP(qs,LD.sInt,LD.sSl));
    return `<div class="hint-box">价格上限低于均衡价：需求量约 ${qd.toFixed(0)}、供给量约 ${qs.toFixed(0)}，短缺 ${Math.max(0,qd-qs).toFixed(0)}，无谓损失约 ${dwl.toFixed(0)}。</div>`;
  }
  if(LD.floorOn&&LD.floor>eq.p){
    const qd=(LD.floor-LD.dInt)/LD.dSl,qs=(LD.floor-LD.sInt)/LD.sSl;
    const dwl=0.5*Math.max(0,eq.q-qd)*(demandP(qd,LD.dInt,LD.dSl)-eq.p);

  }
  return '<div class="hint-box">管制价只有越过均衡价才会真正约束市场；低于均衡价的上限造成短缺，高于均衡价的下限造成过剩。</div>';

function externalityHintText(){
  if(curLevel!==6||!LD)return '';
  const eqPriv=eqPoint(LD.dInt,LD.dSl,LD.sInt,LD.sSl);
  const eqSoc=LD.extType==='negative'
    ? eqPoint(LD.dInt,LD.dSl,LD.sInt+LD.extSize,LD.sSl)
    : eqPoint(LD.dInt+LD.extSize,LD.dSl,LD.sInt,LD.sSl);
  const diff=eqPriv.q-eqSoc.q,policy=LD.extType==='negative'?'庇古税':'庇古补贴';
  const policyGap=Math.abs(LD.pigouvian-LD.extSize);
  const direction=LD.extType==='negative'
    ? `市场产量比社会最优多 ${Math.max(0,diff).toFixed(1)}，因为污染成本没有进入私人成本。`
    : `市场产量比社会最优少 ${Math.max(0,-diff).toFixed(1)}，因为外部收益没有进入私人收益。`;
  const log=LD.externalityLog||{negative:false,positive:false};
  const currentObserved=!!log[LD.extType];
  const comparedBoth=!!(log.negative&&log.positive);
  const progress=comparedBoth
    ? '你已经比较过负外部性和正外部性。'
    : currentObserved
      ? '当前类型已记录，继续切换到另一类外部性并记录。'
      : '观察图上红点与绿点分离后，记录当前类型。';
  const action=policyGap<=3
    ? `${policy}已接近外部性大小，市场激励基本被校正。`
    : `把${policy}调到约 ${LD.extSize}，才能把第三方成本/收益纳入决策。`;
  return `${direction}${progress}${action}`;
}

function updateExternalityObjectives(policyChanged=false){
  if(curLevel!==6||!levelObjs[6])return false;
  if(!LD.externalityLog)LD.externalityLog={negative:false,positive:false};
  let changed=false;
  if(LD.externalityLog.negative)changed=completeObj(6,0,true)||changed;
  if(LD.externalityLog.positive)changed=completeObj(6,1,true)||changed;
  const comparedBoth=LD.externalityLog.negative&&LD.externalityLog.positive;
  const currentObserved=!!LD.externalityLog[LD.extType];
  const policyReady=comparedBoth&&currentObserved&&LD.extSize>0&&Math.abs(LD.pigouvian-LD.extSize)<=3;
  if(policyReady&&LD.policyConfirmed)changed=completeObj(6,2,true)||changed;
  if(policyChanged&&comparedBoth&&!levelObjs[6][2]){
    LD.externalityFeedback=policyReady
      ? '政策数值已接近外部性大小。请确认它如何把第三方成本/收益内化。'
      : '政策方向正确，还要把数值调到外部性大小附近。';
  }
  setText('externalityHint',externalityHintText());
  return changed;
}

function confirmExternalityPolicy(){
  if(curLevel!==6||!LD.externalityLog)return false;
  const comparedBoth=LD.externalityLog.negative&&LD.externalityLog.positive;
  const currentObserved=!!LD.externalityLog[LD.extType];
  const policyReady=comparedBoth&&currentObserved&&LD.extSize>0&&Math.abs(LD.pigouvian-LD.extSize)<=3;
  if(!policyReady){
    LD.externalityFeedback='先完成两类外部性观察，并把庇古税/补贴调到外部性大小附近。';
    renderPanel();draw();
    return false;
  }
  LD.policyConfirmed=true;
  LD.externalityFeedback=LD.extType==='negative'
    ? '已确认：庇古税把污染成本加入私人成本，市场产量向社会最优收敛。'
    : '已确认：庇古补贴把外部收益加入私人收益，市场产量向社会最优收敛。';
  completeObj(6,2,true);
  renderPanel();renderBar();draw();
  return true;
}

function recordExternality(){
  if(curLevel!==6)return false;
  if(!LD.externalityLog)LD.externalityLog={negative:false,positive:false};
  if(LD.extSize<=0){
    LD.externalityFeedback='先把外部性大小调到大于 0，才能看到市场失灵。';
    renderPanel();draw();

  }
  LD.externalityAdjusted=true;
  LD.externalityLog[LD.extType]=true;
  LD.externalityFeedback=LD.extType==='negative'
    ? '已记录负外部性：私人成本低于社会成本，市场过度生产。'
    : '已记录正外部性：私人收益低于社会收益，市场生产不足。';
  const changed=updateExternalityObjectives(false);
  renderPanel();renderBar();draw();
  return changed;
}

function renderStageNav(){
  let h='<div class="stage-nav"><div class="sn-bar">';
  for(let i=0;i<7;i++){
    let unlocked=isUnlocked(i);
    let cls=quizPassed.has(i)?'done':i===curLevel?'cur':unlocked?'':'locked';
    h+=`<div class="sn-d ${cls}" ${unlocked&&i!==curLevel?`onclick="playSound('click');goLevel(${i})"`:''}></div>`;
  }
  h+=`</div><div class="sn-info">第 ${curLevel+1}/7 关 · 进度 ${Math.round(quizPassed.size/7*100)}%</div>`;
  h+=`<div class="sn-hint">${quizPassed.size}/7 已通关，完成目标后答对测验才解锁下一关</div></div>`;return h;
}

function renderQuiz(){
  let q=quizData[curLevel],fb=quizFeedback[curLevel],passed=quizPassed.has(curLevel);
  let h=`<div class="quiz-box"><div class="quiz-title">通关小测验</div><div class="quiz-q">${q.q}</div>`;
  q.opts.forEach((opt,i)=>{
    let mark=passed&&i===q.ans?' correct':fb&&i===q.ans?' correct':fb&&i===fb.choice&&!fb.ok?' wrong':'';
    h+=`<button class="quiz-opt${mark}" onclick="answerQuiz(${curLevel},${i})">${String.fromCharCode(65+i)}. ${opt}</button>`;
  });
  if(fb)h+=`<div class="quiz-feedback ${fb.ok?'ok':'bad'}">${fb.text}</div>`;
  else if(passed)h+=`<div class="quiz-feedback ok">已通过小测。${q.why}</div>`;
  h+='</div>';return h;
}

function answerQuiz(li,oi){
  li=Number(li);oi=Number(oi);
  if(!Number.isInteger(li)||li<0||li>=7||li!==curLevel)return false;
  let q=quizData[li];
  if(!q||!isUnlocked(li)||quizPassed.has(li)||!allDone(li)||!Number.isInteger(oi)||oi<0||oi>=q.opts.length)return false;
  let ok=oi===q.ans;
  quizFeedback[li]={ok,choice:oi,text:(ok?'答对了。':'还不对。')+q.why};
  if(ok){quizPassed.add(li);playSound('success')}
  renderPanel();renderBar();
  return ok;
}

      break;
    case 5:
      h+=`<div class="slider-row"><label>市场结构</label><select id="sl_mode" onchange="readSliders('sl_mode');renderPanel();draw()" style="flex:1;padding:4px;border-radius:4px;background:var(--btn-bg);color:var(--btn-text);border:1px solid var(--btn-border)"><option value="0" ${LD.mode==='perfect'?'selected':''}>完全竞争</option><option value="1" ${LD.mode==='monopoly'?'selected':''}>垄断</option></select></div>`;
      {let eq;
      if(LD.mode==='perfect'){eq=eqPoint(LD.dInt,LD.dSl,LD.mcInt,LD.mcSlope);h+=`<div style="margin-top:8px;font-size:13px;color:var(--text-muted)">完全竞争: P=MC<br>价格: <span style="color:#22c55e">${eq.p.toFixed(1)}</span> 产量: <span style="color:#22c55e">${eq.q.toFixed(1)}</span></div>`}
      else{
        // MR has double slope: MR = dInt + 2*dSl*q
        let qm=(LD.dInt-LD.mcInt)/(LD.mcSlope-2*LD.dSl);let pm=LD.dInt+LD.dSl*qm;
        let qc=(LD.dInt-LD.mcInt)/(LD.mcSlope-LD.dSl);let pc=LD.dInt+LD.dSl*qc;
        let dwl=0.5*(pm-supplyP(qm,LD.mcInt,LD.mcSlope))*(qc-qm);
        h+=`<div style="margin-top:8px;font-size:13px;color:var(--text-muted)">垄断: MR=MC<br>价格: <span style="color:#ef4444">${pm.toFixed(1)}</span> 产量: <span style="color:#ef4444">${qm.toFixed(1)}</span><br>无谓损失: <span style="color:#f59e0b">${dwl.toFixed(0)}</span></div>`}
      }
      h+=`<button class="act-btn" onclick="observeMarketStructure()">记录当前结构观察</button>`;
      if(LD.sawPerfect&&LD.sawMonopoly&&!levelObjs[5][2]){
        h+=`<button class="act-btn" onclick="confirmMarketStructureComparison()">确认：垄断价高量低并产生无谓损失</button>`;
      }else if(levelObjs[5][2]){
        h+=`<div class="hint-box">已比较：完全竞争完成更多互利交易；垄断通过限产抬价，少掉的交易形成无谓损失。</div>`;
      }
      break;
    case 6:
      h+=`<div class="slider-row"><label>外部性类型</label><select id="sl_extType" onchange="readSliders('sl_extType');renderPanel();draw()" style="flex:1;padding:4px;border-radius:4px;background:var(--btn-bg);color:var(--btn-text);border:1px solid var(--btn-border)"><option value="0" ${LD.extType==='negative'?'selected':''}>负外部性（污染）</option><option value="1" ${LD.extType==='positive'?'selected':''}>正外部性（教育）</option></select></div>`;
      h+=sliderHTML('sl_extSize','外部性大小',0,40,1,LD.extSize,'#f59e0b');
      {const log=LD.externalityLog||{negative:false,positive:false};
      if(!LD.externalityAdjusted)h+=`<div style="font-size:11px;color:var(--text-muted);line-height:1.6;margin-top:4px">分别记录污染型负外部性和教育型正外部性，再用政策把市场拉回社会最优。</div>`;
      h+=`<div style="margin-top:6px;font-size:12px;color:var(--text-muted)">观察记录：负外部性 <span style="color:${log.negative?'#22c55e':'#f59e0b'}">${log.negative?'已记录':'未记录'}</span> · 正外部性 <span style="color:${log.positive?'#22c55e':'#f59e0b'}">${log.positive?'已记录':'未记录'}</span></div>`;
      h+=`<button class="act-btn" onclick="recordExternality()">${log[LD.extType]?'重新记录':'记录'}当前${LD.extType==='negative'?'负':'正'}外部性观察</button>`;
      if(LD.externalityFeedback)h+=`<div class="hint-box">${LD.externalityFeedback}</div>`;}
      {const policy=LD.extType==='negative'?'庇古税':'庇古补贴';
      h+=sliderHTML('sl_pigou',policy,0,40,1,LD.pigouvian,'#a855f7');
      let diff=Math.abs(LD.pigouvian-LD.extSize);
      const log=LD.externalityLog||{negative:false,positive:false};
      const policyReady=log.negative&&log.positive&&log[LD.extType]&&diff<=3;
      h+=`<div style="margin-top:8px;font-size:13px;color:var(--text-muted)">${policy}与外部性差值: <span style="color:${diff<=3?'#22c55e':'#f59e0b'}">${diff.toFixed(0)}</span> ${levelObjs[6][2]?'✓ 已纠正':policyReady?'— 待确认':diff<=3?'— 先完成两类观察':'— 继续调整'}</div>`;
      if(policyReady&&!levelObjs[6][2])h+=`<button class="act-btn" onclick="confirmExternalityPolicy()">确认：${policy}把外部性内化到私人决策中</button>`;
      h+=`<div class="hint-box" id="externalityHint">${externalityHintText()}</div>`}
      break;
  }

  if(goalsDone){
    h+=renderQuiz();
  }
  if(levelPassed){
    h+=`<div class="learn-box">${info.learn}</div>`;
    if(curLevel<6)h+=`<button class="act-btn" onclick="playSound('click');goLevel(${curLevel+1})">下一关 →</button>`;
    else h+=`<button class="act-btn" onclick="showSummary()">查看总结 →</button>`;
  }
  panel.innerHTML=h;
}

function renderBar(){
  const levelPassed=quizPassed.has(curLevel);
  const done=levelPassed?3:levelObjs[curLevel].filter(Boolean).length;
  const status=levelPassed?'已通关':allDone(curLevel)?'待测验':'进行中';
  barInner.innerHTML=`<span style="color:var(--text-muted)">📈 ${levelInfo[curLevel].title}</span><span style="margin-left:auto;color:var(--text-muted);font-size:12px">目标 ${done}/3 · ${status} · 通关 ${quizPassed.size}/7</span>`;
}

// === Drawing ===
function draw(){
  if(!W)return;
  ctx.clearRect(0,0,W,H);
  // bg
  const th=t();
  const bgG=ctx.createLinearGradient(0,0,0,H);bgG.addColorStop(0,th.bg1);bgG.addColorStop(1,th.bg2);
  ctx.fillStyle=bgG;ctx.fillRect(0,0,W,H);
  // grid
  ctx.strokeStyle=th.grid;ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  const m=60,gw=W-120,gh=H-120;
  // axes
  ctx.strokeStyle=th.axis;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(m,m);ctx.lineTo(m,H-m);ctx.lineTo(W-m,H-m);ctx.stroke();
  ctx.fillStyle=th.text;ctx.font='13px sans-serif';ctx.textAlign='center';
  ctx.fillText('数量 Q',W/2,H-m+35);
  ctx.save();ctx.translate(m-35,H/2);ctx.rotate(-Math.PI/2);ctx.fillText('价格 P',0,0);ctx.restore();

  function toX(q,maxQ){return m+q/maxQ*gw}
  function toY(p,maxP){return H-m-p/maxP*gh}

  switch(curLevel){
    case 0:{
      let maxQ=130,maxP=130;
      // demand
      ctx.strokeStyle=th.curve1;ctx.lineWidth=3;ctx.beginPath();
      for(let q=0;q<=maxQ;q+=1){let p=LD.dIntercept+LD.dSlope*q;if(p<0)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();
      // supply
      ctx.strokeStyle=th.curve2;ctx.lineWidth=3;ctx.beginPath();
      for(let q=0;q<=maxQ;q+=1){let p=LD.sIntercept+LD.sSlope*q;if(p>maxP)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();
      // eq point
      let eq=eqPoint(LD.dIntercept,LD.dSlope,LD.sIntercept,LD.sSlope);
      if(eq.q>0&&eq.p>0){
        ctx.fillStyle=th.eq;ctx.beginPath();ctx.arc(toX(eq.q,maxQ),toY(eq.p,maxP),8,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=th.text;ctx.font='bold 14px sans-serif';ctx.textAlign='left';
        ctx.fillText(`均衡 (${eq.q.toFixed(0)}, ${eq.p.toFixed(0)})`,toX(eq.q,maxQ)+14,toY(eq.p,maxP)-8);
      }
      // labels
      ctx.font='13px sans-serif';ctx.fillStyle=th.curve1;ctx.fillText('需求 D',toX(5,maxQ),toY(LD.dIntercept+LD.dSlope*5,maxP)-10);
      ctx.fillStyle=th.curve2;ctx.fillText('供给 S',toX(maxQ*0.7,maxQ),toY(LD.sIntercept+LD.sSlope*maxQ*0.7,maxP)-10);
    }break;
    case 1:{
      let maxQ=120,maxP=160;
      ctx.strokeStyle=th.curve1;ctx.lineWidth=3;ctx.beginPath();
      for(let q=0;q<=maxQ;q++){let p=LD.intercept+LD.slope*q;if(p<0)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();
      // show elasticity band
      let q1=LD.qBase,q2=LD.qBase+LD.pChange;let p1=LD.intercept+LD.slope*q1,p2=LD.intercept+LD.slope*q2;
      ctx.setLineDash([5,5]);ctx.strokeStyle='#f59e0b';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(toX(q1,maxQ),toY(0,maxP));ctx.lineTo(toX(q1,maxQ),toY(p1,maxP));ctx.lineTo(toX(0,maxQ),toY(p1,maxP));ctx.stroke();
      ctx.beginPath();ctx.moveTo(toX(q2,maxQ),toY(0,maxP));ctx.lineTo(toX(q2,maxQ),toY(p2,maxP));ctx.lineTo(toX(0,maxQ),toY(p2,maxP));ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(toX(q1,maxQ),toY(p1,maxP),6,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(toX(q2,maxQ),toY(p2,maxP),6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=th.text;ctx.font='12px sans-serif';ctx.textAlign='left';
      ctx.fillText(`A(${q1},${p1.toFixed(0)})`,toX(q1,maxQ)+10,toY(p1,maxP)-6);
      ctx.fillText(`B(${q2},${p2.toFixed(0)})`,toX(q2,maxQ)+10,toY(p2,maxP)-6);
    }break;
    case 2:{
      let maxQ=130,maxP=140;let eq=eqPoint(LD.dInt,LD.dSl,LD.sInt,LD.sSl);
      // CS fill
      if(LD.showCS){ctx.fillStyle=th.surplus1;ctx.beginPath();ctx.moveTo(toX(0,maxQ),toY(LD.dInt,maxP));ctx.lineTo(toX(eq.q,maxQ),toY(eq.p,maxP));ctx.lineTo(toX(0,maxQ),toY(eq.p,maxP));ctx.closePath();ctx.fill();}
      // PS fill
      if(LD.showPS){ctx.fillStyle=th.surplus2;ctx.beginPath();ctx.moveTo(toX(0,maxQ),toY(LD.sInt,maxP));ctx.lineTo(toX(eq.q,maxQ),toY(eq.p,maxP));ctx.lineTo(toX(0,maxQ),toY(eq.p,maxP));ctx.closePath();ctx.fill();}
      // curves
      ctx.strokeStyle=th.curve1;ctx.lineWidth=3;ctx.beginPath();for(let q=0;q<=maxQ;q++){let p=LD.dInt+LD.dSl*q;if(p<0)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();
      ctx.strokeStyle=th.curve2;ctx.lineWidth=3;ctx.beginPath();for(let q=0;q<=maxQ;q++){let p=LD.sInt+LD.sSl*q;if(p>maxP)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();
      ctx.fillStyle=th.eq;ctx.beginPath();ctx.arc(toX(eq.q,maxQ),toY(eq.p,maxP),8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=th.curve1;ctx.font='bold 13px sans-serif';ctx.textAlign='center';if(LD.showCS)ctx.fillText('消费者剩余',toX(eq.q*0.3,maxQ),toY((LD.dInt+eq.p)/2,maxP));
      ctx.fillStyle=th.curve2;if(LD.showPS)ctx.fillText('生产者剩余',toX(eq.q*0.3,maxQ),toY((LD.sInt+eq.p)/2,maxP));
    }break;
    case 3:{
      let maxQ=130,maxP=140;let eq=eqPoint(LD.dInt,LD.dSl,LD.sInt,LD.sSl);
      // curves
      ctx.strokeStyle=th.curve1;ctx.lineWidth=3;ctx.beginPath();for(let q=0;q<=maxQ;q++){let p=LD.dInt+LD.dSl*q;if(p<0)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();
      ctx.strokeStyle=th.curve2;ctx.lineWidth=3;ctx.beginPath();for(let q=0;q<=maxQ;q++){let p=LD.sInt+LD.sSl*q;if(p>maxP)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();
      ctx.fillStyle=th.eq;ctx.beginPath();ctx.arc(toX(eq.q,maxQ),toY(eq.p,maxP),6,0,Math.PI*2);ctx.fill();
      // ceiling
      if(LD.ceilingOn){
        ctx.setLineDash([8,4]);ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(m,toY(LD.ceiling,maxP));ctx.lineTo(W-m,toY(LD.ceiling,maxP));ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle='#f59e0b';ctx.font='12px sans-serif';ctx.textAlign='right';ctx.fillText(`价格上限 = ${LD.ceiling}`,W-m-10,toY(LD.ceiling,maxP)-8);
        if(LD.ceiling<eq.p){
          let qd=(LD.ceiling-LD.dInt)/LD.dSl,qs=(LD.ceiling-LD.sInt)/LD.sSl;
          ctx.fillStyle='rgba(239,68,68,0.15)';ctx.fillRect(toX(qs,maxQ),toY(LD.ceiling,maxP),toX(qd,maxQ)-toX(qs,maxQ),20);
          ctx.fillStyle=th.deadweight;ctx.beginPath();
          ctx.moveTo(toX(qs,maxQ),toY(LD.ceiling,maxP));
          ctx.lineTo(toX(eq.q,maxQ),toY(eq.p,maxP));
          ctx.lineTo(toX(qs,maxQ),toY(supplyP(qs,LD.sInt,LD.sSl),maxP));
          ctx.closePath();ctx.fill();
          ctx.fillStyle='#ef4444';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText(`短缺 = ${(qd-qs).toFixed(0)}`,toX((qd+qs)/2,maxQ),toY(LD.ceiling,maxP)+35);
          ctx.fillStyle='#f59e0b';ctx.fillText('DWL',toX((qs+eq.q)/2,maxQ),toY((LD.ceiling+eq.p)/2,maxP)-8);
        }
      }
      // floor
      if(LD.floorOn){
        ctx.setLineDash([8,4]);ctx.strokeStyle='#a855f7';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(m,toY(LD.floor,maxP));ctx.lineTo(W-m,toY(LD.floor,maxP));ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle='#a855f7';ctx.font='12px sans-serif';ctx.textAlign='right';ctx.fillText(`价格下限 = ${LD.floor}`,W-m-10,toY(LD.floor,maxP)-8);
        if(LD.floor>eq.p){
          let qd=(LD.floor-LD.dInt)/LD.dSl,qs=(LD.floor-LD.sInt)/LD.sSl;
          ctx.fillStyle='rgba(168,85,247,0.15)';ctx.fillRect(toX(qd,maxQ),toY(LD.floor,maxP)-20,toX(qs,maxQ)-toX(qd,maxQ),20);
          ctx.fillStyle=th.deadweight;ctx.beginPath();
          ctx.moveTo(toX(qd,maxQ),toY(demandP(qd,LD.dInt,LD.dSl),maxP));
          ctx.lineTo(toX(eq.q,maxQ),toY(eq.p,maxP));
          ctx.lineTo(toX(qd,maxQ),toY(LD.floor,maxP));
          ctx.closePath();ctx.fill();
          ctx.fillStyle='#a855f7';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText(`过剩 = ${(qs-qd).toFixed(0)}`,toX((qd+qs)/2,maxQ),toY(LD.floor,maxP)-25);
          ctx.fillStyle='#f59e0b';ctx.fillText('DWL',toX((qd+eq.q)/2,maxQ),toY((LD.floor+eq.p)/2,maxP)+16);
        }
      }
    }break;
    case 4:{
      let maxQ=130,maxP=160;
      let eq0=eqPoint(LD.dInt,LD.dSl,LD.sInt,LD.sSl);
      let sIntT=LD.sInt+LD.taxRate;
      let eqT=eqPoint(LD.dInt,LD.dSl,sIntT,LD.sSl);
      // original supply (dashed)
      ctx.setLineDash([5,5]);ctx.strokeStyle='rgba(239,68,68,0.4)';ctx.lineWidth=2;ctx.beginPath();
      for(let q=0;q<=maxQ;q++){let p=LD.sInt+LD.sSl*q;if(p>maxP)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();ctx.setLineDash([]);
      // shifted supply
      ctx.strokeStyle=th.curve2;ctx.lineWidth=3;ctx.beginPath();
      for(let q=0;q<=maxQ;q++){let p=sIntT+LD.sSl*q;if(p>maxP)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();
      // demand
      ctx.strokeStyle=th.curve1;ctx.lineWidth=3;ctx.beginPath();
      for(let q=0;q<=maxQ;q++){let p=LD.dInt+LD.dSl*q;if(p<0)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();
      // tax revenue rect
      if(LD.taxRate>0&&eqT.q>0){
        let pb=eqT.p,ps2=eqT.p-LD.taxRate;
        ctx.fillStyle=th.tax;ctx.fillRect(toX(0,maxQ),toY(pb,maxP),toX(eqT.q,maxQ)-m,toY(ps2,maxP)-toY(pb,maxP));
        // DWL triangle
        ctx.fillStyle=th.deadweight;ctx.beginPath();
        ctx.moveTo(toX(eqT.q,maxQ),toY(eqT.p,maxP));
        ctx.lineTo(toX(eq0.q,maxQ),toY(eq0.p,maxP));
        ctx.lineTo(toX(eqT.q,maxQ),toY(eqT.p-LD.taxRate,maxP));
        ctx.closePath();ctx.fill();
        ctx.fillStyle='#a855f7';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText('税收',toX(eqT.q/2,maxQ),toY((pb+ps2)/2,maxP)+4);
        ctx.fillStyle='#f59e0b';ctx.fillText('DWL',toX((eqT.q+eq0.q)/2,maxQ),toY(eq0.p,maxP));
      }
    }break;
    case 5:{
      let maxQ=130,maxP=160;
      // demand
      ctx.strokeStyle=th.curve1;ctx.lineWidth=3;ctx.beginPath();
      for(let q=0;q<=maxQ;q++){let p=LD.dInt+LD.dSl*q;if(p<0)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();
      // MC
      ctx.strokeStyle=th.curve2;ctx.lineWidth=3;ctx.beginPath();
      for(let q=0;q<=maxQ;q++){let p=LD.mcInt+LD.mcSlope*q;if(p>maxP)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();
      ctx.fillStyle=th.curve1;ctx.font='12px sans-serif';ctx.textAlign='left';ctx.fillText('D (需求)',toX(5,maxQ),toY(LD.dInt+LD.dSl*5,maxP)-8);
      ctx.fillStyle=th.curve2;ctx.fillText('MC (边际成本)',toX(maxQ*0.6,maxQ),toY(LD.mcInt+LD.mcSlope*maxQ*0.6,maxP)-8);
      if(LD.mode==='monopoly'){
        // MR line
        ctx.strokeStyle='#a855f7';ctx.lineWidth=2;ctx.setLineDash([5,3]);ctx.beginPath();
        for(let q=0;q<=maxQ;q++){let p=LD.dInt+2*LD.dSl*q;if(p<0)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle='#a855f7';ctx.fillText('MR',toX(20,maxQ),toY(LD.dInt+2*LD.dSl*20,maxP)-8);
        let qm=(LD.dInt-LD.mcInt)/(LD.mcSlope-2*LD.dSl);let pm=LD.dInt+LD.dSl*qm;
        let qc=(LD.dInt-LD.mcInt)/(LD.mcSlope-LD.dSl);let pc=LD.dInt+LD.dSl*qc;
        // DWL
        ctx.fillStyle=th.deadweight;ctx.beginPath();
        ctx.moveTo(toX(qm,maxQ),toY(pm,maxP));ctx.lineTo(toX(qc,maxQ),toY(pc,maxP));
        ctx.lineTo(toX(qm,maxQ),toY(LD.mcInt+LD.mcSlope*qm,maxP));ctx.closePath();ctx.fill();
        ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(toX(qm,maxQ),toY(pm,maxP),8,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=th.text;ctx.font='bold 12px sans-serif';ctx.fillText(`垄断 (${qm.toFixed(0)},${pm.toFixed(0)})`,toX(qm,maxQ)+12,toY(pm,maxP)-8);
      }else{
        let eq=eqPoint(LD.dInt,LD.dSl,LD.mcInt,LD.mcSlope);
        ctx.fillStyle=th.eq;ctx.beginPath();ctx.arc(toX(eq.q,maxQ),toY(eq.p,maxP),8,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=th.text;ctx.font='bold 12px sans-serif';ctx.fillText(`竞争 (${eq.q.toFixed(0)},${eq.p.toFixed(0)})`,toX(eq.q,maxQ)+12,toY(eq.p,maxP)-8);
      }
    }break;
    case 6:{
      let maxQ=130,maxP=140;
      // private supply
      ctx.strokeStyle=th.curve2;ctx.lineWidth=3;ctx.beginPath();
      for(let q=0;q<=maxQ;q++){let p=LD.sInt+LD.sSl*q;if(p>maxP)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();
      // social cost/benefit
      let socInt=LD.extType==='negative'?LD.sInt+LD.extSize:LD.sInt;
      let socDInt=LD.extType==='positive'?LD.dInt+LD.extSize:LD.dInt;
      ctx.setLineDash([6,4]);ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.beginPath();
      if(LD.extType==='negative'){for(let q=0;q<=maxQ;q++){let p=socInt+LD.sSl*q;if(p>maxP)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}}
      else{for(let q=0;q<=maxQ;q++){let p=socDInt+LD.dSl*q;if(p<0)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}}
      ctx.stroke();ctx.setLineDash([]);
      // corrected supply (with pigouvian)
      if(LD.pigouvian>0){
        let corrInt=LD.extType==='negative'?LD.sInt+LD.pigouvian:LD.sInt;
        let corrDInt=LD.extType==='positive'?LD.dInt+LD.pigouvian:LD.dInt;
        ctx.strokeStyle='#22c55e';ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.beginPath();
        if(LD.extType==='negative'){for(let q=0;q<=maxQ;q++){let p=corrInt+LD.sSl*q;if(p>maxP)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}}
        else{for(let q=0;q<=maxQ;q++){let p=corrDInt+LD.dSl*q;if(p<0)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}}
        ctx.stroke();ctx.setLineDash([]);
      }
      // demand
      ctx.strokeStyle=th.curve1;ctx.lineWidth=3;ctx.beginPath();
      for(let q=0;q<=maxQ;q++){let p=LD.dInt+LD.dSl*q;if(p<0)break;ctx.lineTo(toX(q,maxQ),toY(p,maxP))}ctx.stroke();
      // labels
      ctx.fillStyle=th.curve2;ctx.font='12px sans-serif';ctx.textAlign='left';ctx.fillText('私人供给',toX(maxQ*0.65,maxQ),toY(LD.sInt+LD.sSl*maxQ*0.65,maxP)-8);
      ctx.fillStyle='#f59e0b';ctx.fillText(LD.extType==='negative'?'社会成本':'社会收益',toX(maxQ*0.5,maxQ),toY((LD.extType==='negative'?socInt:socDInt)+(LD.extType==='negative'?LD.sSl:LD.dSl)*maxQ*0.5,maxP)-8);
      // eq points
      let eqPriv=eqPoint(LD.dInt,LD.dSl,LD.sInt,LD.sSl);
      let eqSoc=LD.extType==='negative'?eqPoint(LD.dInt,LD.dSl,socInt,LD.sSl):eqPoint(socDInt,LD.dSl,LD.sInt,LD.sSl);
      ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(toX(eqPriv.q,maxQ),toY(eqPriv.p,maxP),6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#22c55e';ctx.beginPath();ctx.arc(toX(eqSoc.q,maxQ),toY(eqSoc.p,maxP),6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=th.text;ctx.font='11px sans-serif';
      ctx.fillText('市场均衡',toX(eqPriv.q,maxQ)+10,toY(eqPriv.p,maxP)-6);
      ctx.fillText('社会最优',toX(eqSoc.q,maxQ)+10,toY(eqSoc.p,maxP)+14);
    }break;
  }
}

// === Summary ===
function showSummary(){
  if(quizPassed.size<7)return;
  let done=quizPassed.size*3;
  panel.innerHTML=`<div class="summary-box"><div class="summary-title">🎉 市场经济探险完成！</div><div class="summary-sub">你已掌握市场经济的核心机制</div><div class="summary-stats"><div class="summary-stat"><div class="num">${quizPassed.size}/7</div><div class="label">测验通过</div></div><div class="summary-stat"><div class="num">${done}/21</div><div class="label">目标达成</div></div></div><div class="summary-keys"><div>📊 供给与需求决定均衡价格</div><div>📐 弹性衡量价格敏感度</div><div>💰 自由市场最大化总剩余</div><div>⚖️ 价格管制造成短缺或过剩</div><div>🏛️ 税收产生无谓损失</div><div>🏭 垄断导致效率损失</div><div>🌍 外部性需要政府干预</div></div></div><button class="act-btn" style="margin-top:12px" onclick="restartFromSummary()">再玩一次</button>`;
}
function restartFromSummary(){
  levelObjs=Array.from({length:7},()=>[false,false,false]);
  quizPassed.clear();
  quizFeedback={};
  goLevel(0);
  return true;
}

// === Animation loop ===
function mainLoop(){requestAnimationFrame(mainLoop);draw()}
requestAnimationFrame(mainLoop);
