<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电池与储能技术交互式教育</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}


body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro',sans-serif;overflow:hidden;height:100vh}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:var(--overlay-bg);display:flex;align-items:center;justify-content:center;z-index:50}
.overlay.hidden{display:none}
.start-box{text-align:center;max-width:560px}
.start-box h1{font-size:38px;margin-bottom:6px;letter-spacing:2px}
.start-box h1 .gold{color:#60a5fa}
.start-box .sub{font-size:17px;color:var(--sub-color);margin-bottom:28px}
.start-btn{background:linear-gradient(135deg,#3b82f6,#60a5fa);color:#fff;border:none;padding:14px 52px;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;transition:transform .2s}
.start-btn:hover{transform:scale(1.05)}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:#aaa;font-size:12px;width:80px}
.feat .fi{font-size:26px;margin-bottom:4px}
.panel{position:absolute;top:0;left:0;width:320px;height:calc(100% - 32px);background:var(--panel-bg);border-right:1px solid var(--panel-border);overflow-y:auto;z-index:10;padding:12px;box-sizing:border-box;display:none;padding-bottom:16px}
.level-btn{display:none!important}
.level-btn.active{display:none!important}
.level-btn.done{display:none!important}
.concept-box{background:var(--concept-bg);border:1px solid var(--concept-border);border-radius:8px;padding:10px;margin:8px 0;font-size:13px;line-height:1.7;color:var(--concept-text)}
.goal-row{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:12px}
.g-icon{font-size:14px}
.g-text{color:var(--text-sub)}
.g-text.done{color:#059669;text-decoration:line-through}
.act-btn{display:block;width:100%;padding:10px;margin:4px 0;border-radius:8px;border:1px solid var(--btn-border);background:var(--btn-bg);color:var(--btn-text);font-size:15px;cursor:pointer;text-align:center}
.act-btn:hover{background:var(--btn-hover)}
.act-btn:disabled{opacity:0.4;cursor:not-allowed}
.act-btn.green{border-color:var(--btn-green-border);background:var(--btn-green-bg);color:var(--btn-green-text)}
.hint-box{background:var(--hint-bg);border:1px solid var(--hint-border);border-radius:8px;padding:8px;margin:8px 0;font-size:12px;color:var(--hint-text)}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:10px;padding:12px;margin:10px 0;font-size:14px;line-height:1.8;color:var(--learn-text)}
.slider-wrap{margin:8px 0}
.slider-wrap label{font-size:11px;color:#888}
.slider-wrap input[type=range]{width:100%;margin-top:4px;accent-color:#3b82f6}
.sv{color:var(--sv);font-weight:bold}
.m-title{font-size:17px;font-weight:700;margin:8px 0 4px;color:#1e293b}
.m-sub{font-size:12px;color:#888;margin-bottom:8px}
#bottom-bar{position:absolute;bottom:0;left:0;right:0;height:32px;background:var(--bar-bg);border-top:1px solid var(--bar-border);z-index:20;display:none;align-items:center;padding:0 16px;font-size:11px;color:#666}
#bottom-bar .bb-left{flex:1}
#bottom-bar .bb-right{text-align:right}
.overlay .result-box{text-align:center;max-width:420px;background:var(--result-bg);border:1px solid var(--result-border);border-radius:16px;padding:28px 36px;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
.result-box .rb-icon{font-size:48px;margin-bottom:10px}
.result-box .rb-title{font-size:22px;font-weight:700;margin-bottom:8px}
.result-box .rb-learn{text-align:left;background:var(--concept-bg);border-radius:8px;padding:12px 14px;font-size:13px;color:#1e40af;line-height:1.7;margin-bottom:16px}
.result-box button{padding:10px 28px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin:0 6px}
.result-box .btn-next{background:#3b82f6;color:#fff}
.result-box .btn-retry{background:var(--stage-bar);color:var(--text-sub)}

#roadmap-container{display:none}
.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<canvas id="canvas"></canvas>
<div class="overlay" id="startScreen">
<div class="start-box">
  <h1>🔋 <span class="gold">电池与储能</span>技术探险</h1>
  <div class="sub">7 个关卡，从原电池到电网级储能</div>
  <div id="roadmap-container"></div>
<button class="start-btn" onclick="startGame()">开始探险</button>
  <div class="features">
    <div class="feat"><div class="fi">⚗️</div>氧化还原</div>
    <div class="feat"><div class="fi">🔋</div>锂离子电池</div>
    <div class="feat"><div class="fi">📈</div>充放电曲线</div>
    <div class="feat"><div class="fi">🔥</div>热失控</div>
    <div class="feat"><div class="fi">💎</div>固态电池</div>
    <div class="feat"><div class="fi">⚖️</div>BMS管理</div>
    <div class="feat"><div class="fi">🏭</div>储能电站</div>
  </div>
</div>
</div>
<div class="overlay hidden" id="resultModal"><div class="result-box" id="resultBox"></div></div>
<div class="panel" id="panel"></div>
<div id="bottom-bar"><span class="bb-left" id="bbLeft"></span><span class="bb-right" id="bbRight"></span></div>
<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}}

const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let CW,CH,time=0,animId;
let gameState='start',currentLevel=0;
let levelState={},stars=[],particles=[];
const completedLevels=new Set();

const levels=[
{title:'氧化还原',sub:'原电池的诞生',concept:'将锌片放入硫酸铜溶液中，锌失去电子被氧化（溶解），铜离子得到电子被还原（沉积）。电子从锌流向铜——这就是原电池的基本原理。',goals:['将锌片放入硫酸铜溶液','观察锌溶解与铜沉积','观察电子流动方向'],learn:'原电池是化学能转化为电能的装置。锌比铜活泼，更容易失去电子。这个"活泼性差异"就是电池电压的来源。伏打在1800年发明的第一个电池，就是基于这个原理——锌铜原电池。'},
{title:'锂离子电池',sub:'充放电的嵌入脱嵌',concept:'锂离子电池充电时，锂离子从正极（钴酸锂）脱出，穿过电解液，嵌入负极（石墨层）。放电时反向移动。锂离子像穿梭巴士一样在两极间来回。',goals:['完成一次充电过程','完成一次放电过程','理解嵌入脱嵌机制'],learn:'锂离子电池的核心是"摇椅机制"——锂离子在正负极之间来回嵌入脱出，像坐摇椅一样。石墨层间距恰好能容纳锂离子，钴酸锂的层状结构也能让锂离子自由进出。这种可逆的嵌入脱嵌，让电池能反复充放电数百次。'},
{title:'充放电曲线',sub:'倍率性能',concept:'电池以不同电流放电时，表现差异很大。小电流（0.1C）放电电压平台高、容量大；大电流（3C）放电电压平台低、容量小。这就是倍率性能。',goals:['观察0.5C放电曲线','观察2C以上放电曲线','对比不同倍率的容量差异'],learn:'C是电池容量的倍率单位。1C表示1小时放完全部电量的电流。大电流放电时，电池内阻导致更大的电压降，而且锂离子来不及扩散到电极深处，导致实际可用容量减小。这就是为什么电动车急加速时续航会明显缩短。'},
{title:'热失控',sub:'电池安全',concept:'过充（电压>4.2V）或短路会导致电池内部温度急剧升高。SEI膜在~130°C分解→正极在~200°C释放氧气→电解液燃烧→链式放热反应→热失控！',goals:['触发过充或短路条件','观察温度链式上升','理解热失控的危险'],learn:'热失控是锂电池最危险的失效模式。一旦启动，温度在几秒内从150°C飙升到800°C以上，无法阻止。三星Note7爆炸、波音787起火都是热失控。现代电池设计了多重保护：PTC热敏电阻、CID压力阀、陶瓷涂层隔膜，但仍无法100%杜绝。'},
{title:'固态电池',sub:'下一代技术',concept:'液态电解质存在锂枝晶穿透隔膜导致短路的风险。固态电解质（陶瓷/硫化物）能物理阻挡枝晶生长，同时兼容锂金属负极，能量密度翻倍。',goals:['观察液态电池的枝晶风险','观察固态电池的安全性','对比两种技术的差异'],learn:'固态电池被认为是锂电池的"终极形态"。用固态电解质替代易燃的液态电解液，不仅更安全，还能使用锂金属负极（理论容量是石墨的10倍）。丰田、三星SDI、宁德时代都在竞相研发。预计2027-2030年量产，届时电动车续航将突破1000公里。'},
{title:'BMS电池管理',sub:'均衡与SOC估算',concept:'多节电池串联时，由于制造差异，各节电压会不一致。BMS（电池管理系统）通过均衡电路让高压电池放电、低压电池充电，保持一致性。SOC（荷电状态）估算是BMS的核心算法。',goals:['执行电压均衡操作','使4节电池电压差<0.05V','完成SOC校准'],learn:'BMS是电池包的"大脑"。它实时监测每节电池的电压、温度、电流，执行均衡、SOC估算、故障诊断。没有BMS，电池包寿命会急剧缩短——因为最弱的那节电池会被过充或过放，率先损坏，拖累整个电池包。'},
{title:'储能电站',sub:'调峰填谷',concept:'风光发电"靠天吃饭"，白天多晚上少。储能电站在发电高峰时充电存储多余电力，在用电高峰时放电补充不足，实现电网功率平衡——这就是"调峰填谷"。',goals:['组装电池阵列到机架','完成白天充电过程','完成夜间放电调峰'],learn:'电网级储能是新能源大规模应用的关键。一个100MW/400MWh的储能电站，能在4小时内为10万户家庭供电。目前主流技术是磷酸铁锂电池，循环寿命超过6000次。中国已建成全球最大的储能装机容量，2025年超过100GW。'}
];

function resize(){CW=canvas.width=innerWidth;CH=canvas.height=innerHeight;initStars()}
function initStars(){stars=[];for(let i=0;i<80;i++)stars.push({x:Math.random()*CW,y:Math.random()*CH,r:Math.random()*1.5+.3,tw:Math.random()*Math.PI*2,sp:Math.random()*.02+.005})}
function drawStars(){for(let s of stars){const a=.4+.6*Math.abs(Math.sin(s.tw+time*s.sp));ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()}}
function addP(x,y,vx,vy,col,life,sz){particles.push({x,y,vx,vy,col,life,ml:life,sz:sz||3})}
function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<=0)particles.splice(i,1)}}
function drawParticles(){for(let p of particles){const a=Math.max(0,p.life/p.ml);ctx.globalAlpha=a;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*a,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
window.addEventListener('resize',resize);
resize();

function startGame(){
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('panel').style.display='block';
  document.getElementById('bottom-bar').style.display='flex';
  gameState='play';currentLevel=0;initLevel(0);renderPanel();
}

function initLevel(idx){
  currentLevel=idx;particles=[];
  const cx=CW/2+160,cy=CH/2;
  if(idx===0){
    levelState={phase:'ready',zincPlate:{x:cx-120,y:cy-40,w:30,h:100,dissolved:0},solution:{x:cx-80,y:cy-60,w:200,h:160},copperDeposit:[],electrons:[],ions:[],goalDone:[false,false,false],started:false,elapsed:0};
  }else if(idx===1){
    levelState={mode:'idle',lithiumIons:[],chargeProgress:0,dischargeProgress:0,charged:false,discharged:false,goalDone:[false,false,false],elapsed:0};
  }else if(idx===2){
    levelState={cRate:0.5,curves:[],currentCurve:null,drawing:false,drawnRates:new Set(),goalDone:[false,false,false],elapsed:0};
  }else if(idx===3){
    levelState={voltage:3.7,mode:'normal',temp:25,seiDecomp:false,cathodeOxygen:false,electrolyteIgnite:false,runaway:false,elapsed:0,tempHistory:[],goalDone:[false,false,false],triggered:false};
  }else if(idx===4){
    levelState={viewMode:'liquid',liquidDendrite:0,solidIonPos:[],elapsed:0,goalDone:[false,false,false],seenLiquid:false,seenSolid:false};
  }else if(idx===5){
    levelState={cells:[{v:3.92,soc:78},{v:3.65,soc:52},{v:4.05,soc:88},{v:3.78,soc:65}],balancing:false,balanceElapsed:0,socSlider:70,socCalibrated:false,goalDone:[false,false,false],elapsed:0};
  }else if(idx===6){
    levelState={rack:[[null,null,null],[null,null,null]],modules:[ {id:0,x:cx-200,y:cy+140},{id:1,x:cx-120,y:cy+140},{id:2,x:cx-40,y:cy+140},{id:3,x:cx+40,y:cy+140},{id:4,x:cx+120,y:cy+140},{id:5,x:cx+200,y:cy+140}],dragging:null,dragOff:{x:0,y:0},timeOfDay:6,simRunning:false,gridPower:0,solarWind:0,batteryCharge:50,chargedDay:false,dischargedNight:false,goalDone:[false,false,false],elapsed:0,assembled:false,powerHistory:[]};
  }
  renderPanel();
}

function renderPanel(){
  const L=levels[currentLevel],S=levelState,p=document.getElementById('panel');
  let h='<div style="margin-bottom:8px">';
  for(let i=0;i<levels.length;i++){
    let cls='level-btn';if(i===currentLevel)cls+=' active';if(completedLevels.has(i))cls+=' done';
    h+=`<span class="${cls}" onclick="switchLevel(${i})">第${i+1}关</span>`;
  }
  h+='</div>';
  h+=`<div class="m-title">${L.title}</div><div class="m-sub">${L.sub}</div>`;
  h+=`<div class="concept-box">${L.concept}</div>`;
  h+='<div style="margin:8px 0;font-size:12px;color:var(--text-muted);font-weight:600">目标清单</div>';
  for(let i=0;i<L.goals.length;i++){
    const done=S.goalDone&&S.goalDone[i];
    h+=`<div class="goal-row"><span class="g-icon">${done?'✅':'⬜'}</span><span class="g-text${done?' done':''}">${L.goals[i]}</span></div>`;
  }
  h+=renderLevelActions();
  if(S.goalDone&&S.goalDone.every(g=>g)&&!completedLevels.has(currentLevel)){
    completedLevels.add(currentLevel);
  }
  if(completedLevels.has(currentLevel)){
    h+=`<div class="learn-box">🎓 ${L.learn}</div>`;
    if(currentLevel<levels.length-1)h+=`<button class="act-btn green" onclick="switchLevel(${currentLevel+1})">下一关 →</button>`;
    else h+=`${_summaryHTML()}`;
  }
  p.innerHTML=h;
  document.getElementById('bbLeft').textContent=`第 ${currentLevel+1} 关：${L.title}`;
  document.getElementById('bbRight').textContent=`已通关 ${completedLevels.size}/${levels.length}`;
}

function switchLevel(i){if(i>=0&&i<levels.length){initLevel(i);renderPanel()}}

function renderLevelActions(){
  const S=levelState;let h='';
  if(currentLevel===0){
    if(!S.started)h+=`<button class="act-btn" onclick="startRedox()">将锌片放入溶液</button>`;
    else h+=`<div class="hint-box">⚡ 反应进行中...锌在溶解，铜在沉积</div>`;
    h+=`<div style="font-size:11px;color:var(--text-muted);margin-top:6px">锌溶解: ${(S.dissolved||0).toFixed(0)}% | 铜沉积: ${S.copperDeposit?S.copperDeposit.length:0} 个粒子</div>`;
  }else if(currentLevel===1){
    h+=`<button class="act-btn" onclick="startCharge()" ${S.mode==='charging'?'disabled':''}>充电 ⚡→</button>`;
    h+=`<button class="act-btn" onclick="startDischarge()" ${S.mode==='discharging'?'disabled':''}>放电 ←⚡</button>`;
    if(S.mode==='charging')h+=`<div class="hint-box">充电中...锂离子从正极→负极 (${(S.chargeProgress*100).toFixed(0)}%)</div>`;
    if(S.mode==='discharging')h+=`<div class="hint-box">放电中...锂离子从负极→正极 (${(S.dischargeProgress*100).toFixed(0)}%)</div>`;
  }else if(currentLevel===2){
    h+=`<div class="slider-wrap"><label>放电倍率: <span class="sv">${S.cRate.toFixed(1)}C</span></label><input type="range" min="1" max="30" value="${S.cRate*10}" oninput="setCRate(this.value)"></div>`;
    h+=`<button class="act-btn" onclick="startDraw()" ${S.drawing?'disabled':''}>开始放电测试</button>`;
    if(S.drawnRates.size>0)h+=`<div style="font-size:11px;color:var(--text-muted);margin-top:4px">已测试: ${[...S.drawnRates].map(r=>r+'C').join(', ')}</div>`;
  }else if(currentLevel===3){
    h+=`<div class="slider-wrap"><label>电池电压: <span class="sv">${S.voltage.toFixed(1)}V</span></label><input type="range" min="30" max="50" value="${S.voltage*10}" oninput="setVoltage(this.value)" ${S.runaway?'disabled':''}></div>`;
    h+=`<button class="act-btn" onclick="triggerShortCircuit()" ${S.runaway||S.triggered?'disabled':''}>模拟短路</button>`;
    h+=`<div style="font-size:11px;color:var(--text-muted);margin-top:4px">温度: <span style="color:${S.temp>150?'#f87171':S.temp>80?'#fbbf24':'#4ade80'}">${S.temp.toFixed(0)}°C</span></div>`;
    if(S.seiDecomp)h+=`<div style="font-size:11px;color:#f87171">⚠ SEI膜分解 (130°C)</div>`;
    if(S.cathodeOxygen)h+=`<div style="font-size:11px;color:#f87171">⚠ 正极释氧 (200°C)</div>`;
    if(S.electrolyteIgnite)h+=`<div style="font-size:11px;color:#f87171">🔥 电解液燃烧 (250°C)</div>`;
    if(S.runaway)h+=`<div style="font-size:11px;color:#ef4444;font-weight:bold">🚨 热失控！温度失控上升！</div>`;
  }else if(currentLevel===4){
    h+=`<button class="act-btn" onclick="setView('liquid')" ${S.viewMode==='liquid'?'disabled':''}>查看液态电池</button>`;
    h+=`<button class="act-btn" onclick="setView('solid')" ${S.viewMode==='solid'?'disabled':''}>查看固态电池</button>`;
    if(S.viewMode==='liquid')h+=`<div class="hint-box">⚠ 液态电解质中锂枝晶正在生长...可能穿透隔膜！</div>`;
    else h+=`<div class="hint-box">✅ 固态电解质有效阻挡枝晶，锂离子沿晶界安全传导</div>`;
  }else if(currentLevel===5){
    h+=`<div style="font-size:11px;color:var(--text-muted);margin:4px 0">电池组电压:</div>`;
    for(let i=0;i<4;i++)h+=`<div style="font-size:11px;color:${Math.abs(S.cells[i].v-S.cells[0].v)>0.2?'#fbbf24':'#4ade80'}">Cell ${i+1}: ${S.cells[i].v.toFixed(3)}V (SOC ${S.cells[i].soc.toFixed(0)}%)</div>`;
    h+=`<button class="act-btn" onclick="startBalance()" ${S.balancing?'disabled':''}>执行均衡</button>`;
    const maxV=Math.max(...S.cells.map(c=>c.v)),minV=Math.min(...S.cells.map(c=>c.v));
    h+=`<div style="font-size:11px;color:var(--text-muted);margin-top:4px">电压差: ${((maxV-minV)*1000).toFixed(0)}mV</div>`;
    h+=`<div class="slider-wrap"><label>SOC估算: <span class="sv">${S.socSlider}%</span></label><input type="range" min="0" max="100" value="${S.socSlider}" oninput="setSoc(this.value)"></div>`;
    const avgSoc=S.cells.reduce((a,c)=>a+c.soc,0)/4;
    h+=`<button class="act-btn" onclick="calibrateSoc()">校准SOC</button>`;
    if(S.socCalibrated)h+=`<div style="font-size:11px;color:#4ade80">✅ SOC校准完成</div>`;
  }else if(currentLevel===6){
    const filled=S.rack.flat().filter(x=>x!==null).length;
    h+=`<div style="font-size:11px;color:var(--text-muted);margin:4px 0">机架: ${filled}/6 模组已安装</div>`;
    if(!S.assembled)h+=`<div class="hint-box">拖拽下方电池模组到机架槽位中</div>`;
    else if(!S.simRunning)h+=`<button class="act-btn" onclick="startGridSim()">启动储能模拟</button>`;
    else{
      h+=`<div style="font-size:11px;color:var(--text-muted);margin:4px 0">时间: ${S.timeOfDay.toFixed(1)}h | 电量: ${S.batteryCharge.toFixed(0)}%</div>`;
      h+=`<div style="font-size:11px;color:var(--text-muted)">风光发电: ${S.solarWind.toFixed(0)}MW | 电网负荷: ${S.gridPower.toFixed(0)}MW</div>`;
    }
  }
  return h;
}

// Level 0: Redox
function startRedox(){levelState.started=true;levelState.goalDone[0]=true;renderPanel()}

// Level 1: Li-ion
function startCharge(){const S=levelState;if(S.mode==='charging')return;S.mode='charging';S.chargeProgress=0;S.lithiumIons=[];renderPanel()}
function startDischarge(){const S=levelState;if(S.mode==='discharging')return;S.mode='discharging';S.dischargeProgress=0;S.lithiumIons=[];renderPanel()}

// Level 2: Curves
function setCRate(v){levelState.cRate=v/10;renderPanel()}
function startDraw(){const S=levelState;if(S.drawing)return;S.drawing=true;S.currentCurve={rate:S.cRate,points:[],progress:0};renderPanel()}

// Level 3: Thermal runaway
function setVoltage(v){const S=levelState;S.voltage=v/10;if(S.voltage>4.2&&!S.triggered){S.triggered=true;S.goalDone[0]=true;renderPanel()}renderPanel()}
function triggerShortCircuit(){const S=levelState;S.triggered=true;S.voltage=4.5;S.goalDone[0]=true;renderPanel()}

// Level 4: Solid state
function setView(m){const S=levelState;S.viewMode=m;if(m==='liquid'){S.seenLiquid=true;S.liquidDendrite=0}else{S.seenSolid=true;S.solidIonPos=[]}
if(S.seenLiquid&&!S.goalDone[0]){S.goalDone[0]=true;renderPanel()}
if(S.seenSolid&&!S.goalDone[1]){S.goalDone[1]=true;renderPanel()}
if(S.seenLiquid&&S.seenSolid&&!S.goalDone[2]){S.goalDone[2]=true;renderPanel()}
renderPanel()}

// Level 5: BMS
function startBalance(){levelState.balancing=true;levelState.balanceElapsed=0;renderPanel()}
function setSoc(v){levelState.socSlider=parseInt(v);renderPanel()}
function calibrateSoc(){const S=levelState;const avgSoc=S.cells.reduce((a,c)=>a+c.soc,0)/4;if(Math.abs(S.socSlider-avgSoc)<10){S.socCalibrated=true;if(!S.goalDone[2]){S.goalDone[2]=true;renderPanel()}}renderPanel()}

// Level 6: Grid storage
function startGridSim(){levelState.simRunning=true;levelState.timeOfDay=6;renderPanel()}

// Mouse for Level 6 drag
canvas.addEventListener('mousedown',e=>{
  if(currentLevel!==6||levelState.assembled)return;
  const S=levelState,mx=e.clientX,my=e.clientY;
  for(let m of S.modules){
    if(mx>m.x-25&&mx<m.x+25&&my>m.y-20&&my<m.y+20){
      S.dragging=m;S.dragOff={x:mx-m.x,y:my-m.y};break;
    }
  }
});
canvas.addEventListener('mousemove',e=>{
  if(currentLevel!==6||!levelState.dragging)return;
  levelState.dragging.x=e.clientX-levelState.dragOff.x;
  levelState.dragging.y=e.clientY-levelState.dragOff.y;
});
canvas.addEventListener('mouseup',e=>{
  if(currentLevel!==6||!levelState.dragging)return;
  const S=levelState,m=S.dragging;S.dragging=null;
  const cx=CW/2+160,cy=CH/2;
  const rackX=cx-120,rackY=cy-80;
  for(let r=0;r<2;r++)for(let c=0;c<3;c++){
    const sx=rackX+c*80,sy=rackY+r*60;
    if(S.rack[r][c]===null&&Math.abs(m.x-sx)<40&&Math.abs(m.y-sy)<30){
      S.rack[r][c]=m.id;m.x=sx;m.y=sy;
      const filled=S.rack.flat().filter(x=>x!==null).length;
      if(filled===6&&!S.assembled){S.assembled=true;S.goalDone[0]=true;renderPanel()}
      return;
    }
  }
});

function update(dt){
  const S=levelState;
  if(currentLevel===0&&S.started){
    S.elapsed+=dt;S.dissolved=Math.min(100,S.dissolved+dt*8);
    const cx=CW/2+160,cy=CH/2;
    // zinc dissolving particles
    if(Math.random()<0.3){const px=S.zincPlate.x+S.zincPlate.w/2,py=S.zincPlate.y+Math.random()*S.zincPlate.h;addP(px,py,(Math.random()-0.5)*40,-(Math.random()*30+10),'#a0a0a0',1.5,2)}
    // copper depositing
    if(Math.random()<0.2&&S.copperDeposit.length<60){S.copperDeposit.push({x:cx+60+Math.random()*30,y:cy-40+Math.random()*100,r:Math.random()*3+1})}
    // electron arrows
    if(S.elapsed>1&&Math.random()<0.15){S.electrons.push({x:S.zincPlate.x+15,y:cy-80,progress:0})}
    for(let e of S.electrons)e.progress+=dt*0.5;
    S.electrons=S.electrons.filter(e=>e.progress<1);
    if(S.dissolved>30&&!S.goalDone[1]){S.goalDone[1]=true;renderPanel()}
    if(S.electrons.length>0&&S.dissolved>50&&!S.goalDone[2]){S.goalDone[2]=true;renderPanel()}
  }
  else if(currentLevel===1){
    const cx=CW/2+160,cy=CH/2;
    if(S.mode==='charging'){
      S.chargeProgress+=dt*0.25;
      if(Math.random()<0.3){S.lithiumIons.push({x:cx+80,y:cy-30+Math.random()*60,progress:0})}
      for(let ion of S.lithiumIons)ion.progress+=dt*0.4;
      S.lithiumIons=S.lithiumIons.filter(i=>i.progress<1);
      if(S.chargeProgress>=1){S.mode='idle';S.charged=true;S.chargeProgress=1;S.lithiumIons=[];if(!S.goalDone[0]){S.goalDone[0]=true;renderPanel()}}
      else if(Math.floor(S.chargeProgress*10)%3===0)renderPanel();
    }else if(S.mode==='discharging'){
      S.dischargeProgress+=dt*0.25;
      if(Math.random()<0.3){S.lithiumIons.push({x:cx-80,y:cy-30+Math.random()*60,progress:0})}
      for(let ion of S.lithiumIons)ion.progress+=dt*0.4;
      S.lithiumIons=S.lithiumIons.filter(i=>i.progress<1);
      if(S.dischargeProgress>=1){S.mode='idle';S.discharged=true;S.dischargeProgress=1;S.lithiumIons=[];if(!S.goalDone[1]){S.goalDone[1]=true;renderPanel()}}
    }
    if(S.charged&&S.discharged&&!S.goalDone[2]){S.goalDone[2]=true;renderPanel()}
  }
  else if(currentLevel===2&&S.drawing){
    const c=S.currentCurve;c.progress+=dt*0.3*(0.5+c.rate);
    const cap=1-c.rate*0.15;const vPlat=3.7-c.rate*0.15;
    const x=c.progress;let v;
    if(x<0.05)v=4.2-(4.2-vPlat)*(x/0.05);
    else if(x<cap*0.85)v=vPlat;
    else if(x<cap)v=vPlat-(vPlat-2.8)*((x-cap*0.85)/(cap*0.15));
    else v=2.8;
    c.points.push({x:Math.min(x,cap),v:Math.max(v,2.8)});
    if(c.progress>=cap+0.05){
      S.drawing=false;S.curves.push({rate:c.rate,points:c.points});S.drawnRates.add(c.rate);S.currentCurve=null;
      if(c.rate<=0.5&&!S.goalDone[0]){S.goalDone[0]=true;renderPanel()}
      if(c.rate>=2&&!S.goalDone[1]){S.goalDone[1]=true;renderPanel()}
      if(S.drawnRates.size>=2&&S.goalDone[0]&&S.goalDone[1]&&!S.goalDone[2]){S.goalDone[2]=true;renderPanel()}
      renderPanel();
    }
  }
  else if(currentLevel===3&&S.triggered){
    S.elapsed+=dt;
    if(S.voltage>4.2||S.triggered){
      const heatRate=S.runaway?80:S.temp>200?40:S.temp>130?15:5;
      S.temp+=heatRate*dt;
      S.tempHistory.push({t:S.elapsed,temp:S.temp});
      if(S.temp>130&&!S.seiDecomp){S.seiDecomp=true;renderPanel()}
      if(S.temp>200&&!S.cathodeOxygen){S.cathodeOxygen=true;renderPanel()}
      if(S.temp>250&&!S.electrolyteIgnite){S.electrolyteIgnite=true;S.runaway=true;renderPanel()}
      if(S.temp>130&&!S.goalDone[1]){S.goalDone[1]=true;renderPanel()}
      if(S.runaway&&!S.goalDone[2]){S.goalDone[2]=true;renderPanel()}
      if(S.temp>300){
        if(Math.random()<0.5){const cx=CW/2+160,cy=CH/2;addP(cx+Math.random()*100-50,cy+Math.random()*60-30,(Math.random()-0.5)*80,(Math.random()-0.5)*80,'#ff4444',0.8,4)}
      }
    }
  }
  else if(currentLevel===4){
    S.elapsed+=dt;
    if(S.viewMode==='liquid'){S.liquidDendrite=Math.min(1,S.liquidDendrite+dt*0.12)}
    else{
      if(S.solidIonPos.length<20&&Math.random()<0.2){const cx=CW/2+160,cy=CH/2;S.solidIonPos.push({x:cx-60+Math.random()*120,y:cy-40+Math.random()*80,phase:Math.random()*Math.PI*2})}
    }
  }
  else if(currentLevel===5&&S.balancing){
    S.balanceElapsed+=dt;
    const maxV=Math.max(...S.cells.map(c=>c.v)),minV=Math.min(...S.cells.map(c=>c.v));
    const avg=S.cells.reduce((a,c)=>a+c.v,0)/4;
    for(let c of S.cells){
      if(c.v>avg+0.001){c.v-=dt*0.03;c.soc-=dt*0.8}
      else if(c.v<avg-0.001){c.v+=dt*0.02;c.soc+=dt*0.6}
    }
    const newMax=Math.max(...S.cells.map(c=>c.v)),newMin=Math.min(...S.cells.map(c=>c.v));
    if(!S.goalDone[0]){S.goalDone[0]=true;renderPanel()}
    if(newMax-newMin<0.05){S.balancing=false;if(!S.goalDone[1]){S.goalDone[1]=true;renderPanel()}}
    if(S.balanceElapsed>0.5)renderPanel();
  }
  else if(currentLevel===6&&S.simRunning){
    S.elapsed+=dt;S.timeOfDay+=dt*2;if(S.timeOfDay>=24)S.timeOfDay-=24;
    const h=S.timeOfDay;
    S.solarWind=h>6&&h<18?80*Math.sin((h-6)/12*Math.PI):5+Math.random()*10;
    S.gridPower=50+30*Math.sin((h-2)/24*Math.PI*2);
    const surplus=S.solarWind-S.gridPower;
    if(surplus>0&&S.batteryCharge<100){S.batteryCharge=Math.min(100,S.batteryCharge+surplus*dt*0.3);if(h>8&&h<16&&!S.chargedDay){S.chargedDay=true;S.goalDone[1]=true;renderPanel()}}
    else if(surplus<0&&S.batteryCharge>0){S.batteryCharge=Math.max(0,S.batteryCharge+surplus*dt*0.3);if((h>18||h<6)&&!S.dischargedNight){S.dischargedNight=true;S.goalDone[2]=true;renderPanel()}}
    S.powerHistory.push({t:S.timeOfDay,solar:S.solarWind,grid:S.gridPower,bat:S.batteryCharge});
    if(S.powerHistory.length>300)S.powerHistory.shift();
    if(S.elapsed%1<dt)renderPanel();
  }
  updateParticles(dt);
}

function drawLevel(){
  const S=levelState,cx=CW/2+160,cy=CH/2;
  if(currentLevel===0)drawRedox(S,cx,cy);
  else if(currentLevel===1)drawLithium(S,cx,cy);
  else if(currentLevel===2)drawCurves(S,cx,cy);
  else if(currentLevel===3)drawThermal(S,cx,cy);
  else if(currentLevel===4)drawSolid(S,cx,cy);
  else if(currentLevel===5)drawBMS(S,cx,cy);
  else if(currentLevel===6)drawGrid(S,cx,cy);
}

function drawRedox(S,cx,cy){
  // Solution container
  ctx.fillStyle='rgba(30,80,160,0.3)';ctx.fillRect(cx-80,cy-60,200,160);
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.strokeRect(cx-80,cy-60,200,160);
  ctx.fillStyle='rgba(30,100,200,0.15)';ctx.fillRect(cx-80,cy-20,200,120);
  ctx.font='17px sans-serif';ctx.fillStyle='#60a5fa';ctx.fillText('CuSO₄ 溶液',cx-10,cy+110);
  // Zinc plate
  const zd=S.dissolved||0;const zw=30*(1-zd/200);
  ctx.fillStyle=`rgba(160,160,170,${1-zd/200})`;ctx.fillRect(cx-120,cy-40,zw,100);
  ctx.font='18px sans-serif';ctx.fillStyle='#ccc';ctx.fillText('Zn',cx-118,cy-48);
  // Copper deposits
  for(let d of S.copperDeposit){ctx.fillStyle='#e87040';ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill()}
  if(S.copperDeposit.length>5){ctx.fillStyle='#e87040';ctx.fillText('Cu 沉积',cx+65,cy-48)}
  // Electron flow arrows
  if(S.started){
    for(let e of S.electrons){
      const ex=cx-120+e.progress*220,ey=cy-80;
      ctx.fillStyle='#60a5fa';ctx.beginPath();ctx.arc(ex,ey,4,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#60a5fa';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(ex-8,ey);ctx.lineTo(ex-14,ey-4);ctx.moveTo(ex-8,ey);ctx.lineTo(ex-14,ey+4);ctx.stroke();
    }
    ctx.font='16px sans-serif';ctx.fillStyle='#60a5fa';ctx.fillText('e⁻ →',cx+20,cy-88);
    // Zn2+ ions going into solution
    if(Math.random()<0.1){addP(cx-110,cy+Math.random()*60-20,30+Math.random()*20,Math.random()*10-5,'#a0a0b0',1,2)}
  }
  // Labels
  ctx.font='19px sans-serif';ctx.fillStyle='#fff';ctx.fillText('氧化还原反应',cx+10,cy-100);
  if(S.started){ctx.font='16px sans-serif';ctx.fillStyle='#fbbf24';ctx.fillText('Zn → Zn²⁺ + 2e⁻ (氧化)',cx-120,cy+120);ctx.fillText('Cu²⁺ + 2e⁻ → Cu (还原)',cx+20,cy+120)}
}

function drawLithium(S,cx,cy){
  // Battery cross-section
  const bx=cx-100,by=cy-80,bw=200,bh=160;
  // Cathode (blue, left)
  ctx.fillStyle='#1e40af';ctx.fillRect(bx,by,40,bh);
  for(let i=0;i<6;i++){ctx.fillStyle='rgba(59,130,246,0.5)';ctx.fillRect(bx+2,by+5+i*26,36,20)}
  ctx.font='16px sans-serif';ctx.fillStyle='#93c5fd';ctx.fillText('正极',bx+6,by-8);ctx.fillText('LiCoO₂',bx,by-20);
  // Separator (white)
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(bx+70,by,8,bh);
  ctx.fillStyle='#888';ctx.fillText('隔膜',bx+62,by-8);
  // Anode (black/dark, right)
  ctx.fillStyle='#1a1a2a';ctx.fillRect(bx+bw-40,by,40,bh);
  for(let i=0;i<8;i++){ctx.fillStyle='rgba(60,60,80,0.6)';ctx.fillRect(bx+bw-38,by+3+i*20,36,16)}
  ctx.fillStyle='#888';ctx.fillText('负极',bx+bw-34,by-8);ctx.fillText('石墨',bx+bw-34,by-20);
  // Electrolyte
  ctx.fillStyle='rgba(100,200,255,0.08)';ctx.fillRect(bx+40,by,bw-80,bh);
  ctx.fillStyle='rgba(100,200,255,0.3)';ctx.font='15px sans-serif';ctx.fillText('电解液',bx+85,by+bh+14);
  // Lithium ions
  for(let ion of S.lithiumIons){
    let ix,iy;
    if(S.mode==='charging'){ix=bx+80-ion.progress*(-80);iy=ion.y;ix=bx+40+(1-ion.progress)*40+ion.progress*(bw-40)}
    else{ix=bx+bw-40-(1-ion.progress)*0-ion.progress*(bw-80);iy=ion.y}
    ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(ix,iy,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=t().label;ctx.font='14px sans-serif';ctx.fillText('Li⁺',ix-8,iy-8);
  }
  // Direction arrow
  if(S.mode==='charging'){ctx.strokeStyle='#60a5fa';ctx.lineWidth=2;drawArrow(cx-30,cy+100,cx+30,cy+100);ctx.fillStyle='#60a5fa';ctx.font='17px sans-serif';ctx.fillText('充电: Li⁺ 正极→负极',cx-50,cy+120)}
  else if(S.mode==='discharging'){ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;drawArrow(cx+30,cy+100,cx-30,cy+100);ctx.fillStyle='#f59e0b';ctx.font='17px sans-serif';ctx.fillText('放电: Li⁺ 负极→正极',cx-50,cy+120)}
  ctx.font='19px sans-serif';ctx.fillStyle='#fff';ctx.fillText('锂离子电池截面',cx-40,cy-110);
}

function drawArrow(x1,y1,x2,y2){
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  const a=Math.atan2(y2-y1,x2-x1);
  ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-0.4),y2-10*Math.sin(a-0.4));ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a+0.4),y2-10*Math.sin(a+0.4));ctx.stroke();
}

function drawCurves(S,cx,cy){
  const gx=cx-160,gy=cy-120,gw=320,gh=240;
  // Axes
  ctx.strokeStyle='#333';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx,gy+gh);ctx.lineTo(gx+gw,gy+gh);ctx.stroke();
  // Y axis labels (voltage)
  ctx.fillStyle='#444';ctx.font='16px sans-serif';
  for(let v=2.8;v<=4.2;v+=0.2){const y=gy+gh-(v-2.8)/(4.2-2.8)*gh;ctx.fillText(v.toFixed(1)+'V',gx-36,y+4);ctx.strokeStyle='#d1d5db';ctx.beginPath();ctx.moveTo(gx,y);ctx.lineTo(gx+gw,y);ctx.stroke()}
  // X axis labels (capacity)
  for(let x=0;x<=1;x+=0.2){const px=gx+x*gw;ctx.fillStyle='#888';ctx.fillText((x*100).toFixed(0)+'%',px-8,gy+gh+14)}
  ctx.fillStyle='#60a5fa';ctx.fillText('电压 (V)',gx-36,gy-8);
  ctx.fillStyle='#888';ctx.fillText('容量 (%)',gx+gw-30,gy+gh+14);
  // Draw completed curves
  const colors=['#4ade80','#60a5fa','#f59e0b','#ef4444','#a78bfa','#f472b6'];
  for(let ci=0;ci<S.curves.length;ci++){
    const curve=S.curves[ci];ctx.strokeStyle=colors[ci%colors.length];ctx.lineWidth=2;ctx.beginPath();
    for(let i=0;i<curve.points.length;i++){
      const px=gx+curve.points[i].x*gw,py=gy+gh-(curve.points[i].v-2.8)/(4.2-2.8)*gh;
      if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    ctx.stroke();ctx.fillStyle=colors[ci%colors.length];ctx.font='16px sans-serif';
    const lp=curve.points[Math.floor(curve.points.length*0.3)];
    if(lp)ctx.fillText(curve.rate+'C',gx+lp.x*gw+5,gy+gh-(lp.v-2.8)/(4.2-2.8)*gh-8);
  }
  // Draw current curve
  if(S.currentCurve&&S.currentCurve.points.length>1){
    const curve=S.currentCurve;ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();
    for(let i=0;i<curve.points.length;i++){
      const px=gx+curve.points[i].x*gw,py=gy+gh-(curve.points[i].v-2.8)/(4.2-2.8)*gh;
      if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    ctx.stroke();
  }
  ctx.font='19px sans-serif';ctx.fillStyle='#fff';ctx.fillText('充放电曲线 — 倍率性能',cx-70,gy-30);
}

function drawThermal(S,cx,cy){
  // Battery body
  const bx=cx-60,by=cy-80,bw=120,bh=120;
  const heatColor=S.temp>250?'rgba(255,50,0,0.6)':S.temp>130?`rgba(255,${Math.max(0,200-S.temp)},0,0.4)`:'rgba(60,60,100,0.4)';
  ctx.fillStyle=heatColor;ctx.fillRect(bx,by,bw,bh);ctx.strokeStyle=S.runaway?'#ef4444':'#555';ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);
  // Battery terminal
  ctx.fillStyle='#888';ctx.fillRect(bx+40,by-12,40,12);
  // Internal layers
  if(!S.runaway){
    ctx.fillStyle='#1e40af';ctx.fillRect(bx+5,by+5,25,bh-10);// cathode
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(bx+35,by+5,5,bh-10);// separator
    ctx.fillStyle='#1a1a2a';ctx.fillRect(bx+bw-30,by+5,25,bh-10);// anode
  }else{
    // Fire effect
    for(let i=0;i<5;i++){const fx=bx+Math.random()*bw,fy=by+Math.random()*bh;ctx.fillStyle=`rgba(255,${Math.random()*100},0,${Math.random()*0.8})`;ctx.beginPath();ctx.arc(fx,fy,Math.random()*15+5,0,Math.PI*2);ctx.fill()}
  }
  // Temperature label
  ctx.font='24px sans-serif';ctx.fillStyle=S.temp>200?'#ef4444':S.temp>100?'#fbbf24':'#4ade80';
  ctx.fillText(S.temp.toFixed(0)+'°C',bx+30,by+bh/2+6);
  // Temperature curve
  if(S.tempHistory.length>1){
    const gx=cx-160,gy=cy+60,gw=320,gh=100;
    ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx,gy+gh);ctx.lineTo(gx+gw,gy+gh);ctx.stroke();
    ctx.strokeStyle='#ef4444';ctx.lineWidth=2;ctx.beginPath();
    const maxT=Math.max(400,S.temp);
    for(let i=0;i<S.tempHistory.length;i++){
      const px=gx+(i/Math.max(S.tempHistory.length-1,1))*gw;
      const py=gy+gh-(S.tempHistory[i].temp-25)/(maxT-25)*gh;
      if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.fillStyle='#444';ctx.font='16px sans-serif';ctx.fillText('温度曲线',gx,gy-6);ctx.fillText('25°C',gx-30,gy+gh+4);ctx.fillText(maxT.toFixed(0)+'°C',gx-36,gy+4);
  }
  // Warning flash
  if(S.runaway&&Math.sin(time*10)>0){ctx.fillStyle='rgba(255,0,0,0.15)';ctx.fillRect(320,0,CW-320,CH)}
  ctx.font='19px sans-serif';ctx.fillStyle='#fff';ctx.fillText('热失控模拟',cx-30,cy-120);
}

function drawSolid(S,cx,cy){
  if(S.viewMode==='liquid'){
    // Liquid electrolyte battery
    ctx.font='20px sans-serif';ctx.fillStyle='#60a5fa';ctx.fillText('液态电解质电池',cx-50,cy-130);
    const bx=cx-120,by=cy-100,bw=240,bh=200;
    // Cathode
    ctx.fillStyle='#1e40af';ctx.fillRect(bx,by,50,bh);ctx.fillStyle='#93c5fd';ctx.font='16px sans-serif';ctx.fillText('正极',bx+10,by-6);
    // Liquid electrolyte
    ctx.fillStyle='rgba(30,100,200,0.2)';ctx.fillRect(bx+50,by,bw-100,bh);
    // Separator (thin)
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillRect(bx+bw/2-2,by,4,bh);ctx.fillText('隔膜',bx+bw/2-10,by-6);
    // Anode (lithium metal)
    ctx.fillStyle='#2a2a3a';ctx.fillRect(bx+bw-50,by,50,bh);ctx.fillText('锂金属负极',bx+bw-48,by-6);
    // Dendrite growing from anode
    const dendLen=S.liquidDendrite*100;
    ctx.strokeStyle='#c0c0c0';ctx.lineWidth=2;
    for(let i=0;i<5;i++){
      const sy=by+30+i*35;ctx.beginPath();ctx.moveTo(bx+bw-50,sy);
      const dx=bx+bw-50-dendLen*(0.6+Math.random()*0.4);
      ctx.lineTo(dx,sy+Math.sin(i)*10);
      if(dendLen>60){ctx.lineTo(dx-10,sy-8);ctx.moveTo(dx,sy+Math.sin(i)*10);ctx.lineTo(dx-8,sy+12)}
      ctx.stroke();
    }
    if(S.liquidDendrite>0.8){
      ctx.fillStyle='#ef4444';ctx.font='18px sans-serif';ctx.fillText('⚠ 枝晶穿透隔膜 → 短路风险！',cx-80,cy+120);
      // Short circuit spark
      if(Math.sin(time*8)>0){ctx.fillStyle='rgba(255,255,0,0.6)';ctx.beginPath();ctx.arc(bx+bw/2,by+80,8,0,Math.PI*2);ctx.fill()}
    }
    ctx.fillStyle='#444';ctx.font='16px sans-serif';ctx.fillText('锂枝晶',bx+bw-80,cy+100);
  }else{
    // Solid state battery
    ctx.font='20px sans-serif';ctx.fillStyle='#4ade80';ctx.fillText('固态电解质电池',cx-50,cy-130);
    const bx=cx-120,by=cy-100,bw=240,bh=200;
    // Cathode
    ctx.fillStyle='#1e40af';ctx.fillRect(bx,by,50,bh);ctx.fillStyle='#93c5fd';ctx.font='16px sans-serif';ctx.fillText('正极',bx+10,by-6);
    // Solid electrolyte (gray, dense)
    ctx.fillStyle='rgba(120,120,140,0.4)';ctx.fillRect(bx+50,by,bw-100,bh);
    // Crystal grain boundaries
    ctx.strokeStyle='rgba(200,200,220,0.3)';ctx.lineWidth=1;
    for(let i=0;i<12;i++){const gx=bx+60+Math.random()*(bw-120),gy=by+Math.random()*bh;ctx.beginPath();ctx.arc(gx,gy,15+Math.random()*10,0,Math.PI*2);ctx.stroke()}
    ctx.fillStyle='#444';ctx.font='16px sans-serif';ctx.fillText('固态电解质',cx-25,by-6);
    // Anode
    ctx.fillStyle='#2a2a3a';ctx.fillRect(bx+bw-50,by,50,bh);ctx.fillText('锂金属负极',bx+bw-48,by-6);
    // Li ions moving along grain boundaries (safe)
    for(let ion of S.solidIonPos){
      const ix=ion.x+Math.sin(time*2+ion.phase)*5,iy=ion.y+Math.cos(time*1.5+ion.phase)*3;
      ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(ix,iy,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=t().label;ctx.font='13px sans-serif';ctx.fillText('Li⁺',ix+5,iy-2);
    }
    // No dendrite - safe
    ctx.fillStyle='#4ade80';ctx.font='18px sans-serif';ctx.fillText('✅ 固态电解质阻挡枝晶，安全传导',cx-100,cy+120);
  }
}

function drawBMS(S,cx,cy){
  ctx.font='19px sans-serif';ctx.fillStyle='#fff';ctx.fillText('BMS 电池管理系统',cx-55,cy-140);
  // 4 cells as bar chart
  const bx=cx-120,by=cy-100,cellW=50,gap=15;
  for(let i=0;i<4;i++){
    const x=bx+i*(cellW+gap),maxH=160;
    const h=((S.cells[i].v-3.0)/1.2)*maxH;
    // Cell body
    ctx.fillStyle='rgba(40,40,60,0.6)';ctx.fillRect(x,by,cellW,maxH);
    // Voltage bar
    const vColor=S.cells[i].v>4.1?'#ef4444':S.cells[i].v<3.5?'#fbbf24':'#4ade80';
    ctx.fillStyle=vColor;ctx.fillRect(x,by+maxH-h,cellW,h);
    // Labels
    ctx.fillStyle=t().label;ctx.font='16px sans-serif';ctx.textAlign='center';
    ctx.fillText(S.cells[i].v.toFixed(3)+'V',x+cellW/2,by+maxH+14);
    ctx.fillText('Cell '+(i+1),x+cellW/2,by-8);
    ctx.fillText(S.cells[i].soc.toFixed(0)+'%',x+cellW/2,by+maxH-h-8);
    ctx.textAlign='left';
  }
  // Balance arrows
  if(S.balancing){
    const maxIdx=S.cells.indexOf(S.cells.reduce((a,b)=>a.v>b.v?a:b));
    const minIdx=S.cells.indexOf(S.cells.reduce((a,b)=>a.v<b.v?a:b));
    const x1=bx+maxIdx*(cellW+gap)+cellW/2,x2=bx+minIdx*(cellW+gap)+cellW/2;
    ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
    const arrowY=by+180;drawArrow(x1,arrowY,x2,arrowY);
    ctx.fillStyle='#fbbf24';ctx.font='16px sans-serif';ctx.fillText('均衡中...',cx-20,arrowY+16);
  }
  // SOC gauge
  const avgSoc=S.cells.reduce((a,c)=>a+c.soc,0)/4;
  ctx.fillStyle='#444';ctx.font='17px sans-serif';ctx.fillText('电池组平均SOC: '+avgSoc.toFixed(1)+'%',cx-60,cy+110);
  // Voltage difference indicator
  const maxV=Math.max(...S.cells.map(c=>c.v)),minV=Math.min(...S.cells.map(c=>c.v));
  const diff=(maxV-minV)*1000;
  ctx.fillStyle=diff<50?'#4ade80':'#fbbf24';ctx.fillText('电压差: '+diff.toFixed(0)+'mV'+(diff<50?' ✅':''),cx-60,cy+126);
}

function drawGrid(S,cx,cy){
  ctx.font='19px sans-serif';ctx.fillStyle='#fff';ctx.fillText('储能电站 — 调峰填谷',cx-60,cy-160);
  // Rack
  const rackX=cx-120,rackY=cy-80;
  ctx.strokeStyle='#555';ctx.lineWidth=2;
  for(let r=0;r<2;r++)for(let c=0;c<3;c++){
    const sx=rackX+c*80,sy=rackY+r*60;
    ctx.strokeRect(sx-30,sy-20,60,40);
    if(S.rack[r][c]!==null){ctx.fillStyle='#1e40af';ctx.fillRect(sx-28,sy-18,56,36);ctx.fillStyle='#60a5fa';ctx.font='15px sans-serif';ctx.fillText('模组'+(S.rack[r][c]+1),sx-14,sy+4)}
    else{ctx.fillStyle='#222';ctx.fillRect(sx-28,sy-18,56,36);ctx.fillStyle='#444';ctx.font='15px sans-serif';ctx.fillText('空槽',sx-10,sy+4)}
  }
  // Draggable modules (not yet placed)
  for(let m of S.modules){
    if(S.rack.flat().includes(m.id))continue;
    ctx.fillStyle=S.dragging===m?'#2563eb':'#1e3a5f';ctx.fillRect(m.x-25,m.y-18,50,36);
    ctx.strokeStyle='#3b82f6';ctx.lineWidth=1;ctx.strokeRect(m.x-25,m.y-18,50,36);
    ctx.fillStyle='#60a5fa';ctx.font='15px sans-serif';ctx.fillText('模组'+(m.id+1),m.x-14,m.y+4);
  }
  // Power curves (if sim running)
  if(S.simRunning){
    const gx=cx-180,gy=cy+40,gw=360,gh=100;
    // Background
    ctx.fillStyle=isDark?'rgba(15,15,40,0.88)':'rgba(255,255,255,0.88)';ctx.fillRect(gx-5,gy-5,gw+10,gh+30);
    // Time axis
    ctx.strokeStyle=isDark?'#888':'#333';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(gx,gy+gh);ctx.lineTo(gx+gw,gy+gh);ctx.stroke();
    // Day/night background
    for(let h=0;h<24;h++){
      const x=gx+(h/24)*gw,w=gw/24;
      ctx.fillStyle=(h>=6&&h<18)?'rgba(255,200,50,0.05)':'rgba(30,30,80,0.15)';ctx.fillRect(x,gy,w,gh);
    }
    // Current time indicator
    const tx=gx+(S.timeOfDay/24)*gw;
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(tx,gy);ctx.lineTo(tx,gy+gh);ctx.stroke();
    // Solar/wind curve
    if(S.powerHistory.length>1){
      ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;ctx.beginPath();
      for(let i=0;i<S.powerHistory.length;i++){
        const px=gx+(S.powerHistory[i].t/24)*gw,py=gy+gh-S.powerHistory[i].solar/100*gh;
        if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }ctx.stroke();
      // Grid demand
      ctx.strokeStyle='#ef4444';ctx.lineWidth=1.5;ctx.beginPath();
      for(let i=0;i<S.powerHistory.length;i++){
        const px=gx+(S.powerHistory[i].t/24)*gw,py=gy+gh-S.powerHistory[i].grid/100*gh;
        if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }ctx.stroke();
    }
    // Legend
    ctx.font='15px sans-serif';
    ctx.fillStyle='#fbbf24';ctx.fillText('● 风光发电',gx,gy+gh+14);
    ctx.fillStyle='#ef4444';ctx.fillText('● 电网负荷',gx+70,gy+gh+14);
    ctx.fillStyle='#4ade80';ctx.fillText('电量:'+S.batteryCharge.toFixed(0)+'%',gx+150,gy+gh+14);
    ctx.fillStyle='#888';ctx.fillText(S.timeOfDay.toFixed(0)+'时',tx-6,gy-4);
    // Battery charge bar
    const barX=gx+gw+15,barY=gy,barW=20,barH=gh;
    ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(barX,barY,barW,barH);
    const fillH=S.batteryCharge/100*barH;
    ctx.fillStyle=S.batteryCharge>60?'#4ade80':S.batteryCharge>20?'#fbbf24':'#ef4444';
    ctx.fillRect(barX+1,barY+barH-fillH,barW-2,fillH);
    ctx.fillStyle='#444';ctx.font='14px sans-serif';ctx.fillText('电池',barX,barY-4);
  }
}

// Main loop
let lastTime=0;
function gameLoop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;time+=dt;
  ctx.clearRect(0,0,CW,CH);drawStars();
  if(gameState==='play'){update(dt);drawLevel();drawParticles()}
  animId=requestAnimationFrame(gameLoop);
}
animId=requestAnimationFrame(gameLoop);


function goLevel(i){switchLevel(i);}
// === 总分总认知结构增强 ===
// 延迟重新渲染确保增强生效
(function(){
  // 自动检测关卡名称
  function _getNames(){
    if(typeof levelNames!=='undefined')return levelNames.slice();
    if(typeof LN!=='undefined')return LN.slice();
    if(typeof levels!=='undefined'&&Array.isArray(levels))return levels.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    if(typeof LEVELS!=='undefined'&&Array.isArray(LEVELS))return LEVELS.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    return [];
  }
  function _getTotal(){return _getNames().length||7;}
  function _getCur(){
    if(typeof currentLevel!=='undefined')return currentLevel;
    if(typeof curLevel!=='undefined')return curLevel;
    if(typeof curLv!=='undefined')return curLv;
    return 0;
  }
  function _getObjs(){
    if(typeof levelObjs!=='undefined')return levelObjs;
    return null;
  }
  function _isDone(i){
    var o=_getObjs();
    if(o&&o[i])return o[i].every(function(v){return v;});
    if(typeof completedLevels!=='undefined')return completedLevels.has(i);
    return false;
  }
  function _countDone(){
    var o=_getObjs(),d=0,t=0;
    if(o){for(var i=0;i<o.length;i++)for(var j=0;j<o[i].length;j++){t++;if(o[i][j])d++;}}
    else if(typeof completedLevels!=='undefined'){d=completedLevels.size;t=_getTotal();}
    return{done:d,total:t};
  }

  // 1. 开头路线图
  window._buildRoadmap=function(){
    var c=document.getElementById('roadmap-container');
    if(!c)return;
    var names=_getNames();
    if(!names.length)return;
    var h='<div class="roadmap"><div class="roadmap-title">\u{1F4CD} \u5B66\u4E60\u8DEF\u7EBF\u56FE</div>';
    for(var i=0;i<names.length;i++){
      h+='<div class="roadmap-item"><div class="roadmap-num">'+(i+1)+'</div><span>'+names[i]+'</span></div>';
    }
    h+='</div>';
    c.innerHTML=h;
  };
  try{window._buildRoadmap();}catch(e){}

  // 2. 阶段导航
  window._stageNavHTML=function(){
    var names=_getNames(),total=names.length;
    if(!total)return '';
    var cur=_getCur(),s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):0;
    var h='<div class="stage-nav"><div class="sn-bar">';
    for(var i=0;i<total;i++){
      var cls=_isDone(i)?'done':i===cur?'cur':'';
      h+='<div class="sn-d '+cls+'" onclick="typeof goLevel===\'function\'&&goLevel('+i+')"></div>';
    }
    h+='</div>';
    h+='<div class="sn-info">\u{1F4CD} \u7B2C '+(cur+1)+'/'+total+' \u5173\uFF1A'+(names[cur]||'')+' | \u8FDB\u5EA6 '+pct+'%</div>';
    if(cur<total){
      h+='<div class="sn-hint">\u{1F4A1} \u672C\u5173\u4F60\u5C06\u5B66\u4E60\uFF1A'+(names[cur]||'')+'</div>';
    }
    h+='</div>';
    return h;
  };

  // 3. 通关总结
  window._summaryHTML=function(){
    var names=_getNames(),total=names.length;
    var s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):100;
    var h='<div class="summary-box">';
    h+='<div class="summary-title">\u{1F3C6} \u606D\u559C\u901A\u5173\uFF01</div>';
    h+='<div class="summary-sub">\u4F60\u5DF2\u5B8C\u6210\u5168\u90E8 '+total+' \u4E2A\u5173\u5361\u7684\u5B66\u4E60</div>';
    h+='<div class="summary-stats">';
    h+='<div class="summary-stat"><div class="num">'+total+'</div><div class="label">\u5173\u5361\u5B8C\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+s.done+'</div><div class="label">\u76EE\u6807\u8FBE\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+pct+'%</div><div class="label">\u77E5\u8BC6\u638C\u63E1</div></div>';
    h+='</div>';
    h+='<div class="summary-keys"><div style="font-weight:bold;color:#4f46e5;margin-bottom:6px">\u{1F4DA} \u5173\u952E\u77E5\u8BC6\u56DE\u987E</div>';
    for(var i=0;i<total;i++){h+='<div>\u2705 '+names[i]+'</div>';}
    h+='</div></div>';
    return h;
  };

  // 4. 增强 renderPanel - monkey-patch
  if(typeof window.renderPanel==='function'){
    var _origRP=window.renderPanel;
    window.renderPanel=function(){
      _origRP.apply(this,arguments);
      // 在 panel 顶部插入阶段导航
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
  // 也处理全局 renderPanel
  if(typeof renderPanel==='function'&&!window._rpPatched){
    window._rpPatched=true;
    var _origRP2=renderPanel;
    renderPanel=function(){
      _origRP2.apply(this,arguments);
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
})();
try{renderPanel();}catch(e){}

</script>
</body>
</html>
