<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>半导体制造 - 交互式教育游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}


body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
canvas{display:block;position:absolute;top:0;left:320px}
.panel{position:absolute;top:0;left:0;width:320px;height:100%;background:var(--panel-bg);border-right:1px solid var(--panel-border);overflow-y:auto;z-index:10;padding:12px;box-sizing:border-box;padding-bottom:24px}
.level-btn{display:none!important}
.level-btn.active{display:none!important}
.level-btn.done{display:none!important}
.concept-box{background:var(--concept-bg);border:1px solid var(--concept-border);border-radius:8px;padding:10px;margin:8px 0;font-size:13px;line-height:1.7;color:var(--concept-text)}
.act-btn{display:block;width:100%;padding:10px;margin:4px 0;border-radius:8px;border:1px solid var(--btn-border);background:var(--btn-bg);color:var(--btn-text);font-size:15px;cursor:pointer;text-align:center}
.act-btn:hover{background:var(--btn-hover)}.act-btn:disabled{opacity:.4;cursor:not-allowed}
.act-btn.green{border-color:var(--btn-green-border);background:var(--btn-green-bg);color:var(--btn-green-text)}
.hint-box{background:var(--hint-bg);border:1px solid var(--hint-border);border-radius:8px;padding:8px;margin:8px 0;font-size:12px;color:var(--hint-text)}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:10px;padding:12px;margin:10px 0;font-size:14px;line-height:1.8;color:var(--learn-text)}
.slider-wrap{margin:8px 0}.slider-wrap label{font-size:11px;color:#888}
.slider-wrap input[type=range]{width:100%;margin-top:4px}.sv{color:var(--sv);font-weight:bold}
#infoBar{position:absolute;bottom:0;left:320px;right:0;height:36px;background:var(--bar-bg);border-top:1px solid var(--panel-border);display:flex;align-items:center;padding:0 16px;font-size:12px;color:#888;z-index:10}
.panel h3{color:var(--title-color);font-size:16px;margin:8px 0 4px}
.panel h4{color:#93c5fd;font-size:14px;margin:6px 0 2px}
.obj-item{font-size:12px;margin:2px 0;color:#a0a0c0}
.obj-item.done{color:#4ade80}

.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:10px 0}
.quiz-q{font-size:13px;color:var(--quiz-q);font-weight:700;margin-bottom:8px;line-height:1.6}
.quiz-opt{font-size:13px;color:var(--quiz-opt-text);padding:8px 10px;margin:5px 0;border-radius:6px;cursor:pointer;border:1px solid var(--quiz-opt-border);background:var(--quiz-opt-bg);transition:all .2s}
.quiz-opt:hover{background:var(--quiz-opt-hover);border-color:var(--quiz-border)}
.quiz-opt.correct{background:var(--quiz-correct-bg);border-color:#22c55e;color:var(--quiz-correct-text)}
.quiz-opt.wrong{background:var(--quiz-wrong-bg);border-color:#ef4444;color:var(--quiz-wrong-text)}
.quiz-feedback{font-size:12px;line-height:1.7;margin-top:8px;color:var(--text-sub)}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
.overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center}
.overlay h1{font-size:42px;background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.overlay .sub{color:var(--text-sub);font-size:17px;margin-bottom:32px}
.overlay .start-btn{padding:14px 48px;font-size:18px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:transform .2s}
.overlay .start-btn:hover{transform:scale(1.05)}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.features .feat{text-align:center;color:var(--feat-text);font-size:12px;width:80px}
.features .feat .fi{font-size:26px;margin-bottom:4px}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="overlay" id="ov">
<h1>🏭 半导体制造</h1>
<p class="sub">7 个交互关卡 — 从硅晶体到良率优化</p>
<button class="start-btn" onclick="startGame()">开始探索</button>
<div class="features">
<div class="feat"><div class="fi">💎</div>晶体生长</div>
<div class="feat"><div class="fi">📸</div>光刻</div>
<div class="feat"><div class="fi">⚗️</div>刻蚀</div>
<div class="feat"><div class="fi">💥</div>离子注入</div>
<div class="feat"><div class="fi">🎨</div>薄膜沉积</div>
<div class="feat"><div class="fi">🔬</div>EUV光刻</div>
<div class="feat"><div class="fi">📊</div>良率优化</div>
</div>
</div>
<div class="panel" id="panel"></div>
<canvas id="cv"></canvas>
<div id="infoBar">半导体制造交互式教育游戏 | 共7关</div>
<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}}
function startGame(){document.getElementById('ov').style.display='none';}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const panel=document.getElementById('panel'),infoBar=document.getElementById('infoBar');
let W,H,curLevel=0,animId;
const completedLevels=new Set();
const levels=[
{name:'硅晶体生长 — 从沙子到硅棒',concept:'切克劳斯基法（CZ法）：将多晶硅在坩埚中熔化，用籽晶接触熔融硅表面缓慢提拉，原子按晶格排列生长为单晶硅棒。',
 objs:['拉出硅棒','获得完美单晶','达到目标长度(≥80cm)'],
 learn:'半导体级硅纯度达99.999999999%（11个9），全球由日本信越化学和SUMCO主导供应。一根300mm硅棒价值数千美元。'},
{name:'光刻 — 把图案印到硅片上',concept:'光刻是芯片制造最关键的步骤：将掩模版上的电路图案通过紫外光投影到涂有光刻胶的硅片上，再通过显影去除曝光区域。',
 objs:['在掩模版上设计图案','完成曝光','显影获得清晰图案'],
 learn:'ASML的EUV光刻机售价超过1.5亿美元，重量达180吨，是人类制造的最精密的机器之一。'},
{name:'刻蚀 — 雕刻硅片',concept:'刻蚀将光刻图案转移到硅片上。湿法刻蚀用化学溶液（各向同性，有底切），干法刻蚀用等离子体（各向异性，侧壁垂直）。',
 objs:['湿法刻蚀观察底切','干法刻蚀获得垂直侧壁','精确控制刻蚀深度'],
 learn:'先进3nm工艺中，刻蚀沟槽的深宽比可达50:1，相当于在1米宽的沟里挖50米深——精度惊人。'},
{name:'离子注入 — 掺杂改性',concept:'用高能离子束将杂质原子（磷或硼）打入硅片，改变局部电学性质。磷掺杂形成N型（多电子），硼掺杂形成P型（多空穴）。',
 objs:['注入N型掺杂（磷）','注入P型掺杂（硼）','形成PN结'],
 learn:'PN结是所有半导体器件的基础——二极管、晶体管、LED、太阳能电池都依赖PN结的单向导电性。'},
{name:'薄膜沉积 — 逐层堆叠',concept:'在硅片上沉积各种薄膜：CVD（化学气相沉积）、PVD（物理气相沉积/溅射）、ALD（原子层沉积，逐原子层精确控制）。',
 objs:['CVD沉积绝缘膜','PVD沉积金属膜','ALD沉积超薄膜(<5nm)'],
 learn:'Intel 3nm工艺的栅极氧化层只有几个原子厚（约0.5nm），ALD技术让这种原子级精度成为可能。'},
{name:'EUV光刻 — 极紫外的极限',concept:'EUV光刻使用13.5nm波长的极紫外光。激光轰击锡滴产生EUV光，经多层反射镜聚焦，通过反射式掩模将图案投影到硅片。',
 objs:['产生EUV光','调整反射镜聚焦','获得<10nm分辨率'],
 learn:'EUV光刻机由10万个零件组成，重180吨，需要40个集装箱运输。全球仅ASML一家能制造。'},
{name:'良率优化 — 从实验室到量产',concept:'芯片制造的终极挑战：在300mm晶圆上制造数百颗芯片，每颗都必须完美。良率=合格芯片数/总芯片数，直接决定利润。',
 objs:['完成一次生产','良率提升到80%','良率达到90%'],
 learn:'台积电3nm工艺良率约70-80%。一座先进晶圆厂投资超过200亿美元，良率每提升1%都意味着数亿美元的利润。'}
];
const quizData=[
{q:'CZ法拉制单晶硅时，为什么提拉速度不能太快？',opts:['太快会破坏晶格有序生长，容易形成多晶或缺陷','速度越快原子越容易排成完美晶格','提拉速度只影响颜色，不影响质量'],ans:0,why:'单晶生长需要原子按籽晶晶格逐步排列，过快会让界面失稳并引入缺陷。'},
{q:'光刻把电路图案转移到硅片上的核心顺序是什么？',opts:['涂胶/掩模图案 → 曝光 → 显影','先显影，再随便画图案','只要提高温度就会出现图案'],ans:0,why:'光刻胶被光改变溶解性，显影步骤再把曝光差异转化成可见图形。'},
{q:'湿法刻蚀和干法刻蚀的关键差异是什么？',opts:['湿法各向同性易底切，干法各向异性可形成垂直侧壁','湿法一定更适合所有纳米结构','干法不会移除任何材料'],ans:0,why:'先进制程常依赖等离子体干法刻蚀控制深宽比和侧壁形貌。'},
{q:'为什么需要分别形成N型和P型区域后再构成PN结？',opts:['N型多电子、P型多空穴，交界处形成耗尽区和单向导电特性','两种掺杂只是为了改变硅片颜色','PN结只需要一种掺杂就能形成'],ans:0,why:'PN结的电场来自电子和空穴在界面附近复合后留下的固定离子区。'},
{q:'ALD相比CVD/PVD最突出的工艺优势是什么？',opts:['按原子层自限制生长，厚度和覆盖性控制更精确','沉积速度永远最快','只能沉积很厚的金属块'],ans:0,why:'ALD每个反应循环趋于自限制，适合几纳米甚至原子级薄膜控制。'},
{q:'EUV光刻为什么使用反射镜而不是普通透镜？',opts:['13.5nm极紫外光会被大多数材料强吸收，只能靠多层反射镜传输','反射镜只是为了装饰光路','EUV波长太长，无法聚焦'],ans:0,why:'EUV系统需要真空环境和Mo/Si多层反射镜，反射率本身也是系统工程难点。'},
{q:'良率优化中，哪一项说法最准确？',opts:['光刻、刻蚀、沉积、洁净度都会影响合格芯片比例','只要晶圆足够大，良率一定是100%','良率与利润没有关系'],ans:0,why:'良率是制程窗口、缺陷密度和工艺稳定性的综合结果，直接决定可销售芯片数量。'}
];
let quizFeedback=null;
let lState={},panelDirty=true;

const rangeDefs={
 pullSpeed:{label:v=>`${v}`},
 rotSpeed:{label:v=>`${v}`},
 etchTime:{label:v=>`${v}%`},
 energy:{label:v=>`${v}keV`},
 dose:{label:v=>`${v}%`},
 mirrorAngle:{label:v=>`${v.toFixed(1)}°`},
 lithoAlign:{label:v=>`${v}%`},
 etchUniform:{label:v=>`${v}%`},
 depoThick:{label:v=>`${v}%`},
 cleanLevel:{label:v=>`${v}%`}
};
function rangeHTML(key,label,min,max,step){
 const stepAttr=step?` step="${step}"`:'';
 return `<div class="slider-wrap"><label>${label}：<span class="sv">${formatRange(key,lState[key])}</span></label><input type="range" min="${min}" max="${max}" value="${lState[key]}"${stepAttr} oninput="updateRange(this,'${key}')" onchange="this.blur();panelDirty=true"></div>`;
}
function formatRange(key,value){
 const def=rangeDefs[key];
 return def&&def.label?def.label(value):String(value);
}

 });

 if(completedLevels.has(curLevel)){

// PLACEHOLDER_ACTIONS
// === Level 0: Crystal Growth ===
function startPull(){lState.pulling=true;lState.growPhase=0;panelDirty=true;}
// === Level 1: Lithography ===
function startExposure(){
 if(lState.maskPattern.length===0)return;
 lState.exposing=true;lState.exposureAnim=0;
 lState.objDone[0]=true;panelDirty=true;
}
function developWafer(){
 lState.developed=true;lState.objDone[2]=true;panelDirty=true;
}
// === Level 2: Etching ===
function startEtch(){lState.etching=true;lState.etchProgress=0;panelDirty=true;}
// === Level 3: Ion Implantation ===
function startImplant(){
 lState.implanting=true;lState.implantedDopant=lState.dopant;lState.ions=[];lState.profile=[];
 for(let i=0;i<30;i++){
  const depth=lState.energy/100;
  lState.ions.push({x:Math.random(),y:-Math.random()*0.3,vy:0.02+Math.random()*0.01,
   targetY:depth*0.3+Math.random()*0.15,active:true,color:lState.dopant==='P'?'#60a5fa':'#f87171'});
 }
 panelDirty=true;
}
function doAnneal(){
 lState.annealed=true;
 const dopant=lState.implantedDopant||lState.dopant;
 if(dopant==='P')lState.nDoped=true;
 if(dopant==='B')lState.pDoped=true;
 lState.implantDone=false;
 panelDirty=true;
}
function formPN(){
 lState.pnFormed=true;lState.objDone[2]=true;panelDirty=true;
}
// === Level 4: Thin Film Deposition ===
function startDeposit(){
 lState.depositing=true;lState.depositProgress=0;lState.thickness=0;lState.atoms=[];
 if(lState.method==='CVD'){lState.uniformity=85+Math.random()*10;}
 else if(lState.method==='PVD'){lState.uniformity=70+Math.random()*15;}
 else{lState.uniformity=95+Math.random()*5;}
 panelDirty=true;
}
// === Level 5: EUV ===
function fireLaser(){
 lState.laserFired=true;lState.photons=[];
 for(let i=0;i<20;i++)lState.photons.push({x:0.1,y:0.35+Math.random()*0.1,vx:0.03+Math.random()*0.01,vy:(Math.random()-0.5)*0.005,life:1});
 panelDirty=true;
}
function focusMirror(){
 const diff=Math.abs(lState.mirrorAngle-45);
 if(diff<3){
  lState.focused=true;lState.resolution=7+diff;lState.power=250-diff*20;
  lState.objDone[0]=true;lState.objDone[1]=true;
  if(lState.resolution<10)lState.objDone[2]=true;
  panelDirty=true;
 }
}
function exposeEUV(){
 lState.objDone[0]=true;lState.objDone[1]=true;
 if(lState.resolution<10)lState.objDone[2]=true;
 panelDirty=true;
}
// === Level 6: Yield ===
function runProduction(){
 const avg=(lState.lithoAlign+lState.etchUniform+lState.depoThick+lState.cleanLevel)/4;
 const weakest=Math.min(lState.lithoAlign,lState.etchUniform,lState.depoThick,lState.cleanLevel);
 lState.yield=Math.max(0,Math.min(100,avg*0.88+weakest*0.12));
 lState.profit=lState.yield/100*500*2e6-5e8;
 if(lState.yield>lState.bestYield)lState.bestYield=lState.yield;
 lState.chips=[];
 const rows=12,cols=12;
 for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
  const cx2=(c-cols/2+0.5),cy2=(r-rows/2+0.5);
  if(cx2*cx2+cy2*cy2>(cols/2)*(cols/2))continue;
  lState.chips.push({r,c,good:Math.random()*100<lState.yield});
 }
 lState.produced=true;lState.objDone[0]=true;
 if(lState.bestYield>=80)lState.objDone[1]=true;
 if(lState.bestYield>=90)lState.objDone[2]=true;
 panelDirty=true;
}

function drawSiliconTexture(x,y,w,h,color='#b0b8c8'){
 ctx.fillStyle=color;ctx.fillRect(x,y,w,h);
 ctx.strokeStyle='rgba(150,160,180,0.15)';ctx.lineWidth=0.5;

function drawGlow(x,y,r,color){
 const g=ctx.createRadialGradient(x,y,0,x,y,r);

// === Level 0: Crystal Growth ===
function drawLevel0(t){
 const cx=W/2,cy=H/2;
 // Crucible
 ctx.fillStyle='#333';ctx.beginPath();
 ctx.moveTo(cx-120,cy+60);ctx.lineTo(cx-140,cy+180);ctx.lineTo(cx+140,cy+180);ctx.lineTo(cx+120,cy+60);ctx.closePath();ctx.fill();
 ctx.strokeStyle='#555';ctx.lineWidth=3;ctx.stroke();
 // Molten silicon
 const meltH=100;
 const mg=ctx.createLinearGradient(cx,cy+180-meltH,cx,cy+180);
 mg.addColorStop(0,'#ff6600');mg.addColorStop(0.5,'#ff4400');mg.addColorStop(1,'#cc2200');
 ctx.fillStyle=mg;
 ctx.fillRect(cx-130,cy+180-meltH,260,meltH);
 // Glow on melt surface
 drawGlow(cx,cy+80,80,'rgba(255,100,0,0.3)');
 // Heat particles
 for(let i=0;i<5;i++){
  const px=cx-100+Math.random()*200,py=cy+80+Math.random()*20;
  ctx.fillStyle=`rgba(255,${150+Math.random()*100|0},0,${0.3+Math.random()*0.4})`;
  ctx.beginPath();ctx.arc(px,py,1+Math.random()*2,0,Math.PI*2);ctx.fill();
 }
 // Pull rod mechanism
 ctx.fillStyle='#666';ctx.fillRect(cx-3,cy-200,6,60);
 ctx.fillStyle='#888';ctx.fillRect(cx-20,cy-210,40,15);
 // Growing silicon rod
 if(lState.pulling||lState.rodLen>0){
  const rodH=lState.rodLen*2;
  const rodW=20+lState.diameter/15;
  const rodTop=cy-140;
  const quality=lState.crystalQuality;
  const rg=ctx.createLinearGradient(cx-rodW/2,rodTop,cx+rodW/2,rodTop);
  if(quality>80){rg.addColorStop(0,'#a0a8b8');rg.addColorStop(0.5,'#c8d0e0');rg.addColorStop(1,'#a0a8b8');}
  else if(quality>40){rg.addColorStop(0,'#808890');rg.addColorStop(0.5,'#a0a8b0');rg.addColorStop(1,'#808890');}
  else{rg.addColorStop(0,'#606068');rg.addColorStop(0.5,'#787880');rg.addColorStop(1,'#606068');}
  ctx.fillStyle=rg;
  ctx.beginPath();ctx.moveTo(cx-rodW/2,rodTop);ctx.lineTo(cx-rodW/2-5,rodTop+rodH);
  ctx.lineTo(cx+rodW/2+5,rodTop+rodH);ctx.lineTo(cx+rodW/2,rodTop);ctx.closePath();ctx.fill();
  // Crystal lattice lines
  if(quality>60){
   ctx.strokeStyle='rgba(200,210,230,0.2)';ctx.lineWidth=0.5;
   for(let i=0;i<rodH;i+=6){ctx.beginPath();ctx.moveTo(cx-rodW/2,rodTop+i);ctx.lineTo(cx+rodW/2,rodTop+i);ctx.stroke();}
  }
  // Rotation indicator
  if(lState.pulling){
   ctx.strokeStyle='rgba(100,165,250,0.5)';ctx.lineWidth=1;
   const angle=t*lState.rotSpeed*0.001;
   ctx.beginPath();ctx.arc(cx,rodTop-10,15,angle,angle+Math.PI*1.5);ctx.stroke();
  }
  // Quality label
  ctx.fillStyle=quality>80?'#4ade80':quality>40?'#fbbf24':'#f87171';
  ctx.font='18px sans-serif';ctx.textAlign='center';
  ctx.fillText(quality>80?'完美单晶':quality>40?'多晶':'缺陷严重',cx,rodTop-25);
 }
 // Update pulling
 if(lState.pulling){
  const speed=lState.pullSpeed;
  lState.rodLen+=0.15;
  lState.diameter=280+lState.rotSpeed*0.2;
  // Quality depends on pull speed: 40-60 is optimal
  const optDist=Math.abs(speed-50);
  lState.crystalQuality=Math.max(0,100-optDist*2.5);
  if(!lState.objDone[0]&&lState.rodLen>10){lState.objDone[0]=true;panelDirty=true;}
  if(!lState.objDone[1]&&lState.crystalQuality>85){lState.objDone[1]=true;panelDirty=true;}
  if(!lState.objDone[2]&&lState.rodLen>=80){lState.objDone[2]=true;panelDirty=true;}
  if(lState.rodLen>=100){lState.pulling=false;panelDirty=true;}
 }
 // Labels
 ctx.fillStyle='#444';ctx.font='17px sans-serif';ctx.textAlign='center';
 ctx.fillText('坩埚（熔融硅 1420°C）',cx,cy+200);
 ctx.fillText('提拉装置',cx,cy-220);
 // Real-time stats on canvas
 if(lState.pulling||lState.rodLen>0){
  ctx.fillStyle='#60a5fa';ctx.font='19px sans-serif';ctx.textAlign='left';
  ctx.fillText(`晶体质量: ${lState.crystalQuality.toFixed(0)}%`,30,30);
  ctx.fillText(`直径: ${lState.diameter.toFixed(1)}mm`,30,50);
  ctx.fillText(`长度: ${lState.rodLen.toFixed(1)}cm`,30,70);
 }
}
// PLACEHOLDER_DRAW1
// === Level 1: Lithography ===
function drawLevel1(t){
 const cx=W/2,baseY=60;
 const layerH=H/4-30,layerW=W*0.6,lx=cx-layerW/2;
 // Mask layer
 ctx.fillStyle='#1a1a2a';ctx.fillRect(lx,baseY,layerW,layerH);
 ctx.strokeStyle='#444';ctx.lineWidth=2;ctx.strokeRect(lx,baseY,layerW,layerH);
 ctx.fillStyle='#444';ctx.font='18px sans-serif';ctx.textAlign='center';
 ctx.fillText('掩模版（在此绘制图案）',cx,baseY-8);
 // Draw mask pattern
 if(lState.maskPattern.length>1){
  ctx.strokeStyle='#c084fc';ctx.lineWidth=3;ctx.beginPath();
  let started=false;
  for(const p of lState.maskPattern){
   if(p.nx){ctx.moveTo(p.x,p.y);started=true;}
   else if(started)ctx.lineTo(p.x,p.y);
  }
  ctx.stroke();
 }
 // UV light source
 const uvY=baseY+layerH+20;
 ctx.fillStyle='#2a1a4a';ctx.fillRect(lx,uvY,layerW,40);

 }

     ctx.beginPath();ctx.moveTo(px,wy);ctx.lineTo(px-undercut,wy);ctx.stroke();
     ctx.setLineDash([]);

   }else{
    // Dry etch: anisotropic, vertical sidewalls
    ctx.fillRect(px,wy,trenchW,depth);

     for(let j=0;j<3;j++){

   if(lState.method==='dry'&&!lState.objDone[1]){lState.objDone[1]=true;}
   if(target>=0.4&&target<=0.7){lState.objDone[2]=true;}

 ctx.fillStyle=lState.method==='wet'?'#fbbf24':'#60a5fa';ctx.font='19px sans-serif';

 ctx.fillText(lState.method==='wet'?'湿法刻蚀 — 各向同性（有底切）':'干法刻蚀 — 各向异性（垂直侧壁）',cx,wy+wH+40);

 if(lState.pDoped){

 if(lState.pnFormed){

 }

}

// === Level 4: Thin Film Deposition ===
function drawLevel4(t){
 const cx=W/2,cy=H/2;
 const wW=W*0.5,wH=200,wx=cx-wW/2,wy=cy-20;
 // Silicon substrate with trenches
 drawSiliconTexture(wx,wy,wW,wH);
 // Trenches
 const trenchW=40,trenchH=80,trenchGap=100;
 for(let i=0;i<3;i++){
  const tx=wx+60+i*trenchGap;
  ctx.fillStyle=t().bg1;ctx.fillRect(tx,wy,trenchW,trenchH);
 }
 // Deposited film
 if(lState.depositing||lState.depositProgress>0){
  const prog=lState.depositProgress;
  const filmThick=prog*15;
  const method=lState.method;
  let filmColor;
  if(method==='CVD')filmColor='rgba(100,200,100,0.6)'; // green insulator
  else if(method==='PVD')filmColor='rgba(200,180,100,0.7)'; // gold metal
  else filmColor='rgba(100,180,255,0.7)'; // blue ALD
  ctx.fillStyle=filmColor;
  if(method==='CVD'){
   // Conformal but with step coverage issues
   ctx.fillRect(wx,wy-filmThick,wW,filmThick);
   for(let i=0;i<3;i++){
    const tx=wx+60+i*trenchGap;
    ctx.fillRect(tx-filmThick*0.5,wy,filmThick*0.5,trenchH*prog);
    ctx.fillRect(tx+trenchW,wy,filmThick*0.5,trenchH*prog);
    if(prog>0.5)ctx.fillRect(tx,wy+trenchH-filmThick,trenchW,filmThick);
   }
  }else if(method==='PVD'){
   // Directional - good on top, poor in trenches
   ctx.fillRect(wx,wy-filmThick,wW,filmThick);
   for(let i=0;i<3;i++){
    const tx=wx+60+i*trenchGap;
    ctx.fillRect(tx,wy,filmThick*0.3,trenchH*0.3);
   }
  }else{
   // ALD - perfect conformal
   const ft=Math.min(filmThick,5);
   ctx.fillRect(wx,wy-ft,wW,ft);
   for(let i=0;i<3;i++){
    const tx=wx+60+i*trenchGap;
    ctx.fillRect(tx-ft,wy,ft,trenchH);
    ctx.fillRect(tx+trenchW,wy,ft,trenchH);
    ctx.fillRect(tx,wy+trenchH-ft,trenchW,ft);
   }
  }
  // Falling atoms animation
  if(lState.depositing){
   for(let i=0;i<8;i++){
    const ax=wx+Math.random()*wW;
    const ay=wy-30-Math.random()*60;
    ctx.fillStyle=filmColor;ctx.beginPath();ctx.arc(ax,ay,2+Math.random()*2,0,Math.PI*2);ctx.fill();
   }
  }
 }
 // Update deposition
 if(lState.depositing){
  const speed=lState.method==='ALD'?0.003:0.008;
  lState.depositProgress+=speed;
  lState.thickness=lState.depositProgress*(lState.method==='ALD'?5:50);
  if(lState.depositProgress>=1){
   lState.depositing=false;
   if(lState.method==='CVD'){lState.cvdDone=true;lState.objDone[0]=true;}
   if(lState.method==='PVD'){lState.pvdDone=true;lState.objDone[1]=true;}
   if(lState.method==='ALD'){lState.aldDone=true;lState.objDone[2]=true;}
   panelDirty=true;
  }
 }
 // Method labels
 ctx.fillStyle='#444';ctx.font='18px sans-serif';ctx.textAlign='center';
 const labels={CVD:'CVD — 化学气相沉积（均匀覆盖）',PVD:'PVD — 物理溅射（方向性强）',ALD:'ALD — 原子层沉积（逐层精确）'};
 ctx.fillText(labels[lState.method],cx,wy+wH+30);
 // Thickness display
 if(lState.thickness>0){
  ctx.fillStyle='#60a5fa';ctx.font='20px sans-serif';
  ctx.fillText(`厚度: ${lState.thickness.toFixed(1)}nm  均匀性: ${lState.uniformity.toFixed(0)}%`,cx,wy-50);
 }
}

function mainLoop(t){

  function _getTotal(){return _getNames().length||7;}
  function _getCur(){
    if(typeof currentLevel!=='undefined')return currentLevel;
    if(typeof curLevel!=='undefined')return curLevel;
    if(typeof curLv!=='undefined')return curLv;
    return 0;
  }
  function _getObjs(){
    if(typeof levelObjs!=='undefined')return levelObjs;
    return null;
  }
  function _isDone(i){
    var o=_getObjs();
    if(o&&o[i])return o[i].every(function(v){return v;});
    if(typeof completedLevels!=='undefined')return completedLevels.has(i);
    return false;
  }
  function _countDone(){
    var o=_getObjs(),d=0,t=0;
    if(o){for(var i=0;i<o.length;i++)for(var j=0;j<o[i].length;j++){t++;if(o[i][j])d++;}}
    else if(typeof completedLevels!=='undefined'){d=completedLevels.size;t=_getTotal();}
    return{done:d,total:t};
  }

  // 1. 开头路线图
  window._buildRoadmap=function(){
    var c=document.getElementById('roadmap-container');
    if(!c)return;
    var names=_getNames();
    if(!names.length)return;
    var h='<div class="roadmap"><div class="roadmap-title">\u{1F4CD} \u5B66\u4E60\u8DEF\u7EBF\u56FE</div>';
    for(var i=0;i<names.length;i++){
      h+='<div class="roadmap-item"><div class="roadmap-num">'+(i+1)+'</div><span>'+names[i]+'</span></div>';
    }
    h+='</div>';
    c.innerHTML=h;
  };
  try{window._buildRoadmap();}catch(e){}

  // 2. 阶段导航
  window._stageNavHTML=function(){
    var names=_getNames(),total=names.length;
    if(!total)return '';
    var cur=_getCur(),s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):0;
    var h='<div class="stage-nav"><div class="sn-bar">';
    for(var i=0;i<total;i++){
      var cls=_isDone(i)?'done':i===cur?'cur':'';
      h+='<div class="sn-d '+cls+'" onclick="typeof goLevel===\'function\'&&goLevel('+i+')"></div>';
    }
    h+='</div>';
    h+='<div class="sn-info">\u{1F4CD} \u7B2C'+(cur+1)+'/'+total+'\u5173 | \u8FDB\u5EA6 '+pct+'%</div>';

    h+='</div>';
    return h;
  };

  // 3. 通关总结
  window._summaryHTML=function(){
    var names=_getNames(),total=names.length;
    var s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):100;
    var h='<div class="summary-box">';
    h+='<div class="summary-title">\u{1F3C6} \u606D\u559C\u901A\u5173\uFF01</div>';
    h+='<div class="summary-sub">\u4F60\u5DF2\u5B8C\u6210\u5168\u90E8 '+total+' \u4E2A\u5173\u5361\u7684\u5B66\u4E60</div>';
    h+='<div class="summary-stats">';
    h+='<div class="summary-stat"><div class="num">'+total+'</div><div class="label">\u5173\u5361\u5B8C\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+s.done+'</div><div class="label">\u76EE\u6807\u8FBE\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+pct+'%</div><div class="label">\u77E5\u8BC6\u638C\u63E1</div></div>';
    h+='</div>';
    h+='<div class="summary-keys"><div style="font-weight:bold;color:#4f46e5;margin-bottom:6px">\u{1F4DA} \u5173\u952E\u77E5\u8BC6\u56DE\u987E</div>';
    for(var i=0;i<total;i++){h+='<div>\u2705 '+names[i]+'</div>';}
    h+='</div></div>';
    return h;
  };

  // 4. 增强 renderPanel - monkey-patch
  if(typeof window.renderPanel==='function'){
    var _origRP=window.renderPanel;
    window.renderPanel=function(){
      _origRP.apply(this,arguments);
      // 在 panel 顶部插入阶段导航
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
  // 也处理全局 renderPanel
  if(typeof renderPanel==='function'&&!window._rpPatched){
    window._rpPatched=true;
    var _origRP2=renderPanel;
    renderPanel=function(){
      _origRP2.apply(this,arguments);
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
})();
try{renderPanel();}catch(e){}

</script>
</body>
</html>
