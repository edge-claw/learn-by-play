<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🚗 自动驾驶探险 — 边玩边学</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --accent:#06b6d4;
}
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --accent:#0891b2;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh}
#wrap{display:flex;height:calc(100vh - 36px);position:relative}
.panel{width:320px;min-width:320px;background:var(--panel-bg);border-right:1px solid var(--panel-border);padding:16px;overflow-y:auto;display:none;scrollbar-width:thin;padding-bottom:24px}
.panel::-webkit-scrollbar{width:5px}.panel::-webkit-scrollbar-thumb{background:#c7d2fe;border-radius:3px}
.panel h2{color:var(--title-color);font-size:18px;margin-bottom:8px}
.panel h3{color:var(--title-color);font-size:16px;margin:10px 0 6px}
.panel p,.panel li{font-size:13px;line-height:1.6;color:var(--concept-text)}
.panel ul{padding-left:18px;margin-bottom:8px}
.obj-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:13px}
.obj-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.obj-dot.done{background:var(--accent);color:#0a0a1a}
.act-btn{display:block;width:100%;padding:10px;margin-top:6px;border:none;border-radius:6px;background:var(--accent);color:#0a0a1a;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.act-btn:hover{background:#22d3ee;transform:translateY(-1px)}
.act-btn.secondary{background:var(--btn-bg);color:var(--btn-text);border:1px solid var(--btn-border)}
.hint-box{background:var(--hint-bg);border:1px solid var(--hint-border);border-radius:8px;padding:8px;margin-top:8px;font-size:12px;line-height:1.6;color:var(--hint-text)}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:8px;padding:10px;margin-top:10px;font-size:14px;line-height:1.8}
.learn-box b{color:var(--accent)}
canvas{flex:1;display:block;background:var(--bg)}
.bar{height:36px;background:var(--bar-bg);border-top:1px solid var(--bar-border);display:none;align-items:center;justify-content:space-between;padding:0 16px;font-size:13px}
.bar-left{display:flex;gap:4px}
.bar-btn{padding:4px 12px;border:1px solid rgba(6,182,212,0.3);background:transparent;color:#8899aa;border-radius:4px;cursor:pointer;font-size:12px;transition:all .2s}
.bar-btn:hover{border-color:var(--accent);color:var(--accent)}
.bar-btn.active{background:var(--accent);color:#0a0a1a;border-color:var(--accent)}
.bar-right{color:var(--accent);font-size:12px}
.overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.overlay h1{font-size:42px;color:var(--accent);text-shadow:0 0 30px rgba(6,182,212,0.4);margin-bottom:8px}
.overlay .sub{color:var(--sub-color);font-size:16px;margin-bottom:30px}
.overlay .desc{max-width:520px;text-align:center;color:#8899aa;font-size:14px;line-height:1.8;margin-bottom:30px;background:var(--concept-bg);border:1px solid var(--concept-border);border-radius:10px;padding:16px}
.start-btn{padding:14px 48px;border:2px solid var(--accent);background:transparent;color:var(--accent);font-size:18px;border-radius:8px;cursor:pointer;transition:all .3s;letter-spacing:2px}
.start-btn:hover{background:var(--accent);color:#0a0a1a;box-shadow:0 0 30px rgba(6,182,212,0.4)}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:#aaa;font-size:12px;width:80px}
.feat .fi{font-size:26px;margin-bottom:4px}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:8px 0}
.quiz-title{font-weight:700;color:var(--quiz-q);margin-bottom:6px}
.quiz-q{font-size:13px;color:var(--quiz-q);margin-bottom:8px;font-weight:600}
.quiz-opt{display:block;width:100%;font-size:13px;color:var(--quiz-opt-text);padding:8px 10px;margin:4px 0;border-radius:6px;cursor:pointer;border:1px solid var(--quiz-opt-border);background:var(--quiz-opt-bg);text-align:left}
.quiz-opt:hover{background:var(--quiz-opt-hover);border-color:var(--accent)}
.quiz-opt.correct{background:var(--quiz-correct-bg);border-color:#22c55e;color:var(--quiz-correct-text)}
.quiz-opt.wrong{background:var(--quiz-wrong-bg);border-color:#ef4444;color:var(--quiz-wrong-text)}
.quiz-feedback{font-size:12px;line-height:1.6;margin-top:6px;padding:7px;border-radius:6px}
.quiz-feedback.ok{background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-feedback.bad{background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
.slider-row{margin:6px 0}
.slider-row label{font-size:12px;color:var(--slider-label)}
.slider-row input[type=range]{width:100%;margin:4px 0}
.concept-box{padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="overlay" id="overlay">
<h1>🚗 自动驾驶探险</h1>
<p class="sub">从传感器到决策，探索无人驾驶的核心技术</p>
<p class="desc">7 个关卡带你深入理解自动驾驶全栈技术：传感器融合、环境感知、高精定位、路径规划、决策控制、V2X车联网和安全伦理。通过交互式动画，亲手操控一辆自动驾驶汽车。</p>
<button class="start-btn" onclick="startGame()">开始探索 →</button>
<div class="features">
<div class="feat"><div class="fi">📡</div>传感器融合</div>
<div class="feat"><div class="fi">👁️</div>环境感知</div>
<div class="feat"><div class="fi">🗺️</div>高精定位</div>
<div class="feat"><div class="fi">🛤️</div>路径规划</div>
<div class="feat"><div class="fi">🎮</div>决策控制</div>
<div class="feat"><div class="fi">📶</div>V2X车联网</div>
<div class="feat"><div class="fi">⚖️</div>安全伦理</div>
</div>
</div>
<div id="wrap">
<div class="panel" id="panel"></div>
<canvas id="cv"></canvas>
</div>
<div class="bar" id="bar"></div>

<script>
// === Theme ===
let isDark=true;
const TH={
  dark:{bg:'#0a0a1a',grid:'rgba(6,182,212,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',road:'#1a1a3a',roadLine:'#334155',car:'#06b6d4',carGlow:'rgba(6,182,212,0.3)',obstacle:'#ef4444',sensor:'rgba(6,182,212,0.15)',lidar:'#22c55e',radar:'#f59e0b',camera:'#3b82f6',path:'#8b5cf6',showStars:true},
  light:{bg:'#f0f2f5',grid:'rgba(6,182,212,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',road:'#d1d5db',roadLine:'#9ca3af',car:'#0891b2',carGlow:'rgba(8,145,178,0.3)',obstacle:'#dc2626',sensor:'rgba(8,145,178,0.1)',lidar:'#16a34a',radar:'#d97706',camera:'#2563eb',path:'#7c3aed',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{renderPanel();draw()}catch(e){}}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),panel=document.getElementById('panel'),bar=document.getElementById('bar'),overlay=document.getElementById('overlay');
let W,H,curLevel=0,animId,time=0,animating=false;
let levelObjs=Array.from({length:7},()=>[false,false,false]);
let quizPassed=Array.from({length:7},()=>false);
let quizFeedback={};
let S={};
const LOCALIZATION_SAMPLE_FRAMES=60;
const CONTROL_STATES=['cruise','follow','lane_change','stop'];
const CONTROL_STATE_LABELS={cruise:'巡航',follow:'跟车',lane_change:'变道',stop:'停车'};

function resize(){W=cv.width=cv.offsetWidth;H=cv.height=cv.offsetHeight}
window.addEventListener('resize',()=>{resize();draw()});

const LEVELS=[
{name:'传感器融合',desc:'<div class="concept-box"><b>关键词：</b>摄像头、激光雷达(LiDAR)、毫米波雷达、多传感器融合</div>画布上有一辆自动驾驶汽车，周围有三种传感器的探测范围。拖动滑块调节各传感器的权重，观察融合效果如何变化。',
 objs:['安装全部三种传感器','调节权重使融合置信度>90%','在恶劣天气下保持感知'],
 quiz:{q:'多传感器融合的主要优势是什么？',opts:['降低成本','提高冗余性和鲁棒性','减少计算量','简化算法'],ans:1,why:'摄像头、LiDAR 和毫米波雷达各有盲点，融合后的关键价值是互相校验，在雨雾、遮挡或单传感器异常时仍能维持可靠感知。'},
 learn:'<b>摄像头</b>：高分辨率纹理/颜色信息，受光照影响大。<br><b>LiDAR</b>：精确3D点云，不受光照影响，但雨雾衰减。<br><b>毫米波雷达</b>：测速精确，全天候工作，但角分辨率低。<br><b>融合策略</b>：早期融合（原始数据级）、晚期融合（决策级）、中期融合（特征级）。'},
{name:'环境感知',desc:'<div class="concept-box"><b>关键词：</b>目标检测、语义分割、3D点云处理</div>画布上显示一个驾驶场景的俯视图，包含行人、车辆和交通标志。调节检测阈值，观察目标检测框的变化——阈值太低会产生误检，太高会漏检。',
 objs:['调节阈值使检测准确率>85%','完成语义分割着色','识别全部3D目标'],
 quiz:{q:'目标检测中，降低置信度阈值会导致什么？',opts:['误检增多','漏检增多','计算量减少','精度提高'],ans:0,why:'阈值降低会让更多低置信度候选框通过，召回率上升，但把背景或弱证据误判为目标的概率也会上升。'},
 learn:'<b>目标检测</b>：用边界框标注物体位置和类别（YOLO、SSD等）。<br><b>语义分割</b>：逐像素分类（道路、人行道、车辆、行人等）。<br><b>3D点云</b>：LiDAR生成的三维空间点集，用PointNet等网络处理。<br><b>精确率vs召回率</b>：阈值越低召回率越高但精确率下降。'},
{name:'高精地图与定位',desc:'<div class="concept-box"><b>关键词：</b>GPS+IMU+视觉里程计、卡尔曼滤波、高精地图</div>画布上有一辆车在地图上行驶，三种定位源（GPS蓝点、IMU绿线、视觉紫线）各有误差。调节卡尔曼滤波参数，让融合定位（红点）尽可能贴近真实位置。',
 objs:['观察三种定位源的误差特征','调节滤波参数使定位误差<0.5m','在GPS信号丢失时保持定位'],
 quiz:{q:'卡尔曼滤波的核心思想是什么？',opts:['取最大值','只用最新数据','加权平均预测和观测','丢弃异常值'],ans:2,why:'卡尔曼滤波先用运动模型预测，再用观测修正；权重由不确定性决定，所以不是简单相信某一个传感器。'},
 learn:'<b>GPS</b>：全球定位，精度~2m，受遮挡影响。<br><b>IMU</b>：惯性测量，短期精确但会漂移。<br><b>视觉里程计</b>：通过图像特征匹配估计运动。<br><b>卡尔曼滤波</b>：预测+更新循环，用协方差加权融合多源数据，最优估计。'},
{name:'路径规划',desc:'<div class="concept-box"><b>关键词：</b>A*算法、RRT快速随机树、动态障碍物避让</div>画布上有一个网格地图，绿色是起点，红色是终点，灰色是障碍物。点击选择算法，观察不同路径规划算法的搜索过程和最终路径。',
 objs:['用A*算法找到最短路径','用RRT算法探索路径','成功避让动态障碍物'],
 quiz:{q:'A*算法相比Dijkstra的优势是什么？',opts:['保证最短路径','使用启发函数减少搜索范围','不需要地图','计算更简单'],ans:1,why:'A* 在已走代价 g 之外加入到目标的启发估计 h，把搜索重点引向终点，通常比无方向扩展更高效。'},
 learn:'<b>A*算法</b>：f(n)=g(n)+h(n)，g是已走代价，h是启发估计。保证最优且高效。<br><b>RRT</b>：随机采样+树扩展，适合高维空间和复杂约束。<br><b>动态避障</b>：预测障碍物轨迹，实时重规划路径。'},
{name:'决策与控制',desc:'<div class="concept-box"><b>关键词：</b>状态机、PID控制、MPC模型预测控制</div>画布上有一辆车需要沿着弯道行驶。调节PID参数（P/I/D），观察车辆的转向响应——参数不当会导致震荡或响应迟缓。',
 objs:['理解状态机的状态转换','调节PID使车辆平稳过弯','用MPC预测最优轨迹'],
 quiz:{q:'PID控制中，D（微分）项的作用是什么？',opts:['消除稳态误差','加快响应速度','抑制震荡','增大超调'],ans:2,why:'D 项关注误差变化速度，能提前对快速变化作出阻尼响应，减少过冲和来回摆动。'},
 learn:'<b>状态机</b>：巡航→跟车→变道→停车，根据环境切换行为。<br><b>PID</b>：P比例（当前误差）、I积分（累积误差）、D微分（误差变化率）。<br><b>MPC</b>：建立车辆模型，预测未来N步，优化控制序列，只执行第一步。'},

// === Drawing helpers ===
function drawGrid(){ctx.strokeStyle=t().grid;ctx.lineWidth=1;for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}}
function drawStars(){if(!t().showStars)return;for(let i=0;i<60;i++){let sx=(i*137.5+time*0.02*(i%3+1))%W,sy=(i*97.3)%H;ctx.fillStyle=`rgba(255,255,255,${0.2+0.3*Math.sin(time*0.01+i)})`;ctx.fillRect(sx,sy,1.5,1.5)}}
function drawCar(x,y,w,h,angle){ctx.save();ctx.translate(x,y);ctx.rotate(angle||0);ctx.fillStyle=t().car;ctx.shadowColor=t().carGlow;ctx.shadowBlur=15;ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,4);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle=isDark?'#fff':'#1e293b';ctx.fillRect(-w/2+3,-h/2+2,6,3);ctx.fillRect(w/2-9,-h/2+2,6,3);ctx.fillRect(-w/2+3,h/2-5,6,3);ctx.fillRect(w/2-9,h/2-5,6,3);ctx.restore()}
function drawText(txt,x,y,size,color,align){ctx.fillStyle=color||t().text;ctx.font=`${size||14}px system-ui`;ctx.textAlign=align||'center';ctx.fillText(txt,x,y)}

// === Level state init ===
function initLevel(idx){
  idx=Number(idx);
  if(!Number.isInteger(idx)||idx<0||idx>=LEVELS.length)return;
  if(!quizPassed[idx])delete quizFeedback[idx];
  S={phase:0,t:0};
  if(idx===0){S.sensors={camera:false,lidar:false,radar:false};S.weights={camera:0.3,lidar:0.3,radar:0.3};S.weather='clear';S.confidence=0;S.installed=0;S.weatherRobustConfirmed=false}
  if(idx===1){S.threshold=0.8;S.objects=[];S.segDone=false;S.detected3d=false;let confs=[0.92,0.84,0.76,0.68,0.58,0.46,0.38,0.32];for(let i=0;i<8;i++)S.objects.push({x:100+Math.random()*(W-300),y:80+Math.random()*(H-160),type:['car','person','sign'][i%3],conf:confs[i],w:30+Math.random()*20,h:30+Math.random()*20,detected:false})}
  if(idx===2){S.gpsNoise=3;S.imuDrift=0;S.kfQ=1;S.kfR=1;S.kfAdjusted=false;S.truePos={x:W/2,y:H/2};S.gpsPos={x:0,y:0};S.imuPos={x:0,y:0};S.visPos={x:0,y:0};S.fusedPos={x:0,y:0};S.error=5;S.gpsLost=false;S.pathT=0}
  if(idx===3){S.grid=[];S.gridW=25;S.gridH=18;S.start={x:1,y:1};S.end={x:23,y:16};S.algo='none';S.searching=false;S.path=[];S.visited=[];S.openSet=[];S.dynObs=[];S.searchStep=0;
    for(let y=0;y<S.gridH;y++){S.grid[y]=[];for(let x=0;x<S.gridW;x++)S.grid[y][x]=0}
    for(let i=0;i<60;i++){let gx=2+Math.floor(Math.random()*(S.gridW-4)),gy=2+Math.floor(Math.random()*(S.gridH-4));if((gx!==S.start.x||gy!==S.start.y)&&(gx!==S.end.x||gy!==S.end.y))S.grid[gy][gx]=1}
    clearPlanningCorridor();
    S.dynObs=[{x:12,y:9,dx:0.02,dy:0.01},{x:18,y:5,dx:-0.015,dy:0.02}];S.dynamicChallenge=false}
  if(idx===4){S.pidP=0;S.pidI=0;S.pidD=0;S.carX=W*0.3;S.carY=H*0.7;S.carAngle=0;S.carSpeed=0;S.targetPath=[];S.steerAngle=0;S.integral=0;S.prevError=0;S.trail=[];S.stateMachine='cruise';S.stateVisited={cruise:true};S.mpcActive=false;S.mpcPath=[];S.mpcPreviewFrames=0;
    for(let i=0;i<=100;i++){let tt=i/100;S.targetPath.push({x:W*0.15+tt*(W*0.7),y:H*0.5+Math.sin(tt*Math.PI*2.5)*H*0.25})}}
  if(idx===5){S.vehicles=[{x:W*0.3,y:H*0.4,id:'V1',linked:[]},{x:W*0.6,y:H*0.3,id:'V2',linked:[]},{x:W*0.5,y:H*0.65,id:'V3',linked:[]}];S.rsu={x:W*0.75,y:H*0.55,id:'RSU'};S.cloud={x:W*0.8,y:H*0.15,id:'Cloud'};S.links=[];S.v2vDone=false;S.v2iDone=false;S.v2cDone=false;S.cloudLinked=false;S.msgParticles=[];S.selectedNode=null}
  if(idx===6){S.scenario=0;S.choice=-1;S.ethicalChoices={straight:false,swerve:false};S.ethicalConfirmed=false;S.asilLevel=0;S.redundancy={sensor:false,compute:false,brake:false};S.dilemmaShown=false;S.safetyDone=false;S.redundancyDone=false}
}

// === Level draw ===
function drawLevel(idx){
  const th=t();
  if(idx===0)drawSensorFusion(th);
  if(idx===1)drawPerception(th);
  if(idx===2)drawLocalization(th);
  if(idx===3)drawPathPlanning(th);
  if(idx===4)drawControl(th);
  if(idx===5)drawV2X(th);
  if(idx===6)drawSafety(th);
}

function updateFusionConfidence(){
  if(!S.sensors||!S.weights)return 0;
  let score=0,totalWeight=0;
  if(S.sensors.camera){score+=S.weights.camera*(S.weather==='clear'?95:40);totalWeight+=S.weights.camera}
  if(S.sensors.lidar){score+=S.weights.lidar*(S.weather==='clear'?90:60);totalWeight+=S.weights.lidar}
  if(S.sensors.radar){score+=S.weights.radar*(S.weather==='clear'?70:85);totalWeight+=S.weights.radar}
  S.confidence=totalWeight>0?Math.min(100,score/totalWeight):0;
  return S.confidence;
}
function fusionWeightSummaryHTML(){
  if(!S.weights)return '有效占比: 等待传感器权重';
  const sum=S.weights.camera+S.weights.lidar+S.weights.radar;
  if(sum<=0)return '<span style="color:#ef4444">有效占比: 请至少保留一种传感器权重</span>';
  const camera=S.weights.camera/sum*100,lidar=S.weights.lidar/sum*100,radar=S.weights.radar/sum*100;
  const hint=S.weather==='clear'?'晴天更依赖摄像头纹理和 LiDAR 距离，雷达提供速度冗余。':'雨雾下降低摄像头权重，提高雷达占比，才能保持鲁棒感知。';
  return `有效占比: 摄像头 ${camera.toFixed(0)}% · LiDAR ${lidar.toFixed(0)}% · 雷达 ${radar.toFixed(0)}%<br><span style="color:var(--stage-hint)">${hint}</span>`;
}
function updateFusionMetricPanel(){
  const el=document.getElementById('fusionConfidence');
  const confidence=updateFusionConfidence();
  if(el){
    el.textContent=`融合置信度: ${confidence.toFixed(1)}%`;
    el.style.color=confidence>90?'#22c55e':confidence>70?'#f59e0b':'#ef4444';
  }
  const weights=document.getElementById('fusionWeights');
  if(weights)weights.innerHTML=fusionWeightSummaryHTML();
}

function drawSensorFusion(th){
  let cx=W/2,cy=H/2;
  drawCar(cx,cy,50,80,0);
  if(S.sensors.camera){ctx.strokeStyle=th.camera;ctx.lineWidth=2;ctx.globalAlpha=0.3;ctx.beginPath();ctx.moveTo(cx,cy-40);ctx.lineTo(cx-80,cy-160);ctx.lineTo(cx+80,cy-160);ctx.closePath();ctx.stroke();ctx.fillStyle=th.camera;ctx.fill();ctx.globalAlpha=1;drawText('📷 摄像头',cx,cy-170,12,th.camera)}
  if(S.sensors.lidar){ctx.strokeStyle=th.lidar;ctx.lineWidth=2;ctx.globalAlpha=0.15;ctx.beginPath();ctx.arc(cx,cy,140,0,Math.PI*2);ctx.fill();ctx.globalAlpha=0.4;ctx.stroke();ctx.globalAlpha=1;for(let a=0;a<Math.PI*2;a+=0.15){let r=130+Math.random()*20;ctx.fillStyle=th.lidar;ctx.fillRect(cx+Math.cos(a)*r,cy+Math.sin(a)*r,2,2)}drawText('🔦 LiDAR',cx+150,cy-10,12,th.lidar,'left')}
  if(S.sensors.radar){ctx.strokeStyle=th.radar;ctx.lineWidth=2;ctx.globalAlpha=0.2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,180,Math.PI*1.25,Math.PI*1.75);ctx.closePath();ctx.fillStyle=th.radar;ctx.fill();ctx.globalAlpha=1;drawText('📡 雷达',cx,cy+120,12,th.radar)}
  updateFusionConfidence();
  if(S.weather!=='clear'){ctx.fillStyle='rgba(150,150,180,0.3)';ctx.fillRect(0,0,W,H);for(let i=0;i<40;i++){ctx.fillStyle='rgba(200,200,220,0.4)';let rx=(i*73+time*2)%W,ry=(i*47+time*3)%H;ctx.fillRect(rx,ry,2,8)}}
  let barW=200,barH=20,barX=cx-barW/2,barY=30;
  ctx.fillStyle='#333';ctx.fillRect(barX,barY,barW,barH);
  ctx.fillStyle=S.confidence>90?'#22c55e':S.confidence>60?'#f59e0b':'#ef4444';
  ctx.fillRect(barX,barY,barW*S.confidence/100,barH);
  drawText(`融合置信度: ${S.confidence.toFixed(1)}%`,cx,barY+barH+18,14,th.text);
}

function drawPerception(th){
  ctx.fillStyle=isDark?'#1a2a1a':'#e8f5e9';ctx.fillRect(0,0,W,H);
  ctx.fillStyle=isDark?'#2a2a3a':'#bdbdbd';ctx.fillRect(W*0.1,H*0.3,W*0.8,H*0.15);
  ctx.setLineDash([20,15]);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W*0.1,H*0.375);ctx.lineTo(W*0.9,H*0.375);ctx.stroke();ctx.setLineDash([]);
  if(S.segDone){
    ctx.fillStyle='rgba(34,197,94,0.18)';ctx.fillRect(W*0.1,H*0.3,W*0.8,H*0.15);
    ctx.fillStyle='rgba(59,130,246,0.10)';ctx.fillRect(0,0,W,H*0.3);ctx.fillRect(0,H*0.45,W,H*0.55);
    drawText('语义分割：道路 / 背景 / 交通参与者',W/2,H*0.52,13,'#22c55e');
  }
  for(let o of S.objects){
    let col=o.type==='car'?'#3b82f6':o.type==='person'?'#f59e0b':'#22c55e';
    ctx.fillStyle=col;ctx.globalAlpha=0.7;
    if(o.type==='car'){ctx.fillRect(o.x-o.w/2,o.y-o.h/2,o.w,o.h)}
    else if(o.type==='person'){ctx.beginPath();ctx.arc(o.x,o.y,o.h/2,0,Math.PI*2);ctx.fill()}
    else{ctx.beginPath();ctx.moveTo(o.x,o.y-o.h/2);ctx.lineTo(o.x+o.w/2,o.y+o.h/2);ctx.lineTo(o.x-o.w/2,o.y+o.h/2);ctx.closePath();ctx.fill()}
    ctx.globalAlpha=1;
    if(o.conf>=S.threshold){o.detected=true;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.strokeRect(o.x-o.w/2-5,o.y-o.h/2-5,o.w+10,o.h+10);drawText(`${(o.conf*100).toFixed(0)}%`,o.x,o.y-o.h/2-10,11,col)}
    else{o.detected=false}
    if(S.detected3d&&o.conf>=0.5){
      let depth=Math.max(5,Math.round(45-(o.y/H)*30));
      ctx.strokeStyle='rgba(34,197,94,0.7)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(o.x+o.w/2+8,o.y+o.h/2);ctx.lineTo(o.x+o.w/2+8,o.y+o.h/2-depth);ctx.stroke();
      drawText(`${depth}m`,o.x+o.w/2+14,o.y+o.h/2-depth,10,'#22c55e','left');
    }
  }
  let m=getPerceptionMetrics();
  drawText(`F1: ${m.f1.toFixed(1)}% | 精确率: ${m.precision.toFixed(0)}% | 召回率: ${m.recall.toFixed(0)}%`,W/2,30,16,m.f1>85?'#22c55e':th.text);
}

function getPerceptionMetrics(){
  if(!S.objects)return{precision:0,recall:0,f1:0,tp:0,fp:0,fn:0};
  let tp=0,fp=0,fn=0;
  for(let o of S.objects){
    let truth=o.conf>=0.5,pred=o.conf>=S.threshold;
    if(pred&&truth)tp++;
    if(pred&&!truth)fp++;
    if(!pred&&truth)fn++;
  }
  let precision=tp+fp>0?tp/(tp+fp):0;
  let recall=tp+fn>0?tp/(tp+fn):0;
  let f1=precision+recall>0?2*precision*recall/(precision+recall):0;
  return{precision:precision*100,recall:recall*100,f1:f1*100,tp,fp,fn};
}
function perceptionMetricText(m){
  m=m||getPerceptionMetrics();
  return `综合分 F1: ${m.f1.toFixed(1)}% · 精确率 ${m.precision.toFixed(0)}% · 召回率 ${m.recall.toFixed(0)}%`;
}
function updatePerceptionMetricPanel(){
  const el=document.getElementById('perceptionMetrics');
  if(!el)return;
  const m=getPerceptionMetrics();
  el.textContent=perceptionMetricText(m);
  el.style.color=m.f1>85?'#22c55e':'#f59e0b';
}

function drawLocalization(th){
  if(!S.truePos)return;
  ctx.strokeStyle=isDark?'#333':'#ccc';ctx.lineWidth=1;
  for(let a=0;a<=1;a+=0.01){let ang=a*Math.PI*4;ctx.fillStyle='rgba(100,100,100,0.3)';ctx.fillRect(W/2+Math.cos(ang)*W*0.25,H/2+Math.sin(ang*0.5)*H*0.25,2,2)}
  if(!S.gpsLost){ctx.fillStyle=th.camera;ctx.beginPath();ctx.arc(S.gpsPos.x,S.gpsPos.y,6,0,Math.PI*2);ctx.fill();drawText('GPS',S.gpsPos.x+12,S.gpsPos.y-8,11,th.camera,'left')}
  ctx.fillStyle=th.lidar;ctx.beginPath();ctx.arc(S.imuPos.x,S.imuPos.y,6,0,Math.PI*2);ctx.fill();drawText('IMU',S.imuPos.x+12,S.imuPos.y-8,11,th.lidar,'left');
  ctx.fillStyle=th.path;ctx.beginPath();ctx.arc(S.visPos.x,S.visPos.y,6,0,Math.PI*2);ctx.fill();drawText('视觉',S.visPos.x+12,S.visPos.y-8,11,th.path,'left');
  ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(S.fusedPos.x,S.fusedPos.y,8,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#ef4444';ctx.lineWidth=2;ctx.beginPath();ctx.arc(S.fusedPos.x,S.fusedPos.y,12,0,Math.PI*2);ctx.stroke();drawText('融合',S.fusedPos.x+16,S.fusedPos.y-10,11,'#ef4444','left');
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(S.truePos.x,S.truePos.y,4,0,Math.PI*2);ctx.fill();drawText('真实',S.truePos.x+12,S.truePos.y+15,11,'#fff','left');
  drawText(`定位误差: ${S.error.toFixed(2)}m ${S.gpsLost?'⚠️ GPS信号丢失':''}`,W/2,30,16,S.error<0.5?'#22c55e':'#f59e0b');
}
function updateLocalizationMetricPanel(){
  const el=document.getElementById('localizationError');
  if(!el)return;
  el.textContent=`定位误差: ${S.error.toFixed(2)}m`;
  el.style.color=S.error<0.5?'#22c55e':S.error<2?'#f59e0b':'#ef4444';
  const src=document.getElementById('sourceErrors');
  if(src)src.textContent=sourceErrorText();
  const sample=document.getElementById('localizationSample');
  if(sample)sample.textContent=localizationSampleText();
}
function sourceErrorText(){
  if(!S.truePos||!S.imuPos||!S.visPos)return '源误差: 等待定位数据...';
  const dist=p=>Math.sqrt((p.x-S.truePos.x)**2+(p.y-S.truePos.y)**2)/10;
  const gps=S.gpsLost?'GPS: 信号丢失':`GPS: ${dist(S.gpsPos).toFixed(2)}m`;
  return `${gps} · IMU: ${dist(S.imuPos).toFixed(2)}m · 视觉: ${dist(S.visPos).toFixed(2)}m`;
}
function localizationSampleText(){
  const frames=Math.min(LOCALIZATION_SAMPLE_FRAMES,Math.floor(S.t||0));
  return levelObjs[2][0]?'定位源采样完成：GPS 绝对定位、IMU 短期连续、视觉里程计相对稳定。':`定位源采样: ${frames}/${LOCALIZATION_SAMPLE_FRAMES} 帧，比较 GPS、IMU、视觉各自误差。`;
}

function drawPathPlanning(th){
  let cellW=Math.min((W-20)/S.gridW,(H-60)/S.gridH),offX=(W-cellW*S.gridW)/2,offY=40;
  for(let y=0;y<S.gridH;y++)for(let x=0;x<S.gridW;x++){
    let px=offX+x*cellW,py=offY+y*cellW;
    if(S.grid[y][x]===1){ctx.fillStyle=isDark?'#4a4a5a':'#9ca3af'}
    else if(S.visited.some(v=>v.x===x&&v.y===y)){ctx.fillStyle=isDark?'rgba(99,102,241,0.2)':'rgba(99,102,241,0.15)'}
    else{ctx.fillStyle=isDark?'#111':'#e5e7eb'}
    ctx.fillRect(px+1,py+1,cellW-2,cellW-2);
  }
  for(let d of S.dynObs){ctx.fillStyle=d.blocks?'#ef4444':'#f59e0b';ctx.beginPath();ctx.arc(offX+d.x*cellW+cellW/2,offY+d.y*cellW+cellW/2,cellW/2,0,Math.PI*2);ctx.fill()}
  if(S.path.length>1){ctx.strokeStyle=th.path;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(offX+S.path[0].x*cellW+cellW/2,offY+S.path[0].y*cellW+cellW/2);for(let p of S.path)ctx.lineTo(offX+p.x*cellW+cellW/2,offY+p.y*cellW+cellW/2);ctx.stroke()}
  ctx.fillStyle='#22c55e';ctx.fillRect(offX+S.start.x*cellW+2,offY+S.start.y*cellW+2,cellW-4,cellW-4);
  ctx.fillStyle='#ef4444';ctx.fillRect(offX+S.end.x*cellW+2,offY+S.end.y*cellW+2,cellW-4,cellW-4);
  drawText(S.algo==='none'?'选择算法开始规划':S.searching?`${S.algo.toUpperCase()} 搜索中... 步骤: ${S.searchStep}`:`${S.algo.toUpperCase()} 路径长度: ${S.path.length}`,W/2,25,14,th.text);
}

function drawControl(th){

// === Update logic ===
function updateLevel(idx,dt){
  S.t+=dt;
  let panelDirty=false;
  if(idx===2){
    stepLocalization(dt);
    panelDirty=checkLocalizationGoals()||panelDirty;
  }
  if(idx===3&&S.searching){
    S.searchStep++;
    if(S.algo==='astar')stepAStar();
    if(S.algo==='rrt')stepRRT();
    for(let d of S.dynObs){d.x+=d.dx;d.y+=d.dy;if(d.x<1||d.x>S.gridW-2)d.dx*=-1;if(d.y<1||d.y>S.gridH-2)d.dy*=-1}
  }
  if(idx===4&&S.pidP>0){
    let closest=null,minD=Infinity;
    for(let p of S.targetPath){let d=Math.sqrt((p.x-S.carX)**2+(p.y-S.carY)**2);if(d<minD){minD=d;closest=p}}
    if(closest){
      let lookIdx=Math.min(S.targetPath.indexOf(closest)+5,S.targetPath.length-1);
      let target=S.targetPath[lookIdx];
      let desired=Math.atan2(target.y-S.carY,target.x-S.carX);
      let error=desired-S.carAngle;while(error>Math.PI)error-=Math.PI*2;while(error<-Math.PI)error+=Math.PI*2;
      S.integral+=error*dt;S.integral=Math.max(-2,Math.min(2,S.integral));
      let deriv=(error-S.prevError)/dt;S.prevError=error;
      S.steerAngle=S.pidP*error+S.pidI*S.integral+S.pidD*deriv;
      S.steerAngle=Math.max(-0.1,Math.min(0.1,S.steerAngle));
      S.carAngle+=S.steerAngle;S.carSpeed=2;
      S.carX+=Math.cos(S.carAngle)*S.carSpeed;S.carY+=Math.sin(S.carAngle)*S.carSpeed;
      S.trail.push({x:S.carX,y:S.carY});if(S.trail.length>300)S.trail.shift();
      if(S.mpcActive){S.mpcPath=[];for(let i=0;i<20;i++){let fa=S.carAngle+S.steerAngle*i*0.5;S.mpcPath.push({x:S.carX+Math.cos(fa)*i*10,y:S.carY+Math.sin(fa)*i*10})}}
      panelDirty=checkControlGoals()||panelDirty;
      updateControlHintPanel();
    }
  }
  if(idx===4&&S.mpcActive){
    S.mpcPreviewFrames=(S.mpcPreviewFrames||0)+dt;
    if(!S.mpcPath||S.mpcPath.length<10)buildMpcPath();
    panelDirty=checkControlGoals()||panelDirty;
  }
  if(idx===5){if(Math.random()<0.05)for(let l of S.links)S.msgParticles.push({x1:l.x1,y1:l.y1,x2:l.x2,y2:l.y2,t:0,color:l.color})}
  if(panelDirty)renderPanel();
}

// A* step
function stepAStar(){
  if(S.path.length>0)return;
  if(!S._astarInit){S._astarInit=true;S._gScore={};S._fScore={};S._cameFrom={};
    let k=`${S.start.x},${S.start.y}`;S._gScore[k]=0;S._fScore[k]=heur(S.start,S.end);S.openSet=[{...S.start}];S.visited=[]}
  if(S.openSet.length===0){S.searching=false;return}
  S.openSet.sort((a,b)=>(S._fScore[`${a.x},${a.y}`]??Infinity)-(S._fScore[`${b.x},${b.y}`]??Infinity));
  let cur=S.openSet.shift(),ck=`${cur.x},${cur.y}`;S.visited.push(cur);
  if(cur.x===S.end.x&&cur.y===S.end.y){S.path=reconstructPath(S._cameFrom,cur);S.searching=false;completePathGoal(0);return}
  for(let[dx,dy]of[[0,1],[0,-1],[1,0],[-1,0]]){
    let nx=cur.x+dx,ny=cur.y+dy,nk=`${nx},${ny}`;
    if(isPlanningBlocked(nx,ny))continue;
    let tg=(S._gScore[ck]??0)+1;
    if(tg<(S._gScore[nk]??Infinity)){S._cameFrom[nk]=cur;S._gScore[nk]=tg;S._fScore[nk]=tg+heur({x:nx,y:ny},S.end);
      if(!S.openSet.some(o=>o.x===nx&&o.y===ny))S.openSet.push({x:nx,y:ny})}}
}
function heur(a,b){return Math.abs(a.x-b.x)+Math.abs(a.y-b.y)}
function reconstructPath(cf,cur){let p=[cur];while(cf[`${cur.x},${cur.y}`]){cur=cf[`${cur.x},${cur.y}`];p.unshift(cur)}return p}
function isPlanningBlocked(x,y){
  if(x<0||y<0||x>=S.gridW||y>=S.gridH||S.grid[y][x]===1)return true;
  return S.dynamicChallenge&&S.dynObs.some(d=>d.blocks&&Math.round(d.x)===x&&Math.round(d.y)===y);
}
function isPlanningSegmentBlocked(a,b){
  const steps=Math.max(Math.abs(b.x-a.x),Math.abs(b.y-a.y),1);
  for(let i=1;i<=steps;i++){
    const x=Math.round(a.x+(b.x-a.x)*i/steps),y=Math.round(a.y+(b.y-a.y)*i/steps);
    if(isPlanningBlocked(x,y))return true;
  }
  return false;
}
function isPathClear(path){
  if(!Array.isArray(path)||path.length<2)return false;
  for(let i=0;i<path.length;i++)if(isPlanningBlocked(path[i].x,path[i].y))return false;
  for(let i=1;i<path.length;i++)if(isPlanningSegmentBlocked(path[i-1],path[i]))return false;
  return true;
}

// RRT step
function stepRRT(){
  if(S.path.length>0)return;
  if(!S._rrtNodes){S._rrtNodes=[{...S.start,parent:null}];S._rrtEdges=[]}
  let rand=Math.random()<0.1?{...S.end}:{x:Math.floor(Math.random()*S.gridW),y:Math.floor(Math.random()*S.gridH)};
  let nearest=S._rrtNodes[0],minD=Infinity;
  for(let n of S._rrtNodes){let d=Math.abs(n.x-rand.x)+Math.abs(n.y-rand.y);if(d<minD){minD=d;nearest=n}}
  let dx=rand.x-nearest.x,dy=rand.y-nearest.y,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<0.5)return;
  let step=Math.min(2,dist),nx=Math.round(nearest.x+dx/dist*step),ny=Math.round(nearest.y+dy/dist*step);
  if(isPlanningBlocked(nx,ny)||isPlanningSegmentBlocked(nearest,{x:nx,y:ny}))return;
  let newNode={x:nx,y:ny,parent:S._rrtNodes.indexOf(nearest)};
  S._rrtNodes.push(newNode);S._rrtEdges.push({x1:nearest.x,y1:nearest.y,x2:nx,y2:ny});S.visited.push({x:nx,y:ny});
  if(Math.abs(nx-S.end.x)<=1&&Math.abs(ny-S.end.y)<=1){
    let p=[{x:nx,y:ny}],ci=S._rrtNodes.length-1;
    while(S._rrtNodes[ci].parent!==null){ci=S._rrtNodes[ci].parent;p.unshift({x:S._rrtNodes[ci].x,y:S._rrtNodes[ci].y})}
    S.path=p;S.searching=false;completePathGoal(1)}
}

// === Click handler ===
function handleClick(x,y){
  if(curLevel===0){
    let cx=W/2,cy=H/2;
    if(!S.sensors.camera&&y<cy-40){S.sensors.camera=true;S.installed++;if(S.installed>=3)completeObj(0)}
    if(!S.sensors.lidar&&Math.sqrt((x-cx)**2+(y-cy)**2)<160&&Math.sqrt((x-cx)**2+(y-cy)**2)>60){S.sensors.lidar=true;S.installed++;if(S.installed>=3)completeObj(0)}
    if(!S.sensors.radar&&y>cy+40){S.sensors.radar=true;S.installed++;if(S.installed>=3)completeObj(0)}
  }
  if(curLevel===5){
    for(let v of S.vehicles){if(Math.abs(x-v.x)<25&&Math.abs(y-v.y)<15){
      if(S.selectedNode&&S.selectedNode.id&&S.selectedNode.id.startsWith('V')&&v!==S.selectedNode){
        S.links.push({x1:S.selectedNode.x,y1:S.selectedNode.y,x2:v.x,y2:v.y,color:'#06b6d4'});S.v2vDone=true;completeObj(0);completeV2CIfReady();S.selectedNode=null;return}
      S.selectedNode=v;renderPanel();return}}
    if(Math.abs(x-S.rsu.x)<30&&Math.abs(y-S.rsu.y)<20){
      if(S.selectedNode&&S.selectedNode.id!=='RSU'){S.links.push({x1:S.selectedNode.x,y1:S.selectedNode.y,x2:S.rsu.x,y2:S.rsu.y,color:'#f59e0b'});S.v2iDone=true;completeObj(1);completeV2CIfReady();S.selectedNode=null}
      else {S.selectedNode=S.rsu;renderPanel()}return}
    if(Math.abs(x-S.cloud.x)<35&&Math.abs(y-S.cloud.y)<22){
      if(S.selectedNode){S.links.push({x1:S.selectedNode.x,y1:S.selectedNode.y,x2:S.cloud.x,y2:S.cloud.y,color:'#3b82f6'});S.cloudLinked=true;completeV2CIfReady();S.selectedNode=null;renderPanel()}
      return}
  }
  if(curLevel===6){
    if(S.scenario===0&&S.choice<0&&y>H*0.4&&y<H*0.6)chooseEthicalAction(x<W/2?0:1);
    if(S.scenario===1)advanceAsilLevel();
    if(S.scenario===2){
      let parts=[{key:'sensor',x:W*0.2},{key:'compute',x:W*0.5},{key:'brake',x:W*0.8}];
      for(let p of parts){if(Math.abs(x-p.x)<55&&Math.abs(y-H*0.35)<35)enableRedundancy(p.key)}
    }
  }
}

// === Objectives ===
function resetProgress(){curLevel=0;levelObjs=Array.from({length:7},()=>[false,false,false]);quizPassed=Array.from({length:7},()=>false);quizFeedback={};initLevel(0)}
function completeObj(i,silent=false){i=Number(i);if(!Number.isInteger(i)||i<0||i>=3||!levelObjs[curLevel]||levelObjs[curLevel][i])return false;levelObjs[curLevel][i]=true;if(!silent)renderPanel();return true}
function isLevelDone(idx){idx=Number(idx);return Number.isInteger(idx)&&idx>=0&&idx<LEVELS.length&&levelObjs[idx].every(Boolean)}
function isUnlocked(idx){idx=Number(idx);return Number.isInteger(idx)&&idx>=0&&idx<LEVELS.length&&(idx===0||quizPassed[idx-1])}
function allQuizPassed(){return quizPassed.every(Boolean)}
function levelStatusText(){
  const levelPassed=quizPassed[curLevel];
  const done=levelPassed?3:(levelObjs[curLevel]||[]).filter(Boolean).length;
  const status=levelPassed?'已通关':done===3?'待测验':'进行中';
  return `目标 ${done}/3 · ${status} · 通关 ${quizPassed.filter(Boolean).length}/7`;
}
function renderBar(){
  bar.innerHTML=`<div class="bar-left"><span class="bar-btn active">自动驾驶探险</span><span class="bar-btn">${LEVELS[curLevel].name}</span></div><div class="bar-right">${levelStatusText()}</div>`;
}

// === Panel ===
function renderPanel(){
  let L=LEVELS[curLevel],objs=levelObjs[curLevel];
  let levelPassed=quizPassed[curLevel],goalsDone=levelPassed||isLevelDone(curLevel);
  let h='';
  // stage nav
  h+=`<div class="stage-nav"><div class="sn-bar">`;
  for(let i=0;i<7;i++){let unlocked=isUnlocked(i);h+=`<div class="sn-d ${quizPassed[i]?'done':i===curLevel?'cur':unlocked?'':'locked'}" ${unlocked&&i!==curLevel?`onclick="goLevel(${i})"`:''}></div>`}
  let passed=quizPassed.filter(Boolean).length;
  h+=`</div><div class="sn-info">第 ${curLevel+1}/7 关 | 进度 ${Math.round(passed/7*100)}%</div><div class="sn-hint">${passed}/7 已通关，完成目标后答对测验才解锁下一关</div></div>`;
  h+=`<h2>${L.name}</h2>`;
  h+=`<p style="font-size:13px;line-height:1.6;color:var(--concept-text);margin-bottom:10px">${L.desc}</p>`;
  // objectives
  h+=`<h3>目标</h3>`;
  for(let i=0;i<3;i++){let done=levelPassed||objs[i];h+=`<div class="obj-item"><div class="obj-dot ${done?'done':''}">${done?'✓':i+1}</div><span style="color:${done?'var(--goal-done)':'var(--goal-text)'}">${L.objs[i]}</span></div>`}
  // level-specific controls
  h+=renderLevelPanel(curLevel);
  // quiz when all done
  if(goalsDone&&L.quiz){
    let fb=quizFeedback[curLevel],passedQuiz=quizPassed[curLevel];
    h+=`<div class="quiz-box"><div class="quiz-title">通关小测验</div><div class="quiz-q">🧠 ${L.quiz.q}</div>`;
    L.quiz.opts.forEach((o,i)=>{
      const cls=passedQuiz&&i===L.quiz.ans?' correct':fb?(i===L.quiz.ans?' correct':i===fb.choice?' wrong':''):'';
      h+=`<button class="quiz-opt${cls}" onclick="answerQuiz(${curLevel},${i})">${'ABCD'[i]}. ${o}</button>`;
    });
    if(fb)h+=`<div class="quiz-feedback ${fb.ok?'ok':'bad'}">${fb.text}</div>`;
    else if(passedQuiz)h+=`<div class="quiz-feedback ok">已通过小测。${L.quiz.why}</div>`;
    h+=`</div>`}
  // learn box
  if(quizPassed[curLevel]){
    h+=`<div class="learn-box">${L.learn}</div>`;
    h+=curLevel<6?`<button class="act-btn" onclick="goLevel(${curLevel+1})">下一关 →</button>`:`<button class="act-btn" onclick="showResult()">查看总总结 🎉</button>`;
  }
  panel.innerHTML=h;
  renderBar();
}

function renderLevelPanel(idx){
  let h='';
  if(idx===0){
    h+=`<h3>传感器安装</h3><p style="font-size:12px;color:var(--stage-hint)">点击画布上方/中间/下方区域安装对应传感器</p>`;
    h+=`<p>📷 摄像头: ${S.sensors.camera?'✅':'❌'} | 🔦 LiDAR: ${S.sensors.lidar?'✅':'❌'} | 📡 雷达: ${S.sensors.radar?'✅':'❌'}</p>`;

    }

  if(idx===3){

// === Helpers ===
function startAlgo(algo){
  if(curLevel!==3||!['astar','rrt'].includes(algo)||!S.grid)return false;
  S.algo=algo;S.searching=true;S.path=[];S.visited=[];S.openSet=[];S.searchStep=0;S._astarInit=false;S._rrtNodes=null;S._rrtEdges=null;
  if(algo==='astar'){let k=`${S.start.x},${S.start.y}`;S._gScore={};S._fScore={};S._cameFrom={};S._gScore[k]=0;S._fScore[k]=heur(S.start,S.end);S.openSet=[{...S.start}];S._astarInit=true}
  return true;
}
function resetGrid(){if(curLevel!==3)return false;initLevel(3);renderPanel();return true}
function clearPlanningCorridor(){
  if(!S.grid||!S.start||!S.end)return;
  for(let x=Math.min(S.start.x,S.end.x);x<=Math.max(S.start.x,S.end.x);x++){S.grid[S.start.y][x]=0;if(S.start.y+1<S.gridH)S.grid[S.start.y+1][x]=0}
  for(let y=Math.min(S.start.y,S.end.y);y<=Math.max(S.start.y,S.end.y);y++){S.grid[y][S.end.x]=0;if(S.end.x-1>=0)S.grid[y][S.end.x-1]=0}
  S.grid[S.start.y][S.start.x]=0;S.grid[S.end.y][S.end.x]=0;
}
function addDynObs(){
  if(curLevel!==3||!S.grid||!S.start||!S.end)return false;
  let cell=S.path&&S.path.length>4?S.path[Math.floor(S.path.length*0.5)]:{x:Math.floor((S.start.x+S.end.x)/2),y:S.start.y};
  if((cell.x===S.start.x&&cell.y===S.start.y)||(cell.x===S.end.x&&cell.y===S.end.y))cell={x:Math.floor((S.start.x+S.end.x)/2),y:S.start.y};
  S.dynObs.push({x:cell.x,y:cell.y,dx:0,dy:0,blocks:true});
  S.dynamicChallenge=true;S.path=[];S.visited=[];S.openSet=[];S.searching=false;S.searchStep=0;
  return true;
}
function replanAroundDynamicObstacle(){
  if(curLevel!==3||!S.dynamicChallenge||!S.grid)return false;
  clearPlanningCorridor();
  startAlgo('astar');
  let guard=0;
  while(S.searching&&guard++<2000)stepAStar();
  if(S.path.length&&isPathClear(S.path))completePathGoal(2);
  renderPanel();draw();
  return S.path.length>0;
}
function cycleState(){
  if(curLevel!==4||!S.stateMachine)return false;
  let states=CONTROL_STATES,i=states.indexOf(S.stateMachine);
  if(i<0)return false;
  S.stateMachine=states[(i+1)%states.length];markControlStateVisited();renderPanel();return true;
}
function markControlStateVisited(){
  if(curLevel!==4||!S.stateMachine)return;
  if(!S.stateVisited)S.stateVisited={};
  S.stateVisited[S.stateMachine]=true;
}
function controlStateVisitCount(){
  if(curLevel!==4||!S.stateVisited)return 0;
  return CONTROL_STATES.filter(s=>S.stateVisited[s]).length;
}
function controlStateProgressText(){
  if(curLevel!==4||!S.stateVisited)return '先从巡航开始，逐步观察跟车、变道和停车。';
  let missing=CONTROL_STATES.filter(s=>!S.stateVisited[s]).map(s=>CONTROL_STATE_LABELS[s]);
  return missing.length?`还需观察: ${missing.join('、')}`:'巡航、跟车、变道、停车都已观察，可确认状态机会按场景切换行为。';
}
function confirmStateMachine(){
  if(curLevel!==4)return false;
  markControlStateVisited();
  if(controlStateVisitCount()<CONTROL_STATES.length)return false;
  completeObj(0,true);renderPanel();return true;
}
function clampNumber(value,fallback,min,max){
  const n=Number(value);
  return Number.isFinite(n)?Math.min(max,Math.max(min,n)):fallback;
}
function updateSliderLabel(input,text){let label=input&&input.previousElementSibling;if(label)label.textContent=text}
function installAllSensors(){
  if(curLevel!==0||!S.sensors)return false;
  S.sensors.camera=true;S.sensors.lidar=true;S.sensors.radar=true;S.installed=3;
  updateFusionConfidence();completeObj(0,true);checkFusionGoals();
  renderPanel();draw();
  return true;
}
function setWeight(key,input){
  if(curLevel!==0||!S.weights||!(key in S.weights))return false;
  const raw=clampNumber(input&&input.value,S.weights[key]*100,0,100);
  S.weights[key]=raw/100;if(input)input.value=raw;
  updateFusionMetricPanel();let names={camera:'摄像头权重',lidar:'LiDAR权重',radar:'雷达权重'};
  updateSliderLabel(input,`${names[key]}: ${S.weights[key].toFixed(2)}`);
  if(checkFusionGoals())renderPanel();
  return true;
}
function canConfirmWeatherRobustness(){
  updateFusionConfidence();
  return curLevel===0&&S.installed>=3&&S.weather!=='clear'&&S.confidence>70;
}
function syncWeatherRobustGoal(){
  if(!quizPassed[0]&&levelObjs[0][2]&&!S.weatherRobustConfirmed&&!canConfirmWeatherRobustness()){
    S.weatherRobustConfirmed=false;
    levelObjs[0][2]=false;
    return true;
  }
  return false;
}
function confirmWeatherRobustness(){
  if(!canConfirmWeatherRobustness())return false;
  S.weatherRobustConfirmed=true;
  completeObj(2,true);
  renderPanel();
  return true;
}
function setThreshold(input){
  if(curLevel!==1||!Number.isFinite(S.threshold))return false;
  const raw=clampNumber(input&&input.value,S.threshold*100,10,99);
  S.threshold=raw/100;if(input)input.value=raw;
  updateSliderLabel(input,`置信度阈值: ${S.threshold.toFixed(2)}`);
  updatePerceptionMetricPanel();if(checkPerceptionGoals())renderPanel();
  return true;
}
function setKf(key,input){
  if(curLevel!==2||(key!=='kfQ'&&key!=='kfR')||!Number.isFinite(S[key]))return false;
  const raw=clampNumber(input&&input.value,S[key]*10,1,100);
  S[key]=raw/10;if(input)input.value=raw;S.kfAdjusted=true;
  updateSliderLabel(input,`${key==='kfQ'?'过程噪声 Q':'观测噪声 R'}: ${S[key].toFixed(2)}`);
  if(checkLocalizationGoals())renderPanel();
  return true;
}
function setPid(key,input){
  const max={pidP:200,pidI:100,pidD:200}[key];
  if(curLevel!==4||!max||!Number.isFinite(S[key]))return false;
  const raw=clampNumber(input&&input.value,S[key]*100,0,max);
  S[key]=raw/100;if(input)input.value=raw;
  let names={pidP:'P (比例)',pidI:'I (积分)',pidD:'D (微分)'};
  updateSliderLabel(input,`${names[key]}: ${S[key].toFixed(2)}`);
  updateControlHintPanel();
  if(checkControlGoals())renderPanel();
  return true;
}
function stepLocalization(dt){
  S.pathT+=0.002*dt;if(S.pathT>1)S.pathT-=1;
  let angle=S.pathT*Math.PI*4;
  S.truePos={x:W/2+Math.cos(angle)*W*0.25,y:H/2+Math.sin(angle*0.5)*H*0.25};
  S.gpsPos={x:S.truePos.x+(Math.random()-0.5)*S.gpsNoise*10*(S.gpsLost?50:1),y:S.truePos.y+(Math.random()-0.5)*S.gpsNoise*10*(S.gpsLost?50:1)};
  S.imuDrift+=0.1*dt;S.imuPos={x:S.truePos.x+Math.sin(S.imuDrift)*S.imuDrift*0.3,y:S.truePos.y+Math.cos(S.imuDrift)*S.imuDrift*0.3};
  S.visPos={x:S.truePos.x+(Math.random()-0.5)*15,y:S.truePos.y+(Math.random()-0.5)*15};
  let kfGain=S.kfQ/(S.kfQ+S.kfR);
  let prediction={x:S.fusedPos.x+(S.truePos.x-S.fusedPos.x)*0.18,y:S.fusedPos.y+(S.truePos.y-S.fusedPos.y)*0.18};
  let sources=S.gpsLost?[S.imuPos,S.visPos]:[S.gpsPos,S.imuPos,S.visPos];
  let observation={x:sources.reduce((a,p)=>a+p.x,0)/sources.length,y:sources.reduce((a,p)=>a+p.y,0)/sources.length};
  S.fusedPos={x:prediction.x*(1-kfGain)+observation.x*kfGain,y:prediction.y*(1-kfGain)+observation.y*kfGain};
  S.error=Math.sqrt((S.fusedPos.x-S.truePos.x)**2+(S.fusedPos.y-S.truePos.y)**2)/10;
  updateLocalizationMetricPanel();
}
function checkFusionGoals(){let changed=false;if(curLevel===0&&S.installed>=3){if(S.confidence>90)changed=completeObj(1,true)||changed;changed=syncWeatherRobustGoal()||changed}return changed}
function isPerceptionQualityReady(){return curLevel===1&&getPerceptionMetrics().f1>85}
function checkPerceptionGoals(){
  if(curLevel!==1)return false;
  let changed=false;
  if(isPerceptionQualityReady()){
    changed=completeObj(0,true)||changed;
    if(S.segDone)changed=completeObj(1,true)||changed;
    if(S.detected3d)changed=completeObj(2,true)||changed;
  }
  return changed;
}
function checkLocalizationGoals(){let changed=false;if(curLevel===2){if(S.t>=LOCALIZATION_SAMPLE_FRAMES)changed=completeObj(0,true)||changed;if(S.kfAdjusted&&S.error<0.5)changed=completeObj(1,true)||changed;if(S.gpsLost&&S.error<2)changed=completeObj(2,true)||changed}return changed}
function getTrackAvgError(){if(!S.trail||!S.targetPath||S.trail.length<=10)return 0;let avgErr=0;for(let i=S.trail.length-10;i<S.trail.length;i++){let minD=Infinity;for(let p of S.targetPath){let d=Math.sqrt((p.x-S.trail[i].x)**2+(p.y-S.trail[i].y)**2);if(d<minD)minD=d}avgErr+=minD}return avgErr/10}
function buildMpcPath(){
  if(curLevel!==4||!S.targetPath||!S.targetPath.length)return [];
  let closestIdx=0,minD=Infinity;
  for(let i=0;i<S.targetPath.length;i++){let p=S.targetPath[i],d=Math.sqrt((p.x-S.carX)**2+(p.y-S.carY)**2);if(d<minD){minD=d;closestIdx=i}}
  S.mpcPath=[];
  const start=Math.min(closestIdx+1,S.targetPath.length-1);
  for(let i=0;i<20;i++){
    const target=S.targetPath[Math.min(start+i*2,S.targetPath.length-1)];
    const blend=(i+1)/20;
    S.mpcPath.push({x:S.carX+(target.x-S.carX)*blend,y:S.carY+(target.y-S.carY)*blend});
  }
  return S.mpcPath;
}
function controlHintHTML(){
  if(!S.targetPath)return '先调 P 让车辆开始跟踪弯道，再用 D 抑制震荡，I 只需要少量修正长期偏差。';
  const avgErr=getTrackAvgError();
  let verdict='先把 P 提到 0.6-1.2，让车辆对弯道有足够响应。';
  if(S.pidP>1.4&&S.pidD<0.3)verdict='P 较高但 D 偏低，车辆容易来回摆动；增加 D 相当于给转向加阻尼。';
  else if(S.pidP>0.4&&S.pidD>=0.3&&S.pidI<=0.25)verdict='当前组合更接近平稳跟踪：P 负责转向力度，D 抑制过冲，低 I 避免累积振荡。';
  else if(S.pidI>0.45)verdict='I 偏高会把历史误差越积越多，可能在连续弯道里造成慢性过冲。';
  if(S.trail&&S.trail.length>50)verdict+=` 近段路径误差 ${avgErr.toFixed(1)}px，目标是低于 30px。`;
  if(S.mpcActive&&!levelObjs[4][1])verdict+=' MPC预测线已打开；先把PID跟踪误差降到目标内，再用预测轨迹比较未来几步控制。';
  else if(S.mpcActive&&!levelObjs[4][2])verdict+=' PID已进入平稳区，继续观察MPC预测窗口，确认它是在滚动预测未来轨迹。';
  return verdict;
}
function updateControlHintPanel(){const el=document.getElementById('controlHint');if(el)el.textContent=controlHintHTML()}
function v2xStatusHTML(){
  if(!S.vehicles)return '先点选车辆、路侧单元或云端，观察链路如何扩展单车感知边界。';
  let tips=[];
  tips.push(S.v2vDone?'V2V 已共享车辆位置、速度和意图，可提前判断相邻车辆风险。':'V2V：先选一辆车，再点另一辆车，共享运动状态。');
  tips.push(S.v2iDone?'V2I 已接入路侧单元，车辆可获得信号灯、施工或盲区行人信息。':'V2I：把车辆连到 RSU，补足车载传感器看不到的路口信息。');
  tips.push(S.v2cDone?'V2C 已形成云端协同决策：云端汇总车辆与路侧信息后下发全局策略。':S.cloudLinked?'V2C 云端链路已建立；还需要先完成 V2V 与 V2I，云端才有足够上下文做协同决策。':'V2C：把任意节点连到 Cloud，再结合 V2V 与 V2I 信息理解全局调度。');
  return tips.join('<br>');
}
function completeV2CIfReady(){
  if(curLevel!==5||!S.cloudLinked||!S.v2vDone||!S.v2iDone)return false;
  S.v2cDone=true;
  return completeObj(2);
}
function checkControlGoals(){let changed=false;if(curLevel===4){let avgErr=getTrackAvgError();if(avgErr<30&&S.trail.length>50)changed=completeObj(1,true)||changed;if(levelObjs[4][1]&&S.mpcActive&&S.mpcPath&&S.mpcPath.length>=10&&(S.mpcPreviewFrames||0)>=30)changed=completeObj(2,true)||changed}return changed}
function pathPlanningStatusHTML(){
  if(!S.dynamicChallenge)return '';
  if(S.searching)return '动态障碍已占住旧路径，规划器正在重新搜索安全路线。';
  if(S.path.length>0&&isPathClear(S.path))return '新路径没有穿过阻塞格，说明规划器完成了动态避障重规划。';
  if(S.path.length>0)return '当前路径仍穿过阻塞格，请重新运行 A* 或 RRT，对比搜索策略如何修正路线。';
  return '新障碍物已加入，请重新运行 A* 或 RRT，观察旧路径被占用后如何重规划。';
}
function completePathGoal(i){let changed=completeObj(i,true);if(curLevel===3&&S.dynamicChallenge&&isPathClear(S.path))changed=completeObj(2,true)||changed;if(changed)renderPanel()}
function toggleWeather(){
  if(curLevel!==0||!S.sensors)return false;
  S.weather=S.weather==='clear'?'rain':'clear';updateFusionConfidence();checkFusionGoals();renderPanel();return true;
}
function toggleGpsLost(){
  if(curLevel!==2||!S.truePos)return false;
  S.gpsLost=!S.gpsLost;S.imuDrift=0;checkLocalizationGoals();renderPanel();return true;
}
function finishPerception(kind){
  if(curLevel!==1||!S.objects)return false;
  if(kind==='seg')S.segDone=true;
  else if(kind==='3d')S.detected3d=true;
  else return false;
  checkPerceptionGoals();
  renderPanel();return true;
}
function toggleMpc(){
  if(curLevel!==4||!S.targetPath)return false;
  S.mpcActive=!S.mpcActive;
  S.mpcPreviewFrames=0;
  if(S.mpcActive)buildMpcPath();
  else S.mpcPath=[];
  checkControlGoals();renderPanel();return true;
}
function selectSafetyScenario(idx){
  idx=Number(idx);
  if(curLevel!==6||!Number.isInteger(idx)||idx<0||idx>2)return false;
  S.scenario=idx;renderPanel();return true;
}
function chooseEthicalAction(choice){
  choice=Number(choice);
  if(curLevel!==6||S.scenario!==0||!Number.isInteger(choice)||choice<0||choice>1)return false;
  S.choice=choice;
  S.dilemmaShown=true;
  if(!S.ethicalChoices)S.ethicalChoices={straight:false,swerve:false};
  if(choice===0)S.ethicalChoices.straight=true;
  if(choice===1)S.ethicalChoices.swerve=true;
  renderPanel();
  return true;
}
function canConfirmEthicalTradeoff(){
  return curLevel===6&&S.scenario===0&&S.ethicalChoices&&S.ethicalChoices.straight&&S.ethicalChoices.swerve;
}
function confirmEthicalTradeoff(){
  if(!canConfirmEthicalTradeoff())return false;
  S.ethicalConfirmed=true;
  completeObj(0,true);
  renderPanel();
  return true;
}
function advanceAsilLevel(){
  if(curLevel!==6||S.scenario!==1)return false;
  S.asilLevel=Math.min(4,S.asilLevel+1);
  if(S.asilLevel>=4){S.safetyDone=true;completeObj(1,true)}
  renderPanel();
  return true;
}
function enableRedundancy(key){
  if(curLevel!==6||S.scenario!==2||!S.redundancy||!(key in S.redundancy))return false;
  S.redundancy[key]=true;
  if(S.redundancy.sensor&&S.redundancy.compute&&S.redundancy.brake){S.redundancyDone=true;completeObj(2,true)}
  renderPanel();
  return true;
}
function answerQuiz(levelIdx,picked){
  levelIdx=Number(levelIdx);picked=Number(picked);
  if(!Number.isInteger(levelIdx)||!Number.isInteger(picked))return false;
  if(levelIdx<0||levelIdx>=LEVELS.length)return false;
  if(levelIdx!==curLevel||quizPassed[levelIdx]||!isLevelDone(levelIdx))return false;
  if(levelIdx>0&&!quizPassed[levelIdx-1])return false;
  let q=LEVELS[levelIdx].quiz;
  if(!q||!Number.isInteger(picked)||picked<0||picked>=q.opts.length)return false;
  let ok=picked===q.ans;
  quizFeedback[levelIdx]={ok,choice:picked,text:(ok?'答对了。':'还不对。')+(q.why||'先回到本关现象，观察目标条件和图中反馈再判断。')};
  if(ok)quizPassed[levelIdx]=true;
  renderPanel();
  return ok;
}
function goLevel(i){
  i=Number(i);
  if(!Number.isInteger(i))return;
  if(i<0||i>=LEVELS.length)return;
  if(!isUnlocked(i))return;
  curLevel=i;initLevel(i);renderPanel();
}

// === Result ===
function showResult(){
  if(!allQuizPassed())return;
  let done=quizPassed.filter(Boolean).length*3;
  panel.innerHTML=`<div class="summary-box"><div class="summary-title">🎉 探险完成！</div><div class="summary-sub">你已掌握自动驾驶全栈技术</div>
    <div class="summary-stats"><div class="summary-stat"><div class="num">${done}/21</div><div class="label">目标达成</div></div><div class="summary-stat"><div class="num">7/7</div><div class="label">关卡通关</div></div></div>
    <div class="summary-keys"><div>📡 传感器融合提供冗余感知</div><div>👁️ 环境感知是决策的基础</div><div>🗺️ 多源融合定位精度达厘米级</div><div>🛤️ 路径规划需兼顾效率与安全</div><div>🎮 PID/MPC实现精确控制</div><div>📶 V2X扩展单车感知边界</div><div>⚖️ 安全与伦理是终极挑战</div></div>
    <button class="act-btn" onclick="restartFromSummary()" style="margin-top:12px">重新探索</button></div>`;
}
function restartFromSummary(){
  resetProgress();
  renderPanel();
  draw();
  return true;
}

// === Main loop ===
function startGame(){overlay.style.display='none';panel.style.display='block';bar.style.display='flex';resize();resetProgress();renderPanel();if(!animating){animating=true;loop()}}
function draw(){ctx.clearRect(0,0,W,H);drawGrid();drawStars();drawLevel(curLevel)}
function loop(){time++;updateLevel(curLevel,1);draw();animId=requestAnimationFrame(loop)}
cv.addEventListener('click',e=>{let r=cv.getBoundingClientRect();handleClick(e.clientX-r.left,e.clientY-r.top)});
renderBar();
resize();
</script>
</body>
</html>
