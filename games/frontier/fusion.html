body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh}
#wrap{display:flex;height:calc(100vh - 36px);position:relative}
.panel{width:320px;min-width:320px;background:var(--panel-bg);border-right:1px solid var(--panel-border);padding:16px;overflow-y:auto;display:none;scrollbar-width:thin;padding-bottom:24px}
.panel::-webkit-scrollbar{width:5px}.panel::-webkit-scrollbar-thumb{background:#c7d2fe;border-radius:3px}
.panel h2{color:var(--title-color);font-size:18px;margin-bottom:8px}
.panel h3{color:var(--title-color);font-size:16px;margin:10px 0 6px}
.panel p,.panel li{font-size:13px;line-height:1.6;color:var(--concept-text)}
.panel ul{padding-left:18px;margin-bottom:8px}
.obj-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:13px}
.obj-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.obj-dot.done{background:var(--accent);color:#0a0a1a}
.act-btn{display:block;width:100%;padding:10px;margin-top:6px;border:none;border-radius:6px;background:var(--accent);color:#0a0a1a;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}

.learn-box b{color:var(--accent)}
canvas{flex:1;display:block;background:var(--bg)}
.bar{height:36px;background:var(--bar-bg);border-top:1px solid var(--bar-border);display:none;align-items:center;justify-content:space-between;padding:0 16px;font-size:13px}
.bar-left{display:flex;gap:4px}
.bar-btn{padding:4px 12px;border:1px solid rgba(245,158,11,0.3);background:transparent;color:#8899aa;border-radius:4px;cursor:pointer;font-size:12px;transition:all .2s}

.start-btn{padding:14px 48px;border:2px solid var(--accent);background:transparent;color:var(--accent);font-size:18px;border-radius:8px;cursor:pointer;transition:all .3s;letter-spacing:2px}

.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:8px 0}
.quiz-title{font-weight:700;color:var(--quiz-q);margin-bottom:6px}
.quiz-q{font-size:13px;color:var(--quiz-q);margin-bottom:8px;font-weight:600}
.quiz-opt{display:block;width:100%;font-size:13px;color:var(--quiz-opt-text);padding:8px 10px;margin:4px 0;border-radius:6px;cursor:pointer;border:1px solid var(--quiz-opt-border);background:var(--quiz-opt-bg);text-align:left}
.quiz-opt:hover{background:var(--quiz-opt-hover);border-color:var(--accent)}
.quiz-opt.correct{background:var(--quiz-correct-bg);border-color:#22c55e;color:var(--quiz-correct-text)}
.quiz-opt.wrong{background:var(--quiz-wrong-bg);border-color:#ef4444;color:var(--quiz-wrong-text)}
.quiz-feedback{font-size:12px;line-height:1.6;margin-top:6px;padding:7px;border-radius:6px}
.quiz-feedback.ok{background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-feedback.bad{background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
.slider-row{margin:6px 0}
.slider-row label{font-size:12px;color:var(--slider-label)}
.slider-row input[type=range]{width:100%;margin:4px 0}
.concept-box{padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>

<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="overlay" id="overlay">
<h1>☀️ 核聚变工程探险</h1>
<p class="sub">从等离子体到商用电站，探索人造太阳的奥秘</p>
<p class="desc">7 个关卡带你深入理解核聚变全链路技术：D-T反应原理、等离子体物理、托卡马克装置、惯性约束聚变、超导磁体、氚增殖材料和商用聚变路线图。通过交互式动画，亲手点燃一颗人造太阳。</p>
<button class="start-btn" onclick="startGame()">开始探索 →</button>
<div class="features">
<div class="feat"><div class="fi">⚛️</div>核聚变基础</div>
<div class="feat"><div class="fi">🔥</div>等离子体</div>
<div class="feat"><div class="fi">🔄</div>托卡马克</div>
<div class="feat"><div class="fi">💥</div>惯性约束</div>
<div class="feat"><div class="fi">🧲</div>超导磁体</div>
<div class="feat"><div class="fi">🛡️</div>氚增殖</div>
<div class="feat"><div class="fi">🏭</div>商用路线</div>
</div>

</div>

<script>
// === Theme ===
let isDark=true;
const TH={
  dark:{bg:'#0a0a1a',grid:'rgba(245,158,11,0.04)',text:'#fff',textSec:'rgba(255,255,255,0.6)',plasma:'#ff6b35',plasmaGlow:'rgba(255,107,53,0.4)',coil:'#3b82f6',coilGlow:'rgba(59,130,246,0.3)',neutron:'#22c55e',tritium:'#06b6d4',wall:'#64748b',showStars:true},
  light:{bg:'#f0f2f5',grid:'rgba(245,158,11,0.03)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',plasma:'#ea580c',plasmaGlow:'rgba(234,88,12,0.3)',coil:'#2563eb',coilGlow:'rgba(37,99,235,0.2)',neutron:'#16a34a',tritium:'#0891b2',wall:'#94a3b8',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{renderPanel()}catch(e){}}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),panel=document.getElementById('panel'),bar=document.getElementById('bar'),overlay=document.getElementById('overlay');
let W,H,curLevel=0,animId,time=0;
let levelObjs=Array.from({length:7},()=>[false,false,false]);
let quizPassed=Array.from({length:7},()=>false);
let quizFeedback={};
let S={};

function resize(){W=cv.width=cv.offsetWidth;H=cv.height=cv.offsetHeight}
window.addEventListener('resize',()=>{resize();draw()});

const LEVELS=[
{name:'核聚变基础',desc:'<div class="concept-box"><b>关键词：</b>D-T反应、质能方程 E=mc²、劳森判据</div>画布上显示氘(D)和氚(T)两个原子核。拖动滑块增加温度和密度，当条件满足时它们会融合产生氦核和中子，释放巨大能量。',
 objs:['观察D-T反应过程','用E=mc²计算能量释放','满足劳森判据点火条件'],
 quiz:{q:'D-T聚变反应的产物是什么？',opts:['氢+中子','氦-4+中子','碳+光子','氧+电子'],ans:1},
 learn:'<b>D-T反应</b>：²H + ³H → ⁴He(3.5MeV) + n(14.1MeV)，总释放17.6MeV。<br><b>E=mc²</b>：质量亏损转化为能量，1g燃料≈释放约90太焦耳。<br><b>劳森判据</b>：nTτ > 5×10²¹ m⁻³·keV·s，温度、密度、约束时间三者乘积需超过阈值。'},
{name:'等离子体物理',desc:'<div class="concept-box"><b>关键词：</b>1亿度高温、磁约束、等离子体不稳定性</div>画布中央有一团等离子体（带电粒子云）。调节温度和磁场强度，观察粒子的运动轨迹——温度太高粒子逃逸，磁场太弱无法约束。',
 objs:['将等离子体加热到1亿度','用磁场约束等离子体','观察并抑制不稳定性'],
 quiz:{q:'为什么聚变需要1亿度的高温？',opts:['熔化燃料','克服库仑斥力','产生中子','激发光子'],ans:1},
 learn:'<b>等离子体</b>：物质第四态，原子核与电子完全分离的高温气体。<br><b>磁约束</b>：带电粒子在磁场中做螺旋运动（拉莫尔回旋），被约束在磁力线上。<br><b>不稳定性</b>：扭曲模、撕裂模等，会导致等离子体触壁冷却，是聚变最大挑战。'},
{name:'托卡马克装置',desc:'<div class="concept-box"><b>关键词：</b>环形磁场、等离子体电流、偏滤器</div>画布上显示托卡马克的截面图：环形真空室、环向磁场线圈和极向磁场。调节线圈电流，观察磁力线如何形成螺旋形约束等离子体。',
 objs:['调节环向磁场线圈','建立等离子体电流','启动偏滤器排灰'],
 quiz:{q:'托卡马克的磁场是什么形状？',opts:['纯环形','纯极向','螺旋形（环向+极向叠加）','直线形'],ans:2},
 learn:'<b>托卡马克</b>：环形磁约束装置，俄语"环形磁线圈室"。<br><b>环向磁场</b>：由外部线圈产生，约束粒子不向外漂移。<br><b>极向磁场</b>：由等离子体电流自身产生，与环向叠加形成螺旋磁力线。<br><b>偏滤器</b>：底部排出杂质和氦灰，保持等离子体纯净。'},
{name:'惯性约束聚变',desc:'<div class="concept-box"><b>关键词：</b>激光驱动、内爆压缩、NIF装置</div>画布上有一个微型燃料靶丸，周围是激光束。调节激光能量和对称性，观察靶丸被压缩到极高密度后发生聚变点火的过程。',
 objs:['调节激光能量到点火阈值','优化激光对称性','观察内爆压缩过程'],
 quiz:{q:'NIF装置用多少束激光？',opts:['12束','48束','192束','1024束'],ans:2},
 learn:'<b>惯性约束</b>：用强激光/粒子束从四面八方压缩燃料靶丸，在惯性约束时间内完成聚变。<br><b>NIF</b>：美国国家点火装置，192束激光，总能量1.8MJ，2022年首次实现点火增益>1。<br><b>内爆</b>：靶丸外壳向外喷射→反作用力向内压缩→中心密度达铅的1000倍。'},
{name:'超导磁体',desc:'<div class="concept-box"><b>关键词：</b>ITER超导线圈、临界温度、磁场强度</div>画布上显示超导线圈的截面。调节冷却温度，当温度降到临界值以下时，电阻突然消失，线圈产生强大磁场。观察磁场强度随温度的变化。',
 objs:['将线圈冷却到临界温度以下','产生>12T的强磁场','观察超导转变过程'],
 quiz:{q:'ITER使用的超导材料Nb₃Sn的临界温度约为？',opts:['4K','18K','77K','300K'],ans:1},
 learn:'<b>超导</b>：温度低于临界温度时电阻为零，可通过巨大电流产生强磁场。<br><b>Nb₃Sn</b>：铌三锡，临界温度~18K，但在强磁场下需冷却到4.2K（液氦温度）。<br><b>ITER磁体</b>：18个环向场线圈，每个重310吨，产生11.8T磁场，总储能41GJ。'},
{name:'氚增殖与材料',desc:'<div class="concept-box"><b>关键词：</b>锂包层、中子辐照、第一壁材料</div>画布上显示反应堆壁的截面结构。聚变中子撞击锂包层产生氚（燃料自给）。调节包层厚度和材料，观察氚增殖比和材料损伤。',
 objs:['设计锂包层使氚增殖比>1','选择耐辐照的第一壁材料','控制中子辐照损伤'],

// === Drawing helpers ===
function drawGrid(){ctx.strokeStyle=t().grid;ctx.lineWidth=1;for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}}
function drawStars(){if(!t().showStars)return;for(let i=0;i<60;i++){let sx=(i*137.5+time*0.01*(i%3+1))%W,sy=(i*97.3)%H;ctx.fillStyle=`rgba(255,255,255,${0.15+0.2*Math.sin(time*0.008+i)})`;ctx.fillRect(sx,sy,1.5,1.5)}}
function drawText(txt,x,y,size,color,align){ctx.fillStyle=color||t().text;ctx.font=`${size||14}px system-ui`;ctx.textAlign=align||'center';ctx.fillText(txt,x,y)}

// === Level init ===
function initLevel(idx){
  S={phase:0,t:0};
  if(idx===0){S.temp=1000;S.density=1e18;S.reacting=false;S.energy=0;S.lawsonMet=false;S.particles=[];
    for(let i=0;i<30;i++)S.particles.push({x:W/2+(Math.random()-0.5)*100,y:H/2+(Math.random()-0.5)*100,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,type:i<15?'D':'T',r:6})}
  if(idx===1){S.plasmaTemp=1e6;S.magField=0.5;S.plasmaParticles=[];S.unstable=false;S.confined=false;
    for(let i=0;i<50;i++)S.plasmaParticles.push({x:W/2+(Math.random()-0.5)*80,y:H/2+(Math.random()-0.5)*80,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,angle:Math.random()*Math.PI*2})}
  if(idx===2){S.toroidalI=0;S.poloidalI=0;S.divertorOn=false;S.helicalAngle=0}
  if(idx===3){S.laserEnergy=0;S.symmetry=50;S.imploding=false;S.ignited=false;S.compressionR=60;S.laserBeams=12}
  if(idx===4){S.coolTemp=300;S.critTemp=18;S.magStrength=0;S.superconducting=false;S.resistance=1}
  if(idx===5){S.blanketThick=20;S.material='steel';S.tbr=0.8;S.dpa=0;S.neutronFlux=0.5}
  if(idx===6){S.qValue=1;S.milestone=0;S.costPerKwh=50;S.plantPower=500;S.timeline=[
    {name:'ITER',year:2025,q:10,desc:'首次等离子体，验证Q=10'},
    {name:'DEMO',year:2040,q:25,desc:'示范电站，首次并网发电'},
    {name:'商用电站',year:2055,q:50,desc:'1GW级商用聚变电站'}]}
}

// === Level draw ===
function drawLevel(idx){
  let th=t();
  if(idx===0)drawFusionBasics(th);
  if(idx===1)drawPlasma(th);
  if(idx===2)drawTokamak(th);
  if(idx===3)drawICF(th);
  if(idx===4)drawSuperconductor(th);
  if(idx===5)drawBreeding(th);
  if(idx===6)drawRoadmap(th);
}

function drawFusionBasics(th){
  let cx=W/2,cy=H/2;
  // draw particles
  for(let p of S.particles){
    let speed=S.temp/1e7;
    p.x+=p.vx*speed;p.y+=p.vy*speed;
    let dx=p.x-cx,dy=p.y-cy,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>150){p.vx-=dx*0.01;p.vy-=dy*0.01}
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.type==='D'?'#3b82f6':'#ef4444';
    ctx.shadowColor=p.type==='D'?'rgba(59,130,246,0.5)':'rgba(239,68,68,0.5)';ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;
    drawText(p.type,p.x,p.y+4,10,'#fff');
  }
  // fusion reaction visualization
  if(S.reacting){
    ctx.globalAlpha=0.3+0.2*Math.sin(time*0.1);
    ctx.fillStyle=th.plasma;ctx.beginPath();ctx.arc(cx,cy,40+Math.sin(time*0.05)*10,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    drawText('⁴He + n + 17.6 MeV',cx,cy-80,16,'#f59e0b');
    // neutron flying out
    let na=time*0.05;ctx.fillStyle=th.neutron;ctx.beginPath();ctx.arc(cx+Math.cos(na)*100,cy+Math.sin(na)*100,4,0,Math.PI*2);ctx.fill();
    drawText('n',cx+Math.cos(na)*100+10,cy+Math.sin(na)*100,10,th.neutron,'left');
  }
  // temperature bar
  let tempLog=Math.log10(Math.max(1,S.temp));let maxLog=Math.log10(2e8);
  let barW=W*0.6,barH=16,barX=(W-barW)/2,barY=30;
  ctx.fillStyle='#333';ctx.fillRect(barX,barY,barW,barH);
  let ratio=Math.min(1,tempLog/maxLog);
  let grad=ctx.createLinearGradient(barX,0,barX+barW,0);grad.addColorStop(0,'#3b82f6');grad.addColorStop(0.5,'#f59e0b');grad.addColorStop(1,'#ef4444');
  ctx.fillStyle=grad;ctx.fillRect(barX,barY,barW*ratio,barH);
  drawText(`温度: ${S.temp>=1e8?(S.temp/1e8).toFixed(1)+'亿°C':S.temp>=1e6?(S.temp/1e6).toFixed(0)+'万°C':S.temp.toFixed(0)+'°C'}`,cx,barY+barH+18,14,th.text);
}

function drawPlasma(th){
  let cx=W/2,cy=H/2,R=Math.min(W,H)*0.3;
  // magnetic field lines
  ctx.strokeStyle=th.coil;ctx.lineWidth=1;ctx.globalAlpha=0.3*S.magField;
  for(let i=0;i<8;i++){let a=i*Math.PI/4;ctx.beginPath();ctx.arc(cx,cy,R*0.3+i*R*0.08,0,Math.PI*2);ctx.stroke()}
  ctx.globalAlpha=1;
  // confinement boundary
  ctx.strokeStyle=S.confined?th.coil:'rgba(100,100,100,0.3)';ctx.lineWidth=3;ctx.setLineDash([5,5]);ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  // plasma particles
  for(let p of S.plasmaParticles){
    let speed=S.plasmaTemp/5e7;let confine=S.magField*2;
    p.angle+=0.02*confine;
    let dx=p.x-cx,dy=p.y-cy,dist=Math.sqrt(dx*dx+dy*dy);
    if(confine>0.5){p.vx-=dx*0.005*confine;p.vy-=dy*0.005*confine}
    p.x+=p.vx*speed+Math.cos(p.angle)*confine;p.y+=p.vy*speed+Math.sin(p.angle)*confine;
    if(dist>R&&confine<1){p.x=cx+(Math.random()-0.5)*R;p.y=cy+(Math.random()-0.5)*R}
    let heat=Math.min(1,S.plasmaTemp/1e8);
    ctx.fillStyle=`rgba(${255},${Math.floor(107*(1-heat)+200*heat)},${Math.floor(53*(1-heat))},0.8)`;
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
  }
  // instability visualization
  if(S.unstable){ctx.strokeStyle='#ef4444';ctx.lineWidth=2;ctx.globalAlpha=0.5+0.3*Math.sin(time*0.1);
    for(let i=0;i<3;i++){let a=time*0.02+i*2;ctx.beginPath();ctx.arc(cx+Math.cos(a)*R*0.5,cy+Math.sin(a)*R*0.5,20+Math.sin(time*0.05+i)*10,0,Math.PI*2);ctx.stroke()}
    ctx.globalAlpha=1;drawText('⚠️ 不稳定性！',cx,cy-R-20,14,'#ef4444')}
  S.confined=S.magField>1.5&&S.plasmaTemp>5e7;
  drawText(`温度: ${(S.plasmaTemp/1e6).toFixed(0)}百万°C | 磁场: ${S.magField.toFixed(1)}T`,W/2,30,14,th.text);
}

function drawTokamak(th){
  let cx=W/2,cy=H/2,R=Math.min(W,H)*0.32,r=R*0.35;
  // outer vessel
  ctx.strokeStyle=th.wall;ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(cx,cy,R,R*0.8,0,0,Math.PI*2);ctx.stroke();
  // inner vessel
  ctx.strokeStyle=th.wall;ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(cx,cy,r,r*0.8,0,0,Math.PI*2);ctx.stroke();
  // toroidal field coils
  if(S.toroidalI>0){ctx.strokeStyle=th.coil;ctx.lineWidth=2;ctx.globalAlpha=Math.min(1,S.toroidalI/80);
    for(let i=0;i<12;i++){let a=i*Math.PI/6+time*0.005;let x1=cx+Math.cos(a)*R*1.05,y1=cy+Math.sin(a)*R*0.85;
      ctx.beginPath();ctx.arc(x1,y1,15,0,Math.PI*2);ctx.stroke()}ctx.globalAlpha=1}
  // plasma ring
  if(S.toroidalI>30){
    let plasmaR=(R+r)/2,plasmaW=(R-r)*0.3;
    ctx.globalAlpha=0.4+0.2*Math.sin(time*0.05);
    let grad=ctx.createRadialGradient(cx,cy,plasmaR-plasmaW,cx,cy,plasmaR+plasmaW);
    grad.addColorStop(0,'transparent');grad.addColorStop(0.3,th.plasma);grad.addColorStop(0.7,th.plasma);grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;ctx.beginPath();ctx.ellipse(cx,cy,plasmaR+plasmaW,plasmaR*0.7,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // helical field lines
    if(S.poloidalI>0){ctx.strokeStyle='rgba(139,92,246,0.5)';ctx.lineWidth=1;
      for(let i=0;i<6;i++){ctx.beginPath();for(let a=0;a<Math.PI*4;a+=0.05){let rr=plasmaR+Math.sin(a*3+i)*plasmaW*0.5;
        ctx.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr*0.7)}ctx.stroke()}}
  }
  // divertor
  if(S.divertorOn){ctx.fillStyle='rgba(34,197,94,0.3)';ctx.beginPath();ctx.moveTo(cx-R*0.3,cy+R*0.75);ctx.lineTo(cx+R*0.3,cy+R*0.75);ctx.lineTo(cx+R*0.15,cy+R*0.9);ctx.lineTo(cx-R*0.15,cy+R*0.9);ctx.closePath();ctx.fill();
    drawText('偏滤器',cx,cy+R*0.85,11,'#22c55e')}
  drawText(`环向电流: ${S.toroidalI.toFixed(0)}kA | 极向电流: ${S.poloidalI.toFixed(0)}kA`,W/2,30,14,th.text);
}

function drawICF(th){
  let cx=W/2,cy=H/2;
  // target pellet
  let pelletR=S.compressionR;
  ctx.fillStyle=S.ignited?th.plasma:'rgba(200,200,220,0.8)';
  ctx.shadowColor=S.ignited?th.plasmaGlow:'transparent';ctx.shadowBlur=S.ignited?30:0;
  ctx.beginPath();ctx.arc(cx,cy,pelletR,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  if(S.ignited){ctx.globalAlpha=0.3+0.3*Math.sin(time*0.1);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx,cy,pelletR*0.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    drawText('🔥 点火成功！',cx,cy-pelletR-30,18,'#f59e0b')}
  // laser beams
  for(let i=0;i<S.laserBeams;i++){
    let a=i*Math.PI*2/S.laserBeams+time*0.002;
    let startR=Math.min(W,H)*0.45;
    let sx=cx+Math.cos(a)*startR,sy=cy+Math.sin(a)*startR;
    let ex=cx+Math.cos(a)*pelletR,ey=cy+Math.sin(a)*pelletR;
    if(S.laserEnergy>0){
      ctx.strokeStyle=`rgba(239,68,68,${Math.min(0.8,S.laserEnergy/100)})`;ctx.lineWidth=2+S.laserEnergy/50;
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
      // glow at impact
      ctx.fillStyle=`rgba(255,200,50,${S.laserEnergy/200})`;ctx.beginPath();ctx.arc(ex,ey,5,0,Math.PI*2);ctx.fill()}
    // laser source
    ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(sx,sy,4,0,Math.PI*2);ctx.fill();
  }
  // symmetry indicator
  let symOff=(100-S.symmetry)/100*20;
  if(symOff>5){ctx.strokeStyle='#f59e0b';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.ellipse(cx+symOff*Math.sin(time*0.03),cy+symOff*Math.cos(time*0.03),pelletR+5,pelletR-3,time*0.01,0,Math.PI*2);ctx.stroke();ctx.setLineDash([])}
  drawText(`激光能量: ${S.laserEnergy.toFixed(0)}MJ | 对称性: ${S.symmetry}%`,W/2,30,14,th.text);
}

function drawSuperconductor(th){
  updateL4State();
  let cx=W/2,cy=H/2;
  // coil cross-section
  let coilR=Math.min(W,H)*0.25;
  ctx.strokeStyle=S.superconducting?th.coil:th.wall;ctx.lineWidth=20;
  ctx.beginPath();ctx.arc(cx,cy,coilR,0,Math.PI*2);ctx.stroke();
  // resistance/temperature graph
  let gx=W*0.1,gy=H*0.65,gw=W*0.35,gh=H*0.25;
  ctx.strokeStyle=isDark?'#333':'#ccc';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx,gy+gh);ctx.lineTo(gx+gw,gy+gh);ctx.stroke();
  drawText('电阻',gx-5,gy+10,11,th.textSec,'right');drawText('温度(K)',gx+gw,gy+gh+15,11,th.textSec);
  // R-T curve
  ctx.strokeStyle=th.plasma;ctx.lineWidth=2;ctx.beginPath();
  for(let i=0;i<=100;i++){let temp=i*3;let r=temp>S.critTemp?((temp-S.critTemp)/300):0;
    ctx.lineTo(gx+i*gw/100,gy+gh-r*gh)}ctx.stroke();
  // current temperature marker
  let tempX=gx+(S.coolTemp/300)*gw;
  ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(tempX,gy+gh-(S.coolTemp>S.critTemp?((S.coolTemp-S.critTemp)/300)*gh:0),6,0,Math.PI*2);ctx.fill();
  drawText(`${S.coolTemp.toFixed(0)}K`,tempX,gy+gh+15,11,'#ef4444');
  // magnetic field visualization
  if(S.superconducting){
    ctx.strokeStyle=th.coilGlow;ctx.lineWidth=1;ctx.globalAlpha=0.4;
    for(let i=0;i<8;i++){let r=coilR+20+i*15;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke()}
    ctx.globalAlpha=1;
    // field strength indicator
    ctx.fillStyle=th.coil;ctx.font='bold 24px system-ui';ctx.textAlign='center';ctx.fillText(`${S.magStrength.toFixed(1)}T`,cx,cy+8);
  }else{drawText('未超导',cx,cy+8,18,th.wall)}
  drawText(`温度: ${S.coolTemp.toFixed(0)}K | 临界: ${S.critTemp}K | 电阻: ${S.resistance.toFixed(3)}Ω`,W/2,30,14,th.text);
}

function drawBreeding(th){
  updateL5State();
  let cx=W/2,cy=H/2;
  // reactor wall cross-section
  let wallX=W*0.2,wallW=W*0.6,wallY=H*0.15,wallH=H*0.65;
  // plasma region
  ctx.fillStyle=`rgba(255,107,53,${0.2+0.1*Math.sin(time*0.05)})`;ctx.fillRect(wallX,wallY,wallW*0.15,wallH);
  drawText('等离子体',wallX+wallW*0.075,wallY-10,11,th.plasma);
  // first wall
  let fwColor=S.material==='tungsten'?'#9ca3af':S.material==='rafm'?'#78716c':'#64748b';
  ctx.fillStyle=fwColor;ctx.fillRect(wallX+wallW*0.15,wallY,wallW*0.08,wallH);
  drawText('第一壁',wallX+wallW*0.19,wallY-10,11,fwColor);
  // blanket
  let blkW=S.blanketThick/100*wallW*0.4;
  ctx.fillStyle='rgba(6,182,212,0.3)';ctx.fillRect(wallX+wallW*0.23,wallY,blkW,wallH);
  ctx.strokeStyle='#06b6d4';ctx.lineWidth=1;ctx.strokeRect(wallX+wallW*0.23,wallY,blkW,wallH);
  drawText('锂包层',wallX+wallW*0.23+blkW/2,wallY-10,11,'#06b6d4');
  // neutrons
  for(let i=0;i<5;i++){let ny=wallY+wallH*0.15+i*wallH*0.17;let nx=wallX+wallW*0.1+(time*2+i*50)%(wallW*0.5);
    ctx.fillStyle=th.neutron;ctx.beginPath();ctx.arc(nx,ny,3,0,Math.PI*2);ctx.fill();
    if(nx>wallX+wallW*0.23&&nx<wallX+wallW*0.23+blkW){drawText('T',nx+8,ny+4,10,'#06b6d4','left')}}
  // shield
  ctx.fillStyle='rgba(100,100,100,0.3)';ctx.fillRect(wallX+wallW*0.23+blkW,wallY,wallW*0.1,wallH);
  drawText('屏蔽层',wallX+wallW*0.23+blkW+wallW*0.05,wallY-10,11,th.wall);
  // TBR and DPA indicators
  drawText(`氚增殖比(TBR): ${S.tbr.toFixed(2)} | 辐照损伤: ${S.dpa.toFixed(1)} dpa/年`,W/2,30,14,S.tbr>1?'#22c55e':'#f59e0b');
}

function drawRoadmap(th){
  updateL6State();
  let cx=W/2,cy=H/2;
  // timeline
  let tlY=H*0.4,tlX1=W*0.1,tlX2=W*0.9;
  ctx.strokeStyle=isDark?'#333':'#ccc';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(tlX1,tlY);ctx.lineTo(tlX2,tlY);ctx.stroke();
  // milestones
  let milestones=[{name:'ITER',year:2025,x:W*0.25,color:'#3b82f6',q:10},{name:'DEMO',year:2040,x:W*0.5,color:'#f59e0b',q:25},{name:'商用电站',year:2055,x:W*0.75,color:'#22c55e',q:50}];
  for(let i=0;i<milestones.length;i++){
    let m=milestones[i];let active=i<=S.milestone;
    ctx.fillStyle=active?m.color:'rgba(100,100,100,0.3)';ctx.beginPath();ctx.arc(m.x,tlY,18,0,Math.PI*2);ctx.fill();
    if(active){ctx.strokeStyle=m.color;ctx.lineWidth=2;ctx.beginPath();ctx.arc(m.x,tlY,22,0,Math.PI*2);ctx.stroke()}
    drawText(m.name,m.x,tlY-35,14,active?m.color:th.textSec);
    drawText(`${m.year}`,m.x,tlY+40,12,th.textSec);
    drawText(`Q=${m.q}`,m.x,tlY+55,11,active?m.color:th.textSec);
  }
  // Q value gauge
  let gaugeX=W*0.15,gaugeY=H*0.65,gaugeW=W*0.7,gaugeH=30;
  ctx.fillStyle='#333';ctx.fillRect(gaugeX,gaugeY,gaugeW,gaugeH);
  let qRatio=Math.min(1,S.qValue/60);
  let qGrad=ctx.createLinearGradient(gaugeX,0,gaugeX+gaugeW,0);qGrad.addColorStop(0,'#ef4444');qGrad.addColorStop(0.3,'#f59e0b');qGrad.addColorStop(0.7,'#22c55e');
  ctx.fillStyle=qGrad;ctx.fillRect(gaugeX,gaugeY,gaugeW*qRatio,gaugeH);
  // markers
  let markers=[{q:1,label:'盈亏平衡'},{q:10,label:'ITER目标'},{q:30,label:'商用门槛'}];
  for(let m of markers){let mx=gaugeX+gaugeW*(m.q/60);ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mx,gaugeY);ctx.lineTo(mx,gaugeY+gaugeH);ctx.stroke();
    drawText(m.label,mx,gaugeY-8,10,th.textSec)}
  drawText(`Q = ${S.qValue.toFixed(1)}`,cx,gaugeY+gaugeH+25,18,S.qValue>=30?'#22c55e':S.qValue>=10?'#f59e0b':'#ef4444');
  // cost
  drawText(`度电成本: ${S.costPerKwh.toFixed(1)}分/kWh`,cx,H*0.9,14,S.costPerKwh<10?'#22c55e':'#f59e0b');
}

// === Update ===
function updateLevel(idx,dt){
  S.t+=dt;
  if(idx===0){
    let lawson=S.density*S.temp*0.001;
    if(S.temp>=1e8&&S.density>=1e20&&lawson>5e21){S.reacting=true;S.energy=17.6;if(!levelObjs[0][2]){S.lawsonMet=true;completeObj(2)}}
    else S.reacting=false;
  }
  if(idx===1){
    S.unstable=S.plasmaTemp>8e7&&S.magField<2;
    if(S.plasmaTemp>=1e8&&!levelObjs[1][0])completeObj(0);
    if(S.confined&&!levelObjs[1][1])completeObj(1);
    if(S.plasmaTemp>8e7&&S.magField>=2&&!levelObjs[1][2])completeObj(2);
  }
  if(idx===3&&S.imploding&&!S.ignited){
    S.compressionR=Math.max(5,S.compressionR-0.5);
    if(S.compressionR<=8&&S.laserEnergy>=80&&S.symmetry>=85){S.ignited=true;completeObj(2)}
  }
}

// === Click ===
function handleClick(x,y){
  if(curLevel===6){
    let milestones=[{x:W*0.25},{x:W*0.5},{x:W*0.75}];
    for(let i=0;i<milestones.length;i++){
      if(Math.abs(x-milestones[i].x)<25&&Math.abs(y-H*0.4)<25){S.milestone=Math.max(S.milestone,i);
        if(i===0&&!levelObjs[6][0])completeObj(0);break}}
  }
}

// === Objectives ===
function completeObj(i){if(!levelObjs[curLevel][i]){levelObjs[curLevel][i]=true;renderPanel()}}
function isLevelDone(idx){return levelObjs[idx].every(Boolean)}
function isUnlocked(idx){return idx===0||quizPassed[idx-1]}

function formatFusionTemp(v){
  if(v>=1e8)return (v/1e8).toFixed(1)+'亿°C';
  if(v>=1e6)return (v/1e6).toFixed(0)+'百万°C';
  return v.toFixed(0)+'°C';
}
function updateL0Metrics(){
  const temp=document.getElementById('l0TempVal');
  const density=document.getElementById('l0DensityVal');
  if(temp)temp.textContent=formatFusionTemp(S.temp);
  if(density)density.textContent=S.density.toExponential(1)+' m⁻³';
}
function setL0Condition(key,el){
  S[key]=Math.pow(10,+el.value/1000*(key==='temp'?8.3:22));
  if(key==='temp'&&S.temp>1e6&&!levelObjs[0][0])completeObj(0);
  updateL0Metrics();
}
function updateL1Metrics(){
  S.unstable=S.plasmaTemp>8e7&&S.magField<2;
  S.confined=S.magField>1.5&&S.plasmaTemp>5e7;
  const temp=document.getElementById('l1TempVal');
  const field=document.getElementById('l1FieldVal');
  const status=document.getElementById('l1Status');
  if(temp)temp.textContent=(S.plasmaTemp/1e6).toFixed(0)+'百万°C';
  if(field)field.textContent=S.magField.toFixed(1)+'T';
  if(status){
    let text='';
    if(S.confined)text+='<p style="color:#22c55e">✅ 等离子体已约束</p>';
    if(S.unstable)text+='<p style="color:#ef4444">⚠️ 检测到不稳定性！增大磁场可抑制</p>';
    status.innerHTML=text;
  }
}
function setL1Plasma(key,el){
  if(key==='plasmaTemp')S.plasmaTemp=+el.value*1e6;
  else S.magField=+el.value/10;
  updateL1Metrics();
}
function updateL2Metrics(){
  const toroidal=document.getElementById('l2ToroidalVal');
  const poloidal=document.getElementById('l2PoloidalVal');
  if(toroidal)toroidal.textContent=S.toroidalI.toFixed(0)+'kA';
  if(poloidal)poloidal.textContent=S.poloidalI.toFixed(0)+'kA';
}
function setL2Current(key,el){
  S[key]=+el.value;
  if(S.toroidalI>50&&!levelObjs[2][0])completeObj(0);
  if(S.poloidalI>30&&S.toroidalI>30&&!levelObjs[2][1])completeObj(1);
  updateL2Metrics();
}
function updateL3Metrics(){
  const energy=document.getElementById('l3EnergyVal');
  const symmetry=document.getElementById('l3SymmetryVal');
  if(energy)energy.textContent=S.laserEnergy.toFixed(0)+'MJ';
  if(symmetry)symmetry.textContent=S.symmetry+'%';
}
function setL3Laser(key,el){
  S[key]=+el.value;
  if(S.laserEnergy>=80&&!levelObjs[3][0])completeObj(0);
  if(S.symmetry>=85&&!levelObjs[3][1])completeObj(1);
  updateL3Metrics();
}
function updateL4State(){
  S.resistance=S.coolTemp>S.critTemp?(S.coolTemp-S.critTemp)/300:0;
  S.superconducting=S.coolTemp<=S.critTemp;
  S.magStrength=S.superconducting?15*(1-S.coolTemp/S.critTemp)+3:0;
}
function updateL4Metrics(){
  updateL4State();
  const temp=document.getElementById('l4CoolTempVal');
  const resistance=document.getElementById('l4ResistanceVal');
  const state=document.getElementById('l4StateVal');
  if(temp)temp.textContent=S.coolTemp.toFixed(0)+'K';
  if(resistance)resistance.textContent=S.resistance.toFixed(3)+'Ω';
  if(state)state.innerHTML=S.superconducting?'<span style="color:#22c55e">超导态</span>':'<span style="color:#ef4444">正常态</span>';
}
function setL4Cooling(el){
  S.coolTemp=+el.value;
  updateL4State();
  if(S.superconducting&&!levelObjs[4][0])completeObj(0);
  if(S.magStrength>12&&!levelObjs[4][1])completeObj(1);
  if(S.superconducting&&S.coolTemp<S.critTemp*0.5&&!levelObjs[4][2])completeObj(2);
  updateL4Metrics();
}
function updateL5State(){
  S.tbr=0.6+S.blanketThick/100*0.8+(S.material==='rafm'?0.05:0);
  S.dpa=S.neutronFlux*10*(S.material==='tungsten'?0.5:S.material==='rafm'?0.7:1);
}
function updateL5Metrics(){
  updateL5State();
  const thick=document.getElementById('l5BlanketVal');
  const tbr=document.getElementById('l5TbrVal');
  const dpa=document.getElementById('l5DpaVal');
  if(thick)thick.textContent=S.blanketThick+'cm';
  if(tbr){
    tbr.style.color=S.tbr>1?'#22c55e':'#f59e0b';
    tbr.textContent=`TBR: ${S.tbr.toFixed(2)} ${S.tbr>1?'✅ 燃料自给':'❌ 不足'}`;
  }
  if(dpa)dpa.textContent=`辐照损伤: ${S.dpa.toFixed(1)} dpa/年`;
}
function setL5Blanket(el){
  S.blanketThick=+el.value;
  updateL5State();
  if(S.tbr>1&&!levelObjs[5][0])completeObj(0);
  if(S.dpa<5&&S.tbr>1&&!levelObjs[5][2])completeObj(2);
  updateL5Metrics();
}
function updateL6State(){
  S.costPerKwh=S.qValue>1?200/S.qValue+5000/S.plantPower:999;
}
function updateL6Metrics(){
  updateL6State();
  const q=document.getElementById('l6QVal');
  const power=document.getElementById('l6PowerVal');
  const cost=document.getElementById('l6CostVal');
  if(q)q.textContent=S.qValue.toFixed(1);
  if(power)power.textContent=S.plantPower+'MW';
  if(cost){
    cost.style.color=S.costPerKwh<10?'#22c55e':'#f59e0b';
    cost.textContent=`度电成本: ${S.costPerKwh.toFixed(1)}分/kWh`;
  }
}
function setL6Economics(key,el){
  S[key]=key==='qValue'?+el.value/10:+el.value;
  updateL6State();
  if(S.qValue>=30&&!levelObjs[6][1])completeObj(1);
  if(S.costPerKwh<10&&!levelObjs[6][2])completeObj(2);
  updateL6Metrics();
}

// === Panel ===
function renderPanel(){
  let L=LEVELS[curLevel],objs=levelObjs[curLevel];
  let h='';
  h+=`<div class="stage-nav"><div class="sn-bar">`;
  for(let i=0;i<7;i++){let unlocked=isUnlocked(i);h+=`<div class="sn-d ${quizPassed[i]?'done':i===curLevel?'cur':unlocked?'':'locked'}" onclick="${unlocked?`goLevel(${i})`:''}"></div>`}
  let passed=quizPassed.filter(Boolean).length;
  h+=`</div><div class="sn-info">第 ${curLevel+1}/7 关 | 进度 ${Math.round(passed/7*100)}%</div><div class="sn-hint">${passed}/7 已通关，完成目标后答对测验才解锁下一关</div></div>`;
  h+=`<h2>${L.name}</h2>`;
  h+=`<p style="font-size:13px;line-height:1.6;color:var(--concept-text);margin-bottom:10px">${L.desc}</p>`;
  h+=`<h3>目标</h3>`;
  for(let i=0;i<3;i++)h+=`<div class="obj-item"><div class="obj-dot ${objs[i]?'done':''}">${objs[i]?'✓':i+1}</div><span style="color:${objs[i]?'var(--goal-done)':'var(--goal-text)'}">${L.objs[i]}</span></div>`;
  h+=renderLevelPanel(curLevel);
  if(isLevelDone(curLevel)&&L.quiz&&!quizPassed[curLevel]){
    let fb=quizFeedback[curLevel];
    h+=`<div class="quiz-box"><div class="quiz-title">通关小测验</div><div class="quiz-q">🧠 ${L.quiz.q}</div>`;
    L.quiz.opts.forEach((o,i)=>{h+=`<button class="quiz-opt" onclick="checkQuiz(${curLevel},${i})">${o}</button>`});
    if(fb)h+=`<div class="quiz-feedback ${fb.ok?'ok':'bad'}">${fb.text}</div>`;
    h+=`</div>`}
  if(quizPassed[curLevel]){
    h+=`<div class="learn-box">${L.learn}</div>`;
    h+=curLevel<6?`<button class="act-btn" onclick="goLevel(${curLevel+1})">下一关 →</button>`:`<button class="act-btn" onclick="showResult()">查看总总结 🎉</button>`;
  }
  panel.innerHTML=h;
}

function renderLevelPanel(idx){
  let h='';
  if(idx===0){
    h+=`<h3>反应条件</h3>`;
    h+=`<div class="slider-row"><label>温度: <span id="l0TempVal">${formatFusionTemp(S.temp)}</span></label><input type="range" min="0" max="1000" value="${Math.log10(Math.max(1,S.temp))/8.3*1000}" oninput="setL0Condition('temp',this)" onchange="this.blur();renderPanel()"></div>`;
    h+=`<div class="slider-row"><label>密度: <span id="l0DensityVal">${S.density.toExponential(1)} m⁻³</span></label><input type="range" min="0" max="1000" value="${Math.log10(S.density)/22*1000}" oninput="setL0Condition('density',this)" onchange="this.blur();renderPanel()"></div>`;
    if(S.reacting)h+=`<p style="color:#22c55e">✅ D-T反应进行中！释放能量: ${S.energy}MeV</p>`;
    if(!levelObjs[0][0]&&S.temp>1e6){completeObj(0)}
    if(!levelObjs[0][1]&&S.reacting){h+=`<p style="color:var(--sv)">E = Δm × c² = 17.6 MeV</p>`;completeObj(1)}
  }
  if(idx===1){
    h+=`<h3>等离子体参数</h3>`;
    h+=`<div class="slider-row"><label>温度: <span id="l1TempVal">${(S.plasmaTemp/1e6).toFixed(0)}百万°C</span></label><input type="range" min="1" max="200" value="${S.plasmaTemp/1e6}" oninput="setL1Plasma('plasmaTemp',this)" onchange="this.blur();renderPanel()"></div>`;
    h+=`<div class="slider-row"><label>磁场强度: <span id="l1FieldVal">${S.magField.toFixed(1)}T</span></label><input type="range" min="1" max="50" value="${S.magField*10}" oninput="setL1Plasma('magField',this)" onchange="this.blur();renderPanel()"></div>`;
    h+=`<div id="l1Status">`;
    if(S.confined)h+=`<p style="color:#22c55e">✅ 等离子体已约束</p>`;
    if(S.unstable)h+=`<p style="color:#ef4444">⚠️ 检测到不稳定性！增大磁场可抑制</p>`;
    h+=`</div>`;
  }
  if(idx===2){
    h+=`<h3>线圈电流</h3>`;
    h+=`<div class="slider-row"><label>环向场电流: <span id="l2ToroidalVal">${S.toroidalI.toFixed(0)}kA</span></label><input type="range" min="0" max="100" value="${S.toroidalI}" oninput="setL2Current('toroidalI',this)" onchange="this.blur();renderPanel()"></div>`;
    h+=`<div class="slider-row"><label>极向场电流: <span id="l2PoloidalVal">${S.poloidalI.toFixed(0)}kA</span></label><input type="range" min="0" max="100" value="${S.poloidalI}" oninput="setL2Current('poloidalI',this)" onchange="this.blur();renderPanel()"></div>`;
    if(S.toroidalI>50&&!levelObjs[2][0])completeObj(0);
    if(S.poloidalI>30&&S.toroidalI>30&&!levelObjs[2][1])completeObj(1);
    h+=`<button class="act-btn ${S.divertorOn?'secondary':''}" onclick="S.divertorOn=true;completeObj(2);renderPanel()">${S.divertorOn?'✅ 偏滤器运行中':'启动偏滤器'}</button>`;
  }
  if(idx===3){
    h+=`<h3>激光参数</h3>`;
    h+=`<div class="slider-row"><label>激光能量: <span id="l3EnergyVal">${S.laserEnergy.toFixed(0)}MJ</span></label><input type="range" min="0" max="100" value="${S.laserEnergy}" oninput="setL3Laser('laserEnergy',this)" onchange="this.blur();renderPanel()"></div>`;
    h+=`<div class="slider-row"><label>对称性: <span id="l3SymmetryVal">${S.symmetry}%</span></label><input type="range" min="10" max="100" value="${S.symmetry}" oninput="setL3Laser('symmetry',this)" onchange="this.blur();renderPanel()"></div>`;
    if(S.laserEnergy>=80&&!levelObjs[3][0])completeObj(0);
    if(S.symmetry>=85&&!levelObjs[3][1])completeObj(1);
    h+=`<button class="act-btn" onclick="S.imploding=true;S.compressionR=60;renderPanel()" ${S.ignited?'disabled':''}>${S.ignited?'✅ 已点火':'开始内爆压缩'}</button>`;
  }
  if(idx===4){
    updateL4State();
    h+=`<h3>冷却系统</h3>`;
    h+=`<div class="slider-row"><label>冷却温度: <span id="l4CoolTempVal">${S.coolTemp.toFixed(0)}K</span></label><input type="range" min="1" max="300" value="${S.coolTemp}" oninput="setL4Cooling(this)" onchange="this.blur();renderPanel()"></div>`;
    h+=`<p>电阻: <span id="l4ResistanceVal">${S.resistance.toFixed(3)}Ω</span> | 状态: <span id="l4StateVal">${S.superconducting?'<span style="color:#22c55e">超导态</span>':'<span style="color:#ef4444">正常态</span>'}</span></p>`;
    if(S.superconducting&&!levelObjs[4][0])completeObj(0);
    if(S.magStrength>12&&!levelObjs[4][1])completeObj(1);
    if(S.superconducting&&S.coolTemp<S.critTemp*0.5&&!levelObjs[4][2])completeObj(2);
  }
  if(idx===5){
    updateL5State();
    h+=`<h3>包层设计</h3>`;
    h+=`<div class="slider-row"><label>锂包层厚度: <span id="l5BlanketVal">${S.blanketThick}cm</span></label><input type="range" min="5" max="100" value="${S.blanketThick}" oninput="setL5Blanket(this)" onchange="this.blur();renderPanel()"></div>`;
    h+=`<h3>第一壁材料</h3>`;
    h+=`<button class="act-btn ${S.material==='steel'?'':'secondary'}" onclick="S.material='steel';renderPanel()">普通钢</button>`;
    h+=`<button class="act-btn ${S.material==='tungsten'?'':'secondary'}" onclick="S.material='tungsten';renderPanel()" style="margin-top:4px">钨 (耐高温)</button>`;
    h+=`<button class="act-btn ${S.material==='rafm'?'':'secondary'}" onclick="S.material='rafm';renderPanel()" style="margin-top:4px">RAFM钢 (低活化)</button>`;
    h+=`<p id="l5TbrVal" style="color:${S.tbr>1?'#22c55e':'#f59e0b'}">TBR: ${S.tbr.toFixed(2)} ${S.tbr>1?'✅ 燃料自给':'❌ 不足'}</p>`;
    h+=`<p id="l5DpaVal">辐照损伤: ${S.dpa.toFixed(1)} dpa/年</p>`;
    if(S.tbr>1&&!levelObjs[5][0])completeObj(0);
    if(S.material!=='steel'&&!levelObjs[5][1])completeObj(1);
    if(S.dpa<5&&S.tbr>1&&!levelObjs[5][2])completeObj(2);
  }
  if(idx===6){
    updateL6State();
    h+=`<h3>聚变参数</h3>`;
    h+=`<div class="slider-row"><label>Q值: <span id="l6QVal">${S.qValue.toFixed(1)}</span></label><input type="range" min="1" max="600" value="${S.qValue*10}" oninput="setL6Economics('qValue',this)" onchange="this.blur();renderPanel()"></div>`;
    h+=`<div class="slider-row"><label>电站功率: <span id="l6PowerVal">${S.plantPower}MW</span></label><input type="range" min="100" max="2000" value="${S.plantPower}" oninput="setL6Economics('plantPower',this)" onchange="this.blur();renderPanel()"></div>`;
    h+=`<p id="l6CostVal" style="color:${S.costPerKwh<10?'#22c55e':'#f59e0b'}">度电成本: ${S.costPerKwh.toFixed(1)}分/kWh</p>`;
    h+=`<p style="font-size:12px;color:var(--stage-hint)">点击时间线上的里程碑了解详情</p>`;
    if(S.qValue>=30&&!levelObjs[6][1])completeObj(1);
    if(S.costPerKwh<10&&!levelObjs[6][2])completeObj(2);
  }
  return h;
}

// === Helpers ===
function checkQuiz(levelIdx,picked){
  if(levelIdx!==curLevel||quizPassed[levelIdx])return;
  let q=LEVELS[levelIdx].quiz,ok=picked===q.ans;
  quizFeedback[levelIdx]={ok,text:ok?'答对了。先看本关工程总结，再进入下一关。':'还不对。回到现象和公式，再判断核心物理机制。'};
  if(ok)quizPassed[levelIdx]=true;
  renderPanel();
}
function goLevel(i){if(!isUnlocked(i))return;curLevel=i;initLevel(i);renderPanel()}

function showResult(){
  let done=levelObjs.flat().filter(Boolean).length;
  panel.innerHTML=`<div class="summary-box"><div class="summary-title">🎉 探险完成！</div><div class="summary-sub">你已掌握核聚变工程全链路技术</div>
    <div class="summary-stats"><div class="summary-stat"><div class="num">${done}/21</div><div class="label">目标完成</div></div><div class="summary-stat"><div class="num">7/7</div><div class="label">关卡通过</div></div></div>
    <div class="summary-keys"><div>⚛️ D-T反应释放17.6MeV能量</div><div>🔥 1亿度等离子体需磁约束</div><div>🔄 托卡马克用螺旋磁场约束</div><div>💥 NIF 192束激光实现点火</div><div>🧲 超导磁体产生>12T强磁场</div><div>🛡️ 锂包层实现氚燃料自给</div><div>🏭 ITER→DEMO→商用三步走</div></div>
    <button class="act-btn" onclick="curLevel=0;levelObjs=Array.from({length:7},()=>[false,false,false]);quizPassed=Array.from({length:7},()=>false);quizFeedback={};initLevel(0);renderPanel()" style="margin-top:12px">重新探索</button></div>`;
}

// === Main loop ===
function startGame(){overlay.style.display='none';panel.style.display='block';bar.style.display='flex';resize();initLevel(0);renderPanel();loop()}
function draw(){ctx.clearRect(0,0,W,H);drawGrid();drawStars();drawLevel(curLevel)}
function loop(){time++;updateLevel(curLevel,1);draw();animId=requestAnimationFrame(loop)}
cv.addEventListener('click',e=>{let r=cv.getBoundingClientRect();handleClick(e.clientX-r.left,e.clientY-r.top)});
bar.innerHTML='<div class="bar-left"><span class="bar-btn active">核聚变工程探险</span></div><div class="bar-right">边玩边学</div>';
resize();
</script>
</body>
</html>
