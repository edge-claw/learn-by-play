<div class="feat" style="text-align:center;color:var(--feat-text);font-size:12px;width:80px"><div style="font-size:26px;margin-bottom:4px">🔗</div>突触传递</div>
<div class="feat" style="text-align:center;color:var(--feat-text);font-size:12px;width:80px"><div style="font-size:26px;margin-bottom:4px">🕸️</div>神经网络</div>
<div class="feat" style="text-align:center;color:var(--feat-text);font-size:12px;width:80px"><div style="font-size:26px;margin-bottom:4px">👁️</div>感觉系统</div>
<div class="feat" style="text-align:center;color:var(--feat-text);font-size:12px;width:80px"><div style="font-size:26px;margin-bottom:4px">💾</div>记忆学习</div>

</div>

<script>
let isDark=true;
const TH={
  dark:{bg1:'#0a0a1a',bg2:'#0d0d1a',bg3:'#0a0a2a',grid:'rgba(168,85,247,0.04)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)'},
  light:{bg1:'#f5f0ff',bg2:'#f0f0f5',bg3:'#e8e0f5',grid:'rgba(168,85,247,0.03)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)'}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';document.getElementById('themeToggle').style.background=isDark?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.06)';document.getElementById('themeToggle').style.border=isDark?'1px solid rgba(255,255,255,0.2)':'1px solid rgba(0,0,0,0.12)';document.getElementById('themeToggle').style.color=isDark?'#aaa':'#666';try{renderPanel()}catch(e){}}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),panel=document.getElementById('panel'),bar=document.getElementById('bar'),ov=document.getElementById('ov');
let W,H,curLevel=0,tick=0,mouse={x:0,y:0,down:false};
const PL=320,LEVELS=7;
const levelNames=['神经元结构','突触传递','神经网络','感觉系统','记忆与学习','脑成像技术','意识与AI'];
const levelDescs=[
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>结构：</b>树突 → 胞体 → 轴突 → 突触末梢</div>画布上展示了一个神经元。点击胞体触发动作电位，观察电信号从树突到突触末梢的传导过程。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>过程：</b>囊泡释放 → 递质扩散 → 受体结合 → 信号传递</div>调节神经递质的浓度，观察突触前膜释放囊泡、递质穿过突触间隙、与突触后膜受体结合的全过程。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>规则：</b>Hebb规则 / 突触可塑性 / LTP / LTD</div>多个神经元组成网络。反复激活同一条通路，观察突触连接如何增强(LTP)或减弱(LTD)。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>通路：</b>视觉 / 听觉 / 体感皮层映射</div>点击不同的感觉输入，观察信号如何沿着特定通路传递到大脑皮层的对应区域。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>系统：</b>海马体 / 工作记忆 / 长期记忆巩固</div>信息先进入工作记忆(容量有限)，通过海马体的反复激活巩固为长期记忆。体验记忆编码和提取的过程。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>技术：</b>EEG / fMRI / PET / 光遗传学</div>不同的脑成像技术各有优劣。选择合适的技术来观察大脑活动，比较它们的时间分辨率和空间分辨率。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>理论：</b>全局工作空间 / 整合信息论 / 人工意识</div>意识是什么？探索两大主流理论，思考机器能否产生意识。'
];
const levelObjTexts=[
['点击胞体触发动作电位','观察电信号沿轴突传导','识别全部4个结构(树突/胞体/轴突/突触)'],
['触发突触囊泡释放','调节递质浓度观察兴奋性突触','切换到抑制性突触观察差异'],
['激活神经元触发Hebb学习','反复刺激产生LTP(长时程增强)','停止刺激观察LTD(长时程抑制)'],
['激活视觉通路(眼→LGN→V1)','激活听觉通路(耳→MGN→A1)','观察体感皮层的身体映射'],
['将3个项目编码到工作记忆','通过海马体巩固为长期记忆','成功提取已巩固的记忆'],
['用EEG记录脑电波','用fMRI观察脑区激活','比较4种技术的分辨率'],
['体验全局工作空间理论','计算整合信息(Φ值)','思考人工意识的可能性']
];
const learnTexts=[
'💡 神经元是神经系统的基本单位，人脑约有860亿个。树突接收信号，胞体整合信息，轴突传导电信号(速度可达120m/s)。当膜电位从-70mV去极化到-55mV(阈值)时，触发动作电位(全或无)。髓鞘使信号跳跃式传导(saltatory conduction)，大幅提高速度。',
'💡 突触传递：动作电位到达突触末梢→Ca²⁺内流→囊泡与突触前膜融合→神经递质释放到突触间隙(宽约20nm)→与突触后膜受体结合。兴奋性递质(如谷氨酸)使后膜去极化(EPSP)，抑制性递质(如GABA)使后膜超极化(IPSP)。一个神经元可接收数千个突触输入。',
'💡 Hebb规则(1949)："一起放电的神经元连在一起"。当突触前后神经元同时活跃时，突触连接增强(LTP,可持续数小时到数周)。反之，不同步活动导致连接减弱(LTD)。这是学习和记忆的细胞基础。NMDA受体是LTP的关键分子开关。',
'💡 感觉信息沿特定通路传递：视觉(视网膜→外侧膝状体LGN→初级视觉皮层V1)，听觉(耳蜗→内侧膝状体MGN→初级听觉皮层A1)，体感(皮肤受体→丘脑VPL→初级体感皮层S1)。体感皮层的"小人图"(homunculus)显示手和嘴唇占据不成比例的大面积。',
'💡 工作记忆容量约7±2个项目(Miller,1956)，由前额叶皮层维持。海马体是记忆巩固的关键：白天的经历在睡眠时被"重放"(replay)，从海马体转移到新皮层形成长期记忆。这个过程称为系统巩固(systems consolidation)，可能需要数周到数年。',
'💡 EEG(脑电图)：时间分辨率极高(ms级)但空间分辨率低；fMRI(功能磁共振)：空间分辨率高(mm级)但时间分辨率低(秒级)；PET(正电子发射断层)：可追踪特定分子但需放射性示踪剂；光遗传学：用光精确控制特定神经元(ms+细胞级)，但需基因改造，目前主要用于动物研究。',
'💡 全局工作空间理论(GWT,Baars)：意识产生于信息在全脑"工作空间"中广播时。整合信息论(IIT,Tononi)：意识的程度由系统的整合信息量Φ衡量——Φ越高，意识越丰富。关于人工意识：如果IIT正确，纯前馈网络(如当前AI)的Φ≈0，即使行为上通过图灵测试也不具有意识。这仍是开放问题。'
];
let levelObjs=levelObjTexts.map(a=>a.map(()=>false));
let L={};

// ========== 音效 ==========
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(type){initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);if(type==='click'){o.frequency.value=800;g.gain.value=0.1;o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);o.stop(audioCtx.currentTime+0.1)}else if(type==='success'){o.frequency.value=523;g.gain.value=0.15;o.start();o.frequency.setValueAtTime(659,audioCtx.currentTime+0.1);o.frequency.setValueAtTime(784,audioCtx.currentTime+0.2);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);o.stop(audioCtx.currentTime+0.4)}else if(type==='fail'){o.frequency.value=300;g.gain.value=0.15;o.start();o.frequency.setValueAtTime(200,audioCtx.currentTime+0.15);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);o.stop(audioCtx.currentTime+0.3)}}
let particles=[];
function spawnP(x,y,color,n=12){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.6+Math.random()*0.4,color,r:2+Math.random()*3})}}
function drawParticles(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=dt;if(p.life<=0){particles.splice(i,1);continue}ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
resize();window.addEventListener('resize',resize);
function completeObj(i){if(!levelObjs[curLevel][i]){levelObjs[curLevel][i]=true;playSound('success');renderPanel()}}
function allObjDone(){return levelObjs[curLevel].every(v=>v)}
function resetLevel(li){
  L={};levelObjs[li]=levelObjs[li].map(()=>false);
  const cx=PL+(W-PL)/2,cy=H/2;
  if(li===0){
    // 神经元结构
    L.parts=[
      {id:'dendrite',name:'树突',x:cx-180,y:cy-20,r:40,color:'#a855f7',desc:'接收其他神经元的信号',identified:false},
      {id:'soma',name:'胞体',x:cx-60,y:cy,r:35,color:'#ec4899',desc:'整合信号,含细胞核',identified:false},
      {id:'axon',name:'轴突',x:cx+80,y:cy,r:25,color:'#f59e0b',desc:'传导动作电位',identified:false},
      {id:'synapse',name:'突触末梢',x:cx+200,y:cy,r:20,color:'#22c55e',desc:'释放神经递质',identified:false}
    ];
    L.apFired=false;L.apProgress=0;L.apActive=false;L.allIdentified=false;
    L.membrane=-70;L.threshold=-55;
  } else if(li===1){
    // 突触传递
    L.vesicles=[];L.ntConc=0.5;L.released=false;L.excitatory=true;
    L.receptorsBound=0;L.inhibitoryDone=false;
    for(let i=0;i<8;i++){
      L.vesicles.push({x:cx-80+Math.random()*30-15,y:cy-40+Math.random()*20-10,r:5,released:false,dx:0,dy:0});
    }
    L.postPotential=0;
  } else if(li===2){
    // 神经网络 - Hebb学习
    L.neurons=[];L.connections=[];
    const positions=[[cx-120,cy-80],[cx,cy-100],[cx+120,cy-80],[cx-80,cy+40],[cx+80,cy+40]];
    positions.forEach((p,i)=>{L.neurons.push({x:p[0],y:p[1],active:false,fireTime:0,id:i})});
    // 连接
    [[0,1],[1,2],[0,3],[1,4],[3,4],[2,4]].forEach(([a,b])=>{
      L.connections.push({from:a,to:b,weight:0.3,ltp:0});
    });
    L.hebbFired=false;L.ltpDone=false;L.ltdDone=false;L.stimCount=0;L.noStimTime=0;
  } else if(li===3){
    // 感觉系统
    L.pathways=[
      {id:'visual',name:'视觉',color:'#3b82f6',stages:['视网膜','LGN','V1'],active:false,progress:0},
      {id:'auditory',name:'听觉',color:'#22c55e',stages:['耳蜗','MGN','A1'],active:false,progress:0},
      {id:'somatic',name:'体感',color:'#f59e0b',stages:['皮肤受体','VPL','S1'],active:false,progress:0}
    ];
    L.homunculusShown=false;
    // 大脑轮廓上的区域
    L.brainRegions=[
      {name:'V1',x:cx+100,y:cy-60,r:25,color:'#3b82f6',active:false},
      {name:'A1',x:cx+60,y:cy+20,r:25,color:'#22c55e',active:false},
      {name:'S1',x:cx-20,y:cy-80,r:25,color:'#f59e0b',active:false}
    ];
  } else if(li===4){
    // 记忆与学习
    L.items=['🍎','🌟','🎵'];L.encoded=new Set();L.consolidated=new Set();L.retrieved=new Set();
    L.phase='encode';L.showItems=true;L.hippocampusActive=false;
    L.replayCount=0;L.testPhase=false;L.testAnswer=null;
  } else if(li===5){
    // 脑成像技术
    L.techs=[
      {id:'eeg',name:'EEG',color:'#22c55e',timeRes:'ms级',spaceRes:'cm级',invasive:false,desc:'头皮电极记录脑电',active:false},
      {id:'fmri',name:'fMRI',color:'#3b82f6',timeRes:'秒级',spaceRes:'mm级',invasive:false,desc:'血氧水平依赖信号',active:false},
      {id:'pet',name:'PET',color:'#f59e0b',timeRes:'分钟级',spaceRes:'mm级',invasive:true,desc:'放射性示踪剂',active:false},

function drawBg(){const th=t();ctx.fillStyle=th.bg1;ctx.fillRect(0,0,W,H);ctx.strokeStyle=th.grid;ctx.lineWidth=1;for(let x=PL;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W,y);ctx.stroke()}}
function drawRR(x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke()}}
function drawArrow(x1,y1,x2,y2,color,w2){const a=Math.atan2(y2-y1,x2-x1),l=8;ctx.strokeStyle=color;ctx.lineWidth=w2||2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-l*Math.cos(a-0.4),y2-l*Math.sin(a-0.4));ctx.lineTo(x2-l*Math.cos(a+0.4),y2-l*Math.sin(a+0.4));ctx.fill()}

function drawLevel0(){
  const th=t(),cx=PL+(W-PL)/2,cy=H/2;
  // 树突分支
  ctx.strokeStyle=L.parts[0].color;ctx.lineWidth=3;
  for(let i=0;i<5;i++){
    const angle=-Math.PI/2+i*Math.PI/4-Math.PI/4;
    const bx=L.parts[0].x+Math.cos(angle)*50,by=L.parts[0].y+Math.sin(angle)*50;
    ctx.beginPath();ctx.moveTo(L.parts[0].x,L.parts[0].y);ctx.lineTo(bx,by);ctx.stroke();
    // 小分支
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(angle-0.3)*20,by+Math.sin(angle-0.3)*20);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(angle+0.3)*20,by+Math.sin(angle+0.3)*20);ctx.stroke();
  }
  // 轴突线
  ctx.strokeStyle=L.parts[2].color+'88';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(L.parts[1].x+35,L.parts[1].y);ctx.lineTo(L.parts[3].x-20,L.parts[3].y);ctx.stroke();
  // 髓鞘
  for(let i=0;i<4;i++){
    const mx=L.parts[1].x+50+i*40,my=cy;
    drawRR(mx,my-10,30,20,4,L.parts[2].color+'33',L.parts[2].color+'66');
  }
  // 各部分
  L.parts.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.identified?p.color+'66':p.color+'33';ctx.fill();
    ctx.strokeStyle=p.color;ctx.lineWidth=p.identified?3:2;ctx.stroke();
    ctx.fillStyle=th.text;ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText(p.name,p.x,p.y+p.r+16);
  });
  // 动作电位传导动画
  if(L.apActive){
    const prog=L.apProgress;
    const startX=L.parts[0].x,endX=L.parts[3].x;
    const apX=startX+(endX-startX)*prog;
    ctx.save();
    const grad=ctx.createRadialGradient(apX,cy,2,apX,cy,30);
    grad.addColorStop(0,'#fbbf24');grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;ctx.fillRect(apX-30,cy-30,60,60);
    ctx.restore();
    // 电压图
    ctx.fillStyle=th.text;ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText('膜电位: '+(L.membrane>-55?'+30':L.membrane.toFixed(0))+' mV',cx,cy+100);
  }
  // 膜电位图
  const gx=cx-120,gy=cy+120,gw=240,gh=60;
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(gx,gy,gw,gh);
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.strokeRect(gx,gy,gw,gh);
  // 静息电位线
  ctx.strokeStyle='#ef444466';ctx.setLineDash([3,3]);
  const restY=gy+gh*0.8;ctx.beginPath();ctx.moveTo(gx,restY);ctx.lineTo(gx+gw,restY);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle=th.textMut;ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText('-70mV',gx-4,restY+4);
  ctx.fillText('-55mV',gx-4,gy+gh*0.5+4);
  if(L.apFired){
    // 动作电位波形
    ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.beginPath();
    for(let i=0;i<gw;i++){
      const t2=i/gw*4;let v;
      if(t2<1)v=0.8;else if(t2<1.3)v=0.1;else if(t2<1.6)v=0.9;else v=0.8;
      const py=gy+gh*v;
      i===0?ctx.moveTo(gx+i,py):ctx.lineTo(gx+i,py);
    }
    ctx.stroke();
  }
}

      if(L.broadcastActive){
        const prog=L.broadcastProgress;
        ctx.strokeStyle=`rgba(168,85,247,${prog*0.5})`;ctx.lineWidth=1+prog*2;
        ctx.beginPath();ctx.moveTo(cx,cy-40);ctx.lineTo(mx,my);ctx.stroke();
      }
    });
  }
  // IIT - Phi值
  if(L.iitExplored){
    ctx.fillStyle=th.text;ctx.font='bold 16px sans-serif';ctx.textAlign='center';
    ctx.fillText('Φ = '+L.phiValue.toFixed(1),cx,cy+80);
    ctx.fillStyle=th.textSec;ctx.font='12px sans-serif';
    ctx.fillText('整合信息量',cx,cy+98);
  }
  // 网络对比
  L.networks.forEach(net=>{
    drawRR(net.x-40,net.y-15,80,50,8,net.conscious?'#22c55e22':'#ef444422',net.conscious?'#22c55e':'#ef4444');
    ctx.fillStyle=th.text;ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText(net.name,net.x,net.y+5);
    ctx.fillStyle=th.textMut;ctx.font='10px sans-serif';
    ctx.fillText('Φ='+net.phi,net.x,net.y+20);
    ctx.fillText(net.conscious?'可能有意识':'无意识',net.x,net.y+45);
  });
}

function handleClick(x,y){
  if(x<PL)return;
  const cx=PL+(W-PL)/2,cy=H/2;
  if(curLevel===0){
    // 点击神经元部分
    L.parts.forEach(p=>{
      if(Math.abs(x-p.x)<p.r+5&&Math.abs(y-p.y)<p.r+5){
        if(!p.identified){p.identified=true;playSound('click');spawnP(p.x,p.y,p.color)}
        if(p.id==='soma'&&!L.apActive){
          L.apActive=true;L.apProgress=0;L.apFired=true;L.membrane=30;
          completeObj(0);playSound('success');
        }
        const allId=L.parts.every(pp=>pp.identified);
        if(allId&&!L.allIdentified){L.allIdentified=true;completeObj(2)}
        renderPanel();
      }
    });
  } else if(curLevel===2){
    // 点击神经元激活
    L.neurons.forEach(n=>{
      if(Math.abs(x-n.x)<20&&Math.abs(y-n.y)<20){
        n.active=true;n.fireTime=tick;
        L.stimCount++;
        if(!L.hebbFired){L.hebbFired=true;completeObj(0)}
        // Hebb: 同时激活的连接增强
        L.connections.forEach(c=>{
          if(c.from===n.id||c.to===n.id){
            const other=L.neurons[c.from===n.id?c.to:c.from];
            if(other.active){c.weight=Math.min(1,c.weight+0.1);c.ltp=1}
          }
        });
        if(L.stimCount>=5){
          const strongConn=L.connections.filter(c=>c.weight>0.6);
          if(strongConn.length>0&&!L.ltpDone){L.ltpDone=true;completeObj(1)}
        }
        playSound('click');spawnP(n.x,n.y,'#fbbf24');
        renderPanel();
      }
    });
  } else if(curLevel===3){
    // 点击感觉输入
    const inputY=cy+100;
    L.pathways.forEach((p,i)=>{
      const bx=cx-120+i*120,by=inputY;
      if(x>bx&&x<bx+100&&y>by&&y<by+40){
        p.active=true;p.progress=0;
        L.brainRegions[i].active=true;
        playSound('click');
        if(i===0)completeObj(0);
        if(i===1)completeObj(1);
        if(i===2){L.homunculusShown=true;completeObj(2)}
        renderPanel();
      }
    });
  } else if(curLevel===4){
    // 点击项目编码
    if(L.phase==='encode'){
      L.items.forEach((item,i)=>{
        const wmX=cx-140,wmY=cy-80;
        const ix=wmX+20+i*35,iy=wmY+30;
        if(Math.abs(x-(ix+10))<20&&Math.abs(y-(iy+15))<20&&!L.encoded.has(i)){
          L.encoded.add(i);playSound('click');spawnP(ix+10,iy+15,'#ec4899');
          if(L.encoded.size>=3)completeObj(0);
          renderPanel();
        }
      });
    }
  }
}

// ========== 辅助函数 ==========
function triggerRelease(){
  if(L.released)return;
  L.released=true;
  L.receptorsBound=Math.round(L.ntConc*4);
  L.postPotential=L.excitatory?L.ntConc*15:-L.ntConc*10;
  completeObj(0);
  if(L.ntConc>0.5&&L.excitatory)completeObj(1);
  playSound('success');renderPanel();
}
function triggerLTD(){
  L.neurons.forEach(n=>n.active=false);
  L.connections.forEach(c=>{c.weight=Math.max(0.1,c.weight-0.15);c.ltp=-1});
  L.ltdDone=true;L.noStimTime=tick;completeObj(2);
  playSound('success');renderPanel();
}
function startConsolidate(){L.phase='consolidate';L.hippocampusActive=true;L.showItems=false;renderPanel()}
function doReplay(){
  L.replayCount++;playSound('click');
  if(L.replayCount>=3){
    L.items.forEach((_,i)=>L.consolidated.add(i));
    L.phase='retrieve';completeObj(1);
  }
  renderPanel();
}
function checkRetrieval(idx){
  if(idx===0){L.items.forEach((_,i)=>L.retrieved.add(i));completeObj(2);playSound('success')}
  else{playSound('fail')}
  renderPanel();
}
function activateTech(idx){
  L.techs[idx].active=true;playSound('click');
  if(idx===0){L.eegDone=true;completeObj(0)}
  if(idx===1){L.fmriDone=true;completeObj(1)}
  const activeCount=L.techs.filter(t2=>t2.active).length;
  if(activeCount>=4&&!L.compared){L.compared=true;completeObj(2)}
  renderPanel();
}
function exploreGWT(){L.gwtExplored=true;renderPanel()}
function exploreIIT(){L.iitExplored=true;L.phiValue=0;renderPanel()}

// ========== 主循环 ==========
let lastTime=0;
function gameLoop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;tick++;
  drawBg();
  // 更新
  if(curLevel===0&&L.apActive){
    L.apProgress+=dt*0.8;
    if(L.apProgress>0.3&&L.apProgress<0.5)L.membrane=30;
    else if(L.apProgress>0.5)L.membrane=-70;
    if(L.apProgress>=1){L.apActive=false;L.apProgress=0;completeObj(1);renderPanel()}
  }
  if(curLevel===3){
    L.pathways.forEach(p=>{if(p.active&&p.progress<1)p.progress+=dt*0.5});
  }
  if(curLevel===6&&L.broadcastActive&&L.broadcastProgress<1){
    L.broadcastProgress+=dt*0.5;
  }
  if(curLevel===2){
    L.neurons.forEach(n=>{if(n.active&&tick-n.fireTime>60)n.active=false});
  }
  // 绘制
  const drawFns=[drawLevel0,drawLevel1,drawLevel2,drawLevel3,drawLevel4,drawLevel5,drawLevel6];
  if(drawFns[curLevel])drawFns[curLevel]();
  drawParticles(dt);
  // 底部栏
  bar.innerHTML=`<div style="display:flex;gap:4px;align-items:center">${Array.from({length:LEVELS},(_,i)=>`<button style="width:28px;height:24px;border:1px solid ${i===curLevel?'#a855f7':'#c7d2fe'};background:${i===curLevel?'#a855f7':i<curLevel?'var(--btn-bg)':'transparent'};color:${i===curLevel?'#fff':i<curLevel?'#a855f7':'var(--text-sub)'};border-radius:4px;cursor:pointer;font-size:13px" onclick="goLevel(${i})">${i+1}</button>`).join('')}</div><div style="color:var(--text-muted)">脑科学探险</div>`;
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
