<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>微积分可视化 探险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;height:100vh}
#overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#overlay h1{font-size:42px;background:linear-gradient(135deg,#3b82f6,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
#overlay p{color:var(--text-muted);font-size:16px;margin-bottom:32px}
#overlay .sub{font-size:13px;color:var(--sub-color);margin-bottom:24px;max-width:500px;text-align:center;line-height:1.6}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:#aaa;font-size:12px;width:80px}
.feat .fi{font-size:26px;margin-bottom:4px}
.start-btn{padding:14px 48px;font-size:18px;border:none;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#60a5fa);color:#fff;cursor:pointer;transition:transform .2s,box-shadow .2s}
.start-btn:hover{transform:scale(1.05);box-shadow:0 0 24px rgba(59,130,246,.4)}
#game{display:none;height:100vh;width:100vw}
.panel{position:fixed;left:0;top:0;bottom:36px;width:320px;background:var(--panel-bg);border-right:1px solid var(--panel-border);padding:16px;overflow-y:auto;z-index:10;display:none;padding-bottom:24px}
.panel h2{font-size:18px;color:var(--title-color);margin-bottom:4px}
.panel .desc{font-size:13px;color:#cbd5e1;line-height:1.6;margin-bottom:12px}
.panel .obj{font-size:14px;padding:6px 10px;margin:4px 0;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border)}
.obj.done{border-color:#22c55e;color:#4ade80}
.obj .check{margin-right:6px}
.learn-box{margin-top:12px;padding:10px;border-radius:8px;background:var(--learn-bg);border:1px solid var(--learn-border);font-size:14px;color:var(--learn-text);line-height:1.8}
.act-btn{display:block;width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#60a5fa);color:#fff;font-size:14px;cursor:pointer;transition:transform .15s}
.act-btn:hover{transform:scale(1.02)}
.ctrl-row{display:flex;gap:6px;margin-top:8px}
.ctrl-row button{flex:1;padding:8px;border:1px solid #3b82f6;border-radius:6px;background:transparent;color:var(--sv);font-size:12px;cursor:pointer}
.ctrl-row button:hover{background:rgba(59,130,246,.15)}
.slider-row{margin-top:8px;font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums}
.slider-row .sl{display:inline-block;min-width:120px;font-variant-numeric:tabular-nums;font-family:'Menlo','Consolas',monospace}
.slider-row input[type=range]{width:100%;accent-color:#3b82f6;margin-top:4px}
canvas{position:fixed;left:320px;top:0;width:calc(100vw - 320px);height:calc(100vh - 36px);background:var(--bg)}
.bar{position:fixed;left:0;right:0;bottom:0;height:36px;background:var(--bar-bg);border-top:1px solid var(--panel-border);display:none;align-items:center;padding:0 16px;font-size:13px;z-index:10}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}.sn-d.cur{background:#6366f1;height:7px}.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{margin-top:4px;color:var(--stage-hint);font-size:12px;line-height:1.45}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div id="overlay">
<h1>微积分可视化 探险</h1>
<p>拖一拖、试一试，用直觉理解微积分</p>
<div class="sub">9 个交互关卡，从极限逼近到微分方程方向场，每一步都让你先动手发现，再揭示原理。</div>
<button class="start-btn" onclick="startGame()">开始探索</button>
<div class="features">
<div class="feat"><div class="fi">📐</div>极限与逼近</div>
<div class="feat"><div class="fi">🔗</div>连续性</div>
<div class="feat"><div class="fi">📈</div>导数与切线</div>
<div class="feat"><div class="fi">⛓️</div>求导法则</div>
<div class="feat"><div class="fi">🎯</div>极值与优化</div>
<div class="feat"><div class="fi">📊</div>积分与面积</div>
<div class="feat"><div class="fi">🔄</div>基本定理</div>
<div class="feat"><div class="fi">🌀</div>泰勒展开</div>
<div class="feat"><div class="fi">💫</div>微分方程</div>
</div>
</div>
<div id="game">
<div class="panel" id="panel"></div>
<canvas id="cv"></canvas>
<div class="bar" id="bar"></div>
</div>
<script>
// ===== THEME =====
let isDark=true;
const TH={dark:{grid:'rgba(255,255,255,0.06)',axis:'rgba(255,255,255,0.35)',label:'#555',text:'#e2e8f0',sub:'#94a3b8'},light:{grid:'rgba(0,0,0,0.06)',axis:'rgba(0,0,0,0.35)',label:'#999',text:'#334155',sub:'#64748b'}};
function t(k){return isDark?TH.dark[k]:TH.light[k]}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';draw()}

// ===== CANVAS & STATE =====
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),panel=document.getElementById('panel'),bar=document.getElementById('bar');
let W,H,li=0,animId,mouse={x:0,y:0,down:false,px:0,py:0};
let levelObjs=Array.from({length:9},()=>[false,false,false]);
let completedLevels=new Set(),quizPassed=Array(9).fill(false),quizFeedback='';
let levelState={};

function resize(){const dpr=devicePixelRatio||1;const r=cv.getBoundingClientRect();W=r.width;H=r.height;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
window.addEventListener('resize',resize);
function canGoLevel(n){return n>=0&&n<9&&(n===0||completedLevels.has(n)||completedLevels.has(n-1))}
function startGame(){document.getElementById('overlay').style.display='none';document.getElementById('game').style.display='block';panel.style.display='block';bar.style.display='flex';li=0;quizFeedback='';initLevel();renderPanel();renderBar();requestAnimationFrame(function(){resize();loop()})}
function goLevel(n){
  n=Math.max(0,Math.min(8,n));
  if(!canGoLevel(n)){
    quizFeedback='请先通过当前关卡的小测验，再解锁第 '+(n+1)+' 关。';
    renderPanel();
    return;
  }
  li=n;quizFeedback='';initLevel();
  if(quizPassed[n])levelObjs[n]=[true,true,true];
  renderPanel();renderBar();draw();
}
function completeObj(i){if(!levelObjs[li][i]){levelObjs[li][i]=true;renderPanel();renderBar()}}

// ===== SLIDER DRAG (lightweight update during drag) =====
function sliderDrag(id,val){
  val=parseFloat(val);levelState[id]=val;
  // Update label
  const lbl=document.getElementById('lbl-'+id);
  if(lbl){
    const fmt={x0:'x\u2006=\u2006'+val.toFixed(4),eps:'ε\u2006=\u2006'+val.toFixed(2),delta:'δ\u2006=\u2006'+val.toFixed(3),
      contX:'x\u2006=\u2006'+val.toFixed(2),contK:'k\u2006=\u2006'+val.toFixed(2),contDelta:'δ\u2006=\u2006'+val.toFixed(3),
      t:'x位置\u2006=\u2006'+(-2+4*val).toFixed(2),h:'两点间距\u2006=\u2006'+val.toFixed(2),
      ruleX:'x\u2006=\u2006'+val.toFixed(2),ruleOuter:'外层变化\u2006=\u2006'+val.toFixed(2),ruleInner:'内层变化\u2006=\u2006'+val.toFixed(2),ruleAns:'你的答案\u2006=\u2006'+val.toFixed(2),
      optX:'x\u2006=\u2006'+val.toFixed(2),boxX:'切割\u2006=\u2006'+val.toFixed(2),
      n:'矩形数 n\u2006=\u2006'+Math.round(val),predVal:'预测值\u2006=\u2006'+val.toFixed(2),
      ftcX:'x\u2006=\u2006'+val.toFixed(2),ftcPred:'预测\u2006=\u2006'+val.toFixed(2),
      terms:'多项式项数:\u2006'+Math.round(val),termsPred:'预测项数:\u2006'+Math.round(val),
      deIy:'y₀\u2006=\u2006'+val.toFixed(1)};
    if(fmt[id])lbl.textContent=fmt[id];
  }
  // Update live displays
  if(id==='x0'){
    const d=document.getElementById('fv-display');
    if(d){const fv=Math.abs(val)<1e-6?'未定义 (0÷0)':f0(val).toFixed(6);d.textContent='f('+val.toFixed(4)+') = '+fv;}
  }
  if(id==='n'||id==='contK'||id==='optX'||id==='boxX'){
    const d=document.getElementById('live-display');
    if(d&&id==='n'){const a=riemannSum(Math.round(val),levelState.method||0,levelState.intFunc||0);d.textContent='近似值: '+a.toFixed(4);}
  }
  // Check objectives
  if(id==='x0'||id==='delta')checkL0();
  if(id==='contX'||id==='contK'||id==='contDelta')checkL1();
  if(id==='t'||id==='h')checkL2();
  if(id==='ruleOuter'||id==='ruleInner'||id==='ruleX'||id==='ruleAns')checkL3();
  if(id==='optX'||id==='boxX')checkL4();
  if(id==='n')checkL5();
  if(id==='ftcX'||id==='ftcPred')checkL6();
  if(id==='terms'||id==='termsPred')checkL7();
  draw();
}

// ===== LEVELS DATA =====
const levels=[
  {title:'极限 — 逼近未知',desc:'函数 f(x) = sin(x)/x，当 x=0 时分子分母都是 0，直接算不了。<br><br>但如果 x 不等于 0，只是非常<b>接近</b> 0 呢？f(x) 会接近什么值？<br><br>👇 拖动滑块，把 x 一步步逼近 0，观察 f(x) 的变化。',
   objs:['把 x 逼近 0，发现 f(x) 趋向的那个数','揭秘：用单位圆看穿 sin(x)/x','挑战 ε-δ：用精确语言描述"逼近"']},
  {title:'连续性 — 一笔画的秘密',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>分段函数：</b><br>x &lt; 1 时，f(x) = x²<br>x = 1 时，f(x) = <span style="color:#f59e0b;font-weight:bold">k</span>　← 你控制<br>x &gt; 1 时，f(x) = 2x−1</div>右边画布中 <b style="color:#ef4444">x = 1</b> 处有个断口。<br>👇 拖动 <span style="color:#f59e0b;font-weight:bold">k</span>，把断口填上！',
   objs:['调整 k 修复断裂点','揭秘：连续性的三个条件','挑战 ε-δ 连续性验证']},
  {title:'导数与切线 — 割线的极限',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>函数：</b>f(x) = x³ − 3x</div>画布上 <b style="color:#3b82f6">蓝色曲线</b> 上有两个点，一条 <b style="color:#a78bfa">紫色直线</b> 穿过它们。<br>👇 缩小两点间距 h，看这条线会变成什么。',
   objs:['缩小 h 让两点连线逼近切线','揭秘：导数就是切线斜率','斜率匹配挑战']},
  {title:'求导法则 — 拆解变化率',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>函数：</b>f(x) = sin(x²)<br><span style="font-size:12px;opacity:0.8">外层 sin(·) 包着内层 x²</span></div>这个函数的斜率能不能拆成两层的变化率相乘？<br>👇 分别调整两层的变化率，让 <span style="color:#f59e0b">预测</span> 匹配 <span style="color:#3b82f6">实际斜率</span>。',
   objs:['分解匹配实际斜率','揭秘：链式法则与乘法法则','识别法则并计算']},
  {title:'极值与优化 — 最优解猎手',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>函数：</b>f(x) = x³ − 6x² + 9x + 1</div>这条 <b style="color:#3b82f6">蓝色曲线</b> 有山峰和山谷。<br>👇 拖动点沿曲线移动，注意切线什么时候变成水平的。',
   objs:['找到所有极值点','揭秘：二阶导判别法','开放盒子优化挑战']},
  {title:'积分与面积 — 矩形堆叠术',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>函数：</b>f(x) = sin(x)，区间 [0, π]</div><b style="color:#3b82f6">蓝色曲线</b> 和 x 轴之间围成一块面积。<br>👇 只有 2 个矩形，差得远！增加矩形数量试试。',
   objs:['增加矩形数逼近精确值','揭秘：三种方法对比','预测新函数的积分值']},
  {title:'微积分基本定理 — 微分积分的桥',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>函数：</b>f(t) = sin(t)</div>从 0 到 <span style="color:#f59e0b;font-weight:bold">x</span> 的 <b style="color:#22c55e">阴影面积</b> 随 x 变化，形成一条新曲线。<br>👇 拖动 <span style="color:#f59e0b;font-weight:bold">x</span>，观察面积增长最快在哪？开始减少是什么时候？',
   objs:['观察面积函数 F(x) 的形成','发现 F\'(x) = f(x) 的关系','验证基本定理']},
  {title:'泰勒展开 — 多项式模仿秀',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>原函数：</b><span style="color:#3b82f6">sin(x)</span>（蓝色）<br><b>模仿者：</b><span style="color:#f59e0b">多项式</span>（橙色）</div>1 项多项式只是一条直线，和原函数差得远。<br>👇 逐项添加，看 <span style="color:#f59e0b">橙色多项式</span> 如何学会模仿 <span style="color:#3b82f6">蓝色曲线</span>。',
   objs:['添加到第 5 阶观察逼近','发现收敛半径的边界','预测所需项数']},

  if(li===3){s.ruleX=1.0;s.ruleOuter=0.5;s.ruleInner=0.5;s.phase=0;s.matchCount=0;s.lastMatchX=-999;s.chainIdx=0;s.prodIdx=0;s.examplesSeen=0;s.matchRound=0;s.ruleAns=0;s.chainFuncs=[
    {label:'sin(x²)',f:function(x){return Math.sin(x*x)},fd:function(x){return Math.cos(x*x)*2*x},outer:'sin(·)',inner:'x²',outerD:"cos(·)",innerD:'2x'},
    {label:'cos(3x)',f:function(x){return Math.cos(3*x)},fd:function(x){return -3*Math.sin(3*x)},outer:'cos(·)',inner:'3x',outerD:"-sin(·)",innerD:'3'},
    {label:'e^(2x)',f:function(x){return Math.exp(2*x)},fd:function(x){return 2*Math.exp(2*x)},outer:'e^(·)',inner:'2x',outerD:"e^(·)",innerD:'2'}
  ];s.prodFuncs=[
    {label:'x·sin(x)',f:function(x){return x*Math.sin(x)},fd:function(x){return Math.sin(x)+x*Math.cos(x)},fA:'x',fB:'sin(x)',fAd:'1',fBd:'cos(x)'},
    {label:'x·eˣ',f:function(x){return x*Math.exp(x)},fd:function(x){return Math.exp(x)+x*Math.exp(x)},fA:'x',fB:'eˣ',fAd:'1',fBd:'eˣ'}
  ]}
  if(li===4){s.optX=0.0;s.phase=0;s.foundMax=false;s.foundMin=false;s.funcIdx=0;s.classified=0;s.boxX=1.0;s.boxRound=0;s.boxL=12}
  if(li===5){s.n=2;s.method=0;s.methodsSeen=new Set([0]);s.phase=0;s.intFunc=0;s.predVal=1.0;s.hasPredicted=false;s.matchRound=0}
  if(li===6){s.ftcX=0.5;s.phase=0;s.trail=[];s.func=0;s.funcsSeen=new Set([0]);s.ftcPred=0.5;s.verifyRound=0}
  if(li===7){s.func=0;s.terms=1;s.phase=0;s.funcsSeen=new Set([0]);s.boundaryFound=false;s.termsPred=3;s.predRound=0}

// ===== DOM PATCHER =====
function _patchPanel(el,html){
  var ae=document.activeElement;
  if(ae&&ae.type==='range'&&el.contains(ae)){draw();return;}
  el.innerHTML=html;
}

// ===== RENDER PANEL =====
function renderPanel(){
  const s=levelState,lv=levels[li],obs=levelObjs[li];
  // Stage nav
  let nav='<div class="stage-nav"><div class="sn-bar">';
  for(let i=0;i<9;i++){
    const cls=(completedLevels.has(i)?'done ':i===li?'cur ':'')+(canGoLevel(i)?'':'locked');
    nav+='<div class="sn-d '+cls+'" onclick="goLevel('+i+')"></div>';
  }
  nav+='</div><div class="sn-info">第 '+(li+1)+' / 9 关</div>';
  nav+='<div class="sn-hint">'+completedLevels.size+'/9 已通关，完成目标后答对测验才解锁下一关</div></div>';
  // Objectives
  let objH='';
  for(let i=0;i<3;i++){
    objH+='<div class="obj'+(obs[i]?' done':'')+'"><span class="check">'+(obs[i]?'✅':'⬜')+'</span>'+lv.objs[i]+'</div>';
  }
  // Level-specific panel
  let c='';
  // ---- L0: 极限 ----
  if(li===0){
    // x slider + f(x) display (all phases)
    c+='<div class="slider-row"><span class="sl" id="lbl-x0">x\u2006=\u2006'+s.x0.toFixed(4)+'</span><input type=range min=-4 max=4 step=0.001 value="'+s.x0+'" oninput="sliderDrag(\'x0\',this.value)" onchange="this.blur();renderPanel()"></div>';
    const fv=Math.abs(s.x0)<1e-6?'未定义 (0÷0)':f0(s.x0).toFixed(6);
    c+='<div id="fv-display" style="margin:8px 0;padding:8px 10px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-family:monospace;font-size:14px">f('+s.x0.toFixed(4)+') = '+fv+'</div>';
    // Trail table
    if(s.trail.length>0){
      c+='<div style="font-size:12px;color:var(--text-muted);margin:6px 0">逼近记录：</div>';
      c+='<div style="max-height:120px;overflow-y:auto;font-family:monospace;font-size:12px;line-height:1.8">';
      for(const tr of s.trail){
        const tc=Math.abs(tr.x)<0.1?'#f59e0b':'var(--text-muted)';
        c+='<div style="color:'+tc+'">x='+tr.x.toFixed(4)+' → f(x)='+tr.fx.toFixed(6)+'</div>';
      }
      c+='</div>';
    }
    if(s.phase===0){
      c+='<button class="act-btn" style="margin-top:6px;background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000" onclick="recordTrail()">📌 记录当前点</button>';
      c+='<div style="margin-top:10px;font-size:13px;color:#f59e0b">💡 试试把 x 移到 0.1、0.01、-0.1、-0.01…… 每次点"记录"，看看 f(x) 在逼近什么？</div>';
    }
    if(s.phase>=1&&s.phase<2){
      c+='<button class="act-btn" style="margin-top:6px;background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000" onclick="recordTrail()">📌 记录当前点</button>';
    }
    // Phase 1: reveal — unit circle squeeze
    if(s.phase>=1&&!s.revealed){
      c+='<button class="act-btn" style="margin-top:10px;background:linear-gradient(135deg,#7c3aed,#a78bfa)" onclick="levelState.revealed=true;completeObj(1);renderPanel();draw()">🔍 揭秘：为什么是这个数？</button>';
    }
    if(s.revealed){
      c+='<div class="learn-box" style="margin-top:10px">🔑 <b>单位圆夹逼揭秘</b><br><br>';
      c+='在单位圆上，角度 θ 对应：<br>';
      c+='• <b style="color:#3b82f6">弦长</b> sin(θ) &lt; <b style="color:#f59e0b">弧长</b> θ &lt; <b style="color:#ef4444">切线</b> tan(θ)<br><br>';
      c+='三边同除以 sin(θ)：<br>';
      c+='1 &lt; θ/sin(θ) &lt; 1/cos(θ)<br><br>';
      c+='取倒数（不等号翻转）：<br>';
      c+='cos(θ) &lt; <b>sin(θ)/θ</b> &lt; 1<br><br>';
      c+='当 θ→0 时，cos(θ)→1，右边也是 1。<br>';
      c+='被夹在中间的 sin(θ)/θ 只能 → <b style="color:#22c55e;font-size:18px">1</b><br><br>';

      }
    }
    // Phase 2: ε-δ challenge (3 rounds with decreasing ε)
    if(s.phase>=2){

      }else{
        c+='<div style="margin-top:4px;font-size:11px;color:var(--text-muted)">💡 把 δ 往左拉，缩小范围让 f(x) 更接近 1</div>';

// ===== MATH FUNCTIONS =====
function f0(x){return Math.abs(x)<1e-12?NaN:Math.sin(x)/x}
function f1(x){return x*x*x-3*x}
function f1d(x){return 3*x*x-3}
function f4(x){return x*x*x-6*x*x+9*x+1}
function f4d(x){return 3*x*x-12*x+9}
function f4dd(x){return 6*x-12}
function factorial(n){let r=1;for(let i=2;i<=n;i++)r*=i;return r}
function maxErrInDelta(d){
  // max |sin(x)/x - 1| for |x|<d
  let mx=0;for(let i=1;i<=100;i++){const x=d*i/100;const e=Math.abs(f0(x)-1);if(e>mx)mx=e;const x2=-d*i/100;const e2=Math.abs(f0(x2)-1);if(e2>mx)mx=e2;}return mx;
}
function contMaxErr(d){
  // max |x²-4| for |x-2|<d, i.e. x in (2-d, 2+d)
  let mx=0;for(let i=0;i<=100;i++){const x=2-d+2*d*i/100;const e=Math.abs(x*x-4);if(e>mx)mx=e;}return mx;
}
function contL1Err(d){
  // max |f(x)-1| for |x-1|<d on piecewise: x²(x<1), 2x-1(x>1), limit=1
  let mx=0;for(let i=0;i<=100;i++){const x=1-d+2*d*i/100;const fx=x<1?x*x:2*x-1;const e=Math.abs(fx-1);if(e>mx)mx=e;}return mx;
}
function riemannSum(n,method,funcIdx){
  const funcs=[
    {f:Math.sin,a:0,b:Math.PI},
    {f:function(x){return x*x},a:0,b:1},
    {f:Math.exp,a:0,b:2},
    {f:function(x){return Math.sqrt(Math.max(0,1-x*x))},a:-1,b:1}
  ];
  const fn=funcs[funcIdx]||funcs[0];
  const dx=(fn.b-fn.a)/n;
  let sum=0;
  for(let i=0;i<n;i++){
    let x;
    if(method===0)x=fn.a+i*dx; // left
    else if(method===1)x=fn.a+(i+1)*dx; // right
    else x=fn.a+(i+0.5)*dx; // mid
    sum+=fn.f(x)*dx;
  }
  return sum;
}
function ftcFunc(x,idx){
  if(idx===0)return Math.sin(x);
  if(idx===1)return x*x;
  return Math.cos(x);
}
function ftcIntegral(x,idx){
  // numerical integral from 0 to x
  const n=200;const dx=x/n;let s=0;
  for(let i=0;i<n;i++){s+=ftcFunc(i*dx+dx/2,idx)*dx;}
  return s;
}
function numDeriv(x,idx){
  const h=0.001;
  return (ftcIntegral(x+h,idx)-ftcIntegral(x-h,idx))/(2*h);
}
function taylorApprox(x,nTerms,funcIdx){
  let s=0;
  if(funcIdx===0){// sin(x)
    for(let k=0;k<nTerms;k++){s+=Math.pow(-1,k)*Math.pow(x,2*k+1)/factorial(2*k+1);}
  }else if(funcIdx===1){// cos(x)
    for(let k=0;k<nTerms;k++){s+=Math.pow(-1,k)*Math.pow(x,2*k)/factorial(2*k);}
  }else if(funcIdx===2){// e^x
    for(let k=0;k<nTerms;k++){s+=Math.pow(x,k)/factorial(k);}
  }else{// 1/(1-x)
    for(let k=0;k<nTerms;k++){s+=Math.pow(x,k);}
  }
  return s;
}
function targetFunc(x,idx){
  if(idx===0)return Math.sin(x);
  if(idx===1)return Math.cos(x);
  if(idx===2)return Math.exp(x);
  return 1/(1-x);
}
function deField(x,y,eq){
  if(eq===0)return x-y;
  if(eq===1)return Math.sin(x)*y;
  return y*(1-y);
}
function solvDE(x0,y0,eq,steps,dt){
  const pts=[{x:x0,y:y0}];
  let x=x0,y=y0;
  for(let i=0;i<steps;i++){
    const dy=deField(x,y,eq);
    y+=dy*dt;x+=dt;
    pts.push({x:x,y:y});
  }
  return pts;
}

// ===== CHECK FUNCTIONS =====
function checkL0(){
  const s=levelState;
  // Phase 0: trail中有≥2个|x|<0.1的点 → 发现极限
  if(s.phase===0){
    const close=s.trail.filter(function(t){return Math.abs(t.x)<0.1});
    if(close.length>=2){completeObj(0);s.phase=1;renderPanel()}
  }
  // Phase 2: ε-δ (3 rounds)
  if(s.phase>=2){
    const epsRounds=[0.05,0.02,0.005];
    const round=s.epsRound||0;
    const targetEps=epsRounds[Math.min(round,2)];
    const boundaryErr=Math.max(Math.abs(f0(s.delta)-1),Math.abs(f0(-s.delta)-1));
    const dOk=s.delta>0.005&&boundaryErr<targetEps;
    if(dOk&&round>=2){s.epsOk=true;completeObj(2)}
  }
}
function checkL1(){
  const s=levelState;
  if(s.phase===0&&Math.abs(s.contK-1)<0.1&&!levelObjs[li][0]){
    completeObj(0);s.phase=1;
    setTimeout(function(){renderPanel();draw();},100);
  }
  if(s.phase>=2){
    const epsList=[0.5,0.1,0.02];
    const eps=epsList[s.epsRound]||0.02;
    if(contL1Err(s.contDelta)<eps){
      s.epsRound++;
      if(s.epsRound>=3&&!levelObjs[li][2]){completeObj(2);}
      else{renderPanel();}
    }
  }
}
function checkL2(){
  const s=levelState;
  if(s.phase===0&&s.h<0.05&&!levelObjs[li][0]){
    completeObj(0);s.phase=1;renderPanel();
  }
  // Phase 1→2 由 findExtremum() 按钮触发，不在此自动跳转
  if(s.phase>=2){
    const x=-2+4*s.t;
    const targets=[{slope:0,tol:0.5},{slope:9,tol:0.3},{slope:-3,tol:0.2}];
    const tgt=targets[s.matchRound];
    if(tgt&&Math.abs(f1d(x)-tgt.slope)<tgt.tol){
      s.matchRound++;
      if(s.matchRound>=3&&!levelObjs[li][2]){completeObj(2);}
      else{renderPanel();}
    }
  }
}
function checkL3(){
  const s=levelState;
  if(s.phase===0){
    const x=s.ruleX;
    const actual=Math.cos(x*x)*2*x;
    const predicted=s.ruleOuter*s.ruleInner;
    // 相对误差<5%，且 x 与上次匹配位置距离>0.3
    if(Math.abs(actual)>0.1&&Math.abs(actual-predicted)/Math.abs(actual)<0.05){
      if(Math.abs(x-s.lastMatchX)>0.3){
        s.lastMatchX=x;s.matchCount++;
        if(s.matchCount>=2&&!levelObjs[li][0]){completeObj(0);s.phase=1;setTimeout(function(){renderPanel();draw()},100);}
      }
    }
  }
  if(s.phase>=2){
    const rounds=[{ans:-3,tol:0.5},{ans:1,tol:0.3},{ans:0,tol:0.2}];
    const rd=rounds[Math.min(s.matchRound,2)];
    if(rd&&Math.abs(s.ruleAns-rd.ans)<rd.tol){
      s.matchRound++;
      if(s.matchRound>=3&&!levelObjs[li][2]){completeObj(2);}
      else{s.ruleAns=0;renderPanel();}
    }
  }
}
function checkL4(){
  const s=levelState;
  if(s.phase===0){
    const fdx=f4d(s.optX);
    if(Math.abs(fdx)<0.3){
      if(Math.abs(s.optX-1)<0.5)s.foundMax=true;
      if(Math.abs(s.optX-3)<0.5)s.foundMin=true;
      if(s.foundMax&&s.foundMin&&!levelObjs[li][0]){completeObj(0);s.phase=1;renderPanel();}
    }
  }
  if(s.phase>=1){
    const fdx=f4d(s.optX);
    const fddx=f4dd(s.optX);
    if(Math.abs(fdx)<0.5&&Math.abs(fddx)>1){
      s.classified++;
      if(s.classified>=3&&!levelObjs[li][1]){/* wait for button click */}
    }
  }
  if(s.phase>=2){
    const L=s.boxL;
    const optX=L/6;
    const tol=[0.3,0.2,0.15][s.boxRound]||0.15;
    if(Math.abs(s.boxX-optX)<tol){
      s.boxRound++;
      if(s.boxRound>=3&&!levelObjs[li][2]){completeObj(2);}
      else{if(s.boxRound<3){s.boxL=[12,10,8][s.boxRound];s.boxX=1.0;}renderPanel();}
    }
  }
}
function checkL5(){
  const s=levelState;
  if(s.phase===0){
    const n=Math.round(s.n);
    const area=riemannSum(n,0,0);
    if(n>=30&&Math.abs(area-2)/2<0.03&&!levelObjs[li][0]){
      completeObj(0);s.phase=1;renderPanel();
    }
  }
}
function checkL6(){
  const s=levelState;
  if(s.phase===0){
    if(s.trail.length>=4&&s.ftcX>Math.PI&&!levelObjs[li][0]){
      completeObj(0);s.phase=1;renderPanel();
    }
  }
  if(s.phase>=2){
    const rounds=[{ans:1,tol:0.15},{ans:2.25,tol:0.1},{ans:0.5,tol:0.08}];
    const rd=rounds[s.verifyRound];
    if(rd&&Math.abs(s.ftcPred-rd.ans)<rd.tol){
      s.verifyRound++;
      if(s.verifyRound>=3&&!levelObjs[li][2]){completeObj(2);}
      else{s.ftcPred=0.5;renderPanel();}
    }
  }
}
function checkL7(){
  const s=levelState;
  if(s.phase===0){
    const nTerms=Math.round(s.terms);
    if(nTerms>=5){
      const err=Math.abs(Math.sin(2)-taylorApprox(2,nTerms,0));
      if(err<0.1&&!levelObjs[li][0]){completeObj(0);s.phase=1;renderPanel();}
    }
  }
  if(s.phase>=2){
    const rounds=[{func:0,x:2,target:0.1,ans:5,tol:2},
      {func:2,x:3,target:0.5,ans:8,tol:2},
      {func:1,x:Math.PI,target:0.01,ans:8,tol:2}];
    const rd=rounds[Math.min(s.predRound,2)];
    if(rd&&Math.abs(Math.round(s.termsPred)-rd.ans)<=rd.tol){
      s.predRound++;
      if(s.predRound>=3&&!levelObjs[li][2]){completeObj(2);}
      else{s.termsPred=3;renderPanel();}
    }
  }
}

// ===== ACTION FUNCTIONS =====
function recordTrail(){
  const s=levelState;
  if(Math.abs(s.x0)<1e-6)return; // can't record undefined point
  s.trail.push({x:s.x0,fx:f0(s.x0)});
  checkL0();renderPanel();draw();
}
function startEpsDelta(){
  levelState.phase=2;renderPanel();draw();
}
function recordSecant(){
  const s=levelState;
  const x=-2+4*s.t;
  s.trail.push({h:s.h,sec:((f1(x+s.h)-f1(x))/s.h),tan:f1d(x)});
  renderPanel();
}
function recordFTC(){
  const s=levelState;
  s.trail.push({x:s.ftcX,F:ftcIntegral(s.ftcX,s.func),f:ftcFunc(s.ftcX,s.func)});
  renderPanel();
}
function switchContFunc(idx){levelState.funcIdx=idx;if(idx===1)levelState.jumpFound=true;renderPanel();draw();}
function setMethod(m){
  levelState.method=m;
  levelState.methodsSeen.add(m);
  renderPanel();draw();
}
function switchFTCFunc(i){
  levelState.func=i;levelState.funcsSeen.add(i);renderPanel();draw();
}
function switchTaylorFunc(i){
  const s=levelState;s.func=i;s.funcsSeen.add(i);
  if(i===3&&Math.round(s.terms)>=5)s.boundaryFound=true;
  renderPanel();draw();
}
function switchDE(i){
  const s=levelState;s.eq=i;s.eqsSeen.add(i);s.showSolution=false;s.guessPath=[];s.guessing=false;
  renderPanel();draw();
}
function findExtremum(){
  const x=-2+4*levelState.t;
  if(Math.abs(f1d(x))<0.3){completeObj(1);levelState.phase=2;renderPanel();}
}
function showChain(i){levelState.chainIdx=i;levelState.examplesSeen++;renderPanel();draw();}
function showProd(i){levelState.prodIdx=i;levelState.examplesSeen++;renderPanel();draw();}
function submitPrediction(){
  levelState.hasPredicted=true;
  // 切换 drawL5 显示的函数
  var funcs=[{fi:1},{fi:2},{fi:3}];
  var ri=Math.min(levelState.matchRound,2);
  levelState.intFunc=funcs[ri].fi;
  renderPanel();draw();
}
function nextPredRound(){
  var s=levelState;
  s.matchRound++;
  if(s.matchRound>=3&&!levelObjs[li][2]){completeObj(2);}
  else{s.hasPredicted=false;s.predVal=0.5;s.n=2;var funcs=[1,2,3];s.intFunc=funcs[Math.min(s.matchRound,2)];renderPanel();draw();}
}
function startGuess(){levelState.guessing=true;levelState.guessPath=[];levelState.showSolution=false;renderPanel();}
function revealDE(){
  const s=levelState;s.showSolution=true;s.guessing=false;s.predictions++;
  if(s.predictions>=2&&!levelObjs[li][0]){completeObj(0);s.phase=1;}
  s.positions.add(s.iy.toFixed(1));
  renderPanel();draw();
}
function checkReverse(){
  const s=levelState;
  const rounds=[{eq:0,check:function(){const pts=solvDE(0,s.iy,0,500,0.01);const last=pts[pts.length-1];return Math.abs(last.y-4)<0.5;}},
    {eq:2,check:function(){const pts=solvDE(0,s.iy,2,300,0.01);const last=pts[pts.length-1];return last.y>0.9;}},
    {eq:1,check:function(){const pts=solvDE(0,s.iy,1,200,0.01);return pts.some(function(p){return Math.abs(p.x-2)<0.2&&Math.abs(p.y-1)<0.3;});}}];
  const rd=rounds[s.reverseRound];
  if(rd&&rd.check()){
    s.reverseRound++;
    if(s.reverseRound>=3&&!levelObjs[li][2]){completeObj(2);}
    else{renderPanel();}
  }
  draw();
}
function showResult(){
  const overlay=document.getElementById('overlay');
  overlay.style.display='flex';
  const done=levelObjs.flat().filter(Boolean).length;
  overlay.innerHTML='<h1>🎉 微积分探险完成！</h1><p>你完成了 '+done+'/27 个目标</p><div class="sub">从极限到微分方程，你已经用交互方式体验了微积分的核心概念。继续探索更深的数学世界！</div><button class="start-btn" onclick="location.reload()">重新挑战</button>';
}

// ===== COORDINATE HELPERS =====
const PAD={left:40,right:40,top:30,bottom:30};
function plotW(){return W-PAD.left-PAD.right}
function plotH(){return H-PAD.top-PAD.bottom}
function toSX(x,xMin,xMax){return PAD.left+(x-xMin)/(xMax-xMin)*plotW()}
function toSY(y,yMin,yMax){return PAD.top+plotH()-(y-yMin)/(yMax-yMin)*plotH()}
function drawGrid(xMin,xMax,yMin,yMax){
  ctx.strokeStyle=t('grid');ctx.lineWidth=0.5;
  for(let x=Math.ceil(xMin);x<=xMax;x++){const sx=toSX(x,xMin,xMax);ctx.beginPath();ctx.moveTo(sx,PAD.top);ctx.lineTo(sx,H-PAD.bottom);ctx.stroke();}
  for(let y=Math.ceil(yMin);y<=yMax;y++){const sy=toSY(y,yMin,yMax);ctx.beginPath();ctx.moveTo(PAD.left,sy);ctx.lineTo(W-PAD.right,sy);ctx.stroke();}
  // Axes
  ctx.strokeStyle=t('axis');ctx.lineWidth=1.5;
  if(xMin<=0&&xMax>=0){const ax=toSX(0,xMin,xMax);ctx.beginPath();ctx.moveTo(ax,PAD.top);ctx.lineTo(ax,H-PAD.bottom);ctx.stroke();}
  if(yMin<=0&&yMax>=0){const ay=toSY(0,yMin,yMax);ctx.beginPath();ctx.moveTo(PAD.left,ay);ctx.lineTo(W-PAD.right,ay);ctx.stroke();}
  // Labels
  ctx.font='11px monospace';ctx.fillStyle=t('label');
  for(let x=Math.ceil(xMin);x<=xMax;x++){if(x===0)continue;ctx.fillText(x,toSX(x,xMin,xMax)+2,toSY(0,yMin,yMax)+14);}
  for(let y=Math.ceil(yMin);y<=yMax;y++){if(y===0)continue;ctx.fillText(y,toSX(0,xMin,xMax)-24,toSY(y,yMin,yMax)+4);}
}
function drawCurve(fn,xMin,xMax,yMin,yMax,color,lw){
  ctx.strokeStyle=color;ctx.lineWidth=lw||2;ctx.beginPath();
  let started=false;
  const pxStart=PAD.left,pxEnd=W-PAD.right;
  for(let px=pxStart;px<=pxEnd;px+=1){
    const x=xMin+(xMax-xMin)*(px-pxStart)/(pxEnd-pxStart);
    const y=fn(x);
    if(!isFinite(y)||Math.abs(y)>100){started=false;continue;}
    const sy=toSY(y,yMin,yMax);
    if(!started){ctx.moveTo(px,sy);started=true;}else ctx.lineTo(px,sy);
  }
  ctx.stroke();
}

// ===== DRAW FUNCTIONS =====
function draw(){
  ctx.clearRect(0,0,W,H);
  if(!levelState)return;
  if(li===0)drawL0();
  else if(li===1)drawL1();
  else if(li===2)drawL2();
  else if(li===3)drawL3();
  else if(li===4)drawL4();
  else if(li===5)drawL5();
  else if(li===6)drawL6();
  else if(li===7)drawL7();
  else if(li===8)drawL8();
}

function drawL0(){
  const s=levelState;
  const xMin=-7,xMax=7,yMin=-0.5,yMax=1.5;
  drawGrid(xMin,xMax,yMin,yMax);
  // Draw f(x) = sin(x)/x with hole at x=0
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.beginPath();
  let first=true;
  const pxS=PAD.left,pxE=W-PAD.right;
  for(let px=pxS;px<=pxE;px++){
    const x=xMin+(xMax-xMin)*(px-pxS)/(pxE-pxS);
    if(Math.abs(x)<0.02)continue;
    const y=f0(x);if(!isFinite(y)||Math.abs(y)>5)continue;
    const py=toSY(y,yMin,yMax);
    if(first){ctx.moveTo(px,py);first=false}else ctx.lineTo(px,py);
  }
  ctx.stroke();
  // Hole at x=0 (open circle at y=1)
  const hx=toSX(0,xMin,xMax),hy=toSY(1,yMin,yMax);
  ctx.beginPath();ctx.arc(hx,hy,6,0,Math.PI*2);
  ctx.fillStyle=isDark?'#0a0a1a':'#f0f2f5';ctx.fill();
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.stroke();
  // Phase 1+: show unit circle squeeze diagram
  if(s.revealed){
    const cx=W-100,cy=H-100,cr=65;
    const theta=Math.max(0.15,Math.min(Math.abs(s.x0)||0.8,1.2));
    ctx.strokeStyle='rgba(100,100,120,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-cr-10,cy);ctx.lineTo(cx+cr+10,cy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy-cr-10);ctx.lineTo(cx,cy+cr+10);ctx.stroke();
    const rx=cx+cr*Math.cos(theta),ry=cy-cr*Math.sin(theta);
    ctx.strokeStyle='#94a3b8';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(rx,ry);ctx.stroke();
    // sin(theta) - blue chord
    ctx.strokeStyle='#3b82f6';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(rx,cy);ctx.lineTo(rx,ry);ctx.stroke();
    // Arc theta - green
    ctx.strokeStyle='#22c55e';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(cx,cy,cr,0,-theta,true);ctx.stroke();
    // tan(theta) - orange tangent
    const tanLen=cr*Math.tan(theta);
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(cx+cr,cy);ctx.lineTo(cx+cr,cy-tanLen);ctx.stroke();
    // Labels
    ctx.font='11px sans-serif';
    ctx.fillStyle='#3b82f6';ctx.fillText('sin θ',rx+3,cy-(cy-ry)/2);
    ctx.fillStyle='#22c55e';ctx.fillText('θ(弧)',cx+cr*0.5*Math.cos(theta/2)-10,cy-cr*0.5*Math.sin(theta/2)-8);
    ctx.fillStyle='#f59e0b';ctx.fillText('tan θ',cx+cr+4,cy-tanLen/2);
    ctx.fillStyle=isDark?'#e2e8f0':'#334155';ctx.font='bold 12px sans-serif';
    ctx.fillText('sin θ < θ < tan θ',cx-cr,cy+cr+18);
    // Filled dot at limit
    ctx.beginPath();ctx.arc(hx,hy,4,0,Math.PI*2);ctx.fillStyle='#a855f7';ctx.fill();
    // y=1 reference line
    ctx.strokeStyle='rgba(168,85,247,0.3)';ctx.lineWidth=1;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(PAD.left,hy);ctx.lineTo(W-PAD.right,hy);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#a855f7';ctx.font='13px sans-serif';
    ctx.fillText('y = 1（极限值）',PAD.left+4,hy-6);
  }
  // Phase 2: ε-δ bands
  if(s.phase>=2){
    const L=1;
    // Epsilon band (horizontal, green)
    const ey1=toSY(L+s.eps,yMin,yMax),ey2=toSY(L-s.eps,yMin,yMax);
    ctx.fillStyle='rgba(34,197,94,0.08)';
    ctx.fillRect(PAD.left,ey1,plotW(),ey2-ey1);
    ctx.strokeStyle='#22c55e';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(PAD.left,ey1);ctx.lineTo(W-PAD.right,ey1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(PAD.left,ey2);ctx.lineTo(W-PAD.right,ey2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#22c55e';ctx.font='12px sans-serif';
    ctx.fillText('1+ε='+(L+s.eps).toFixed(2),PAD.left+4,ey1-4);
    ctx.fillText('1−ε='+(L-s.eps).toFixed(2),PAD.left+4,ey2+14);
    // Delta band (vertical, blue)
    const dx1=toSX(-s.delta,xMin,xMax),dx2=toSX(s.delta,xMin,xMax);
    ctx.fillStyle='rgba(59,130,246,0.08)';
    ctx.fillRect(dx1,PAD.top,dx2-dx1,plotH());
    ctx.strokeStyle='#60a5fa';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(dx1,PAD.top);ctx.lineTo(dx1,H-PAD.bottom);ctx.stroke();
    ctx.beginPath();ctx.moveTo(dx2,PAD.top);ctx.lineTo(dx2,H-PAD.bottom);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#60a5fa';ctx.font='12px sans-serif';
    ctx.fillText('−δ',dx1-16,toSY(0,yMin,yMax)+18);
    ctx.fillText('+δ',dx2+4,toSY(0,yMin,yMax)+18);
  }
  // Current point
  if(Math.abs(s.x0)>0.02){
    const cpx=toSX(s.x0,xMin,xMax),cpy=toSY(f0(s.x0),yMin,yMax);
    ctx.beginPath();ctx.arc(cpx,cpy,6,0,Math.PI*2);ctx.fillStyle='#f59e0b';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.strokeStyle='rgba(245,158,11,0.4)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(cpx,cpy);ctx.lineTo(cpx,toSY(0,yMin,yMax));ctx.stroke();
    ctx.beginPath();ctx.moveTo(cpx,cpy);ctx.lineTo(toSX(0,xMin,xMax),cpy);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#f59e0b';ctx.font='bold 13px monospace';
    ctx.fillText(f0(s.x0).toFixed(4),cpx+10,cpy-8);
  }else{
    ctx.fillStyle='#ef4444';ctx.font='bold 20px sans-serif';
    ctx.fillText('?',hx-6,hy-12);
  }
  // Trail dots
  if(s.trail)for(const tr of s.trail){
    const tpx=toSX(tr.x,xMin,xMax),tpy=toSY(tr.fx,yMin,yMax);
    ctx.beginPath();ctx.arc(tpx,tpy,3,0,Math.PI*2);
    ctx.fillStyle='rgba(245,158,11,0.5)';ctx.fill();
  }
  // Top label
  ctx.fillStyle=isDark?'#94a3b8':'#475569';ctx.font='14px sans-serif';
  ctx.fillText('f(x) = sin(x)/x',PAD.left+4,PAD.top-8>12?PAD.top-8:24);
  if(Math.abs(s.x0)<0.02){
    ctx.fillStyle='#ef4444';ctx.fillText('x=0 → 0÷0 未定义！',PAD.left+4,PAD.top+16);
  }
}

function drawL1(){
  const xMin=-1,xMax=4,yMin=-2,yMax=5;
  const s=levelState;
  if(s.funcIdx===0){
    drawGrid(xMin,xMax,yMin,yMax);
    // Phase 0/1/2: Piecewise function x²(x<1), 2x-1(x>1)
    drawCurve(function(x){return x<0.99?x*x:NaN},xMin,xMax,yMin,yMax,'#3b82f6',2);
    drawCurve(function(x){return x>1.01?2*x-1:NaN},xMin,xMax,yMin,yMax,'#3b82f6',2);
    if(s.phase<2){
      // Open circle at (1,1) - limit point
      ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(toSX(1,xMin,xMax),toSY(1,yMin,yMax),6,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle=isDark?'#1a1a2e':'#fff';ctx.fill();
      // Solid dot at (1,k) - current f(1)
      ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(toSX(1,xMin,xMax),toSY(s.contK,yMin,yMax),6,0,Math.PI*2);ctx.fill();
      // Label
      ctx.font='13px sans-serif';ctx.fillStyle=t('text');
      ctx.fillText('f(1) = '+s.contK.toFixed(2),toSX(1.2,xMin,xMax),toSY(s.contK,yMin,yMax)-10);
      // Dashed line showing gap
      if(Math.abs(s.contK-1)>0.05){
        ctx.setLineDash([4,4]);ctx.strokeStyle='#f59e0b';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(toSX(1,xMin,xMax),toSY(s.contK,yMin,yMax));
        ctx.lineTo(toSX(1,xMin,xMax),toSY(1,yMin,yMax));ctx.stroke();ctx.setLineDash([]);
      }
    }
    // Phase 1: condition check overlay
    if(s.phase>=1&&s.phase<2){
      var bx=PAD.left+4,by=H-PAD.bottom-80,bw=170;
      ctx.fillStyle='rgba(34,197,94,0.12)';ctx.fillRect(bx,by,bw,72);
      ctx.strokeStyle='#22c55e';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,72);
      ctx.font='12px sans-serif';ctx.fillStyle='#22c55e';
      ctx.fillText('✓ f(1) 有定义',bx+8,by+18);
      ctx.fillText('✓ 极限存在 = 1',bx+8,by+38);
      ctx.fillText('✓ f(1) = 极限 → 连续!',bx+8,by+58);
    }
    // Phase 2: ε-δ verification at x=1
    if(s.phase>=2){
      // Reconnect the function (k=1 fixed)
      ctx.fillStyle='#22c55e';ctx.beginPath();ctx.arc(toSX(1,xMin,xMax),toSY(1,yMin,yMax),5,0,Math.PI*2);ctx.fill();
      var epsList=[0.5,0.1,0.02];
      var eps=epsList[s.epsRound]||0.02;
      // ε band around y=1
      ctx.fillStyle='rgba(124,58,237,0.12)';
      var epsTop=toSY(1+eps,yMin,yMax),epsBot=toSY(1-eps,yMin,yMax);
      ctx.fillRect(PAD.left,epsTop,plotW(),epsBot-epsTop);
      ctx.strokeStyle='#7c3aed';ctx.lineWidth=1;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(PAD.left,epsTop);ctx.lineTo(W-PAD.right,epsTop);ctx.stroke();
      ctx.beginPath();ctx.moveTo(PAD.left,epsBot);ctx.lineTo(W-PAD.right,epsBot);ctx.stroke();
      ctx.setLineDash([]);
      // δ band around x=1
      ctx.fillStyle='rgba(59,130,246,0.12)';
      var d1=toSX(1-s.contDelta,xMin,xMax),d2=toSX(1+s.contDelta,xMin,xMax);
      ctx.fillRect(d1,PAD.top,d2-d1,plotH());
      ctx.strokeStyle='#3b82f6';ctx.lineWidth=1;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(d1,PAD.top);ctx.lineTo(d1,H-PAD.bottom);ctx.stroke();
      ctx.beginPath();ctx.moveTo(d2,PAD.top);ctx.lineTo(d2,H-PAD.bottom);ctx.stroke();
      ctx.setLineDash([]);
      // Labels
      ctx.font='11px sans-serif';
      ctx.fillStyle='#7c3aed';ctx.fillText('ε='+eps,W-PAD.right-40,epsTop-4);
      ctx.fillStyle='#3b82f6';ctx.fillText('δ='+s.contDelta.toFixed(3),d2+4,PAD.top+16);
    }
  }else{
    // Jump discontinuity: f(x)=|x|/x
    var jxMin=-3,jxMax=3,jyMin=-2,jyMax=3;
    drawGrid(jxMin,jxMax,jyMin,jyMax);
    drawCurve(function(x){return x>0.01?1:x<-0.01?-1:NaN},jxMin,jxMax,jyMin,jyMax,'#ef4444',2);
    // Open circles at (0,1) and (0,-1)
    ctx.strokeStyle='#ef4444';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(toSX(0,jxMin,jxMax),toSY(1,jyMin,jyMax),5,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(toSX(0,jxMin,jxMax),toSY(-1,jyMin,jyMax),5,0,Math.PI*2);ctx.stroke();
    // Labels
    ctx.font='13px sans-serif';ctx.fillStyle='#ef4444';
    ctx.fillText('左极限 = −1',toSX(-2.5,jxMin,jxMax),toSY(-0.5,jyMin,jyMax));
    ctx.fillText('右极限 = +1',toSX(0.5,jxMin,jxMax),toSY(1.5,jyMin,jyMax));
    ctx.fillStyle=t('text');ctx.font='14px sans-serif';
    ctx.fillText('f(x) = |x|/x',toSX(-2.5,jxMin,jxMax),toSY(2.5,jyMin,jyMax));
    // Arrow showing gap
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(toSX(0,jxMin,jxMax),toSY(-1,jyMin,jyMax));
    ctx.lineTo(toSX(0,jxMin,jxMax),toSY(1,jyMin,jyMax));ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#f59e0b';ctx.font='12px sans-serif';
    ctx.fillText('跳跃!',toSX(0.15,jxMin,jxMax),toSY(0,jyMin,jyMax)+4);
  }
}

function drawL2(){
  const xMin=-3,xMax=3,yMin=-10,yMax=10;
  drawGrid(xMin,xMax,yMin,yMax);
  drawCurve(f1,xMin,xMax,yMin,yMax,'#3b82f6',2);
  const s=levelState;
  const x=-2+4*s.t;
  const y=f1(x);
  const y2=f1(x+s.h);
  const slope=(y2-y)/s.h;
  const tSlope=f1d(x);
  // Secant line (purple dashed)
  ctx.setLineDash([6,4]);ctx.strokeStyle='#a78bfa';ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(toSX(x-2,xMin,xMax),toSY(y-2*slope,yMin,yMax));
  ctx.lineTo(toSX(x+2,xMin,xMax),toSY(y+2*slope,yMin,yMax));
  ctx.stroke();ctx.setLineDash([]);
  // Tangent line (gold) - only in phase>=1
  if(s.phase>=1){
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.beginPath();
    ctx.moveTo(toSX(x-1.5,xMin,xMax),toSY(y-1.5*tSlope,yMin,yMax));
    ctx.lineTo(toSX(x+1.5,xMin,xMax),toSY(y+1.5*tSlope,yMin,yMax));
    ctx.stroke();
  }
  // Points P and Q
  ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(toSX(x,xMin,xMax),toSY(y,yMin,yMax),6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#a78bfa';ctx.beginPath();ctx.arc(toSX(x+s.h,xMin,xMax),toSY(y2,yMin,yMax),5,0,Math.PI*2);ctx.fill();
  // Labels
  ctx.font='12px sans-serif';ctx.fillStyle=t('text');
  ctx.fillText('P('+x.toFixed(1)+','+y.toFixed(1)+')',toSX(x,xMin,xMax)+8,toSY(y,yMin,yMax)-8);
  ctx.fillText('Q',toSX(x+s.h,xMin,xMax)+8,toSY(y2,yMin,yMax)-8);
  // Phase>=1: derivative curve
  if(s.phase>=1){
    drawCurve(f1d,xMin,xMax,yMin,yMax,'rgba(34,197,94,0.5)',1.5);
    ctx.font='11px sans-serif';ctx.fillStyle='#22c55e';
    ctx.fillText("f'(x)=3x²−3",toSX(1.5,xMin,xMax),toSY(f1d(1.5),yMin,yMax)-8);
  }
}

function drawL3(){
  const s=levelState;
  const xMin=0,xMax=3.5,yMin=-1.5,yMax=1.5;
  drawGrid(xMin,xMax,yMin,yMax);
  // Phase 1+: 显示当前选中的链式例子函数
  if(s.phase>=1&&s.chainFuncs){
    var cf=s.chainFuncs[s.chainIdx];
    drawCurve(cf.f,xMin,xMax,yMin,yMax,'#3b82f6',2);
    // 函数标签
    ctx.font='bold 13px sans-serif';ctx.fillStyle='#3b82f6';
    ctx.fillText(cf.label,toSX(0.2,xMin,xMax),toSY(1.3,yMin,yMax));
    // 导函数曲线（淡紫色）
    drawCurve(cf.fd,xMin,xMax,yMin,yMax,'rgba(124,58,237,0.5)',1.5);
    ctx.font='11px sans-serif';ctx.fillStyle='#7c3aed';
    ctx.fillText("f'(x)",toSX(2.5,xMin,xMax),toSY(cf.fd(2.5),yMin,yMax)-10);
  } else {
    drawCurve(function(x){return Math.sin(x*x)},xMin,xMax,yMin,yMax,'#3b82f6',2);
    ctx.font='bold 13px sans-serif';ctx.fillStyle='#3b82f6';
    ctx.fillText('sin(x²)',toSX(0.2,xMin,xMax),toSY(1.3,yMin,yMax));
  }
  if(s.phase===0){
    const x=s.ruleX;
    const y=Math.sin(x*x);
    const actual=Math.cos(x*x)*2*x;
    const predicted=s.ruleOuter*s.ruleInner;
    // 当前点
    const sx=toSX(x,xMin,xMax),sy=toSY(y,yMin,yMax);
    ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(sx,sy,6,0,Math.PI*2);ctx.fill();
    ctx.font='11px sans-serif';ctx.fillStyle=t('text');
    ctx.fillText('x='+x.toFixed(2),sx+10,sy-10);
    // 切线（实际斜率）
    var tLen=0.6;
    ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(toSX(x-tLen,xMin,xMax),toSY(y-actual*tLen,yMin,yMax));
    ctx.lineTo(toSX(x+tLen,xMin,xMax),toSY(y+actual*tLen,yMin,yMax));ctx.stroke();
    // 预测切线（橙色虚线）
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(toSX(x-tLen,xMin,xMax),toSY(y-predicted*tLen,yMin,yMax));
    ctx.lineTo(toSX(x+tLen,xMin,xMax),toSY(y+predicted*tLen,yMin,yMax));ctx.stroke();
    ctx.setLineDash([]);
    // 斜率对比条（底部）
    var bx=20,by=H-60,bw=W-40,bh=50;
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(bx,by,bw,bh);
    ctx.font='12px sans-serif';
    var barMax=6,barW=(bw-20)/2,barCx=bx+10+barW/2;
    // 实际（蓝）
    var aW=actual/barMax*barW/2;
    ctx.fillStyle='#3b82f6';ctx.fillRect(barCx,by+8,aW,10);
    ctx.fillStyle=t('text');ctx.textAlign='left';ctx.fillText('实际: '+actual.toFixed(3),bx+10,by+35);
    // 预测（橙）
    var pW=predicted/barMax*barW/2;
    ctx.fillStyle='#f59e0b';ctx.fillRect(barCx+barW+10,by+8,pW,10);
    ctx.fillText('预测: '+predicted.toFixed(3),barCx+barW+10,by+35);
    ctx.textAlign='start';
    // 匹配指示
    var gap=Math.abs(actual-predicted);
    if(gap<Math.abs(actual)*0.05&&Math.abs(actual)>0.1){
      ctx.fillStyle='#22c55e';ctx.font='bold 14px sans-serif';
      ctx.fillText('✓ 匹配!',bx+bw/2-20,by+35);
    }
  }
  // Phase 2: 显示当前轮次的函数曲线
  if(s.phase>=2){
    const rounds=[
      {f:function(x){return Math.cos(3*x)},fd:function(x){return -3*Math.sin(3*x)},label:'cos(3x)'},
      {f:function(x){return x*Math.exp(x)},fd:function(x){return Math.exp(x)+x*Math.exp(x)},label:'x·eˣ'},
      {f:function(x){return Math.sin(x)*Math.cos(x)},fd:function(x){return Math.cos(2*x)},label:'sin(x)cos(x)'}
    ];
    var ri=Math.min(s.matchRound,2);
    var rd=rounds[ri];
    // 清除并重绘当前轮次函数
    ctx.clearRect(0,0,W,H);drawGrid(xMin,xMax,yMin,yMax);
    drawCurve(rd.f,xMin,xMax,yMin,yMax,'#3b82f6',2);
    drawCurve(rd.fd,xMin,xMax,yMin,yMax,'rgba(124,58,237,0.5)',1.5);
    ctx.font='bold 13px sans-serif';ctx.fillStyle='#3b82f6';
    ctx.fillText(rd.label,toSX(0.2,xMin,xMax),toSY(1.3,yMin,yMax));
    ctx.font='11px sans-serif';ctx.fillStyle='#7c3aed';
    ctx.fillText("f'(x)",toSX(2.8,xMin,xMax),toSY(rd.fd(2.8),yMin,yMax)-10);
  }
}

function drawL4(){
  const s=levelState;
  if(s.phase<2){
    const xMin=-1,xMax=5,yMin=-5,yMax=10;
    drawGrid(xMin,xMax,yMin,yMax);
    drawCurve(f4,xMin,xMax,yMin,yMax,'#3b82f6',2);
    // Tangent at current x
    const x=s.optX;
    const y=f4(x);
    const dy=f4d(x);
    ctx.strokeStyle=Math.abs(dy)<0.3?'#22c55e':'#f59e0b';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(toSX(x-1,xMin,xMax),toSY(y-dy,yMin,yMax));
    ctx.lineTo(toSX(x+1,xMin,xMax),toSY(y+dy,yMin,yMax));
    ctx.stroke();
    // Point
    ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(toSX(x,xMin,xMax),toSY(y,yMin,yMax),6,0,Math.PI*2);ctx.fill();
    // Derivative gauge (right side)
    const gx=W-40,gy=H/2;
    ctx.strokeStyle=t('axis');ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(gx,gy-80);ctx.lineTo(gx,gy+80);ctx.stroke();
    // Zero mark
    ctx.strokeStyle='#22c55e';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(gx-10,gy);ctx.lineTo(gx+10,gy);ctx.stroke();
    // Needle
    const ny=gy-Math.max(-80,Math.min(80,dy*8));
    ctx.fillStyle=Math.abs(dy)<0.3?'#22c55e':'#ef4444';
    ctx.beginPath();ctx.arc(gx,ny,5,0,Math.PI*2);ctx.fill();
    ctx.font='11px sans-serif';ctx.fillStyle=t('text');
    ctx.fillText("f'(x)="+dy.toFixed(2),gx-50,ny-10);
    // Phase 1: second derivative curve
    if(s.phase>=1){
      drawCurve(f4dd,xMin,xMax,yMin,yMax,'rgba(239,68,68,0.4)',1.5);
      // Mark extrema
      [{x:1,type:'∩ 极大'},{x:3,type:'∪ 极小'}].forEach(function(p){
        ctx.font='13px sans-serif';ctx.fillStyle='#7c3aed';
        ctx.fillText(p.type,toSX(p.x,xMin,xMax)+8,toSY(f4(p.x),yMin,yMax)-12);
      });
    }
  }else{
    // Phase 2: Box optimization
    const L=s.boxL;
    const x=s.boxX;
    const vol=x*(L-2*x)*(L-2*x);
    // Left: unfolded view
    const cx=W*0.3,cy=H*0.5,sc=W*0.02;
    ctx.strokeStyle=t('axis');ctx.lineWidth=1;
    ctx.strokeRect(cx-L/2*sc,cy-L/2*sc,L*sc,L*sc);
    // Cut corners
    ctx.fillStyle='rgba(239,68,68,0.2)';
    const cs=x*sc;
    [[cx-L/2*sc,cy-L/2*sc],[cx+L/2*sc-cs,cy-L/2*sc],[cx-L/2*sc,cy+L/2*sc-cs],[cx+L/2*sc-cs,cy+L/2*sc-cs]].forEach(function(p){
      ctx.fillRect(p[0],p[1],cs,cs);
    });
    ctx.setLineDash([3,3]);ctx.strokeStyle='#ef4444';
    ctx.strokeRect(cx-L/2*sc+cs,cy-L/2*sc,L*sc-2*cs,cs);
    ctx.strokeRect(cx-L/2*sc+cs,cy+L/2*sc-cs,L*sc-2*cs,cs);
    ctx.strokeRect(cx-L/2*sc,cy-L/2*sc+cs,cs,L*sc-2*cs);
    ctx.strokeRect(cx+L/2*sc-cs,cy-L/2*sc+cs,cs,L*sc-2*cs);
    ctx.setLineDash([]);
    // Right: volume curve
    const vx=W*0.65,vw=W*0.3,vy=H*0.15,vh=H*0.7;
    ctx.strokeStyle=t('axis');ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(vx,vy+vh);ctx.lineTo(vx+vw,vy+vh);ctx.stroke();
    ctx.beginPath();ctx.moveTo(vx,vy);ctx.lineTo(vx,vy+vh);ctx.stroke();
    // V(x) curve
    const maxV=L*L*L/27*4/27;// rough scale
    ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.beginPath();
    for(let i=0;i<=100;i++){
      const xx=i/100*(L/2);
      const v=xx*(L-2*xx)*(L-2*xx);
      const px=vx+xx/(L/2)*vw;
      const py=vy+vh-v/(L*L*L/10)*vh;
      if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    ctx.stroke();
    // Current point on curve
    const cpx=vx+x/(L/2)*vw;
    const cpy=vy+vh-vol/(L*L*L/10)*vh;
    ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(cpx,cpy,6,0,Math.PI*2);ctx.fill();
    ctx.font='13px sans-serif';ctx.fillStyle=t('text');
    ctx.fillText('V='+vol.toFixed(1),cpx+8,cpy-8);
    ctx.fillText('x (切割)',vx+vw/2,vy+vh+20);
    ctx.fillText('L='+L,cx,cy-L/2*sc-8);
  }
}

function drawL5(){
  const xMin=0,xMax=Math.PI+0.3,yMin=-0.3,yMax=1.3;
  drawGrid(xMin,xMax,yMin,yMax);
  const s=levelState;
  const n=Math.round(s.n);
  const funcs=[
    {f:Math.sin,a:0,b:Math.PI},
    {f:function(x){return x*x},a:0,b:1},
    {f:Math.exp,a:0,b:2},
    {f:function(x){return Math.sqrt(Math.max(0,1-x*x))},a:-1,b:1}
  ];
  const fn=funcs[s.intFunc||0]||funcs[0];
  // Adjust view for current function
  const fxMin=fn.a-0.3,fxMax=fn.b+0.3;
  const fyMin=-0.3,fyMax=s.intFunc===2?8:1.3;
  ctx.clearRect(0,0,W,H);
  drawGrid(fxMin,fxMax,fyMin,fyMax);
  drawCurve(fn.f,fxMin,fxMax,fyMin,fyMax,'#3b82f6',2);
  // Riemann rectangles
  const dx=(fn.b-fn.a)/n;
  const colors=['rgba(239,68,68,0.3)','rgba(59,130,246,0.3)','rgba(34,197,94,0.3)'];
  ctx.fillStyle=colors[s.method||0];ctx.strokeStyle=colors[s.method||0].replace('0.3','0.7');ctx.lineWidth=1;
  for(let i=0;i<n;i++){
    let x;
    if(s.method===0)x=fn.a+i*dx;
    else if(s.method===1)x=fn.a+(i+1)*dx;
    else x=fn.a+(i+0.5)*dx;
    const h=fn.f(x);
    const rx=toSX(fn.a+i*dx,fxMin,fxMax);
    const rw=toSX(fn.a+(i+1)*dx,fxMin,fxMax)-rx;
    const ry=toSY(Math.max(0,h),fyMin,fyMax);
    const rh=toSY(0,fyMin,fyMax)-toSY(h,fyMin,fyMax);
    ctx.fillRect(rx,toSY(h,fyMin,fyMax),rw,rh);
    ctx.strokeRect(rx,toSY(h,fyMin,fyMax),rw,rh);
  }
}

function drawL6(){
  const s=levelState;
  const funcs=[Math.sin,function(x){return x*x},Math.cos];
  const fn=funcs[s.func]||Math.sin;
  const xMin=0,xMax=2*Math.PI+0.3,yMin=-2,yMax=3;
  drawGrid(xMin,xMax,yMin,yMax);
  // Original function
  drawCurve(fn,xMin,xMax,yMin,yMax,'#3b82f6',2);
  // Shaded area from 0 to x
  const x=s.ftcX;
  ctx.fillStyle='rgba(59,130,246,0.15)';ctx.beginPath();
  ctx.moveTo(toSX(0,xMin,xMax),toSY(0,yMin,yMax));
  for(let px=0;px<=x;px+=0.02){
    ctx.lineTo(toSX(px,xMin,xMax),toSY(fn(px),yMin,yMax));
  }
  ctx.lineTo(toSX(x,xMin,xMax),toSY(0,yMin,yMax));
  ctx.closePath();ctx.fill();
  // F(x) curve (building up)
  ctx.strokeStyle='#22c55e';ctx.lineWidth=2;ctx.beginPath();
  let started=false;
  for(let px=0;px<=x;px+=0.05){
    const fy=ftcIntegral(px,s.func);
    const sy=toSY(fy,yMin,yMax);
    if(!started){ctx.moveTo(toSX(px,xMin,xMax),sy);started=true;}
    else ctx.lineTo(toSX(px,xMin,xMax),sy);
  }
  ctx.stroke();
  // Labels
  ctx.font='12px sans-serif';
  ctx.fillStyle='#3b82f6';ctx.fillText('f(t)',toSX(1,xMin,xMax),toSY(fn(1),yMin,yMax)-8);
  ctx.fillStyle='#22c55e';ctx.fillText('F(x)=∫₀ˣ f(t)dt',toSX(x*0.7,xMin,xMax),toSY(ftcIntegral(x*0.7,s.func),yMin,yMax)-8);
  // Current x marker
  ctx.strokeStyle='#f59e0b';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(toSX(x,xMin,xMax),0);ctx.lineTo(toSX(x,xMin,xMax),H);ctx.stroke();
  ctx.setLineDash([]);
  // Phase 1: show F'(x)=f(x) values
  if(s.phase>=1){
    const nd=numDeriv(x,s.func);
    const fv=ftcFunc(x,s.func);
    ctx.font='14px sans-serif';ctx.fillStyle='#f59e0b';
    ctx.fillText("F'(x)="+nd.toFixed(3)+' ≈ f(x)='+fv.toFixed(3),20,30);
  }
}

function drawL7(){
  const s=levelState;
  const nTerms=Math.round(s.terms);
  const funcIdx=s.func;
  const xRange=funcIdx===3?[-0.5,2.5]:[-4,4];
  const yRange=funcIdx===2?[-1,10]:funcIdx===3?[-3,5]:[-2,2];
  drawGrid(xRange[0],xRange[1],yRange[0],yRange[1]);
  // Original function
  drawCurve(function(x){return targetFunc(x,funcIdx)},xRange[0],xRange[1],yRange[0],yRange[1],'#3b82f6',2);
  // Taylor approximation
  drawCurve(function(x){return taylorApprox(x,nTerms,funcIdx)},xRange[0],xRange[1],yRange[0],yRange[1],'#f59e0b',2);
  // Labels
  ctx.font='12px sans-serif';
  ctx.fillStyle='#3b82f6';ctx.fillText('原函数',20,20);
  ctx.fillStyle='#f59e0b';ctx.fillText('泰勒('+nTerms+'项)',20,36);
  // Phase 1: convergence radius indicator
  if(s.phase>=1&&funcIdx===3){
    ctx.strokeStyle='#ef4444';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    const bx=toSX(1,xRange[0],xRange[1]);
    ctx.beginPath();ctx.moveTo(bx,0);ctx.lineTo(bx,H);ctx.stroke();
    const bx2=toSX(-1,xRange[0],xRange[1]);
    ctx.beginPath();ctx.moveTo(bx2,0);ctx.lineTo(bx2,H);ctx.stroke();
    ctx.setLineDash([]);
    ctx.font='12px sans-serif';ctx.fillStyle='#ef4444';
    ctx.fillText('收敛半径 |x|<1',bx+4,30);
  }
}

function drawL8(){
  const s=levelState;
  const xMin=-1,xMax=6,yMin=-2,yMax=5;
  drawGrid(xMin,xMax,yMin,yMax);
  // Direction field
  const step=0.4;
  ctx.strokeStyle='rgba(100,100,200,0.4)';ctx.lineWidth=1;
  for(let x=xMin;x<=xMax;x+=step){
    for(let y=yMin;y<=yMax;y+=step){
      const dy=deField(x,y,s.eq);
      const len=0.15;
      const angle=Math.atan2(dy,1);
      const dx2=len*Math.cos(angle),dy2=len*Math.sin(angle);
      ctx.beginPath();
      ctx.moveTo(toSX(x-dx2,xMin,xMax),toSY(y-dy2,yMin,yMax));
      ctx.lineTo(toSX(x+dx2,xMin,xMax),toSY(y+dy2,yMin,yMax));
      ctx.stroke();
      // Arrow head
      const ax=toSX(x+dx2,xMin,xMax),ay=toSY(y+dy2,yMin,yMax);
      ctx.fillStyle='rgba(100,100,200,0.4)';
      ctx.beginPath();ctx.arc(ax,ay,1.5,0,Math.PI*2);ctx.fill();
    }
  }
  // Guess path (orange)
  if(s.guessPath.length>1){
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.beginPath();
    s.guessPath.forEach(function(p,i){
      if(i===0)ctx.moveTo(p.sx,p.sy);else ctx.lineTo(p.sx,p.sy);
    });
    ctx.stroke();
  }
  // Solution curve (green)
  if(s.showSolution||s.phase>=1){
    const pts=solvDE(s.ix,s.iy,s.eq,500,0.01);
    ctx.strokeStyle='#22c55e';ctx.lineWidth=2;ctx.beginPath();
    pts.forEach(function(p,i){
      const sx=toSX(p.x,xMin,xMax),sy=toSY(p.y,yMin,yMax);
      if(i===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);
    });
    ctx.stroke();
  }
  // Initial point
  ctx.fillStyle='#f59e0b';ctx.beginPath();
  ctx.arc(toSX(s.ix,xMin,xMax),toSY(s.iy,yMin,yMax),7,0,Math.PI*2);ctx.fill();
  // Equilibrium points in phase>=1
  if(s.phase>=1&&s.eq===2){
    [{y:0,label:'不稳定'},{y:1,label:'稳定'}].forEach(function(eq){
      const ey=toSY(eq.y,yMin,yMax);
      ctx.setLineDash([6,3]);ctx.strokeStyle='#7c3aed';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,ey);ctx.lineTo(W,ey);ctx.stroke();
      ctx.setLineDash([]);
      ctx.font='12px sans-serif';ctx.fillStyle='#7c3aed';
      ctx.fillText('y='+eq.y+' ('+eq.label+')',10,ey-6);
    });
  }
}

// ===== MOUSE EVENTS =====
cv.addEventListener('mousemove',function(e){
  const r=cv.getBoundingClientRect();
  mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;
  if(li===8&&levelState.guessing){
    levelState.guessPath.push({sx:mouse.x,sy:mouse.y});
    draw();
  }
});
cv.addEventListener('mousedown',function(e){mouse.down=true;});
cv.addEventListener('mouseup',function(e){mouse.down=false;});
cv.addEventListener('click',function(e){
  if(li===8&&levelState.guessing&&levelState.guessPath.length>3){
    // Each click extends the guess
  }
});

// ===== ANIMATION LOOP =====
function loop(){animId=requestAnimationFrame(loop);draw();}

// ===== INIT =====
resize();
</script>
