<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>线性代数 探险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}


body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;width:100vw}
.overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.overlay h1{font-size:48px;background:linear-gradient(135deg,#818cf8,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.overlay p{color:var(--text-muted);font-size:16px;margin-bottom:32px}
.overlay .sub{font-size:13px;color:var(--sub-color);margin-top:16px;max-width:500px;text-align:center;line-height:1.6}
.start-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;padding:14px 48px;font-size:18px;border-radius:12px;cursor:pointer;transition:transform .2s,box-shadow .2s}
.start-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(99,102,241,.4)}
.panel{position:fixed;left:0;top:0;width:320px;height:calc(100vh - 36px);background:var(--panel-bg);border-right:1px solid var(--panel-border);overflow-y:auto;padding:16px;display:none;z-index:10;padding-bottom:24px}
.panel h2{font-size:18px;color:var(--title-color);margin-bottom:4px}
.panel h3{font-size:16px;color:var(--title-color);margin:12px 0 6px}
.panel .desc{font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:12px}
.panel .obj{font-size:14px;padding:6px 10px;margin:3px 0;border-radius:6px;background:var(--concept-bg);border-left:3px solid #4b5563}
.panel .obj.done{border-left-color:#22c55e;background:var(--btn-green-bg)}
.panel .obj.done::before{content:'✓ ';color:#22c55e}
.act-btn{display:block;width:100%;padding:10px;margin-top:6px;border:none;border-radius:8px;font-size:15px;cursor:pointer;background:rgba(99,102,241,.2);color:#a78bfa;transition:background .2s}
.act-btn:hover{background:rgba(99,102,241,.35)}
.learn-box{margin-top:12px;padding:10px;background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:8px;font-size:14px;color:var(--learn-text);line-height:1.8}
.learn-box b{color:#a78bfa}
canvas{position:fixed;right:0;top:0;display:none}
.bar{position:fixed;bottom:0;left:0;right:0;height:36px;background:var(--bar-bg);border-top:1px solid var(--panel-border);display:none;align-items:center;padding:0 16px;font-size:13px;z-index:10}
.bar .prog{color:var(--text-muted);flex:1}
.bar .prog span{color:#a78bfa}
.bar-btn{background:none;border:1px solid #333;color:var(--text-muted);padding:3px 12px;border-radius:4px;cursor:pointer;margin-left:6px;font-size:12px}
.bar-btn:hover{border-color:#6366f1;color:#a78bfa}
.bar-btn.active{border-color:#6366f1;background:rgba(99,102,241,.2);color:#a78bfa}
.slider-row{display:flex;align-items:center;gap:8px;margin:4px 0;font-variant-numeric:tabular-nums}
.slider-row label{font-size:12px;color:var(--text-muted);min-width:50px}
.slider-row input[type=range]{flex:1;accent-color:#6366f1}
.slider-row .val{font-size:12px;color:#a78bfa;min-width:40px;text-align:right}
input[type=number]{background:var(--concept-bg);border:1px solid #333;color:#e2e8f0;padding:4px 8px;border-radius:4px;width:60px;font-size:13px}

.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:#aaa;font-size:12px;width:80px}
.feat .fi{font-size:26px;margin-bottom:4px}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="overlay" id="ov">
<h1>线性代数 探险</h1>
<div class="sub">涵盖向量运算、矩阵变换、高斯消元、行列式、特征值、正交投影、SVD 分解<br>拖拽交互 · 实时可视化 · 零依赖单文件</div>
<button class="start-btn" onclick="startGame()">开始探索</button>
<div class="features">
<div class="feat"><div class="fi">📐</div>向量基础</div>
<div class="feat"><div class="fi">🔄</div>矩阵变换</div>
<div class="feat"><div class="fi">📊</div>线性方程组</div>
<div class="feat"><div class="fi">🧮</div>行列式</div>
<div class="feat"><div class="fi">🎯</div>特征值</div>
<div class="feat"><div class="fi">📏</div>正交投影</div>
<div class="feat"><div class="fi">✂️</div>SVD 分解</div>
</div>
</div>
<div class="panel" id="panel"></div>
<canvas id="cv"></canvas>
<div class="bar" id="bar"></div>
<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),panel=document.getElementById('panel'),bar=document.getElementById('bar'),ov=document.getElementById('ov');
let W,H,curLevel=0,mouse={x:0,y:0,down:false,drag:null},animT=0;
let levelObjs=[[false,false,false],[false,false,false],[false,false,false],[false,false,false],[false,false,false],[false,false,false],[false,false,false]];
// ===== Level state =====
// L0: vector basics
let v0a={x:2,y:1},v0b={x:1,y:2},v0scalar=2,v0mode='add';
// L1: matrix transform
let m1=[[1,0],[0,1]],m1angle=0,m1sx=1,m1sy=1,m1shx=0;
// L2: gaussian elimination
let gm=[[2,1,5],[4,-6,2],[1,3,7]],gStep=0,gHistory=[],gAnimating=false;
// L3: determinant
let d3a={x:3,y:0},d3b={x:0,y:2};
// L4: eigenvalue
let e4=[[2,1],[1,2]],e4t=0,e4showEig=false;
// L5: orthogonal projection
let p5a={x:3,y:2},p5b={x:4,y:1},p5step=0;
// L6: SVD
let svdM=[[3,1],[1,3]],svdStep=0,svdImgMode=false,svdRank=2;

const levelNames=['向量基础','矩阵变换','线性方程组','行列式','特征值与特征向量','正交与投影','SVD 分解'];
const levelDescs=[
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>运算：</b>向量加法（平行四边形法则）/ 数乘 kv</div>探索向量的加法和数乘运算。拖动向量端点，观察运算结果的变化。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>变换：</b>旋转 R(θ) / 缩放 S / 剪切矩阵</div>通过旋转、缩放、剪切矩阵，观察 2D 图形如何被线性变换改变。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>方法：</b>高斯消元 — 行变换化为阶梯形</div>用高斯消元法求解线性方程组，观察行变换的每一步。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>概念：</b>|det(A)| = 平行四边形面积缩放因子</div>拖动两个向量，观察它们构成的平行四边形面积（行列式的绝对值）。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>公式：</b>Av = λv（特征值与特征向量）</div>观察矩阵作用下的特征向量——它们的方向不会改变，只会被拉伸。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>过程：</b>Gram-Schmidt 正交化 → 正交基</div>将一个向量投影到另一个向量上，体验 Gram-Schmidt 正交化过程。',
'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>分解：</b>A = UΣV&#7488;（SVD 奇异值分解）</div>奇异值分解将矩阵分解为旋转-缩放-旋转，观察其几何意义。'
];
const levelObjTexts=[
['拖动向量 a 使其 x>3','拖动向量 b 使加法结果长度>5','将数乘系数调到 3 并观察'],
['旋转图形 45°','将 X 缩放到 2 倍','应用剪切变换 (shx≥1)'],
['执行第一步行变换','完成消元得到阶梯形','回代求出解'],
['使平行四边形面积>8','使行列式为负值','使面积接近 0 (|det|<0.5)'],
['观察特征向量方向不变','调整矩阵使特征值分离','播放变换动画'],
['观察投影向量','完成第一步正交化','完成 Gram-Schmidt 得到正交基'],
['观察 SVD 三步分解','切换到图像压缩模式','调整秩观察压缩效果']
];
const learnTexts=[
'<b>向量</b>是有大小和方向的量。向量加法遵循平行四边形法则；数乘改变向量的长度（和可能的方向）。向量是线性代数的基本构建块。',
'<b>矩阵变换</b>将平面上的点映射到新位置。旋转矩阵保持形状不变，缩放改变大小，剪切使形状倾斜。所有线性变换都可以用矩阵表示。',
'<b>高斯消元</b>通过行变换将增广矩阵化为阶梯形，再回代求解。三种行变换：交换行、行乘常数、行加减。这是求解线性方程组的基本方法。',
'<b>行列式</b>衡量线性变换对面积/体积的缩放因子。|det|=面积缩放比，det<0 表示翻转了方向。det=0 意味着变换将空间压缩到更低维度。',
'<b>特征向量</b>是矩阵作用下方向不变的向量，对应的缩放因子就是<b>特征值</b>。Av=λv，特征值分解揭示了矩阵的本质行为。',
'<b>正交投影</b>是向量在另一方向上的"影子"。Gram-Schmidt 过程将一组线性无关向量转化为正交基，是 QR 分解的基础。',
'<b>SVD</b>（奇异值分解）将任意矩阵分解为 UΣV^T：先旋转(V^T)、再缩放(Σ)、再旋转(U)。奇异值的大小反映了各方向的重要性，可用于数据压缩和降噪。'
];

function resize(){
  W=window.innerWidth-320;H=window.innerHeight-36;
  cv.width=W;cv.height=H;
  cv.style.width=W+'px';cv.style.height=H+'px';
}
window.addEventListener('resize',resize);

function startGame(){
  ov.style.display='none';
  panel.style.display='block';
  cv.style.display='block';
  bar.style.display='flex';
  resize();
  goLevel(0);
  requestAnimationFrame(loop);
}

function goLevel(n){curLevel=n;renderPanel();renderBar();}

function renderBar(){
  const done=levelObjs[curLevel].filter(v=>v).length;
  bar.innerHTML='<span style="color:var(--text-muted)">📐 目标 '+done+'/3</span>';
}

// Lightweight DOM patcher: preserves focused range inputs during panel updates
function _patchPanel(el,html){
  var ae=document.activeElement;
  if(!ae||ae.type!=='range'||!el.contains(ae)){el.innerHTML=html;return;}
  var tmp=document.createElement('div');tmp.innerHTML=html;
  _diffNodes(el,tmp);
}
function _diffNodes(o,n){
  var oc=Array.from(o.childNodes),nc=Array.from(n.childNodes);
  var i=0;
  while(i<oc.length&&i<nc.length){
    var a=oc[i],b=nc[i];
    if(a.nodeType!==b.nodeType||a.nodeName!==b.nodeName){o.replaceChild(b.cloneNode(true),a);i++;continue;}
    if(a.nodeType===3){if(a.textContent!==b.textContent)a.textContent=b.textContent;i++;continue;}
    if(a.nodeType===1){
      if(a.tagName==='INPUT'&&a.type==='range'&&a===document.activeElement){i++;continue;}
      for(var j=0;j<b.attributes.length;j++){var at=b.attributes[j];if(a.getAttribute(at.name)!==at.value)a.setAttribute(at.name,at.value);}
      _diffNodes(a,b);
    }
    i++;
  }
  while(oc.length>nc.length)o.removeChild(o.lastChild);
  for(;i<nc.length;i++)o.appendChild(nc[i].cloneNode(true));
}

function renderPanel(){
  let li=curLevel;
  let h=`<h2>关卡 ${li+1}: ${levelNames[li]}</h2>`;
  h+=`<div class="desc">${levelDescs[li]}</div>`;
  h+=`<h3>目标</h3>`;
  for(let i=0;i<3;i++){
    h+=`<div class="obj${levelObjs[li][i]?' done':''}">${levelObjTexts[li][i]}</div>`;
  }
  // Level-specific controls
  if(li===0) h+=renderL0Controls();
  else if(li===1) h+=renderL1Controls();
  else if(li===2) h+=renderL2Controls();
  else if(li===3) h+=renderL3Controls();
  else if(li===4) h+=renderL4Controls();
  else if(li===5) h+=renderL5Controls();
  else if(li===6) h+=renderL6Controls();
  // Learn box
  if(levelObjs[li].every(v=>v)){
    h+=`<div class="learn-box">${learnTexts[li]}</div>`;
    if(li<6)h+=`<button class="act-btn" style="background:#22c55e;color:#fff;margin-top:8px" onclick="goLevel(${li+1})">下一关 →</button>`;
    if(li===6)h+=`${_summaryHTML()}`;
  }
  _patchPanel(panel,h);
  renderBar();
}

// ===== Drawing helpers =====
function ox(){return W/2}
function oy(){return H/2}
function sc(){return Math.min(W,H)/8}

function drawGrid(){
  let s=sc(),cx=ox(),cy=oy();
  ctx.strokeStyle='#1e1e3a';ctx.lineWidth=1;
  for(let i=-10;i<=10;i++){
    ctx.beginPath();ctx.moveTo(cx+i*s,0);ctx.lineTo(cx+i*s,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,cy+i*s);ctx.lineTo(W,cy+i*s);ctx.stroke();
  }
  ctx.strokeStyle='#cbd5e1';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();
  // axis labels
  ctx.fillStyle='#4b5563';ctx.font='17px sans-serif';
  ctx.fillText('x',W-15,cy-8);ctx.fillText('y',cx+8,14);
}

function drawArrow(fx,fy,tx,ty,color,lw,label){
  let s=sc(),cx=ox(),cy=oy();
  let x1=cx+fx*s,y1=cy-fy*s,x2=cx+tx*s,y2=cy-ty*s;
  let angle=Math.atan2(y2-y1,x2-x1);
  let len=Math.sqrt((x2-x1)**2+(y2-y1)**2);
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=lw||2;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  // arrowhead
  let hs=10;
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-hs*Math.cos(angle-0.4),y2-hs*Math.sin(angle-0.4));
  ctx.lineTo(x2-hs*Math.cos(angle+0.4),y2-hs*Math.sin(angle+0.4));
  ctx.closePath();ctx.fill();
  if(label){
    ctx.font='bold 13px sans-serif';
    let lx=x2+12*Math.cos(angle-0.5),ly=y2+12*Math.sin(angle-0.5);
    ctx.fillText(label,lx,ly);
  }
}

function drawDot(vx,vy,color,r){
  let s=sc(),cx=ox(),cy=oy();
  ctx.fillStyle=color;ctx.beginPath();
  ctx.arc(cx+vx*s,cy-vy*s,r||5,0,Math.PI*2);ctx.fill();
}

function screenToWorld(sx,sy){
  let s=sc(),cx=ox(),cy=oy();
  return{x:(sx-cx)/s,y:-(sy-cy)/s};
}

function worldToScreen(wx,wy){
  let s=sc(),cx=ox(),cy=oy();
  return{x:cx+wx*s,y:cy-wy*s};
}

function nearVec(mx,my,vx,vy,thresh){
  let p=worldToScreen(vx,vy);
  return Math.hypot(mx-p.x,my-p.y)<(thresh||20);
}

// ===== Level 1: Matrix Transform =====
function updateM1(){
  let c=Math.cos(m1angle),sn=Math.sin(m1angle);
  m1=[[c*m1sx+m1shx*(-sn)*m1sy, -sn*m1sy+m1shx*c*m1sx],[sn*m1sx,c*m1sy]];
  // simplified: apply rotation then scale then shear
  m1=[[m1sx*c-m1sy*sn*m1shx, -m1sy*sn],[m1sx*sn+m1sy*c*m1shx, m1sy*c]];
  // cleaner: R * S * Shear
  let sh=[[1,m1shx],[0,1]];
  let ss=[[m1sx,0],[0,m1sy]];
  let rot=[[c,-sn],[sn,c]];
  // M = R * Sh * S
  let t=matMul2(rot,matMul2(sh,ss));
  m1=t;
  checkL1();
}
function matMul2(a,b){return[[a[0][0]*b[0][0]+a[0][1]*b[1][0],a[0][0]*b[0][1]+a[0][1]*b[1][1]],[a[1][0]*b[0][0]+a[1][1]*b[1][0],a[1][0]*b[0][1]+a[1][1]*b[1][1]]];}
function renderL1Controls(){
  let h='<h3>变换参数</h3>';
  h+=`<div class="slider-row"><label>旋转</label><input type="range" min="0" max="${(Math.PI*2).toFixed(2)}" step="0.01" value="${m1angle}" oninput="m1angle=+this.value;updateM1();renderPanel()"><span class="val">${(m1angle*180/Math.PI).toFixed(0)}°</span></div>`;
  h+=`<div class="slider-row"><label>缩放X</label><input type="range" min="0.1" max="3" step="0.1" value="${m1sx}" oninput="m1sx=+this.value;updateM1();renderPanel()"><span class="val">${m1sx.toFixed(1)}</span></div>`;
  h+=`<div class="slider-row"><label>缩放Y</label><input type="range" min="0.1" max="3" step="0.1" value="${m1sy}" oninput="m1sy=+this.value;updateM1();renderPanel()"><span class="val">${m1sy.toFixed(1)}</span></div>`;
  h+=`<div class="slider-row"><label>剪切X</label><input type="range" min="-2" max="2" step="0.1" value="${m1shx}" oninput="m1shx=+this.value;updateM1();renderPanel()"><span class="val">${m1shx.toFixed(1)}</span></div>`;
  h+=`<button class="act-btn" onclick="m1angle=0;m1sx=1;m1sy=1;m1shx=0;updateM1();renderPanel()">重置</button>`;
  h+=`<div style="font-size:12px;color:var(--text-muted);margin-top:8px">矩阵 M = [${m1[0][0].toFixed(2)}, ${m1[0][1].toFixed(2)}; ${m1[1][0].toFixed(2)}, ${m1[1][1].toFixed(2)}]</div>`;
  h+=`<div style="font-size:12px;color:var(--text-muted)">det(M) = ${(m1[0][0]*m1[1][1]-m1[0][1]*m1[1][0]).toFixed(3)}</div>`;
  return h;
}
function checkL1(){
  if(Math.abs(m1angle-Math.PI/4)<0.1)levelObjs[1][0]=true;
  if(Math.abs(m1sx-2)<0.15)levelObjs[1][1]=true;
  if(m1shx>=1)levelObjs[1][2]=true;
}
function drawL1(){
  drawGrid();
  // original shape (unit square + triangle)
  let shape=[[0,0],[1,0],[1,1],[0,1]];
  let s=sc(),cx=ox(),cy=oy();
  // draw original
  ctx.strokeStyle='rgba(99,102,241,0.3)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();
  shape.forEach((p,i)=>{let x=cx+p[0]*s,y=cy-p[1]*s;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.closePath();ctx.stroke();ctx.setLineDash([]);
  // transformed shape
  let ts=shape.map(p=>({x:m1[0][0]*p[0]+m1[0][1]*p[1],y:m1[1][0]*p[0]+m1[1][1]*p[1]}));
  ctx.fillStyle='rgba(99,102,241,0.15)';ctx.strokeStyle='#a78bfa';ctx.lineWidth=2;
  ctx.beginPath();
  ts.forEach((p,i)=>{let x=cx+p.x*s,y=cy-p.y*s;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.closePath();ctx.fill();ctx.stroke();
  // basis vectors
  drawArrow(0,0,m1[0][0],m1[1][0],'#f472b6',2.5,'e₁\'');
  drawArrow(0,0,m1[0][1],m1[1][1],'#60a5fa',2.5,'e₂\'');
  // original basis (faint)
  drawArrow(0,0,1,0,'rgba(244,114,182,0.3)',1);
  drawArrow(0,0,0,1,'rgba(96,165,250,0.3)',1);
}

// ===== Level 2: Gaussian Elimination =====
function initGauss(){
  gm=[[2,1,5],[4,-6,2],[1,3,7]];gStep=0;gHistory=[JSON.parse(JSON.stringify(gm))];gAnimating=false;
}
initGauss();
function gaussOp(type,r1,r2,factor){
  let m=gm;
  if(type==='swap'){let t=m[r1];m[r1]=m[r2];m[r2]=t;}
  else if(type==='scale'){for(let j=0;j<m[r1].length;j++)m[r1][j]*=factor;}
  else if(type==='add'){for(let j=0;j<m[r1].length;j++)m[r1][j]+=factor*m[r2][j];}
  gHistory.push(JSON.parse(JSON.stringify(m)));
  gStep++;
  checkL2();
}
function renderL2Controls(){
  let h='<h3>增广矩阵</h3>';
  h+=`<div style="font-family:monospace;font-size:13px;background:var(--stage-bar);padding:8px;border-radius:6px;margin:4px 0">`;
  for(let i=0;i<3;i++){
    h+=`<div style="margin:2px 0">[`;
    for(let j=0;j<3;j++){
      let sep=j===1?' ':j===0?'':' ';
      let bar=j===2?' | ':'  ';
      h+=`${gm[i][j].toFixed(2)}${bar}`;
    }
    h+=`]</div>`;
  }
  h+=`</div>`;
  h+=`<h3>行变换操作</h3>`;
  if(gStep===0){
    h+=`<button class="act-btn" onclick="gaussOp('add',1,0,-2);renderPanel()">R2 ← R2 - 2·R1</button>`;
    h+=`<button class="act-btn" onclick="gaussOp('add',2,0,-0.5);renderPanel()">R3 ← R3 - 0.5·R1</button>`;
  }else if(gStep===1){
    h+=`<button class="act-btn" onclick="gaussOp('add',2,0,-0.5);renderPanel()">R3 ← R3 - 0.5·R1</button>`;
  }else if(gStep===2){
    h+=`<button class="act-btn" onclick="gaussOp('add',2,1,gm[2][1]/(-gm[1][1]));renderPanel()">R3 ← R3 - (${(gm[2][1]/gm[1][1]).toFixed(2)})·R2</button>`;
  }else if(gStep>=3&&!levelObjs[2][2]){
    h+=`<button class="act-btn" onclick="solveGauss();renderPanel()">回代求解</button>`;
  }
  if(gStep>0)h+=`<button class="act-btn" onclick="initGauss();renderPanel()">重置</button>`;
  if(levelObjs[2][2]){
    let x3=gm[2][2]/gm[2][1]||0;
    // back substitution display
    h+=`<div style="font-size:12px;color:#4ade80;margin-top:8px">解: x₁=${((gm[0][2]-gm[0][1]*x3)/gm[0][0]).toFixed(2)}, x₂=${x3.toFixed(2)}, x₃ 由增广列确定</div>`;
  }
  return h;
}
function solveGauss(){levelObjs[2][2]=true;}
function checkL2(){
  if(gStep>=1)levelObjs[2][0]=true;
  if(gStep>=3)levelObjs[2][1]=true;
}
function drawL2(){
  drawGrid();
  let s=sc()*0.8,cx=ox(),cy=oy();
  // Draw equations as lines
  let colors=['#a78bfa','#60a5fa','#f472b6'];
  let labels=['2x+y=5','4x-6y=2','x+3y=7'];
  let eqs=gHistory[0];// original equations
  for(let i=0;i<3;i++){
    let a=eqs[i][0],b=eqs[i][1],c=eqs[i][2];
    ctx.strokeStyle=colors[i];ctx.lineWidth=2;
    ctx.beginPath();
    if(Math.abs(b)>0.001){
      let y1=(c-a*(-6))/b,y2=(c-a*6)/b;
      ctx.moveTo(cx+(-6)*s,cy-y1*s);ctx.lineTo(cx+6*s,cy-y2*s);
    }else{
      let x=c/a;
      ctx.moveTo(cx+x*s,cy-6*s);ctx.lineTo(cx+x*s,cy+6*s);
    }
    ctx.stroke();
    ctx.fillStyle=colors[i];ctx.font='18px sans-serif';
    if(Math.abs(b)>0.001){
      let yy=(c-a*4)/b;
      ctx.fillText(labels[i],cx+4*s+5,cy-yy*s);
    }
  }
  // step indicator
  ctx.fillStyle='#475569';ctx.font='19px sans-serif';
  ctx.fillText(`消元步骤: ${gStep}/3`,20,30);
  // highlight current matrix state
  if(gStep>=3){
    ctx.fillStyle='rgba(34,197,94,0.15)';
    ctx.fillRect(cx-3*s,cy-3*s,6*s,6*s);
    // intersection point
    let sol=solveSystem(gHistory[0]);
    if(sol){
      drawDot(sol.x,sol.y,'#22c55e',8);
      ctx.fillStyle='#22c55e';ctx.font='bold 13px sans-serif';
      ctx.fillText(`解: (${sol.x.toFixed(2)}, ${sol.y.toFixed(2)})`,cx+sol.x*s+12,cy-sol.y*s-8);
    }
  }
}
function solveSystem(eq){
  // solve 2-var from first two equations for display
  let a1=eq[0][0],b1=eq[0][1],c1=eq[0][2];
  let a2=eq[1][0],b2=eq[1][1],c2=eq[1][2];
  let det=a1*b2-a2*b1;
  if(Math.abs(det)<0.001)return null;
  return{x:(c1*b2-c2*b1)/det,y:(a1*c2-a2*c1)/det};
}

// ===== Level 3: Determinant =====
function renderL3Controls(){
  let h='<h3>向量</h3>';
  let det=d3a.x*d3b.y-d3a.y*d3b.x;
  h+=`<div style="font-size:12px;color:#a78bfa;margin:4px 0">a = (${d3a.x.toFixed(1)}, ${d3a.y.toFixed(1)})</div>`;
  h+=`<div style="font-size:12px;color:var(--sv);margin:4px 0">b = (${d3b.x.toFixed(1)}, ${d3b.y.toFixed(1)})</div>`;
  h+=`<div style="font-size:14px;color:#f472b6;margin:8px 0">det = ${det.toFixed(2)}</div>`;
  h+=`<div style="font-size:14px;color:#fbbf24;margin:4px 0">|det| = 面积 = ${Math.abs(det).toFixed(2)}</div>`;
  h+=`<div style="font-size:11px;color:#4b5563;margin-top:8px">💡 拖动紫色(a)和蓝色(b)箭头端点</div>`;
  h+=`<button class="act-btn" onclick="d3a={x:3,y:0};d3b={x:0,y:2};renderPanel()">重置</button>`;

}
function checkL3(){
  let det=d3a.x*d3b.y-d3a.y*d3b.x;
  if(Math.abs(det)>8)levelObjs[3][0]=true;
  if(det<0)levelObjs[3][1]=true;
  if(Math.abs(det)<0.5)levelObjs[3][2]=true;
}
function drawL3(){
  drawGrid();
  let s=sc(),cx=ox(),cy=oy();
  // parallelogram
  ctx.fillStyle='rgba(251,191,36,0.15)';ctx.strokeStyle='rgba(251,191,36,0.4)';ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(cx+d3a.x*s,cy-d3a.y*s);
  ctx.lineTo(cx+(d3a.x+d3b.x)*s,cy-(d3a.y+d3b.y)*s);
  ctx.lineTo(cx+d3b.x*s,cy-d3b.y*s);
  ctx.closePath();ctx.fill();ctx.stroke();
  drawArrow(0,0,d3a.x,d3a.y,'#a78bfa',2.5,'a');
  drawArrow(0,0,d3b.x,d3b.y,'#60a5fa',2.5,'b');
  drawDot(d3a.x,d3a.y,'#a78bfa',6);
  drawDot(d3b.x,d3b.y,'#60a5fa',6);
  // area text
  let det=d3a.x*d3b.y-d3a.y*d3b.x;
  let mx=(d3a.x+d3b.x)/2,my=(d3a.y+d3b.y)/2;
  ctx.fillStyle='#fbbf24';ctx.font='bold 16px sans-serif';
  ctx.textAlign='center';
  ctx.fillText(`面积 = ${Math.abs(det).toFixed(2)}`,cx+mx*s,cy-my*s);
  ctx.textAlign='left';
  if(det<0){ctx.fillStyle='#f87171';ctx.font='18px sans-serif';ctx.fillText('(方向翻转, det<0)',cx+mx*s-40,cy-my*s+18);}
}

// ===== Level 4: Eigenvalues =====
function eigenCalc(m){
  let a=m[0][0],b=m[0][1],c=m[1][0],d=m[1][1];
  let tr=a+d,det=a*d-b*c;
  let disc=tr*tr-4*det;
  if(disc<0)return{l1:tr/2,l2:tr/2,v1:{x:1,y:0},v2:{x:0,y:1},complex:true};
  let l1=(tr+Math.sqrt(disc))/2,l2=(tr-Math.sqrt(disc))/2;
  let v1,v2;
  if(Math.abs(b)>0.001){v1={x:b,y:l1-a};v2={x:b,y:l2-a};}
  else if(Math.abs(c)>0.001){v1={x:l1-d,y:c};v2={x:l2-d,y:c};}
  else{v1={x:1,y:0};v2={x:0,y:1};}
  let n1=Math.hypot(v1.x,v1.y)||1,n2=Math.hypot(v2.x,v2.y)||1;
  v1={x:v1.x/n1,y:v1.y/n1};v2={x:v2.x/n2,y:v2.y/n2};
  return{l1,l2,v1,v2,complex:false};
}
function renderL4Controls(){
  let h='<h3>矩阵 A</h3>';
  h+=`<div class="slider-row"><label>a₁₁</label><input type="range" min="-3" max="3" step="0.1" value="${e4[0][0]}" oninput="e4[0][0]=+this.value;checkL4();renderPanel()"><span class="val">${e4[0][0].toFixed(1)}</span></div>`;
  h+=`<div class="slider-row"><label>a₁₂</label><input type="range" min="-3" max="3" step="0.1" value="${e4[0][1]}" oninput="e4[0][1]=+this.value;checkL4();renderPanel()"><span class="val">${e4[0][1].toFixed(1)}</span></div>`;
  h+=`<div class="slider-row"><label>a₂₁</label><input type="range" min="-3" max="3" step="0.1" value="${e4[1][0]}" oninput="e4[1][0]=+this.value;checkL4();renderPanel()"><span class="val">${e4[1][0].toFixed(1)}</span></div>`;
  h+=`<div class="slider-row"><label>a₂₂</label><input type="range" min="-3" max="3" step="0.1" value="${e4[1][1]}" oninput="e4[1][1]=+this.value;checkL4();renderPanel()"><span class="val">${e4[1][1].toFixed(1)}</span></div>`;
  let eg=eigenCalc(e4);
  h+=`<div style="font-size:12px;color:#f472b6;margin-top:8px">λ₁ = ${eg.l1.toFixed(3)}　λ₂ = ${eg.l2.toFixed(3)}</div>`;
  if(eg.complex)h+=`<div style="font-size:11px;color:#f87171">复数特征值（旋转变换）</div>`;

}

function projVec(a,b){let d=(a.x*b.x+a.y*b.y)/(b.x*b.x+b.y*b.y);return{x:d*b.x,y:d*b.y};}

    // right angle marker

    let bx=p5b.x,by=p5b.y;
    let bl=Math.hypot(bx,by)||1;bx/=bl;by/=bl;
    ctx.beginPath();
    ctx.moveTo(px+dx*sz*sc()/50,py-dy*sz*sc()/50);
    ctx.lineTo(px+dx*sz*sc()/50+bx*sz*sc()/50,py-dy*sz*sc()/50+by*sz*sc()/50);
    ctx.lineTo(px+bx*sz*sc()/50,py+by*sz*sc()/50);
    ctx.stroke();
  }
  if(p5step>=2){
    let u2={x:p5a.x-proj.x,y:p5a.y-proj.y};

  }

    let n2=Math.hypot(u2.x,u2.y)||1;
    let e1={x:p5b.x/n1*2,y:p5b.y/n1*2};
    let e2={x:u2.x/n2*2,y:u2.y/n2*2};

    drawArrow(0,0,e2.x,e2.y,'#fb923c',3,'ê₂');

}

// ===== Level 6: SVD =====
function svdCalc(m){
  // 2x2 SVD: M = U * Sigma * V^T
  let a=m[0][0],b=m[0][1],c=m[1][0],d=m[1][1];
  // M^T M
  let mtm=[[a*a+c*c,a*b+c*d],[a*b+c*d,b*b+d*d]];
  let eg=eigenCalc(mtm);
  let s1=Math.sqrt(Math.max(eg.l1,0)),s2=Math.sqrt(Math.max(eg.l2,0));
  // V = eigenvectors of M^T M
  let v1=eg.v1,v2=eg.v2;
  // ensure right-handed
  if(v1.x*v2.y-v1.y*v2.x<0){v2={x:-v2.x,y:-v2.y};}
  // U = M*V / sigma
  let u1,u2;
  if(s1>0.001){u1={x:(a*v1.x+b*v1.y)/s1,y:(c*v1.x+d*v1.y)/s1};}else{u1={x:1,y:0};}
  if(s2>0.001){u2={x:(a*v2.x+b*v2.y)/s2,y:(c*v2.x+d*v2.y)/s2};}else{u2={x:-u1.y,y:u1.x};}
  return{s1,s2,u1,u2,v1,v2};
}
function renderL6Controls(){
  let h='<h3>矩阵 M</h3>';
  h+=`<div class="slider-row"><label>m₁₁</label><input type="range" min="-4" max="4" step="0.1" value="${svdM[0][0]}" oninput="svdM[0][0]=+this.value;renderPanel()"><span class="val">${svdM[0][0].toFixed(1)}</span></div>`;
  h+=`<div class="slider-row"><label>m₁₂</label><input type="range" min="-4" max="4" step="0.1" value="${svdM[0][1]}" oninput="svdM[0][1]=+this.value;renderPanel()"><span class="val">${svdM[0][1].toFixed(1)}</span></div>`;
  h+=`<div class="slider-row"><label>m₂₁</label><input type="range" min="-4" max="4" step="0.1" value="${svdM[1][0]}" oninput="svdM[1][0]=+this.value;renderPanel()"><span class="val">${svdM[1][0].toFixed(1)}</span></div>`;
  h+=`<div class="slider-row"><label>m₂₂</label><input type="range" min="-4" max="4" step="0.1" value="${svdM[1][1]}" oninput="svdM[1][1]=+this.value;renderPanel()"><span class="val">${svdM[1][1].toFixed(1)}</span></div>`;
  let sv=svdCalc(svdM);
  h+=`<div style="font-size:12px;color:#f472b6;margin-top:6px">σ₁ = ${sv.s1.toFixed(3)}　σ₂ = ${sv.s2.toFixed(3)}</div>`;
  h+=`<h3>分解步骤</h3>`;
  h+=`<button class="act-btn ${svdStep===0?'style="background:rgba(99,102,241,.4)"':''}" onclick="svdStep=0;svdImgMode=false;levelObjs[6][0]=true;renderPanel()">几何分解 (V^T → Σ → U)</button>`;
  h+=`<button class="act-btn ${svdImgMode?'style="background:rgba(99,102,241,.4)"':''}" onclick="svdImgMode=true;levelObjs[6][1]=true;renderPanel()">图像压缩模式</button>`;
  if(svdImgMode){
    h+=`<div class="slider-row"><label>秩 k</label><input type="range" min="1" max="2" step="1" value="${svdRank}" oninput="svdRank=+this.value;levelObjs[6][2]=true;renderPanel()"><span class="val">${svdRank}</span></div>`;
    h+=`<div style="font-size:11px;color:var(--text-muted);margin-top:4px">秩 k=1: 仅保留最大奇异值，有损压缩<br>秩 k=2: 完整重建，无损</div>`;
  }
  h+=`<button class="act-btn" onclick="svdM=[[3,1],[1,3]];svdStep=0;svdImgMode=false;svdRank=2;renderPanel()">重置</button>`;
  return h;
}
function drawL6(){
  drawGrid();
  let s=sc(),cx=ox(),cy=oy();
  let sv=svdCalc(svdM);
  if(!svdImgMode){
    // Show SVD geometric decomposition
    // Step 1: V^T rotation (right singular vectors)
    let nPts=36;
    // unit circle
    ctx.strokeStyle='rgba(99,102,241,0.3)';ctx.lineWidth=1;
    ctx.beginPath();
    for(let i=0;i<=nPts;i++){let t=i/nPts*Math.PI*2;ctx.lineTo(cx+Math.cos(t)*s,cy-Math.sin(t)*s);}
    ctx.closePath();ctx.stroke();
    ctx.fillStyle='#4b5563';ctx.font='17px sans-serif';ctx.fillText('单位圆',cx+s+5,cy);
    // After V^T
    ctx.strokeStyle='#60a5fa';ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let i=0;i<=nPts;i++){
      let t=i/nPts*Math.PI*2;
      let px=Math.cos(t),py=Math.sin(t);
      // V^T * p
      let vx=sv.v1.x*px+sv.v1.y*py;
      let vy=sv.v2.x*px+sv.v2.y*py;
      ctx.lineTo(cx+vx*s,cy-vy*s);
    }
    ctx.closePath();ctx.stroke();
    // After Sigma
    ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let i=0;i<=nPts;i++){
      let t=i/nPts*Math.PI*2;
      let px=Math.cos(t),py=Math.sin(t);
      let vx=sv.v1.x*px+sv.v1.y*py;
      let vy=sv.v2.x*px+sv.v2.y*py;
      ctx.lineTo(cx+vx*sv.s1*s,cy-vy*sv.s2*s);
    }
    ctx.closePath();ctx.stroke();
    // After U (final = M applied)
    ctx.strokeStyle='#a78bfa';ctx.lineWidth=2.5;ctx.fillStyle='rgba(167,139,250,0.1)';
    ctx.beginPath();
    for(let i=0;i<=nPts;i++){
      let t=i/nPts*Math.PI*2;
      let px=Math.cos(t),py=Math.sin(t);
      let tx=svdM[0][0]*px+svdM[0][1]*py;
      let ty=svdM[1][0]*px+svdM[1][1]*py;
      ctx.lineTo(cx+tx*s,cy-ty*s);
    }
    ctx.closePath();ctx.fill();ctx.stroke();
    // Labels
    ctx.font='18px sans-serif';
    ctx.fillStyle='#60a5fa';ctx.fillText('V^T (旋转)',cx-s*2,cy-s*2.5);
    ctx.fillStyle='#fbbf24';ctx.fillText('Σ (缩放)',cx+s*0.5,cy-s*2.5);
    ctx.fillStyle='#a78bfa';ctx.fillText('U (旋转) = M',cx+s*2,cy-s*2.5);
    // singular vectors
    drawArrow(0,0,sv.v1.x*2,sv.v1.y*2,'#60a5fa',1.5,'v₁');
    drawArrow(0,0,sv.v2.x*2,sv.v2.y*2,'#38bdf8',1.5,'v₂');
    drawArrow(0,0,sv.u1.x*sv.s1*2,sv.u1.y*sv.s1*2,'#a78bfa',1.5,'σ₁u₁');
    drawArrow(0,0,sv.u2.x*sv.s2*2,sv.u2.y*sv.s2*2,'#c084fc',1.5,'σ₂u₂');
  }else{
    // Image compression demo: show a pixel grid
    let gSize=8;
    let imgData=[];
    for(let r=0;r<gSize;r++){imgData[r]=[];for(let c=0;c<gSize;c++){
      imgData[r][c]=Math.sin(r*0.5)*Math.cos(c*0.3)*0.5+0.5+Math.sin((r+c)*0.4)*0.2;
    }}
    // Simple SVD-like rank approximation visualization
    let cellSz=Math.min(W/(gSize*3+4),H/(gSize+4));
    let startX=30,startY=40;
    // Original
    ctx.fillStyle='#475569';ctx.font='19px sans-serif';
    ctx.fillText('原始矩阵',startX,startY-8);
    for(let r=0;r<gSize;r++)for(let c=0;c<gSize;c++){
      let v=Math.max(0,Math.min(1,imgData[r][c]));
      let g=Math.floor(v*255);
      ctx.fillStyle=`rgb(${Math.floor(g*0.6)},${Math.floor(g*0.4)},${g})`;
      ctx.fillRect(startX+c*cellSz,startY+r*cellSz,cellSz-1,cellSz-1);
    }
    // Rank-k approximation
    // compute simple rank-1 approx: outer product of first left/right singular vectors
    let u=[],vt=[];
    // power iteration for dominant singular vector
    let vec=[1,0,0,0,0,0,0,0];
    for(let iter=0;iter<20;iter++){
      let nv=new Array(gSize).fill(0);
      for(let i=0;i<gSize;i++)for(let j=0;j<gSize;j++)nv[i]+=imgData[i][j]*vec[j];
      let nm=Math.hypot(...nv)||1;nv=nv.map(x=>x/nm);
      let nv2=new Array(gSize).fill(0);
      for(let j=0;j<gSize;j++)for(let i=0;i<gSize;i++)nv2[j]+=imgData[i][j]*nv[i];
      let nm2=Math.hypot(...nv2)||1;
      u=nv;vt=nv2.map(x=>x/nm2);
      let sigma=nm2;
      vec=vt;
    }
    let sigma1=0;for(let i=0;i<gSize;i++)for(let j=0;j<gSize;j++)sigma1+=imgData[i][j]*u[i]*vt[j];
    // rank-1 approx
    let approx=[];
    for(let r=0;r<gSize;r++){approx[r]=[];for(let c=0;c<gSize;c++){
      if(svdRank===1)approx[r][c]=sigma1*u[r]*vt[c];
      else approx[r][c]=imgData[r][c];
    }}
    let offX=startX+(gSize+2)*cellSz;
    ctx.fillStyle='#94a3b8';ctx.fillText(`秩-${svdRank} 近似`,offX,startY-8);
    for(let r=0;r<gSize;r++)for(let c=0;c<gSize;c++){
      let v=Math.max(0,Math.min(1,approx[r][c]));
      let g=Math.floor(v*255);
      ctx.fillStyle=`rgb(${Math.floor(g*0.6)},${Math.floor(g*0.4)},${g})`;
      ctx.fillRect(offX+c*cellSz,startY+r*cellSz,cellSz-1,cellSz-1);
    }
    // Error
    let err=0;
    for(let r=0;r<gSize;r++)for(let c=0;c<gSize;c++)err+=(imgData[r][c]-approx[r][c])**2;
    err=Math.sqrt(err/(gSize*gSize));
    let offX2=offX+(gSize+2)*cellSz;
    ctx.fillStyle='#94a3b8';ctx.fillText('误差',offX2,startY-8);
    for(let r=0;r<gSize;r++)for(let c=0;c<gSize;c++){
      let v=Math.abs(imgData[r][c]-approx[r][c]);
      let g=Math.floor(Math.min(1,v*3)*255);
      ctx.fillStyle=`rgb(${g},${Math.floor(g*0.3)},${Math.floor(g*0.3)})`;
      ctx.fillRect(offX2+c*cellSz,startY+r*cellSz,cellSz-1,cellSz-1);
    }
    ctx.fillStyle='#475569';ctx.font='18px sans-serif';
    ctx.fillText(`RMSE: ${err.toFixed(4)}`,offX2,startY+gSize*cellSz+16);
    ctx.fillText(`压缩率: ${svdRank===1?'87.5%':'0%'}`,offX2,startY+gSize*cellSz+32);
  }
}

function loop(){
  ctx.clearRect(0,0,W,H);
  animT+=0.016;
  if(curLevel===0)drawL0();
  else if(curLevel===1)drawL1();
  else if(curLevel===2)drawL2();
  else if(curLevel===3)drawL3();
  else if(curLevel===4)drawL4();
  else if(curLevel===5)drawL5();
  else if(curLevel===6)drawL6();
  // cursor hint
  if(curLevel===0||curLevel===3||curLevel===5){
    ctx.fillStyle='rgba(167,139,250,0.5)';ctx.font='17px sans-serif';
    ctx.fillText('拖动彩色端点',10,H-10);
  }
  requestAnimationFrame(loop);
}

// === 总分总认知结构增强 ===
// 延迟重新渲染确保增强生效
(function(){
  // 自动检测关卡名称
  function _getNames(){
    if(typeof levelNames!=='undefined')return levelNames.slice();
    if(typeof LN!=='undefined')return LN.slice();
    if(typeof levels!=='undefined'&&Array.isArray(levels))return levels.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    if(typeof LEVELS!=='undefined'&&Array.isArray(LEVELS))return LEVELS.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    return [];
  }
  function _getTotal(){return _getNames().length||7;}
  function _getCur(){
    if(typeof currentLevel!=='undefined')return currentLevel;
    if(typeof curLevel!=='undefined')return curLevel;
    if(typeof curLv!=='undefined')return curLv;
    return 0;
  }
  function _getObjs(){
    if(typeof levelObjs!=='undefined')return levelObjs;
    return null;
  }
  function _isDone(i){
    var o=_getObjs();
    if(o&&o[i])return o[i].every(function(v){return v;});
    if(typeof completedLevels!=='undefined')return completedLevels.has(i);
    return false;
  }
  function _countDone(){
    var o=_getObjs(),d=0,t=0;
    if(o){for(var i=0;i<o.length;i++)for(var j=0;j<o[i].length;j++){t++;if(o[i][j])d++;}}
    else if(typeof completedLevels!=='undefined'){d=completedLevels.size;t=_getTotal();}
    return{done:d,total:t};
  }


  // 2. 阶段导航
  window._stageNavHTML=function(){
    var names=_getNames(),total=names.length;
    if(!total)return '';
    var cur=_getCur(),s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):0;
    var h='<div class="stage-nav"><div class="sn-bar">';
    for(var i=0;i<total;i++){
      var cls=_isDone(i)?'done':i===cur?'cur':'';
      h+='<div class="sn-d '+cls+'" onclick="typeof goLevel===\'function\'&&goLevel('+i+')"></div>';
    }
    h+='</div>';
    h+='<div class="sn-info">\u{1F4CD} \u7B2C'+(cur+1)+'/'+total+'\u5173 | \u8FDB\u5EA6 '+pct+'%</div>';

    h+='</div>';
    return h;
  };

  // 3. 通关总结
  window._summaryHTML=function(){
    var names=_getNames(),total=names.length;
    var s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):100;
    var h='<div class="summary-box">';
    h+='<div class="summary-title">\u{1F3C6} \u606D\u559C\u901A\u5173\uFF01</div>';
    h+='<div class="summary-sub">\u4F60\u5DF2\u5B8C\u6210\u5168\u90E8 '+total+' \u4E2A\u5173\u5361\u7684\u5B66\u4E60</div>';
    h+='<div class="summary-stats">';
    h+='<div class="summary-stat"><div class="num">'+total+'</div><div class="label">\u5173\u5361\u5B8C\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+s.done+'</div><div class="label">\u76EE\u6807\u8FBE\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+pct+'%</div><div class="label">\u77E5\u8BC6\u638C\u63E1</div></div>';
    h+='</div>';
    h+='<div class="summary-keys"><div style="font-weight:bold;color:#4f46e5;margin-bottom:6px">\u{1F4DA} \u5173\u952E\u77E5\u8BC6\u56DE\u987E</div>';
    for(var i=0;i<total;i++){h+='<div>\u2705 '+names[i]+'</div>';}
    h+='</div></div>';
    return h;
  };

  // 4. 增强 renderPanel - monkey-patch
  if(typeof window.renderPanel==='function'){
    var _origRP=window.renderPanel;
    window.renderPanel=function(){
      _origRP.apply(this,arguments);
      // 在 panel 顶部插入阶段导航
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
  // 也处理全局 renderPanel
  if(typeof renderPanel==='function'&&!window._rpPatched){
    window._rpPatched=true;
    var _origRP2=renderPanel;
    renderPanel=function(){
      _origRP2.apply(this,arguments);
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
})();
try{renderPanel();}catch(e){}


</script>
