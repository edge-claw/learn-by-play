<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>概率与统计 探险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}


body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;height:100vh;width:100vw}
.overlay{position:fixed;inset:0;background:var(--overlay-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center}
.overlay h1{font-size:42px;color:#10b981;margin-bottom:8px;text-shadow:0 0 30px rgba(16,185,129,0.4)}
.overlay .sub{font-size:18px;color:var(--sub-color);margin-bottom:32px}
.overlay .desc{max-width:520px;color:var(--text-muted);font-size:14px;line-height:1.8;margin-bottom:36px}
.overlay .start-btn{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;padding:14px 48px;font-size:18px;border-radius:12px;cursor:pointer;transition:all .3s}
.overlay .start-btn:hover{transform:scale(1.05);box-shadow:0 0 24px rgba(16,185,129,0.5)}
.panel{position:fixed;left:0;top:0;bottom:36px;width:320px;background:var(--panel-bg);border-right:1px solid rgba(16,185,129,0.2);overflow-y:auto;padding:16px;display:none;z-index:10;padding-bottom:24px}
.panel h2{color:var(--title-color);font-size:18px;margin-bottom:6px}
.panel .level-title{color:#6ee7b7;font-size:13px;margin-bottom:12px}
.panel .desc-text{color:var(--text-muted);font-size:13px;line-height:1.7;margin-bottom:14px}
.panel .obj-list{list-style:none;margin-bottom:14px}
.panel .obj-list li{font-size:13px;padding:4px 0;color:#cbd5e1}
.panel .obj-list li.done{color:#4ade80}
.panel .obj-list li::before{content:'○ ';color:var(--text-sub)}
.panel .obj-list li.done::before{content:'● ';color:#4ade80}
.act-btn{display:block;width:100%;padding:10px;margin-top:6px;border:1px solid rgba(16,185,129,0.4);background:rgba(16,185,129,0.1);color:#6ee7b7;border-radius:8px;cursor:pointer;font-size:15px;transition:all .2s}
.act-btn:hover{background:rgba(16,185,129,0.25)}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:8px;padding:10px;margin-top:10px;font-size:14px;color:var(--learn-text);line-height:1.8}
.learn-box b{color:#4ade80}
canvas{position:fixed;left:320px;top:0;background:var(--bg)}
.bar{position:fixed;left:0;bottom:0;right:0;height:36px;background:var(--bar-bg);border-top:1px solid rgba(16,185,129,0.2);display:none;z-index:10;padding:0 16px;align-items:center;font-size:13px}
.bar-inner{display:flex;align-items:center;height:100%;gap:8px}
.bar-btn{background:none;border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;padding:2px 12px;border-radius:4px;cursor:pointer;font-size:12px}
.bar-btn:hover{background:rgba(16,185,129,0.15)}
.bar-btn.active{background:rgba(16,185,129,0.3);color:#fff}
.bar .progress{margin-left:auto;color:var(--text-muted);font-size:12px}
.slider-row{display:flex;align-items:center;gap:8px;margin:6px 0;font-variant-numeric:tabular-nums}
.slider-row label{font-size:12px;color:var(--text-muted);min-width:60px}
.slider-row input[type=range]{flex:1;accent-color:#10b981}
.slider-row .val{font-size:12px;color:#6ee7b7;min-width:36px;text-align:right}

.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:10px 0}
.quiz-title{font-size:13px;font-weight:700;color:var(--quiz-q);margin-bottom:6px}
.quiz-q{font-size:13px;line-height:1.6;color:var(--quiz-q);margin-bottom:6px}
.quiz-opt{display:block;width:100%;text-align:left;padding:8px;margin:4px 0;border-radius:8px;border:1px solid var(--quiz-opt-border);background:var(--quiz-opt-bg);color:var(--quiz-opt-text);font-size:13px;cursor:pointer}
.quiz-opt:hover{background:var(--quiz-opt-hover)}
.quiz-feedback{border-radius:8px;padding:8px;margin:8px 0;font-size:13px;line-height:1.6}
.quiz-feedback.ok{border:1px solid #22c55e;background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-feedback.bad{border:1px solid #ef4444;background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:#aaa;font-size:12px;width:80px}
.feat .fi{font-size:26px;margin-bottom:4px}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<div class="overlay" id="overlay">
<h1>🎲 概率与统计 探险</h1>
<div class="sub">Probability & Statistics Adventure</div>
<div class="desc">
从掷骰子到回归分析，7个关卡带你探索概率与统计的核心概念。<br>
每一关都有交互式可视化，动手操作理解数学之美。
</div>
<button class="start-btn" onclick="startGame()">开始探索 →</button>
<div class="features">
<div class="feat"><div class="fi">🎲</div>古典概率</div>
<div class="feat"><div class="fi">🔗</div>条件概率</div>
<div class="feat"><div class="fi">📊</div>随机变量</div>
<div class="feat"><div class="fi">🔔</div>正态分布</div>
<div class="feat"><div class="fi">📏</div>大数定律</div>
<div class="feat"><div class="fi">🧪</div>假设检验</div>
<div class="feat"><div class="fi">📉</div>回归分析</div>
</div>
</div>
<div class="panel" id="panel"></div>
<canvas id="cv"></canvas>
<div class="bar" id="bar"><div class="bar-inner" id="barInner"></div></div>
<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const panel=document.getElementById('panel'),bar=document.getElementById('bar'),barInner=document.getElementById('barInner');
let W,H,curLevel=0,animId=null;
let levelObjs=Array.from({length:7},()=>[false,false,false]);
let levelData={};
const quizData=[
  {q:'大量重复抛硬币时，正面频率通常会怎样变化？',opts:['逐渐稳定在 0.5 附近','一定严格等于 0.5','样本越多越远离理论概率'],ans:0,ok:'对。频率会围绕理论概率波动，并随样本量增大趋于稳定。',bad:'注意是“趋近”理论概率，不是每一轮都完全相等。'},
  {q:'贝叶斯更新中，后验概率主要由什么共同决定？',opts:['先验概率和新证据的似然','只由样本大小决定','只由图表颜色决定'],ans:0,ok:'对。先验给出原始信念，似然描述证据强度，两者共同给出后验。',bad:'贝叶斯定理连接的是先验、似然和后验。'},
  {q:'二项分布 B(n,p) 适合描述什么？',opts:['n 次独立试验中的成功次数','连续身高的精确取值','两个变量的线性关系'],ans:0,ok:'对。固定次数、独立、每次成功概率相同，是二项分布的核心条件。',bad:'二项分布关注“成功次数”。'},
  {q:'中心极限定理说明了什么？',opts:['样本均值在样本量足够大时趋近正态分布','原始数据一定本来就是正态分布','样本越少越接近总体均值'],ans:0,ok:'对。即使总体不是正态，样本均值的分布也常趋近正态。',bad:'CLT 说的是样本均值的分布，不是原始数据必然正态。'},
  {q:'大数定律解释的是哪种收敛？',opts:['样本均值随样本量增大趋近总体期望','单次观测一定等于期望','p 值一定小于 0.05'],ans:0,ok:'对。样本量越大，随机波动在平均值中越被抵消。',bad:'大数定律的主角是样本均值。'},
  {q:'p 值的含义最接近哪一项？',opts:['零假设为真时，出现当前或更极端结果的概率','研究假设为真的概率','效应量的大小'],ans:0,ok:'对。p 值不是假设为真的概率，而是零假设下结果极端性的度量。',bad:'p 值总是在“零假设为真”的前提下解释。'},
  {q:'线性回归中的 R² 主要衡量什么？',opts:['模型解释因变量变异的比例','斜率一定为正的概率','离群点数量'],ans:0,ok:'对。R² 越高，线性模型解释的变异比例越大。',bad:'R² 是拟合优度指标，不是斜率概率。'}
];
let quizPassed=new Set(),quizFeedback={};

function resize(){
  W=window.innerWidth-320;H=window.innerHeight-36;
  cv.width=W;cv.height=H;cv.style.width=W+'px';cv.style.height=H+'px';
  draw();
}
window.addEventListener('resize',resize);

function startGame(){
  document.getElementById('overlay').style.display='none';
  panel.style.display='block';bar.style.display='block';
  resize();initLevel(0);renderBar();renderPanel();
}

function goLevel(n){if(n<0||n>=7)return;if(n>0&&!quizPassed.has(n-1))return;curLevel=n;initLevel(n);renderBar();renderPanel();draw();}

function completeObj(li,oi){
  if(!levelObjs[li][oi]){levelObjs[li][oi]=true;renderPanel();renderBar();}
}

function renderBar(){
  barInner.innerHTML='<span style="color:var(--text-muted)">🎲 '+levelInfo[curLevel].title+'</span>';
}
function stageNavHTML(){
  let h='<div class="stage-nav"><div class="sn-bar">';
  for(let i=0;i<7;i++){
    const unlocked=i===0||quizPassed.has(i-1);
    const cls=quizPassed.has(i)?'done':i===curLevel?'cur':unlocked?'':'locked';
    h+=`<div class="sn-d ${cls}" onclick="${unlocked?'goLevel('+i+')':''}"></div>`;
  }
  h+=`</div><div class="sn-info">第 ${curLevel+1}/7 关 — ${levelInfo[curLevel].title.replace(/^关卡\\d+: /,'')}</div>`;
  h+=`<div class="sn-hint">${quizPassed.size}/7 已通关，完成目标后答对测验才解锁下一关</div></div>`;
  return h;
}
function quizHTML(li){
  const q=quizData[li],fb=quizFeedback[li];let h='<div class="quiz-box"><div class="quiz-title">通关小测验</div>';
  h+=`<div class="quiz-q">${q.q}</div>`;
  q.opts.forEach((o,i)=>{h+=`<button class="quiz-opt" onclick="answerQuiz(${li},${i})">${o}</button>`});
  if(fb)h+=`<div class="quiz-feedback ${fb.ok?'ok':'bad'}">${fb.text}</div>`;
  h+='</div>';return h;
}
function answerQuiz(li,oi){
  if(li!==curLevel||quizPassed.has(li)||!levelObjs[li]||!levelObjs[li].every(v=>v))return;
  const q=quizData[li],ok=oi===q.ans;
  quizFeedback[li]={ok,text:ok?q.ok:q.bad};
  if(ok)quizPassed.add(li);
  renderPanel();renderBar();
}
function finalSummaryHTML(){
  if(window._summaryHTML)return window._summaryHTML();
  return '<div class="summary-box"><div class="summary-title">🏆 恭喜通关！</div><div class="summary-sub">你已完成全部 7 个关卡的学习</div><div class="summary-keys"><div>✅ 古典概率</div><div>✅ 条件概率与贝叶斯</div><div>✅ 随机变量与分布</div><div>✅ 中心极限定理</div><div>✅ 大数定律</div><div>✅ 假设检验</div><div>✅ 回归分析</div></div></div>';
}

const levelInfo=[
  {title:'关卡1: 古典概率',sub:'掷骰子与抛硬币',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>场景：</b>抛硬币 n 次，正面朝上的频率 → P = 1/2</div>通过大量模拟实验，观察频率如何趋近理论概率。',
   objs:['抛硬币 100 次，观察正面频率','掷骰子 200 次，观察各面频率','频率与理论概率误差 < 5%'],
   learn:'<b>大量重复实验</b>下，事件发生的频率会稳定在其理论概率附近。这就是频率学派对概率的定义。硬币正面概率 = 1/2，骰子每面概率 = 1/6。'},
  {title:'关卡2: 条件概率与贝叶斯',sub:'贝叶斯定理可视化',desc:'<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>公式：</b>P(A|B) = P(B|A)·P(A) / P(B)</div>拖动先验概率滑块，观察后验概率如何变化。理解 P(A|B) 的含义。',

// ===== Level 1: Classical Probability =====
let L1={coins:0,heads:0,diceRolls:0,diceCounts:[0,0,0,0,0,0],coinHist:[],diceHist:[]};
function initL1(){L1={coins:0,heads:0,diceRolls:0,diceCounts:[0,0,0,0,0,0],coinHist:[],diceHist:[]};}
function flipCoins(n){
  for(let i=0;i<n;i++){L1.coins++;if(Math.random()<0.5)L1.heads++;L1.coinHist.push(L1.heads/L1.coins);}
  if(L1.coins>=100)completeObj(0,0);
  if(Math.abs(L1.heads/L1.coins-0.5)<0.05&&L1.coins>=100)completeObj(0,2);
  renderPanel();draw();
}
function rollDice(n){
  for(let i=0;i<n;i++){L1.diceRolls++;let f=Math.floor(Math.random()*6);L1.diceCounts[f]++;
    let maxDev=0;for(let j=0;j<6;j++)maxDev=Math.max(maxDev,Math.abs(L1.diceCounts[j]/L1.diceRolls-1/6));
    L1.diceHist.push(maxDev);}
  if(L1.diceRolls>=200)completeObj(0,1);
  let maxDev=0;for(let j=0;j<6;j++)maxDev=Math.max(maxDev,Math.abs(L1.diceCounts[j]/L1.diceRolls-1/6));
  if(maxDev<0.05&&L1.diceRolls>=200)completeObj(0,2);
  renderPanel();draw();
}
// ===== Level 2: Bayes =====
let L2={prior:0.5,likelihoodPos:0.9,likelihoodNeg:0.05,adjusted:false,highLR:false,highPost:false};
function initL2(){L2={prior:0.5,likelihoodPos:0.9,likelihoodNeg:0.05,adjusted:false,highLR:false,highPost:false};}
function updateBayes(){
  let p=L2.prior,la=L2.likelihoodPos,lb=L2.likelihoodNeg;
  L2.posterior=p*la/(p*la+(1-p)*lb);
  L2.lr=la/lb;
  if(L2.adjusted)completeObj(1,0);
  if(L2.lr>3){L2.highLR=true;completeObj(1,1);}
  if(L2.posterior>0.9){L2.highPost=true;completeObj(1,2);}
  renderPanel();draw();
}
function dragBayes(el,key,fmt){
  L2[key]=el.value/100;if(key==='prior')L2.adjusted=true;
  let p=L2.prior,la=L2.likelihoodPos,lb=L2.likelihoodNeg;
  L2.posterior=p*la/(p*la+(1-p)*lb);L2.lr=la/lb;
  el.nextElementSibling.textContent=fmt==='pct'?L2[key].toFixed(2):el.value;
  draw();
}

// ===== Level 3: Distributions =====
let L3={dist:'binomial',binN:20,binP:0.5,poisLam:5,uniA:0,uniB:10,binAdj:false,poisAdj:false,compared:false};
function initL3(){L3={dist:'binomial',binN:20,binP:0.5,poisLam:5,uniA:0,uniB:10,binAdj:false,poisAdj:false,compared:false};}
function setDist(d){L3.dist=d;if(L3.binAdj&&L3.poisAdj)completeObj(2,2);renderPanel();draw();}
function updateL3(){
  if(L3.dist==='binomial')L3.binAdj=true;
  if(L3.dist==='poisson')L3.poisAdj=true;
  completeObj(2,L3.dist==='binomial'?0:L3.dist==='poisson'?1:2);
  if(L3.binAdj&&L3.poisAdj){L3.compared=true;completeObj(2,2);}
  renderPanel();draw();
}
function dragL3(el,key){
  L3[key]=key==='binP'?el.value/100:+el.value;
  el.nextElementSibling.textContent=key==='binP'?L3[key].toFixed(2):L3[key];
  draw();
}

// ===== Level 4: CLT =====
let L4={srcDist:'uniform',samples:[],sampleMeans:[],sampleSize:30,totalSamples:0,switched:false};
function initL4(){L4={srcDist:'uniform',samples:[],sampleMeans:[],sampleSize:30,totalSamples:0,switched:false};}
function sampleCLT(n){
  for(let i=0;i<n;i++){
    let s=[];for(let j=0;j<L4.sampleSize;j++){
      if(L4.srcDist==='uniform')s.push(Math.random()*10);
      else if(L4.srcDist==='exponential')s.push(-2*Math.log(Math.random()));
      else s.push(Math.random()<0.3?1:0);
    }
    let mean=s.reduce((a,b)=>a+b,0)/s.length;
    L4.sampleMeans.push(mean);L4.totalSamples++;
  }
  if(L4.totalSamples>=50)completeObj(3,0);
  if(L4.totalSamples>=200)completeObj(3,1);
  renderPanel();draw();
}
function switchSrcDist(d){L4.srcDist=d;L4.sampleMeans=[];L4.totalSamples=0;L4.switched=true;
  if(L4.switched)completeObj(3,2);renderPanel();draw();}

// ===== Level 5: Law of Large Numbers =====
let L5={values:[],runningMean:[],trueMean:3.5,n:0};
function initL5(){L5={values:[],runningMean:[],trueMean:3.5,n:0};}
function addSamplesLLN(count){
  for(let i=0;i<count;i++){
    let v=Math.floor(Math.random()*6)+1;L5.values.push(v);L5.n++;
    L5.runningMean.push(L5.values.reduce((a,b)=>a+b,0)/L5.n);
  }
  if(L5.n>=100)completeObj(4,0);
  if(L5.n>=1000)completeObj(4,1);
  if(L5.n>=5000&&Math.abs(L5.runningMean[L5.n-1]-L5.trueMean)<0.1)completeObj(4,2);
  renderPanel();draw();
}

// ===== Level 6: Hypothesis Testing =====
let L6={sampleSize:30,effectSize:0.5,alpha:0.05,simulated:false,pVal:null,power:null,adjEffect:false,sigFound:false,powerObs:false};
function initL6(){L6={sampleSize:30,effectSize:0.5,alpha:0.05,simulated:false,pVal:null,power:null,adjEffect:false,sigFound:false,powerObs:false};}
function simulateHT(){
  let n=L6.sampleSize,d=L6.effectSize;
  // simulate t-test: sample from N(d,1) vs N(0,1)
  let sum=0,sum2=0;
  for(let i=0;i<n;i++){let x=randNorm(d,1);sum+=x;sum2+=x*x;}
  let mean=sum/n,se=Math.sqrt((sum2/n-mean*mean)/(n-1))*Math.sqrt(1/n);
  let t=mean/se;
  // approximate p-value from t using normal approx
  L6.pVal=2*(1-normalCDF(Math.abs(t)));
  // power approximation
  let ncp=d*Math.sqrt(n);
  L6.power=1-normalCDF(1.96-ncp)+normalCDF(-1.96-ncp);
  L6.simulated=true;
  L6.adjEffect=true;completeObj(5,0);
  if(L6.pVal<0.05){L6.sigFound=true;completeObj(5,1);}
  if(L6.power>0.8){L6.powerObs=true;completeObj(5,2);}
  renderPanel();draw();
}
function dragHT(el,key,scale){
  L6[key]=scale?el.value/scale:+el.value;
  el.nextElementSibling.textContent=key==='effectSize'?L6[key].toFixed(2):L6[key];
  draw();
}
function randNorm(mu,sig){let u=1-Math.random(),v=1-Math.random();return mu+sig*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function normalCDF(x){let t=1/(1+0.2316419*Math.abs(x)),d=0.3989422804*Math.exp(-x*x/2),
  p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.8212560+t*1.3302744))));return x>0?1-p:p;}
function normalPDF(x){return Math.exp(-x*x/2)/Math.sqrt(2*Math.PI);}

// ===== Level 7: Regression =====
let L7={points:[],dragging:-1,slope:0,intercept:0,r2:0,addedOutlier:false};
function initL7(){
  L7.points=[];L7.dragging=-1;L7.addedOutlier=false;
  for(let i=0;i<12;i++){let x=1+i*0.8+Math.random()*0.5;let y=1+0.8*x+randNorm(0,1.2);L7.points.push({x,y});}
  calcRegression();completeObj(6,0);
}
function calcRegression(){
  let pts=L7.points,n=pts.length;if(n<2)return;
  let sx=0,sy=0,sxx=0,sxy=0;
  for(let p of pts){sx+=p.x;sy+=p.y;sxx+=p.x*p.x;sxy+=p.x*p.y;}
  L7.slope=(n*sxy-sx*sy)/(n*sxx-sx*sx);
  L7.intercept=(sy-L7.slope*sx)/n;
  let yMean=sy/n,ssTot=0,ssRes=0;
  for(let p of pts){let yHat=L7.intercept+L7.slope*p.x;ssTot+=(p.y-yMean)**2;ssRes+=(p.y-yHat)**2;}
  L7.r2=ssTot>0?1-ssRes/ssTot:0;
}
function addOutlier(){
  let maxX=Math.max(...L7.points.map(p=>p.x));
  L7.points.push({x:maxX*0.5,y:L7.intercept+L7.slope*maxX*0.5+8});
  L7.addedOutlier=true;calcRegression();completeObj(6,2);renderPanel();draw();
}

// ===== Canvas mouse for L7 =====
cv.addEventListener('mousedown',e=>{
  if(curLevel!==6)return;
  let rect=cv.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  let m=50,gw=W-100,gh=H-100;
  for(let i=0;i<L7.points.length;i++){
    let p=L7.points[i],px=m+(p.x/12)*gw,py=H-m-(p.y/15)*gh;
    if(Math.hypot(mx-px,my-py)<12){L7.dragging=i;return;}
  }
});
cv.addEventListener('mousemove',e=>{
  if(L7.dragging<0||curLevel!==6)return;
  let rect=cv.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  let m=50,gw=W-100,gh=H-100;
  L7.points[L7.dragging].x=Math.max(0.1,Math.min(12,(mx-m)/gw*12));
  L7.points[L7.dragging].y=Math.max(0,Math.min(15,(H-m-my)/gh*15));
  calcRegression();completeObj(6,1);renderPanel();draw();
});
cv.addEventListener('mouseup',()=>{L7.dragging=-1;});

function initLevel(n){
  if(n===0)initL1();else if(n===1){initL2();updateBayes();}
  else if(n===2)initL3();else if(n===3)initL4();
  else if(n===4)initL5();else if(n===5)initL6();else if(n===6)initL7();
}

// Lightweight DOM patcher: preserves focused range inputs during panel updates
function _patchPanel(el,html){
  var ae=document.activeElement;
  if(!ae||ae.type!=='range'||!el.contains(ae)){el.innerHTML=html;return;}
  var tmp=document.createElement('div');tmp.innerHTML=html;
  _diffNodes(el,tmp);
}
function _diffNodes(o,n){
  var oc=Array.from(o.childNodes),nc=Array.from(n.childNodes);
  var i=0;
  while(i<oc.length&&i<nc.length){
    var a=oc[i],b=nc[i];
    if(a.nodeType!==b.nodeType||a.nodeName!==b.nodeName){o.replaceChild(b.cloneNode(true),a);i++;continue;}
    if(a.nodeType===3){if(a.textContent!==b.textContent)a.textContent=b.textContent;i++;continue;}
    if(a.nodeType===1){
      if(a.tagName==='INPUT'&&a.type==='range'&&a===document.activeElement){i++;continue;}
      for(var j=0;j<b.attributes.length;j++){var at=b.attributes[j];if(a.getAttribute(at.name)!==at.value)a.setAttribute(at.name,at.value);}
      _diffNodes(a,b);
    }
    i++;
  }
  while(oc.length>nc.length)o.removeChild(o.lastChild);
  for(;i<nc.length;i++)o.appendChild(nc[i].cloneNode(true));
}

    h+=`<div style="margin-top:8px;font-size:12px;color:var(--text-muted)">样本量: ${L5.n} | 当前均值: ${L5.n?(L5.runningMean[L5.n-1]).toFixed(4):'-'} | 期望: ${L5.trueMean}</div>`;
  }else if(li===5){
    h+=`<div class="slider-row"><label>样本量 n</label><input type="range" min="10" max="200" value="${L6.sampleSize}" oninput="dragHT(this,'sampleSize')" onchange="this.blur();renderPanel()"><span class="val">${L6.sampleSize}</span></div>`;
    h+=`<div class="slider-row"><label>效应量 d</label><input type="range" min="0" max="200" value="${Math.round(L6.effectSize*100)}" oninput="dragHT(this,'effectSize',100)" onchange="this.blur();renderPanel()"><span class="val">${L6.effectSize.toFixed(2)}</span></div>`;
    h+=`<button class="act-btn" onclick="simulateHT()">运行检验</button>`;
    if(L6.simulated)h+=`<div style="margin-top:8px;font-size:12px;color:var(--text-muted)">p 值: ${L6.pVal.toFixed(4)} ${L6.pVal<0.05?'✓ 显著':'✗ 不显著'}<br>检验功效: ${(L6.power*100).toFixed(1)}%</div>`;
  }else if(li===6){
    h+=`<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">拖动数据点改变回归线</div>`;
    h+=`<button class="act-btn" onclick="addOutlier()">添加离群点</button>`;
    h+=`<div style="margin-top:8px;font-size:12px;color:var(--text-muted)">斜率: ${L7.slope.toFixed(3)} | 截距: ${L7.intercept.toFixed(3)}<br>R²: ${L7.r2.toFixed(4)}</div>`;
  }
  // Learn box + next level
  if(levelComplete||levelObjs[li].every(v=>v)){
    if(!quizPassed.has(li))h+=quizHTML(li);
    if(quizPassed.has(li)){
      h+=`<div class="learn-box">${info.learn}</div>`;
      if(li<6)h+=`<button class="act-btn" style="background:#22c55e;color:#fff;margin-top:8px" onclick="goLevel(${li+1})">下一关 →</button>`;
      if(li===6)h+=`${finalSummaryHTML()}`;
    }
  }
  _patchPanel(panel,h);
}

// ===== Drawing =====
function draw(){
  ctx.clearRect(0,0,W,H);
  if(curLevel===0)drawL1();
  else if(curLevel===1)drawL2();
  else if(curLevel===2)drawL3();
  else if(curLevel===3)drawL4();
  else if(curLevel===4)drawL5();
  else if(curLevel===5)drawL6();
  else if(curLevel===6)drawL7();
}

function drawAxes(m,gw,gh,xLabel,yLabel,xTicks,yTicks){
  ctx.strokeStyle='#334155';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(m,m);ctx.lineTo(m,H-m);ctx.lineTo(W-m,H-m);ctx.stroke();
  ctx.fillStyle='#475569';ctx.font='17px sans-serif';ctx.textAlign='center';
  if(xLabel)ctx.fillText(xLabel,m+gw/2,H-6);
  ctx.save();ctx.translate(14,m+gh/2);ctx.rotate(-Math.PI/2);
  if(yLabel)ctx.fillText(yLabel,0,0);ctx.restore();
  if(xTicks)for(let t of xTicks){let x=m+t.pos*gw;ctx.fillText(t.label,x,H-m+14);}
  if(yTicks)for(let t of yTicks){let y=H-m-t.pos*gh;ctx.textAlign='right';ctx.fillText(t.label,m-6,y+4);}
}

function drawL1(){
  let m=50,gw=W-100,gh=(H-120)/2;
  // Coin frequency chart
  ctx.fillStyle='#10b981';ctx.font='bold 14px sans-serif';ctx.textAlign='left';
  ctx.fillText('硬币正面频率趋势',m,30);
  if(L1.coinHist.length>1){
    ctx.strokeStyle='#10b981';ctx.lineWidth=2;ctx.beginPath();
    for(let i=0;i<L1.coinHist.length;i++){
      let x=m+i/(L1.coinHist.length-1)*gw,y=40+gh-L1.coinHist[i]*gh;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
    // theoretical line
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=1;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.moveTo(m,40+gh-0.5*gh);ctx.lineTo(m+gw,40+gh-0.5*gh);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#f59e0b';ctx.font='17px sans-serif';ctx.fillText('理论值 0.5',m+gw-60,40+gh-0.5*gh-6);
  }
  // Dice histogram
  let dy=60+gh;
  ctx.fillStyle='#10b981';ctx.font='bold 14px sans-serif';
  ctx.fillText('骰子各面频率',m,dy);
  if(L1.diceRolls>0){
    let bw=gw/8;
    for(let i=0;i<6;i++){
      let freq=L1.diceCounts[i]/L1.diceRolls;
      let bh=freq*gh*4;
      let x=m+bw+i*bw,y=dy+10+gh-bh;
      ctx.fillStyle='rgba(16,185,129,0.6)';ctx.fillRect(x,y,bw*0.7,bh);
      ctx.fillStyle='#e0e0e0';ctx.font='17px sans-serif';ctx.textAlign='center';
      ctx.fillText(''+(i+1),x+bw*0.35,dy+10+gh+14);
      ctx.fillText((freq*100).toFixed(1)+'%',x+bw*0.35,y-4);
    }
    // theoretical line
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=1;ctx.setLineDash([5,5]);
    let ty=dy+10+gh-(1/6)*gh*4;
    ctx.beginPath();ctx.moveTo(m,ty);ctx.lineTo(m+gw,ty);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#f59e0b';ctx.font='17px sans-serif';ctx.textAlign='left';
    ctx.fillText('理论值 16.7%',m+gw-80,ty-6);
  }
}

function drawL2(){
  let m=60,gw=W-120,gh=H-120;
  ctx.fillStyle='#10b981';ctx.font='bold 14px sans-serif';ctx.textAlign='left';
  ctx.fillText('贝叶斯定理可视化',m,30);
  // Draw probability bars
  let bars=[
    {label:'先验 P(A)',val:L2.prior,color:'#3b82f6'},
    {label:'P(B|A)',val:L2.likelihoodPos,color:'#f59e0b'},
    {label:'P(B|¬A)',val:L2.likelihoodNeg,color:'#ef4444'},
    {label:'后验 P(A|B)',val:L2.posterior||0,color:'#10b981'}
  ];
  let bw=gw/6,gap=bw*0.4;
  for(let i=0;i<bars.length;i++){
    let x=m+gap+i*(bw+gap),bh=bars[i].val*gh*0.8;
    let y=H-m-bh;
    ctx.fillStyle=bars[i].color+'99';ctx.fillRect(x,y,bw,bh);
    ctx.fillStyle=bars[i].color;ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText(bars[i].label,x+bw/2,H-m+18);
    ctx.fillText((bars[i].val*100).toFixed(1)+'%',x+bw/2,y-8);
  }
  // Bayes formula
  ctx.fillStyle='#475569';ctx.font='19px sans-serif';ctx.textAlign='center';
  ctx.fillText('P(A|B) = P(B|A) × P(A) / [P(B|A)×P(A) + P(B|¬A)×P(¬A)]',W/2,H-10);
  // Arrow showing update
  if(L2.posterior!==undefined){
    let x1=m+gap+0*( bw+gap)+bw/2,x2=m+gap+3*(bw+gap)+bw/2;
    let y1=H-m-L2.prior*gh*0.8-20,y2=H-m-L2.posterior*gh*0.8-20;
    ctx.strokeStyle='#4ade8088';ctx.lineWidth=2;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.setLineDash([]);
  }
}

function drawL3(){
  let m=60,gw=W-120,gh=H-120;
  ctx.fillStyle='#10b981';ctx.font='bold 14px sans-serif';ctx.textAlign='left';
  let title=L3.dist==='binomial'?`二项分布 B(${L3.binN}, ${L3.binP.toFixed(2)})`:
    L3.dist==='poisson'?`泊松分布 Poi(${L3.poisLam})`:`均匀分布 U(0, 10)`;
  ctx.fillText(title,m,30);
  let vals=[];
  if(L3.dist==='binomial'){
    for(let k=0;k<=L3.binN;k++){
      let p=binomPMF(k,L3.binN,L3.binP);vals.push({x:k,p});
    }
  }else if(L3.dist==='poisson'){
    let maxK=Math.max(20,L3.poisLam*3);
    for(let k=0;k<=maxK;k++){let p=poisPMF(k,L3.poisLam);vals.push({x:k,p});}
  }else{
    for(let k=0;k<=10;k++)vals.push({x:k,p:0.1});
  }
  let maxP=Math.max(...vals.map(v=>v.p),0.01);
  let maxX=Math.max(...vals.map(v=>v.x),1);
  let bw=Math.min(gw/(vals.length+2),30);
  for(let i=0;i<vals.length;i++){
    let x=m+20+(i/(vals.length))*gw,bh=(vals[i].p/maxP)*gh*0.85;
    let y=H-m-bh;
    ctx.fillStyle='rgba(16,185,129,0.5)';ctx.fillRect(x,y,bw*0.8,bh);
    ctx.strokeStyle='#10b981';ctx.lineWidth=1;ctx.strokeRect(x,y,bw*0.8,bh);
    if(vals.length<=25||(i%Math.ceil(vals.length/15)===0)){
      ctx.fillStyle='#475569';ctx.font='16px sans-serif';ctx.textAlign='center';
      ctx.fillText(''+vals[i].x,x+bw*0.4,H-m+14);
    }
  }
  // Mean line
  let mean=L3.dist==='binomial'?L3.binN*L3.binP:L3.dist==='poisson'?L3.poisLam:5;
  let mx=m+20+(mean/maxX)*(gw-20);
  ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(mx,40);ctx.lineTo(mx,H-m);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#f59e0b';ctx.font='17px sans-serif';ctx.textAlign='left';
  ctx.fillText('μ = '+mean.toFixed(2),mx+6,50);
}
function binomPMF(k,n,p){
  let c=0;for(let i=0;i<k;i++)c+=Math.log(n-i)-Math.log(i+1);
  return Math.exp(c+k*Math.log(p)+(n-k)*Math.log(1-p));
}
function poisPMF(k,lam){
  let logP=k*Math.log(lam)-lam;for(let i=2;i<=k;i++)logP-=Math.log(i);
  return Math.exp(logP);
}

function drawL4(){
  let m=60,gw=W-120,gh=H-120;
  ctx.fillStyle='#10b981';ctx.font='bold 14px sans-serif';ctx.textAlign='left';
  let srcName=L4.srcDist==='uniform'?'均匀':L4.srcDist==='exponential'?'指数':'伯努利';
  ctx.fillText('中心极限定理 — 源: '+srcName+' | 样本量: '+L4.totalSamples,m,30);
  if(L4.sampleMeans.length<2)return;
  // Build histogram of sample means
  let mn=Math.min(...L4.sampleMeans),mx=Math.max(...L4.sampleMeans);
  if(mx-mn<0.01){mn-=0.5;mx+=0.5;}
  let bins=25,binW=(mx-mn)/bins,counts=new Array(bins).fill(0);
  for(let v of L4.sampleMeans){let b=Math.min(bins-1,Math.floor((v-mn)/binW));counts[b]++;}
  let maxC=Math.max(...counts,1);
  let bw=gw/bins;
  for(let i=0;i<bins;i++){
    let bh=(counts[i]/maxC)*gh*0.8,x=m+i*bw,y=H-m-bh;
    ctx.fillStyle='rgba(16,185,129,0.5)';ctx.fillRect(x,y,bw-1,bh);
  }
  // Overlay normal curve
  let mean=L4.sampleMeans.reduce((a,b)=>a+b,0)/L4.sampleMeans.length;
  let variance=L4.sampleMeans.reduce((a,b)=>a+(b-mean)**2,0)/L4.sampleMeans.length;
  let sd=Math.sqrt(variance);
  if(sd>0.001){
    ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.beginPath();
    for(let i=0;i<=gw;i++){
      let xv=mn+i/gw*(mx-mn);
      let pdf=Math.exp(-((xv-mean)**2)/(2*sd*sd))/(sd*Math.sqrt(2*Math.PI));
      let maxPdf=1/(sd*Math.sqrt(2*Math.PI));
      let y=H-m-(pdf/maxPdf)*gh*0.8;
      i===0?ctx.moveTo(m+i,y):ctx.lineTo(m+i,y);
    }
    ctx.stroke();
    ctx.fillStyle='#f59e0b';ctx.font='17px sans-serif';
    ctx.fillText(`正态拟合 N(${mean.toFixed(2)}, ${sd.toFixed(3)}²)`,m+gw-200,50);
  }
  // x-axis labels
  ctx.fillStyle='#475569';ctx.font='16px sans-serif';ctx.textAlign='center';
  for(let i=0;i<=5;i++){
    let v=mn+i/5*(mx-mn);ctx.fillText(v.toFixed(2),m+i/5*gw,H-m+14);
  }
}

function drawL5(){
  let m=60,gw=W-120,gh=H-120;
  ctx.fillStyle='#10b981';ctx.font='bold 14px sans-serif';ctx.textAlign='left';
  ctx.fillText(`大数定律 — 掷骰子均值收敛 (n=${L5.n})`,m,30);
  if(L5.n<2)return;
  // Draw running mean
  ctx.strokeStyle='#10b981';ctx.lineWidth=2;ctx.beginPath();
  let step=Math.max(1,Math.floor(L5.n/gw));
  for(let i=0;i<L5.n;i+=step){
    let x=m+(i/L5.n)*gw;
    let y=H-m-((L5.runningMean[i]-1)/5)*gh;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  // True mean line
  let ty=H-m-((L5.trueMean-1)/5)*gh;
  ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(m,ty);ctx.lineTo(m+gw,ty);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#f59e0b';ctx.font='18px sans-serif';ctx.textAlign='left';
  ctx.fillText('E[X] = 3.5',m+gw-80,ty-8);
  // Confidence band
  ctx.fillStyle='rgba(16,185,129,0.08)';
  let bandH=0.1/5*gh;
  ctx.fillRect(m,ty-bandH,gw,bandH*2);
  // Axes
  ctx.fillStyle='#475569';ctx.font='16px sans-serif';ctx.textAlign='center';
  for(let i=0;i<=5;i++){
    let n2=Math.round(i/5*L5.n);ctx.fillText(''+n2,m+i/5*gw,H-m+14);
  }
  ctx.textAlign='right';
  for(let v=1;v<=6;v++){
    let y=H-m-((v-1)/5)*gh;ctx.fillText(''+v,m-8,y+4);
  }
}

function drawL6(){
  let m=60,gw=W-120,gh=H-120;
  ctx.fillStyle='#10b981';ctx.font='bold 14px sans-serif';ctx.textAlign='left';
  ctx.fillText(`假设检验 — n=${L6.sampleSize}, d=${L6.effectSize.toFixed(2)}`,m,30);
  // Draw null distribution
  let cx=m+gw/2,cy=m+gh*0.4;
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.beginPath();
  for(let i=0;i<=gw;i++){
    let z=-4+8*i/gw;
    let y=cy-normalPDF(z)*gh*1.5;
    i===0?ctx.moveTo(m+i,y):ctx.lineTo(m+i,y);
  }
  ctx.stroke();
  ctx.fillStyle='#3b82f6';ctx.font='17px sans-serif';ctx.textAlign='left';
  ctx.fillText('H₀ 分布 (μ=0)',m+10,cy-normalPDF(0)*gh*1.5-10);
  // Critical region
  let critZ=1.96;
  ctx.fillStyle='rgba(239,68,68,0.2)';
  ctx.beginPath();
  let xCrit=m+(critZ+4)/8*gw;
  ctx.moveTo(xCrit,cy);
  for(let i=Math.floor((critZ+4)/8*gw);i<=gw;i++){
    let z=-4+8*i/gw;ctx.lineTo(m+i,cy-normalPDF(z)*gh*1.5);
  }
  ctx.lineTo(m+gw,cy);ctx.closePath();ctx.fill();
  // Left tail
  ctx.beginPath();
  let xCritL=m+(-critZ+4)/8*gw;
  ctx.moveTo(m,cy);
  for(let i=0;i<=Math.floor((-critZ+4)/8*gw);i++){
    let z=-4+8*i/gw;ctx.lineTo(m+i,cy-normalPDF(z)*gh*1.5);
  }
  ctx.lineTo(xCritL,cy);ctx.closePath();ctx.fill();
  // Alternative distribution
  if(L6.simulated){
    let ncp=L6.effectSize*Math.sqrt(L6.sampleSize);
    ctx.strokeStyle='#10b981';ctx.lineWidth=2;ctx.beginPath();
    for(let i=0;i<=gw;i++){
      let z=-4+8*i/gw;
      let y=cy-normalPDF(z-ncp)*gh*1.5;
      i===0?ctx.moveTo(m+i,y):ctx.lineTo(m+i,y);
    }
    ctx.stroke();
    ctx.fillStyle='#10b981';ctx.font='17px sans-serif';
    let altPeak=m+(ncp+4)/8*gw;
    ctx.fillText(`H₁ 分布 (μ=${ncp.toFixed(1)})`,altPeak-40,cy-normalPDF(0)*gh*1.5-10);
    // Power shading
    ctx.fillStyle='rgba(16,185,129,0.15)';
    ctx.beginPath();ctx.moveTo(xCrit,cy);
    for(let i=Math.floor((critZ+4)/8*gw);i<=gw;i++){
      let z=-4+8*i/gw;ctx.lineTo(m+i,cy-normalPDF(z-ncp)*gh*1.5);
    }
    ctx.lineTo(m+gw,cy);ctx.closePath();ctx.fill();
    // p-value indicator
    if(L6.pVal!==null){
      ctx.fillStyle=L6.pVal<0.05?'#4ade80':'#ef4444';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
      ctx.fillText(`p = ${L6.pVal.toFixed(4)}`,cx,H-m-20);
      ctx.fillStyle='#475569';ctx.font='18px sans-serif';
      ctx.fillText(`功效 = ${(L6.power*100).toFixed(1)}%`,cx,H-m);
    }
  }
  // Labels
  ctx.fillStyle='#ef4444';ctx.font='16px sans-serif';ctx.textAlign='center';
  ctx.fillText('α/2 拒绝域',xCrit+30,cy+16);
  ctx.fillText('α/2 拒绝域',xCritL-30,cy+16);
  ctx.fillStyle='#475569';ctx.font='16px sans-serif';
  for(let z=-4;z<=4;z++){let x=m+(z+4)/8*gw;ctx.fillText(''+z,x,cy+30);}
}

function drawL7(){
  let m=50,gw=W-100,gh=H-100;
  ctx.fillStyle='#10b981';ctx.font='bold 14px sans-serif';ctx.textAlign='left';
  ctx.fillText(`回归分析 — y = ${L7.intercept.toFixed(2)} + ${L7.slope.toFixed(2)}x  |  R² = ${L7.r2.toFixed(4)}`,m,30);
  // Grid
  ctx.strokeStyle='#d1d5db';ctx.lineWidth=0.5;
  for(let i=0;i<=12;i++){let x=m+i/12*gw;ctx.beginPath();ctx.moveTo(x,m);ctx.lineTo(x,H-m);ctx.stroke();}
  for(let i=0;i<=15;i++){let y=H-m-i/15*gh;ctx.beginPath();ctx.moveTo(m,y);ctx.lineTo(m+gw,y);ctx.stroke();}
  // Axes labels
  ctx.fillStyle='#475569';ctx.font='16px sans-serif';ctx.textAlign='center';
  for(let i=0;i<=12;i+=2){ctx.fillText(''+i,m+i/12*gw,H-m+16);}
  ctx.textAlign='right';
  for(let i=0;i<=15;i+=3){ctx.fillText(''+i,m-8,H-m-i/15*gh+4);}
  // Regression line
  let x1=0,y1=L7.intercept,x2=12,y2=L7.intercept+L7.slope*12;
  let px1=m+(x1/12)*gw,py1=H-m-(y1/15)*gh;
  let px2=m+(x2/12)*gw,py2=H-m-(y2/15)*gh;
  ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(px1,py1);ctx.lineTo(px2,py2);ctx.stroke();
  // Residual lines and points
  for(let i=0;i<L7.points.length;i++){
    let p=L7.points[i];
    let px=m+(p.x/12)*gw,py=H-m-(p.y/15)*gh;
    let yHat=L7.intercept+L7.slope*p.x;
    let pyHat=H-m-(yHat/15)*gh;
    // Residual line
    ctx.strokeStyle='rgba(239,68,68,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px,pyHat);ctx.stroke();
    // Point
    ctx.fillStyle=i===L7.dragging?'#f59e0b':'#10b981';
    ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
  }
}

// 延迟重新渲染确保增强生效
(function(){
  // 自动检测关卡名称
  function _getNames(){
    if(typeof levelNames!=='undefined')return levelNames.slice();
    if(typeof LN!=='undefined')return LN.slice();

    if(typeof LEVELS!=='undefined'&&Array.isArray(LEVELS))return LEVELS.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    return [];
  }
  function _getTotal(){return _getNames().length||7;}
  function _getCur(){
    if(typeof currentLevel!=='undefined')return currentLevel;
    if(typeof curLevel!=='undefined')return curLevel;
    if(typeof curLv!=='undefined')return curLv;
    return 0;
  }
  function _getObjs(){
    if(typeof levelObjs!=='undefined')return levelObjs;
    return null;
  }
  function _isDone(i){
    if(typeof quizPassed!=='undefined')return quizPassed.has(i);
    var o=_getObjs();
    if(o&&o[i])return o[i].every(function(v){return v;});
    if(typeof completedLevels!=='undefined')return completedLevels.has(i);
    return false;
  }
  function _countDone(){
    var o=_getObjs(),d=0,t=0;
    if(o){for(var i=0;i<o.length;i++)for(var j=0;j<o[i].length;j++){t++;if(_isDone(i)||o[i][j])d++;}}
    else if(typeof completedLevels!=='undefined'){d=completedLevels.size;t=_getTotal();}
    return{done:d,total:t};
  }


  // 2. 阶段导航
  window._stageNavHTML=function(){
    var names=_getNames(),total=names.length;
    if(!total)return '';
    var cur=_getCur(),s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):0;
    var h='<div class="stage-nav"><div class="sn-bar">';
    for(var i=0;i<total;i++){
      var unlocked=i===0||(typeof quizPassed!=='undefined'&&quizPassed.has(i-1));
      var cls=_isDone(i)?'done':i===cur?'cur':unlocked?'':'locked';
      var click=unlocked?('typeof goLevel==="function"&&goLevel('+i+')'):'';
      h+='<div class="sn-d '+cls+'" onclick="'+click+'"></div>';
    }
    h+='</div>';
    h+='<div class="sn-info">\u{1F4CD} \u7B2C'+(cur+1)+'/'+total+'\u5173 | \u8FDB\u5EA6 '+pct+'%</div>';

    h+='</div>';
    return h;
  };

  // 3. 通关总结
  window._summaryHTML=function(){
    var names=_getNames(),total=names.length;
    var s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):100;
    var h='<div class="summary-box">';
    h+='<div class="summary-title">\u{1F3C6} \u606D\u559C\u901A\u5173\uFF01</div>';
    h+='<div class="summary-sub">\u4F60\u5DF2\u5B8C\u6210\u5168\u90E8 '+total+' \u4E2A\u5173\u5361\u7684\u5B66\u4E60</div>';
    h+='<div class="summary-stats">';
    h+='<div class="summary-stat"><div class="num">'+total+'</div><div class="label">\u5173\u5361\u5B8C\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+s.done+'</div><div class="label">\u76EE\u6807\u8FBE\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+pct+'%</div><div class="label">\u77E5\u8BC6\u638C\u63E1</div></div>';
    h+='</div>';
    h+='<div class="summary-keys"><div style="font-weight:bold;color:#4f46e5;margin-bottom:6px">\u{1F4DA} \u5173\u952E\u77E5\u8BC6\u56DE\u987E</div>';
    for(var i=0;i<total;i++){h+='<div>\u2705 '+names[i]+'</div>';}
    h+='</div></div>';
    return h;
  };

  // 4. 增强 renderPanel - monkey-patch
  if(typeof window.renderPanel==='function'){
    var _origRP=window.renderPanel;
    window.renderPanel=function(){
      _origRP.apply(this,arguments);
      // 在 panel 顶部插入阶段导航
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
  // 也处理全局 renderPanel
  if(typeof renderPanel==='function'&&!window._rpPatched){
    window._rpPatched=true;
    var _origRP2=renderPanel;
    renderPanel=function(){
      _origRP2.apply(this,arguments);
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
})();
try{renderPanel();}catch(e){}


</script>
</body>
</html>
