<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粒子加速器探险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}


body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro',sans-serif;overflow:hidden;height:100vh}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:var(--overlay-bg);display:flex;align-items:center;justify-content:center;z-index:50}
.overlay.hidden{display:none}
.start-box{text-align:center;max-width:560px}
.start-box h1{font-size:38px;margin-bottom:6px;letter-spacing:2px}
.start-box h1 .gold{color:#60a5fa}
.start-box .sub{font-size:17px;color:var(--sub-color);margin-bottom:28px}
.start-btn{background:linear-gradient(135deg,#3b82f6,#60a5fa);color:#fff;border:none;padding:14px 52px;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;transition:transform .2s}
.start-btn:hover{transform:scale(1.05)}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:#aaa;font-size:12px;width:80px}
.feat .fi{font-size:26px;margin-bottom:4px}
.panel{position:absolute;top:0;left:0;width:320px;height:calc(100% - 32px);background:var(--panel-bg);border-right:1px solid var(--panel-border);overflow-y:auto;z-index:10;padding:12px;box-sizing:border-box;display:none;padding-bottom:16px}
.level-btn{display:none!important}
.level-btn.active{display:none!important}
.level-btn.done{display:none!important}
.concept-box{background:var(--concept-bg);border:1px solid var(--concept-border);border-radius:8px;padding:10px;margin:8px 0;font-size:13px;line-height:1.7;color:var(--concept-text)}
.goal-row{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:12px}
.g-icon{font-size:14px}
.g-text{color:var(--text-sub)}
.g-text.done{color:#059669;text-decoration:line-through}
.act-btn{display:block;width:100%;padding:10px;margin:4px 0;border-radius:8px;border:1px solid var(--btn-border);background:var(--btn-bg);color:var(--btn-text);font-size:15px;cursor:pointer;text-align:center}
.act-btn:hover{background:var(--btn-hover)}.act-btn:disabled{opacity:.4;cursor:not-allowed}
.act-btn.green{border-color:var(--btn-green-border);background:var(--btn-green-bg);color:var(--btn-green-text)}
.hint-box{background:var(--hint-bg);border:1px solid var(--hint-border);border-radius:8px;padding:8px;margin:8px 0;font-size:12px;color:var(--hint-text)}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:10px;padding:12px;margin:10px 0;font-size:14px;line-height:1.8;color:var(--learn-text)}
.slider-wrap{margin:8px 0}.slider-wrap label{font-size:11px;color:#888}
.slider-wrap input[type=range]{width:100%;margin-top:4px;accent-color:#3b82f6}.sv{color:var(--sv);font-weight:bold}
.m-title{font-size:17px;font-weight:700;margin:8px 0 4px;color:#1e293b}
.m-sub{font-size:12px;color:#888;margin-bottom:8px}
#bottom-bar{position:absolute;bottom:0;left:0;right:0;height:32px;background:var(--bar-bg);border-top:1px solid var(--bar-border);z-index:20;display:none;align-items:center;padding:0 16px;font-size:11px;color:#666}
#bottom-bar .bb-left{flex:1}
#bottom-bar .bb-right{text-align:right}
.overlay .result-box{text-align:center;max-width:420px;background:var(--result-bg);border:1px solid var(--result-border);border-radius:16px;padding:28px 36px;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
.result-box .rb-icon{font-size:48px;margin-bottom:10px}
.result-box .rb-title{font-size:22px;font-weight:700;margin-bottom:8px}
.result-box .rb-learn{text-align:left;background:var(--concept-bg);border-radius:8px;padding:12px 14px;font-size:13px;color:#1e40af;line-height:1.7;margin-bottom:16px}
.result-box button{padding:10px 28px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin:0 6px}
.result-box .btn-next{background:#3b82f6;color:#fff}
.result-box .btn-retry{background:var(--stage-bar);color:var(--text-sub)}

.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:10px 0}
.quiz-title{font-size:13px;font-weight:700;color:var(--quiz-q);margin-bottom:6px}
.quiz-q{font-size:13px;color:var(--quiz-q);line-height:1.6;margin-bottom:8px}
.quiz-opt{display:block;width:100%;padding:8px 10px;margin:5px 0;border:1px solid var(--quiz-opt-border);border-radius:6px;background:var(--quiz-opt-bg);color:var(--quiz-opt-text);font-size:13px;text-align:left;cursor:pointer}
.quiz-opt:hover{background:var(--quiz-opt-hover)}
.quiz-feedback{font-size:12px;line-height:1.6;margin-top:7px;padding:7px;border-radius:6px}
.quiz-feedback.ok{background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-feedback.bad{background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<canvas id="canvas"></canvas>
<div class="overlay" id="startScreen">
<div class="start-box">
  <h1>⚡ <span class="gold">粒子加速器</span>探险</h1>
  <div class="sub">7 个关卡，从电场加速到发现上帝粒子</div>
<button class="start-btn" onclick="startGame()">开始探险</button>
  <div class="features">
    <div class="feat"><div class="fi">⚡</div>电场加速</div>
    <div class="feat"><div class="fi">🌀</div>回旋加速</div>
    <div class="feat"><div class="fi">💫</div>同步加速</div>
    <div class="feat"><div class="fi">💥</div>粒子对撞</div>
    <div class="feat"><div class="fi">🔍</div>粒子探测</div>
    <div class="feat"><div class="fi">📊</div>希格斯发现</div>
    <div class="feat"><div class="fi">🧩</div>标准模型</div>
  </div>
</div>
</div>
<div class="overlay hidden" id="resultModal"><div class="result-box" id="resultBox"></div></div>
<div class="panel" id="panel"></div>
<div id="bottom-bar"><span class="bb-left" id="bbLeft"></span><span class="bb-right" id="bbRight"></span></div>
<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}}

const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let CW,CH,time=0,animId;
let gameState='start',currentLevel=0;
let levelState={},bgStars=[],trailParticles=[];
const completedLevels=new Set();
const quizPassed=new Set();
let quizFeedback={};
const panelEl=document.getElementById('panel'),bbEl=document.getElementById('bottom-bar');
const bbLeft=document.getElementById('bbLeft'),bbRight=document.getElementById('bbRight');
const c=3e8,eCharge=1.6e-19,protonMass=1.67e-27;

const levels=[
{name:'电场加速',sub:'库仑力',icon:'⚡'},
{name:'回旋加速器',sub:'磁场偏转',icon:'🌀'},
{name:'同步加速器',sub:'接近光速',icon:'💫'},
{name:'粒子对撞',sub:'创造新粒子',icon:'💥'},
{name:'粒子探测器',sub:'识别碎片',icon:'🔍'},
{name:'发现希格斯',sub:'5σ发现',icon:'📊'},
{name:'标准模型',sub:'粒子物理元素周期表',icon:'🧩'}
];

const quizData=[
{q:'电场加速中粒子获得的动能主要由什么决定？',opts:['电荷与电压的乘积 E=qV','磁场半径的平方','探测器层数','统计显著性'],ans:0},
{q:'回旋加速器让粒子反复增能的关键组合是什么？',opts:['磁场让轨迹弯曲，电场在间隙加速','只靠重力让粒子下落','只靠探测器吸收粒子','让粒子停止后重新发射'],ans:0},
{q:'同步加速器为什么要随能量同步调节磁场？',opts:['保持粒子在固定环形轨道上运行','让粒子完全静止','降低光速上限','消除所有相对论效应'],ans:0},
{q:'高能对撞能产生新粒子的物理基础是什么？',opts:['动能可按 E=mc² 转化为粒子质量','电荷会凭空增加','磁场直接制造质量','探测器把光子变成质子'],ans:0},
{q:'探测器分层识别粒子的依据是什么？',opts:['不同粒子在不同层留下轨迹或沉积能量','所有粒子都会停在同一层','粒子颜色固定不变','中微子会发出强光'],ans:0},
{q:'宣布发现希格斯这类新粒子通常需要什么统计标准？',opts:['达到约 5σ 的统计显著性','只看到一个事件','柱状图中任意一个峰','总事件数刚好为 100'],ans:0},
{q:'标准模型目前仍不能完整解释什么？',opts:['引力、暗物质和暗能量等现象','电子和夸克的存在','光子的电磁作用','弱相互作用'],ans:0}
];

function resize(){CW=canvas.width=innerWidth;CH=canvas.height=innerHeight}
addEventListener('resize',resize);resize();
for(let i=0;i<120;i++)bgStars.push({x:Math.random()*2e3,y:Math.random()*1200,r:Math.random()*1.2+.3,a:Math.random()*.5+.3});

function drawBg(){
ctx.fillStyle=t().bg1;ctx.fillRect(0,0,CW,CH);
bgStars.forEach(s=>{ctx.globalAlpha=s.a*(0.7+0.3*Math.sin(time*0.5+s.x));ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x%CW,s.y%CH,s.r,0,Math.PI*2);ctx.fill()});
ctx.globalAlpha=1;
}

function startGame(){
document.getElementById('startScreen').classList.add('hidden');
gameState='play';currentLevel=0;
panelEl.style.display='block';bbEl.style.display='flex';
completedLevels.clear();quizPassed.clear();quizFeedback={};
initLevel(0);renderPanel();animate();
}

function initLevel(n){
if(n<0||n>=levels.length||!isUnlocked(n))return;
currentLevel=n;trailParticles=[];
const L=levels[n];
if(n===0)initLevel0();
else if(n===1)initLevel1();
else if(n===2)initLevel2();
else if(n===3)initLevel3();
else if(n===4)initLevel4();
else if(n===5)initLevel5();
else if(n===6)initLevel6();
restoreCompletedLevelState(n);
renderPanel();
}

function isUnlocked(n){return n===0||quizPassed.has(n-1);}
function restoreCompletedLevelState(n){
if(!quizPassed.has(n)||!levelState.goals)return;
levelState.goals=levelState.goals.map(()=>true);
}
function tryCompleteLevel(n){
if(n!==currentLevel||!levelState.goals||!levelState.goals.every(Boolean)||quizPassed.has(n)||levelState.quizReady)return;
levelState.quizReady=true;renderPanel();
}
function setInlineText(id,text){const el=document.getElementById(id);if(el)el.textContent=text;}
function drawCurrentFrame(){
drawBg();
if(currentLevel===0)updateLevel0();
else if(currentLevel===1)updateLevel1();
}
function dragVoltage(el){
levelState.voltage=+el.value;
setInlineText('voltageVal',levelState.voltage+' kV');
drawCurrentFrame();
}
function dragCyclotronB(el){
levelState.bField=+el.value/100;
setInlineText('bFieldVal',levelState.bField.toFixed(2)+' T');
drawCurrentFrame();
}

/* ========== LEVEL 0: 电场加速 ========== */
function initLevel0(){
levelState={voltage:10,energy:0,speed:0,protonX:0,protonY:0,accelerating:false,done:false,
goals:[false,false,false],phase:'idle'};
}
function updateLevel0(){
const s=levelState,ox=340,W=CW-ox-40,cy=CH/2;
const plateL=ox+60,plateR=ox+W-60;
// draw plates
ctx.strokeStyle='#f44';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(plateL,cy-120);ctx.lineTo(plateL,cy+120);ctx.stroke();
ctx.strokeStyle='#4af';ctx.beginPath();ctx.moveTo(plateR,cy-120);ctx.lineTo(plateR,cy+120);ctx.stroke();
ctx.fillStyle='#f66';ctx.font='22px sans-serif';ctx.fillText('+',plateL-20,cy+5);
ctx.fillStyle='#6af';ctx.fillText('−',plateR+10,cy+5);
// E field lines
ctx.globalAlpha=0.15;ctx.strokeStyle='#88f';ctx.lineWidth=1;
for(let y=cy-100;y<=cy+100;y+=30){ctx.beginPath();ctx.moveTo(plateL+10,y);ctx.lineTo(plateR-10,y);ctx.stroke();
ctx.beginPath();ctx.moveTo(plateR-20,y-5);ctx.lineTo(plateR-10,y);ctx.lineTo(plateR-20,y+5);ctx.stroke();}
ctx.globalAlpha=1;
// proton
if(s.phase==='idle'){s.protonX=plateL+40;s.protonY=cy;}
if(s.phase==='accel'){
let acc=s.voltage*1000*eCharge/(protonMass*(plateR-plateL-80));
s.speed+=acc*0.016;let maxV=Math.sqrt(2*s.voltage*1000*eCharge/protonMass);
if(s.speed>maxV)s.speed=maxV;
s.protonX+=s.speed*0.016*3e-4;
s.energy=0.5*protonMass*s.speed*s.speed/eCharge;
if(s.protonX>=plateR-40){s.phase='done';s.protonX=plateR-40;
if(s.energy>=1000&&!s.goals[0])s.goals[0]=true;

/* ========== LEVEL 1: 回旋加速器 ========== */
function initLevel1(){

}
function updateLevel1(){
const s=levelState,ox=340,cx=(CW+ox)/2,cy=CH/2,maxR=Math.min(CW-ox,CH)/2-40;
// draw D-shaped electrodes

ctx.strokeStyle='#556';ctx.lineWidth=3;ctx.fillStyle='rgba(40,40,80,0.3)';
// left D
ctx.beginPath();ctx.arc(0,0,maxR,Math.PI/2,-Math.PI/2,false);ctx.lineTo(-8,-maxR);ctx.lineTo(-8,maxR);ctx.closePath();ctx.fill();ctx.stroke();
// right D
ctx.beginPath();ctx.arc(0,0,maxR,-Math.PI/2,Math.PI/2,false);ctx.lineTo(8,maxR);ctx.lineTo(8,-maxR);ctx.closePath();ctx.fill();ctx.stroke();
// gap
ctx.fillStyle='rgba(100,200,255,0.15)';ctx.fillRect(-8,-maxR,16,maxR*2);
ctx.restore();
// labels
ctx.fillStyle='#444';ctx.font='17px sans-serif';ctx.fillText('D₁',cx-maxR/2-10,cy);ctx.fillText('D₂',cx+maxR/2-5,cy);
ctx.fillStyle='rgba(100,200,255,0.5)';ctx.font='16px sans-serif';ctx.fillText('电场间隙',cx-20,cy+maxR+20);

if(s.phase==='run'){
let freq=eCharge*s.bField/(2*Math.PI*protonMass);
let dt=0.03;
s.angle+=dt*freq*0.0001/(s.radius/200+0.5);
let prevSide=Math.cos(s.angle-dt*freq*0.0001/(s.radius/200+0.5))>0;
let curSide=Math.cos(s.angle)>0;
if(prevSide!==curSide){
s.halfLap++;
let boostE=5000;
s.energy+=boostE;s.speed=Math.sqrt(2*s.energy*eCharge/protonMass);
s.radius=protonMass*s.speed/(eCharge*s.bField)*5e5+20;
if(s.halfLap%2===0)s.laps++;
s.inGap=true;s.gapBoost=10;
}
if(s.gapBoost>0)s.gapBoost--;else s.inGap=false;
if(s.radius>maxR-10){s.escaped=true;s.phase='done';renderPanel();}
if(s.laps>=3&&!s.goals[0]){s.goals[0]=true;
if(!s.escaped&&!s.goals[1]){s.goals[1]=true;}
renderPanel();}
if(s.energy>=50000&&!s.goals[2]){s.goals[2]=true;renderPanel();}
tryCompleteLevel(1);
let px=cx+Math.cos(s.angle)*s.radius,py=cy+Math.sin(s.angle)*s.radius;
s.trail.push({x:px,y:py,t:60});
if(s.trail.length>300)s.trail.shift();
// draw trail
ctx.lineWidth=2;
for(let i=1;i<s.trail.length;i++){let a=s.trail[i].t/60;ctx.strokeStyle=`rgba(255,100,80,${a*0.6})`;ctx.beginPath();ctx.moveTo(s.trail[i-1].x,s.trail[i-1].y);ctx.lineTo(s.trail[i].x,s.trail[i].y);ctx.stroke();}
s.trail.forEach(t=>t.t=Math.max(0,t.t-0.5));
// draw proton
let glow=ctx.createRadialGradient(px,py,0,px,py,14);
glow.addColorStop(0,'rgba(255,100,80,0.9)');glow.addColorStop(1,'rgba(255,50,30,0)');
ctx.fillStyle=glow;ctx.beginPath();ctx.arc(px,py,14,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#f44';ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);ctx.fill();
// gap flash
if(s.inGap){ctx.save();ctx.translate(cx,cy);ctx.fillStyle=`rgba(100,200,255,${s.gapBoost/10*0.4})`;ctx.fillRect(-8,-maxR,16,maxR*2);ctx.restore();}
}
ctx.fillStyle='#444';ctx.font='19px sans-serif';
ctx.fillText(`能量: ${s.energy<1000?s.energy.toFixed(0)+' eV':(s.energy/1000).toFixed(1)+' keV'}`,ox+20,50);
ctx.fillText(`圈数: ${s.laps}`,ox+20,70);
ctx.fillText(`磁场: ${s.bField.toFixed(2)} T`,ox+20,90);
ctx.fillText(`半径: ${s.radius.toFixed(0)} px`,ox+20,110);
}

function initLevel2(){

for(let i=0;i<8;i++)levelState.magnets.push({a:i*Math.PI/4,on:true});
}
function updateLevel2(){
const s=levelState,ox=340,cx=(CW+ox)/2,cy=CH/2,R=Math.min(CW-ox,CH)/2-60;
// draw ring
ctx.strokeStyle='#334';ctx.lineWidth=28;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.stroke();
ctx.strokeStyle='#d1d5db';ctx.lineWidth=22;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.stroke();
// magnets
s.magnets.forEach((m,i)=>{
let mx=cx+Math.cos(m.a)*R,my=cy+Math.sin(m.a)*R;
ctx.fillStyle=m.on?'#3b82f6':'#333';ctx.fillRect(mx-10,my-10,20,20);
ctx.fillStyle=t().label;ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('B',mx,my+3);
});
// RF cavities (2 positions)
let rfPos=[0,Math.PI];
rfPos.forEach(a=>{
let rx=cx+Math.cos(a)*(R+18),ry=cy+Math.sin(a)*(R+18);
ctx.fillStyle='#f90';ctx.fillRect(rx-6,ry-12,12,24);
ctx.fillStyle=t().label;ctx.font='14px sans-serif';ctx.fillText('RF',rx,ry+3);
});

if(s.phase==='run'){
let speedFrac=s.speed/c;
let gamma=1/Math.sqrt(1-speedFrac*speedFrac+1e-15);
let angSpeed=0.02+s.energy*0.0001;if(angSpeed>0.15)angSpeed=0.15;
s.angle+=angSpeed;
// check RF cavity crossing
rfPos.forEach(a=>{
let diff=((s.angle%( Math.PI*2))+Math.PI*2)%(Math.PI*2);
let target=((a)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
if(Math.abs(diff-target)<angSpeed*1.5){
s.energy+=0.5*gamma;
s.speed=c*Math.sqrt(1-1/(1+s.energy/0.938)/(1+s.energy/0.938));
s.bField=gamma*0.938*s.speed/(eCharge*R*1e6);

});
if(Math.floor(s.angle/(Math.PI*2))>s.laps){s.laps=Math.floor(s.angle/(Math.PI*2));}

s.trail.push({x:px,y:py,t:80});if(s.trail.length>500)s.trail.shift();

ctx.lineWidth=2;
for(let i=1;i<s.trail.length;i++){let a2=s.trail[i].t/80;
let hue=200+s.energy*5;if(hue>360)hue=360;
ctx.strokeStyle=`hsla(${hue},80%,60%,${a2*0.5})`;ctx.beginPath();ctx.moveTo(s.trail[i-1].x,s.trail[i-1].y);ctx.lineTo(s.trail[i].x,s.trail[i].y);ctx.stroke();}
s.trail.forEach(t=>t.t=Math.max(0,t.t-0.3));
// proton glow
let glow=ctx.createRadialGradient(px,py,0,px,py,16);
glow.addColorStop(0,`hsla(${200+s.energy*5},80%,70%,0.9)`);glow.addColorStop(1,'rgba(0,0,0,0)');
ctx.fillStyle=glow;ctx.beginPath();ctx.arc(px,py,16,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();
// goals
if(s.laps>=10&&!s.goals[0]){s.goals[0]=true;renderPanel();}
let pctC=s.speed/c*100;
if(pctC>=99&&!s.goals[1]){s.goals[1]=true;renderPanel();}
if(s.energy>=1000&&!s.goals[2]){s.goals[2]=true;renderPanel();}
tryCompleteLevel(2);
}
let pctC=s.speed/c*100;let gamma=1/Math.sqrt(1-(s.speed/c)*(s.speed/c)+1e-15);
ctx.fillStyle='#444';ctx.font='19px sans-serif';
ctx.fillText(`能量: ${s.energy<1?s.energy.toFixed(2)+' GeV':s.energy.toFixed(1)+' GeV'}`,ox+20,50);
ctx.fillText(`速度: ${pctC.toFixed(4)}% 光速`,ox+20,70);
ctx.fillText(`圈数: ${s.laps}`,ox+20,90);
ctx.fillText(`γ因子: ${gamma.toFixed(1)}`,ox+20,110);
}

/* ========== LEVEL 3: 粒子对撞 ========== */
function initLevel3(){
levelState={phase:'ready',collided:false,debris:[],beamL:[],beamR:[],
goals:[false,false,false],particleTypes:new Set(),collisionCount:0,flashAlpha:0};
}
function updateLevel3(){
const s=levelState,ox=340,cx=(CW+ox)/2,cy=CH/2;
// draw beam pipe
ctx.strokeStyle='#334';ctx.lineWidth=20;ctx.beginPath();ctx.moveTo(ox+40,cy);ctx.lineTo(CW-40,cy);ctx.stroke();
ctx.strokeStyle='#d1d5db';ctx.lineWidth=14;ctx.beginPath();ctx.moveTo(ox+40,cy);ctx.lineTo(CW-40,cy);ctx.stroke();
// collision point
ctx.beginPath();ctx.arc(cx,cy,25,0,Math.PI*2);ctx.strokeStyle='#f90';ctx.lineWidth=2;ctx.stroke();
ctx.fillStyle='rgba(255,150,0,0.1)';ctx.fill();

if(s.phase==='beams'){
// animate beams approaching
s.beamL.forEach(b=>{b.x+=8;});s.beamR.forEach(b=>{b.x-=8;});
// draw beams
s.beamL.forEach(b=>{ctx.fillStyle=`rgba(255,80,80,${b.a})`;ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();});

if(s.beamL.length>0&&s.beamL[0].x>=cx-5){s.phase='explode';s.flashAlpha=1;createDebris(cx,cy);s.collisionCount++;
if(!s.goals[0]){s.goals[0]=true;renderPanel();}
}
}
if(s.phase==='explode'){
s.flashAlpha*=0.92;
if(s.flashAlpha>0.05){ctx.fillStyle=`rgba(255,255,200,${s.flashAlpha})`;ctx.beginPath();ctx.arc(cx,cy,80*s.flashAlpha+20,0,Math.PI*2);ctx.fill();}
// update debris
s.debris.forEach(d=>{
d.x+=d.vx;d.y+=d.vy;d.life--;
if(d.charge!==0){d.vy+=d.charge*0.3;} // magnetic field bends charged particles
d.trail.push({x:d.x,y:d.y});if(d.trail.length>40)d.trail.shift();
});
// draw debris trails
s.debris.forEach(d=>{
if(d.life<=0)return;
ctx.lineWidth=2;
for(let i=1;i<d.trail.length;i++){
let a=i/d.trail.length*d.life/80;
ctx.strokeStyle=d.color.replace('1)',a+')');ctx.beginPath();ctx.moveTo(d.trail[i-1].x,d.trail[i-1].y);ctx.lineTo(d.trail[i].x,d.trail[i].y);ctx.stroke();
}
ctx.fillStyle=d.color;ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill();
});
s.debris=s.debris.filter(d=>d.life>0);
// check goals
if(s.debris.length===0&&s.flashAlpha<0.05){s.phase='ready';
if(s.particleTypes.size>=3&&!s.goals[2]){s.goals[2]=true;renderPanel();}
}
// goal 1: observe curved tracks
let hasCurved=s.debris.some(d=>d.charge!==0&&d.trail.length>10);
if(hasCurved&&!s.goals[1]){s.goals[1]=true;renderPanel();}
tryCompleteLevel(3);
}

ctx.fillText(`发现粒子种类: ${s.particleTypes.size}`,ox+20,70);

function handleDetectorClick(mx,my){

function addHiggsData(){
const s=levelState;
if(s.goals[2])return;
let batch=1000;
s.totalEvents+=batch;s.addCount++;
for(let i=0;i<batch;i++){
let bin;
// background: roughly uniform with slight slope
if(Math.random()<0.92){bin=Math.floor(Math.random()*50);}
else{
// signal: Gaussian around bin 25 (125 GeV)
bin=Math.round(25+randn()*2);
if(bin<0)bin=0;if(bin>49)bin=49;
}
s.bins[bin]++;
}
// calculate sigma
let peakRegion=0,sideband=0;
for(let i=23;i<=27;i++)peakRegion+=s.bins[i];
for(let i=0;i<50;i++){if(i<20||i>30)sideband+=s.bins[i];}
let bgEstimate=sideband/40*5;
let excess=peakRegion-bgEstimate;
let sigma=excess/Math.sqrt(bgEstimate+1);
s.sigma=Math.max(0,sigma);
if(s.totalEvents>=2000&&!s.goals[0]){s.goals[0]=true;}
if(s.sigma>=3&&!s.goals[1]){s.goals[1]=true;}
if(s.sigma>=5&&!s.goals[2]){s.goals[2]=true;}
tryCompleteLevel(5);
renderPanel();
}
function randn(){let u=0,v=0;while(u===0)u=Math.random();while(v===0)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

// Lightweight DOM patcher: preserves focused range inputs during panel updates
function _patchPanel(el,html){
  var ae=document.activeElement;
  if(!ae||ae.type!=='range'||!el.contains(ae)){el.innerHTML=html;return;}
  var tmp=document.createElement('div');tmp.innerHTML=html;
  _diffNodes(el,tmp);
}
function _diffNodes(o,n){
  var oc=Array.from(o.childNodes),nc=Array.from(n.childNodes);
  var i=0;
  while(i<oc.length&&i<nc.length){
    var a=oc[i],b=nc[i];
    if(a.nodeType!==b.nodeType||a.nodeName!==b.nodeName){o.replaceChild(b.cloneNode(true),a);i++;continue;}
    if(a.nodeType===3){if(a.textContent!==b.textContent)a.textContent=b.textContent;i++;continue;}
    if(a.nodeType===1){
      if(a.tagName==='INPUT'&&a.type==='range'&&a===document.activeElement){i++;continue;}
      for(var j=0;j<b.attributes.length;j++){var at=b.attributes[j];if(a.getAttribute(at.name)!==at.value)a.setAttribute(at.name,at.value);}
      _diffNodes(a,b);
    }
    i++;
  }
  while(oc.length>nc.length)o.removeChild(o.lastChild);
  for(;i<nc.length;i++)o.appendChild(nc[i].cloneNode(true));
}

h+=`<div class="hint-box">💡 多次对撞可以产生不同种类的粒子</div>`;
}else if(currentLevel===4){
let g=s.goals||[false,false,false];
h+=`<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>核心结构：</b>径迹室 → 电磁量能器 → 强子量能器 → &#956;子探测器</div>`;
h+=`<div class="concept-box">探测器像洋葱一样分层：径迹室→电磁量能器→强子量能器→μ子探测器。不同粒子在不同层停下。</div>`;
h+=goalHtml(['识别电子（电磁量能器停下）','识别μ子（穿透所有层）','推断中微子（缺失能量）'],g);
if(!s.guessMode){h+=`<button class="act-btn" onclick="startDetector()">🔍 开始识别粒子</button>`;}
else if(s.selected){
h+=`<div class="hint-box">选中了一条轨迹，它是什么粒子？</div>`;
['电子','质子','μ子','中微子'].forEach(n=>{
h+=`<button class="act-btn" onclick="guessParticle('${n}')">${n}</button>`;
});
}else{h+=`<div class="hint-box">👆 点击画面中的粒子轨迹进行识别</div>`;}
h+=`<button class="act-btn" onclick="resetLevel4()">🔄 重新生成</button>`;
}else if(currentLevel===5){
let g=s.goals||[false,false,false];
h+=`<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>核心概念：</b>5&#963; 统计显著性 — 百万分之一的偶然概率</div>`;
h+=`<div class="concept-box">在质量分布图中寻找异常凸起。收集足够数据，当统计显著性达到5σ（百万分之一的偶然概率），即可宣布发现新粒子。</div>`;
h+=goalHtml(['收集 2000+ 事件','发现 125 GeV 异常（3σ）','达到 5σ 宣布发现'],g);
h+=`<button class="act-btn" onclick="addHiggsData()">📊 增加 1000 事件</button>`;
h+=`<button class="act-btn" onclick="resetLevel5()">🔄 重置</button>`;
h+=`<div class="hint-box">💡 注意 125 GeV 附近的黄色柱子</div>`;
}else if(currentLevel===6){
let g=s.goals||[false,false,false];
h+=`<div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>核心内容：</b>标准模型 17 种基本粒子 — 6夸克 + 6轻子 + 4玻色子 + 希格斯</div>`;
h+=`<div class="concept-box">标准模型包含 17 种基本粒子：6种夸克、6种轻子、4种规范玻色子和1个希格斯玻色子。将卡片拖到正确位置！</div>`;
h+=goalHtml(['放置所有夸克（6种）','放置所有轻子（6种）','完成整个标准模型（17种）'],g);
h+=`<button class="act-btn" onclick="resetLevel6()">🔄 重置</button>`;
h+=`<div class="hint-box">💡 提示：上型夸克(u,c,t)电荷+2/3，下型夸克(d,s,b)电荷-1/3</div>`;
}
if(s.goals&&s.goals.every(Boolean)&&!quizPassed.has(currentLevel)){
h+=renderQuiz();
}
if(quizPassed.has(currentLevel)){
h+=`<div class="learn-box">${learnTexts[currentLevel]}</div>`;
if(currentLevel<levels.length-1)h+=`<button class="act-btn green" onclick="initLevel(${currentLevel+1})">下一关 →</button>`;
else h+=renderSummary();
}
_patchPanel(panelEl,h);
bbLeft.textContent=`关卡 ${currentLevel+1}/7: ${L.name}`;
bbRight.textContent=`测验通过: ${quizPassed.size}/7`;
}

function goalHtml(texts,goals){
let h='';texts.forEach((t,i)=>{
h+=`<div class="goal-row"><span class="g-icon">${goals[i]?'✅':'⬜'}</span><span class="g-text${goals[i]?' done':''}">${t}</span></div>`;
});return h;
}

function renderStageNav(){
let h='<div class="stage-nav"><div class="sn-bar">';
levels.forEach((l,i)=>{
let unlocked=isUnlocked(i);
let cls=quizPassed.has(i)?'done':i===currentLevel?'cur':unlocked?'':'locked';
h+=`<div class="sn-d ${cls}" onclick="${unlocked?`initLevel(${i})`:''}"></div>`;
});
h+=`</div><div class="sn-info">第 ${currentLevel+1}/${levels.length} 关 | 进度 ${Math.round(quizPassed.size/levels.length*100)}%</div>`;
h+=`<div class="sn-hint">${quizPassed.size}/${levels.length} 已通关，完成目标后答对测验才解锁下一关</div></div>`;
return h;
}

function renderQuiz(){
let q=quizData[currentLevel],fb=quizFeedback[currentLevel];
let h=`<div class="quiz-box"><div class="quiz-title">通关小测验</div><div class="quiz-q">${q.q}</div>`;
q.opts.forEach((opt,i)=>{h+=`<button class="quiz-opt" onclick="checkQuiz(${i})">${opt}</button>`;});
if(fb)h+=`<div class="quiz-feedback ${fb.ok?'ok':'bad'}">${fb.text}</div>`;
h+='</div>';
return h;
}

function checkQuiz(oi){
if(quizPassed.has(currentLevel))return;
let q=quizData[currentLevel],ok=oi===q.ans;
quizFeedback[currentLevel]={ok,text:ok?'答对了。先读学习总结，再进入下一关。':'还不对。回到本关现象、公式和探测逻辑再判断。'};
if(ok){quizPassed.add(currentLevel);completedLevels.add(currentLevel);}
renderPanel();
}

function renderSummary(){
let h='<div class="summary-box"><div class="summary-title">🏆 粒子加速器探险通关！</div>';
h+=`<div class="summary-sub">你已完成全部 ${levels.length} 个粒子物理关卡</div>`;
h+='<div class="summary-stats">';
h+=`<div class="summary-stat"><div class="num">${quizPassed.size}/${levels.length}</div><div class="label">测验通过</div></div>`;
h+='<div class="summary-stat"><div class="num">7</div><div class="label">核心概念</div></div>';
h+='</div><div class="summary-keys"><div style="font-weight:bold;color:var(--summary-title);margin-bottom:6px">📚 关键知识回顾</div>';
levels.forEach(l=>{h+=`<div>✅ ${l.name}</div>`;});
h+='</div></div>';
return h;
}

/* ========== RESULT MODAL ========== */
const learnTexts=[
'1932年，Cockcroft和Walton用80万伏的静电加速器首次实现了人工核反应——用加速的质子轰击锂原子核，将其分裂为两个氦核。这是人类第一次用"人造闪电"改变原子核，他们因此获得1951年诺贝尔物理学奖。',
'Ernest Lawrence 在1930年发明了回旋加速器，巧妙利用磁场让粒子走螺旋线，每圈加速一次。但当粒子接近光速时，相对论质量增加导致频率失调——这就是回旋加速器的能量极限。Lawrence 因此获得1939年诺贝尔物理学奖。',
'大型强子对撞机（LHC）周长27公里，质子在其中被加速到99.9999991%光速。此时质子的相对论质量是静止质量的7000倍！每秒有4亿次质子束交叉，但只有约20次有意义的碰撞。',
'爱因斯坦的 E=mc² 告诉我们：能量和质量可以互相转化。在粒子对撞中，巨大的动能转化为质量，创造出比原始粒子重得多的新粒子。这就是为什么我们需要越来越高的能量——为了创造越来越重的粒子。',
'CMS探测器重达14000吨，拥有超过1亿个传感器通道。它像一个巨大的"洋葱"，每一层负责捕捉不同类型的粒子。中微子几乎不与任何物质相互作用，只能通过"缺失能量"间接推断它的存在。',
'2012年7月4日，CERN宣布发现希格斯玻色子——这个被称为"上帝粒子"的粒子赋予其他粒子质量。Peter Higgs 在1964年提出这个理论，等了整整48年才看到实验证实。他在2013年获得诺贝尔物理学奖。',
'标准模型用17种基本粒子和3种基本力（强力、弱力、电磁力）解释了几乎所有已知的物理现象。但它不包含引力，也无法解释暗物质和暗能量——这些占了宇宙总质能的95%。寻找"超越标准模型"的新物理，是当代粒子物理的核心使命。'
];

function showResult(n){
let modal=document.getElementById('resultModal');
let box=document.getElementById('resultBox');
let isLast=n===levels.length-1;
box.innerHTML=`<div class="rb-icon">🎉</div><div class="rb-title">${levels[n].icon} ${levels[n].name} — 通关！</div>
<div class="rb-learn">${learnTexts[n]}</div>
${isLast?'<button class="btn-next" onclick="closeResult()">🏆 全部通关！</button>':
'<button class="btn-next" onclick="nextLevel()">下一关 →</button>'} <button class="btn-retry" onclick="retryLevel()">再玩一次</button>`;
modal.classList.remove('hidden');
}
function closeResult(){document.getElementById('resultModal').classList.add('hidden');}
function nextLevel(){closeResult();initLevel(currentLevel+1);renderPanel();}
function retryLevel(){closeResult();initLevel(currentLevel);renderPanel();}

/* ========== MOUSE / TOUCH ========== */
let mouseX=0,mouseY=0,mouseDown=false;
canvas.addEventListener('mousedown',e=>{mouseDown=true;mouseX=e.clientX;mouseY=e.clientY;
if(currentLevel===4)handleDetectorClick(e.clientX,e.clientY);
if(currentLevel===6)handleLevel6MouseDown(e.clientX,e.clientY);
});
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;
if(currentLevel===6)handleLevel6MouseMove(e.clientX,e.clientY);
});
canvas.addEventListener('mouseup',e=>{mouseDown=false;
if(currentLevel===6)handleLevel6MouseUp(e.clientX,e.clientY);
});
// touch support
canvas.addEventListener('touchstart',e=>{e.preventDefault();let t=e.touches[0];mouseDown=true;mouseX=t.clientX;mouseY=t.clientY;
if(currentLevel===4)handleDetectorClick(t.clientX,t.clientY);
if(currentLevel===6)handleLevel6MouseDown(t.clientX,t.clientY);
},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();let t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;
if(currentLevel===6)handleLevel6MouseMove(t.clientX,t.clientY);
},{passive:false});
canvas.addEventListener('touchend',e=>{mouseDown=false;
if(currentLevel===6)handleLevel6MouseUp(mouseX,mouseY);
});

/* ========== ANIMATION LOOP ========== */
function animate(){
animId=requestAnimationFrame(animate);
time+=0.016;drawBg();
// update trail particles
trailParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
trailParticles=trailParticles.filter(p=>p.life>0);
trailParticles.forEach(p=>{ctx.globalAlpha=p.life/30;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();});
ctx.globalAlpha=1;
if(currentLevel===0)updateLevel0();
else if(currentLevel===1)updateLevel1();
else if(currentLevel===2)updateLevel2();
else if(currentLevel===3)updateLevel3();
else if(currentLevel===4)updateLevel4();
else if(currentLevel===5)updateLevel5();
else if(currentLevel===6){updateLevel6();drawLevel6Cards();}
}
