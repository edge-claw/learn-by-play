<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>核物理原理交互式教育</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#fff;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --chain-ctrl-bg:#0a2a1a;--chain-ctrl-text:#4ade80;
  --chain-unctrl-bg:#2a0a0a;--chain-unctrl-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --chain-ctrl-bg:#ecfdf5;--chain-ctrl-text:#059669;
  --chain-unctrl-bg:#fef2f2;--chain-unctrl-text:#dc2626;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro',sans-serif;overflow:hidden;height:100vh}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:var(--overlay-bg);display:flex;align-items:center;justify-content:center;z-index:50}
.overlay.hidden{display:none}
.start-box{text-align:center;max-width:560px}
.start-box h1{font-size:38px;margin-bottom:6px;letter-spacing:2px}
.start-box h1 .gold{color:#60a5fa}
.start-box .sub{font-size:17px;color:var(--text-sub);margin-bottom:28px}
.start-btn{background:linear-gradient(135deg,#3b82f6,#60a5fa);color:#fff;border:none;padding:14px 52px;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;transition:transform .2s}
.start-btn:hover{transform:scale(1.05)}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:var(--text-muted);font-size:12px;width:80px}
.feat .fi{font-size:26px;margin-bottom:4px}
.panel{position:absolute;top:0;left:0;width:320px;height:calc(100% - 32px);background:var(--panel-bg);border-right:1px solid var(--panel-border);overflow-y:auto;z-index:10;padding:12px;box-sizing:border-box;display:none;padding-bottom:16px}
.level-btn{display:none!important}
.level-btn.active{display:none!important}
.level-btn.done{display:none!important}
.concept-box{background:var(--concept-bg);border:1px solid var(--concept-border);border-radius:8px;padding:10px;margin:8px 0;font-size:13px;line-height:1.7;color:var(--concept-text)}
.goal-row{display:flex;align-items:center;gap:6px;margin:4px 0;font-size:13px}
.g-icon{font-size:14px}
.g-text{color:var(--goal-text)}
.g-text.done{color:var(--goal-done);text-decoration:line-through}
.act-btn{display:block;width:100%;padding:10px;margin:4px 0;border-radius:8px;border:1px solid var(--btn-border);background:var(--btn-bg);color:var(--btn-text);font-size:15px;cursor:pointer;text-align:center}
.act-btn:hover{background:var(--btn-hover)}
.act-btn:disabled{opacity:0.4;cursor:not-allowed}
.act-btn.green{border-color:var(--btn-green-border);background:var(--btn-green-bg);color:var(--btn-green-text)}
.hint-box{background:var(--hint-bg);border:1px solid var(--hint-border);border-radius:8px;padding:8px;margin:8px 0;font-size:12px;color:var(--hint-text)}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:10px;padding:12px;margin:10px 0;font-size:14px;line-height:1.8;color:var(--learn-text)}
.slider-wrap{margin:8px 0}
.slider-wrap label{font-size:11px;color:var(--slider-label)}
.slider-wrap input[type=range]{width:100%;margin-top:4px;accent-color:#3b82f6}
.sv{color:var(--sv);font-weight:bold}
.m-title{font-size:17px;font-weight:700;margin:8px 0 4px;color:var(--title-color)}
.m-sub{font-size:13px;color:var(--sub-color);margin-bottom:8px}
#bottom-bar{position:absolute;bottom:0;left:0;right:0;height:32px;background:var(--bar-bg);border-top:1px solid var(--bar-border);z-index:20;display:none;align-items:center;padding:0 16px;font-size:11px;color:#666}
#bottom-bar .bb-left{flex:1}
#bottom-bar .bb-right{text-align:right}
.overlay .result-box{text-align:center;max-width:420px;background:var(--result-bg);border:1px solid var(--result-border);border-radius:16px;padding:28px 36px;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
.result-box .rb-icon{font-size:48px;margin-bottom:10px}
.result-box .rb-title{font-size:22px;font-weight:700;margin-bottom:8px}
.result-box .rb-learn{text-align:left;background:var(--result-learn-bg);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--result-learn-text);line-height:1.7;margin-bottom:16px}
.result-box button{padding:10px 28px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin:0 6px}
.result-box .btn-next{background:#3b82f6;color:#fff}
.result-box .btn-retry{background:var(--retry-bg);color:var(--retry-text)}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:8px;padding:10px;margin:8px 0}
.quiz-q{font-size:13px;color:var(--quiz-q);margin-bottom:8px;font-weight:600}
.quiz-opt{font-size:13px;color:var(--quiz-opt-text);padding:8px 10px;margin:4px 0;border-radius:6px;cursor:pointer;border:1px solid var(--quiz-opt-border);background:var(--quiz-opt-bg)}
.quiz-opt:hover{background:var(--quiz-opt-hover);border-color:#22c55e}
.quiz-opt.correct{background:var(--quiz-correct-bg);border-color:#22c55e;color:var(--quiz-correct-text)}
.quiz-opt.wrong{background:var(--quiz-wrong-bg);border-color:#ef4444;color:var(--quiz-wrong-text)}
.chain-choice{display:flex;gap:8px;margin:8px 0}
.chain-choice button{flex:1;padding:10px 6px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;transition:transform .15s}
.chain-choice button:hover{transform:scale(1.03)}
.chain-choice .btn-control{border:1px solid #22c55e;background:var(--chain-ctrl-bg);color:var(--chain-ctrl-text)}
.chain-choice .btn-uncontrol{border:1px solid #ef4444;background:var(--chain-unctrl-bg);color:var(--chain-unctrl-text)}
.event-alert{background:var(--event-bg);border:2px solid #ef4444;border-radius:8px;padding:10px;margin:8px 0;animation:alertPulse 0.5s ease-in-out infinite alternate}
@keyframes alertPulse{from{border-color:#ef4444}to{border-color:#fbbf24}}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
#roadmap-container{display:none}
.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<canvas id="canvas"></canvas>
<div class="overlay" id="startScreen">
<div class="start-box">
  <h1>☢️ <span class="gold">核物理</span>原理探险</h1>
  <div class="sub">7 个关卡，亲手体验核能的奥秘</div>
  <div id="roadmap-container"></div>
<button class="start-btn" onclick="startGame()">开始探险</button>
  <div class="features">
    <div class="feat"><div class="fi">⚛️</div>原子结构</div>
    <div class="feat"><div class="fi">💥</div>核裂变</div>
    <div class="feat"><div class="fi">🔗</div>链式反应</div>
    <div class="feat"><div class="fi">⚖️</div>临界质量</div>
    <div class="feat"><div class="fi">☀️</div>核聚变</div>
    <div class="feat"><div class="fi">🏭</div>核电站</div>
    <div class="feat"><div class="fi">🦾</div>方舟反应堆</div>
  </div>
</div>
</div>
<div class="overlay hidden" id="resultModal"><div class="result-box" id="resultBox"></div></div>
<div class="panel" id="panel"></div>
<div id="bottom-bar"><span class="bb-left" id="bbLeft"></span><span class="bb-right" id="bbRight"></span></div>
<script>
// === 主题系统 ===
let isDark = true;
const TH = {
  dark: {
    bg1:'#0a0a2e', bg2:'#0d0d1a', bg3:'#0a0a1a',
    grid:'rgba(99,102,241,0.06)',
    text:'#fff', textSec:'rgba(255,255,255,0.6)', textMut:'rgba(255,255,255,0.4)', textLabel:'rgba(255,255,255,0.3)',
    electron:'#fff', electronGlow:'rgba(255,255,255,0.3)',
    shell:'rgba(100,100,200,0.15)',
    barBg:'#1a1a3a',
    labelText:'#e0e0f0',
    showStars: true
  },
  light: {
    bg1:'#e8edf5', bg2:'#f0f2f5', bg3:'#e0e7f0',
    grid:'rgba(99,102,241,0.04)',
    text:'#1e293b', textSec:'rgba(30,41,59,0.6)', textMut:'rgba(30,41,59,0.4)', textLabel:'rgba(30,41,59,0.3)',
    electron:'#334155', electronGlow:'rgba(51,65,85,0.3)',
    shell:'rgba(100,100,200,0.15)',
    barBg:'#c7d2de',
    labelText:'#475569',
    showStars: false
  }
};
function t(){ return isDark ? TH.dark : TH.light; }
function toggleTheme(){
  isDark = !isDark;
  document.body.dataset.theme = isDark ? 'dark' : 'light';
  document.getElementById('themeToggle').textContent = isDark ? '🌙 暗色' : '☀️ 亮色';
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let CW, CH, time = 0, animId;
let gameState = 'start', currentLevel = 0;
let levelState = {}, stars = [], particles = [];
const completedLevels = new Set();
const quizPassed = new Set();
let levelFadeAlpha = 1;
let celebrationParticles = [];
let screenShake = {x:0,y:0,intensity:0};

// === Audio System ===
const AudioCtx=window.AudioContext||window.webkitAudioContext;let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playSound(type){initAudio();const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);if(type==='click'){o.frequency.value=800;g.gain.value=0.1;o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);o.stop(audioCtx.currentTime+0.1)}else if(type==='success'){o.frequency.value=523;g.gain.value=0.15;o.start();o.frequency.setValueAtTime(659,audioCtx.currentTime+0.1);o.frequency.setValueAtTime(784,audioCtx.currentTime+0.2);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);o.stop(audioCtx.currentTime+0.4)}else if(type==='fail'){o.frequency.value=300;g.gain.value=0.15;o.start();o.frequency.setValueAtTime(200,audioCtx.currentTime+0.15);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);o.stop(audioCtx.currentTime+0.3)}else if(type==='boom'){const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.3,audioCtx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*5);const s=audioCtx.createBufferSource();s.buffer=buf;const g2=audioCtx.createGain();g2.gain.value=0.2;s.connect(g2);g2.connect(audioCtx.destination);s.start()}else if(type==='alert'){o.frequency.value=600;g.gain.value=0.12;o.start();o.frequency.setValueAtTime(800,audioCtx.currentTime+0.1);o.frequency.setValueAtTime(600,audioCtx.currentTime+0.2);o.frequency.setValueAtTime(800,audioCtx.currentTime+0.3);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);o.stop(audioCtx.currentTime+0.4)}}

// === Quiz System ===
const quizData = [
  {q:'铀-235有多少个质子？',opts:['A. 143','B. 92','C. 235'],ans:1},
  {q:'核裂变释放的能量约是化学反应的多少倍？',opts:['A. 10倍','B. 1000倍','C. 数百万倍'],ans:2},
  {q:'链式反应中，每次裂变释放几个中子？',opts:['A. 1个','B. 2-3个','C. 10个'],ans:1},
  {q:'铀-235的临界质量约为？',opts:['A. 1公斤','B. 52公斤','C. 1000公斤'],ans:1},
  {q:'核聚变需要多高的温度？',opts:['A. 1000度','B. 100万度','C. 1亿度以上'],ans:2},
  {q:'核电站和核弹的本质区别是？',opts:['A. 使用不同燃料','B. 反应速率是否受控','C. 大小不同'],ans:1},
  {q:'方舟反应堆最接近哪种现实技术？',opts:['A. 核裂变堆','B. 托卡马克聚变堆','C. 太阳能电池'],ans:1}
];
let quizLocked = false;
function renderQuiz(levelIdx){
  const qd = quizData[levelIdx];
  let h = '<div class="quiz-box"><div class="quiz-q">📝 通关测验：'+qd.q+'</div>';
  for(let i=0;i<qd.opts.length;i++){
    h+='<div class="quiz-opt" id="qopt-'+levelIdx+'-'+i+'" onclick="answerQuiz('+levelIdx+','+i+')">'+qd.opts[i]+'</div>';
  }
  h+='</div>';
  return h;
}
function answerQuiz(levelIdx,chosen){
  if(quizLocked)return;
  const qd=quizData[levelIdx];
  const el=document.getElementById('qopt-'+levelIdx+'-'+chosen);
  if(chosen===qd.ans){
    el.classList.add('correct');
    playSound('success');
    quizPassed.add(levelIdx);
    // 通关庆祝粒子
    spawnCelebration();
    setTimeout(()=>renderPanel(),500);
  } else {
    el.classList.add('wrong');
    playSound('fail');
    quizLocked=true;
    setTimeout(()=>{el.classList.remove('wrong');quizLocked=false},1000);
  }
}
function spawnCelebration(){
  const cx=CW/2+160,cy=CH/2;
  for(let i=0;i<40;i++){
    const a=Math.random()*Math.PI*2,sp=Math.random()*200+80;
    const colors=['#fbbf24','#f59e0b','#fcd34d','#fff'];
    celebrationParticles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-50,col:colors[Math.floor(Math.random()*colors.length)],life:1.5,ml:1.5,sz:3+Math.random()*3,gy:120});
  }
}

const ELEMENTS = {1:'氢',2:'氦',3:'锂',4:'铍',5:'硼',6:'碳',7:'氮',8:'氧',9:'氟',10:'氖',11:'钠',12:'镁',13:'铝',14:'硅',15:'磷',16:'硫',17:'氯',18:'氩',19:'钾',20:'钙',26:'铁',29:'铜',47:'银',79:'金',82:'铅',92:'铀'};
function getElement(p){return ELEMENTS[p]||(p+'号元素')}

const levels = [
  {title:'原子结构',sub:'认识原子核',concept:'原子由质子、中子、电子组成。质子带正电（红色），中子不带电（蓝色），电子带负电绕核运动。不同元素 = 不同质子数。',goals:['添加质子和中子构建原子','构建出铀-235（92质子+143中子）'],learn:'铀-235是自然界中最重要的可裂变材料。它的原子核有92个质子和143个中子，非常不稳定——就像一个塞满了弹珠的碗，轻轻一碰就会散架。'},
  {title:'核裂变',sub:'原子核的分裂',concept:'一个中子撞击铀-235，原子核分裂成两个较小的原子核（如钡-141和氪-92），同时释放2-3个新中子和巨大能量（约200 MeV）。',goals:['发射中子击中铀核','观察裂变产物','理解一次裂变释放多个中子'],learn:'一次裂变释放的能量是化学反应（如燃烧）的数百万倍。更关键的是，裂变释放的2-3个新中子可以继续撞击其他铀核——这就是链式反应的基础。'},
  {title:'链式反应',sub:'指数级爆发',concept:'每次裂变释放2-3个中子，每个中子又能引发新的裂变。1→3→9→27→81...指数增长。这就是核弹的原理。',goals:['启动链式反应','观察指数增长','所有铀核完成裂变'],learn:'在核弹中，链式反应在微秒级内完成——几十代裂变在不到百万分之一秒内释放所有能量。1公斤铀-235完全裂变释放的能量，相当于20000吨TNT。'},
  {title:'临界质量',sub:'多少才够',concept:'铀块太小→中子飞出去了，反应停止（亚临界）。铀块够大→中子在飞出前就撞到其他铀核，链式反应持续（超临界）。临界质量约52kg。',goals:['测试亚临界状态','测试超临界状态','找到临界质量（约50-52kg）'],learn:'这就是为什么核弹需要精确的铀量。铀-235的临界质量约52公斤（一个棒球大小的球）。核弹的设计就是在引爆瞬间，用炸药把两块亚临界的铀猛地挤到一起，形成超临界质量。'},
  {title:'核聚变',sub:'太阳的能量',concept:'轻核（氢的同位素氘和氚）在极高温下融合成氦，释放更多能量。这是太阳的能量来源。需要1亿度以上的温度来克服库仑势垒。',goals:['理解聚变需要极高温','成功实现氘氚聚变','观察聚变产物'],learn:'聚变释放的能量比裂变还多，而且燃料（氢）几乎无穷无尽。太阳核心温度1500万度，靠巨大引力压缩实现聚变。在地球上，我们需要1亿度以上——比太阳核心还热！这就是可控核聚变如此困难的原因。'},
  {title:'核电站',sub:'控制链式反应',concept:'核电站 = 受控的链式反应。用控制棒吸收多余中子，让反应速率恰好维持稳定（临界状态）。太快→熔毁，太慢→停堆。',goals:['让反应堆稳定运行400-650MW','维持稳定运行30秒','不触发熔毁警报'],learn:'核电站和核弹用的是同一个原理——链式反应。区别在于核电站用控制棒精确调节反应速率，让能量缓慢、稳定地释放。切尔诺贝利事故就是因为控制棒操作失误，反应堆在4秒内功率暴增到额定值的100倍。'},
  {title:'方舟反应堆',sub:'钢铁侠的心脏',concept:'钢铁侠胸前的方舟反应堆（Arc Reactor）是一个微型聚变装置。现实中，托卡马克用超强磁场约束上亿度的等离子体实现聚变。方舟反应堆 = 微型托卡马克 + 钯元素催化 + 环形磁约束。\n\n你的任务：调节磁场强度和等离子体温度，让聚变反应稳定输出 3GJ 能量，驱动钢铁侠战甲！',goals:['点燃等离子体（温度>1亿度）','磁约束成功（等离子体不逃逸）','稳定输出能量驱动战甲'],learn:'方舟反应堆在现实中最接近的技术是<b>托卡马克</b>（如ITER）和<b>仿星器</b>。核心挑战：用磁场把1亿度的等离子体悬浮在真空中，不能碰到任何容器壁。2025年人类已实现聚变点火（NIF），但持续稳定输出仍是终极难题。钢铁侠的方舟反应堆，本质上是一个拳头大小的完美托卡马克——这是人类核聚变的终极梦想。'}
];

function resize(){CW=canvas.width=innerWidth;CH=canvas.height=innerHeight;initStars()}
function initStars(){stars=[];for(let i=0;i<80;i++)stars.push({x:Math.random()*CW,y:Math.random()*CH,r:Math.random()*1.5+.3,tw:Math.random()*Math.PI*2,sp:Math.random()*.02+.005})}
function drawStars(){if(!t().showStars)return;for(let s of stars){const a=.4+.6*Math.abs(Math.sin(s.tw+time*s.sp));ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()}}
function addP(x,y,vx,vy,col,life,sz){particles.push({x,y,vx,vy,col,life,ml:life,sz:sz||3})}
function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<=0)particles.splice(i,1)}}
function drawParticles(){for(let p of particles){const a=Math.max(0,p.life/p.ml);ctx.globalAlpha=a;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*a,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
window.addEventListener('resize',resize);
resize();

function startGame(){
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('panel').style.display='block';
  document.getElementById('bottom-bar').style.display='flex';
  gameState='play';currentLevel=0;initLevel(0);renderPanel();
  playSound('click');
}

function initLevel(idx){
  currentLevel=idx;particles=[];celebrationParticles=[];
  levelFadeAlpha=0; // 淡入效果
  const L=levels[idx];
  if(idx===0){
    levelState={protons:0,neutrons:0,electrons:[],nucleons:[],goalDone:[false,false]};
  } else if(idx===1){
    levelState={phase:'ready',uranium:{x:0,y:0,r:40},neutron:null,products:[],freeNeutrons:[],flash:0,goalDone:[false,false,false]};
  } else if(idx===2){
    const nuclei=[];const cx=CW/2+160,cy=CH/2;
    for(let i=0;i<25;i++){const a=Math.random()*Math.PI*2,d=Math.random()*120+20;nuclei.push({x:cx+Math.cos(a)*d,y:cy+Math.sin(a)*d,r:18,alive:true,flash:0})}
    levelState={nuclei,neutrons:[],generation:0,fissionCount:0,totalEnergy:0,started:false,goalDone:[false,false,false],choiceMade:false,choiceResult:''};
  } else if(idx===3){
    levelState={mass:10,testing:false,neutrons:[],nuclei:[],escapeCount:0,fissionCount:0,result:'',testedSub:false,testedSuper:false,foundCritical:false,goalDone:[false,false,false],jumpedToMax:false,mustTestSub:false};
  } else if(idx===4){
    levelState={temp:1000,deuterium:null,tritium:null,fusing:false,fusionCount:0,helium:null,flashAlpha:0,goalDone:[false,false,false],triedLow:false};
  } else if(idx===5){
    levelState={rodDepth:80,power:50,temp:300,neutronFlux:50,stable:false,stableTime:0,meltdown:false,shutdown:false,elapsed:0,neutrons:[],goalDone:[false,false,true],reactorDone:false,
      event:null,eventTimer:0,eventCountdown:0,eventFailed:false,nextEventTime:8+Math.random()*5};
  } else if(idx===6){
    levelState={magField:0,plasmaTemp:0,plasma:[],energy:0,outputPower:0,confined:true,ignited:false,suitPowered:false,elapsed:0,arcDone:false,goalDone:[false,false,false],ringParticles:[]};
  }
  renderPanel();
}

function renderPanel(){
  const L=levels[currentLevel],S=levelState,p=document.getElementById('panel');
  let h='<div style="margin-bottom:8px">';
  for(let i=0;i<levels.length;i++){
    let cls='level-btn';if(i===currentLevel)cls+=' active';if(completedLevels.has(i))cls+=' done';
    h+=`<span class="${cls}" onclick="switchLevel(${i})">第${i+1}关</span>`;
  }
  h+='</div>';
  h+=`<div class="m-title">${L.title}</div><div class="m-sub">${L.sub}</div>`;
  h+=`<div class="concept-box">${L.concept}</div>`;
  h+='<div style="margin:8px 0;font-size:12px;color:var(--text-muted);font-weight:600">目标清单</div>';
  for(let i=0;i<L.goals.length;i++){
    const done=S.goalDone&&S.goalDone[i];
    h+=`<div class="goal-row"><span class="g-icon">${done?'✅':'⬜'}</span><span class="g-text${done?' done':''}">${L.goals[i]}</span></div>`;
  }
  // actions per level
  h+=renderLevelActions();
  const allGoalsDone = S.goalDone&&S.goalDone.every(g=>g);
  if(allGoalsDone && !quizPassed.has(currentLevel)){
    h+=`<div class="learn-box">🎓 ${L.learn}</div>`;
    h+=renderQuiz(currentLevel);
  } else if(allGoalsDone && quizPassed.has(currentLevel)){
    h+=`<div class="learn-box">🎓 ${L.learn}</div>`;
    h+=`<div style="text-align:center;color:#4ade80;font-size:14px;margin:6px 0">✅ 测验已通过</div>`;
    if(currentLevel<levels.length-1)h+=`<button class="act-btn green" onclick="switchLevel(${currentLevel+1})">下一关 →</button>`;
    else h+=`${_summaryHTML()}`;
  }
  p.innerHTML=h;
  // bottom bar
  document.getElementById('bbLeft').textContent=`第 ${currentLevel+1} 关：${L.title}`;
  document.getElementById('bbRight').textContent=`${completedLevels.size}/${levels.length} 已完成`;
}

function switchLevel(i){playSound('click');initLevel(i);renderPanel()}

function renderLevelActions(){
  const S=levelState;let h='';
  if(currentLevel===0){
    h+=`<div style="margin:8px 0;font-size:12px;color:var(--sv)">质子: <span class="sv">${S.protons}</span> 　中子: <span class="sv">${S.neutrons}</span> 　元素: <span class="sv">${S.protons>0?getElement(S.protons):'-'}</span></div>`;
    h+=`<button class="act-btn" onclick="doAction('addProton')">+ 质子（红）</button>`;
    h+=`<button class="act-btn" onclick="doAction('addNeutron')">+ 中子（蓝）</button>`;
    h+=`<button class="act-btn" onclick="doAction('add10p')">+ 10个质子</button>`;
    h+=`<button class="act-btn" onclick="doAction('add10n')">+ 10个中子</button>`;
    h+=`<button class="act-btn green" onclick="doAction('buildU235')">直接构建铀-235</button>`;
    h+=`<button class="act-btn" style="border-color:#e44;color:#f88" onclick="doAction('resetAtom')">重置</button>`;
  } else if(currentLevel===1){
    h+=`<div class="hint-box">💡 点击"发射中子"，观察铀-235的裂变过程</div>`;
    h+=`<button class="act-btn" onclick="doAction('fireNeutron')" ${S.phase!=='ready'?'disabled':''}>发射中子 →</button>`;
    if(S.phase==='done')h+=`<button class="act-btn" onclick="doAction('resetFission')">再来一次</button>`;
    if(S.products.length>0)h+=`<div style="margin:8px 0;font-size:12px;color:#fbbf24">产物: 钡-141 + 氪-92 + ${S.freeNeutrons.length}个中子<br>释放能量: ~200 MeV</div>`;
  } else if(currentLevel===2){
    h+=`<div style="margin:8px 0;font-size:12px;color:var(--sv)">代数: <span class="sv">${S.generation}</span> 　裂变: <span class="sv">${S.fissionCount}</span>/${S.nuclei.length} 　能量: <span class="sv">${(S.totalEnergy).toFixed(0)}</span> MeV</div>`;
    h+=`<button class="act-btn" onclick="doAction('startChain')" ${S.started?'disabled':''}>发射第一个中子</button>`;
    if(S.fissionCount>=S.nuclei.length&&!S.choiceMade){
      h+=`<div style="margin:8px 0;font-size:12px;color:#fbbf24;font-weight:600">⚡ 链式反应完成！你要如何利用这股能量？</div>`;
      h+=`<div class="chain-choice"><button class="btn-control" onclick="doAction('chainControl')">🔧 加入控制棒<br><span style="font-size:10px;font-weight:400">减缓反应→核电站</span></button>`;
      h+=`<button class="btn-uncontrol" onclick="doAction('chainUncontrol')">💥 不加控制<br><span style="font-size:10px;font-weight:400">反应失控→核弹</span></button></div>`;
    }
    if(S.choiceMade){
      h+=`<div style="margin:8px 0;padding:8px;border-radius:8px;font-size:12px;line-height:1.6;${S.choiceResult==='control'?'background:var(--chain-ctrl-bg);border:1px solid #22c55e;color:var(--chain-ctrl-text)':'background:var(--chain-unctrl-bg);border:1px solid #ef4444;color:var(--chain-unctrl-text)'}">`;
      if(S.choiceResult==='control'){
        h+=`✅ <b>受控链式反应</b><br>控制棒吸收多余中子，反应速率稳定。这就是核电站的原理——安全、持续地释放能量发电。`;
      } else {
        h+=`💥 <b>失控链式反应</b><br>没有控制棒，中子指数增长，在微秒内释放所有能量——这就是核弹！1公斤铀-235 = 20000吨TNT。`;
      }
      h+=`</div>`;
      h+=`<button class="act-btn" onclick="doAction('resetChain')">重置</button>`;
    } else if(S.fissionCount>0&&S.fissionCount<S.nuclei.length){
      h+=`<button class="act-btn" onclick="doAction('resetChain')">重置</button>`;
    }
  } else if(currentLevel===3){
    h+=`<div class="slider-wrap"><label>铀块质量: <span class="sv">${S.mass} kg</span></label><input type="range" min="1" max="60" value="${S.mass}" oninput="doAction('setMass',this.value)"></div>`;
    h+=`<div style="font-size:12px;color:var(--text-muted);margin:4px 0">状态: <span class="sv">${S.result||'待测试'}</span></div>`;
    if(S.mustTestSub){
      h+=`<div style="background:var(--concept-bg);border:1px solid #f59e0b;border-radius:8px;padding:8px;margin:8px 0;font-size:12px;color:#d97706">⚠️ 直接超临界会导致不可控爆炸！请先测试亚临界（<15kg）再测试超临界。</div>`;
    }
    h+=`<button class="act-btn" onclick="doAction('testCritical')" ${S.testing?'disabled':''}>测试</button>`;
  } else if(currentLevel===4){
    h+=`<div class="slider-wrap"><label>温度: <span class="sv">${formatTemp(S.temp)}</span></label><input type="range" min="0" max="200" value="${S.temp/1e6}" oninput="doAction('setTemp',this.value)"></div>`;
    h+=`<div style="font-size:12px;color:var(--text-muted);margin:4px 0">聚变次数: <span class="sv">${S.fusionCount}</span></div>`;
    h+=`<div class="hint-box">💡 调节温度到1亿度以上，观察氘氚聚变</div>`;
  } else if(currentLevel===5){
    h+=`<div class="slider-wrap"><label>控制棒插入深度: <span class="sv">${S.rodDepth}%</span></label><input type="range" min="0" max="100" value="${S.rodDepth}" oninput="doAction('setRod',this.value)"></div>`;
    h+=`<div style="font-size:12px;color:var(--sv);margin:4px 0">功率: <span class="sv">${S.power.toFixed(0)} MW</span></div>`;
    h+=`<div style="font-size:12px;color:${S.temp>800?'#f87171':S.temp>500?'#fbbf24':'#4ade80'};margin:2px 0">温度: <span class="sv">${S.temp.toFixed(0)} °C</span></div>`;
    h+=`<div style="font-size:12px;color:var(--text-muted);margin:2px 0">中子通量: <span class="sv">${S.neutronFlux.toFixed(0)}</span></div>`;
    if(S.stable)h+=`<div style="font-size:12px;color:#4ade80;margin:4px 0">✅ 稳定运行: ${S.stableTime.toFixed(1)}s / 30s</div>`;
    if(S.event&&!S.eventFailed){
      h+=`<div class="event-alert"><div style="font-size:13px;color:#dc2626;font-weight:700">⚠️ ${S.event.name}</div>`;
      h+=`<div style="font-size:12px;color:var(--text-sub);margin:2px 0">${S.event.desc}</div>`;
      h+=`<div style="font-size:12px;color:#991b1b">剩余时间: <span class="sv">${Math.max(0,S.eventCountdown).toFixed(1)}s</span></div></div>`;
    }
    if(S.eventFailed){
      h+=`<div style="background:var(--concept-bg);border:1px solid #ef4444;border-radius:8px;padding:8px;margin:8px 0;font-size:12px;color:#dc2626">⚠️ 未能及时处理事件，温度急升200°C！注意控制！</div>`;
    }
    if(S.meltdown)h+=`<div style="font-size:14px;color:#dc2626;font-weight:700;margin:8px 0">⚠️ 熔毁！反应堆失控！</div><button class="act-btn" onclick="doAction('resetReactor')">重置反应堆</button>`;
    if(S.shutdown)h+=`<div style="font-size:12px;color:var(--text-muted);margin:4px 0">反应堆已停堆</div><button class="act-btn" onclick="doAction('resetReactor')">重置反应堆</button>`;
  } else if(currentLevel===6){
    h+=`<div class="slider-wrap"><label>磁场强度: <span class="sv">${S.magField.toFixed(1)} T</span></label><input type="range" min="0" max="100" value="${S.magField*10}" oninput="doAction('setMag',this.value)"></div>`;
    h+=`<div class="slider-wrap"><label>等离子体加热: <span class="sv">${formatTemp(S.plasmaTemp)}</span></label><input type="range" min="0" max="200" value="${S.plasmaTemp/1e6}" oninput="doAction('setPlasma',this.value)"></div>`;
    const confColor=S.confined?'#4ade80':'#f87171';
    h+=`<div style="font-size:12px;color:${confColor};margin:4px 0">磁约束: <span class="sv">${S.confined?'稳定':'等离子体逃逸！'}</span></div>`;
    h+=`<div style="font-size:12px;color:var(--sv);margin:2px 0">输出功率: <span class="sv">${S.outputPower.toFixed(0)} MW</span></div>`;
    h+=`<div style="font-size:12px;color:#fbbf24;margin:2px 0">累计能量: <span class="sv">${S.energy.toFixed(1)} GJ</span> / 3.0 GJ</div>`;
    if(S.suitPowered)h+=`<div style="font-size:14px;color:#4ade80;font-weight:700;margin:8px 0;text-align:center">🦾 战甲已激活！</div>`;
    if(!S.confined&&!S.arcDone)h+=`<button class="act-btn" onclick="doAction('resetArc')">重置反应堆</button>`;
    const reqMag=(2+S.plasmaTemp/1e8*2).toFixed(1);
    h+=`<div style="font-size:11px;color:var(--text-muted);margin:2px 0">当前所需磁场: <span class="sv">${reqMag} T</span></div>`;
    h+=`<div class="hint-box">💡 先提高磁场约束等离子体（绿色=稳定），再加热到1亿度以上点燃聚变。两个滑块需要配合调节！</div>`;
  }
  return h;
}
function formatTemp(t){if(t>=1e8)return(t/1e8).toFixed(1)+'亿°C';if(t>=1e6)return(t/1e6).toFixed(0)+'百万°C';if(t>=1e4)return(t/1e4).toFixed(0)+'万°C';return t.toFixed(0)+'°C'}

function doAction(action,param){
  const S=levelState;
  if(currentLevel===0){
    if(action==='addProton'){S.protons=Math.min(S.protons+1,92);addNucleon('p');checkL0();playSound('click')}
    else if(action==='addNeutron'){S.neutrons=Math.min(S.neutrons+1,143);addNucleon('n');checkL0();playSound('click')}
    else if(action==='add10p'){S.protons=Math.min(S.protons+10,92);rebuildNucleons();checkL0();playSound('click')}
    else if(action==='add10n'){S.neutrons=Math.min(S.neutrons+10,143);rebuildNucleons();checkL0();playSound('click')}
    else if(action==='buildU235'){S.protons=92;S.neutrons=143;rebuildNucleons();checkL0();playSound('click')}
    else if(action==='resetAtom'){S.protons=0;S.neutrons=0;S.nucleons=[];S.electrons=[];S.goalDone=[false,false];playSound('click')}
  } else if(currentLevel===1){
    if(action==='fireNeutron'&&S.phase==='ready'){
      const cx=CW/2+160,cy=CH/2;
      S.neutron={x:cx-300,y:cy,vx:300,vy:0};S.phase='flying';S.goalDone[0]=true;playSound('click');
    } else if(action==='resetFission'){
      S.phase='ready';S.neutron=null;S.products=[];S.freeNeutrons=[];S.flash=0;S.goalDone=[false,false,false];
    }
  } else if(currentLevel===2){
    if(action==='startChain'&&!S.started){
      S.started=true;S.goalDone[0]=true;
      const first=S.nuclei.find(n=>n.alive);
      if(first){const cx=CW/2+160,cy=CH/2;S.neutrons.push({x:cx-250,y:cy,vx:200,vy:0,gen:1})}
    } else if(action==='chainControl'){
      S.choiceMade=true;S.choiceResult='control';playSound('success');
      S.goalDone[2]=true;completeLevel(2);
    } else if(action==='chainUncontrol'){
      S.choiceMade=true;S.choiceResult='uncontrol';playSound('boom');
      S.goalDone[2]=true;completeLevel(2);
      const cx=CW/2+160,cy=CH/2;
      for(let i=0;i<60;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*300+80;addP(cx,cy,Math.cos(a)*sp,Math.sin(a)*sp,'#f87171',1.5,4)}
      screenShake.intensity=15;
    } else if(action==='resetChain'){initLevel(2)}
  } else if(currentLevel===3){
    if(action==='setMass'){S.mass=parseInt(param);S.result='';S.testing=false;S.neutrons=[];S.nuclei=[];S.escapeCount=0;S.fissionCount=0;S.mustTestSub=false}
    else if(action==='testCritical'&&!S.testing){
      // 如果直接拉到60kg且没测试过亚临界，弹出警告
      if(S.mass>=60&&!S.testedSub){
        S.mustTestSub=true;playSound('alert');renderPanel();return;
      }
      S.mustTestSub=false;
      startCriticalTest();
    }
  } else if(currentLevel===4){
    if(action==='setTemp'){S.temp=parseFloat(param)*1e6;if(S.temp<5e7&&!S.triedLow){S.triedLow=true;S.goalDone[0]=true}resetFusionParticles()}
  } else if(currentLevel===5){
    if(action==='setRod'){S.rodDepth=parseInt(param)}
    else if(action==='resetReactor'){initLevel(5)}
  } else if(currentLevel===6){
    if(action==='setMag'){S.magField=parseInt(param)/10}
    else if(action==='setPlasma'){S.plasmaTemp=parseFloat(param)*1e6}
    else if(action==='resetArc'){initLevel(6)}
  }
  renderPanel();
}

function addNucleon(type){
  const S=levelState,cx=CW/2+160,cy=CH/2;
  const a=Math.random()*Math.PI*2,d=Math.random()*8;
  S.nucleons.push({type,x:cx+Math.cos(a)*d,y:cy+Math.sin(a)*d,tx:0,ty:0,bounce:1});
  arrangeNucleons();
  if(S.protons>0&&S.electrons.length<Math.min(S.protons,6)){
    const layer=S.electrons.length<2?0:1;
    S.electrons.push({angle:Math.random()*Math.PI*2,speed:.5+Math.random()*.5,layer,rx:50+layer*30,ry:30+layer*20});
  }
}
function rebuildNucleons(){
  const S=levelState;S.nucleons=[];S.electrons=[];
  for(let i=0;i<S.protons;i++)S.nucleons.push({type:'p',x:0,y:0,tx:0,ty:0,bounce:0});
  for(let i=0;i<S.neutrons;i++)S.nucleons.push({type:'n',x:0,y:0,tx:0,ty:0,bounce:0});
  arrangeNucleons();
  const eLayers=[Math.min(S.protons,2),Math.min(Math.max(S.protons-2,0),8),Math.min(Math.max(S.protons-10,0),18)];
  for(let layer=0;layer<3;layer++){for(let i=0;i<Math.min(eLayers[layer],6);i++){
    S.electrons.push({angle:Math.random()*Math.PI*2+i*(Math.PI*2/Math.max(eLayers[layer],1)),speed:.3+layer*.2+Math.random()*.2,layer,rx:50+layer*25,ry:35+layer*18});
  }}
}
function arrangeNucleons(){
  const S=levelState,cx=CW/2+160,cy=CH/2,total=S.nucleons.length;
  if(total===0)return;
  const r=Math.max(6,Math.pow(total,0.45)*5);
  // spiral packing
  for(let i=0;i<total;i++){
    const a=i*2.4,d=Math.sqrt(i/total)*r;
    S.nucleons[i].tx=cx+Math.cos(a)*d;S.nucleons[i].ty=cy+Math.sin(a)*d;
    if(S.nucleons[i].bounce<=0){S.nucleons[i].x=S.nucleons[i].tx;S.nucleons[i].y=S.nucleons[i].ty}
  }
}
function checkL0(){
  const S=levelState;
  if(S.protons>0)S.goalDone[0]=true;
  if(S.protons===92&&S.neutrons===143){S.goalDone[1]=true;completeLevel(0)}
  renderPanel();
}

// Level 1: fission
function updateFission(dt){
  const S=levelState;if(currentLevel!==1)return;
  const cx=CW/2+160,cy=CH/2;
  if(S.phase==='flying'&&S.neutron){
    S.neutron.x+=S.neutron.vx*dt;S.neutron.y+=S.neutron.vy*dt;
    const dx=S.neutron.x-cx,dy=S.neutron.y-cy;
    if(Math.sqrt(dx*dx+dy*dy)<S.uranium.r){
      S.phase='splitting';S.splitTime=0;S.neutron=null;S.goalDone[0]=true;
    }
    if(S.neutron&&S.neutron.x>CW)S.phase='ready';
  }
  if(S.phase==='splitting'){
    S.splitTime+=dt;
    if(S.splitTime>.8&&S.products.length===0){
      S.products=[{x:cx-60,y:cy,vx:-80,vy:-30,r:22,col:'#a78bfa'},{x:cx+60,y:cy,vx:80,vy:30,r:18,col:'#34d399'}];
      for(let i=0;i<3;i++){const a=Math.random()*Math.PI*2;S.freeNeutrons.push({x:cx,y:cy,vx:Math.cos(a)*200,vy:Math.sin(a)*200})}
      S.flash=1;S.goalDone[1]=true;S.goalDone[2]=true;
      for(let i=0;i<30;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*200+50;addP(cx,cy,Math.cos(a)*sp,Math.sin(a)*sp,'#fbbf24',1,3)}
      S.phase='done';completeLevel(1);renderPanel();playSound('boom');
    }
  }
  if(S.flash>0)S.flash-=dt*2;
  for(let p of S.products){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.98;p.vy*=.98}
  for(let n of S.freeNeutrons){n.x+=n.vx*dt;n.y+=n.vy*dt}
}

// Level 2: chain reaction
function updateChain(dt){
  const S=levelState;if(currentLevel!==2||!S.started)return;
  for(let i=S.neutrons.length-1;i>=0;i--){
    const n=S.neutrons[i];n.x+=n.vx*dt;n.y+=n.vy*dt;
    if(n.x<0||n.x>CW||n.y<0||n.y>CH){S.neutrons.splice(i,1);continue}
    for(let nuc of S.nuclei){
      if(!nuc.alive)continue;
      const dx=n.x-nuc.x,dy=n.y-nuc.y;
      if(Math.sqrt(dx*dx+dy*dy)<nuc.r+4){
        nuc.alive=false;nuc.flash=1;S.fissionCount++;S.totalEnergy+=200;
        S.generation=Math.max(S.generation,n.gen);
        for(let j=0;j<(2+Math.floor(Math.random()*2));j++){
          const a=Math.random()*Math.PI*2;S.neutrons.push({x:nuc.x,y:nuc.y,vx:Math.cos(a)*180,vy:Math.sin(a)*180,gen:n.gen+1});
        }
        for(let k=0;k<15;k++){const a=Math.random()*Math.PI*2,sp=Math.random()*150+30;addP(nuc.x,nuc.y,Math.cos(a)*sp,Math.sin(a)*sp,'#fbbf24',.8,2)}
        S.neutrons.splice(i,1);if(S.fissionCount%5===0)playSound('boom');break;
      }
    }
  }
  for(let nuc of S.nuclei)if(nuc.flash>0)nuc.flash-=dt*3;
  if(S.generation>=2)S.goalDone[1]=true;
  // 安全网：中子全飞走但还有活铀核，自动补发中子继续反应
  const aliveNuclei=S.nuclei.filter(n=>n.alive);
  if(S.neutrons.length===0&&aliveNuclei.length>0&&S.fissionCount>0){
    const t=aliveNuclei[0];
    const a=Math.random()*Math.PI*2;
    S.neutrons.push({x:t.x+Math.cos(a)*30,y:t.y+Math.sin(a)*30,vx:Math.cos(a+Math.PI)*180,vy:Math.sin(a+Math.PI)*180,gen:S.generation+1});
  }
  if(aliveNuclei.length===0){S.started=false;renderPanel();}
  if(S.started)renderPanel();
}

// Level 3: critical mass
function startCriticalTest(){
  const S=levelState;S.testing=true;S.neutrons=[];S.nuclei=[];S.escapeCount=0;S.fissionCount=0;
  const cx=CW/2+160,cy=CH/2;
  const radius=20+S.mass*1.5;
  const numNuclei=Math.floor(S.mass/3);
  for(let i=0;i<numNuclei;i++){const a=Math.random()*Math.PI*2,d=Math.random()*radius*.8;S.nuclei.push({x:cx+Math.cos(a)*d,y:cy+Math.sin(a)*d,alive:true,flash:0})}
  const a=Math.random()*Math.PI*2;
  S.neutrons.push({x:cx+Math.cos(a)*radius*.5,y:cy+Math.sin(a)*radius*.5,vx:Math.cos(a+Math.PI)*150,vy:Math.sin(a+Math.PI)*150});
  S.boundaryR=radius;
}
function updateCritical(dt){
  const S=levelState;if(currentLevel!==3||!S.testing)return;
  const cx=CW/2+160,cy=CH/2;
  for(let i=S.neutrons.length-1;i>=0;i--){
    const n=S.neutrons[i];n.x+=n.vx*dt;n.y+=n.vy*dt;
    const dx=n.x-cx,dy=n.y-cy,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>S.boundaryR){S.neutrons.splice(i,1);S.escapeCount++;continue}
    for(let nuc of S.nuclei){
      if(!nuc.alive)continue;
      const ndx=n.x-nuc.x,ndy=n.y-nuc.y;
      if(Math.sqrt(ndx*ndx+ndy*ndy)<10){
        nuc.alive=false;nuc.flash=1;S.fissionCount++;
        for(let j=0;j<(2+Math.floor(Math.random()*2));j++){const a=Math.random()*Math.PI*2;S.neutrons.push({x:nuc.x,y:nuc.y,vx:Math.cos(a)*150,vy:Math.sin(a)*150})}
        for(let k=0;k<8;k++){const a=Math.random()*Math.PI*2,sp=Math.random()*100+20;addP(nuc.x,nuc.y,Math.cos(a)*sp,Math.sin(a)*sp,'#fbbf24',.6,2)}
        S.neutrons.splice(i,1);break;
      }
    }
  }
  for(let nuc of S.nuclei)if(nuc.flash>0)nuc.flash-=dt*3;
  if(S.neutrons.length===0&&S.testing){
    S.testing=false;
    const ratio=S.fissionCount/Math.max(S.nuclei.length,1);
    if(S.mass<15){S.result='亚临界：中子逃逸了';S.testedSub=true;S.goalDone[0]=true}
    else if(S.mass>=50){S.result='超临界！持续链式反应！';S.testedSuper=true;S.goalDone[1]=true}
    else{S.result=`部分反应 (${(ratio*100).toFixed(0)}%)，逐渐衰减`}
    if(S.mass>=50&&S.mass<=54){S.foundCritical=true;S.goalDone[2]=true}
    if(S.goalDone.every(g=>g))completeLevel(3);
    renderPanel();
  }
}

// Level 4: fusion
function resetFusionParticles(){
  const S=levelState,cx=CW/2+160,cy=CH/2;
  S.deuterium={x:cx-60,y:cy,vx:0,vy:0,r:14};
  S.tritium={x:cx+60,y:cy,vx:0,vy:0,r:16};
  S.helium=null;S.fusing=false;
}
function updateFusion(dt){
  const S=levelState;if(currentLevel!==4)return;
  const cx=CW/2+160,cy=CH/2;
  if(!S.deuterium)resetFusionParticles();
  if(S.fusing)return;
  const speed=Math.min(S.temp/1e7,20);
  // thermal motion
  S.deuterium.vx+=(Math.random()-.5)*speed*30*dt;S.deuterium.vy+=(Math.random()-.5)*speed*30*dt;
  S.tritium.vx+=(Math.random()-.5)*speed*30*dt;S.tritium.vy+=(Math.random()-.5)*speed*30*dt;
  // spring back to center
  S.deuterium.vx+=(cx-40-S.deuterium.x)*.5*dt;S.deuterium.vy+=(cy-S.deuterium.y)*.5*dt;
  S.tritium.vx+=(cx+40-S.tritium.x)*.5*dt;S.tritium.vy+=(cy-S.tritium.y)*.5*dt;
  S.deuterium.x+=S.deuterium.vx*dt;S.deuterium.y+=S.deuterium.vy*dt;
  S.tritium.x+=S.tritium.vx*dt;S.tritium.y+=S.tritium.vy*dt;
  // collision check
  const dx=S.deuterium.x-S.tritium.x,dy=S.deuterium.y-S.tritium.y,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<S.deuterium.r+S.tritium.r){
    if(S.temp>=5e7&&Math.random()<(S.temp>=1e8?.8:.2)){
      // fusion!
      S.fusing=true;S.fusionCount++;S.flashAlpha=1.5;
      S.helium={x:(S.deuterium.x+S.tritium.x)/2,y:(S.deuterium.y+S.tritium.y)/2,r:18};
      S.goalDone[1]=true;S.goalDone[2]=true;
      for(let i=0;i<40;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*250+50;addP(S.helium.x,S.helium.y,Math.cos(a)*sp,Math.sin(a)*sp,'#fff',1.2,3)}
      if(S.goalDone.every(g=>g))completeLevel(4);
      setTimeout(()=>{S.fusing=false;S.helium=null;resetFusionParticles();renderPanel()},2000);
      renderPanel();
    } else {
      // repulsion
      const nx=dx/dist,ny=dy/dist;
      S.deuterium.vx+=nx*100;S.deuterium.vy+=ny*100;
      S.tritium.vx-=nx*100;S.tritium.vy-=ny*100;
      if(S.temp<5e7){S.goalDone[0]=true;renderPanel()}
    }
  }
  if(S.flashAlpha>0)S.flashAlpha-=dt*2;
}

// Level 5: reactor
const reactorEvents = [
  {name:'冷却泵故障',desc:'冷却效率下降！稍微增加控制棒深度来降温。',effect:'cooling',rodExtra:12},
  {name:'中子通量异常',desc:'中子通量波动！稍微增加控制棒深度来抑制。',effect:'flux',rodExtra:10},
  {name:'蒸汽管道泄漏',desc:'蒸汽压力下降！稍微减少控制棒深度补偿功率。',effect:'steam',rodExtra:-8}
];
function updateReactor(dt){
  const S=levelState;if(currentLevel!==5||S.meltdown||S.shutdown||S.reactorDone)return;
  S.elapsed+=dt;
  // 随机扰动事件（首次事件延迟更久，给玩家适应时间）
  if(!S.event&&S.elapsed>=S.nextEventTime&&S.stable&&S.stableTime>5){
    const ev=reactorEvents[Math.floor(Math.random()*reactorEvents.length)];
    S.event={...ev};S.eventCountdown=15;S.eventFailed=false;S.eventBaseRod=S.rodDepth;
    playSound('alert');renderPanel();
  }
  if(S.event&&!S.eventFailed){
    S.eventCountdown-=dt;
    // 事件效果（减弱扰动强度）
    if(S.event.effect==='cooling')S.temp+=dt*40;
    else if(S.event.effect==='flux')S.neutronFlux+=dt*8;
    else if(S.event.effect==='steam')S.power-=dt*15;
    // 检查是否处理成功（控制棒相对偏移足够）
    const delta=S.rodDepth-S.eventBaseRod;
    const needed=S.event.rodExtra;
    if((needed>0&&delta>=needed)||(needed<0&&delta<=needed)){
      S.event=null;S.nextEventTime=S.elapsed+12+Math.random()*10;renderPanel();
    }
    // 超时未处理→温度飙升（不直接熔毁，给缓冲）
    if(S.eventCountdown<=0){
      S.eventFailed=true;S.eventFailTimer=3;S.temp+=200;
      playSound('fail');
      S.event=null;S.nextEventTime=S.elapsed+15+Math.random()*8;
      renderPanel();
    }
  }
  // eventFailed 提示3秒后自动消失
  if(S.eventFailed){S.eventFailTimer-=dt;if(S.eventFailTimer<=0)S.eventFailed=false;}
  // rod depth affects neutron absorption: 100%=all absorbed, 0%=none absorbed
  const absorb=S.rodDepth/100;
  const targetFlux=100*(1-absorb);
  S.neutronFlux+=(targetFlux-S.neutronFlux)*dt*1.5;
  // power follows neutron flux (降低倍率，让功率范围更宽)
  const targetPower=S.neutronFlux*6;
  S.power+=(targetPower-S.power)*dt*1.2;
  // temperature: 更强的冷却系统，平衡更容易
  const cooling=300 + (S.temp - 100) * 2.0;
  S.temp+=(S.power*1.2-cooling)*dt*.4;
  S.temp=Math.max(100,S.temp);
  // spawn visual neutrons
  const cx=CW/2+160,cy=CH/2;
  if(Math.random()<S.neutronFlux*dt*.3){
    const a=Math.random()*Math.PI*2,d=30+Math.random()*40;
    S.neutrons.push({x:cx+Math.cos(a)*d,y:cy+Math.sin(a)*d,vx:Math.cos(a)*60,vy:Math.sin(a)*60,life:1});
  }
  for(let i=S.neutrons.length-1;i>=0;i--){
    const n=S.neutrons[i];n.x+=n.vx*dt;n.y+=n.vy*dt;n.life-=dt;
    if(n.life<=0)S.neutrons.splice(i,1);
  }
  // check goals（放宽功率范围 400-650MW）
  if(S.power>=400&&S.power<=650){
    if(!S.stable){S.stable=true;S.stableTime=0;S.goalDone[0]=true}
    S.stableTime+=dt;
    if(S.stableTime>=30){S.goalDone[1]=true;S.reactorDone=true;completeLevel(5);renderPanel()}
  } else {S.stable=false;S.stableTime=0}
  // meltdown（提高阈值到1500°C）
  if(S.temp>1500){S.meltdown=true;S.goalDone[2]=false;playSound('fail');
    screenShake.intensity=20;
    for(let i=0;i<50;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*200+50;addP(cx,cy,Math.cos(a)*sp,Math.sin(a)*sp,'#f87171',2,4)}
  }
  if(S.power<5&&S.elapsed>5)S.shutdown=true;
  if(S.elapsed%0.3<dt)renderPanel();
}

function completeLevel(idx){completedLevels.add(idx);playSound('success');renderPanel()}

// Level 6: Arc Reactor
function updateArc(dt){
  const S=levelState;if(currentLevel!==6||S.arcDone)return;
  S.elapsed+=dt;
  // 磁约束：磁场>5T才能约束等离子体，温度越高需要的磁场越强
  const requiredMag=2+S.plasmaTemp/1e8*2;
  S.confined=S.magField>=requiredMag;
  // 聚变条件：温度>1亿度 且 磁约束成功
  S.ignited=S.plasmaTemp>=1e8&&S.confined;
  if(S.plasmaTemp>=1e8&&S.confined)S.goalDone[0]=true;
  if(S.magField>=5&&S.confined&&S.plasmaTemp>1e7)S.goalDone[1]=true;
  // 输出功率
  if(S.ignited){
    const efficiency=Math.min(1,(S.plasmaTemp-1e8)/1e8);
    S.outputPower=200+efficiency*600;
    S.energy+=S.outputPower*dt/1000;
  } else {
    S.outputPower*=0.9;
    if(S.outputPower<1)S.outputPower=0;
  }
  // 等离子体逃逸时重置能量积累
  if(!S.confined&&S.plasmaTemp>1e7){
    S.outputPower=0;
    const cx=CW/2+160,cy=CH/2;
    for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*100+50;addP(cx,cy,Math.cos(a)*sp,Math.sin(a)*sp,'#60a5fa',1,3)}
  }
  // 驱动战甲
  if(S.energy>=3&&!S.suitPowered){
    S.suitPowered=true;S.goalDone[2]=true;S.arcDone=true;completeLevel(6);renderPanel();
  }
  // 环形等离子体粒子
  if(S.confined&&S.plasmaTemp>1e7){
    const cx=CW/2+160,cy=CH/2,r=60;
    if(Math.random()<0.3){
      const a=Math.random()*Math.PI*2;
      S.ringParticles.push({angle:a,r:r+(Math.random()-0.5)*10,speed:2+Math.random()*2,life:1,
        color:S.ignited?'#fbbf24':'#60a5fa'});
    }
  }
  for(let i=S.ringParticles.length-1;i>=0;i--){
    const p=S.ringParticles[i];p.angle+=p.speed*dt;p.life-=dt*0.5;
    if(p.life<=0)S.ringParticles.splice(i,1);
  }
  if(S.elapsed%0.3<dt)renderPanel();
}

function drawLevel0(){
  const S=levelState,cx=CW/2+160,cy=CH/2;
  // electron orbits
  ctx.strokeStyle=t().shell;ctx.lineWidth=1;
  for(let e of S.electrons){
    ctx.beginPath();ctx.ellipse(cx,cy,e.rx,e.ry,0,0,Math.PI*2);ctx.stroke();
  }
  // nucleons
  for(let n of S.nucleons){
    const bx=n.bounce>0?Math.sin(n.bounce*10)*3:0;
    ctx.fillStyle=n.type==='p'?'#ef4444':'#3b82f6';
    ctx.beginPath();ctx.arc(n.x+bx,n.y,4+Math.min(S.nucleons.length*.02,2),0,Math.PI*2);ctx.fill();
    ctx.fillStyle=n.type==='p'?'rgba(239,68,68,0.3)':'rgba(59,130,246,0.3)';
    ctx.beginPath();ctx.arc(n.x+bx,n.y,6+Math.min(S.nucleons.length*.02,2),0,Math.PI*2);ctx.fill();
    if(n.bounce>0)n.bounce-=.02;
  }
  // electrons
  for(let e of S.electrons){
    e.angle+=e.speed*.03;
    const ex=cx+Math.cos(e.angle)*e.rx,ey=cy+Math.sin(e.angle)*e.ry;
    ctx.fillStyle=t().electron;ctx.beginPath();ctx.arc(ex,ey,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=t().electronGlow;ctx.beginPath();ctx.arc(ex,ey,5,0,Math.PI*2);ctx.fill();
  }
  // label
  if(S.protons>0){
    ctx.fillStyle=t().textSec;ctx.font='20px sans-serif';ctx.textAlign='center';
    ctx.fillText(getElement(S.protons)+'-'+(S.protons+S.neutrons),cx,cy+80);
  }
}

function drawLevel1(){
  const S=levelState,cx=CW/2+160,cy=CH/2;
  // uranium nucleus
  if(S.phase!=='done'){
    const wobble=S.phase==='splitting'?Math.sin(S.splitTime*20)*S.splitTime*15:0;
    ctx.fillStyle='#22c55e';
    ctx.beginPath();ctx.ellipse(cx,cy,S.uranium.r+wobble,S.uranium.r-wobble*.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(34,197,94,0.3)';ctx.beginPath();ctx.arc(cx,cy,S.uranium.r+10,0,Math.PI*2);ctx.fill();
    // inner nucleons
    for(let i=0;i<20;i++){
      const a=i*0.7,d=Math.sqrt(i/20)*S.uranium.r*.7;
      ctx.fillStyle=i%3===0?'#ef4444':'#3b82f6';
      ctx.beginPath();ctx.arc(cx+Math.cos(a+time*.5)*d,cy+Math.sin(a+time*.5)*d,3,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle=t().label;ctx.font='18px sans-serif';ctx.textAlign='center';ctx.fillText('铀-235',cx,cy+S.uranium.r+20);
  }
  // flying neutron
  if(S.neutron){
    ctx.fillStyle='#60a5fa';ctx.beginPath();ctx.arc(S.neutron.x,S.neutron.y,5,0,Math.PI*2);ctx.fill();
    // trail
    for(let i=1;i<=5;i++){ctx.globalAlpha=.3-i*.05;ctx.beginPath();ctx.arc(S.neutron.x-S.neutron.vx*.003*i*10,S.neutron.y,4-i*.5,0,Math.PI*2);ctx.fill()}
    ctx.globalAlpha=1;
  }
  // products
  for(let p of S.products){
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  if(S.products.length===2){
    ctx.fillStyle='#a78bfa';ctx.font='17px sans-serif';ctx.textAlign='center';ctx.fillText('钡-141',S.products[0].x,S.products[0].y+S.products[0].r+14);
    ctx.fillStyle='#34d399';ctx.fillText('氪-92',S.products[1].x,S.products[1].y+S.products[1].r+14);
  }
  // free neutrons
  for(let n of S.freeNeutrons){ctx.fillStyle='#60a5fa';ctx.beginPath();ctx.arc(n.x,n.y,4,0,Math.PI*2);ctx.fill()}
  // flash
  if(S.flash>0){ctx.globalAlpha=S.flash*.5;ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(cx,cy,100*S.flash,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
}

function drawLevel2(){
  const S=levelState,cx=CW/2+160,cy=CH/2;
  for(let nuc of S.nuclei){
    if(nuc.alive){ctx.fillStyle='#22c55e';ctx.beginPath();ctx.arc(nuc.x,nuc.y,nuc.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(34,197,94,0.2)';ctx.beginPath();ctx.arc(nuc.x,nuc.y,nuc.r+6,0,Math.PI*2);ctx.fill()}
    else if(nuc.flash>0){ctx.globalAlpha=nuc.flash;ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(nuc.x,nuc.y,nuc.r*2*nuc.flash,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
  }
  for(let n of S.neutrons){ctx.fillStyle='#60a5fa';ctx.beginPath();ctx.arc(n.x,n.y,3,0,Math.PI*2);ctx.fill()}
}

function drawLevel3(){
  const S=levelState,cx=CW/2+160,cy=CH/2;
  // boundary circle
  const r=20+S.mass*1.5;
  ctx.strokeStyle='rgba(100,200,100,0.2)';ctx.lineWidth=2;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(100,200,100,0.05)';ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  // mass label
  ctx.fillStyle=t().textMut;ctx.font='18px sans-serif';ctx.textAlign='center';
  ctx.fillText(S.mass+'kg',cx,cy+r+20);
  // nuclei
  for(let nuc of S.nuclei){
    if(nuc.alive){ctx.fillStyle='#22c55e';ctx.beginPath();ctx.arc(nuc.x,nuc.y,5,0,Math.PI*2);ctx.fill()}
    else if(nuc.flash>0){ctx.globalAlpha=nuc.flash;ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(nuc.x,nuc.y,10*nuc.flash,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
  }
  for(let n of S.neutrons){ctx.fillStyle='#60a5fa';ctx.beginPath();ctx.arc(n.x,n.y,3,0,Math.PI*2);ctx.fill()}
}

function drawLevel4(){
  const S=levelState,cx=CW/2+160,cy=CH/2;
  // temperature background
  const tNorm=Math.min(S.temp/2e8,1);
  if(tNorm>.1){
    const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,300);
    grd.addColorStop(0,`rgba(${Math.floor(255*tNorm)},${Math.floor(100*tNorm)},0,${tNorm*.15})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=grd;ctx.fillRect(0,0,CW,CH);
  }
  if(S.fusing&&S.helium){
    // helium
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(S.helium.x,S.helium.y,S.helium.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(251,191,36,0.3)';ctx.beginPath();ctx.arc(S.helium.x,S.helium.y,S.helium.r+10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=t().label;ctx.font='18px sans-serif';ctx.textAlign='center';ctx.fillText('氦-4',S.helium.x,S.helium.y+S.helium.r+16);
  } else if(S.deuterium&&S.tritium){
    // deuterium
    ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(S.deuterium.x,S.deuterium.y,S.deuterium.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(239,68,68,0.3)';ctx.beginPath();ctx.arc(S.deuterium.x,S.deuterium.y,S.deuterium.r+6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=t().label;ctx.font='17px sans-serif';ctx.textAlign='center';ctx.fillText('氘',S.deuterium.x,S.deuterium.y+S.deuterium.r+14);
    // tritium
    ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(S.tritium.x,S.tritium.y,S.tritium.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(59,130,246,0.3)';ctx.beginPath();ctx.arc(S.tritium.x,S.tritium.y,S.tritium.r+6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=t().label;ctx.fillText('氚',S.tritium.x,S.tritium.y+S.tritium.r+14);
  }
  // flash
  if(S.flashAlpha>0){ctx.globalAlpha=Math.min(S.flashAlpha,.8);ctx.fillStyle=t().text;ctx.beginPath();ctx.arc(cx,cy,150*S.flashAlpha,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
}

function drawLevel5(){
  const S=levelState,cx=CW/2+160,cy=CH/2;
  // reactor vessel
  const vw=180,vh=240;
  ctx.strokeStyle='#444';ctx.lineWidth=3;ctx.strokeRect(cx-vw/2,cy-vh/2,vw,vh);
  ctx.fillStyle='rgba(30,30,60,0.5)';ctx.fillRect(cx-vw/2,cy-vh/2,vw,vh);
  // fuel rods
  const fuelGlow=Math.min(S.power/800,1);
  for(let i=0;i<5;i++){
    const fx=cx-60+i*30,fy=cy-vh/2+30,fh=vh-60;
    ctx.fillStyle=`rgba(${50+Math.floor(200*fuelGlow)},${50+Math.floor(100*fuelGlow)},20,0.8)`;
    ctx.fillRect(fx-4,fy,8,fh);
    if(fuelGlow>.2){ctx.fillStyle=`rgba(255,${Math.floor(200*(1-fuelGlow))},0,${fuelGlow*.3})`;ctx.fillRect(fx-8,fy,16,fh)}
  }
  // control rods
  const rodY=cy-vh/2+(vh*(S.rodDepth/100))*.7;
  for(let i=0;i<4;i++){
    const rx=cx-45+i*30;
    ctx.fillStyle='#666';ctx.fillRect(rx-3,cy-vh/2-10,6,rodY-(cy-vh/2)+10);
    ctx.fillStyle='#888';ctx.fillRect(rx-5,rodY-4,10,8);
  }
  // neutrons
  for(let n of S.neutrons){
    const a=Math.max(0,n.life);ctx.globalAlpha=a;ctx.fillStyle='#60a5fa';
    ctx.beginPath();ctx.arc(n.x,n.y,2,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // temperature bar
  const barX=cx+vw/2+20,barH=vh,barW=12;
  ctx.fillStyle=t().barBg;ctx.fillRect(barX,cy-vh/2,barW,barH);
  const tFill=Math.min((S.temp-100)/900,1);
  const tCol=tFill>.8?'#ef4444':tFill>.5?'#fbbf24':'#4ade80';
  ctx.fillStyle=tCol;ctx.fillRect(barX,cy-vh/2+barH*(1-tFill),barW,barH*tFill);
  ctx.fillStyle=t().label;ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText(S.temp.toFixed(0)+'°C',barX+barW/2,cy-vh/2-6);
  // meltdown effect
  if(S.meltdown){
    ctx.globalAlpha=.3+.2*Math.sin(time*10);ctx.fillStyle='#ef4444';ctx.fillRect(cx-vw/2,cy-vh/2,vw,vh);ctx.globalAlpha=1;
    ctx.fillStyle='#f87171';ctx.font='bold 24px sans-serif';ctx.textAlign='center';ctx.fillText('⚠️ 熔毁',cx,cy);
  }
  // labels
  ctx.fillStyle=t().textMut;ctx.font='17px sans-serif';ctx.textAlign='center';
  ctx.fillText('燃料棒',cx,cy+vh/2+16);ctx.fillText('控制棒',cx,cy-vh/2-16);
}

function drawLevel6(){
  const S=levelState,cx=CW/2+160,cy=CH/2;
  // 方舟反应堆外壳（圆形）
  const outerR=100,innerR=65;
  // 外圈金属壳
  ctx.strokeStyle='#555';ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='#333';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(cx,cy,outerR-8,0,Math.PI*2);ctx.stroke();
  // 磁场线圈（8段弧线）
  const magAlpha=Math.min(S.magField/10,1);
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4;
    ctx.strokeStyle=`rgba(96,165,250,${magAlpha*0.8})`;ctx.lineWidth=6;
    ctx.beginPath();ctx.arc(cx,cy,outerR-4,a-0.15,a+0.15);ctx.stroke();
  }
  // 内圈真空室
  ctx.fillStyle=t().text;
  ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#444';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2);ctx.stroke();
  // 等离子体环
  if(S.plasmaTemp>1e7){
    const plasmaAlpha=Math.min((S.plasmaTemp-1e7)/1e8,0.9);
    const plasmaR=50;
    const glow=S.ignited?'rgba(251,191,36,':'rgba(96,165,250,';
    // 等离子体光环
    ctx.globalAlpha=plasmaAlpha*0.3;
    ctx.fillStyle=S.ignited?'#fbbf24':'#60a5fa';
    ctx.beginPath();ctx.arc(cx,cy,plasmaR+10,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=plasmaAlpha*0.6;
    ctx.strokeStyle=S.ignited?'#fbbf24':'#60a5fa';ctx.lineWidth=8;
    ctx.beginPath();ctx.arc(cx,cy,plasmaR,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
    // 环形粒子
    for(let p of S.ringParticles){
      const px=cx+Math.cos(p.angle)*p.r,py=cy+Math.sin(p.angle)*p.r;
      ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  // 等离子体逃逸效果
  if(!S.confined&&S.plasmaTemp>1e7){
    ctx.globalAlpha=0.3+0.2*Math.sin(time*8);
    ctx.strokeStyle='#f87171';ctx.lineWidth=3;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.arc(cx,cy,innerR+15,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
  }
  // 中心三角形（钯元素核心）
  const coreGlow=S.ignited?1:0.3;
  ctx.fillStyle=`rgba(96,165,250,${coreGlow*0.5})`;
  ctx.beginPath();
  ctx.moveTo(cx,cy-20);ctx.lineTo(cx-17,cy+10);ctx.lineTo(cx+17,cy+10);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle=`rgba(147,197,253,${coreGlow})`;ctx.lineWidth=2;ctx.stroke();
  // 聚变闪光
  if(S.ignited){
    const pulse=0.3+0.15*Math.sin(time*6);
    ctx.globalAlpha=pulse;ctx.fillStyle='#fbbf24';
    ctx.beginPath();ctx.arc(cx,cy,innerR*0.6,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  // 能量输出条
  const barX=cx+outerR+30,barH=180,barW=14;
  ctx.fillStyle=t().barBg;ctx.fillRect(barX,cy-barH/2,barW,barH);
  const eFill=Math.min(S.energy/3,1);
  const eGrad=ctx.createLinearGradient(barX,cy+barH/2,barX,cy-barH/2);
  eGrad.addColorStop(0,'#1e40af');eGrad.addColorStop(1,'#60a5fa');
  ctx.fillStyle=eGrad;ctx.fillRect(barX,cy-barH/2+barH*(1-eFill),barW,barH*eFill);
  ctx.fillStyle=t().label;ctx.font='16px sans-serif';ctx.textAlign='center';
  ctx.fillText(S.energy.toFixed(1)+' GJ',barX+barW/2,cy-barH/2-8);
  // 战甲（右侧）— Iron Man Mark 85（纳米战甲）
  if(S.suitPowered){
    const sx=cx+outerR+130,sy=cy-10;
    if(!S.laserTime)S.laserTime=0;
    S.laserTime+=0.016;
    const laserPhase=S.laserTime%6;
    const eyeGlow=0.7+0.3*Math.sin(time*3);
    const arcGlow=0.6+0.3*Math.sin(time*5);
    const breathe=Math.sin(time*1.5)*0.02;
    ctx.save();

    // ===== 悬浮效果 =====
    const floatY=Math.sin(time*1.2)*4;
    ctx.translate(0,floatY);

    // ===== 脚部推进器光柱 =====
    const thrustGlow=0.4+0.2*Math.sin(time*8);
    const thrustH=40+Math.sin(time*12)*8;
    for(const fx of [sx-12,sx+12]){
      const tGrd=ctx.createLinearGradient(fx,sy+85,fx,sy+85+thrustH);
      tGrd.addColorStop(0,`rgba(96,180,255,${thrustGlow*0.8})`);
      tGrd.addColorStop(0.3,`rgba(96,150,255,${thrustGlow*0.4})`);
      tGrd.addColorStop(1,'rgba(96,150,255,0)');
      ctx.fillStyle=tGrd;
      ctx.beginPath();ctx.moveTo(fx-6,sy+85);ctx.lineTo(fx+6,sy+85);
      ctx.lineTo(fx+3+Math.sin(time*15)*2,sy+85+thrustH);ctx.lineTo(fx-3+Math.sin(time*15+1)*2,sy+85+thrustH);ctx.closePath();ctx.fill();
    }

    // ===== 纳米粒子光环 =====
    for(let i=0;i<6;i++){
      const na=time*0.8+i*Math.PI/3, nr=80+Math.sin(time*2+i)*10;
      const nx=sx+Math.cos(na)*nr, ny=sy+20+Math.sin(na)*nr*0.4;
      ctx.globalAlpha=0.15+0.1*Math.sin(time*3+i);
      ctx.fillStyle='#60c8ff';
      ctx.beginPath();ctx.arc(nx,ny,1.5,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;

    // ===== 腿部 =====
    // 左腿
    const legGrd=ctx.createLinearGradient(sx-20,sy+48,sx-12,sy+82);
    legGrd.addColorStop(0,'#8b1a1a');legGrd.addColorStop(0.5,'#b71c1c');legGrd.addColorStop(1,'#7b1414');
    ctx.fillStyle=legGrd;
    ctx.beginPath();ctx.moveTo(sx-22,sy+48);ctx.lineTo(sx-8,sy+48);ctx.lineTo(sx-6,sy+70);
    ctx.lineTo(sx-10,sy+82);ctx.lineTo(sx-20,sy+82);ctx.lineTo(sx-18,sy+70);ctx.closePath();ctx.fill();
    // 左膝甲
    ctx.fillStyle='#c8a832';ctx.fillRect(sx-21,sy+64,12,3);
    // 左靴
    ctx.fillStyle='#c62828';
    ctx.beginPath();ctx.moveTo(sx-20,sy+80);ctx.lineTo(sx-8,sy+80);ctx.lineTo(sx-6,sy+88);ctx.lineTo(sx-22,sy+88);ctx.closePath();ctx.fill();
    ctx.fillStyle='#c8a832';ctx.fillRect(sx-21,sy+82,14,2);
    // 右腿
    ctx.fillStyle=legGrd;
    ctx.beginPath();ctx.moveTo(sx+22,sy+48);ctx.lineTo(sx+8,sy+48);ctx.lineTo(sx+6,sy+70);
    ctx.lineTo(sx+10,sy+82);ctx.lineTo(sx+20,sy+82);ctx.lineTo(sx+18,sy+70);ctx.closePath();ctx.fill();
    ctx.fillStyle='#c8a832';ctx.fillRect(sx+9,sy+64,12,3);
    ctx.fillStyle='#c62828';
    ctx.beginPath();ctx.moveTo(sx+20,sy+80);ctx.lineTo(sx+8,sy+80);ctx.lineTo(sx+6,sy+88);ctx.lineTo(sx+22,sy+88);ctx.closePath();ctx.fill();
    ctx.fillStyle='#c8a832';ctx.fillRect(sx+7,sy+82,14,2);

    // ===== 头盔 =====
    const hx=sx,hy=sy-48;
    ctx.fillStyle='#5a1010';
    ctx.beginPath();ctx.ellipse(hx,hy-2,24,28,0,0,Math.PI*2);ctx.fill();
    const helmGrd=ctx.createRadialGradient(hx-6,hy-10,0,hx,hy,26);
    helmGrd.addColorStop(0,'#e53935');helmGrd.addColorStop(0.5,'#c62828');helmGrd.addColorStop(1,'#7b1414');
    ctx.fillStyle=helmGrd;
    ctx.beginPath();ctx.ellipse(hx,hy,22,26,0,0,Math.PI*2);ctx.fill();
    // 头盔高光弧
    ctx.strokeStyle='rgba(255,120,120,0.3)';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(hx-4,hy-16,12,5,-.15,0,Math.PI);ctx.stroke();
    // 面罩
    const faceGrd=ctx.createLinearGradient(hx,hy-5,hx,hy+22);
    faceGrd.addColorStop(0,'#e0b040');faceGrd.addColorStop(0.5,'#c8a020');faceGrd.addColorStop(1,'#a07820');
    ctx.fillStyle=faceGrd;
    ctx.beginPath();
    ctx.moveTo(hx-17,hy-2);ctx.quadraticCurveTo(hx-15,hy+10,hx-11,hy+18);
    ctx.lineTo(hx-4,hy+22);ctx.lineTo(hx+4,hy+22);ctx.lineTo(hx+11,hy+18);
    ctx.quadraticCurveTo(hx+15,hy+10,hx+17,hy-2);ctx.quadraticCurveTo(hx,hy-8,hx-17,hy-2);
    ctx.closePath();ctx.fill();
    // 面罩分隔线
    ctx.strokeStyle='#8b6914';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(hx,hy-6);ctx.lineTo(hx,hy+22);ctx.stroke();
    // 嘴部格栅
    ctx.fillStyle='#5a4010';
    for(let i=0;i<5;i++){ctx.fillRect(hx-7,hy+12+i*2.2,14,1);}
    // 下颚线
    ctx.strokeStyle='#9a8020';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(hx-14,hy+8);ctx.lineTo(hx-8,hy+20);ctx.stroke();
    ctx.beginPath();ctx.moveTo(hx+14,hy+8);ctx.lineTo(hx+8,hy+20);ctx.stroke();
    // 眼睛（更锐利）
    ctx.shadowColor='rgba(120,220,255,0.9)';ctx.shadowBlur=eyeGlow*18;
    ctx.fillStyle=`rgba(180,240,255,${eyeGlow})`;
    ctx.beginPath();ctx.moveTo(hx-15,hy);ctx.lineTo(hx-4,hy-4);ctx.lineTo(hx-3,hy+5);ctx.lineTo(hx-12,hy+5);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(hx+15,hy);ctx.lineTo(hx+4,hy-4);ctx.lineTo(hx+3,hy+5);ctx.lineTo(hx+12,hy+5);ctx.closePath();ctx.fill();
    // 眼睛内核
    ctx.fillStyle=`rgba(255,255,255,${eyeGlow*0.7})`;
    ctx.beginPath();ctx.arc(hx-9,hy+1,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hx+9,hy+1,2.5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // 头盔红金分界线
    ctx.strokeStyle='#a01a1a';ctx.lineWidth=1.8;
    ctx.beginPath();ctx.moveTo(hx-20,hy-4);ctx.quadraticCurveTo(hx,hy-12,hx+20,hy-4);ctx.stroke();

    // ===== 脖子 =====
    ctx.fillStyle='#2a2a2a';ctx.fillRect(sx-9,sy-26,18,10);
    ctx.fillStyle='#444';ctx.fillRect(sx-7,sy-24,14,2);ctx.fillRect(sx-7,sy-20,14,2);

    // ===== 躯干 =====
    const bodyGrd=ctx.createLinearGradient(sx-34,sy,sx+34,sy);
    bodyGrd.addColorStop(0,'#6b1010');bodyGrd.addColorStop(0.15,'#8b1a1a');
    bodyGrd.addColorStop(0.3,'#c62828');bodyGrd.addColorStop(0.5,'#d32f2f');
    bodyGrd.addColorStop(0.7,'#c62828');bodyGrd.addColorStop(0.85,'#8b1a1a');bodyGrd.addColorStop(1,'#6b1010');
    ctx.fillStyle=bodyGrd;
    ctx.beginPath();ctx.moveTo(sx-32,sy-16);ctx.lineTo(sx+32,sy-16);ctx.lineTo(sx+28,sy+50);ctx.lineTo(sx-28,sy+50);ctx.closePath();ctx.fill();
    // 胸甲V形（更锐利）
    ctx.fillStyle='#d4aa30';
    ctx.beginPath();ctx.moveTo(sx,sy-15);ctx.lineTo(sx-28,sy+6);ctx.lineTo(sx-24,sy+12);ctx.lineTo(sx,sy-3);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(sx,sy-15);ctx.lineTo(sx+28,sy+6);ctx.lineTo(sx+24,sy+12);ctx.lineTo(sx,sy-3);ctx.closePath();ctx.fill();
    // 腹部装甲板
    ctx.fillStyle='#7b1414';
    ctx.beginPath();ctx.moveTo(sx-14,sy+22);ctx.lineTo(sx+14,sy+22);ctx.lineTo(sx+12,sy+36);ctx.lineTo(sx-12,sy+36);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#c8a832';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(sx-14,sy+22);ctx.lineTo(sx+14,sy+22);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx-12,sy+36);ctx.lineTo(sx+12,sy+36);ctx.stroke();
    ctx.strokeStyle='#a08020';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(sx,sy+12);ctx.lineTo(sx,sy+48);ctx.stroke();
    // 侧腰装甲
    ctx.fillStyle='#c8a832';
    ctx.fillRect(sx-30,sy+18,4,14);ctx.fillRect(sx+26,sy+18,4,14);

    // ===== 胸口方舟反应堆（更精致）=====
    const arcCx=sx,arcCy=sy+4;
    ctx.shadowColor='rgba(96,200,255,0.95)';ctx.shadowBlur=arcGlow*35;
    // 外环
    ctx.strokeStyle=`rgba(96,180,255,${arcGlow*0.5})`;ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(arcCx,arcCy,16,0,Math.PI*2);ctx.stroke();
    // 中环
    ctx.strokeStyle=`rgba(140,210,255,${arcGlow*0.8})`;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(arcCx,arcCy,12,0,Math.PI*2);ctx.stroke();
    // 内环
    ctx.strokeStyle=`rgba(200,240,255,${arcGlow})`;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(arcCx,arcCy,8,0,Math.PI*2);ctx.stroke();
    // 核心辉光
    const coreGrd=ctx.createRadialGradient(arcCx,arcCy,0,arcCx,arcCy,14);
    coreGrd.addColorStop(0,`rgba(240,252,255,${arcGlow})`);
    coreGrd.addColorStop(0.3,`rgba(120,210,255,${arcGlow*0.7})`);
    coreGrd.addColorStop(0.7,`rgba(60,160,255,${arcGlow*0.3})`);
    coreGrd.addColorStop(1,'rgba(60,160,255,0)');
    ctx.fillStyle=coreGrd;ctx.beginPath();ctx.arc(arcCx,arcCy,16,0,Math.PI*2);ctx.fill();
    // 三角标志
    ctx.fillStyle=`rgba(255,255,255,${arcGlow*0.5})`;
    ctx.beginPath();ctx.moveTo(arcCx,arcCy-6);ctx.lineTo(arcCx-5,arcCy+4);ctx.lineTo(arcCx+5,arcCy+4);ctx.closePath();ctx.fill();
    // 旋转能量环
    for(let i=0;i<3;i++){
      const ra=time*2+i*Math.PI*2/3;
      ctx.fillStyle=`rgba(200,240,255,${arcGlow*0.6})`;
      ctx.beginPath();ctx.arc(arcCx+Math.cos(ra)*11,arcCy+Math.sin(ra)*11,2,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;

    // ===== 肩甲（更立体）=====
    const lsGrd=ctx.createLinearGradient(sx-52,sy-20,sx-28,sy+8);
    lsGrd.addColorStop(0,'#d32f2f');lsGrd.addColorStop(0.5,'#b71c1c');lsGrd.addColorStop(1,'#7b1414');
    ctx.fillStyle=lsGrd;
    ctx.beginPath();ctx.moveTo(sx-30,sy-18);ctx.quadraticCurveTo(sx-54,sy-22,sx-52,sy);
    ctx.quadraticCurveTo(sx-50,sy+10,sx-32,sy+6);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#c8a832';ctx.lineWidth=1.2;ctx.stroke();
    // 肩甲装饰线
    ctx.strokeStyle='#a01a1a';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(sx-50,sy-8);ctx.lineTo(sx-34,sy-4);ctx.stroke();

    const rsGrd=ctx.createLinearGradient(sx+28,sy-20,sx+52,sy+8);
    rsGrd.addColorStop(0,'#d32f2f');rsGrd.addColorStop(0.5,'#b71c1c');rsGrd.addColorStop(1,'#7b1414');
    ctx.fillStyle=rsGrd;
    ctx.beginPath();ctx.moveTo(sx+30,sy-18);ctx.quadraticCurveTo(sx+54,sy-22,sx+52,sy);
    ctx.quadraticCurveTo(sx+50,sy+10,sx+32,sy+6);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#c8a832';ctx.lineWidth=1.2;ctx.stroke();
    ctx.strokeStyle='#a01a1a';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(sx+50,sy-8);ctx.lineTo(sx+34,sy-4);ctx.stroke();

    // ===== 右臂（伸出向右发射）=====
    // 上臂
    ctx.fillStyle='#b71c1c';
    ctx.beginPath();ctx.moveTo(sx+50,sy);ctx.lineTo(sx+54,sy+4);ctx.lineTo(sx+76,sy+14);ctx.lineTo(sx+72,sy+8);ctx.closePath();ctx.fill();
    // 前臂
    const palmX=sx+105,palmY=sy+18;
    const armGrd=ctx.createLinearGradient(sx+72,sy+10,palmX,palmY);
    armGrd.addColorStop(0,'#c62828');armGrd.addColorStop(1,'#8b1a1a');
    ctx.fillStyle=armGrd;
    ctx.beginPath();ctx.moveTo(sx+72,sy+8);ctx.lineTo(sx+76,sy+16);ctx.lineTo(palmX-10,palmY+7);ctx.lineTo(palmX-10,palmY-7);ctx.closePath();ctx.fill();
    // 前臂装甲线
    ctx.strokeStyle='#a08020';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(sx+74,sy+12);ctx.lineTo(palmX-8,palmY);ctx.stroke();
    // 手掌
    ctx.fillStyle='#d4aa30';
    ctx.beginPath();ctx.moveTo(palmX-8,palmY-9);ctx.lineTo(palmX+6,palmY-11);ctx.lineTo(palmX+10,palmY);ctx.lineTo(palmX+6,palmY+11);ctx.lineTo(palmX-8,palmY+9);ctx.closePath();ctx.fill();
    // 手指
    ctx.strokeStyle='#c89828';ctx.lineWidth=2;
    const fingers=[[10,-9,18,-14],[12,-5,22,-6],[12,0,22,0],[10,6,20,9],[6,10,14,16]];
    for(const f of fingers){ctx.beginPath();ctx.moveTo(palmX+f[0],palmY+f[1]);ctx.lineTo(palmX+f[2],palmY+f[3]);ctx.stroke();}
    // 掌心 Repulsor
    const palmGlow=0.5+0.4*Math.sin(time*6);
    ctx.shadowColor='rgba(96,200,255,0.8)';ctx.shadowBlur=palmGlow*18;
    const palmGrd=ctx.createRadialGradient(palmX+4,palmY,0,palmX+4,palmY,9);
    palmGrd.addColorStop(0,`rgba(240,252,255,${palmGlow})`);
    palmGrd.addColorStop(0.4,`rgba(96,200,255,${palmGlow*0.7})`);
    palmGrd.addColorStop(1,'rgba(96,200,255,0)');
    ctx.fillStyle=palmGrd;ctx.beginPath();ctx.arc(palmX+4,palmY,9,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;

    // ===== 左臂（自然下垂）=====
    ctx.fillStyle='#b71c1c';
    ctx.beginPath();ctx.moveTo(sx-50,sy);ctx.lineTo(sx-54,sy+4);ctx.lineTo(sx-58,sy+40);ctx.lineTo(sx-50,sy+40);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#a08020';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(sx-52,sy+2);ctx.lineTo(sx-54,sy+40);ctx.stroke();
    ctx.fillStyle='#c8a832';ctx.beginPath();ctx.arc(sx-54,sy+44,6,0,Math.PI*2);ctx.fill();
    // 左手repulsor
    ctx.shadowColor='rgba(96,200,255,0.4)';ctx.shadowBlur=8;
    ctx.fillStyle='rgba(120,200,255,0.3)';ctx.beginPath();ctx.arc(sx-54,sy+44,4,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;

    // ===== Repulsor Blast（向右发射，远离反应堆）=====
    if(laserPhase>1&&laserPhase<4){
      const bp=Math.min((laserPhase-1)/0.3,1);
      const bLen=220*bp,bX=palmX+bLen+20;
      // 光束核心
      ctx.shadowColor='rgba(120,220,255,0.9)';ctx.shadowBlur=18;
      ctx.strokeStyle='rgba(240,252,255,0.95)';ctx.lineWidth=4;
      ctx.beginPath();ctx.moveTo(palmX+16,palmY);ctx.lineTo(bX,palmY);ctx.stroke();
      // 光束中层
      ctx.strokeStyle='rgba(96,200,255,0.5)';ctx.lineWidth=14;
      ctx.beginPath();ctx.moveTo(palmX+16,palmY);ctx.lineTo(bX,palmY);ctx.stroke();
      // 光束外层
      ctx.globalAlpha=0.12;ctx.strokeStyle='rgba(96,200,255,1)';ctx.lineWidth=32;
      ctx.beginPath();ctx.moveTo(palmX+16,palmY);ctx.lineTo(bX,palmY);ctx.stroke();
      ctx.globalAlpha=1;ctx.shadowBlur=0;
      // 掌心冲击波
      const cGrd=ctx.createRadialGradient(palmX+6,palmY,0,palmX+6,palmY,28);
      cGrd.addColorStop(0,'rgba(240,252,255,0.9)');cGrd.addColorStop(1,'rgba(96,200,255,0)');
      ctx.fillStyle=cGrd;ctx.beginPath();ctx.arc(palmX+6,palmY,28,0,Math.PI*2);ctx.fill();
      // 命中闪光+散射粒子
      if(bp>=1){
        for(let i=0;i<8;i++){const sa=Math.random()*Math.PI*2,sd=Math.random()*25+5;
          ctx.fillStyle=`rgba(200,240,255,${0.3+Math.random()*0.7})`;
          ctx.beginPath();ctx.arc(bX+Math.cos(sa)*sd,palmY+Math.sin(sa)*sd,1+Math.random()*3,0,Math.PI*2);ctx.fill();}
        const hGrd=ctx.createRadialGradient(bX,palmY,0,bX,palmY,35);
        hGrd.addColorStop(0,'rgba(200,240,255,0.5)');hGrd.addColorStop(1,'rgba(96,200,255,0)');
        ctx.fillStyle=hGrd;ctx.beginPath();ctx.arc(bX,palmY,35,0,Math.PI*2);ctx.fill();
      }
    }
    // 蓄力阶段
    if(laserPhase>0.3&&laserPhase<=1){
      const ch=(laserPhase-0.3)/0.7;
      ctx.shadowColor='rgba(96,200,255,0.6)';ctx.shadowBlur=ch*25;
      const chGrd=ctx.createRadialGradient(palmX+4,palmY,0,palmX+4,palmY,10+ch*18);
      chGrd.addColorStop(0,`rgba(240,252,255,${ch*0.8})`);chGrd.addColorStop(1,'rgba(96,200,255,0)');
      ctx.fillStyle=chGrd;ctx.beginPath();ctx.arc(palmX+4,palmY,10+ch*18,0,Math.PI*2);ctx.fill();
      // 蓄力粒子吸入
      for(let i=0;i<3;i++){
        const pa=Math.random()*Math.PI*2, pd=20+Math.random()*15;
        ctx.fillStyle=`rgba(150,220,255,${ch*0.5})`;
        ctx.beginPath();ctx.arc(palmX+4+Math.cos(pa)*pd*(1-ch),palmY+Math.sin(pa)*pd*(1-ch),1.5,0,Math.PI*2);ctx.fill();
      }
      ctx.shadowBlur=0;
    }

    // ===== 能量连接线（反应堆→胸口）=====
    const linkAlpha=0.15+0.1*Math.sin(time*4);
    ctx.strokeStyle=`rgba(96,200,255,${linkAlpha})`;ctx.lineWidth=1;ctx.setLineDash([4,6]);
    ctx.beginPath();ctx.moveTo(cx+outerR+5,cy);ctx.lineTo(arcCx-18,arcCy);ctx.stroke();
    ctx.setLineDash([]);
    // 能量流动光点
    const dotPos=(time*0.5)%1;
    const dx=cx+outerR+5+(arcCx-18-cx-outerR-5)*dotPos;
    const dy=cy+(arcCy-cy)*dotPos;
    ctx.fillStyle=`rgba(120,210,255,${0.6+0.3*Math.sin(time*8)})`;
    ctx.beginPath();ctx.arc(dx,dy,2.5,0,Math.PI*2);ctx.fill();

    ctx.restore();
  }

  // 标签
  ctx.fillStyle=t().textMut;ctx.font='17px sans-serif';ctx.textAlign='center';
  ctx.fillText('方舟反应堆',cx,cy+outerR+20);
  if(S.magField>0)ctx.fillText(`磁场 ${S.magField.toFixed(1)}T`,cx,cy-outerR-10);
}

let lastTime=0;
function mainLoop(ts){
  const dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;time+=dt;
  // 淡入效果
  if(levelFadeAlpha<1)levelFadeAlpha=Math.min(1,levelFadeAlpha+dt*2.5);
  // 屏幕震动衰减
  if(screenShake.intensity>0){
    screenShake.x=(Math.random()-0.5)*screenShake.intensity;
    screenShake.y=(Math.random()-0.5)*screenShake.intensity;
    screenShake.intensity*=0.92;
    if(screenShake.intensity<0.5)screenShake.intensity=0;
  } else {screenShake.x=0;screenShake.y=0}
  // 庆祝粒子更新
  for(let i=celebrationParticles.length-1;i>=0;i--){
    const p=celebrationParticles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.gy*dt;p.life-=dt;
    if(p.life<=0)celebrationParticles.splice(i,1);
  }
  ctx.clearRect(0,0,CW,CH);
  // 绘制渐变背景
  const _t=t();
  const bgGrd=ctx.createLinearGradient(0,0,0,CH);
  bgGrd.addColorStop(0,_t.bg1);bgGrd.addColorStop(0.5,_t.bg2);bgGrd.addColorStop(1,_t.bg3);
  ctx.fillStyle=bgGrd;ctx.fillRect(0,0,CW,CH);
  // 绘制淡色网格
  ctx.strokeStyle=_t.grid;ctx.lineWidth=1;
  for(let gx=0;gx<CW;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,CH);ctx.stroke()}
  for(let gy=0;gy<CH;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(CW,gy);ctx.stroke()}
  if(gameState==='play'){
    ctx.save();
    ctx.translate(screenShake.x,screenShake.y);
    ctx.globalAlpha=levelFadeAlpha;
    updateParticles(dt);
    if(currentLevel===0)drawLevel0();
    else if(currentLevel===1){updateFission(dt);drawLevel1()}
    else if(currentLevel===2){updateChain(dt);drawLevel2()}
    else if(currentLevel===3){updateCritical(dt);drawLevel3()}
    else if(currentLevel===4){updateFusion(dt);drawLevel4()}
    else if(currentLevel===5){updateReactor(dt);drawLevel5()}
    else if(currentLevel===6){updateArc(dt);drawLevel6()}
    drawParticles();
    ctx.globalAlpha=1;
    ctx.restore();
    // 庆祝粒子（不受淡入和震动影响）
    for(let p of celebrationParticles){
      const a=Math.max(0,p.life/p.ml);
      ctx.globalAlpha=a;ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz*a,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  animId=requestAnimationFrame(mainLoop);
}
animId=requestAnimationFrame(mainLoop);

function goLevel(i){switchLevel(i);}
// === 总分总认知结构增强 ===
// 延迟重新渲染确保增强生效
(function(){
  // 自动检测关卡名称
  function _getNames(){
    if(typeof levelNames!=='undefined')return levelNames.slice();
    if(typeof LN!=='undefined')return LN.slice();
    if(typeof levels!=='undefined'&&Array.isArray(levels))return levels.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    if(typeof LEVELS!=='undefined'&&Array.isArray(LEVELS))return LEVELS.map(function(l,i){return l.name||l.title||('关卡'+(i+1));});
    return [];
  }
  function _getTotal(){return _getNames().length||7;}
  function _getCur(){
    if(typeof currentLevel!=='undefined')return currentLevel;
    if(typeof curLevel!=='undefined')return curLevel;
    if(typeof curLv!=='undefined')return curLv;
    return 0;
  }
  function _getObjs(){
    if(typeof levelObjs!=='undefined')return levelObjs;
    return null;
  }
  function _isDone(i){
    var o=_getObjs();
    if(o&&o[i])return o[i].every(function(v){return v;});
    if(typeof completedLevels!=='undefined')return completedLevels.has(i);
    return false;
  }
  function _countDone(){
    var o=_getObjs(),d=0,t=0;
    if(o){for(var i=0;i<o.length;i++)for(var j=0;j<o[i].length;j++){t++;if(o[i][j])d++;}}
    else if(typeof completedLevels!=='undefined'){d=completedLevels.size;t=_getTotal();}
    return{done:d,total:t};
  }

  // 1. 开头路线图
  window._buildRoadmap=function(){
    var c=document.getElementById('roadmap-container');
    if(!c)return;
    var names=_getNames();
    if(!names.length)return;
    var h='<div class="roadmap"><div class="roadmap-title">\u{1F4CD} \u5B66\u4E60\u8DEF\u7EBF\u56FE</div>';
    for(var i=0;i<names.length;i++){
      h+='<div class="roadmap-item"><div class="roadmap-num">'+(i+1)+'</div><span>'+names[i]+'</span></div>';
    }
    h+='</div>';
    c.innerHTML=h;
  };
  try{window._buildRoadmap();}catch(e){}

  // 2. 阶段导航
  window._stageNavHTML=function(){
    var names=_getNames(),total=names.length;
    if(!total)return '';
    var cur=_getCur(),s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):0;
    var h='<div class="stage-nav"><div class="sn-bar">';
    for(var i=0;i<total;i++){
      var cls=_isDone(i)?'done':i===cur?'cur':'';
      h+='<div class="sn-d '+cls+'" onclick="typeof goLevel===\'function\'&&goLevel('+i+')"></div>';
    }
    h+='</div>';
    h+='<div class="sn-info">\u{1F4CD} \u7B2C '+(cur+1)+'/'+total+' \u5173\uFF1A'+(names[cur]||'')+' | \u8FDB\u5EA6 '+pct+'%</div>';
    if(cur<total){
      h+='<div class="sn-hint">\u{1F4A1} \u672C\u5173\u4F60\u5C06\u5B66\u4E60\uFF1A'+(names[cur]||'')+'</div>';
    }
    h+='</div>';
    return h;
  };

  // 3. 通关总结
  window._summaryHTML=function(){
    var names=_getNames(),total=names.length;
    var s=_countDone();
    var pct=s.total>0?Math.round(s.done/s.total*100):100;
    var h='<div class="summary-box">';
    h+='<div class="summary-title">\u{1F3C6} \u606D\u559C\u901A\u5173\uFF01</div>';
    h+='<div class="summary-sub">\u4F60\u5DF2\u5B8C\u6210\u5168\u90E8 '+total+' \u4E2A\u5173\u5361\u7684\u5B66\u4E60</div>';
    h+='<div class="summary-stats">';
    h+='<div class="summary-stat"><div class="num">'+total+'</div><div class="label">\u5173\u5361\u5B8C\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+s.done+'</div><div class="label">\u76EE\u6807\u8FBE\u6210</div></div>';
    h+='<div class="summary-stat"><div class="num">'+pct+'%</div><div class="label">\u77E5\u8BC6\u638C\u63E1</div></div>';
    h+='</div>';
    h+='<div class="summary-keys"><div style="font-weight:bold;color:#4f46e5;margin-bottom:6px">\u{1F4DA} \u5173\u952E\u77E5\u8BC6\u56DE\u987E</div>';
    for(var i=0;i<total;i++){h+='<div>\u2705 '+names[i]+'</div>';}
    h+='</div></div>';
    return h;
  };

  // 4. 增强 renderPanel - monkey-patch
  if(typeof window.renderPanel==='function'){
    var _origRP=window.renderPanel;
    window.renderPanel=function(){
      _origRP.apply(this,arguments);
      // 在 panel 顶部插入阶段导航
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
  // 也处理全局 renderPanel
  if(typeof renderPanel==='function'&&!window._rpPatched){
    window._rpPatched=true;
    var _origRP2=renderPanel;
    renderPanel=function(){
      _origRP2.apply(this,arguments);
      var p=document.getElementById('panel')||document.querySelector('.panel');
      if(p&&p.innerHTML&&!p.innerHTML.includes('stage-nav')){
        p.innerHTML=window._stageNavHTML()+p.innerHTML;
      }
    };
  }
})();
try{renderPanel();}catch(e){}
