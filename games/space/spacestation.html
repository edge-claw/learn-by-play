<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空间站生存工程</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* === 暗色系（默认） === */
:root,[data-theme="dark"]{
  --bg:#0a0a1a;--text:#eee;--text-sub:#888;--text-muted:#aaa;
  --overlay-bg:rgba(0,0,0,.88);
  --panel-bg:rgba(10,10,30,0.95);--panel-border:#1a1a3a;
  --bar-bg:rgba(10,10,26,.95);--bar-border:#1a1a3a;
  --concept-bg:#0d0d24;--concept-border:#1a1a3a;--concept-text:#a0a0c0;
  --goal-text:#c0c0e0;--goal-done:#4ade80;
  --btn-bg:#1a1a4a;--btn-border:#3b82f6;--btn-text:#60a5fa;--btn-hover:#2a2a6a;
  --btn-green-bg:#0a2a1a;--btn-green-border:#22c55e;--btn-green-text:#4ade80;
  --hint-bg:#1a1a10;--hint-border:#444;--hint-text:#cca;
  --learn-bg:#0a1a2a;--learn-border:#1e40af;--learn-text:#93c5fd;
  --sv:#60a5fa;--title-color:#eee;--sub-color:#888;
  --result-bg:rgba(10,10,26,.98);--result-border:#2a2a5a;
  --result-learn-bg:#0e0e20;--result-learn-text:#93c5fd;
  --retry-bg:#2a2a5a;--retry-text:#ccc;
  --quiz-bg:#0d1a0d;--quiz-border:#22c55e;--quiz-q:#4ade80;
  --quiz-opt-text:#a0c0a0;--quiz-opt-border:#1a3a1a;--quiz-opt-bg:#111;--quiz-opt-hover:#1a2a1a;
  --quiz-correct-bg:#0a2a0a;--quiz-correct-text:#4ade80;
  --quiz-wrong-bg:#2a0a0a;--quiz-wrong-text:#f87171;
  --event-bg:#2a0a0a;
  --stage-bg:#0d0d24;--stage-border:#1a1a3a;--stage-info:#60a5fa;--stage-hint:#888;--stage-bar:#1a1a3a;
  --summary-bg:linear-gradient(135deg,#0d0d24,#1a0a2a);--summary-border:#2a2a5a;
  --summary-title:#60a5fa;--summary-sub:#888;--summary-keys-bg:rgba(99,102,241,0.1);--summary-keys-text:#a0a0c0;
  --roadmap-text:#a0a0c0;--roadmap-num-bg:#1a1a4a;--roadmap-num-text:#60a5fa;
  --slider-label:#888;
  --feat-bg:#1a1a3a;--feat-border:#2a2a5a;--feat-text:#a0a0c0;
}
/* === 亮色系 === */
[data-theme="light"]{
  --bg:#f0f2f5;--text:#1a1a2e;--text-sub:#64748b;--text-muted:#aaa;
  --overlay-bg:rgba(255,255,255,0.97);
  --panel-bg:rgba(255,255,255,0.98);--panel-border:#e0e0e8;
  --bar-bg:rgba(255,255,255,0.98);--bar-border:#e0e0e8;
  --concept-bg:#f0f4ff;--concept-border:#c7d2fe;--concept-text:#334155;
  --goal-text:#475569;--goal-done:#059669;
  --btn-bg:#eef2ff;--btn-border:#c7d2fe;--btn-text:#4338ca;--btn-hover:#e0e7ff;
  --btn-green-bg:#ecfdf5;--btn-green-border:#6ee7b7;--btn-green-text:#059669;
  --hint-bg:#fffbeb;--hint-border:#fcd34d;--hint-text:#92400e;
  --learn-bg:#f0f4ff;--learn-border:#93c5fd;--learn-text:#1e40af;
  --sv:#4338ca;--title-color:#1e293b;--sub-color:var(--text-muted);
  --result-bg:rgba(255,255,255,0.98);--result-border:#c7d2fe;
  --result-learn-bg:#f0f4ff;--result-learn-text:#1e40af;
  --retry-bg:#e2e8f0;--retry-text:#475569;
  --quiz-bg:#f0fdf4;--quiz-border:#86efac;--quiz-q:#166534;
  --quiz-opt-text:#334155;--quiz-opt-border:#d1d5db;--quiz-opt-bg:#fff;--quiz-opt-hover:#f0fdf4;
  --quiz-correct-bg:#dcfce7;--quiz-correct-text:#166534;
  --quiz-wrong-bg:#fef2f2;--quiz-wrong-text:#991b1b;
  --event-bg:#fef2f2;
  --stage-bg:#f0f4ff;--stage-border:#c7d2fe;--stage-info:#6366f1;--stage-hint:#64748b;--stage-bar:#e2e8f0;
  --summary-bg:linear-gradient(135deg,#f0f4ff,#faf5ff);--summary-border:#c7d2fe;
  --summary-title:#4f46e5;--summary-sub:#64748b;--summary-keys-bg:rgba(99,102,241,0.06);--summary-keys-text:#334155;
  --roadmap-text:#475569;--roadmap-num-bg:#e0e7ff;--roadmap-num-text:#4f46e5;
  --slider-label:#888;
  --feat-bg:#ede9fe;--feat-border:#c7d2fe;--feat-text:#5b21b6;
}


body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro',sans-serif;overflow:hidden;height:100vh}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:var(--overlay-bg);display:flex;align-items:center;justify-content:center;z-index:50}
.overlay.hidden{display:none}
.start-box{text-align:center;max-width:560px}
.start-box h1{font-size:38px;margin-bottom:6px;letter-spacing:2px}
.start-box h1 .gold{color:#60a5fa}
.start-box .sub{font-size:17px;color:var(--sub-color);margin-bottom:28px}
.start-btn{background:linear-gradient(135deg,#3b82f6,#60a5fa);color:#fff;border:none;padding:14px 52px;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;transition:transform .2s}
.start-btn:hover{transform:scale(1.05)}
.features{display:flex;gap:18px;margin-top:28px;justify-content:center;flex-wrap:wrap}
.feat{text-align:center;color:#aaa;font-size:12px;width:80px}
.feat .fi{font-size:26px;margin-bottom:4px}
.panel{position:absolute;top:0;left:0;width:320px;height:calc(100% - 32px);background:var(--panel-bg);border-right:1px solid var(--panel-border);overflow-y:auto;z-index:10;padding:12px;box-sizing:border-box;display:none;padding-bottom:16px}
.level-btn{display:none!important}
.level-btn.active{display:none!important}
.level-btn.done{display:none!important}
.concept-box{background:var(--concept-bg);border:1px solid var(--concept-border);border-radius:8px;padding:10px;margin:8px 0;font-size:13px;line-height:1.7;color:var(--concept-text)}
.goal-row{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:12px}
.g-icon{font-size:14px}
.g-text{color:var(--text-sub)}
.g-text.done{color:#059669;text-decoration:line-through}
.act-btn{display:block;width:100%;padding:10px;margin:4px 0;border-radius:8px;border:1px solid var(--btn-border);background:var(--btn-bg);color:var(--btn-text);font-size:15px;cursor:pointer;text-align:center}
.act-btn:hover{background:var(--btn-hover)}.act-btn:disabled{opacity:.4;cursor:not-allowed}
.act-btn.green{border-color:var(--btn-green-border);background:var(--btn-green-bg);color:var(--btn-green-text)}
.hint-box{background:var(--hint-bg);border:1px solid var(--hint-border);border-radius:8px;padding:8px;margin:8px 0;font-size:12px;color:var(--hint-text)}
.learn-box{background:var(--learn-bg);border:1px solid var(--learn-border);border-radius:10px;padding:12px;margin:10px 0;font-size:14px;line-height:1.8;color:var(--learn-text)}
.slider-wrap{margin:8px 0}.slider-wrap label{font-size:11px;color:#888}
.slider-wrap input[type=range]{width:100%;margin-top:4px;accent-color:#3b82f6}.sv{color:var(--sv);font-weight:bold}
.m-title{font-size:17px;font-weight:700;margin:8px 0 4px;color:#1e293b}
.m-sub{font-size:12px;color:#888;margin-bottom:8px}
#bottom-bar{position:absolute;bottom:0;left:0;right:0;height:32px;background:var(--bar-bg);border-top:1px solid var(--bar-border);z-index:20;display:none;align-items:center;padding:0 16px;font-size:11px;color:#666}
#bottom-bar .bb-left{flex:1}
#bottom-bar .bb-right{text-align:right}
.overlay .result-box{text-align:center;max-width:420px;background:var(--result-bg);border:1px solid var(--result-border);border-radius:16px;padding:28px 36px;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
.result-box .rb-icon{font-size:48px;margin-bottom:10px}
.result-box .rb-title{font-size:22px;font-weight:700;margin-bottom:8px}
.result-box .rb-learn{text-align:left;background:var(--concept-bg);border-radius:8px;padding:12px 14px;font-size:13px;color:#1e40af;line-height:1.7;margin-bottom:16px}
.result-box button{padding:10px 28px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin:0 6px}
.result-box .btn-next{background:#3b82f6;color:#fff}
.result-box .btn-retry{background:var(--stage-bar);color:var(--text-sub)}

.roadmap{margin:20px auto;max-width:500px;text-align:left}
.roadmap-title{font-size:16px;font-weight:bold;color:var(--sv);margin-bottom:12px;text-align:center}
.roadmap-item{display:flex;align-items:flex-start;gap:10px;margin:8px 0;font-size:14px;color:var(--roadmap-text);line-height:1.6}
.roadmap-num{width:24px;height:24px;border-radius:50%;background:var(--roadmap-num-bg);color:var(--roadmap-num-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.stage-nav{background:var(--stage-bg);border:1px solid var(--stage-border);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.sn-bar{display:flex;gap:3px;margin-bottom:6px}
.sn-d{flex:1;height:5px;border-radius:3px;background:var(--stage-bar);cursor:pointer;transition:all .2s}
.sn-d.done{background:#22c55e}
.sn-d.cur{background:#6366f1;height:7px}
.sn-d.locked{opacity:.35;cursor:not-allowed}
.sn-info{color:var(--stage-info);font-weight:600;font-size:13px;font-variant-numeric:tabular-nums}
.sn-hint{color:var(--stage-hint);font-size:12px;margin-top:3px}
.quiz-box{background:var(--quiz-bg);border:1px solid var(--quiz-border);border-radius:10px;padding:12px;margin:10px 0}
.quiz-title{font-weight:700;color:var(--quiz-q);font-size:14px;margin-bottom:8px}
.quiz-q{font-size:13px;color:var(--quiz-q);line-height:1.6;margin-bottom:8px}
.quiz-opt{display:block;width:100%;padding:9px 10px;margin:6px 0;border-radius:8px;border:1px solid var(--quiz-opt-border);background:var(--quiz-opt-bg);color:var(--quiz-opt-text);font-size:13px;text-align:left;cursor:pointer}
.quiz-opt:hover{background:var(--quiz-opt-hover)}
.quiz-feedback{border-radius:8px;padding:8px;margin-top:8px;font-size:12px;line-height:1.6}
.quiz-feedback.ok{background:var(--quiz-correct-bg);color:var(--quiz-correct-text)}
.quiz-feedback.bad{background:var(--quiz-wrong-bg);color:var(--quiz-wrong-text)}
.summary-box{background:var(--summary-bg);border:2px solid var(--summary-border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.summary-title{font-size:18px;font-weight:bold;color:var(--summary-title);margin-bottom:6px}
.summary-sub{color:var(--summary-sub);font-size:13px;margin-bottom:12px}
.summary-stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.summary-stat{text-align:center}
.summary-stat .num{font-size:26px;font-weight:bold;color:#22c55e}
.summary-stat .label{font-size:11px;color:var(--summary-sub)}
.summary-keys{text-align:left;margin-top:12px;padding:10px;background:var(--summary-keys-bg);border-radius:8px}
.summary-keys div{font-size:13px;color:var(--summary-keys-text);margin:4px 0;line-height:1.6}
#themeToggle{position:fixed;top:12px;right:12px;z-index:999;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);transition:all .3s}
[data-theme="dark"] #themeToggle{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#aaa}
[data-theme="light"] #themeToggle{background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.12);color:#666}
</style>
</head>
<body data-theme="dark">
<button id="themeToggle" onclick="toggleTheme()">🌙 暗色</button>
<canvas id="canvas"></canvas>
<div class="overlay" id="startScreen">
<div class="start-box">
  <h1>🛰️ <span class="gold">空间站</span>生存工程</h1>
  <div class="sub">7 个关卡，从轨道组装到再补给</div>
<button class="start-btn" onclick="startGame()">开始任务</button>
  <div class="features">
    <div class="feat"><div class="fi">🔧</div>轨道组装</div>
    <div class="feat"><div class="fi">🫁</div>生命支持</div>
    <div class="feat"><div class="fi">🔄</div>姿态控制</div>
    <div class="feat"><div class="fi">🔬</div>微重力实验</div>
    <div class="feat"><div class="fi">☢️</div>辐射防护</div>
    <div class="feat"><div class="fi">🧑‍🚀</div>太空行走</div>
    <div class="feat"><div class="fi">🚀</div>再补给</div>
  </div>
</div>
</div>
<div class="overlay hidden" id="resultModal"><div class="result-box" id="resultBox"></div></div>
<div class="panel" id="panel"></div>
<div id="bottom-bar"><span class="bb-left" id="bbLeft"></span><span class="bb-right" id="bbRight"></span></div>
<script>

// === 主题系统 ===
let isDark=true;
const TH={
  dark:{bg1:'#0a0a2e',bg2:'#0d0d1a',bg3:'#0a0a1a',grid:'rgba(99,102,241,0.06)',text:'#fff',textSec:'rgba(255,255,255,0.6)',textMut:'rgba(255,255,255,0.4)',label:'#f0f2f5',electron:'#fff',electronGlow:'rgba(255,255,255,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#1a1a3a',showStars:true},
  light:{bg1:'#e8edf5',bg2:'#f0f2f5',bg3:'#e0e7f0',grid:'rgba(99,102,241,0.04)',text:'#1e293b',textSec:'rgba(30,41,59,0.6)',textMut:'rgba(30,41,59,0.4)',label:'#334155',electron:'#334155',electronGlow:'rgba(51,65,85,0.3)',shell:'rgba(100,100,200,0.15)',barBg:'#c7d2fe',showStars:false}
};
function t(){return isDark?TH.dark:TH.light}
function toggleTheme(){isDark=!isDark;document.body.dataset.theme=isDark?'dark':'light';document.getElementById('themeToggle').textContent=isDark?'🌙 暗色':'☀️ 亮色';try{if(typeof renderPanel==='function')try{renderPanel()}catch(e){}}catch(e){}}

const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let CW,CH,time=0,animId;
let gameState='start',currentLevel=0;
let levelState={},bgStars=[];
const completedLevels=new Set();
const quizPassed=new Set();
const quizFeedback={};
const goalReady=new Set();
const panelEl=document.getElementById('panel'),bbEl=document.getElementById('bottom-bar');
const bbLeft=document.getElementById('bbLeft'),bbRight=document.getElementById('bbRight');

const levels=[
{name:'轨道组装',sub:'交会对接',icon:'🔧'},
{name:'生命支持',sub:'ECLSS闭环',icon:'🫁'},
{name:'姿态控制',sub:'角动量守恒',icon:'🔄'},
{name:'微重力实验',sub:'太空科学',icon:'🔬'},
{name:'辐射防护',sub:'太阳粒子事件',icon:'☢️'},
{name:'太空行走',sub:'舱外活动',icon:'🧑‍🚀'},
{name:'再补给',sub:'霍曼转移',icon:'🚀'}
];

const quizData=[
{q:'空间站模块交会对接前，最关键的条件是什么？',opts:['匹配轨道、速度和相对位置','只要靠近就能自动吸附','先把所有模块一次性发射到同一点'],ans:0,ok:'对。交会对接的核心是相对运动控制，位置和速度都要精确匹配。',bad:'本关重点是轨道、速度和相对位置的匹配，不是简单靠近。'},
{q:'ECLSS 生命支持系统主要维持哪些闭环？',opts:['供氧、去除二氧化碳和水回收','只负责给舱内加热','只负责控制舱外太阳翼'],ans:0,ok:'对。生命支持要同时管理氧气、二氧化碳、水和环境安全。',bad:'ECLSS 是环境控制与生命支持系统，不只是温控或供电。'},
{q:'空间站使用 CMG 调整姿态时，依赖的物理基础是什么？',opts:['角动量守恒产生控制力矩','消耗大量燃料直接推开空间站','改变太阳光照颜色'],ans:0,ok:'对。控制力矩陀螺通过角动量交换调整姿态，能减少推进剂消耗。',bad:'CMG 的关键不是燃料喷射，而是角动量交换。'},
{q:'微重力环境让哪些现象更明显？',opts:['无明显浮力对流和沉降，表面张力效应突出','所有物体质量变为零','化学反应完全停止'],ans:0,ok:'对。微重力削弱对流和沉降，让流体、火焰、晶体生长呈现不同形态。',bad:'微重力不是没有质量，而是重力相关效应被大幅削弱。'},
{q:'为什么聚乙烯或水常用于高能粒子辐射防护？',opts:['富含氢，对高能带电粒子屏蔽更有效','密度无限大，可以挡住一切辐射','能把太阳粒子转化成电能'],ans:0,ok:'对。富氢材料对太阳高能质子等粒子有较好的屏蔽效果。',bad:'防护重点是材料成分和粒子相互作用，富氢材料通常优于单纯加厚铝。'},
{q:'EVA 舱外活动中必须重点管理什么？',opts:['系绳、氧气、推进剂和返回路径','只要修好设备即可不返回','航天服可以无限供应资源'],ans:0,ok:'对。EVA 是资源受限任务，安全返回和生命保障同样重要。',bad:'舱外活动不能只看维修进度，还要管理生命支持和返回气闸。'},
{q:'霍曼转移轨道的主要优势是什么？',opts:['在两个圆轨道之间以较低燃料代价转移','让飞船瞬间到达目标轨道','不需要等待任何相位关系'],ans:0,ok:'对。霍曼转移利用半个椭圆轨道完成省燃料的轨道转移。',bad:'霍曼转移省燃料，但仍需要合适发射窗口和飞行时间。'}
];

function resize(){CW=canvas.width=innerWidth;CH=canvas.height=innerHeight}
addEventListener('resize',resize);resize();
for(let i=0;i<120;i++)bgStars.push({x:Math.random()*2e3,y:Math.random()*1200,r:Math.random()*1.2+.3,a:Math.random()*.5+.3});

function drawBg(){
ctx.fillStyle=t().bg1;ctx.fillRect(0,0,CW,CH);
bgStars.forEach(s=>{ctx.globalAlpha=s.a*(0.7+0.3*Math.sin(time*0.5+s.x));ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x%CW,s.y%CH,s.r,0,Math.PI*2);ctx.fill()});
ctx.globalAlpha=1;
// earth arc at bottom
let earthCx=CW*0.7,earthCy=CH+400,earthR=500;
let eg=ctx.createRadialGradient(earthCx,earthCy-100,earthR*0.7,earthCx,earthCy,earthR);
eg.addColorStop(0,'rgba(30,80,180,0.3)');eg.addColorStop(0.7,'rgba(20,60,140,0.15)');eg.addColorStop(1,'rgba(10,30,80,0)');
ctx.fillStyle=eg;ctx.beginPath();ctx.arc(earthCx,earthCy,earthR,0,Math.PI*2);ctx.fill();
ctx.strokeStyle='rgba(60,140,255,0.25)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(earthCx,earthCy,earthR,Math.PI+0.3,Math.PI*2-0.3);ctx.stroke();
}

function startGame(){
document.getElementById('startScreen').classList.add('hidden');
gameState='play';currentLevel=0;
panelEl.style.display='block';bbEl.style.display='flex';
initLevel(0);renderPanel();animate();
}

function initLevel(n){
if(!canGoLevel(n))return;
currentLevel=n;
if(n===0)initLevel0();else if(n===1)initLevel1();else if(n===2)initLevel2();
else if(n===3)initLevel3();else if(n===4)initLevel4();else if(n===5)initLevel5();
else if(n===6)initLevel6();
renderPanel();
}

/* ========== LEVEL 0: 轨道组装 ========== */
function initLevel0(){
const ox=340,W=CW-ox-40,cy=CH/2;
const dockPorts=[
  {name:'推进舱',x:ox+W*0.2,y:cy,w:80,h:50,color:'#aaa',docked:false,desc:'提供轨道机动能力'},
  {name:'居住舱',x:ox+W*0.4,y:cy,w:90,h:55,color:'#ccc',docked:false,desc:'宇航员生活空间'},
  {name:'实验舱',x:ox+W*0.6,y:cy,w:85,h:50,color:'#bbb',docked:false,desc:'科学实验平台'},
  {name:'太阳翼',x:ox+W*0.8,y:cy,w:100,h:20,color:'#4488ff',docked:false,desc:'供电系统'}
];
const startPositions=[
  {x:ox+80,y:CH-100},{x:ox+220,y:CH-100},{x:ox+360,y:CH-100},{x:ox+520,y:CH-100}
];

/* ========== LEVEL 1: 生命支持 ========== */
function initLevel1(){
levelState={o2Gen:50,co2Remove:50,waterRecycle:50,
  o2:21,co2:0.04,water:95,timer:0,stable:0,running:false,
  goals:[false,false,false],failed:false};
}
function updateLevel1(){
const s=levelState,ox=360,W=CW-ox-40,cy=CH/2;
if(s.running&&!s.failed){
  s.timer+=0.016;
  let o2Rate=(s.o2Gen-50)*0.01,co2Rate=(50-s.co2Remove)*0.005+0.02,waterRate=(s.waterRecycle-50)*0.008;
  s.o2+=o2Rate*0.016*3;s.co2+=co2Rate*0.016*2;s.water+=waterRate*0.016*2;
  s.o2=Math.max(0,Math.min(100,s.o2));s.co2=Math.max(0,Math.min(10,s.co2));s.water=Math.max(0,Math.min(100,s.water));
  let safe=s.o2>=19&&s.o2<=23&&s.co2<=0.5&&s.water>=60;
  if(safe)s.stable+=0.016;else s.stable=Math.max(0,s.stable-0.01);
  if(s.o2<10||s.o2>35||s.co2>5||s.water<20){s.failed=true;renderPanel();}
  if(s.stable>=10&&!s.goals[0]){s.goals[0]=true;renderPanel();}
  if(s.stable>=20&&!s.goals[1]){s.goals[1]=true;renderPanel();}
  if(s.stable>=30&&!s.goals[2]){s.goals[2]=true;completeLevel(1);}
}
// draw gauges
const gauges=[
  {label:'O₂ 浓度',val:s.o2,min:19,max:23,unit:'%',color:'#4ade80',fullMax:40},
  {label:'CO₂ 浓度',val:s.co2,min:0,max:0.5,unit:'%',color:'#f59e0b',fullMax:5},
  {label:'水储量',val:s.water,min:60,max:100,unit:'%',color:'#60a5fa',fullMax:100}
];
gauges.forEach((g,i)=>{
  let gx=ox+60,gy=cy-150+i*120,gw=W-120,gh=30;
  ctx.fillStyle='#111';ctx.fillRect(gx,gy,gw,gh);
  let ratio=g.val/g.fullMax;
  let inRange=g.val>=g.min&&g.val<=g.max;
  ctx.fillStyle=inRange?g.color:'#ef4444';
  ctx.fillRect(gx,gy,gw*Math.min(ratio,1),gh);
  // safe zone markers
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  let x1=gx+gw*(g.min/g.fullMax),x2=gx+gw*(g.max/g.fullMax);
  ctx.beginPath();ctx.moveTo(x1,gy);ctx.lineTo(x1,gy+gh);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x2,gy);ctx.lineTo(x2,gy+gh);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=t().label;ctx.font='19px sans-serif';ctx.textAlign='left';
  ctx.fillText(`${g.label}: ${g.val.toFixed(2)}${g.unit}`,gx,gy-8);
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='16px sans-serif';
  ctx.fillText(`安全: ${g.min}-${g.max}${g.unit}`,gx+gw-120,gy-8);
});
// stable timer bar
if(s.running){
  let bx=ox+60,by=cy+230,bw=W-120,bh=16;
  ctx.fillStyle='#111';ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='#4ade80';ctx.fillRect(bx,by,bw*Math.min(s.stable/30,1),bh);
  ctx.fillStyle=t().label;ctx.font='17px sans-serif';ctx.textAlign='center';
  ctx.fillText(`稳定时间: ${s.stable.toFixed(1)}s / 30s`,bx+bw/2,by+12);
}
ctx.textAlign='left';
}

// angle displays

[['俯仰',s.pitch,'#f66'],['偏航',s.yaw,'#6af'],['滚转',s.roll,'#6f6']].forEach(([n,v,c],i)=>{

});
// align bar
let abx=ox+60,aby=cy+160,abw=W-120,abh=14;
ctx.fillStyle='#111';ctx.fillRect(abx,aby,abw,abh);
ctx.fillStyle=aligned?'#4ade80':'#f59e0b';ctx.fillRect(abx,aby,abw*Math.min(s.alignTime/10,1),abh);

/* ========== LEVEL 4: 辐射防护 ========== */
function initLevel4(){
levelState={material:'aluminum',thickness:5,particles:[],dose:0,maxDose:100,
  penetration:0,timer:0,eventActive:false,goals:[false,false,false],shieldEff:0};
}
function startRadEvent(){
const s=levelState;s.eventActive=true;s.timer=0;s.dose=0;s.particles=[];
renderPanel();
}
function updateLevel4(){
const s=levelState,ox=360,W=CW-ox-40,cy=CH/2;
let shieldX=ox+W*0.55,shieldW=s.thickness*4+10;
// material effectiveness
let eff={aluminum:0.4,polyethylene:0.7,water:0.55}[s.material];
s.shieldEff=eff*Math.min(s.thickness/20,1);
if(s.eventActive){
  s.timer+=0.016;
  // spawn particles
  if(Math.random()<0.3){
    s.particles.push({x:ox+40,y:cy-150+Math.random()*300,vx:3+Math.random()*2,
      alive:true,blocked:false});
  }
  // update particles
  s.particles.forEach(p=>{
    if(!p.alive)return;
    p.x+=p.vx;
    if(!p.blocked&&p.x>=shieldX-shieldW/2&&p.x<=shieldX+shieldW/2){
      if(Math.random()<s.shieldEff){p.alive=false;p.blocked=true;}
    }
    if(p.x>shieldX+shieldW/2+80&&p.alive){s.dose+=0.15;p.alive=false;}
    if(p.x>CW)p.alive=false;
  });
  s.particles=s.particles.filter(p=>p.alive||p.x<CW);
  s.penetration=1-s.shieldEff;

/* ========== LEVEL 6: 再补给 ========== */
function initLevel6(){
const ox=360,W=CW-ox-40,cy=CH/2;
let earthCx=ox+W/2,earthCy=cy;
levelState={earthCx:earthCx,earthCy:earthCy,
  stationOrbitR:180,stationAngle:0,
  shipLaunched:false,shipAngle:0,shipOrbitR:100,shipPhase:'ground',
  transferA:0,transferE:0,transferAngle:0,
  launchWindow:0,windowAngle:0,optimalWindow:false,
  dockDist:999,docked:false,unloading:false,unloadT:0,
  goals:[false,false,false],timer:0};
}
function launchShip(){
const s=levelState;
if(s.shipLaunched)return;
s.shipLaunched=true;s.shipPhase='transfer';
s.shipAngle=s.launchWindow;
// Hohmann transfer orbit parameters
let r1=100,r2=s.stationOrbitR;
s.transferA=(r1+r2)/2;
s.transferE=(r2-r1)/(r2+r1);
s.transferAngle=s.launchWindow;
// check if window is good (station should be ~180° ahead)
let stAngle=s.stationAngle%(Math.PI*2);
let diff=stAngle-s.launchWindow;
while(diff<0)diff+=Math.PI*2;
s.optimalWindow=Math.abs(diff-Math.PI)<0.5;
if(!s.goals[0]){s.goals[0]=true;renderPanel();}
}
function updateLevel6(){
const s=levelState,ox=360,W=CW-ox-40,cy=CH/2;
let ecx=s.earthCx,ecy=s.earthCy;
s.timer+=0.016;
// station orbits
s.stationAngle+=0.008;
let stX=ecx+Math.cos(s.stationAngle)*s.stationOrbitR;
let stY=ecy+Math.sin(s.stationAngle)*s.stationOrbitR;
// draw earth
let eg=ctx.createRadialGradient(ecx,ecy,20,ecx,ecy,50);
eg.addColorStop(0,'#2266aa');eg.addColorStop(1,'#113366');
ctx.fillStyle=eg;ctx.beginPath();ctx.arc(ecx,ecy,45,0,Math.PI*2);ctx.fill();
ctx.strokeStyle='rgba(60,140,255,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(ecx,ecy,46,0,Math.PI*2);ctx.stroke();
ctx.fillStyle=t().label;ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText('地球',ecx,ecy+60);
// draw orbits
ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
ctx.beginPath();ctx.arc(ecx,ecy,100,0,Math.PI*2);ctx.stroke();
ctx.beginPath();ctx.arc(ecx,ecy,s.stationOrbitR,0,Math.PI*2);ctx.stroke();
// draw station
ctx.fillStyle='#ddd';ctx.fillRect(stX-15,stY-5,30,10);
ctx.fillStyle='#2266cc';ctx.fillRect(stX-25,stY-3,10,6);ctx.fillRect(stX+15,stY-3,10,6);
// launch window indicator
if(!s.shipLaunched){
  s.launchWindow+=0.005;
  let lwX=ecx+Math.cos(s.launchWindow)*100;
  let lwY=ecy+Math.sin(s.launchWindow)*100;
  ctx.fillStyle='#f59e0b';ctx.beginPath();
  ctx.moveTo(lwX+8,lwY);ctx.lineTo(lwX-4,lwY-5);ctx.lineTo(lwX-4,lwY+5);ctx.closePath();ctx.fill();
  ctx.fillStyle='#f59e0b';ctx.font='16px sans-serif';ctx.fillText('🚀 发射窗口',lwX,lwY+18);
  // show angle diff
  let diff=s.stationAngle-s.launchWindow;while(diff<0)diff+=Math.PI*2;
  ctx.fillStyle='#aaa';ctx.fillText(`角度差: ${(diff*180/Math.PI).toFixed(0)}°`,ecx,ecy+80);
}
// ship
if(s.shipPhase==='transfer'){
  s.transferAngle+=0.012;
  let trueAnomaly=s.transferAngle-s.launchWindow;
  let r=s.transferA*(1-s.transferE*s.transferE)/(1+s.transferE*Math.cos(trueAnomaly));
  r=Math.max(50,Math.min(r,s.stationOrbitR+20));
  let shipX=ecx+Math.cos(s.transferAngle)*r;
  let shipY=ecy+Math.sin(s.transferAngle)*r;
  // draw transfer orbit (ellipse hint)
  ctx.strokeStyle='rgba(245,158,11,0.2)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();
  for(let a=0;a<Math.PI*2;a+=0.05){
    let tr=s.transferA*(1-s.transferE*s.transferE)/(1+s.transferE*Math.cos(a));
    tr=Math.max(50,Math.min(tr,s.stationOrbitR+20));
    let tx=ecx+Math.cos(a+s.launchWindow)*tr,ty=ecy+Math.sin(a+s.launchWindow)*tr;
    if(a===0)ctx.moveTo(tx,ty);else ctx.lineTo(tx,ty);
  }ctx.stroke();ctx.setLineDash([]);
  // draw ship triangle
  ctx.fillStyle='#f59e0b';ctx.beginPath();
  let sa=s.transferAngle;
  ctx.moveTo(shipX+Math.cos(sa)*8,shipY+Math.sin(sa)*8);
  ctx.lineTo(shipX+Math.cos(sa+2.5)*5,shipY+Math.sin(sa+2.5)*5);
  ctx.lineTo(shipX+Math.cos(sa-2.5)*5,shipY+Math.sin(sa-2.5)*5);
  ctx.closePath();ctx.fill();
  // check dock
  let ddx=shipX-stX,ddy=shipY-stY;
  s.dockDist=Math.sqrt(ddx*ddx+ddy*ddy);
  if(s.dockDist<20&&!s.docked){
    s.docked=true;s.shipPhase='docked';
    if(s.optimalWindow&&!s.goals[1]){s.goals[1]=true;}
    s.unloading=true;s.unloadT=0;
    renderPanel();
  }
  if(trueAnomaly>Math.PI*2&&!s.docked){
    // missed - allow retry
    s.shipLaunched=false;s.shipPhase='ground';renderPanel();
  }
}
if(s.shipPhase==='docked'){
  // draw ship attached to station
  ctx.fillStyle='#f59e0b';ctx.fillRect(stX-5,stY+8,10,8);
  if(s.unloading){
    s.unloadT+=0.016;
    let prog=Math.min(s.unloadT/3,1);
    ctx.fillStyle='#111';ctx.fillRect(stX-40,stY+25,80,8);
    ctx.fillStyle='#4ade80';ctx.fillRect(stX-40,stY+25,80*prog,8);
    ctx.fillStyle=t().label;ctx.font='15px sans-serif';ctx.fillText(`卸载补给: ${(prog*100).toFixed(0)}%`,stX,stY+45);
    if(prog>=1&&!s.goals[2]){s.goals[2]=true;completeLevel(6);}
  }
}
ctx.textAlign='left';
}

/* ========== RENDER PANEL ========== */
// Lightweight DOM patcher: preserves focused range inputs during panel updates
function _patchPanel(el,html){
  var ae=document.activeElement;
  if(!ae||ae.type!=='range'||!el.contains(ae)){el.innerHTML=html;return;}
  var tmp=document.createElement('div');tmp.innerHTML=html;
  _diffNodes(el,tmp);
}
function _diffNodes(o,n){
  var oc=Array.from(o.childNodes),nc=Array.from(n.childNodes);
  var i=0;
  while(i<oc.length&&i<nc.length){
    var a=oc[i],b=nc[i];
    if(a.nodeType!==b.nodeType||a.nodeName!==b.nodeName){o.replaceChild(b.cloneNode(true),a);i++;continue;}
    if(a.nodeType===3){if(a.textContent!==b.textContent)a.textContent=b.textContent;i++;continue;}
    if(a.nodeType===1){
      if(a.tagName==='INPUT'&&a.type==='range'&&a===document.activeElement){i++;continue;}
      for(var j=0;j<b.attributes.length;j++){var at=b.attributes[j];if(a.getAttribute(at.name)!==at.value)a.setAttribute(at.name,at.value);}
      _diffNodes(a,b);
    }
    i++;
  }
  while(oc.length>nc.length)o.removeChild(o.lastChild);
  for(;i<nc.length;i++)o.appendChild(nc[i].cloneNode(true));
}

h+=`<div class="hint-box">💡 三轴角度都在±5°以内算对准。注意随机扰动！</div>`;
}else if(currentLevel===3){
h+=`<div class="concept-box"><div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>关键词：</b>微重力实验，表面张力球形流体，球形火焰</div>选择微重力实验，观察太空中独特的物理现象。</div>`;
if(s.experiment<0){h+=`<div class="hint-box">点击画面中的实验卡片选择实验</div>`;}
else{h+=`<div style="font-size:12px;color:var(--sv);margin:4px 0">当前实验: ${['流体行为','火焰形态','晶体生长'][s.experiment]}</div>`;}
h+=goalHTML(['观察流体行为','观察火焰形态','观察晶体生长'],s.goals||[]);
}else if(currentLevel===4){
h+=`<div class="concept-box"><div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>关键词：</b>太阳粒子事件 SPE，辐射防护，聚乙烯屏蔽</div>选择防护材料和厚度，抵御太阳粒子事件的辐射。</div>`;
h+=`<div class="slider-wrap"><label>防护厚度: <span class="sv" id="thicknessVal">${s.thickness} cm</span></label><input type="range" min="1" max="30" value="${s.thickness}" oninput="setShieldThickness(this)" onchange="this.blur();renderPanel()"></div>`;
h+=`<button class="act-btn${s.material==='aluminum'?' green':''}" onclick="levelState.material='aluminum';renderPanel()">铝</button>`;
h+=`<button class="act-btn${s.material==='polyethylene'?' green':''}" onclick="levelState.material='polyethylene';renderPanel()">聚乙烯</button>`;
h+=`<button class="act-btn${s.material==='water'?' green':''}" onclick="levelState.material='water';renderPanel()">水</button>`;
if(!s.eventActive)h+=`<button class="act-btn" onclick="startRadEvent()">☢️ 触发太阳粒子事件</button>`;
h+=goalHTML(['存活5秒且剂量<30','防护效率>50%','存活15秒且剂量<20'],s.goals||[]);
}else if(currentLevel===5){
h+=`<div class="concept-box"><div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>关键词：</b>舱外活动 EVA，EMU 航天服，减压病预防</div>控制宇航员进行舱外活动，修复空间站外部设备。注意氧气和燃料！</div>`;
if(s.failed)h+=`<div class="hint-box" style="border-color:#ef4444;color:#f87171">⚠️ 氧气或燃料耗尽！</div><button class="act-btn" onclick="initLevel(5)">🔄 重试</button>`;
h+=goalHTML(['修复1个设备','修复3个设备','完成全部修复并返回气闸'],s.goals||[]);
h+=`<div class="hint-box">💡 移动鼠标靠近红色损坏点并按住修复，修完后回到气闸舱</div>`;
}else if(currentLevel===6){
h+=`<div class="concept-box"><div style="padding:6px 8px;border-radius:6px;background:var(--concept-bg);border:1px solid var(--concept-border);font-size:13px;line-height:2;margin-bottom:6px"><b>关键词：</b>霍曼转移轨道，最省燃料路径，补给对接</div>计算霍曼转移轨道，发射补给飞船对接空间站。</div>`;
if(!s.shipLaunched)h+=`<button class="act-btn" onclick="launchShip()">🚀 发射补给飞船</button>`;
h+=goalHTML(['发射补给飞船','在最佳窗口发射','成功对接并卸载补给'],s.goals||[]);
h+=`<div class="hint-box">💡 霍曼转移是最省燃料的轨道转移方式</div>`;
}
if(s.goals&&s.goals.every(Boolean)){
  if(!quizPassed.has(currentLevel)){
    h+=quizHTML(currentLevel);
  }else{
    h+=`<div class="learn-box">${learnTexts[currentLevel]}</div>`;
    if(currentLevel<levels.length-1)h+=`<button class="act-btn green" onclick="nextLevel()">下一关 →</button>`;
    else h+=summaryHTML();
  }
}
_patchPanel(panelEl,h);
bbLeft.textContent=`关卡 ${currentLevel+1}/7: ${L.name}`;
bbRight.textContent=`已完成: ${completedLevels.size}/7`;
}

/* ========== RESULT ========== */
const learnTexts=[
'交会对接是空间站建设的基础技术。两个航天器必须在轨道上精确匹配速度和位置，误差不能超过几厘米。国际空间站由16个加压舱段组成，历时13年完成组装。',
'ECLSS（环境控制与生命支持系统）是空间站的"肺"。它通过电解水产生O₂，用分子筛吸附CO₂，水回收率达93%。一个小参数偏差就可能危及宇航员生命。',
'空间站使用CMG（控制力矩陀螺）进行姿态控制，利用角动量守恒原理。改变陀螺转速产生力矩，无需消耗推进剂。ISS有4个CMG，每个重300kg。',
'微重力环境下，流体形成完美球形（表面张力主导），火焰呈球形（无对流），晶体生长更均匀（无沉降）。这些独特条件使太空成为理想的科学实验室。',
'太阳粒子事件（SPE）释放大量高能质子，对宇航员构成辐射威胁。聚乙烯因富含氢原子，是最有效的辐射防护材料之一，效果优于铝。',
'舱外活动（EVA）是最危险的太空任务之一。宇航员穿着EMU航天服，自带氧气和推进系统。每次EVA需要数小时准备，包括预呼吸纯氧排氮防止减压病。',
'霍曼转移轨道是两个圆轨道之间最省燃料的转移方式。补给飞船从低轨道出发，经过半个椭圆轨道到达空间站轨道，全程约需2天。'
];

function closeResult(){document.getElementById('resultModal').classList.add('hidden');}
function nextLevel(){closeResult();initLevel(currentLevel+1);renderPanel();}
function retryLevel(){closeResult();initLevel(currentLevel);renderPanel();}

/* ========== MOUSE / TOUCH ========== */
let mouseX=0,mouseY=0,mouseDown=false;
canvas.addEventListener('mousedown',e=>{mouseDown=true;mouseX=e.clientX;mouseY=e.clientY;
if(currentLevel===0)handleLevel0Down(e.clientX,e.clientY);
if(currentLevel===3)handleLevel3Click(e.clientX,e.clientY);
if(currentLevel===5)handleLevel5Click(e.clientX,e.clientY);
});
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;
if(currentLevel===0)handleLevel0Move(e.clientX,e.clientY);
});
canvas.addEventListener('mouseup',e=>{mouseDown=false;
if(currentLevel===0)handleLevel0Up(e.clientX,e.clientY);
});
canvas.addEventListener('touchstart',e=>{e.preventDefault();let t=e.touches[0];mouseDown=true;mouseX=t.clientX;mouseY=t.clientY;
if(currentLevel===0)handleLevel0Down(t.clientX,t.clientY);
if(currentLevel===3)handleLevel3Click(t.clientX,t.clientY);
if(currentLevel===5)handleLevel5Click(t.clientX,t.clientY);
},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();let t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;
if(currentLevel===0)handleLevel0Move(t.clientX,t.clientY);
},{passive:false});
canvas.addEventListener('touchend',e=>{mouseDown=false;
if(currentLevel===0)handleLevel0Up(mouseX,mouseY);
},{passive:false});

function handleLevel5Click(mx,my){
/* repair is handled by proximity + mouseDown in updateLevel5 */
}

/* ========== ANIMATION LOOP ========== */
function animate(){
animId=requestAnimationFrame(animate);
time+=0.016;drawBg();
if(gameState==='play'){
if(currentLevel===0)updateLevel0();
else if(currentLevel===1)updateLevel1();
else if(currentLevel===2)updateLevel2();
else if(currentLevel===3)updateLevel3();
else if(currentLevel===4)updateLevel4();
else if(currentLevel===5)updateLevel5();
else if(currentLevel===6)updateLevel6();
}
}

function goLevel(i){initLevel(i);}


</script>
