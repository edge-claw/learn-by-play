<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
.hero{text-align:center;padding:48px 20px 32px;background:linear-gradient(180deg,#0d1030 0%,#0a0a1a 100%)}
.hero h1{font-size:2.4em;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.hero p{color:#aaaace;font-size:1.05em;max-width:600px;margin:0 auto}
.hero .stats{margin-top:16px;display:flex;justify-content:center;gap:32px}
.hero .stat{text-align:center}
.hero .stat .num{font-size:2em;font-weight:700;color:#60a5fa}
.hero .stat .label{font-size:0.8em;color:#9999cc}
.container{max-width:1200px;margin:0 auto;padding:0 20px 60px}
.category{margin-bottom:36px}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #2d2d5e}
.cat-icon{font-size:1.6em}
.cat-title{font-size:1.2em;font-weight:700;color:#d8d8ff}
.cat-count{font-size:0.75em;color:#9999cc;background:#1e1e40;padding:2px 8px;border-radius:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.card{background:#16163a;border:1px solid #2d2d5e;border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;text-decoration:none;display:block}
.card:hover{border-color:#5b8def;background:#1c1c4a;transform:translateY(-2px);box-shadow:0 4px 24px rgba(59,130,246,0.25)}
.card .icon{font-size:2em;margin-bottom:8px}
.card .title{font-size:0.95em;font-weight:600;color:#ededff;margin-bottom:4px}
.card .desc{font-size:0.75em;color:#9e9ec8;line-height:1.4}
.footer{text-align:center;padding:30px;color:#7777aa;font-size:0.8em;border-top:1px solid #1e1e40}
.footer a{color:#3b82f6;text-decoration:none}
.search-bar{max-width:500px;margin:20px auto 0;position:relative}
.search-bar input{width:100%;padding:10px 16px 10px 40px;border-radius:20px;border:1px solid #2d2d5e;background:#16163a;color:#e0e0f0;font-size:0.95em;outline:none}
.search-bar input:focus{border-color:#3b82f6}
.search-bar .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#7777aa}
@media(max-width:600px){.hero h1{font-size:1.6em}.grid{grid-template-columns:1fr 1fr}.card{padding:12px}}
</style>
</head>
<body>
<!-- PLACEHOLDER_BODY -->

const heroEl=document.createElement('div');heroEl.className='hero';
const totalGames=games.reduce((s,c)=>s+c.items.length,0);
const totalLevels=games.reduce((s,c)=>s+c.items.reduce((ss,g)=>{const m=g.levels.match(/(\d+)/);return ss+(m?parseInt(m[1]):1)},0),0);
heroEl.innerHTML=`
  <h1>Learn by Play</h1>
  <p>玩中学科学 — 零依赖交互式教育游戏合集</p>
  <div class="stats">
    <div class="stat"><div class="num">${totalGames}</div><div class="label">个游戏</div></div>
    <div class="stat"><div class="num">${totalLevels}+</div><div class="label">个关卡</div></div>
    <div class="stat"><div class="num">${games.length}</div><div class="label">大领域</div></div>
  </div>
  <p style="color:#7c3aed;font-size:0.85em;margin-top:12px">🎨 全局暗色主题 · 统一进度导航 · 74 款游戏 UI 一致性优化</p>
  <div class="search-bar"><span class="icon">🔍</span><input type="text" id="searchInput" placeholder="搜索游戏..."></div>
`;
document.body.insertBefore(heroEl,document.body.firstChild);

const container=document.createElement('div');container.className='container';container.id='gameContainer';
document.body.appendChild(container);

function renderGames(filter=''){
  const f=filter.toLowerCase();
  let html='';
  for(const cat of games){
    const filtered=cat.items.filter(g=>!f||g.title.toLowerCase().includes(f)||g.desc.toLowerCase().includes(f)||cat.cat.toLowerCase().includes(f));
    if(!filtered.length)continue;
    html+=`<div class="category"><div class="cat-header"><span class="cat-icon">${cat.icon}</span><span class="cat-title">${cat.cat}</span><span class="cat-count">${filtered.length}</span></div><div class="grid">`;
    for(const g of filtered){
      html+=`<a class="card" href="${g.file}"><div class="icon">${g.icon}</div><div class="title">${g.title}</div><div class="desc">${g.desc}</div></a>`;
    }
    html+=`</div></div>`;
  }
  container.innerHTML=html;
}
renderGames();

document.getElementById('searchInput').addEventListener('input',e=>renderGames(e.target.value));

const footer=document.createElement('div');footer.className='footer';
footer.innerHTML='单文件 Canvas 2D · 零依赖 · 浏览器双击即玩';
document.body.appendChild(footer);
