<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Nuclear Promo — Learn by Play</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const W=1920,H=1080;
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=W;canvas.height=H;
function fitScreen(){const s=Math.min(innerWidth/W,innerHeight/H);canvas.style.width=W*s+'px';canvas.style.height=H*s+'px';canvas.style.position='absolute';canvas.style.left=(innerWidth-W*s)/2+'px';canvas.style.top=(innerHeight-H*s)/2+'px'}
fitScreen();window.onresize=fitScreen;

const GREEN='#22c55e',RED='#ef4444',BLUE='#3b82f6',CYAN='#60a5fa',YELLOW='#fbbf24',BG='#080810';
function easeOut(t){return 1-Math.pow(1-t,3)}

let particles=[];
function spawnP(x,y,count,hueBase,spread){for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,color:`hsl(${hueBase+Math.random()*spread},100%,${50+Math.random()*30}%)`,size:2+Math.random()*4})}}
function updateP(dt){for(let p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.life-=dt*1.2}particles=particles.filter(p=>p.life>0)}
function drawP(){for(let p of particles){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}

const stars=Array.from({length:150},()=>({x:Math.random()*W,y:Math.random()*H,r:.3+Math.random()*1.2,o:.15+Math.random()*.4}));
function drawStars(a){for(let s of stars){ctx.globalAlpha=s.o*a;ctx.fillStyle='#aaccff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath()}

// ── 幕1: 开场 (0-3.5s) ──
function drawScene1(lt){
  const p=easeOut(Math.min(1,lt/.8)),alpha=easeOut(Math.min(1,lt/.5));
  ctx.save();ctx.translate(W/2,H/2-60);ctx.scale(p,p);ctx.globalAlpha=alpha;
  // ☢️ 辐射符号
  ctx.font='180px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('☢️',0,0);
  const gl=ctx.createRadialGradient(0,0,40,0,0,180);gl.addColorStop(0,'rgba(34,197,94,.25)');gl.addColorStop(1,'rgba(34,197,94,0)');
  ctx.fillStyle=gl;ctx.beginPath();ctx.arc(0,0,180,0,Math.PI*2);ctx.fill();
  ctx.restore();
  if(lt>.3&&lt<.35)spawnP(W/2,H/2-60,80,90,60);
  if(lt>1){const ta=easeOut(Math.min(1,(lt-1)/.6));ctx.globalAlpha=ta;ctx.fillStyle='#fff';ctx.font='bold 52px "PingFang SC",sans-serif';ctx.textAlign='center';ctx.fillText('核物理原理探险',W/2,H/2+100);ctx.fillStyle='#888';ctx.font='22px "PingFang SC",sans-serif';ctx.fillText('7关互动 · 裂变 · 聚变 · 核电站 · 方舟反应堆',W/2,H/2+145);ctx.globalAlpha=1}
}

// ── NEXT ──

// ── 幕2: 原子结构 + 裂变 (3-8.5s) ──
let nucleons=[],electrons=[],fissionPhase='idle',fissionT=0;
function initAtom(){
  nucleons=[];electrons=[];fissionPhase='idle';fissionT=0;
  // 铀-235 核子（简化显示20个）
  for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,r=Math.random()*22;nucleons.push({x:Math.cos(a)*r,y:Math.sin(a)*r,type:i<9?'p':'n'})}
  for(let i=0;i<3;i++)electrons.push({rx:55+i*18,ry:40+i*12,angle:Math.random()*Math.PI*2,speed:.8+i*.3});
}
initAtom();

function drawScene2(lt){
  const cx=W/2-200,cy=H/2-40;
  const appear=easeOut(Math.min(1,lt/.6));
  ctx.globalAlpha=appear;

  // 电子轨道
  ctx.strokeStyle='rgba(100,100,200,0.15)';ctx.lineWidth=1;
  for(let e of electrons){ctx.beginPath();ctx.ellipse(cx,cy,e.rx,e.ry,0,0,Math.PI*2);ctx.stroke()}

  // 核子
  if(fissionPhase==='idle'){
    for(let n of nucleons){
      ctx.fillStyle=n.type==='p'?RED:BLUE;ctx.beginPath();ctx.arc(cx+n.x,cy+n.y,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=n.type==='p'?'rgba(239,68,68,.3)':'rgba(59,130,246,.3)';ctx.beginPath();ctx.arc(cx+n.x,cy+n.y,8,0,Math.PI*2);ctx.fill();
    }
    // 绿色光晕
    ctx.fillStyle='rgba(34,197,94,.15)';ctx.beginPath();ctx.arc(cx,cy,35,0,Math.PI*2);ctx.fill();
  }

  // 电子
  for(let e of electrons){e.angle+=e.speed*.02;const ex=cx+Math.cos(e.angle)*e.rx,ey=cy+Math.sin(e.angle)*e.ry;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex,ey,2.5,0,Math.PI*2);ctx.fill()}

  // 标签
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='16px "PingFang SC",sans-serif';ctx.textAlign='center';
  ctx.fillText('铀-235（92质子 + 143中子）',cx,cy+100);

  // 裂变动画 (lt>2.5)
  if(lt>2.5&&fissionPhase==='idle'){fissionPhase='neutron';fissionT=lt}
  const rcx=W/2+200,rcy=H/2-40;
  if(fissionPhase!=='idle'){
    const ft=lt-fissionT;
    // 入射中子
    if(ft<.8){
      const np=ft/.8;const nx=rcx-200+np*160;
      ctx.fillStyle=CYAN;ctx.beginPath();ctx.arc(nx,rcy,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(96,165,250,.3)';ctx.beginPath();ctx.arc(nx,rcy,10,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#888';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('中子',nx,rcy-16);
    }
    // 铀核（裂变前）
    if(ft<1){
      const wobble=ft>.8?Math.sin(ft*40)*(ft-.8)*60:0;
      ctx.fillStyle=GREEN;ctx.beginPath();ctx.ellipse(rcx,rcy,28+wobble,28-wobble*.4,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(34,197,94,.3)';ctx.beginPath();ctx.arc(rcx,rcy,38,0,Math.PI*2);ctx.fill();
    }
    // 裂变产物
    if(ft>1){
      const sp=easeOut(Math.min(1,(ft-1)/.6));
      if(ft>1&&ft<1.05)spawnP(rcx,rcy,50,40,60);
      // 钡-141
      ctx.fillStyle='#a855f7';ctx.beginPath();ctx.arc(rcx-sp*80,rcy-sp*30,18,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('钡-141',rcx-sp*80,rcy-sp*30+30);
      // 氪-92
      ctx.fillStyle='#f97316';ctx.beginPath();ctx.arc(rcx+sp*70,rcy+sp*40,14,0,Math.PI*2);ctx.fill();
      ctx.fillText('氪-92',rcx+sp*70,rcy+sp*40+26);
      // 释放的中子
      for(let i=0;i<3;i++){
        const na=i*Math.PI*2/3+.5;const nd=sp*60;
        ctx.fillStyle=CYAN;ctx.beginPath();ctx.arc(rcx+Math.cos(na)*nd,rcy+Math.sin(na)*nd,3,0,Math.PI*2);ctx.fill();
      }
      // 能量标注
      if(sp>.5){ctx.fillStyle=YELLOW;ctx.font='bold 18px "PingFang SC",sans-serif';ctx.fillText('💥 200 MeV',rcx,rcy-70)}
    }
  }
  ctx.globalAlpha=1;
  if(lt>2){const a=easeOut(Math.min(1,(lt-2)/.5));ctx.globalAlpha=a;ctx.fillStyle=GREEN;ctx.font='bold 28px "PingFang SC",sans-serif';ctx.textAlign='center';ctx.fillText('原子结构 → 核裂变 → 释放巨大能量',W/2,H-80);ctx.globalAlpha=1}
}

// ── 幕3: 链式反应 + 临界质量 (8-13s) ──
let chainNuclei=[],chainNeutrons=[],chainStarted=false;
function initChain(){
  chainNuclei=[];chainNeutrons=[];chainStarted=false;
  const cx=W/2-200,cy=H/2;
  for(let i=0;i<30;i++){chainNuclei.push({x:cx+(Math.random()-.5)*350,y:cy+(Math.random()-.5)*300,r:10,alive:true})}
}
initChain();

function drawScene3(lt){
  // 链式反应
  const cx=W/2-200,cy=H/2;
  // 铀核
  for(let n of chainNuclei){
    if(!n.alive)continue;
    ctx.fillStyle=GREEN;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(34,197,94,.2)';ctx.beginPath();ctx.arc(n.x,n.y,n.r+5,0,Math.PI*2);ctx.fill();
  }
  // 启动
  if(lt>0.5&&!chainStarted){chainStarted=true;chainNeutrons.push({x:cx-200,y:cy,vx:3,vy:0})}
  // 中子运动
  for(let ne of chainNeutrons){
    ne.x+=ne.vx;ne.y+=ne.vy;
    ctx.fillStyle=CYAN;ctx.beginPath();ctx.arc(ne.x,ne.y,3,0,Math.PI*2);ctx.fill();
    // 碰撞检测
    for(let nu of chainNuclei){
      if(!nu.alive)continue;
      const dx=ne.x-nu.x,dy=ne.y-nu.y;
      if(dx*dx+dy*dy<(nu.r+5)*(nu.r+5)){
        nu.alive=false;ne.vx=0;ne.vy=0;ne.x=-999;
        spawnP(nu.x,nu.y,15,40,50);
        for(let j=0;j<3;j++){const a=Math.random()*Math.PI*2;chainNeutrons.push({x:nu.x,y:nu.y,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5})}
        break;
      }
    }
  }
  // 指数增长计数
  const fissioned=chainNuclei.filter(n=>!n.alive).length;
  ctx.fillStyle='#fff';ctx.font='bold 20px monospace';ctx.textAlign='left';
  ctx.fillText('裂变数: '+fissioned+'/'+chainNuclei.length,80,120);
  // 指数曲线
  ctx.fillStyle=YELLOW;ctx.font='16px "PingFang SC",sans-serif';
  ctx.fillText('1 → 3 → 9 → 27 → 81 ... 指数增长',80,150);

  // 右侧：临界质量示意
  const rmx=W/2+280,rmy=H/2;
  if(lt>2){
    const rp=easeOut(Math.min(1,(lt-2)/.6));
    ctx.globalAlpha=rp;
    // 亚临界
    ctx.fillStyle='#1a1a38';roundRect(ctx,rmx-130,rmy-120,120,100,8);ctx.fill();ctx.strokeStyle='#444';roundRect(ctx,rmx-130,rmy-120,120,100,8);ctx.stroke();
    ctx.fillStyle=GREEN;ctx.beginPath();ctx.arc(rmx-70,rmy-70,20,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ccc';ctx.font='13px "PingFang SC",sans-serif';ctx.textAlign='center';ctx.fillText('亚临界',rmx-70,rmy-30);ctx.fillStyle='#888';ctx.font='11px sans-serif';ctx.fillText('中子逃逸 ✗',rmx-70,rmy-12);
    // 超临界
    ctx.fillStyle='#1a0a0a';roundRect(ctx,rmx+10,rmy-120,120,100,8);ctx.fill();ctx.strokeStyle=RED+'66';roundRect(ctx,rmx+10,rmy-120,120,100,8);ctx.stroke();
    ctx.fillStyle=GREEN;ctx.beginPath();ctx.arc(rmx+70,rmy-70,35,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(239,68,68,.3)';ctx.beginPath();ctx.arc(rmx+70,rmy-70,45,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ccc';ctx.font='13px "PingFang SC",sans-serif';ctx.fillText('超临界',rmx+70,rmy-30);ctx.fillStyle=RED;ctx.font='11px sans-serif';ctx.fillText('链式反应 💥',rmx+70,rmy-12);
    // 临界质量
    ctx.fillStyle=YELLOW;ctx.font='bold 18px "PingFang SC",sans-serif';ctx.fillText('临界质量 ≈ 52 kg',rmx,rmy+30);
    ctx.fillStyle='#888';ctx.font='14px "PingFang SC",sans-serif';ctx.fillText('（一个棒球大小的铀球）',rmx,rmy+55);
    ctx.globalAlpha=1;
  }
  if(lt>2.5){const a=easeOut(Math.min(1,(lt-2.5)/.5));ctx.globalAlpha=a;ctx.fillStyle=GREEN;ctx.font='bold 28px "PingFang SC",sans-serif';ctx.textAlign='center';ctx.fillText('链式反应 → 指数增长 → 临界质量',W/2,H-80);ctx.globalAlpha=1}
}

// ── S4_NEXT ──

// ── 幕4: 核电站 + 聚变 (13-18s) ──
function drawScene4(lt){
  // 核电站反应堆
  const rx=W/2-280,ry=H/2,vw=160,vh=220;
  const pa=easeOut(Math.min(1,lt/.5));
  ctx.globalAlpha=pa;
  // 容器
  ctx.strokeStyle='#555';ctx.lineWidth=3;ctx.strokeRect(rx-vw/2,ry-vh/2,vw,vh);
  ctx.fillStyle='rgba(30,30,60,.5)';ctx.fillRect(rx-vw/2,ry-vh/2,vw,vh);
  // 燃料棒（发光动画）
  const glow=.3+.7*(.5+.5*Math.sin(lt*3));
  for(let i=0;i<5;i++){
    const fx=rx-50+i*25,fy=ry-vh/2+25,fh=vh-50;
    ctx.fillStyle=`rgba(${50+Math.floor(200*glow)},${50+Math.floor(100*glow)},20,.8)`;ctx.fillRect(fx-3,fy,6,fh);
    ctx.fillStyle=`rgba(255,${Math.floor(200*(1-glow))},0,${glow*.25})`;ctx.fillRect(fx-6,fy,12,fh);
  }
  // 控制棒（上下移动动画）
  const rodDepth=50+20*Math.sin(lt*1.5);
  const rodY=ry-vh/2+(vh*(rodDepth/100))*.7;
  for(let i=0;i<4;i++){const cx2=rx-37+i*25;ctx.fillStyle='#666';ctx.fillRect(cx2-2,ry-vh/2-8,4,rodY-(ry-vh/2)+8);ctx.fillStyle='#888';ctx.fillRect(cx2-4,rodY-3,8,6)}
  // 温度条
  const barX=rx+vw/2+15,barH=vh,barW=10;
  ctx.fillStyle='#1a1a3a';ctx.fillRect(barX,ry-vh/2,barW,barH);
  const tFill=.4+.2*Math.sin(lt*2);
  const tCol=tFill>.7?RED:tFill>.4?YELLOW:GREEN;
  ctx.fillStyle=tCol;ctx.fillRect(barX,ry-vh/2+barH*(1-tFill),barW,barH*tFill);
  ctx.fillStyle='#fff';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText(Math.floor(300+tFill*500)+'°C',barX+barW/2,ry-vh/2-8);
  // 功率显示
  const power=Math.floor(400+200*Math.sin(lt*1.8));
  ctx.fillStyle=power>500&&power<600?GREEN:YELLOW;ctx.font='bold 22px monospace';ctx.textAlign='center';ctx.fillText(power+' MW',rx,ry+vh/2+30);
  ctx.fillStyle='#888';ctx.font='13px "PingFang SC",sans-serif';ctx.fillText('核电站 · 受控链式反应',rx,ry+vh/2+55);

  // 右侧：聚变
  const fx=W/2+250,fy=H/2;
  if(lt>2){
    const fp=easeOut(Math.min(1,(lt-2)/.6));
    ctx.globalAlpha=fp;
    // 托卡马克环
    ctx.strokeStyle='rgba(96,165,250,.6)';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(fx,fy,110,70,0,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(96,165,250,.2)';ctx.lineWidth=8;ctx.beginPath();ctx.ellipse(fx,fy,110,70,0,0,Math.PI*2);ctx.stroke();
    // 等离子体（旋转发光粒子）
    const plasmaT=lt*2;
    for(let i=0;i<20;i++){
      const a=i/20*Math.PI*2+plasmaT;const pr=90+Math.sin(a*3+plasmaT)*15;
      const px=fx+Math.cos(a)*pr*.9,py=fy+Math.sin(a)*pr*.55;
      const hue=20+Math.random()*30;
      ctx.fillStyle=`hsla(${hue},100%,60%,.7)`;ctx.beginPath();ctx.arc(px,py,3+Math.random()*2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=`hsla(${hue},100%,70%,.2)`;ctx.beginPath();ctx.arc(px,py,8,0,Math.PI*2);ctx.fill();
    }
    // 中心发光
    const cgl=ctx.createRadialGradient(fx,fy,0,fx,fy,50);cgl.addColorStop(0,'rgba(255,200,50,.2)');cgl.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle=cgl;ctx.beginPath();ctx.arc(fx,fy,50,0,Math.PI*2);ctx.fill();
    // 氘 + 氚 → 氦 + 中子
    if(lt>3.5){
      const rp=easeOut(Math.min(1,(lt-3.5)/.5));
      ctx.fillStyle='#fff';ctx.font='bold 18px "PingFang SC",sans-serif';ctx.textAlign='center';
      ctx.fillText('氘 + 氚 → 氦 + 中子 + 能量',fx,fy+100);
      ctx.fillStyle=YELLOW;ctx.font='14px "PingFang SC",sans-serif';
      ctx.fillText('温度 > 1亿°C · 太阳的能量来源',fx,fy+125);
      if(lt>3.5&&lt<3.55)spawnP(fx,fy,30,30,40);
    }
    // 磁场线
    for(let i=0;i<6;i++){const ma=i/6*Math.PI*2;ctx.strokeStyle='rgba(96,165,250,.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(fx+Math.cos(ma)*15,fy+Math.sin(ma)*10,115,ma-.2,ma+.2);ctx.stroke()}
    ctx.fillStyle='#888';ctx.font='13px "PingFang SC",sans-serif';ctx.textAlign='center';ctx.fillText('托卡马克 · 磁约束聚变',fx,fy-100);
    ctx.globalAlpha=1;
  }
  ctx.globalAlpha=1;
  if(lt>3){const a=easeOut(Math.min(1,(lt-3)/.5));ctx.globalAlpha=a;ctx.fillStyle=GREEN;ctx.font='bold 28px "PingFang SC",sans-serif';ctx.textAlign='center';ctx.fillText('核电站控制 → 核聚变 · 太阳的能量',W/2,H-80);ctx.globalAlpha=1}
}

// ── 幕5: 方舟反应堆 + CTA (18-22s) ──
function drawScene5(lt){
  const cx=W/2,cy=H/2-60;
  if(lt<2.5){
    // 方舟反应堆
    const ap=easeOut(Math.min(1,lt/.6));
    ctx.globalAlpha=ap;
    const outerR=90,innerR=55;
    // 外壳
    ctx.strokeStyle='#555';ctx.lineWidth=4;ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,outerR-8,0,Math.PI*2);ctx.stroke();
    // 磁场线圈
    for(let i=0;i<8;i++){const a=i*Math.PI/4+lt*.3;ctx.strokeStyle='rgba(96,165,250,.8)';ctx.lineWidth=6;ctx.beginPath();ctx.arc(cx,cy,outerR-4,a-.15,a+.15);ctx.stroke()}
    // 等离子体环
    const plasmaR=innerR-5;
    ctx.strokeStyle='rgba(255,150,50,.6)';ctx.lineWidth=10;ctx.beginPath();ctx.arc(cx,cy,plasmaR,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(255,200,100,.2)';ctx.lineWidth=20;ctx.beginPath();ctx.arc(cx,cy,plasmaR,0,Math.PI*2);ctx.stroke();
    // 中心发光
    const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,innerR);cg.addColorStop(0,'rgba(100,200,255,.4)');cg.addColorStop(.5,'rgba(100,200,255,.1)');cg.addColorStop(1,'rgba(100,200,255,0)');
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2);ctx.fill();
    // 三角形结构
    for(let i=0;i<3;i++){const a=i*Math.PI*2/3-Math.PI/2;const tx=cx+Math.cos(a)*35,ty=cy+Math.sin(a)*35;ctx.fillStyle='rgba(96,165,250,.5)';ctx.beginPath();ctx.arc(tx,ty,6,0,Math.PI*2);ctx.fill()}
    // 标签
    ctx.fillStyle=CYAN;ctx.font='bold 22px "PingFang SC",sans-serif';ctx.textAlign='center';ctx.fillText('⚡ 方舟反应堆',cx,cy+outerR+35);
    ctx.fillStyle='#888';ctx.font='14px "PingFang SC",sans-serif';ctx.fillText('钢铁侠的心脏 · 微型托卡马克聚变',cx,cy+outerR+60);
    if(lt>.5&&lt<.55)spawnP(cx,cy,40,180,60);
    ctx.globalAlpha=1;
  }

  // CTA
  if(lt>2){
    const cp=easeOut(Math.min(1,(lt-2)/.8));
    ctx.globalAlpha=cp;
    ctx.font='bold 80px -apple-system,"PingFang SC",sans-serif';ctx.textAlign='center';
    const grd=ctx.createLinearGradient(W/2-300,H/2-60,W/2+300,H/2+60);grd.addColorStop(0,'#60a5fa');grd.addColorStop(.5,'#a78bfa');grd.addColorStop(1,'#f472b6');
    ctx.fillStyle=grd;ctx.fillText('Learn by Play',W/2,H/2-20);
    if(lt>2.5){const sp=easeOut(Math.min(1,(lt-2.5)/.5));ctx.globalAlpha=sp;ctx.fillStyle='#ccc';ctx.font='28px "PingFang SC",sans-serif';ctx.fillText('玩中学科学 — 零依赖 · 浏览器直接玩 · 完全免费',W/2,H/2+50)}
    if(lt>3){const bp=easeOut(Math.min(1,(lt-3)/.5));ctx.globalAlpha=bp;ctx.fillStyle=GREEN;ctx.font='24px "PingFang SC",sans-serif';ctx.fillText('☢️ 核物理探险 — 7关互动，从裂变到方舟反应堆',W/2,H/2+110)}
    if(lt>2&&lt<2.1)spawnP(W/2,H/2-40,100,120,160);
    ctx.globalAlpha=1;
  }
}

// ── 场景时间轴 ──
const SCENES=[
  {start:0,end:3.5,draw:drawScene1},
  {start:3,end:8.5,draw:drawScene2},
  {start:8,end:13.5,draw:drawScene3},
  {start:13,end:18.5,draw:drawScene4},
  {start:18,end:22,draw:drawScene5},
];

let t=0,startTime=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(!startTime)startTime=ts;
  const dt=1/60;t=(ts-startTime)/1000;
  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
  drawStars(Math.min(1,t/.5));
  for(let sc of SCENES){
    if(t>=sc.start&&t<sc.end){
      let alpha=1;
      if(t<sc.start+.5)alpha=easeOut((t-sc.start)/.5);
      if(t>sc.end-.5)alpha=easeOut((sc.end-t)/.5);
      ctx.globalAlpha=alpha;sc.draw(t-sc.start);ctx.globalAlpha=1;
    }
  }
  updateP(dt);drawP();
  if(t>22){startTime=ts;t=0;particles=[];initAtom();initChain()}
}
requestAnimationFrame(loop);
</script>
